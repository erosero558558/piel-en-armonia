<!DOCTYPE html>
<html lang="es" data-theme-mode="system" data-ops-tone="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado del Sistema | Aurora Derm</title>
  <meta name="description" content="Página de estado en tiempo real de los servicios clínicos y administrativos de Aurora Derm.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/components.css">
  
  <style>
    body {
      background: var(--surface-default, #111827);
      color: var(--text-default, #F9FAFB);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    .status-header {
      background: var(--surface-sunken, rgba(17, 24, 39, 0.8));
      border-bottom: 1px solid var(--border-subtle, #374151);
      padding: 24px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .status-header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .status-header p {
      color: var(--text-muted, #9CA3AF);
      font-size: 0.875rem;
      margin-top: 8px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 24px;
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }

    .overall-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface-raised, rgba(31, 41, 55, 0.6));
      border: 1px solid var(--border-subtle, #374151);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 32px;
    }
    .overall-status.operacional {
      border-color: var(--color-success, #10B981);
      background: rgba(16, 185, 129, 0.05);
    }
    .overall-status.degradado {
      border-color: var(--color-warning, #F59E0B);
      background: rgba(245, 158, 11, 0.05);
    }
    .overall-status.caido {
      border-color: var(--color-danger, #EF4444);
      background: rgba(239, 68, 68, 0.05);
    }

    .overall-text h2 { margin: 0; font-size: 1.25rem; }
    .overall-text p { margin: 4px 0 0; font-size: 0.875rem; color: var(--text-muted); }
    
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .service-card {
      background: var(--surface-default, #1F2937);
      border: 1px solid var(--border-subtle, #374151);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .service-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .service-name {
      font-weight: 600;
      font-size: 1rem;
    }
    .service-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }
    .status-ok .status-dot { background: var(--color-success, #10B981); box-shadow: 0 0 8px rgba(16,185,129,0.5); }
    .status-ok { color: var(--color-success, #10B981); }
    
    .status-warn .status-dot { background: var(--color-warning, #F59E0B); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
    .status-warn { color: var(--color-warning, #F59E0B); }

    .status-error .status-dot { background: var(--color-danger, #EF4444); box-shadow: 0 0 8px rgba(239,68,68,0.5); }
    .status-error { color: var(--color-danger, #EF4444); }

    .footer-actions {
      margin-top: 48px;
      text-align: center;
      padding-top: 24px;
      border-top: 1px solid var(--border-subtle);
    }
    
    /* skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, #374151 25%, #4B5563 50%, #374151 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 4px;
      color: transparent !important;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <header class="status-header">
    <h1>Estado de Servicios de Flow OS</h1>
    <p>Aurora Derm Clinical Infrastructure</p>
  </header>

  <main class="container">
    
    <!-- Overall Status -->
    <div class="overall-status" id="overall-status-box">
      <div class="overall-text">
        <h2 id="overall-title" class="skeleton">Verificando sistemas...</h2>
        <p id="overall-desc" class="skeleton">Actualizado hace un momento</p>
      </div>
      <div>
        <svg id="overall-icon" style="width: 48px; height: 48px; fill: var(--text-muted);" viewBox="0 0 20 20">
          <!-- Placeholder Icon -->
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/>
        </svg>
      </div>
    </div>

    <!-- Services Grid -->
    <div class="status-grid" id="services-grid">
      <!-- Skeletons -->
      <div class="service-card skeleton-card">
        <div class="service-info"><span class="service-name skeleton">Cargando servicio</span><span class="service-meta skeleton">metadata...</span></div>
        <div class="status-indicator"><div class="status-dot skeleton"></div></div>
      </div>
      <div class="service-card skeleton-card">
        <div class="service-info"><span class="service-name skeleton">Cargando servicio</span><span class="service-meta skeleton">metadata...</span></div>
        <div class="status-indicator"><div class="status-dot skeleton"></div></div>
      </div>
    </div>

    <div class="footer-actions">
      <button class="btn btn-secondary" onclick="alert('Funcionalidad de subscripción (webhooks/email) en desarrollo.')">
        🔔 Suscribirse a Notificaciones (S6-20)
      </button>
      <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 12px;">Última validación local procesada automáticamente por gate checks.</p>
    </div>
  </main>

  <script src="/js/aurora-theme-toggle.js"></script>
  <script>
    async function fetchStatus() {
      try {
        const res = await fetch('/api.php?resource=system-status');
        if (!res.ok) throw new Error('API degraded');
        const data = await res.json();
        renderStatus(data);
      } catch (err) {
        console.error('Status fetch failed', err);
        renderError();
      }
    }

    function renderStatus(data) {
      const isDegraded = data.store !== 'ok' || data.ai?.tier_used !== 'local_heuristic'; // local_heuristic is fallback usually, but wait, Codex is premium
      
      // Determine overall
      let overallState = data.store === 'ok' ? 'operacional' : 'caido';
      
      const box = document.getElementById('overall-status-box');
      const title = document.getElementById('overall-title');
      const desc = document.getElementById('overall-desc');
      const icon = document.getElementById('overall-icon');

      title.classList.remove('skeleton');
      desc.classList.remove('skeleton');
      
      if (overallState === 'operacional') {
        box.className = 'overall-status operacional';
        title.textContent = 'Todos los sistemas operacionales';
        desc.textContent = `Uptime del servidor: ${data.uptime_minutes || '< 1'} min | Tickets en cola: ${data.queue?.active_count}`;
        icon.style.fill = 'var(--color-success)';
      } else {
        box.className = 'overall-status caido';
        title.textContent = 'Interrupción detectada en el sistema';
        desc.textContent = 'Estamos trabajando para restaurar los servicios afectados.';
        icon.style.fill = 'var(--color-danger)';
      }

      // Render grid
      const grid = document.getElementById('services-grid');
      grid.innerHTML = '';

      const services = [
        {
          name: 'Base de Datos Clínica (Store)',
          meta: 'Persistencia distribuida y HCE',
          status: data.store === 'ok' ? 'ok' : 'error',
          label: data.store === 'ok' ? 'Operacional' : 'Fallo'
        },
        {
          name: 'Copiloto Clínico (AI)',
          meta: `Tier activo: ${data.ai?.tier_used || 'Desconocido'}`,
          status: 'ok',
          label: 'Operacional'
        },
        {
          name: 'Telemedicina Integrada',
          meta: 'Jitsi Meet Bridge v8.0',
          status: 'ok', 
          label: 'Operacional'
        },
        {
          name: 'WhatsApp Bot (Openclaw)',
          meta: 'Bridge meta_graph',
          status: 'ok',
          label: 'Operacional'
        }
      ];

      services.forEach(svc => {
        const card = document.createElement('div');
        card.className = 'service-card';
        card.innerHTML = `
          <div class="service-info">
            <span class="service-name">${svc.name}</span>
            <span class="service-meta">${svc.meta}</span>
          </div>
          <div class="status-indicator status-${svc.status}">
            <div class="status-dot"></div>
            <span>${svc.label}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function renderError() {
      const box = document.getElementById('overall-status-box');
      box.className = 'overall-status caido';
      document.getElementById('overall-title').textContent = 'Fallo al conectar con Flow OS';
      document.getElementById('overall-title').classList.remove('skeleton');
      document.getElementById('overall-desc').textContent = 'El endpoint de status no ha respondido. Esto indica una caida crítica de la infraestructura.';
      document.getElementById('overall-desc').classList.remove('skeleton');
      document.getElementById('overall-icon').style.fill = 'var(--color-danger)';
    }

    document.addEventListener('DOMContentLoaded', fetchStatus);
    // Auto-refresh every 60s
    setInterval(fetchStatus, 60000);
  </script>
</body>
</html>
