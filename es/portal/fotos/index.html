<!doctype html>
<html lang="es" data-theme-mode="system" data-ops-tone="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#248a65" />
    <title>Mis Fotos Clínicas | Aurora Derm</title>
    <link rel="stylesheet" href="/styles/reborn-tokens.css" />
    <link rel="stylesheet" href="/styles/reborn-base.css" />
    <link rel="stylesheet" href="/styles/reborn-typo.css" />
    <link rel="stylesheet" href="/styles/reborn-layout.css" />
    <link rel="stylesheet" href="/styles/reborn-components.css" />
    <link rel="stylesheet" href="/styles/aurora-portal.css" />
    <style>
        .progression-gallery {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .photo-group-date {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(20px);
        }

        .photo-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .photo-group-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .evolution-note-patient {
            background: rgba(var(--rb-accent-rgb), 0.1);
            border-left: 3px solid var(--rb-accent);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .photo-card {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background: var(--rb-surface);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .photo-card:active img {
            transform: scale(0.95);
        }

        .portal-upload-btn {
            width: 100%;
            margin-bottom: 24px;
            padding: 14px;
            border-radius: 12px;
            background: var(--rb-accent);
            color: #fff;
            font-weight: 600;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .portal-upload-btn:active {
            opacity: 0.8;
        }

        #file-input {
            display: none;
        }
    </style>
    <!-- Google tag (gtag.js) — S36-09 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2DWZ5PJ4MC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2DWZ5PJ4MC');
    </script>
</head>
<body class="portal-body" data-portal-session-required="true">
    <div class="portal-app-shell portal-app-shell--fotos">
        

        <main class="portal-main portal-main--fotos">
            <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem;">
                Revisa la evolución fotográfica de tus tratamientos y sube nuevas fotos para tu médico.
            </p>

            <button class="portal-upload-btn" onclick="document.getElementById('file-input').click()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Subir Nueva Foto
            </button>
            <input type="file" id="file-input" accept="image/*" multiple onchange="handlePhotoUpload(event)">

            <div id="progression-gallery-container" class="progression-gallery">
                <div style="text-align:center; padding: 40px; color: var(--text-muted);">
                    Levantando historia fotográfica...
                </div>
            </div>
        </main>

        <nav class="portal-bottom-nav" aria-label="Portal del paciente" style="border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);">
            <a class="portal-nav-item" href="/es/portal/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg><span>Inicio</span></a>
            <a class="portal-nav-item" href="/es/portal/historial/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18"/><path d="M3 6h12"/><path d="M3 18h10"/></svg><span>Historial</span></a>
            <a class="portal-nav-item" href="/es/portal/plan/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19h16"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-4"/></svg><span>Plan</span></a>
            <a class="portal-nav-item" href="/es/portal/receta/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/><path d="M10 13h6"/><path d="M10 17h4"/></svg><span>Receta</span></a>
            <a class="portal-nav-item" href="/es/portal/pagos/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Pagos</span></a>
        </nav>
    </div>

    <script src="/js/portal-session.js" defer></script>
    <script src="/js/portal-pwa.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('aurora_patient_portal_token');
            if (!token) return;

            try {
                // Fetch both history and photos to cross-reference dates and evolution notes
                const [histRes, photoRes] = await Promise.all([
                    fetch('/api.php?resource=patient-portal-history', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api.php?resource=patient-portal-photos', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const histData = await histRes.json();
                const photoData = await photoRes.json();

                const historyItems = (histData.data && histData.data.history) ? histData.data.history.items || [] : [];
                let groups = (photoData.data && photoData.data.gallery) ? photoData.data.gallery.groups || {} : {};
                
                // We actually want a progression gallery grouped BY DATE. The API sends it grouped by bodyZone.
                // We extract all items and group by date.
                const allPhotos = [];
                Object.values(groups).forEach(g => {
                    (g.items || []).forEach(item => allPhotos.push(item));
                });

                bindProgressionGallery(allPhotos, historyItems);
            } catch (err) {
                console.error(err);
                document.getElementById('progression-gallery-container').innerHTML = `<p style="color:red; text-align:center;">Error al cargar las fotografías</p>`;
            }
        });

        function bindProgressionGallery(photos, historyItems) {
            const container = document.getElementById('progression-gallery-container');
            if (!photos || photos.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 40px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px dashed rgba(255,255,255,0.1);">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted); margin-bottom: 12px;">
                            <rect x="3" y="5" width="18" height="14" rx="3"></rect>
                            <circle cx="8.5" cy="10" r="1.5"></circle>
                            <path d="m21 15-4.5-4.5L8 19"></path>
                        </svg>
                        <p class="portal-text-empty-state-title">Aún no hay fotos clínicas</p>
                        <p class="portal-text-empty-state-desc">Tus avances fotográficos aparecerán aquí.</p>
                    </div>
                `;
                return;
            }

            // Group by Date Label
            const byDate = {};
            photos.sort((a,b) => b.sortTimestamp - a.sortTimestamp).forEach(p => {
                const dl = p.dateLabel || 'Fecha Desconocida';
                if (!byDate[dl]) byDate[dl] = [];
                byDate[dl].push(p);
            });

            container.innerHTML = '';
            
            Object.keys(byDate).forEach(dateLabel => {
                const pts = byDate[dateLabel];
                // Try to find matching evolution note from history
                let evolutionNote = '';
                const parts = dateLabel.split(' ');
                // extremely fuzzy match to history items.
                const matchingHist = historyItems.find(h => h.dateLabel && h.dateLabel.includes(parts[0]));
                if (matchingHist && matchingHist.patientSummary) {
                    evolutionNote = matchingHist.patientSummary;
                } else if (matchingHist && matchingHist.diagnosis) {
                    evolutionNote = "Diagnóstico: " + matchingHist.diagnosis;
                }

                const groupEl = document.createElement('div');
                groupEl.className = 'photo-group-date';
                
                let noteHtml = '';
                if (evolutionNote) {
                    noteHtml = `<div class="evolution-note-patient">${evolutionNote}</div>`;
                }

                let picsHtml = pts.map(p => {
                    const src = p.url || '/api.php?resource=patient-portal-photo-file&id=' + encodeURIComponent(p.id) + '&token=' + localStorage.getItem('aurora_patient_portal_token');
                    return `
                    <div class="photo-card" onclick="window.open('${src}', '_blank')">
                        <img src="${src}" alt="Foto Clínica" loading="lazy">
                        <div style="position:absolute; bottom:0; left:0; right:0; padding:4px 8px; background:rgba(0,0,0,0.6); font-size:0.75rem; color:#fff; text-align:center;">
                            ${p.bodyZoneLabel || 'General'}
                        </div>
                    </div>`;
                }).join('');

                groupEl.innerHTML = `
                    <div class="photo-group-header">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rb-accent)" stroke-width="2">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            ${dateLabel}
                        </h3>
                        <span style="font-size:0.8rem; color:var(--text-muted);">${pts.length} fotos</span>
                    </div>
                    ${noteHtml}
                    <div class="photo-grid">
                        ${picsHtml}
                    </div>
                `;
                container.appendChild(groupEl);
            });
        }

            function showPhotoToast(message, type) {
                const existing = document.getElementById('foto-toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.id = 'foto-toast';
                toast.setAttribute('role', 'alert');
                toast.setAttribute('aria-live', 'polite');
                const isError = type === 'error';
                toast.style.cssText = `
                    position:fixed; bottom:96px; left:50%; transform:translateX(-50%);
                    background:${isError ? 'rgba(220,53,69,0.95)' : 'rgba(30,160,100,0.95)'};
                    color:#fff; border-radius:12px; padding:12px 20px;
                    font-size:0.9rem; font-weight:500; z-index:9999;
                    box-shadow:0 8px 24px rgba(0,0,0,0.35); max-width:320px;
                    text-align:center; backdrop-filter:blur(12px);
                    opacity:0; transition:opacity 0.25s ease;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                requestAnimationFrame(() => { toast.style.opacity = '1'; });
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 5000);
            }

        async function handlePhotoUpload(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            const token = localStorage.getItem('aurora_patient_portal_token');
            if (!token) return;

            const btn = document.querySelector('.portal-upload-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Subiendo...';
            btn.disabled = true;

            try {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();
                    const base64Promise = new Promise(resolve => {
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });

                    const base64 = await base64Promise;
                    
                    const res = await fetch('/api.php?resource=patient-portal-photo-upload', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            photoBase64: base64,
                            bodyZone: 'general'
                        })
                    });
                    
                    if (!res.ok) throw new Error('Falló subida');
                }
                
                showPhotoToast('Fotos subidas correctamente. Su médico las revisará.', 'success');
                setTimeout(() => window.location.reload(), 2000);
            } catch (err) {
                showPhotoToast('Error al subir las fotos. Intente nuevamente.', 'error');
                console.error('[portal-fotos] upload error:', err);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
