        <style>
            :root {
                --rb-bg: #050810;
                --rb-card-bg: rgba(255, 255, 255, 0.03);
                --rb-card-border: rgba(255, 255, 255, 0.08);
                --rb-accent: #c7a36d;
                --rb-danger: #ef4444;
                --rb-danger-bg: rgba(239, 68, 68, 0.1);
            }

            body.portal-body.portal-payments-surface {
                background: var(--rb-bg) !important;
                background-color: var(--rb-bg) !important;
                min-height: 100vh;
                margin: 0;
            }

            .portal-payments-shell {
                position: relative;
                min-height: 100vh;
                max-width: 520px;
                margin: 0 auto;
                background: var(--rb-bg);
                box-shadow: 0 22px 70px rgba(0, 0, 0, 0.8);
            }

            /* LIQUID GLASS TIER CARDS */
            .rb-payment-card {
                background: var(--rb-card-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid var(--rb-card-border);
                border-radius: 20px;
                padding: 20px;
                margin-bottom: 16px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            
            .rb-payment-card:active {
                transform: scale(0.98);
            }

            .rb-payment-card.is-pending {
                background: linear-gradient(145deg, rgba(239, 68, 68, 0.08) 0%, rgba(20, 10, 10, 0.4) 100%);
                border: 1px solid rgba(239, 68, 68, 0.2);
                box-shadow: inset 0 0 20px rgba(239, 68, 68, 0.05), 0 8px 32px rgba(239, 68, 68, 0.1);
            }

            .rb-payment-card__header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
            }

            .rb-payment-card__date {
                font-size: 0.85rem;
                color: rgba(255, 255, 255, 0.5);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                font-weight: 500;
            }

            .rb-payment-card__title {
                color: #ffffff;
                font-weight: 600;
                font-size: 1.1rem;
                margin: 4px 0 0 0;
                line-height: 1.3;
            }

            .rb-payment-card__amount-group {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
            }

            .rb-payment-card__amount {
                font-family: var(--font-display, inherit);
                font-size: 1.4rem;
                font-weight: 700;
                color: #ffffff;
                line-height: 1;
            }
            
            .rb-payment-card.is-pending .rb-payment-card__amount {
                color: var(--rb-danger);
            }

            .rb-payment-card__status {
                font-size: 0.75rem;
                padding: 4px 8px;
                border-radius: 999px;
                background: rgba(255,255,255,0.1);
                color: rgba(255,255,255,0.8);
                margin-top: 6px;
            }
            
            .rb-payment-card.is-pending .rb-payment-card__status {
                background: var(--rb-danger-bg);
                color: var(--rb-danger);
                font-weight: 600;
            }

            .rb-payment-card__footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 8px;
                padding-top: 16px;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }

            .rb-payment-card__method {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 0.85rem;
                color: rgba(255, 255, 255, 0.6);
            }
            .rb-payment-card__method svg {
                width: 16px;
                height: 16px;
                opacity: 0.7;
            }

            .rb-btn-action {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 8px 16px;
                border-radius: 999px;
                font-size: 0.85rem;
                font-weight: 600;
                text-decoration: none;
                transition: all 0.2s ease;
            }

            .rb-btn-action--primary {
                background: var(--rb-danger);
                color: white;
                box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
            }
            
            .rb-btn-action--secondary {
                background: rgba(255, 255, 255, 0.1);
                color: white;
                border: 1px solid rgba(255,255,255,0.1);
            }

            .skeleton-box {
                background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
                background-size: 200% 100%;
                animation: rbShimmer 1.5s infinite;
                border-radius: 8px;
            }
            @keyframes rbShimmer {
                0% { background-position: 200% 0; }
                100% { background-position: -200% 0; }
            }
        </style>
