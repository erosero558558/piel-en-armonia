<!doctype html>
<html lang="es" data-theme-mode="system" data-ops-tone="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
        <meta name="application-name" content="Aurora Derm" />
        <meta name="apple-mobile-web-app-title" content="Aurora Derm" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="theme-color" content="#248a65" />
        <title>Mi Portal | Aurora Derm</title>
        <link rel="icon" href="/favicon.ico" sizes="any" />
        <link rel="manifest" href="/manifest.json" />
        <link rel="apple-touch-icon" href="/images/icon-192.png" />
        <!-- Reborn Clinical Tech Engine -->
        <link rel="stylesheet" href="/styles/reborn-tokens.css" />
        <link rel="stylesheet" href="/styles/reborn-base.css" />
        <link rel="stylesheet" href="/styles/reborn-typo.css" />
        <link rel="stylesheet" href="/styles/reborn-layout.css" />
        <link rel="stylesheet" href="/styles/reborn-components.css" />
        <link rel="stylesheet" href="/styles/aurora-portal.css" />
        <style>
            .portal-dashboard-surface {
                min-height: 100vh;
                background: #000;
            }

            .portal-dashboard-shell {
                position: relative;
                min-height: 100vh;
                max-width: 520px;
                margin: 0 auto;
                background: #000;
                box-shadow: none;
            }

            .portal-greeting {
                text-align: left;
                margin: 0;
            }
            .portal-greeting-title {
                font-family: var(--font-display, inherit);
                font-size: clamp(2.5rem, 6vw, 3.5rem);
                font-weight: 500;
                color: #fff;
                margin: 0;
                line-height: 1.1;
                letter-spacing: -0.02em;
            }
            .portal-greeting-subtitle {
                color: var(--text-muted);
                font-size: 1rem;
                margin-top: 4px;
                font-weight: 400;
            }

            /* Dashboard Grid specific */
            .portal-dashboard-grid {
                display: flex;
                flex-direction: column;
                gap: 16px;
                margin-top: 24px;
            }
        </style>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2DWZ5PJ4MC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-2DWZ5PJ4MC');
</script>
</head>
    <body class="portal-body portal-dashboard-surface" data-portal-session-required="true">
        <div class="portal-app-shell portal-dashboard-shell">
            <header class="portal-header" style="border-bottom: 1px solid var(--border-color); padding: 16px 20px;">
                <div class="portal-header__profile">
                    <div class="portal-header__avatar" style="background:#000; border: 1px solid var(--border-color);" data-portal-patient-initials>AD</div>
                    <div class="portal-header__greetings">
                        <span>Portal del Paciente</span>
                        <strong data-portal-patient-name>Bienvenido</strong>
                    </div>
                </div>
                <div class="portal-header__actions">
                    <button class="btn-icon" type="button" data-portal-logout aria-label="Cerrar sesión">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <main class="portal-main" style="padding-bottom: 96px;">
                <section class="portal-section">
                    <div class="portal-greeting">
                        <h1 class="portal-greeting-title" data-portal-greeting>Hola, Paciente</h1>
                        <p class="portal-greeting-subtitle">Bienvenido a tu suite clínica personal.</p>
                    </div>

                    <div id="portal-alerts-container"></div>
                    <div id="portal-survey-container"></div>

                    <div class="portal-dashboard-grid">
                        <div id="portal-next-appointment"></div>
                        <div id="portal-treatment-plan"></div>
                        <div id="portal-evolution"></div>
                        <div id="portal-billing-summary"></div>
                        
                        <div style="margin-top: 24px;">
                            <h3 style="font-size: 1.1rem; color: #fff; margin-bottom: 16px;">Acciones Rápidas</h3>
                            <div id="portal-appointment-actions" style="display: flex; flex-direction: column; gap: 12px;"></div>
                        </div>

                        <div id="portal-membership-status" style="margin-top: 12px;"></div>
                    </div>
                </section>
            </main>

            <nav class="portal-bottom-nav" aria-label="Portal del paciente" style="border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);">
                <a class="portal-nav-item active" href="/es/portal/" aria-current="page">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 10.5 12 3l9 7.5"></path>
                        <path d="M5 9.5V21h14V9.5"></path>
                    </svg>
                    <span>Inicio</span>
                </a>
                <a class="portal-nav-item" href="/es/portal/historial/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 12h18"></path>
                        <path d="M3 6h12"></path>
                        <path d="M3 18h10"></path>
                    </svg>
                    <span>Historial</span>
                </a>
                <a class="portal-nav-item" href="/es/portal/plan/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M4 19h16"></path>
                        <path d="M7 16V9"></path>
                        <path d="M12 16V5"></path>
                        <path d="M17 16v-4"></path>
                    </svg>
                    <span>Plan</span>
                </a>
                <a class="portal-nav-item" href="/es/portal/receta/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M7 3h7l5 5v13H7z"></path>
                        <path d="M14 3v5h5"></path>
                        <path d="M10 13h6"></path>
                        <path d="M10 17h4"></path>
                    </svg>
                    <span>Receta</span>
                </a>
                <a class="portal-nav-item" href="/es/portal/fotos/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="3" y="5" width="18" height="14" rx="3"></rect>
                        <circle cx="8.5" cy="10" r="1.5"></circle>
                        <path d="m21 15-4.5-4.5L8 19"></path>
                    </svg>
                    <span>Fotos</span>
                </a>
                <a class="portal-nav-item" href="/es/portal/consentimiento/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M7 3h7l5 5v13H7z"></path>
                        <path d="M14 3v5h5"></path>
                        <path d="M10 13h6"></path>
                        <path d="M10 17h4"></path>
                    </svg>
                    <span>Docs</span>
                </a>
            </nav>
        </div>

        <script src="/js/portal-session.js" defer></script>
        <script src="/js/portal-shell.js" defer></script>
        <script src="/js/portal-pwa.js" defer></script>
        <script src="/js/portal-dashboard.js" defer></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const session = window.AuroraPatientPortalShell ? window.AuroraPatientPortalShell.getSession() : null;
                const greetingEl = document.querySelector('[data-portal-greeting]');
                if (greetingEl && session && session.patient && session.patient.name) {
                    const firstName = session.patient.name.split(' ')[0];
                    greetingEl.textContent = 'Hola, ' + firstName;
                }
            });
        </script>
    </body>
</html>
