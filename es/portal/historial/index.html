        <style>
            .portal-history-surface {
                min-height: 100vh;
                background:
                    radial-gradient(circle at top, rgba(36, 138, 101, 0.18), transparent 30%),
                    linear-gradient(180deg, #020617 0%, #0f172a 48%, #081018 100%);
            }

            .portal-history-shell {
                position: relative;
                min-height: 100vh;
                max-width: 520px;
                margin: 0 auto;
                background: linear-gradient(180deg, rgba(2, 6, 23, 0.96), rgba(15, 23, 42, 0.92));
                box-shadow: 0 22px 70px rgba(2, 6, 23, 0.45);
            }

            /* UI4-17 Glass Stepper Timeline */
            .lg-surface-timeline {
                cursor: pointer;
                transition: background 300ms ease, border-color 300ms ease, box-shadow 300ms ease;
                border-radius: 16px;
                position: relative;
                padding: 16px;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid rgba(255, 255, 255, 0.04);
                backdrop-filter: blur(16px);
                margin-left: 36px; /* Space for the left-aligned stepper */
                margin-bottom: 24px;
            }
            .lg-surface-timeline:hover {
                background: rgba(255, 255, 255, 0.05);
                border-color: rgba(199, 163, 109, 0.3);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            }

            .glass-stepper .portal-timeline-dot {
                position: absolute;
                left: -28px; /* Move dot outside the card */
                top: 24px;
                width: 14px;
                height: 14px;
                border-radius: 999px;
                background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.8), transparent 30%),
                            linear-gradient(135deg, #fcebb6 0%, #c7a36d 100%);
                box-shadow: 0 0 12px rgba(199, 163, 109, 0.6);
                z-index: 2;
            }

            /* Translucent connector line */
            .glass-stepper::before {
                content: '';
                position: absolute;
                left: -22px; /* Center with the dot */
                top: 48px; 
                bottom: -36px; /* Connect to next item over margins */
                width: 2px;
                background: linear-gradient(to bottom, rgba(199, 163, 109, 0.4), rgba(255, 255, 255, 0.05));
                z-index: 1;
            }
            .glass-stepper:last-child::before {
                display: none;
            }

            /* Expandable Cards CSS Grid Spring Trick */
            .portal-timeline-content-body-wrap {
                display: grid;
                grid-template-rows: 0fr;
                transition: grid-template-rows 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .lg-surface-timeline.is-expanded .portal-timeline-content-body-wrap {
                grid-template-rows: 1fr;
            }
            .portal-timeline-content-body {
                overflow: hidden;
                padding-top: 0;
            }
            .lg-surface-timeline.is-expanded .portal-timeline-content-body {
                padding-top: 16px;
            }

            /* Chevron indicating expansible state */
            .portal-timeline-chevron {
                position: absolute;
                right: 16px;
                top: 22px;
                color: rgba(255, 255, 255, 0.4);
                transition: transform 300ms ease;
            }
            .lg-surface-timeline.is-expanded .portal-timeline-chevron {
                transform: rotate(180deg);
            }
        </style>

    <body class="portal-body portal-history-surface" data-portal-session-required="true">
        <div class="portal-app-shell portal-history-shell">
            <header class="portal-header">
                <div class="portal-header__profile">
                    <div class="portal-header__avatar" data-portal-patient-initials>AD</div>
                    <div class="portal-header__greetings">
                        <span>Historial del paciente</span>
                        <strong data-portal-patient-name>Paciente Aurora</strong>
                    </div>
                </div>
                <div class="portal-header__actions">
                    <button class="btn-icon" type="button" data-portal-logout aria-label="Cerrar sesión">

                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </header>

                        <p>
                            Aquí aparecen las atenciones cerradas, las recetas o certificados listos y las
                            señales de seguimiento que Aurora Derm dejó visibles para tu portal.
                        </p>
                        <div style="margin-top: 20px;">
                            <button id="download-history-btn" class="btn btn-secondary btn-icon" type="button" aria-label="Exportar historia">

                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Exportar historia médica
                            </button>
                        </div>
                    </div>
                    <div id="portal-history-feed" data-portal-history-feed></div>
                </section>
            </main>

            <nav class="portal-bottom-nav" aria-label="Portal del paciente">
                <a class="portal-nav-item" href="/es/portal/">
