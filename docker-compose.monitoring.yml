version: '3.8'

services:
    prometheus:
        image: prom/prometheus:latest
        container_name: AURORADERM_prometheus
        volumes:
            - ./prometheus.docker.yml:/etc/prometheus/prometheus.yml:ro
            - ./prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml
        environment:
            - AURORADERM_DIAGNOSTICS_ACCESS_TOKEN=${AURORADERM_DIAGNOSTICS_ACCESS_TOKEN:-}
        entrypoint:
            - /bin/sh
            - -lc
        command:
            - |
              printf '%s' "${AURORADERM_DIAGNOSTICS_ACCESS_TOKEN:-}" > /tmp/prometheus_diagnostics.token
              exec /bin/prometheus \
                --config.file=/etc/prometheus/prometheus.yml \
                --storage.tsdb.path=/prometheus \
                --web.console.libraries=/usr/share/prometheus/console_libraries \
                --web.console.templates=/usr/share/prometheus/consoles
        ports:
            - '9090:9090'
        restart: unless-stopped
        extra_hosts:
            - 'host.docker.internal:host-gateway'

    grafana:
        image: grafana/grafana:latest
        container_name: AURORADERM_grafana
        ports:
            - '3000:3000'
        volumes:
            - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
            - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
            - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_USERS_ALLOW_SIGN_UP=false
        restart: unless-stopped
        depends_on:
            - prometheus
