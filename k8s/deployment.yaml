apiVersion: apps/v1
kind: Deployment
metadata:
  name: pielarmonia-app
  namespace: pielarmonia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pielarmonia-app
  template:
    metadata:
      labels:
        app: pielarmonia-app
    spec:
      containers:
      - name: app
        image: pielarmonia/app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /api.php?resource=health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api.php?resource=health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        envFrom:
        - configMapRef:
            name: pielarmonia-config
        - secretRef:
            name: pielarmonia-secret
        volumeMounts:
        - name: data-volume
          mountPath: /var/www/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: pielarmonia-data-pvc
