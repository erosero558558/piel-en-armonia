apiVersion: v1
kind: ConfigMap
metadata:
  name: pielarmonia-config
  namespace: pielarmonia
data:
  AURORADERM_ALLOWED_ORIGIN: "https://pielarmonia.com"
  AURORADERM_DEBUG_EXCEPTIONS: "false"
  AURORADERM_AUDIT_PUBLIC_GET: "false"
  AURORADERM_AUDIT_HEALTH: "false"
  AURORADERM_BACKUP_MAX_AGE_HOURS: "24"
  AURORADERM_BACKUP_LOCAL_REPLICA: "true"
  AURORADERM_BACKUP_RECEIVER_MAX_MB: "50"
  FEATURE_NEW_BOOKING_UI: "true"
  FEATURE_STRIPE_ELEMENTS: "true"
  FEATURE_DARK_MODE: "true"
  FEATURE_CHATGPT_INTEGRATION: "true"
  AURORADERM_DATA_DIR: "/var/www/data"
  AURORADERM_REDIS_HOST: "redis"

