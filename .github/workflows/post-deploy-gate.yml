name: Post-Deploy Gate (Git Sync)

on:
    push:
        branches:
            - main
    schedule:
        - cron: '17 */6 * * *'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            bench_runs:
                description: 'Muestras por endpoint para benchmark'
                required: false
                default: '25'
                type: string
            wait_seconds:
                description: 'Espera para sincronizacion del servidor'
                required: false
                default: '180'
                type: string
            asset_hash_retry_count:
                description: 'Reintentos por hash de asset'
                required: false
                default: '3'
                type: string
            asset_hash_retry_delay_sec:
                description: 'Espera entre reintentos de hash (seg)'
                required: false
                default: '8'
                type: string
            verify_retry_attempts:
                description: 'Reintentos completos de verificacion de despliegue'
                required: false
                default: '4'
                type: string
            verify_retry_delay_sec:
                description: 'Espera entre reintentos de verificacion (seg)'
                required: false
                default: '90'
                type: string
            core_p95_max_ms:
                description: 'Umbral p95 para health/reviews/availability (ms)'
                required: false
                default: '800'
                type: string
            figo_post_p95_max_ms:
                description: 'Umbral p95 para figo-post (ms)'
                required: false
                default: '2500'
                type: string
            skip_asset_hash_checks:
                description: 'Omitir validacion de hashes de assets'
                required: false
                default: false
                type: boolean
            force_asset_hash_checks:
                description: 'Forzar hashes bloqueantes (ignora ventana warning)'
                required: false
                default: false
                type: boolean
            asset_hash_warning_until:
                description: 'Fecha limite de warning hash (ISO 8601)'
                required: false
                default: '2026-03-08T23:59:59-05:00'
                type: string
            skip_figo_post_bench:
                description: 'Omitir benchmark de figo-post'
                required: false
                default: false
                type: boolean
            require_google_calendar:
                description: 'Forzar contrato de calendario estricto (source=google)'
                required: false
                default: false
                type: boolean

concurrency:
    group: post-deploy-gate-main
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    gate:
        name: Gate estricto en produccion
        runs-on: windows-latest
        timeout-minutes: 70
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || vars.TARGET_DOMAIN || 'https://pielarmonia.com' }}
            BENCH_RUNS: ${{ github.event.inputs.bench_runs || vars.BENCH_RUNS || '25' }}
            BENCH_RUNS_LIGHT: ${{ vars.BENCH_RUNS_LIGHT || '10' }}
            WAIT_SECONDS: ${{ github.event.inputs.wait_seconds || vars.WAIT_SECONDS || '90' }}
            WAIT_SECONDS_LIGHT: ${{ vars.WAIT_SECONDS_LIGHT || '30' }}
            ASSET_HASH_RETRY_COUNT: ${{ github.event.inputs.asset_hash_retry_count || vars.ASSET_HASH_RETRY_COUNT || '2' }}
            ASSET_HASH_RETRY_DELAY_SEC: ${{ github.event.inputs.asset_hash_retry_delay_sec || vars.ASSET_HASH_RETRY_DELAY_SEC || '4' }}
            VERIFY_RETRY_ATTEMPTS: ${{ github.event.inputs.verify_retry_attempts || vars.VERIFY_RETRY_ATTEMPTS || '2' }}
            VERIFY_RETRY_DELAY_SEC: ${{ github.event.inputs.verify_retry_delay_sec || vars.VERIFY_RETRY_DELAY_SEC || '75' }}
            CORE_P95_MAX_MS: ${{ github.event.inputs.core_p95_max_ms || vars.CORE_P95_MAX_MS || '800' }}
            FIGO_POST_P95_MAX_MS: ${{ github.event.inputs.figo_post_p95_max_ms || vars.FIGO_POST_P95_MAX_MS || '2500' }}
            EVENT_NAME: ${{ github.event_name }}
            SKIP_ASSET_HASH_CHECKS_INPUT: ${{ github.event.inputs.skip_asset_hash_checks || 'false' }}
            FORCE_ASSET_HASH_CHECKS_INPUT: ${{ github.event.inputs.force_asset_hash_checks || 'false' }}
            ASSET_HASH_WARNING_UNTIL_INPUT: ${{ github.event.inputs.asset_hash_warning_until || vars.ASSET_HASH_WARNING_UNTIL || '2026-03-08T23:59:59-05:00' }}
            SKIP_FIGO_POST_BENCH_INPUT: ${{ github.event.inputs.skip_figo_post_bench || 'false' }}
            ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME || 'PROD' }}
            REQUIRE_GOOGLE_CALENDAR: ${{ github.event.inputs.require_google_calendar || vars.REQUIRE_GOOGLE_CALENDAR || 'false' }}
            REQUIRE_GOOGLE_CALENDAR_EFFECTIVE: ${{ github.event.inputs.require_google_calendar || vars.REQUIRE_GOOGLE_CALENDAR || 'false' }}
            RUN_FIGO_CONTRACT: ${{ vars.RUN_FIGO_CONTRACT || 'true' }}
            TEST_FIGO_CHAT_LATENCY: ${{ vars.TEST_FIGO_CHAT_LATENCY || 'false' }}
            TEST_FIGO_CHAT_LATENCY_SAMPLES: ${{ vars.TEST_FIGO_CHAT_LATENCY_SAMPLES || '6' }}
            TEST_FIGO_CHAT_LATENCY_P95_MS: ${{ vars.TEST_FIGO_CHAT_LATENCY_P95_MS || '2500' }}
            POSTDEPLOY_CHANGE_CLASS: runtime
            POSTDEPLOY_EFFECTIVE_WAIT_SECONDS: '0'
            BENCH_RUNS_EFFECTIVE: '0'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Esperar sincronizacion Git del hosting
              if: ${{ github.event_name == 'push' }}
              shell: pwsh
              run: |
                  $waitSeconds = [int]$env:WAIT_SECONDS
                  if ($waitSeconds -lt 0) { $waitSeconds = 0 }
                  $lightWaitSeconds = [int]$env:WAIT_SECONDS_LIGHT
                  if ($lightWaitSeconds -lt 0) { $lightWaitSeconds = 0 }
                  $effectiveWaitSeconds = $waitSeconds

                  try {
                    $changedFiles = New-Object System.Collections.Generic.List[string]
                    $beforeSha = ''
                    $afterSha = ''
                    if (Test-Path $env:GITHUB_EVENT_PATH) {
                      $eventPayload = Get-Content -Raw $env:GITHUB_EVENT_PATH | ConvertFrom-Json
                      $beforeSha = [string]($eventPayload.before ?? '')
                      $afterSha = [string]($eventPayload.after ?? '')
                      if ($null -ne $eventPayload.commits) {
                        foreach ($commit in $eventPayload.commits) {
                          foreach ($field in @('added', 'modified', 'removed')) {
                            $entries = $commit.$field
                            if ($entries -is [System.Array]) {
                              foreach ($entry in $entries) {
                                if (![string]::IsNullOrWhiteSpace([string]$entry)) {
                                  $changedFiles.Add([string]$entry)
                                }
                              }
                            }
                          }
                        }
                      }
                    }

                    # Fallback: resolver cambios por rango git when payload does not include file lists.
                    if (($changedFiles | Measure-Object).Count -eq 0 -and -not [string]::IsNullOrWhiteSpace($beforeSha) -and -not [string]::IsNullOrWhiteSpace($afterSha)) {
                      $gitAvailable = $null -ne (Get-Command git -ErrorAction SilentlyContinue)
                      if ($gitAvailable) {
                        if ($beforeSha -eq ('0' * 40)) {
                          $fallbackFiles = & git show --pretty="" --name-only $afterSha 2>$null
                        } else {
                          $fallbackFiles = & git diff --name-only $beforeSha $afterSha 2>$null
                          if ($LASTEXITCODE -ne 0) {
                            & git fetch --no-tags --depth=100 origin $beforeSha $afterSha 2>$null
                            $fallbackFiles = & git diff --name-only $beforeSha $afterSha 2>$null
                          }
                        }

                        if ($fallbackFiles -is [System.Array]) {
                          foreach ($file in $fallbackFiles) {
                            if (![string]::IsNullOrWhiteSpace([string]$file)) {
                              $changedFiles.Add([string]$file)
                            }
                          }
                        }
                      }
                    }

                    $uniqueChangedFiles = $changedFiles | Sort-Object -Unique
                    if (($uniqueChangedFiles | Measure-Object).Count -gt 0) {
                      $runtimePattern = '(^controllers/)|(^lib/)|(^src/)|(^js/)|(^api\.php$)|(^figo-chat\.php$)|(^admin\.html$)|(^admin\.js$)|(^script\.js$)|(^styles.*\.css$)|(\.(php|js|css|html)$)'
                      $hasRuntimeChanges = $false
                      foreach ($file in $uniqueChangedFiles) {
                        if ([string]$file -match $runtimePattern) {
                          $hasRuntimeChanges = $true
                          break
                        }
                      }

                      if (-not $hasRuntimeChanges) {
                        $effectiveWaitSeconds = [Math]::Min($waitSeconds, $lightWaitSeconds)
                        "POSTDEPLOY_CHANGE_CLASS=non-runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                        Write-Host "Cambios no-runtime detectados: se reduce espera a $effectiveWaitSeconds segundos."
                      } else {
                        "POSTDEPLOY_CHANGE_CLASS=runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                        Write-Host "Cambios runtime detectados: se mantiene espera completa de $waitSeconds segundos."
                      }

                      $preview = ($uniqueChangedFiles | Select-Object -First 12) -join ', '
                      if ($preview -ne '') {
                        Write-Host "Cambios detectados (muestra): $preview"
                      }
                    } else {
                      "POSTDEPLOY_CHANGE_CLASS=unknown" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                      Write-Host "No se detectaron cambios en payload del push. Se mantiene espera completa."
                    }
                  } catch {
                    "POSTDEPLOY_CHANGE_CLASS=unknown" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                    Write-Host "[WARN] No se pudo clasificar cambios para espera adaptativa: $($_.Exception.Message)"
                    Write-Host "Se mantiene espera completa por seguridad."
                  }

                  "POSTDEPLOY_EFFECTIVE_WAIT_SECONDS=$effectiveWaitSeconds" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "Esperando $effectiveWaitSeconds segundos para que el servidor termine el pull..."
                  Start-Sleep -Seconds $effectiveWaitSeconds

            - name: Ejecutar gate estricto
              id: gate
              shell: pwsh
              run: |
                  $benchRuns = [int]$env:BENCH_RUNS
                  if ($benchRuns -lt 10) { $benchRuns = 10 }
                  $benchRunsLight = [int]$env:BENCH_RUNS_LIGHT
                  if ($benchRunsLight -lt 10) { $benchRunsLight = 10 }
                  if ($env:EVENT_NAME -eq 'push' -and $env:POSTDEPLOY_CHANGE_CLASS -eq 'non-runtime') {
                    $benchRuns = [Math]::Min($benchRuns, $benchRunsLight)
                    Write-Host "Cambios non-runtime: bench runs ajustado a $benchRuns (light cap=$benchRunsLight)."
                  }
                  "BENCH_RUNS_EFFECTIVE=$benchRuns" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  $hashRetryCount = [int]$env:ASSET_HASH_RETRY_COUNT
                  if ($hashRetryCount -lt 0) { $hashRetryCount = 0 }
                  $hashRetryDelay = [int]$env:ASSET_HASH_RETRY_DELAY_SEC
                  if ($hashRetryDelay -lt 1) { $hashRetryDelay = 1 }
                  $verifyRetryAttempts = [int]$env:VERIFY_RETRY_ATTEMPTS
                  if ($verifyRetryAttempts -lt 0) { $verifyRetryAttempts = 0 }
                  $verifyRetryDelay = [int]$env:VERIFY_RETRY_DELAY_SEC
                  if ($verifyRetryDelay -lt 1) { $verifyRetryDelay = 1 }
                  $coreP95MaxMs = [int]$env:CORE_P95_MAX_MS
                  if ($coreP95MaxMs -lt 100) { $coreP95MaxMs = 100 }
                  $figoPostP95MaxMs = [int]$env:FIGO_POST_P95_MAX_MS
                  if ($figoPostP95MaxMs -lt 1000) { $figoPostP95MaxMs = 1000 }
                  $skipAssetHashChecks = $false
                  $skipAssetHashChecksInput = [string]$env:SKIP_ASSET_HASH_CHECKS_INPUT
                  if ($skipAssetHashChecksInput.ToLowerInvariant() -eq 'true') {
                    $skipAssetHashChecks = $true
                  }
                  $forceAssetHashChecks = $false
                  $forceAssetHashChecksInput = [string]$env:FORCE_ASSET_HASH_CHECKS_INPUT
                  if ($forceAssetHashChecksInput.ToLowerInvariant() -eq 'true') {
                    $forceAssetHashChecks = $true
                  }
                  if ($forceAssetHashChecks) {
                    $skipAssetHashChecks = $false
                  }
                  Write-Host "Asset hash mode => skip=$skipAssetHashChecks force=$forceAssetHashChecks event=$env:EVENT_NAME"
                  $skipFigoPostBench = $false
                  if ($env:EVENT_NAME -eq 'push') {
                    $skipFigoPostBench = $true
                  }
                  $skipFigoPostBenchInput = [string]$env:SKIP_FIGO_POST_BENCH_INPUT
                  if ($skipFigoPostBenchInput.ToLowerInvariant() -eq 'true') {
                    $skipFigoPostBench = $true
                  }
                  ./GATE-POSTDEPLOY.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -BenchRuns $benchRuns `
                    -SkipAssetHashChecks:$skipAssetHashChecks `
                    -AssetHashRetryCount $hashRetryCount `
                    -AssetHashRetryDelaySec $hashRetryDelay `
                    -VerifyRetryAttempts $verifyRetryAttempts `
                    -VerifyRetryDelaySec $verifyRetryDelay `
                    -CoreP95MaxMs $coreP95MaxMs `
                    -FigoPostP95MaxMs $figoPostP95MaxMs `
                    -SkipFigoPostBench:$skipFigoPostBench `
                    -AssetHashWarningUntil $env:ASSET_HASH_WARNING_UNTIL_INPUT `
                    -ForceAssetHashChecks:$forceAssetHashChecks `
                    -RequireStableDataDir `
                    -RequireBackupHealthy `
                    -RequireBackupReceiverReady `
                    -RequireCronReady

            - name: Setup Node para contrato calendario
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias Node
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: npm ci

            - name: Resolver modo estricto de calendario desde health
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: |
                  $effectiveRequireGoogle = ([string]$env:REQUIRE_GOOGLE_CALENDAR).ToLowerInvariant() -eq 'true'
                  try {
                    $healthUrl = "$($env:TARGET_DOMAIN.TrimEnd('/'))/api.php?resource=health"
                    $response = Invoke-WebRequest -Uri $healthUrl -TimeoutSec 20 -UseBasicParsing
                    $health = $response.Content | ConvertFrom-Json
                    $calendarRequired = $false
                    try { $calendarRequired = [bool]$health.calendarRequired } catch {}
                    if ($calendarRequired) {
                      $effectiveRequireGoogle = $true
                      Write-Host "calendarRequired=true en health; se fuerza contrato estricto Google."
                    } else {
                      Write-Host "calendarRequired=false en health; se mantiene input/vars."
                    }
                  } catch {
                    Write-Host "[WARN] No se pudo resolver health para calendarRequired. Se mantiene input/vars."
                  }
                  $effectiveValue = if ($effectiveRequireGoogle) { 'true' } else { 'false' }
                  "REQUIRE_GOOGLE_CALENDAR_EFFECTIVE=$effectiveValue" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "REQUIRE_GOOGLE_CALENDAR_EFFECTIVE=$effectiveValue"

            - name: Validar contrato Google Calendar (no destructivo)
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              env:
                  TEST_BASE_URL: ${{ env.TARGET_DOMAIN }}
                  TEST_REQUIRE_GOOGLE_CALENDAR: ${{ env.REQUIRE_GOOGLE_CALENDAR_EFFECTIVE }}
              run: npm run test:calendar-contract

            - name: Validar contrato Figo Chat (sin fallback silencioso)
              if: ${{ steps.gate.outcome == 'success' && env.RUN_FIGO_CONTRACT == 'true' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              env:
                  TEST_BASE_URL: ${{ env.TARGET_DOMAIN }}
                  TEST_FIGO_CHAT_LATENCY: ${{ env.TEST_FIGO_CHAT_LATENCY }}
                  TEST_FIGO_CHAT_LATENCY_SAMPLES: ${{ env.TEST_FIGO_CHAT_LATENCY_SAMPLES }}
                  TEST_FIGO_CHAT_LATENCY_P95_MS: ${{ env.TEST_FIGO_CHAT_LATENCY_P95_MS }}
              run: npm run test:figo-contract

            - name: Resumen
              if: ${{ always() }}
              shell: pwsh
              run: |
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Post-deploy gate"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Dominio: ``$env:TARGET_DOMAIN``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Bench runs: ``$env:BENCH_RUNS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Bench runs light cap: ``$env:BENCH_RUNS_LIGHT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Bench runs efectivos: ``$env:BENCH_RUNS_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Asset hash retries: ``$env:ASSET_HASH_RETRY_COUNT`` cada ``$env:ASSET_HASH_RETRY_DELAY_SEC``s"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verify retries: ``$env:VERIFY_RETRY_ATTEMPTS`` cada ``$env:VERIFY_RETRY_DELAY_SEC``s"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- P95 core API max: ``$env:CORE_P95_MAX_MS`` ms"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- P95 figo-post max: ``$env:FIGO_POST_P95_MAX_MS`` ms"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input skip asset hashes: ``$env:SKIP_ASSET_HASH_CHECKS_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input force asset hashes: ``$env:FORCE_ASSET_HASH_CHECKS_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Asset hash warning until: ``$env:ASSET_HASH_WARNING_UNTIL_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input skip figo-post bench: ``$env:SKIP_FIGO_POST_BENCH_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Change class: ``$env:POSTDEPLOY_CHANGE_CLASS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Effective wait seconds: ``$env:POSTDEPLOY_EFFECTIVE_WAIT_SECONDS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Require Google calendar (input/vars): ``$env:REQUIRE_GOOGLE_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Require Google calendar (effective): ``$env:REQUIRE_GOOGLE_CALENDAR_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato figo-chat habilitado: ``$env:RUN_FIGO_CONTRACT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Figo latency benchmark: ``$env:TEST_FIGO_CHAT_LATENCY`` (samples ``$env:TEST_FIGO_CHAT_LATENCY_SAMPLES``, p95 ``$env:TEST_FIGO_CHAT_LATENCY_P95_MS`` ms)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Resultado: ``${{ steps.gate.outcome }}``"
                  if ($env:POSTDEPLOY_CHANGE_CLASS -eq 'non-runtime') {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contratos Node: omitidos por cambios no-runtime."
                  } else {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato calendario: ejecutado con ``npm run test:calendar-contract``"
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato figo-chat: ``npm run test:figo-contract``"
                  }

            - name: Publicar reporte de verificacion
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-verify-report
                  path: verification/last-deploy-verify.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Crear/actualizar incidente de gate
              if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy fallando`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Post-Deploy Gate (Git Sync)` fallo en produccion.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente de gate al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy fallando`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por gate post-deploy.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);
