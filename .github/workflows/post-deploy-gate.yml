name: Post-Deploy Gate (Full Regression)

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            bench_runs:
                description: 'Muestras por endpoint para benchmark'
                required: false
                default: '25'
                type: string
            wait_seconds:
                description: 'Espera para sincronizacion del servidor'
                required: false
                default: '180'
                type: string
            asset_hash_retry_count:
                description: 'Reintentos por hash de asset'
                required: false
                default: '3'
                type: string
            asset_hash_retry_delay_sec:
                description: 'Espera entre reintentos de hash (seg)'
                required: false
                default: '8'
                type: string
            verify_retry_attempts:
                description: 'Reintentos completos de verificacion de despliegue'
                required: false
                default: '4'
                type: string
            verify_retry_delay_sec:
                description: 'Espera entre reintentos de verificacion (seg)'
                required: false
                default: '90'
                type: string
            core_p95_max_ms:
                description: 'Umbral p95 para health/reviews/availability (ms)'
                required: false
                default: '800'
                type: string
            figo_post_p95_max_ms:
                description: 'Umbral p95 para figo-post (ms)'
                required: false
                default: '2500'
                type: string
            skip_asset_hash_checks:
                description: 'Omitir validacion de hashes de assets'
                required: false
                default: false
                type: boolean
            force_asset_hash_checks:
                description: 'Forzar hashes bloqueantes (ignora ventana warning)'
                required: false
                default: false
                type: boolean
            asset_hash_warning_until:
                description: 'Fecha limite de warning hash (ISO 8601)'
                required: false
                default: '2026-03-08T23:59:59-05:00'
                type: string
            skip_figo_post_bench:
                description: 'Omitir benchmark de figo-post'
                required: false
                default: false
                type: boolean
            require_google_calendar:
                description: 'Forzar contrato de calendario estricto (source=google)'
                required: false
                default: false
                type: boolean
            admin_rollout_stage:
                description: 'Etapa gate admin UI (internal|canary|general|rollback)'
                required: false
                default: 'general'
                type: string
            admin_rollout_skip_runtime_smoke:
                description: 'Omitir smoke runtime Playwright del gate admin UI'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_feature_api_failure:
                description: 'Permitir falla de features API en gate admin UI'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_missing_flag:
                description: 'Permitir ausencia de data.admin_sony_ui en gate admin UI'
                required: false
                default: false
                type: boolean
            enable_public_v4_rollout_monitor:
                description: 'Habilitar monitor de rollout publico V4 (trazabilidad en gate)'
                required: false
                default: false
                type: boolean
            public_v4_rollout_stage:
                description: 'Etapa rollout publico V4 (internal|canary|general|rollback)'
                required: false
                default: 'canary'
                type: string
            public_v4_rollout_surface_test:
                description: 'Superficie test rollout publico V4'
                required: false
                default: 'v4'
                type: string
            public_v4_rollout_surface_control:
                description: 'Superficie control rollout publico V4'
                required: false
                default: 'legacy'
                type: string
            public_v4_rollout_min_view_booking:
                description: 'Minimo de view_booking por superficie'
                required: false
                default: '20'
                type: string
            public_v4_rollout_min_start_checkout:
                description: 'Minimo de start_checkout por superficie'
                required: false
                default: '10'
                type: string
            public_v4_rollout_max_confirmed_drop_pp:
                description: 'Drop maximo permitido (pp) test vs control'
                required: false
                default: '8'
                type: string
            public_v4_rollout_min_confirmed_rate_pct:
                description: 'Tasa minima de confirmed (%) superficie test'
                required: false
                default: '20'
                type: string
            public_v4_rollout_allow_missing_control:
                description: 'Permitir ausencia de superficie control'
                required: false
                default: false
                type: boolean

concurrency:
    group: post-deploy-gate-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    gate:
        if: ${{ github.event_name != 'push' || vars.RUN_POSTDEPLOY_GATE_ON_PUSH == 'true' }}
        name: Gate estricto en produccion
        runs-on: windows-latest
        timeout-minutes: 70
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || vars.TARGET_DOMAIN || 'https://pielarmonia.com' }}
            BENCH_RUNS: ${{ github.event.inputs.bench_runs || vars.BENCH_RUNS || '25' }}
            BENCH_RUNS_LIGHT: ${{ vars.BENCH_RUNS_LIGHT || '10' }}
            WAIT_SECONDS: ${{ github.event.inputs.wait_seconds || vars.WAIT_SECONDS || '90' }}
            WAIT_SECONDS_LIGHT: ${{ vars.WAIT_SECONDS_LIGHT || '30' }}
            ASSET_HASH_RETRY_COUNT: ${{ github.event.inputs.asset_hash_retry_count || vars.ASSET_HASH_RETRY_COUNT || '2' }}
            ASSET_HASH_RETRY_DELAY_SEC: ${{ github.event.inputs.asset_hash_retry_delay_sec || vars.ASSET_HASH_RETRY_DELAY_SEC || '4' }}
            VERIFY_RETRY_ATTEMPTS: ${{ github.event.inputs.verify_retry_attempts || vars.VERIFY_RETRY_ATTEMPTS || '2' }}
            VERIFY_RETRY_DELAY_SEC: ${{ github.event.inputs.verify_retry_delay_sec || vars.VERIFY_RETRY_DELAY_SEC || '75' }}
            CORE_P95_MAX_MS: ${{ github.event.inputs.core_p95_max_ms || vars.CORE_P95_MAX_MS || '800' }}
            FIGO_POST_P95_MAX_MS: ${{ github.event.inputs.figo_post_p95_max_ms || vars.FIGO_POST_P95_MAX_MS || '2500' }}
            EVENT_NAME: ${{ github.event_name }}
            SKIP_ASSET_HASH_CHECKS_INPUT: ${{ github.event.inputs.skip_asset_hash_checks || 'false' }}
            FORCE_ASSET_HASH_CHECKS_INPUT: ${{ github.event.inputs.force_asset_hash_checks || 'false' }}
            ASSET_HASH_WARNING_UNTIL_INPUT: ${{ github.event.inputs.asset_hash_warning_until || vars.ASSET_HASH_WARNING_UNTIL || '2026-03-08T23:59:59-05:00' }}
            SKIP_FIGO_POST_BENCH_INPUT: ${{ github.event.inputs.skip_figo_post_bench || 'false' }}
            ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME || 'PROD' }}
            REQUIRE_GOOGLE_CALENDAR: ${{ github.event.inputs.require_google_calendar || vars.REQUIRE_GOOGLE_CALENDAR || 'false' }}
            REQUIRE_GOOGLE_CALENDAR_EFFECTIVE: ${{ github.event.inputs.require_google_calendar || vars.REQUIRE_GOOGLE_CALENDAR || 'false' }}
            RUN_FIGO_CONTRACT: ${{ vars.RUN_FIGO_CONTRACT || 'true' }}
            TEST_FIGO_CHAT_LATENCY: ${{ vars.TEST_FIGO_CHAT_LATENCY || 'false' }}
            TEST_FIGO_CHAT_LATENCY_SAMPLES: ${{ vars.TEST_FIGO_CHAT_LATENCY_SAMPLES || '6' }}
            TEST_FIGO_CHAT_LATENCY_P95_MS: ${{ vars.TEST_FIGO_CHAT_LATENCY_P95_MS || '2500' }}
            RUN_POSTDEPLOY_GATE_ON_PUSH: ${{ vars.RUN_POSTDEPLOY_GATE_ON_PUSH || 'false' }}
            ADMIN_ROLLOUT_STAGE_INPUT: ${{ github.event.inputs.admin_rollout_stage || vars.ADMIN_ROLLOUT_STAGE || 'general' }}
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_INPUT: ${{ github.event.inputs.admin_rollout_skip_runtime_smoke || vars.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE || 'false' }}
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_INPUT: ${{ github.event.inputs.admin_rollout_allow_feature_api_failure || vars.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE || 'false' }}
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_INPUT: ${{ github.event.inputs.admin_rollout_allow_missing_flag || vars.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG || 'false' }}
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_INPUT: ${{ github.event.inputs.enable_public_v4_rollout_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT || 'false' }}
            PUBLIC_V4_ROLLOUT_STAGE_INPUT: ${{ github.event.inputs.public_v4_rollout_stage || vars.PUBLIC_V4_ROLLOUT_STAGE || 'canary' }}
            PUBLIC_V4_ROLLOUT_SURFACE_TEST_INPUT: ${{ github.event.inputs.public_v4_rollout_surface_test || vars.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4' }}
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_INPUT: ${{ github.event.inputs.public_v4_rollout_surface_control || vars.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy' }}
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_INPUT: ${{ github.event.inputs.public_v4_rollout_min_view_booking || vars.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING || '20' }}
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_INPUT: ${{ github.event.inputs.public_v4_rollout_min_start_checkout || vars.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT || '10' }}
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_INPUT: ${{ github.event.inputs.public_v4_rollout_max_confirmed_drop_pp || vars.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || '8' }}
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_INPUT: ${{ github.event.inputs.public_v4_rollout_min_confirmed_rate_pct || vars.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || '20' }}
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_INPUT: ${{ github.event.inputs.public_v4_rollout_allow_missing_control || vars.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL || 'false' }}
            POSTDEPLOY_CHANGE_CLASS: runtime
            POSTDEPLOY_TRIGGER_MODE: manual
            POSTDEPLOY_EFFECTIVE_WAIT_SECONDS: '0'
            BENCH_RUNS_EFFECTIVE: '0'
            ADMIN_ROLLOUT_STAGE_EFFECTIVE: general
            ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE: strict
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE: 'false'
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE: 'false'
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE: 'false'
            ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE: stage-default
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE: 'false'
            PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: canary
            PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE: progressive
            PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE: stage-default
            PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: v4
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: legacy
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: '20'
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: '10'
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: '8'
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: '20'
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: 'false'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Resolver modo de ejecucion post-deploy gate
              shell: pwsh
              run: |
                  $triggerMode = 'manual'
                  if ($env:EVENT_NAME -eq 'push') {
                    $triggerMode = 'push'
                  }
                  "POSTDEPLOY_TRIGGER_MODE=$triggerMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "Post-deploy gate trigger mode: $triggerMode"

            - name: Esperar sincronizacion Git del hosting
              if: ${{ github.event_name == 'push' }}
              shell: pwsh
              run: |
                  $waitSeconds = [int]$env:WAIT_SECONDS
                  if ($waitSeconds -lt 0) { $waitSeconds = 0 }
                  $lightWaitSeconds = [int]$env:WAIT_SECONDS_LIGHT
                  if ($lightWaitSeconds -lt 0) { $lightWaitSeconds = 0 }
                  $effectiveWaitSeconds = $waitSeconds

                  try {
                    $changedFiles = New-Object System.Collections.Generic.List[string]
                    $beforeSha = ''
                    $afterSha = ''
                    if (Test-Path $env:GITHUB_EVENT_PATH) {
                      $eventPayload = Get-Content -Raw $env:GITHUB_EVENT_PATH | ConvertFrom-Json
                      $beforeSha = [string]($eventPayload.before ?? '')
                      $afterSha = [string]($eventPayload.after ?? '')
                      if ($null -ne $eventPayload.commits) {
                        foreach ($commit in $eventPayload.commits) {
                          foreach ($field in @('added', 'modified', 'removed')) {
                            $entries = $commit.$field
                            if ($entries -is [System.Array]) {
                              foreach ($entry in $entries) {
                                if (![string]::IsNullOrWhiteSpace([string]$entry)) {
                                  $changedFiles.Add([string]$entry)
                                }
                              }
                            }
                          }
                        }
                      }
                    }

                    # Fallback: resolver cambios por rango git when payload does not include file lists.
                    if (($changedFiles | Measure-Object).Count -eq 0 -and -not [string]::IsNullOrWhiteSpace($beforeSha) -and -not [string]::IsNullOrWhiteSpace($afterSha)) {
                      $gitAvailable = $null -ne (Get-Command git -ErrorAction SilentlyContinue)
                      if ($gitAvailable) {
                        if ($beforeSha -eq ('0' * 40)) {
                          $fallbackFiles = & git show --pretty="" --name-only $afterSha 2>$null
                        } else {
                          $fallbackFiles = & git diff --name-only $beforeSha $afterSha 2>$null
                          if ($LASTEXITCODE -ne 0) {
                            & git fetch --no-tags --depth=100 origin $beforeSha $afterSha 2>$null
                            $fallbackFiles = & git diff --name-only $beforeSha $afterSha 2>$null
                          }
                        }

                        if ($fallbackFiles -is [System.Array]) {
                          foreach ($file in $fallbackFiles) {
                            if (![string]::IsNullOrWhiteSpace([string]$file)) {
                              $changedFiles.Add([string]$file)
                            }
                          }
                        }
                      }
                    }

                    $uniqueChangedFiles = $changedFiles | Sort-Object -Unique
                    if (($uniqueChangedFiles | Measure-Object).Count -gt 0) {
                      $runtimePattern = '(^controllers/)|(^lib/)|(^src/)|(^js/)|(^api\.php$)|(^figo-chat\.php$)|(^admin\.html$)|(^admin\.js$)|(^script\.js$)|(^styles.*\.css$)|(\.(php|js|css|html)$)'
                      $hasRuntimeChanges = $false
                      foreach ($file in $uniqueChangedFiles) {
                        if ([string]$file -match $runtimePattern) {
                          $hasRuntimeChanges = $true
                          break
                        }
                      }

                      if (-not $hasRuntimeChanges) {
                        $effectiveWaitSeconds = [Math]::Min($waitSeconds, $lightWaitSeconds)
                        "POSTDEPLOY_CHANGE_CLASS=non-runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                        Write-Host "Cambios no-runtime detectados: se reduce espera a $effectiveWaitSeconds segundos."
                      } else {
                        "POSTDEPLOY_CHANGE_CLASS=runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                        Write-Host "Cambios runtime detectados: se mantiene espera completa de $waitSeconds segundos."
                      }

                      $preview = ($uniqueChangedFiles | Select-Object -First 12) -join ', '
                      if ($preview -ne '') {
                        Write-Host "Cambios detectados (muestra): $preview"
                      }
                    } else {
                      "POSTDEPLOY_CHANGE_CLASS=unknown" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                      Write-Host "No se detectaron cambios en payload del push. Se mantiene espera completa."
                    }
                  } catch {
                    "POSTDEPLOY_CHANGE_CLASS=unknown" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                    Write-Host "[WARN] No se pudo clasificar cambios para espera adaptativa: $($_.Exception.Message)"
                    Write-Host "Se mantiene espera completa por seguridad."
                  }

                  "POSTDEPLOY_EFFECTIVE_WAIT_SECONDS=$effectiveWaitSeconds" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "Esperando $effectiveWaitSeconds segundos para que el servidor termine el pull..."
                  Start-Sleep -Seconds $effectiveWaitSeconds

            - name: Ejecutar gate estricto
              id: gate
              shell: pwsh
              run: |
                  $benchRuns = [int]$env:BENCH_RUNS
                  if ($benchRuns -lt 10) { $benchRuns = 10 }
                  $benchRunsLight = [int]$env:BENCH_RUNS_LIGHT
                  if ($benchRunsLight -lt 10) { $benchRunsLight = 10 }
                  if ($env:EVENT_NAME -eq 'push' -and $env:POSTDEPLOY_CHANGE_CLASS -eq 'non-runtime') {
                    $benchRuns = [Math]::Min($benchRuns, $benchRunsLight)
                    Write-Host "Cambios non-runtime: bench runs ajustado a $benchRuns (light cap=$benchRunsLight)."
                  }
                  "BENCH_RUNS_EFFECTIVE=$benchRuns" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  $hashRetryCount = [int]$env:ASSET_HASH_RETRY_COUNT
                  if ($hashRetryCount -lt 0) { $hashRetryCount = 0 }
                  $hashRetryDelay = [int]$env:ASSET_HASH_RETRY_DELAY_SEC
                  if ($hashRetryDelay -lt 1) { $hashRetryDelay = 1 }
                  $verifyRetryAttempts = [int]$env:VERIFY_RETRY_ATTEMPTS
                  if ($verifyRetryAttempts -lt 0) { $verifyRetryAttempts = 0 }
                  $verifyRetryDelay = [int]$env:VERIFY_RETRY_DELAY_SEC
                  if ($verifyRetryDelay -lt 1) { $verifyRetryDelay = 1 }
                  $coreP95MaxMs = [int]$env:CORE_P95_MAX_MS
                  if ($coreP95MaxMs -lt 100) { $coreP95MaxMs = 100 }
                  $figoPostP95MaxMs = [int]$env:FIGO_POST_P95_MAX_MS
                  if ($figoPostP95MaxMs -lt 1000) { $figoPostP95MaxMs = 1000 }
                  $skipAssetHashChecks = $false
                  $skipAssetHashChecksInput = [string]$env:SKIP_ASSET_HASH_CHECKS_INPUT
                  if ($skipAssetHashChecksInput.ToLowerInvariant() -eq 'true') {
                    $skipAssetHashChecks = $true
                  }
                  $forceAssetHashChecks = $false
                  $forceAssetHashChecksInput = [string]$env:FORCE_ASSET_HASH_CHECKS_INPUT
                  if ($forceAssetHashChecksInput.ToLowerInvariant() -eq 'true') {
                    $forceAssetHashChecks = $true
                  }
                  if ($forceAssetHashChecks) {
                    $skipAssetHashChecks = $false
                  }
                  Write-Host "Asset hash mode => skip=$skipAssetHashChecks force=$forceAssetHashChecks event=$env:EVENT_NAME"
                  $skipFigoPostBench = $false
                  if ($env:EVENT_NAME -eq 'push') {
                    $skipFigoPostBench = $true
                  }
                  $skipFigoPostBenchInput = [string]$env:SKIP_FIGO_POST_BENCH_INPUT
                  if ($skipFigoPostBenchInput.ToLowerInvariant() -eq 'true') {
                    $skipFigoPostBench = $true
                  }
                  ./GATE-POSTDEPLOY.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -BenchRuns $benchRuns `
                    -SkipAssetHashChecks:$skipAssetHashChecks `
                    -AssetHashRetryCount $hashRetryCount `
                    -AssetHashRetryDelaySec $hashRetryDelay `
                    -VerifyRetryAttempts $verifyRetryAttempts `
                    -VerifyRetryDelaySec $verifyRetryDelay `
                    -CoreP95MaxMs $coreP95MaxMs `
                    -FigoPostP95MaxMs $figoPostP95MaxMs `
                    -SkipFigoPostBench:$skipFigoPostBench `
                    -AssetHashWarningUntil $env:ASSET_HASH_WARNING_UNTIL_INPUT `
                    -ForceAssetHashChecks:$forceAssetHashChecks `
                    -RequireStableDataDir `
                    -RequireBackupHealthy `
                    -RequireBackupReceiverReady `
                    -RequireCronReady

            - name: Setup Node para contrato calendario
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias Node
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: npm ci

            - name: Resolver configuracion gate admin UI
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: |
                  $policyJson = node ./bin/resolve-admin-rollout-policy.js `
                    --stage "$env:ADMIN_ROLLOUT_STAGE_INPUT" `
                    --default-stage general `
                    --skip-runtime-smoke "$env:ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_INPUT" `
                    --default-skip-runtime-smoke false `
                    --allow-feature-api-failure "$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_INPUT" `
                    --default-allow-feature-api-failure false `
                    --allow-missing-flag "$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_INPUT" `
                    --default-allow-missing-flag false

                  if ($LASTEXITCODE -ne 0) {
                    throw 'No se pudo resolver politica admin rollout (gate).'
                  }

                  $policy = $policyJson | ConvertFrom-Json
                  $skipRuntimeSmokeText = if ([bool]$policy.skip_runtime_smoke_effective) { 'true' } else { 'false' }
                  $allowFeatureApiFailureText = if ([bool]$policy.allow_feature_api_failure_effective) { 'true' } else { 'false' }
                  $allowMissingFlagText = if ([bool]$policy.allow_missing_flag_effective) { 'true' } else { 'false' }

                  "ADMIN_ROLLOUT_STAGE_EFFECTIVE=$($policy.stage_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE=$($policy.stage_profile)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE=$skipRuntimeSmokeText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE=$allowFeatureApiFailureText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE=$allowMissingFlagText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE=$($policy.policy_source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "Admin rollout => stage=$($policy.stage_effective) profile=$($policy.stage_profile) skip_runtime_smoke=$skipRuntimeSmokeText allow_feature_api_failure=$allowFeatureApiFailureText allow_missing_flag=$allowMissingFlagText policy_source=$($policy.policy_source)"

            - name: Resolver configuracion rollout publico V4
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: |
                  $policyJson = node ./bin/resolve-public-v4-rollout-policy.js `
                    --stage "$env:PUBLIC_V4_ROLLOUT_STAGE_INPUT" `
                    --default-stage canary `
                    --enable-monitor "$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_INPUT" `
                    --surface-test "$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_INPUT" `
                    --surface-control "$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_INPUT" `
                    --min-view-booking "$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_INPUT" `
                    --min-start-checkout "$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_INPUT" `
                    --max-confirmed-drop-pp "$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_INPUT" `
                    --min-confirmed-rate-pct "$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_INPUT" `
                    --allow-missing-control "$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_INPUT"

                  if ($LASTEXITCODE -ne 0) {
                    throw 'No se pudo resolver politica rollout publico V4 (gate).'
                  }

                  $policy = $policyJson | ConvertFrom-Json
                  $enableMonitorText = if ([bool]$policy.enable_monitor_effective) { 'true' } else { 'false' }
                  $allowMissingControlText = if ([bool]$policy.allow_missing_control_effective) { 'true' } else { 'false' }

                  "ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE=$enableMonitorText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE=$($policy.stage_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE=$($policy.stage_profile)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE=$($policy.policy_source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE=$($policy.surface_test_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE=$($policy.surface_control_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE=$($policy.min_view_booking_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE=$($policy.min_start_checkout_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE=$($policy.max_confirmed_drop_pp_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE=$($policy.min_confirmed_rate_pct_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE=$allowMissingControlText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "Public V4 rollout => enable_monitor=$enableMonitorText stage=$($policy.stage_effective) profile=$($policy.stage_profile) surface_test=$($policy.surface_test_effective) surface_control=$($policy.surface_control_effective) policy_source=$($policy.policy_source)"

            - name: Escribir reporte rollout publico V4
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  $report = [ordered]@{
                    generated_at = (Get-Date).ToUniversalTime().ToString('o')
                    domain = [string]$env:TARGET_DOMAIN
                    trigger_mode = [string]$env:POSTDEPLOY_TRIGGER_MODE
                    input = [ordered]@{
                      enable_monitor = [string]$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_INPUT
                      stage = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_INPUT
                      surface_test = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_INPUT
                      surface_control = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_INPUT
                      min_view_booking = [string]$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_INPUT
                      min_start_checkout = [string]$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_INPUT
                      max_confirmed_drop_pp = [string]$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_INPUT
                      min_confirmed_rate_pct = [string]$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_INPUT
                      allow_missing_control = [string]$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_INPUT
                    }
                    effective = [ordered]@{
                      enable_monitor = [string]$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE
                      stage = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE
                      stage_profile = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE
                      policy_source = [string]$env:PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE
                      surface_test = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE
                      surface_control = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE
                      min_view_booking = [string]$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE
                      min_start_checkout = [string]$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE
                      max_confirmed_drop_pp = [string]$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE
                      min_confirmed_rate_pct = [string]$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE
                      allow_missing_control = [string]$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE
                    }
                  }
                  $report | ConvertTo-Json -Depth 8 | Set-Content -Path 'verification/last-public-v4-rollout-gate.json' -Encoding utf8
                  Write-Host 'Reporte rollout publico V4 escrito en verification/last-public-v4-rollout-gate.json'

            - name: Instalar Playwright (chromium) para gate admin UI
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' && env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE != 'true' }}
              shell: pwsh
              run: npx playwright install chromium

            - name: Ejecutar gate admin UI rollout
              id: admin_rollout
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  $skipRuntimeSmoke = ([string]$env:ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE).ToLowerInvariant() -eq 'true'
                  $allowFeatureApiFailure = ([string]$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE).ToLowerInvariant() -eq 'true'
                  $allowMissingFlag = ([string]$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE).ToLowerInvariant() -eq 'true'

                  ./GATE-ADMIN-ROLLOUT.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -Stage $env:ADMIN_ROLLOUT_STAGE_EFFECTIVE `
                    -SkipRuntimeSmoke:$skipRuntimeSmoke `
                    -AllowFeatureApiFailure:$allowFeatureApiFailure `
                    -AllowMissingAdminFlag:$allowMissingFlag `
                    -ReportPath 'verification/last-admin-ui-rollout-gate.json'

            - name: Resolver modo estricto de calendario desde health
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              run: |
                  $effectiveRequireGoogle = ([string]$env:REQUIRE_GOOGLE_CALENDAR).ToLowerInvariant() -eq 'true'
                  try {
                    $healthUrl = "$($env:TARGET_DOMAIN.TrimEnd('/'))/api.php?resource=health"
                    $response = Invoke-WebRequest -Uri $healthUrl -TimeoutSec 20 -UseBasicParsing
                    $health = $response.Content | ConvertFrom-Json
                    $calendarRequired = $false
                    try { $calendarRequired = [bool]$health.calendarRequired } catch {}
                    if ($calendarRequired) {
                      $effectiveRequireGoogle = $true
                      Write-Host "calendarRequired=true en health; se fuerza contrato estricto Google."
                    } else {
                      Write-Host "calendarRequired=false en health; se mantiene input/vars."
                    }
                  } catch {
                    Write-Host "[WARN] No se pudo resolver health para calendarRequired. Se mantiene input/vars."
                  }
                  $effectiveValue = if ($effectiveRequireGoogle) { 'true' } else { 'false' }
                  "REQUIRE_GOOGLE_CALENDAR_EFFECTIVE=$effectiveValue" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "REQUIRE_GOOGLE_CALENDAR_EFFECTIVE=$effectiveValue"

            - name: Validar contrato Google Calendar (no destructivo)
              id: calendar_contract
              if: ${{ steps.gate.outcome == 'success' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              env:
                  TEST_BASE_URL: ${{ env.TARGET_DOMAIN }}
                  TEST_REQUIRE_GOOGLE_CALENDAR: ${{ env.REQUIRE_GOOGLE_CALENDAR_EFFECTIVE }}
              run: npm run test:calendar-contract

            - name: Validar contrato Figo Chat (sin fallback silencioso)
              id: figo_contract
              if: ${{ steps.gate.outcome == 'success' && env.RUN_FIGO_CONTRACT == 'true' && env.POSTDEPLOY_CHANGE_CLASS != 'non-runtime' }}
              shell: pwsh
              env:
                  TEST_BASE_URL: ${{ env.TARGET_DOMAIN }}
                  TEST_FIGO_CHAT_LATENCY: ${{ env.TEST_FIGO_CHAT_LATENCY }}
                  TEST_FIGO_CHAT_LATENCY_SAMPLES: ${{ env.TEST_FIGO_CHAT_LATENCY_SAMPLES }}
                  TEST_FIGO_CHAT_LATENCY_P95_MS: ${{ env.TEST_FIGO_CHAT_LATENCY_P95_MS }}
              run: npm run test:figo-contract

            - name: Resumen
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $adminRolloutOutcome = '${{ steps.admin_rollout.outcome }}'
                  if ([string]::IsNullOrWhiteSpace($adminRolloutOutcome)) {
                    $adminRolloutOutcome = 'skipped'
                  }
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Post-deploy gate"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Dominio: ``$env:TARGET_DOMAIN``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Trigger mode: ``$env:POSTDEPLOY_TRIGGER_MODE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- RUN_POSTDEPLOY_GATE_ON_PUSH: ``$env:RUN_POSTDEPLOY_GATE_ON_PUSH``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Bench runs: ``$env:BENCH_RUNS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Bench runs light cap: ``$env:BENCH_RUNS_LIGHT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Bench runs efectivos: ``$env:BENCH_RUNS_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Asset hash retries: ``$env:ASSET_HASH_RETRY_COUNT`` cada ``$env:ASSET_HASH_RETRY_DELAY_SEC``s"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Verify retries: ``$env:VERIFY_RETRY_ATTEMPTS`` cada ``$env:VERIFY_RETRY_DELAY_SEC``s"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- P95 core API max: ``$env:CORE_P95_MAX_MS`` ms"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- P95 figo-post max: ``$env:FIGO_POST_P95_MAX_MS`` ms"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input skip asset hashes: ``$env:SKIP_ASSET_HASH_CHECKS_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input force asset hashes: ``$env:FORCE_ASSET_HASH_CHECKS_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Asset hash warning until: ``$env:ASSET_HASH_WARNING_UNTIL_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input skip figo-post bench: ``$env:SKIP_FIGO_POST_BENCH_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input admin rollout stage: ``$env:ADMIN_ROLLOUT_STAGE_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input admin rollout skip runtime smoke: ``$env:ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input admin rollout allow feature API failure: ``$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input admin rollout allow missing flag: ``$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout monitor: ``$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout stage: ``$env:PUBLIC_V4_ROLLOUT_STAGE_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout surface test: ``$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout surface control: ``$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout min view booking: ``$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout min start checkout: ``$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout max confirmed drop pp: ``$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout min confirmed rate pct: ``$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Input public V4 rollout allow missing control: ``$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Change class: ``$env:POSTDEPLOY_CHANGE_CLASS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Effective wait seconds: ``$env:POSTDEPLOY_EFFECTIVE_WAIT_SECONDS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Semaforo platform: ``${{ steps.gate.outcome }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout stage (effective): ``$env:ADMIN_ROLLOUT_STAGE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout stage profile (effective): ``$env:ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout skip runtime smoke (effective): ``$env:ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout allow feature API failure (effective): ``$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout allow missing flag (effective): ``$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout policy source (effective): ``$env:ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout monitor (effective): ``$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout stage (effective): ``$env:PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout stage profile (effective): ``$env:PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout policy source (effective): ``$env:PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout surface test (effective): ``$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout surface control (effective): ``$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min view booking (effective): ``$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min start checkout (effective): ``$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout max confirmed drop pp (effective): ``$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min confirmed rate pct (effective): ``$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout allow missing control (effective): ``$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Semaforo admin rollout: ``$adminRolloutOutcome``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Reporte admin rollout: ``verification/last-admin-ui-rollout-gate.json``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Reporte public V4 rollout: ``verification/last-public-v4-rollout-gate.json``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Semaforo agenda(calendar): ``${{ steps.calendar_contract.outcome }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Semaforo chat(figo): ``${{ steps.figo_contract.outcome }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Require Google calendar (input/vars): ``$env:REQUIRE_GOOGLE_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Require Google calendar (effective): ``$env:REQUIRE_GOOGLE_CALENDAR_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato figo-chat habilitado: ``$env:RUN_FIGO_CONTRACT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Figo latency benchmark: ``$env:TEST_FIGO_CHAT_LATENCY`` (samples ``$env:TEST_FIGO_CHAT_LATENCY_SAMPLES``, p95 ``$env:TEST_FIGO_CHAT_LATENCY_P95_MS`` ms)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Resultado: ``${{ steps.gate.outcome }}``"
                  if ($env:POSTDEPLOY_CHANGE_CLASS -eq 'non-runtime') {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contratos Node: omitidos por cambios no-runtime."
                  } else {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato calendario: ejecutado con ``npm run test:calendar-contract``"
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato figo-chat: ``npm run test:figo-contract``"
                  }

            - name: Publicar reporte de verificacion
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-verify-report
                  path: verification/last-deploy-verify.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Publicar reporte gate admin rollout
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-admin-rollout-report
                  path: verification/last-admin-ui-rollout-gate.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Publicar reporte rollout publico V4
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-public-v4-rollout-report
                  path: verification/last-public-v4-rollout-gate.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Crear/actualizar incidente de gate
              if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              env:
                  GATE_OUTCOME: ${{ steps.gate.outcome }}
                  ADMIN_ROLLOUT_OUTCOME: ${{ steps.admin_rollout.outcome }}
                  ADMIN_ROLLOUT_STAGE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_STAGE_EFFECTIVE }}
                  ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE }}
                  ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE }}
                  ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE }}
                  ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE }}
                  ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE }}
                  ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE: ${{ env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE }}
                  POSTDEPLOY_CHANGE_CLASS: ${{ env.POSTDEPLOY_CHANGE_CLASS }}
                  POSTDEPLOY_EFFECTIVE_WAIT_SECONDS: ${{ env.POSTDEPLOY_EFFECTIVE_WAIT_SECONDS }}
                  BENCH_RUNS_EFFECTIVE: ${{ env.BENCH_RUNS_EFFECTIVE }}
                  REQUIRE_GOOGLE_CALENDAR_EFFECTIVE: ${{ env.REQUIRE_GOOGLE_CALENDAR_EFFECTIVE }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy fallando`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Post-Deploy Gate (Git Sync)` fallo en produccion.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- gate_outcome: ${process.env.GATE_OUTCOME || 'n/a'}`,
                        `- admin_rollout_outcome: ${process.env.ADMIN_ROLLOUT_OUTCOME || 'skipped'}`,
                        `- admin_rollout_stage_effective: ${process.env.ADMIN_ROLLOUT_STAGE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_stage_profile_effective: ${process.env.ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_skip_runtime_smoke_effective: ${process.env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_allow_feature_api_failure_effective: ${process.env.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_allow_missing_flag_effective: ${process.env.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_policy_source_effective: ${process.env.ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_monitor_effective: ${process.env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_stage_effective: ${process.env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_stage_profile_effective: ${process.env.PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_policy_source_effective: ${process.env.PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_surface_test_effective: ${process.env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_surface_control_effective: ${process.env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_min_view_booking_effective: ${process.env.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_min_start_checkout_effective: ${process.env.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_max_confirmed_drop_pp_effective: ${process.env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_min_confirmed_rate_pct_effective: ${process.env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_allow_missing_control_effective: ${process.env.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE || 'n/a'}`,
                        `- change_class: ${process.env.POSTDEPLOY_CHANGE_CLASS || 'n/a'}`,
                        `- effective_wait_seconds: ${process.env.POSTDEPLOY_EFFECTIVE_WAIT_SECONDS || 'n/a'}`,
                        `- bench_runs_effective: ${process.env.BENCH_RUNS_EFFECTIVE || 'n/a'}`,
                        `- require_google_calendar_effective: ${process.env.REQUIRE_GOOGLE_CALENDAR_EFFECTIVE || 'n/a'}`
                      ].join('\n');

                      const diagnosticHints = [];
                      if ((process.env.POSTDEPLOY_CHANGE_CLASS || '').toLowerCase() === 'non-runtime') {
                        diagnosticHints.push(
                          'Hint: cambio clasificado como non-runtime; los contratos Node suelen omitirse y el fallo probablemente esta en gate/verify/smoke/bench.'
                        );
                      }
                      const bodyWithHints = diagnosticHints.length
                        ? `${body}\n\n${diagnosticHints.join('\n')}`
                        : body;

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: bodyWithHints
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert']
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: bodyWithHints,
                          labels: ['production-alert']
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente de gate al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy fallando`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por gate post-deploy.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);
