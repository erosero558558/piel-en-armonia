                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Require telemedicine ready (input/vars): ``$env:REQUIRE_TELEMEDICINE_READY_INPUT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Require telemedicine ready (effective): ``$env:REQUIRE_TELEMEDICINE_READY_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato figo-chat habilitado: ``$env:RUN_FIGO_CONTRACT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Figo latency benchmark: ``$env:TEST_FIGO_CHAT_LATENCY`` (samples ``$env:TEST_FIGO_CHAT_LATENCY_SAMPLES``, p95 ``$env:TEST_FIGO_CHAT_LATENCY_P95_MS`` ms)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Resultado: ``${{ steps.gate.outcome }}``"
                  if ($env:POSTDEPLOY_CHANGE_CLASS -eq 'non-runtime') {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contratos Node: omitidos por cambios no-runtime."
                  } else {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato calendario: ejecutado con ``npm run test:calendar-contract``"
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Contrato figo-chat: ``npm run test:figo-contract``"
                  }

            - name: Publicar reporte de verificacion
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-verify-report
                  path: verification/last-deploy-verify.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Publicar reporte gate admin rollout
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-admin-rollout-report
                  path: verification/last-admin-ui-rollout-gate.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Publicar reporte smoke live OpenClaw
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-openclaw-live-smoke-report
                  path: verification/last-admin-openclaw-live-smoke-gate.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Publicar reporte rollout publico V4
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-public-v4-rollout-report
                  path: verification/last-public-v4-rollout-gate.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Evaluar estado telemedicina del gate
              id: telemedicine_gate
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'unknown'
                  $reason = 'verify_report_missing'
                  $teleFailures = 0
                  $nonTeleFailures = 0
                  $reportPath = 'verification/last-deploy-verify.json'

                  if (Test-Path $reportPath) {
                    try {
                      $report = Get-Content -Raw $reportPath | ConvertFrom-Json -Depth 20
                      $failures = @()
                      try { $failures = @($report.failures) } catch { $failures = @() }

                      $teleFailureAssets = New-Object System.Collections.Generic.List[string]
                      foreach ($failure in $failures) {
                        $asset = ''
                        try { $asset = [string]$failure.Asset } catch { $asset = '' }
                        if ($asset -like 'health-telemedicine-*') {
                          $teleFailureAssets.Add($asset)
                        }
                      }

                      $teleFailures = $teleFailureAssets.Count
                      $nonTeleFailures = [Math]::Max(0, @($failures).Count - $teleFailures)

                      if ($teleFailures -gt 0 -and $nonTeleFailures -eq 0) {
                        $status = 'degraded_only'
                        $reason = ($teleFailureAssets | Select-Object -Unique) -join ';'
                      } elseif ($teleFailures -gt 0) {
                        $status = 'degraded_mixed'
                        $reason = ($teleFailureAssets | Select-Object -Unique) -join ';'
                      } else {
                        $status = 'healthy'
                        $reason = 'ok'
                      }
                    } catch {
                      $status = 'unknown'
                      $reason = 'verify_report_unreadable'
                    }
                  }

                  "TELEMEDICINE_GATE_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_GATE_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_GATE_FAILURES=$teleFailures" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_GATE_NON_TELE_FAILURES=$nonTeleFailures" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "tele_failures=$teleFailures" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "non_tele_failures=$nonTeleFailures" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Telemedicine gate => status=$status reason=$reason tele_failures=$teleFailures non_tele_failures=$nonTeleFailures"

            - name: Resumen telemedicina gate
              if: ${{ always() }}
              shell: pwsh
              run: |
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine gate status: ``$env:TELEMEDICINE_GATE_STATUS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine gate reason: ``$env:TELEMEDICINE_GATE_REASON``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine gate failures: ``$env:TELEMEDICINE_GATE_FAILURES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine gate non-tele failures: ``$env:TELEMEDICINE_GATE_NON_TELE_FAILURES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine gate step outcome: ``${{ steps.telemedicine_gate.outcome }}``"

            - name: Evaluar estado turneroPilot del gate
              id: turnero_pilot_gate
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'unknown'
                  $reason = 'verify_report_missing'
                  $clinicId = ''
                  $profileFingerprint = ''
                  $statusResolved = $false
                  $verifyRemoteRequired = $false
                  $catalogReady = $false
                  $remoteVerified = $false
                  $deployedCommit = ''
                  $releaseMode = ''
                  $recoveryTargets = @()
                  $reportPath = 'verification/last-deploy-verify.json'

                  if (Test-Path $reportPath) {
                    try {
                      $report = Get-Content -Raw $reportPath | ConvertFrom-Json -Depth 20
                      $turneroPilot = $null
                      try { $turneroPilot = $report.turneroPilot } catch { $turneroPilot = $null }
                      $failures = @()
                      try { $failures = @($report.failures) } catch { $failures = @() }

                      if ($null -eq $turneroPilot) {
                        $status = 'unknown'
                        $reason = 'turnero_pilot_missing'
                      } else {
                        try { $clinicId = [string]$turneroPilot.clinicId } catch { $clinicId = '' }
                        try { $profileFingerprint = [string]$turneroPilot.profileFingerprint } catch { $profileFingerprint = '' }
                        try { $statusResolved = [bool]$turneroPilot.statusResolved } catch { $statusResolved = $false }
                        try { $verifyRemoteRequired = [bool]$turneroPilot.verifyRemoteRequired } catch { $verifyRemoteRequired = $false }
                        try { $catalogReady = [bool]$turneroPilot.catalogReady } catch { $catalogReady = $false }
                        try { $remoteVerified = [bool]$turneroPilot.remoteVerified } catch { $remoteVerified = $false }
                        try { $deployedCommit = [string]$turneroPilot.remoteDeployedCommit } catch { $deployedCommit = '' }
                        try { $releaseMode = [string]$turneroPilot.releaseMode } catch { $releaseMode = '' }
                        if ($releaseMode -eq 'web_pilot') {
                          $recoveryTargets = @(
                            '[ALERTA PROD] Deploy Hosting turneroPilot bloqueado',
                            '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado'
                          )
                        }

                        $blocking = New-Object System.Collections.Generic.List[string]
                        if (-not $statusResolved) {
                          $blocking.Add('profile_status_unresolved')
                        }
                        if (-not $catalogReady) {
                          $blocking.Add('catalog_not_ready')
                        }
                        if (@($failures | Where-Object { [string]$_.Asset -eq 'turnero-pilot-profile-status' }).Count -gt 0) {
                          $blocking.Add('verify_asset:turnero-pilot-profile-status')
                        }
                        if (@($failures | Where-Object { [string]$_.Asset -eq 'turnero-pilot-remote-verify' }).Count -gt 0) {
                          $blocking.Add('verify_asset:turnero-pilot-remote-verify')
                        }
                        if ($releaseMode -eq 'web_pilot' -and $verifyRemoteRequired -and -not $remoteVerified) {
                          $blocking.Add('remote_verify_failed')
                        }

                        if (-not [string]::IsNullOrWhiteSpace($releaseMode) -and $releaseMode -ne 'web_pilot') {
                          $status = 'not_required'
                          $reason = "release_mode:$releaseMode"
                        } elseif ($blocking.Count -gt 0) {
                          $status = 'blocked'
                          $reason = ($blocking | Select-Object -Unique) -join ';'
                        } else {
                          $status = 'ready'
                          $reason = 'ok'
                        }
                      }
                    } catch {
                      $status = 'unknown'
                      $reason = 'verify_report_unreadable'
                    }
                  }

                  $statusResolvedText = if ($statusResolved) { 'true' } else { 'false' }
                  $verifyRemoteRequiredText = if ($verifyRemoteRequired) { 'true' } else { 'false' }
                  $catalogReadyText = if ($catalogReady) { 'true' } else { 'false' }
                  $remoteVerifiedText = if ($remoteVerified) { 'true' } else { 'false' }
                  "TURNERO_PILOT_GATE_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_CLINIC_ID=$clinicId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_PROFILE_FINGERPRINT=$profileFingerprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_STATUS_RESOLVED=$statusResolvedText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_VERIFY_REMOTE_REQUIRED=$verifyRemoteRequiredText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_RELEASE_MODE=$releaseMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_CATALOG_READY=$catalogReadyText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_REMOTE_VERIFIED=$remoteVerifiedText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_DEPLOYED_COMMIT=$deployedCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_GATE_RECOVERY_TARGETS=$($recoveryTargets -join ' | ')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Turnero pilot gate => status=$status reason=$reason clinicId=$clinicId fingerprint=$profileFingerprint catalogReady=$catalogReadyText remoteVerified=$remoteVerifiedText deployedCommit=$deployedCommit"

            - name: Escribir reporte turneroPilot gate
              if: ${{ always() }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  $report = [ordered]@{
                    generatedAt = [DateTimeOffset]::UtcNow.ToString('o')
                    workflow = 'post-deploy-gate'
                    targetDomain = [string]$env:TARGET_DOMAIN
                    turneroPilot = [ordered]@{
                      status = [string]$env:TURNERO_PILOT_GATE_STATUS
                      reason = [string]$env:TURNERO_PILOT_GATE_REASON
                      clinicId = [string]$env:TURNERO_PILOT_GATE_CLINIC_ID
                      profileFingerprint = [string]$env:TURNERO_PILOT_GATE_PROFILE_FINGERPRINT
                      statusResolved = ([string]$env:TURNERO_PILOT_GATE_STATUS_RESOLVED).ToLowerInvariant() -eq 'true'
                      verifyRemoteRequired = ([string]$env:TURNERO_PILOT_GATE_VERIFY_REMOTE_REQUIRED).ToLowerInvariant() -eq 'true'
                      releaseMode = [string]$env:TURNERO_PILOT_GATE_RELEASE_MODE
                      catalogReady = ([string]$env:TURNERO_PILOT_GATE_CATALOG_READY).ToLowerInvariant() -eq 'true'
                      remoteVerified = ([string]$env:TURNERO_PILOT_GATE_REMOTE_VERIFIED).ToLowerInvariant() -eq 'true'
                      deployedCommit = [string]$env:TURNERO_PILOT_GATE_DEPLOYED_COMMIT
                      recoveryTargets = @(
                        @([string]$env:TURNERO_PILOT_GATE_RECOVERY_TARGETS -split '\s+\|\s+' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
                      )
                    }
                    sourceVerifyReport = 'verification/last-deploy-verify.json'
                  }
                  $report | ConvertTo-Json -Depth 8 | Set-Content -Path 'verification/last-turnero-pilot-gate.json' -Encoding utf8
                  Write-Host 'Reporte turneroPilot gate escrito en verification/last-turnero-pilot-gate.json'

            - name: Resumen turneroPilot gate
              if: ${{ always() }}
              shell: pwsh
              run: |
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate status: ``$env:TURNERO_PILOT_GATE_STATUS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate reason: ``$env:TURNERO_PILOT_GATE_REASON``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate clinicId: ``$env:TURNERO_PILOT_GATE_CLINIC_ID``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate fingerprint: ``$env:TURNERO_PILOT_GATE_PROFILE_FINGERPRINT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate status resolved: ``$env:TURNERO_PILOT_GATE_STATUS_RESOLVED``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate verify-remote required: ``$env:TURNERO_PILOT_GATE_VERIFY_REMOTE_REQUIRED``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate release mode: ``$env:TURNERO_PILOT_GATE_RELEASE_MODE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate catalog ready: ``$env:TURNERO_PILOT_GATE_CATALOG_READY``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate remote verified: ``$env:TURNERO_PILOT_GATE_REMOTE_VERIFIED``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate deployed commit: ``$env:TURNERO_PILOT_GATE_DEPLOYED_COMMIT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate recovery targets: ``$env:TURNERO_PILOT_GATE_RECOVERY_TARGETS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Reporte turnero pilot gate: ``verification/last-turnero-pilot-gate.json``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Turnero pilot gate step outcome: ``${{ steps.turnero_pilot_gate.outcome }}``"

            - name: Publicar reporte turneroPilot gate
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-turnero-pilot-gate-report
                  path: verification/last-turnero-pilot-gate.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Crear/actualizar incidente de gate
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && ((env.TELEMEDICINE_GATE_STATUS != 'degraded_only' && env.TELEMEDICINE_GATE_STATUS != 'unknown') || env.TELEMEDICINE_GATE_NON_TELE_FAILURES != '0') }}
              uses: actions/github-script@v7
              env:
                  GATE_OUTCOME: ${{ steps.gate.outcome }}
                  ADMIN_ROLLOUT_OUTCOME: ${{ steps.admin_rollout.outcome }}
                  ADMIN_ROLLOUT_STAGE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_STAGE_EFFECTIVE }}
                  ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE }}
                  ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE }}
                  ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_EFFECTIVE }}
                  ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_EFFECTIVE }}
                  ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE }}
                  ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE }}
                  ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE: ${{ env.ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE }}
                  ADMIN_OPENCLAW_LIVE_SMOKE_STATUS: ${{ env.ADMIN_OPENCLAW_LIVE_SMOKE_STATUS }}
                  ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE: ${{ env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE }}
                  PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: ${{ env.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE }}
                  POSTDEPLOY_CHANGE_CLASS: ${{ env.POSTDEPLOY_CHANGE_CLASS }}
                  POSTDEPLOY_EFFECTIVE_WAIT_SECONDS: ${{ env.POSTDEPLOY_EFFECTIVE_WAIT_SECONDS }}
                  BENCH_RUNS_EFFECTIVE: ${{ env.BENCH_RUNS_EFFECTIVE }}
                  REQUIRE_GOOGLE_CALENDAR_EFFECTIVE: ${{ env.REQUIRE_GOOGLE_CALENDAR_EFFECTIVE }}
                  TELEMEDICINE_GATE_STATUS: ${{ env.TELEMEDICINE_GATE_STATUS }}
                  TELEMEDICINE_GATE_REASON: ${{ env.TELEMEDICINE_GATE_REASON }}
                  TELEMEDICINE_GATE_FAILURES: ${{ env.TELEMEDICINE_GATE_FAILURES }}
                  TELEMEDICINE_GATE_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_GATE_NON_TELE_FAILURES }}
                  TURNERO_PILOT_GATE_STATUS: ${{ env.TURNERO_PILOT_GATE_STATUS }}
                  TURNERO_PILOT_GATE_REASON: ${{ env.TURNERO_PILOT_GATE_REASON }}
                  TURNERO_PILOT_GATE_CLINIC_ID: ${{ env.TURNERO_PILOT_GATE_CLINIC_ID }}
                  TURNERO_PILOT_GATE_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_GATE_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_GATE_STATUS_RESOLVED: ${{ env.TURNERO_PILOT_GATE_STATUS_RESOLVED }}
                  TURNERO_PILOT_GATE_VERIFY_REMOTE_REQUIRED: ${{ env.TURNERO_PILOT_GATE_VERIFY_REMOTE_REQUIRED }}
                  TURNERO_PILOT_GATE_RELEASE_MODE: ${{ env.TURNERO_PILOT_GATE_RELEASE_MODE }}
                  TURNERO_PILOT_GATE_CATALOG_READY: ${{ env.TURNERO_PILOT_GATE_CATALOG_READY }}
                  TURNERO_PILOT_GATE_REMOTE_VERIFIED: ${{ env.TURNERO_PILOT_GATE_REMOTE_VERIFIED }}
                  TURNERO_PILOT_GATE_DEPLOYED_COMMIT: ${{ env.TURNERO_PILOT_GATE_DEPLOYED_COMMIT }}
                  TURNERO_PILOT_GATE_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_GATE_RECOVERY_TARGETS }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy fallando`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Post-Deploy Gate (Git Sync)` fallo en produccion.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- gate_outcome: ${process.env.GATE_OUTCOME || 'n/a'}`,
                        `- admin_rollout_outcome: ${process.env.ADMIN_ROLLOUT_OUTCOME || 'skipped'}`,
                        `- admin_rollout_stage_effective: ${process.env.ADMIN_ROLLOUT_STAGE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_stage_profile_effective: ${process.env.ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_skip_runtime_smoke_effective: ${process.env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_require_openclaw_auth_effective: ${process.env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_require_openclaw_live_smoke_effective: ${process.env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_allow_feature_api_failure_effective: ${process.env.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_allow_missing_flag_effective: ${process.env.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_EFFECTIVE || 'n/a'}`,
                        `- admin_rollout_policy_source_effective: ${process.env.ADMIN_ROLLOUT_POLICY_SOURCE_EFFECTIVE || 'n/a'}`,
                        `- admin_openclaw_live_smoke_status: ${process.env.ADMIN_OPENCLAW_LIVE_SMOKE_STATUS || 'skipped'}`,
                        `- public_v4_rollout_monitor_effective: ${process.env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_stage_effective: ${process.env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_stage_profile_effective: ${process.env.PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_policy_source_effective: ${process.env.PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_surface_test_effective: ${process.env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_surface_control_effective: ${process.env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_min_view_booking_effective: ${process.env.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_min_start_checkout_effective: ${process.env.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_max_confirmed_drop_pp_effective: ${process.env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_min_confirmed_rate_pct_effective: ${process.env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE || 'n/a'}`,
                        `- public_v4_rollout_allow_missing_control_effective: ${process.env.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE || 'n/a'}`,
                        `- change_class: ${process.env.POSTDEPLOY_CHANGE_CLASS || 'n/a'}`,
                        `- effective_wait_seconds: ${process.env.POSTDEPLOY_EFFECTIVE_WAIT_SECONDS || 'n/a'}`,
                        `- bench_runs_effective: ${process.env.BENCH_RUNS_EFFECTIVE || 'n/a'}`,
                        `- require_google_calendar_effective: ${process.env.REQUIRE_GOOGLE_CALENDAR_EFFECTIVE || 'n/a'}`,
                        `- telemedicine_gate_status: ${process.env.TELEMEDICINE_GATE_STATUS || 'n/a'}`,
                        `- telemedicine_gate_reason: ${process.env.TELEMEDICINE_GATE_REASON || 'n/a'}`,
                        `- telemedicine_gate_failures: ${process.env.TELEMEDICINE_GATE_FAILURES || '0'}`,
                        `- telemedicine_gate_non_tele_failures: ${process.env.TELEMEDICINE_GATE_NON_TELE_FAILURES || '0'}`,
                        `- turnero_pilot_gate_status: ${process.env.TURNERO_PILOT_GATE_STATUS || 'n/a'}`,
                        `- turnero_pilot_gate_reason: ${process.env.TURNERO_PILOT_GATE_REASON || 'n/a'}`,
                        `- turnero_pilot_gate_clinic_id: ${process.env.TURNERO_PILOT_GATE_CLINIC_ID || 'n/a'}`,
                        `- turnero_pilot_gate_profile_fingerprint: ${process.env.TURNERO_PILOT_GATE_PROFILE_FINGERPRINT || 'n/a'}`,
                        `- turnero_pilot_gate_status_resolved: ${process.env.TURNERO_PILOT_GATE_STATUS_RESOLVED || 'false'}`,
                        `- turnero_pilot_gate_verify_remote_required: ${process.env.TURNERO_PILOT_GATE_VERIFY_REMOTE_REQUIRED || 'false'}`,
                        `- turnero_pilot_gate_release_mode: ${process.env.TURNERO_PILOT_GATE_RELEASE_MODE || 'n/a'}`,
                        `- turnero_pilot_gate_catalog_ready: ${process.env.TURNERO_PILOT_GATE_CATALOG_READY || 'false'}`,
                        `- turnero_pilot_gate_remote_verified: ${process.env.TURNERO_PILOT_GATE_REMOTE_VERIFIED || 'false'}`,
                        `- turnero_pilot_gate_deployed_commit: ${process.env.TURNERO_PILOT_GATE_DEPLOYED_COMMIT || 'n/a'}`,
                        `- turnero_pilot_gate_recovery_targets: ${process.env.TURNERO_PILOT_GATE_RECOVERY_TARGETS || 'n/a'}`
                      ].join('\n');

                      const diagnosticHints = [];
                      if ((process.env.POSTDEPLOY_CHANGE_CLASS || '').toLowerCase() === 'non-runtime') {
                        diagnosticHints.push(
                          'Hint: cambio clasificado como non-runtime; los contratos Node suelen omitirse y el fallo probablemente esta en gate/verify/smoke/bench.'
                        );
                      }
                      const bodyWithHints = diagnosticHints.length
                        ? `${body}\n\n${diagnosticHints.join('\n')}`
                        : body;

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: bodyWithHints
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert']
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: bodyWithHints,
                          labels: ['production-alert']
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Crear/actualizar incidente telemedicina de gate
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && (env.TELEMEDICINE_GATE_STATUS == 'degraded_only' || env.TELEMEDICINE_GATE_STATUS == 'degraded_mixed' || env.TELEMEDICINE_GATE_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_GATE_STATUS: ${{ env.TELEMEDICINE_GATE_STATUS }}
                  TELEMEDICINE_GATE_REASON: ${{ env.TELEMEDICINE_GATE_REASON }}
                  TELEMEDICINE_GATE_FAILURES: ${{ env.TELEMEDICINE_GATE_FAILURES }}
                  TELEMEDICINE_GATE_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_GATE_NON_TELE_FAILURES }}
                  REQUIRE_TELEMEDICINE_READY_EFFECTIVE: ${{ env.REQUIRE_TELEMEDICINE_READY_EFFECTIVE }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy telemedicina degradado`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const status = String(process.env.TELEMEDICINE_GATE_STATUS || 'n/a');
                      const reason = String(process.env.TELEMEDICINE_GATE_REASON || 'n/a');
                      const failures = String(process.env.TELEMEDICINE_GATE_FAILURES || '0');
                      const signal = `status:${status}|reason:${reason}|failures:${failures}|non_tele:${process.env.TELEMEDICINE_GATE_NON_TELE_FAILURES || '0'}`;
                      const signalMarker = `<!-- post-deploy-gate-telemedicine-signal:${signal} -->`;

                      const severity = (status === 'degraded_mixed' ||
                        reason.includes('diagnostics_critical') ||
                        reason.includes('health_unreachable') ||
                        reason.includes('health_missing') ||
                        reason.includes('health_parse_error') ||
                        reason.includes('verify_report_missing') ||
                        reason.includes('verify_report_unreadable'))
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'telemedicine', 'post-deploy-gate', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Post-Deploy Gate (Full Regression)` detecto degradacion en checks de telemedicina.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- telemedicine_gate_status: ${status}`,
                        `- telemedicine_gate_reason: ${reason}`,
                        `- telemedicine_gate_failures: ${failures}`,
                        `- telemedicine_gate_non_tele_failures: ${process.env.TELEMEDICINE_GATE_NON_TELE_FAILURES || '0'}`,
                        `- require_telemedicine_ready_effective: ${process.env.REQUIRE_TELEMEDICINE_READY_EFFECTIVE || 'n/a'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue telemedicina gate actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue telemedicina gate ya refleja la misma senal: #${existing.number}`);
                          return;
                        }

                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente telemedicina gate actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_gate_status: ${status}`,
                            `- telemedicine_gate_reason: ${reason}`,
                            `- telemedicine_gate_failures: ${failures}`,
                            `- telemedicine_gate_non_tele_failures: ${process.env.TELEMEDICINE_GATE_NON_TELE_FAILURES || '0'}`
                          ].join('\n')
                        });
                        core.info(`Issue telemedicina existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue telemedicina creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente de gate al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy fallando`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por gate post-deploy.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);

            - name: Cerrar incidente telemedicina de gate al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_GATE_STATUS: ${{ env.TELEMEDICINE_GATE_STATUS }}
                  TELEMEDICINE_GATE_REASON: ${{ env.TELEMEDICINE_GATE_REASON }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Gate post-deploy telemedicina degradado`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente telemedicina abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por gate post-deploy.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- telemedicine_gate_status: ${process.env.TELEMEDICINE_GATE_STATUS || 'n/a'}`,
                          `- telemedicine_gate_reason: ${process.env.TELEMEDICINE_GATE_REASON || 'n/a'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue telemedicina cerrado: #${existing.number}`);
