name: Patient Flow OS Escrow Restore

on:
    workflow_dispatch:
        inputs:
            source_run_id:
                description: 'Run id del workflow Patient Flow OS Backup Drill con el escrow packet'
                required: true
                type: string
            backup_escrow_packet_path:
                description: 'Ruta dentro del artifact fuente hacia backup-escrow-packet.json'
                required: true
                default: 'backup-escrow-packet.json'
                type: string
            source_artifact_name:
                description: 'Nombre del artifact fuente publicado por Patient Flow OS Backup Drill'
                required: true
                default: 'patient-flow-os-backup-drill-artifacts'
                type: string
            target_environment:
                description: 'Environment GitHub desde el que se leen secrets de restore drill'
                required: true
                default: 'production'
                type: choice
                options:
                    - staging
                    - production
            max_rto_seconds:
                description: 'Budget máximo permitido para el restore desde escrow'
                required: true
                default: '900'
                type: string

permissions:
    contents: read
    actions: read

concurrency:
    group: patient-flow-os-escrow-restore-${{ github.ref }}-${{ github.event.inputs.target_environment || 'production' }}
    cancel-in-progress: false

jobs:
    patient-flow-os-escrow-restore:
        runs-on: ubuntu-latest
        timeout-minutes: 45
        environment:
            name: ${{ format('patient-flow-os-{0}', github.event.inputs.target_environment || 'production') }}
        defaults:
            run:
                shell: bash
                working-directory: src/apps/patient-flow-os
        env:
            SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
            BACKUP_ESCROW_PACKET_PATH_INPUT: ${{ github.event.inputs.backup_escrow_packet_path || 'backup-escrow-packet.json' }}
            SOURCE_ARTIFACT_NAME: ${{ github.event.inputs.source_artifact_name || 'patient-flow-os-backup-drill-artifacts' }}
            TARGET_ENVIRONMENT_INPUT: ${{ github.event.inputs.target_environment || 'production' }}
            MAX_RTO_SECONDS_INPUT: ${{ github.event.inputs.max_rto_seconds || '900' }}
            DRILL_DATABASE_URL: ${{ secrets.PATIENT_FLOW_OS_DRILL_DATABASE_URL }}
            BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.PATIENT_FLOW_OS_BACKUP_ENCRYPTION_PASSPHRASE }}
            AWS_ACCESS_KEY_ID: ${{ secrets.PATIENT_FLOW_OS_BACKUP_ESCROW_AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.PATIENT_FLOW_OS_BACKUP_ESCROW_AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION: ${{ secrets.PATIENT_FLOW_OS_BACKUP_ESCROW_AWS_REGION }}
            SOURCE_DOWNLOAD_ROOT: ${{ github.workspace }}/verification/patient-flow-os-escrow-restore-source
            PREPARED_ARTIFACT_ROOT: ${{ github.workspace }}/verification/patient-flow-os-escrow-restore
            RESTORE_WORK_ROOT: ${{ github.workspace }}/.tmp/patient-flow-os-escrow-restore
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: pre-check
              run: |
                  set -euo pipefail

                  if [ -z "${SOURCE_RUN_ID}" ]; then
                    echo "::error::source_run_id es obligatorio."
                    exit 1
                  fi
                  if [ -z "${DRILL_DATABASE_URL}" ]; then
                    echo "::error::Falta el secret PATIENT_FLOW_OS_DRILL_DATABASE_URL."
                    exit 1
                  fi
                  if [ -z "${BACKUP_ENCRYPTION_PASSPHRASE}" ]; then
                    echo "::error::Falta el secret PATIENT_FLOW_OS_BACKUP_ENCRYPTION_PASSPHRASE."
                    exit 1
                  fi
                  if [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ] || [ -z "${AWS_DEFAULT_REGION}" ]; then
                    echo "::error::Faltan secrets de AWS para descargar desde escrow."
                    exit 1
                  fi
                  case "${MAX_RTO_SECONDS_INPUT}" in
                    ''|*[!0-9]*)
                      echo "::error::max_rto_seconds debe ser entero positivo."
                      exit 1
                      ;;
                  esac

                  mkdir -p "${SOURCE_DOWNLOAD_ROOT}"
                  mkdir -p "${PREPARED_ARTIFACT_ROOT}"
                  mkdir -p "${RESTORE_WORK_ROOT}"

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: src/apps/patient-flow-os/package-lock.json

            - name: Instalar dependencias
              run: npm ci

            - name: Build Patient Flow OS
              run: npm run build

            - name: Instalar postgresql-client, gnupg y awscli
              run: |
                  sudo apt-get update
                  sudo apt-get install -y postgresql-client gnupg awscli

            - name: Descargar artifacts fuente de backup drill
              uses: actions/download-artifact@v4
              with:
                  name: ${{ env.SOURCE_ARTIFACT_NAME }}
                  path: verification/patient-flow-os-escrow-restore-source
                  repository: ${{ github.repository }}
                  run-id: ${{ github.event.inputs.source_run_id }}
                  github-token: ${{ github.token }}

            - name: Localizar evidencia fuente de escrow
              id: locate
              run: |
                  set -euo pipefail

                  PACKET_NAME="$(basename "${BACKUP_ESCROW_PACKET_PATH_INPUT}")"
                  BACKUP_ESCROW_PACKET_PATH="$(find "${SOURCE_DOWNLOAD_ROOT}" -path "*${BACKUP_ESCROW_PACKET_PATH_INPUT}" -o -name "${PACKET_NAME}" | head -n 1)"
                  BACKUP_DRILL_PACKET_PATH="$(find "${SOURCE_DOWNLOAD_ROOT}" -name backup-drill-packet.json | head -n 1)"
                  SOURCE_SMOKE_PATH="$(find "${SOURCE_DOWNLOAD_ROOT}" -name source-smoke.json | head -n 1)"
                  SOURCE_INSPECT_PATH="$(find "${SOURCE_DOWNLOAD_ROOT}" -name source-inspect.json | head -n 1)"
                  BACKUP_ESCROW_CHECKLIST_PATH="$(find "${SOURCE_DOWNLOAD_ROOT}" -name backup-escrow-checklist.json | head -n 1)"

                  for required_path in \
                    "${BACKUP_ESCROW_PACKET_PATH}" \
                    "${BACKUP_DRILL_PACKET_PATH}" \
                    "${SOURCE_SMOKE_PATH}" \
                    "${SOURCE_INSPECT_PATH}" \
                    "${BACKUP_ESCROW_CHECKLIST_PATH}"; do
                    if [ -z "${required_path}" ]; then
                      echo "::error::Falta evidencia fuente requerida para restore desde escrow."
                      exit 1
                    fi
                  done

                  echo "backup_escrow_packet_path=${BACKUP_ESCROW_PACKET_PATH}" >> "${GITHUB_OUTPUT}"
                  echo "backup_drill_packet_path=${BACKUP_DRILL_PACKET_PATH}" >> "${GITHUB_OUTPUT}"
                  echo "source_smoke_path=${SOURCE_SMOKE_PATH}" >> "${GITHUB_OUTPUT}"
                  echo "source_inspect_path=${SOURCE_INSPECT_PATH}" >> "${GITHUB_OUTPUT}"
                  echo "backup_escrow_checklist_path=${BACKUP_ESCROW_CHECKLIST_PATH}" >> "${GITHUB_OUTPUT}"

            - name: Verificar backup escrow packet fuente
              run: |
                  set -euo pipefail
                  npm run cutover -- verify-backup-escrow \
                    --input "${{ steps.locate.outputs.backup_escrow_packet_path }}" \
                    --source-environment "${TARGET_ENVIRONMENT_INPUT}" \
                    --max-object-age-hours 168 \
                    --json \
                    > "${PREPARED_ARTIFACT_ROOT}/source-backup-escrow-verification.json"

            - name: Preparar evidencia fuente de restore
              run: |
                  set -euo pipefail
                  cp "${{ steps.locate.outputs.backup_escrow_packet_path }}" "${PREPARED_ARTIFACT_ROOT}/source-backup-escrow-packet.json"
                  cp "${{ steps.locate.outputs.backup_drill_packet_path }}" "${PREPARED_ARTIFACT_ROOT}/source-backup-drill-packet.json"
                  cp "${{ steps.locate.outputs.source_smoke_path }}" "${PREPARED_ARTIFACT_ROOT}/source-smoke.json"
                  cp "${{ steps.locate.outputs.source_inspect_path }}" "${PREPARED_ARTIFACT_ROOT}/source-inspect.json"
                  cp "${{ steps.locate.outputs.backup_escrow_checklist_path }}" "${PREPARED_ARTIFACT_ROOT}/source-backup-escrow-checklist.json"

            - name: Descargar objeto desde escrow y descifrar dump
              run: |
                  set -euo pipefail

                  readarray -t ESCROW_VALUES < <(
                    node - <<'NODE'
                    const fs = require('fs');
                    const packet = JSON.parse(fs.readFileSync(process.env.BACKUP_ESCROW_PACKET_PATH, 'utf8'));
                    const values = [
                      packet?.escrowObject?.bucket || '',
                      packet?.escrowObject?.key || '',
                      packet?.evidence?.encryptedDumpSha256 || ''
                    ];
                    process.stdout.write(`${values.join('\n')}\n`);
                    NODE
                  )
                  ESCROW_BUCKET="${ESCROW_VALUES[0]}"
                  ESCROW_KEY="${ESCROW_VALUES[1]}"
                  SOURCE_ENCRYPTED_DUMP_SHA256="${ESCROW_VALUES[2]}"

                  if [ -z "${ESCROW_BUCKET}" ] || [ -z "${ESCROW_KEY}" ] || [ -z "${SOURCE_ENCRYPTED_DUMP_SHA256}" ]; then
                    echo "::error::El backup escrow packet no trae bucket/key/checksum."
                    exit 1
                  fi

                  DOWNLOADED_ENCRYPTED_DUMP_PATH="${RESTORE_WORK_ROOT}/downloaded-patient-flow-os.dump.gpg"
                  DOWNLOADED_ENCRYPTED_DUMP_SHA_PATH="${PREPARED_ARTIFACT_ROOT}/downloaded-patient-flow-os.dump.gpg.sha256"
                  DECRYPTED_DUMP_PATH="${RESTORE_WORK_ROOT}/restored-patient-flow-os.dump"
                  DECRYPTED_DUMP_SHA_PATH="${PREPARED_ARTIFACT_ROOT}/restored-patient-flow-os.dump.sha256"
                  DOWNLOAD_STARTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"

                  aws s3api get-object \
                    --bucket "${ESCROW_BUCKET}" \
                    --key "${ESCROW_KEY}" \
                    "${DOWNLOADED_ENCRYPTED_DUMP_PATH}" \
                    > "${PREPARED_ARTIFACT_ROOT}/escrow-get-object-response.json"

                  DOWNLOAD_FINISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
                  sha256sum "${DOWNLOADED_ENCRYPTED_DUMP_PATH}" > "${DOWNLOADED_ENCRYPTED_DUMP_SHA_PATH}"

                  DECRYPT_STARTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
                  gpg \
                    --batch \
                    --yes \
                    --pinentry-mode loopback \
                    --passphrase "${BACKUP_ENCRYPTION_PASSPHRASE}" \
                    --output "${DECRYPTED_DUMP_PATH}" \
                    --decrypt "${DOWNLOADED_ENCRYPTED_DUMP_PATH}"
                  DECRYPT_FINISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
                  sha256sum "${DECRYPTED_DUMP_PATH}" > "${DECRYPTED_DUMP_SHA_PATH}"

                  {
                    echo "BACKUP_ESCROW_PACKET_PATH=${{ steps.locate.outputs.backup_escrow_packet_path }}"
                    echo "DOWNLOAD_STARTED_AT=${DOWNLOAD_STARTED_AT}"
                    echo "DOWNLOAD_FINISHED_AT=${DOWNLOAD_FINISHED_AT}"
                    echo "DECRYPT_STARTED_AT=${DECRYPT_STARTED_AT}"
                    echo "DECRYPT_FINISHED_AT=${DECRYPT_FINISHED_AT}"
                    echo "DOWNLOADED_ENCRYPTED_DUMP_PATH=${DOWNLOADED_ENCRYPTED_DUMP_PATH}"
                    echo "DOWNLOADED_ENCRYPTED_DUMP_SHA_PATH=${DOWNLOADED_ENCRYPTED_DUMP_SHA_PATH}"
                    echo "DECRYPTED_DUMP_PATH=${DECRYPTED_DUMP_PATH}"
                    echo "DECRYPTED_DUMP_SHA_PATH=${DECRYPTED_DUMP_SHA_PATH}"
                    echo "ESCROW_BUCKET=${ESCROW_BUCKET}"
                    echo "ESCROW_KEY=${ESCROW_KEY}"
                    echo "SOURCE_ENCRYPTED_DUMP_SHA256=${SOURCE_ENCRYPTED_DUMP_SHA256}"
                  } >> "${GITHUB_ENV}"

            - name: Resetear drill database y restaurar dump descifrado
              run: |
                  set -euo pipefail

                  psql "${DRILL_DATABASE_URL}" -v ON_ERROR_STOP=1 -c "DROP SCHEMA IF EXISTS public CASCADE;"
                  psql "${DRILL_DATABASE_URL}" -v ON_ERROR_STOP=1 -c "CREATE SCHEMA public;"

                  RESTORE_STARTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
                  pg_restore \
                    --no-owner \
                    --no-privileges \
                    --dbname "${DRILL_DATABASE_URL}" \
                    "${DECRYPTED_DUMP_PATH}"
                  RESTORE_FINISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"

                  {
                    echo "RESTORE_STARTED_AT=${RESTORE_STARTED_AT}"
                    echo "RESTORE_FINISHED_AT=${RESTORE_FINISHED_AT}"
                  } >> "${GITHUB_ENV}"

            - name: Smoke e inspect del restored drill database
              run: |
                  set -euo pipefail
                  DATABASE_URL="${DRILL_DATABASE_URL}" npm run cutover -- smoke --json > "${PREPARED_ARTIFACT_ROOT}/restore-smoke.json"
                  DATABASE_URL="${DRILL_DATABASE_URL}" npm run cutover -- inspect --json > "${PREPARED_ARTIFACT_ROOT}/restore-inspect.json"

            - name: Escribir manifest de escrow restore
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const path = require('path');

                  const artifactRoot = process.env.PREPARED_ARTIFACT_ROOT;
                  const manifest = {
                    generatedAt: new Date().toISOString(),
                    sourceEnvironment: process.env.TARGET_ENVIRONMENT_INPUT || 'production',
                    restoreTarget: 'drill',
                    escrowProvider: 'aws_s3',
                    archiveDestination: 'aws_s3_encrypted',
                    backupEscrowPacketPath: path.join(artifactRoot, 'source-backup-escrow-packet.json'),
                    sourceSmokePath: path.join(artifactRoot, 'source-smoke.json'),
                    sourceInspectPath: path.join(artifactRoot, 'source-inspect.json'),
                    downloadedEncryptedDumpPath: process.env.DOWNLOADED_ENCRYPTED_DUMP_PATH,
                    downloadedEncryptedDumpSha256Path: process.env.DOWNLOADED_ENCRYPTED_DUMP_SHA_PATH,
                    decryptedDumpPath: process.env.DECRYPTED_DUMP_PATH,
                    decryptedDumpSha256Path: process.env.DECRYPTED_DUMP_SHA_PATH,
                    restoreSmokePath: path.join(artifactRoot, 'restore-smoke.json'),
                    restoreInspectPath: path.join(artifactRoot, 'restore-inspect.json'),
                    downloadStartedAt: process.env.DOWNLOAD_STARTED_AT,
                    downloadFinishedAt: process.env.DOWNLOAD_FINISHED_AT,
                    decryptStartedAt: process.env.DECRYPT_STARTED_AT,
                    decryptFinishedAt: process.env.DECRYPT_FINISHED_AT,
                    restoreStartedAt: process.env.RESTORE_STARTED_AT,
                    restoreFinishedAt: process.env.RESTORE_FINISHED_AT
                  };
                  fs.writeFileSync(
                    path.join(artifactRoot, 'backup-escrow-restore-manifest.json'),
                    `${JSON.stringify(manifest, null, 2)}\n`
                  );
                  NODE

            - name: Construir backup escrow restore packet
              run: |
                  set -euo pipefail
                  npm run cutover -- backup-escrow-restore-packet \
                    --input "${PREPARED_ARTIFACT_ROOT}/backup-escrow-restore-manifest.json" \
                    --artifacts-dir "${PREPARED_ARTIFACT_ROOT}" \
                    --source-environment "${TARGET_ENVIRONMENT_INPUT}" \
                    --max-rto-seconds "${MAX_RTO_SECONDS_INPUT}" \
                    --label "patient-flow-os-${TARGET_ENVIRONMENT_INPUT}-backup-escrow-restore" \
                    --json \
                    > "${PREPARED_ARTIFACT_ROOT}/backup-escrow-restore-packet-command.json"

            - name: Verificar backup escrow restore packet
              run: |
                  set -euo pipefail
                  npm run cutover -- verify-backup-escrow-restore \
                    --input "${PREPARED_ARTIFACT_ROOT}/backup-escrow-restore-packet.json" \
                    --source-environment "${TARGET_ENVIRONMENT_INPUT}" \
                    --max-rto-seconds "${MAX_RTO_SECONDS_INPUT}" \
                    --json \
                    > "${PREPARED_ARTIFACT_ROOT}/backup-escrow-restore-verification.json"

            - name: Publicar artifacts de escrow restore
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: patient-flow-os-escrow-restore-artifacts
                  path: verification/patient-flow-os-escrow-restore/
                  if-no-files-found: warn
                  retention-days: 14

            - name: Resumen de escrow restore
              if: ${{ always() }}
              env:
                  PACKET_JSON: ${{ env.PREPARED_ARTIFACT_ROOT }}/backup-escrow-restore-packet.json
                  VERIFICATION_JSON: ${{ env.PREPARED_ARTIFACT_ROOT }}/backup-escrow-restore-verification.json
              run: |
                  node - <<'NODE'
                  const fs = require('fs');

                  const lines = ['## Patient Flow OS Escrow Restore', ''];
                  lines.push(`- Source run id: \`${process.env.SOURCE_RUN_ID}\``);
                  lines.push(`- Target environment: \`patient-flow-os-${process.env.TARGET_ENVIRONMENT_INPUT || 'production'}\``);
                  lines.push(`- Restore target: \`drill\``);
                  lines.push(`- RTO budget: \`${process.env.MAX_RTO_SECONDS_INPUT || '900'}s\``);

                  if (process.env.PACKET_JSON && fs.existsSync(process.env.PACKET_JSON)) {
                    const packet = JSON.parse(fs.readFileSync(process.env.PACKET_JSON, 'utf8'));
                    lines.push(`- Escrow restore ready: \`${packet.ok === true ? 'yes' : 'no'}\``);
                    lines.push(`- Escrow bucket: \`${packet?.escrowObject?.bucket || 'n/a'}\``);
                    lines.push(`- Escrow key: \`${packet?.escrowObject?.key || 'n/a'}\``);
                    lines.push(`- Downloaded dump checksum matches escrow: \`${packet?.summary?.downloadedDumpMatchesEscrowChecksum === true ? 'yes' : 'no'}\``);
                    lines.push(`- Decrypted dump checksum matches source: \`${packet?.summary?.decryptedDumpMatchesSourceDumpChecksum === true ? 'yes' : 'no'}\``);
                    lines.push(`- Restore smoke ok: \`${packet?.summary?.restoreSmokeOk === true ? 'yes' : 'no'}\``);
                    lines.push(`- Totals match: \`${packet?.summary?.totalsMatch === true ? 'yes' : 'no'}\``);
                    lines.push(`- Measured RTO: \`${packet?.summary?.measuredRtoSeconds ?? 'n/a'}s\``);
                  }

                  if (process.env.VERIFICATION_JSON && fs.existsSync(process.env.VERIFICATION_JSON)) {
                    const verification = JSON.parse(fs.readFileSync(process.env.VERIFICATION_JSON, 'utf8'));
                    lines.push(`- Escrow restore verification: \`${verification?.backupEscrowRestoreVerification?.ok === true ? 'passed' : 'failed'}\``);
                  }

                  lines.push('- Escrow restore artifact set: `source-backup-escrow-packet.json`, `source-backup-drill-packet.json`, `source-smoke.json`, `source-inspect.json`, `source-backup-escrow-checklist.json`, `source-backup-escrow-verification.json`, `downloaded-patient-flow-os.dump.gpg.sha256`, `restored-patient-flow-os.dump.sha256`, `escrow-get-object-response.json`, `restore-smoke.json`, `restore-inspect.json`, `backup-escrow-restore-manifest.json`, `backup-escrow-restore-packet.json`, `backup-escrow-restore-packet.md`, `backup-escrow-restore-checklist.json`, `backup-escrow-restore-checklist.md`, `backup-escrow-restore-verification.json`');
                  lines.push(`- Artifact: \`patient-flow-os-escrow-restore-artifacts\``);
                  fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
                  NODE
