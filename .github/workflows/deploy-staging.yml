name: Deploy Staging (FTP/FTPS)

on:
    push:
        branches:
            - staging
    workflow_dispatch:
        inputs:
            protocol:
                description: 'Protocolo de deploy'
                required: false
                default: 'ftps'
                type: choice
                options:
                    - ftps
                    - ftp
            server_port:
                description: 'Puerto remoto (21 FTP/FTPS, 22 SFTP)'
                required: false
                default: '21'
                type: string
            security:
                description: 'Validacion TLS para FTPS'
                required: false
                default: 'strict'
                type: choice
                options:
                    - strict
                    - loose
            server_dir:
                description: 'Directorio remoto en hosting'
                required: false
                default: '/staging/'
                type: string
            dry_run:
                description: 'Simular deploy sin subir archivos'
                required: false
                default: false
                type: boolean
            clean_slate:
                description: 'Eliminar archivos remotos no presentes (peligroso)'
                required: false
                default: false
                type: boolean

concurrency:
    group: deploy-pielarmonia-staging
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    deploy:
        name: Deploy a staging
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            FTP_PROTOCOL: ${{ github.event.inputs.protocol || vars.STAGING_FTP_PROTOCOL || 'ftps' }}
            FTP_SERVER_PORT: ${{ github.event.inputs.server_port || vars.STAGING_FTP_SERVER_PORT || '21' }}
            FTP_SECURITY: ${{ github.event.inputs.security || vars.STAGING_FTP_SECURITY || 'strict' }}
            FTP_SERVER_DIR: ${{ github.event.inputs.server_dir || vars.STAGING_FTP_SERVER_DIR || '/staging/' }}
            FTP_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
            FTP_CLEAN_SLATE: ${{ github.event.inputs.clean_slate || 'false' }}
            PROD_URL: ${{ vars.STAGING_URL || 'https://staging.pielarmonia.com' }}
            TELEMEDICINE_STAGING_STATUS: unknown
            TELEMEDICINE_STAGING_REASON: not_evaluated
            TELEMEDICINE_STAGING_FAILURES: -1
            TELEMEDICINE_STAGING_NON_TELE_FAILURES: -1

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node Dependencies
              run: npm ci

            - name: Prepare canonical deploy bundle
              shell: bash
              run: |
                  set -euo pipefail
                  rm -rf _deploy_bundle
                  mkdir -p _deploy_bundle
                  node bin/prepare-deploy-bundle.js --include-tooling --skip-build --output-dir _deploy_bundle --json > _deploy_bundle/deploy-bundle.json
                  stage_dir="$(node <<'NODE'
                  const fs = require('node:fs');
                  const path = require('node:path');
                  const bundle = JSON.parse(fs.readFileSync('_deploy_bundle/deploy-bundle.json', 'utf8'));
                  process.stdout.write(path.relative(process.cwd(), bundle.stageRoot).replace(/\\/g, '/'));
                  NODE
                  )"
                  echo "DEPLOY_STAGE_DIR=${stage_dir}" >> "$GITHUB_ENV"

            - name: Install Playwright (chromium) for acceptance gate
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              run: npx playwright install --with-deps chromium

            - name: Validar secretos requeridos
              id: validate_secrets_staging
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${{ secrets.STAGING_FTP_SERVER }}" ]; then
                    echo "::error::Falta el secret STAGING_FTP_SERVER"
                    exit 1
                  fi
                  if [ -z "${{ secrets.STAGING_FTP_USERNAME }}" ]; then
                    echo "::error::Falta el secret STAGING_FTP_USERNAME"
                    exit 1
                  fi
                  if [ -z "${{ secrets.STAGING_FTP_PASSWORD }}" ]; then
                    echo "::error::Falta el secret STAGING_FTP_PASSWORD"
                    exit 1
                  fi

            - name: Preflight red (control socket)
              id: preflight_staging
              shell: bash
              run: |
                  set -euo pipefail
                  HOST="${{ secrets.STAGING_FTP_SERVER }}"
                  PORT="${FTP_SERVER_PORT}"
                  echo "Testeando conectividad TCP a ${HOST}:${PORT} ..."
                  if timeout 8 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
                    echo "TCP OK en ${HOST}:${PORT}"
                  else
                    echo "::error::No se puede abrir ${HOST}:${PORT} desde GitHub Runner (timeout/control socket)."
                    echo "::error::Verifica puerto/protocolo correctos y firewall del hosting (allowlist para GitHub Actions)."
                    exit 1
                  fi

            - name: Deploy por FTP/FTPS
              id: deploy_staging_ftp
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.STAGING_FTP_SERVER }}
                  username: ${{ secrets.STAGING_FTP_USERNAME }}
                  password: ${{ secrets.STAGING_FTP_PASSWORD }}
                  protocol: ${{ env.FTP_PROTOCOL }}
                  port: ${{ env.FTP_SERVER_PORT }}
                  security: ${{ env.FTP_SECURITY }}
                  server-dir: ${{ env.FTP_SERVER_DIR }}
                  local-dir: ./${{ env.DEPLOY_STAGE_DIR }}/
                  dangerous-clean-slate: ${{ env.FTP_CLEAN_SLATE }}
                  dry-run: ${{ env.FTP_DRY_RUN }}
                  timeout: 120000
                  log-level: verbose
                  state-name: .ftp-deploy-sync-state.json

            - name: Smoke rapido de endpoints publicos
              id: smoke_staging
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  curl -fsS "${PROD_URL}/api.php?resource=health" > /tmp/health.json
                  curl -fsS "${PROD_URL}/figo-chat.php" > /tmp/figo.json
                  curl -IfsS "${PROD_URL}/" > /tmp/home_headers.txt
                  echo "Health:"
                  head -c 300 /tmp/health.json
                  echo
                  echo "Figo:"
                  head -c 300 /tmp/figo.json
                  echo

            - name: Evaluar estado telemedicina deploy-staging
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              id: telemedicine_staging
              shell: bash
              env:
                  HEALTH_FILE: /tmp/health.json
                  VALIDATE_SECRETS_OUTCOME: ${{ steps.validate_secrets_staging.outcome }}
                  PREFLIGHT_OUTCOME: ${{ steps.preflight_staging.outcome }}
                  DEPLOY_STAGING_OUTCOME: ${{ steps.deploy_staging_ftp.outcome }}
                  SMOKE_STAGING_OUTCOME: ${{ steps.smoke_staging.outcome }}
              run: |
                  set -euo pipefail
                  if [ ! -s "${HEALTH_FILE}" ]; then
                    if ! curl -fsS "${PROD_URL}/api.php?resource=health" > "${HEALTH_FILE}"; then
                      echo "No se pudo refrescar health; se reporta estado telemedicina unknown."
                    fi
                  fi
                  node <<'NODE'
                  const fs = require('node:fs');

                  const healthPath = process.env.HEALTH_FILE || '/tmp/health.json';
                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function countNonTeleFailures(outcomes) {
                    return outcomes.reduce((count, value) => {
                      if (!value) return count;
                      const normalized = String(value).trim().toLowerCase();
                      if (!normalized || normalized === 'success' || normalized === 'skipped' || normalized === 'n/a') {
                        return count;
                      }
                      return count + 1;
                    }, 0);
                  }

                  function publish(snapshot) {
                    append(outputPath, 'telemedicine_status', snapshot.status);
                    append(outputPath, 'telemedicine_reason', snapshot.reason);
                    append(outputPath, 'telemedicine_failures', snapshot.failures);
                    append(outputPath, 'telemedicine_non_tele_failures', snapshot.nonTeleFailures);
                    append(outputPath, 'telemedicine_configured', snapshot.configured);
                    append(outputPath, 'telemedicine_diagnostics_status', snapshot.diagnosticsStatus);
                    append(outputPath, 'telemedicine_hard_failures', snapshot.hardFailures);

                    append(envPath, 'TELEMEDICINE_STAGING_STATUS', snapshot.status);
                    append(envPath, 'TELEMEDICINE_STAGING_REASON', snapshot.reason);
                    append(envPath, 'TELEMEDICINE_STAGING_FAILURES', snapshot.failures);
                    append(
                      envPath,
                      'TELEMEDICINE_STAGING_NON_TELE_FAILURES',
                      snapshot.nonTeleFailures
                    );
                  }

                  const fallback = {
                    status: 'unknown',
                    reason: 'health_unavailable',
                    failures: '-1',
                    nonTeleFailures: String(
                      countNonTeleFailures([
                        process.env.VALIDATE_SECRETS_OUTCOME,
                        process.env.PREFLIGHT_OUTCOME,
                        process.env.DEPLOY_STAGING_OUTCOME,
                        process.env.SMOKE_STAGING_OUTCOME,
                      ])
                    ),
                    configured: 'false',
                    diagnosticsStatus: 'unknown',
                    hardFailures: '-1',
                  };

                  try {
                    if (!fs.existsSync(healthPath)) {
                      publish(fallback);
                      process.exit(0);
                    }

                    const raw = fs.readFileSync(healthPath, 'utf8');
                    const parsed = JSON.parse(raw);
                    const telemedicine = parsed?.checks?.telemedicine;
                    if (!telemedicine || typeof telemedicine !== 'object') {
                      publish({ ...fallback, reason: 'telemedicine_missing' });
                      process.exit(0);
                    }

                    const configured = telemedicine?.configured === true;
                    const diagnosticsStatus = String(
                      telemedicine?.diagnostics?.status || 'unknown'
                    );
                    const hardFailuresRaw = Number(telemedicine?.integrity?.hardFailures ?? 0);
                    const hardFailures = Number.isFinite(hardFailuresRaw)
                      ? Math.max(0, Math.trunc(hardFailuresRaw))
                      : -1;

                    const reasons = [];
                    let failures = 0;
                    if (!configured) {
                      reasons.push('not_configured');
                      failures += 1;
                    }
                    if (diagnosticsStatus === 'critical') {
                      reasons.push('diagnostics_critical');
                      failures += 1;
                    }
                    if (hardFailures < 0) {
                      reasons.push('hard_failures_invalid');
                      failures += 1;
                    } else if (hardFailures > 0) {
                      reasons.push(`hard_failures:${hardFailures}`);
                      failures += hardFailures;
                    }

                    const degraded = reasons.length > 0;
                    const status = degraded ? 'degraded' : 'healthy';
                    const reason = degraded ? reasons.join(';') : 'ok';
                    publish({
                      status,
                      reason,
                      failures: String(failures),
                      nonTeleFailures: String(
                        countNonTeleFailures([
                          process.env.VALIDATE_SECRETS_OUTCOME,
                          process.env.PREFLIGHT_OUTCOME,
                          process.env.DEPLOY_STAGING_OUTCOME,
                          process.env.SMOKE_STAGING_OUTCOME,
                        ])
                      ),
                      configured: configured ? 'true' : 'false',
                      diagnosticsStatus,
                      hardFailures: String(hardFailures),
                    });
                  } catch (error) {
                    publish({
                      ...fallback,
                      reason: `health_parse_error:${error && error.name ? error.name : 'unknown'}`,
                    });
                  }
                  NODE

            - name: Validar routing publico ES/EN + redirects (staging)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .staging-acceptance
                  node bin/check-public-routing-smoke.js --base-url "${PROD_URL}" --label "staging" --output ".staging-acceptance/routing-smoke.json"

            - name: Validar conversion publica ES/EN (staging)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .staging-acceptance
                  node bin/check-public-conversion-smoke.js --base-url "${PROD_URL}" --label "staging-conversion" --output ".staging-acceptance/conversion-smoke.json"

            - name: Gate de aceptacion publica staging (visual + funcional + performance)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/run-staging-acceptance-gate.js --base-url "${PROD_URL}" --label "staging" --out-dir ".staging-acceptance"

            - name: Upload staging acceptance evidence
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: staging-acceptance-evidence
                  path: .staging-acceptance/
                  if-no-files-found: warn
                  retention-days: 14

            - name: Crear/actualizar incidente telemedicina deploy-staging
              if: ${{ always() && env.FTP_DRY_RUN != 'true' && github.event_name != 'workflow_dispatch' && (env.TELEMEDICINE_STAGING_STATUS == 'degraded' || env.TELEMEDICINE_STAGING_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Staging telemedicina degradada';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `status:${process.env.TELEMEDICINE_STAGING_STATUS || 'unknown'}|reason:${process.env.TELEMEDICINE_STAGING_REASON || 'unknown'}|failures:${process.env.TELEMEDICINE_STAGING_FAILURES || '-1'}|non_tele:${process.env.TELEMEDICINE_STAGING_NON_TELE_FAILURES || '-1'}`;
                      const signalMarker = `<!-- deploy-staging-telemedicine-signal:${signal} -->`;
                      const reason = String(process.env.TELEMEDICINE_STAGING_REASON || '');
                      const severity = (
                        reason.includes('diagnostics_critical') ||
                        reason.includes('hard_failures:') ||
                        reason.includes('hard_failures_invalid') ||
                        reason.includes('health_unavailable') ||
                        reason.includes('health_parse_error') ||
                        reason.includes('telemedicine_missing') ||
                        reason.includes('not_configured')
                      )
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'deploy-staging', 'telemedicine', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const incidentBody = [
                        'El workflow `Deploy Staging (FTP/FTPS)` detecto degradacion telemedicina post-deploy.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- telemedicine_staging_status: ${process.env.TELEMEDICINE_STAGING_STATUS || 'unknown'}`,
                        `- telemedicine_staging_reason: ${process.env.TELEMEDICINE_STAGING_REASON || 'unknown'}`,
                        `- telemedicine_staging_failures: ${process.env.TELEMEDICINE_STAGING_FAILURES || '-1'}`,
                        `- telemedicine_staging_non_tele_failures: ${process.env.TELEMEDICINE_STAGING_NON_TELE_FAILURES || '-1'}`,
                        `- staging_url: ${process.env.PROD_URL || 'https://staging.pielarmonia.com'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue deploy-staging telemedicina actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue deploy-staging telemedicina ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente deploy-staging telemedicina actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_staging_status: ${process.env.TELEMEDICINE_STAGING_STATUS || 'unknown'}`,
                            `- telemedicine_staging_reason: ${process.env.TELEMEDICINE_STAGING_REASON || 'unknown'}`,
                            `- telemedicine_staging_failures: ${process.env.TELEMEDICINE_STAGING_FAILURES || '-1'}`,
                            `- telemedicine_staging_non_tele_failures: ${process.env.TELEMEDICINE_STAGING_NON_TELE_FAILURES || '-1'}`
                          ].join('\n')
                        });
                        core.info(`Issue deploy-staging telemedicina actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: incidentBody,
                          labels: baseLabels
                        });
                        core.info(`Issue deploy-staging telemedicina creado: #${created.data.number}`);
                      }
              env:
                  TELEMEDICINE_STAGING_STATUS: ${{ env.TELEMEDICINE_STAGING_STATUS }}
                  TELEMEDICINE_STAGING_REASON: ${{ env.TELEMEDICINE_STAGING_REASON }}
                  TELEMEDICINE_STAGING_FAILURES: ${{ env.TELEMEDICINE_STAGING_FAILURES }}
                  TELEMEDICINE_STAGING_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_STAGING_NON_TELE_FAILURES }}

            - name: Cerrar incidente telemedicina deploy-staging al recuperar
              if: ${{ success() && env.FTP_DRY_RUN != 'true' && github.event_name != 'workflow_dispatch' && env.TELEMEDICINE_STAGING_STATUS == 'healthy' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Staging telemedicina degradada';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente deploy-staging telemedicina abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por deploy-staging.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- telemedicine_staging_status: ${process.env.TELEMEDICINE_STAGING_STATUS || 'healthy'}`,
                          `- telemedicine_staging_reason: ${process.env.TELEMEDICINE_STAGING_REASON || 'ok'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue deploy-staging telemedicina cerrado: #${existing.number}`);
              env:
                  TELEMEDICINE_STAGING_STATUS: ${{ env.TELEMEDICINE_STAGING_STATUS }}
                  TELEMEDICINE_STAGING_REASON: ${{ env.TELEMEDICINE_STAGING_REASON }}

            - name: Staging summary
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  {
                    echo "## Staging acceptance";
                    echo "- approval_contract: \`routing_smoke + conversion_smoke + staging_acceptance_gate + artifact:staging-acceptance-evidence\`";
                    echo "- routing_smoke_report: \`.staging-acceptance/routing-smoke.json\`";
                    echo "- conversion_smoke_report: \`.staging-acceptance/conversion-smoke.json\`";
                    echo "- manual_checklist: \`.staging-acceptance/*/staging-manual-checklist.md\`";
                    echo "- artifact: \`staging-acceptance-evidence\`";
                    echo "- telemedicine_staging_status: \`${TELEMEDICINE_STAGING_STATUS}\`";
                    echo "- telemedicine_staging_reason: \`${TELEMEDICINE_STAGING_REASON}\`";
                    echo "- telemedicine_staging_failures: \`${TELEMEDICINE_STAGING_FAILURES}\`";
                    echo "- telemedicine_staging_non_tele_failures: \`${TELEMEDICINE_STAGING_NON_TELE_FAILURES}\`";
                    echo "- telemedicine_staging_step_outcome: \`${{ steps.telemedicine_staging.outcome }}\`";
                    echo "- result: \`${{ job.status }}\`";
                  } >> "$GITHUB_STEP_SUMMARY"
