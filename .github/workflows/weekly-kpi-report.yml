name: Weekly KPI Report

on:
    schedule:
        - cron: '0 14 * * 1'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            bench_runs:
                description: 'Muestras por endpoint para benchmark'
                required: false
                default: '15'
                type: string
            fail_on_warnings:
                description: 'Fallar workflow si hay warnings criticos de KPI'
                required: false
                default: true
                type: boolean
            fail_on_invalid_thresholds:
                description: 'Fallar workflow si detecta umbrales invalidos y aplica defaults/clamp'
                required: false
                default: false
                type: boolean
            retention_days:
                description: 'Ventana de dias para retention-report'
                required: false
                default: '30'
                type: string
            no_show_warn_pct:
                description: 'Umbral no-show (%)'
                required: false
                default: '20'
                type: string
            recurrence_min_warn_pct:
                description: 'Umbral minimo recurrencia (%)'
                required: false
                default: '30'
                type: string
            recurrence_drop_warn_pct:
                description: 'Umbral de caida de recurrencia (pp)'
                required: false
                default: '15'
                type: string
            recurrence_min_unique_patients:
                description: 'Muestra minima para alertar recurrencia'
                required: false
                default: '5'
                type: string
            idempotency_conflict_warn_pct:
                description: 'Umbral conflicto idempotencia (%)'
                required: false
                default: '5'
                type: string
            conversion_min_warn_pct:
                description: 'Umbral minimo conversion booking_confirmed (%)'
                required: false
                default: '25'
                type: string
            conversion_drop_warn_pct:
                description: 'Umbral de caida de conversion (pp)'
                required: false
                default: '15'
                type: string
            conversion_min_start_checkout:
                description: 'Muestra minima start_checkout para alertar conversion'
                required: false
                default: '10'
                type: string
            start_checkout_min_warn_pct:
                description: 'Umbral minimo start_checkout_rate (%)'
                required: false
                default: '0.25'
                type: string
            start_checkout_drop_warn_pct:
                description: 'Umbral de caida start_checkout_rate (pp)'
                required: false
                default: '0.2'
                type: string
            start_checkout_min_view_booking:
                description: 'Muestra minima view_booking para alertar start_checkout_rate'
                required: false
                default: '100'
                type: string
            core_p95_max_ms:
                description: 'Umbral p95 core (ms)'
                required: false
                default: '800'
                type: string
            figo_post_p95_max_ms:
                description: 'Umbral p95 figo-post (ms)'
                required: false
                default: '2500'
                type: string
            max_report_age_hours:
                description: 'Edad maxima permitida del reporte semanal (horas)'
                required: false
                default: '36'
                type: string

concurrency:
    group: weekly-kpi-report
    cancel-in-progress: true

permissions:
    contents: read
    actions: read
    issues: write

jobs:
    weekly-kpi:
        name: Weekly conversion and latency report
        runs-on: windows-latest
        timeout-minutes: 20
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || 'https://pielarmonia.com' }}
            BENCH_RUNS: ${{ github.event.inputs.bench_runs || '15' }}
            FAIL_ON_WARNINGS: ${{ github.event.inputs.fail_on_warnings || 'true' }}
            FAIL_ON_INVALID_THRESHOLDS: ${{ github.event.inputs.fail_on_invalid_thresholds || vars.WEEKLY_KPI_FAIL_ON_INVALID_THRESHOLDS || 'false' }}
            REPORT_RETENTION_DAYS: ${{ github.event.inputs.retention_days || vars.WEEKLY_KPI_RETENTION_DAYS || '30' }}
            REPORT_NO_SHOW_WARN_PCT: ${{ github.event.inputs.no_show_warn_pct || vars.WEEKLY_KPI_NO_SHOW_WARN_PCT || '20' }}
            REPORT_RECURRENCE_MIN_WARN_PCT: ${{ github.event.inputs.recurrence_min_warn_pct || vars.WEEKLY_KPI_RECURRENCE_MIN_WARN_PCT || '30' }}
            REPORT_RECURRENCE_DROP_WARN_PCT: ${{ github.event.inputs.recurrence_drop_warn_pct || vars.WEEKLY_KPI_RECURRENCE_DROP_WARN_PCT || '15' }}
            REPORT_RECURRENCE_MIN_UNIQUE_PATIENTS: ${{ github.event.inputs.recurrence_min_unique_patients || vars.WEEKLY_KPI_RECURRENCE_MIN_UNIQUE_PATIENTS || '5' }}
            REPORT_IDEMPOTENCY_CONFLICT_WARN_PCT: ${{ github.event.inputs.idempotency_conflict_warn_pct || vars.WEEKLY_KPI_IDEMPOTENCY_CONFLICT_WARN_PCT || '5' }}
            REPORT_CONVERSION_MIN_WARN_PCT: ${{ github.event.inputs.conversion_min_warn_pct || vars.WEEKLY_KPI_CONVERSION_MIN_WARN_PCT || '25' }}
            REPORT_CONVERSION_DROP_WARN_PCT: ${{ github.event.inputs.conversion_drop_warn_pct || vars.WEEKLY_KPI_CONVERSION_DROP_WARN_PCT || '15' }}
            REPORT_CONVERSION_MIN_START_CHECKOUT: ${{ github.event.inputs.conversion_min_start_checkout || vars.WEEKLY_KPI_CONVERSION_MIN_START_CHECKOUT || '10' }}
            REPORT_START_CHECKOUT_MIN_WARN_PCT: ${{ github.event.inputs.start_checkout_min_warn_pct || vars.WEEKLY_KPI_START_CHECKOUT_MIN_WARN_PCT || '0.25' }}
            REPORT_START_CHECKOUT_DROP_WARN_PCT: ${{ github.event.inputs.start_checkout_drop_warn_pct || vars.WEEKLY_KPI_START_CHECKOUT_DROP_WARN_PCT || '0.2' }}
            REPORT_START_CHECKOUT_MIN_VIEW_BOOKING: ${{ github.event.inputs.start_checkout_min_view_booking || vars.WEEKLY_KPI_START_CHECKOUT_MIN_VIEW_BOOKING || '100' }}
            REPORT_CORE_P95_MAX_MS: ${{ github.event.inputs.core_p95_max_ms || vars.WEEKLY_KPI_CORE_P95_MAX_MS || '800' }}
            REPORT_FIGO_POST_P95_MAX_MS: ${{ github.event.inputs.figo_post_p95_max_ms || vars.WEEKLY_KPI_FIGO_POST_P95_MAX_MS || '2500' }}
            REPORT_MAX_REPORT_AGE_HOURS: ${{ github.event.inputs.max_report_age_hours || vars.WEEKLY_KPI_MAX_REPORT_AGE_HOURS || '36' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias Node
              run: npm ci

            - name: Actualizar metricas de agentes
              run: npm run agent:metrics

            - name: Ejecutar reporte semanal
              id: run_report
              shell: pwsh
              run: |
                  function Add-ThresholdWarning {
                    param(
                      [System.Collections.Generic.List[string]]$Warnings,
                      [string]$Message
                    )
                    if ($null -eq $Warnings) { return }
                    if ([string]::IsNullOrWhiteSpace($Message)) { return }
                    $Warnings.Add($Message) | Out-Null
                  }

                  function Parse-IntValue {
                    param(
                      [string]$Name,
                      [string]$Raw,
                      [int]$DefaultValue,
                      [int]$MinValue = 0,
                      [System.Collections.Generic.List[string]]$Warnings
                    )
                    $parsed = $DefaultValue
                    if (-not [string]::IsNullOrWhiteSpace($Raw)) {
                      $tmp = 0
                      if ([int]::TryParse($Raw, [ref]$tmp)) {
                        $parsed = $tmp
                      } else {
                        Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor invalido '$Raw', se usa default $DefaultValue"
                      }
                    }
                    if ($parsed -lt $MinValue) {
                      Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor $parsed menor que minimo $MinValue, se aplica clamp"
                      $parsed = $MinValue
                    }
                    return $parsed
                  }

                  function Parse-DoubleValue {
                    param(
                      [string]$Name,
                      [string]$Raw,
                      [double]$DefaultValue,
                      [double]$MinValue = 0,
                      [System.Collections.Generic.List[string]]$Warnings
                    )
                    $parsed = $DefaultValue
                    if (-not [string]::IsNullOrWhiteSpace($Raw)) {
                      $tmp = 0.0
                      if ([double]::TryParse($Raw, [System.Globalization.NumberStyles]::Float, [System.Globalization.CultureInfo]::InvariantCulture, [ref]$tmp)) {
                        $parsed = $tmp
                      } else {
                        Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor invalido '$Raw', se usa default $DefaultValue"
                      }
                    }
                    if ($parsed -lt $MinValue) {
                      Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor $parsed menor que minimo $MinValue, se aplica clamp"
                      $parsed = $MinValue
                    }
                    return $parsed
                  }

                  $thresholdWarnings = New-Object System.Collections.Generic.List[string]
                  $failOnInvalidThresholds = "$env:FAIL_ON_INVALID_THRESHOLDS".ToLowerInvariant() -eq 'true'
                  $benchRuns = [int]$env:BENCH_RUNS
                  if ($benchRuns -lt 5) { $benchRuns = 5 }
                  $retentionDays = Parse-IntValue -Name 'retention_days' -Raw $env:REPORT_RETENTION_DAYS -DefaultValue 30 -MinValue 1 -Warnings $thresholdWarnings
                  $coreP95MaxMs = Parse-IntValue -Name 'core_p95_max_ms' -Raw $env:REPORT_CORE_P95_MAX_MS -DefaultValue 800 -MinValue 1 -Warnings $thresholdWarnings
                  $figoPostP95MaxMs = Parse-IntValue -Name 'figo_post_p95_max_ms' -Raw $env:REPORT_FIGO_POST_P95_MAX_MS -DefaultValue 2500 -MinValue 1 -Warnings $thresholdWarnings
                  $maxReportAgeHours = Parse-IntValue -Name 'max_report_age_hours' -Raw $env:REPORT_MAX_REPORT_AGE_HOURS -DefaultValue 36 -MinValue 1 -Warnings $thresholdWarnings
                  $noShowWarnPct = Parse-DoubleValue -Name 'no_show_warn_pct' -Raw $env:REPORT_NO_SHOW_WARN_PCT -DefaultValue 20.0 -MinValue 0 -Warnings $thresholdWarnings
                  $idempotencyConflictWarnPct = Parse-DoubleValue -Name 'idempotency_conflict_warn_pct' -Raw $env:REPORT_IDEMPOTENCY_CONFLICT_WARN_PCT -DefaultValue 5.0 -MinValue 0 -Warnings $thresholdWarnings
                  $recurrenceMinWarnPct = Parse-DoubleValue -Name 'recurrence_min_warn_pct' -Raw $env:REPORT_RECURRENCE_MIN_WARN_PCT -DefaultValue 30.0 -MinValue 0 -Warnings $thresholdWarnings
                  $recurrenceDropWarnPct = Parse-DoubleValue -Name 'recurrence_drop_warn_pct' -Raw $env:REPORT_RECURRENCE_DROP_WARN_PCT -DefaultValue 15.0 -MinValue 0 -Warnings $thresholdWarnings
                  $recurrenceMinUniquePatients = Parse-IntValue -Name 'recurrence_min_unique_patients' -Raw $env:REPORT_RECURRENCE_MIN_UNIQUE_PATIENTS -DefaultValue 5 -MinValue 1 -Warnings $thresholdWarnings
                  $conversionMinWarnPct = Parse-DoubleValue -Name 'conversion_min_warn_pct' -Raw $env:REPORT_CONVERSION_MIN_WARN_PCT -DefaultValue 25.0 -MinValue 0 -Warnings $thresholdWarnings
                  $conversionDropWarnPct = Parse-DoubleValue -Name 'conversion_drop_warn_pct' -Raw $env:REPORT_CONVERSION_DROP_WARN_PCT -DefaultValue 15.0 -MinValue 0 -Warnings $thresholdWarnings
                  $conversionMinStartCheckout = Parse-IntValue -Name 'conversion_min_start_checkout' -Raw $env:REPORT_CONVERSION_MIN_START_CHECKOUT -DefaultValue 10 -MinValue 1 -Warnings $thresholdWarnings
                  $startCheckoutMinWarnPct = Parse-DoubleValue -Name 'start_checkout_min_warn_pct' -Raw $env:REPORT_START_CHECKOUT_MIN_WARN_PCT -DefaultValue 0.25 -MinValue 0 -Warnings $thresholdWarnings
                  $startCheckoutDropWarnPct = Parse-DoubleValue -Name 'start_checkout_drop_warn_pct' -Raw $env:REPORT_START_CHECKOUT_DROP_WARN_PCT -DefaultValue 0.2 -MinValue 0 -Warnings $thresholdWarnings
                  $startCheckoutMinViewBooking = Parse-IntValue -Name 'start_checkout_min_view_booking' -Raw $env:REPORT_START_CHECKOUT_MIN_VIEW_BOOKING -DefaultValue 100 -MinValue 1 -Warnings $thresholdWarnings
                  $thresholdWarningsCount = $thresholdWarnings.Count
                  $thresholdWarningsList = if ($thresholdWarningsCount -gt 0) { @($thresholdWarnings) -join ' | ' } else { 'none' }

                  "effective_retention_days=$retentionDays" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_core_p95_max_ms=$coreP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_figo_post_p95_max_ms=$figoPostP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_max_report_age_hours=$maxReportAgeHours" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_no_show_warn_pct=$noShowWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_min_warn_pct=$recurrenceMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_drop_warn_pct=$recurrenceDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_min_unique_patients=$recurrenceMinUniquePatients" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_idempotency_conflict_warn_pct=$idempotencyConflictWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_min_warn_pct=$conversionMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_drop_warn_pct=$conversionDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_min_start_checkout=$conversionMinStartCheckout" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_min_warn_pct=$startCheckoutMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_drop_warn_pct=$startCheckoutDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_min_view_booking=$startCheckoutMinViewBooking" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_fail_on_invalid_thresholds=$failOnInvalidThresholds" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "threshold_warnings_count=$thresholdWarningsCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "threshold_warnings_list=$thresholdWarningsList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

                  if ($failOnInvalidThresholds -and $thresholdWarningsCount -gt 0) {
                    throw "Se detectaron umbrales invalidos ($thresholdWarningsCount): $thresholdWarningsList"
                  }

                  $args = @(
                    '-Domain', $env:TARGET_DOMAIN,
                    '-BenchRuns', $benchRuns,
                    '-RetentionReportDays', $retentionDays,
                    '-CoreP95MaxMs', $coreP95MaxMs,
                    '-FigoPostP95MaxMs', $figoPostP95MaxMs,
                    '-NoShowRateWarnPct', $noShowWarnPct,
                    '-IdempotencyConflictRateWarnPct', $idempotencyConflictWarnPct,
                    '-RecurrenceRateMinWarnPct', $recurrenceMinWarnPct,
                    '-RecurrenceRateDropWarnPct', $recurrenceDropWarnPct,
                    '-RecurrenceWarnMinUniquePatients', $recurrenceMinUniquePatients,
                    '-ConversionRateMinWarnPct', $conversionMinWarnPct,
                    '-ConversionRateDropWarnPct', $conversionDropWarnPct,
                    '-ConversionWarnMinStartCheckout', $conversionMinStartCheckout,
                    '-StartCheckoutRateMinWarnPct', $startCheckoutMinWarnPct,
                    '-StartCheckoutRateDropWarnPct', $startCheckoutDropWarnPct,
                    '-StartCheckoutWarnMinViewBooking', $startCheckoutMinViewBooking
                  )

                  if ($env:FAIL_ON_WARNINGS -eq 'true') {
                    $args += '-FailOnCriticalWarnings'
                  } else {
                    Write-Host 'FailOnCriticalWarnings desactivado para esta corrida.'
                  }
                  & ./REPORTE-SEMANAL-PRODUCCION.ps1 @args

            - name: Detectar ultimo reporte
              if: ${{ always() }}
              id: report
              shell: pwsh
              run: |
                  $latestJson = Get-ChildItem -Path 'verification/weekly' -Filter 'weekly-report-*.json' -ErrorAction SilentlyContinue |
                    Sort-Object LastWriteTimeUtc -Descending |
                    Select-Object -First 1

                  if (-not $latestJson) {
                    "report_json_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_md_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_generated_at_utc=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_age_hours=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_stale=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_non_critical_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_non_critical_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_count_int=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_alert_data_valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_required=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_recovered=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_reason_codes=report_missing,warnings_invalid" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_severity=critical" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_signal_key=missing_report" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_view_booking=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrence_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrence_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_trend_ready=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_source=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_generated_at=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_no_show_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_recurrence_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_appointments_total=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_unique_patients=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrent_patients=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_source=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_count=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_warn_count=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_critical_count=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_count_int=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_alert_data_valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_incident_required=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_incident_recovered=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_incident_reason_codes=report_missing,retention_alert_invalid" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_incident_severity=critical" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_signal_key=missing_report" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_core_p95_max_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_figo_post_p95_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_availability_p95_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    exit 0
                  }

                  $jsonPath = $latestJson.FullName
                  $mdPath = [System.IO.Path]::ChangeExtension($jsonPath, '.md')
                  $warningsCount = 0
                  $warningsCriticalCount = 0
                  $warningsNonCriticalCount = 0
                  $warningsCriticalList = 'none'
                  $warningsNonCriticalList = 'none'
                  $maxReportAgeHours = 36
                  $tmpMaxReportAgeHours = 0
                  if ([int]::TryParse([string]$env:REPORT_MAX_REPORT_AGE_HOURS, [ref]$tmpMaxReportAgeHours) -and $tmpMaxReportAgeHours -gt 0) {
                    $maxReportAgeHours = $tmpMaxReportAgeHours
                  }
                  $reportGeneratedAtUtc = ([DateTimeOffset]$latestJson.LastWriteTimeUtc).ToUniversalTime()
                  $reportAgeHours = [Math]::Round(([DateTimeOffset]::UtcNow - $reportGeneratedAtUtc).TotalHours, 2)
                  if ($reportAgeHours -lt 0) { $reportAgeHours = 0 }
                  $reportStale = if ($reportAgeHours -gt $maxReportAgeHours) { 'true' } else { 'false' }

                  try {
                    $payload = Get-Content -Path $jsonPath -Raw | ConvertFrom-Json -Depth 10
                    $generatedAtCandidate = if ($null -ne $payload.generatedAt) { [string]$payload.generatedAt } else { '' }
                    $tmpGeneratedAt = [DateTimeOffset]::MinValue
                    if (-not [string]::IsNullOrWhiteSpace($generatedAtCandidate) -and [DateTimeOffset]::TryParse($generatedAtCandidate, [ref]$tmpGeneratedAt)) {
                      $reportGeneratedAtUtc = $tmpGeneratedAt.ToUniversalTime()
                    }
                    $reportAgeHours = [Math]::Round(([DateTimeOffset]::UtcNow - $reportGeneratedAtUtc).TotalHours, 2)
                    if ($reportAgeHours -lt 0) { $reportAgeHours = 0 }
                    $reportStale = if ($reportAgeHours -gt $maxReportAgeHours) { 'true' } else { 'false' }
                    if ($payload.warnings) {
                      $warningsCount = @($payload.warnings).Count
                    }
                    $warningsList = if ($payload.warnings) { (@($payload.warnings) -join ', ') } else { 'none' }
                    if ($null -ne $payload.warningCounts) {
                      if ($null -ne $payload.warningCounts.critical) { $warningsCriticalCount = [int]$payload.warningCounts.critical }
                      if ($null -ne $payload.warningCounts.nonCritical) { $warningsNonCriticalCount = [int]$payload.warningCounts.nonCritical }
                    } elseif ($null -ne $payload.warningsBySeverity) {
                      $warningsCriticalCount = if ($payload.warningsBySeverity.critical) { @($payload.warningsBySeverity.critical).Count } else { 0 }
                      $warningsNonCriticalCount = if ($payload.warningsBySeverity.nonCritical) { @($payload.warningsBySeverity.nonCritical).Count } else { 0 }
                    } elseif ($payload.warnings) {
                      # Fallback conservador para reportes viejos sin severidad.
                      $warningsCriticalCount = @($payload.warnings).Count
                      $warningsNonCriticalCount = 0
                    }
                    if ($null -ne $payload.warningsBySeverity) {
                      $warningsCriticalList = if ($payload.warningsBySeverity.critical) { (@($payload.warningsBySeverity.critical) -join ', ') } else { 'none' }
                      $warningsNonCriticalList = if ($payload.warningsBySeverity.nonCritical) { (@($payload.warningsBySeverity.nonCritical) -join ', ') } else { 'none' }
                    } else {
                      $warningsCriticalList = $warningsList
                      $warningsNonCriticalList = 'none'
                    }

                    $retention = $payload.retention
                    $retentionTrend = $payload.retentionTrend
                    $retentionBaseline = $payload.retentionBaseline
                    $retentionReport = $payload.retentionReport
                    $conversion = $payload.conversion
                    $conversionTrend = $payload.conversionTrend
                    if ($null -eq $conversion -and $null -ne $payload.summary) {
                      $summary = $payload.summary
                      $fallbackViewBooking = if ($null -ne $summary.viewBooking) { [int]$summary.viewBooking } else { 0 }
                      $fallbackStartCheckout = if ($null -ne $summary.startCheckout) { [int]$summary.startCheckout } else { 0 }
                      $fallbackBookingConfirmed = if ($null -ne $summary.bookingConfirmed) { [int]$summary.bookingConfirmed } else { 0 }
                      $fallbackStartCheckoutRate = if ($fallbackViewBooking -gt 0) { [Math]::Round(($fallbackStartCheckout / [double]$fallbackViewBooking) * 100, 2) } else { 0 }
                      $fallbackRate = if ($fallbackStartCheckout -gt 0) { [Math]::Round(($fallbackBookingConfirmed / [double]$fallbackStartCheckout) * 100, 2) } else { 0 }
                      $conversion = [pscustomobject]@{
                        viewBooking = $fallbackViewBooking
                        startCheckout = $fallbackStartCheckout
                        startCheckoutRatePct = $fallbackStartCheckoutRate
                        bookingConfirmed = $fallbackBookingConfirmed
                        bookingConfirmedRatePct = $fallbackRate
                      }
                    }
                    $latency = $payload.latency
                    $conversionViewBooking = if ($null -ne $conversion) { $conversion.viewBooking } else { 'n/a' }
                    $conversionStartCheckout = if ($null -ne $conversion) { $conversion.startCheckout } else { 'n/a' }
                    $conversionStartCheckoutRate = if ($null -ne $conversion) { $conversion.startCheckoutRatePct } else { 'n/a' }
                    $conversionStartCheckoutRateDelta = if ($null -ne $conversionTrend -and $null -ne $conversionTrend.startCheckoutRateDeltaPct) { $conversionTrend.startCheckoutRateDeltaPct } else { 'n/a' }
                    $conversionBookingConfirmed = if ($null -ne $conversion) { $conversion.bookingConfirmed } else { 'n/a' }
                    $conversionRate = if ($null -ne $conversion) { $conversion.bookingConfirmedRatePct } else { 'n/a' }
                    $conversionRateDelta = if ($null -ne $conversionTrend -and $null -ne $conversionTrend.bookingConfirmedRateDeltaPct) { $conversionTrend.bookingConfirmedRateDeltaPct } else { 'n/a' }
                    $noShowRate = if ($null -ne $retention) { $retention.noShowRatePct } else { 'n/a' }
                    $recurrenceRate = if ($null -ne $retention) { $retention.recurrenceRatePct } else { 'n/a' }
                    $appointmentsTotal = if ($null -ne $retention) { $retention.appointmentsTotal } else { 'n/a' }
                    $uniquePatients = if ($null -ne $retention) { $retention.uniquePatients } else { 'n/a' }
                    $recurrentPatients = if ($null -ne $retention) { $retention.recurrentPatients } else { 'n/a' }
                    $noShowRateDelta = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.noShowRateDeltaPct) { $retentionTrend.noShowRateDeltaPct } else { 'n/a' }
                    $recurrenceRateDelta = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.recurrenceRateDeltaPct) { $retentionTrend.recurrenceRateDeltaPct } else { 'n/a' }
                    $retentionTrendReady = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.trendReady) { $retentionTrend.trendReady } else { 'n/a' }
                    $retentionBaselineSource = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.source) { $retentionBaseline.source } else { 'n/a' }
                    $retentionBaselineGeneratedAt = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.generatedAt) { $retentionBaseline.generatedAt } else { 'n/a' }
                    $retentionBaselineNoShowRate = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.noShowRatePct) { $retentionBaseline.noShowRatePct } else { 'n/a' }
                    $retentionBaselineRecurrenceRate = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.recurrenceRatePct) { $retentionBaseline.recurrenceRatePct } else { 'n/a' }
                    $retentionReportSource = if ($null -ne $retentionReport -and $null -ne $retentionReport.source) { $retentionReport.source } else { 'n/a' }
                    $retentionReportAlertCount = if ($null -ne $retentionReport -and $null -ne $retentionReport.alertCounts -and $null -ne $retentionReport.alertCounts.total) { [int]$retentionReport.alertCounts.total } else { 0 }
                    $retentionReportAlertWarnCount = if ($null -ne $retentionReport -and $null -ne $retentionReport.alertCounts -and $null -ne $retentionReport.alertCounts.warn) { [int]$retentionReport.alertCounts.warn } else { 0 }
                    $retentionReportAlertCriticalCount = if ($null -ne $retentionReport -and $null -ne $retentionReport.alertCounts -and $null -ne $retentionReport.alertCounts.critical) { [int]$retentionReport.alertCounts.critical } else { 0 }
                    $retentionReportAlerts = if ($null -ne $retentionReport -and $retentionReport.alerts) { @($retentionReport.alerts) } else { @() }
                    $retentionReportAlertList = if ($retentionReportAlerts.Count -gt 0) {
                      @(
                        $retentionReportAlerts | ForEach-Object {
                          $code = if ($null -ne $_.code) { [string]$_.code } else { 'unknown_alert' }
                          $severity = if ($null -ne $_.severity) { [string]$_.severity } else { 'warn' }
                          $actualPct = if ($null -ne $_.actualPct) { [string]$_.actualPct } else { 'n/a' }
                          $thresholdPct = if ($null -ne $_.thresholdPct) { [string]$_.thresholdPct } else { 'n/a' }
                          "$code(actual:$actualPct threshold:$thresholdPct severity:$severity)"
                        }
                      ) -join '; '
                    } else {
                      'none'
                    }
                    $coreP95MaxMs = if ($null -ne $latency) { $latency.coreP95MaxMs } else { 'n/a' }
                    $figoPostP95Ms = if ($null -ne $latency) { $latency.figoPostP95Ms } else { 'n/a' }
                    $availabilityBench = $null
                    if ($null -ne $latency -and $latency.bench) {
                      $availabilityBench = @($latency.bench | Where-Object { $_.Name -eq 'availability' } | Select-Object -First 1)[0]
                    }
                    $availabilityP95Ms = if ($null -ne $availabilityBench) { $availabilityBench.P95Ms } else { 'n/a' }
                  } catch {
                    $warningsCount = -1
                    $warningsList = 'n/a'
                    $warningsCriticalCount = -1
                    $warningsNonCriticalCount = -1
                    $warningsCriticalList = 'n/a'
                    $warningsNonCriticalList = 'n/a'
                    $conversionViewBooking = 'n/a'
                    $conversionStartCheckout = 'n/a'
                    $conversionStartCheckoutRate = 'n/a'
                    $conversionStartCheckoutRateDelta = 'n/a'
                    $conversionBookingConfirmed = 'n/a'
                    $conversionRate = 'n/a'
                    $conversionRateDelta = 'n/a'
                    $noShowRate = 'n/a'
                    $recurrenceRate = 'n/a'
                    $appointmentsTotal = 'n/a'
                    $uniquePatients = 'n/a'
                    $recurrentPatients = 'n/a'
                    $noShowRateDelta = 'n/a'
                    $recurrenceRateDelta = 'n/a'
                    $retentionTrendReady = 'n/a'
                    $retentionBaselineSource = 'n/a'
                    $retentionBaselineGeneratedAt = 'n/a'
                    $retentionBaselineNoShowRate = 'n/a'
                    $retentionBaselineRecurrenceRate = 'n/a'
                    $retentionReportSource = 'n/a'
                    $retentionReportAlertCount = 'n/a'
                    $retentionReportAlertWarnCount = 'n/a'
                    $retentionReportAlertCriticalCount = 'n/a'
                    $retentionReportAlertList = 'n/a'
                    $coreP95MaxMs = 'n/a'
                    $figoPostP95Ms = 'n/a'
                    $availabilityP95Ms = 'n/a'
                    $reportStale = 'true'
                  }

                  "report_json_path=$jsonPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "report_md_path=$mdPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "report_generated_at_utc=$($reportGeneratedAtUtc.ToString('o'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "report_age_hours=$reportAgeHours" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "report_stale=$reportStale" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_count=$warningsCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_list=$warningsList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_critical_count=$warningsCriticalCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_critical_list=$warningsCriticalList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_non_critical_count=$warningsNonCriticalCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_non_critical_list=$warningsNonCriticalList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  $warningsCriticalCountInt = -1
                  $tmpWarningsCriticalCount = 0
                  if ([int]::TryParse([string]$warningsCriticalCount, [ref]$tmpWarningsCriticalCount)) {
                    $warningsCriticalCountInt = $tmpWarningsCriticalCount
                  }
                  $warningsAlertDataValid = if ($warningsCriticalCountInt -ge 0) { 'true' } else { 'false' }
                  $generalIncidentRequired = if ($warningsCriticalCountInt -eq -1 -or $warningsCriticalCountInt -gt 0 -or $reportStale -eq 'true') { 'true' } else { 'false' }
                  $generalIncidentRecovered = if ($warningsCriticalCountInt -eq 0 -and $reportStale -ne 'true') { 'true' } else { 'false' }
                  $generalReasonCodes = New-Object System.Collections.Generic.List[string]
                  if ($reportStale -eq 'true') { $generalReasonCodes.Add('report_stale') | Out-Null }
                  if ($warningsCriticalCountInt -eq -1) {
                    $generalReasonCodes.Add('warnings_invalid') | Out-Null
                  } elseif ($warningsCriticalCountInt -gt 0) {
                    $generalReasonCodes.Add('warnings_critical') | Out-Null
                  }
                  if ($generalReasonCodes.Count -eq 0) {
                    $generalReasonCodes.Add('none') | Out-Null
                  }
                  $generalIncidentReasonCodes = @($generalReasonCodes) -join ','
                  $generalIncidentSeverity = if ($reportStale -eq 'true' -or $warningsCriticalCountInt -eq -1) { 'critical' } elseif ($warningsCriticalCountInt -gt 0) { 'warning' } else { 'warning' }
                  $generalSignalKey = "wcc:$warningsCriticalCountInt|stale:$reportStale|reasons:$generalIncidentReasonCodes"
                  "warnings_critical_count_int=$warningsCriticalCountInt" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_alert_data_valid=$warningsAlertDataValid" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "general_incident_required=$generalIncidentRequired" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "general_incident_recovered=$generalIncidentRecovered" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "general_incident_reason_codes=$generalIncidentReasonCodes" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "general_incident_severity=$generalIncidentSeverity" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "general_signal_key=$generalSignalKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_view_booking=$conversionViewBooking" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_start_checkout=$conversionStartCheckout" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_start_checkout_rate_pct=$conversionStartCheckoutRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_start_checkout_rate_delta_pct=$conversionStartCheckoutRateDelta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_booking_confirmed=$conversionBookingConfirmed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_booking_confirmed_rate_pct=$conversionRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_booking_confirmed_rate_delta_pct=$conversionRateDelta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_no_show_rate_pct=$noShowRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_recurrence_rate_pct=$recurrenceRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_no_show_rate_delta_pct=$noShowRateDelta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_recurrence_rate_delta_pct=$recurrenceRateDelta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_trend_ready=$retentionTrendReady" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_baseline_source=$retentionBaselineSource" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_baseline_generated_at=$retentionBaselineGeneratedAt" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_baseline_no_show_rate_pct=$retentionBaselineNoShowRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_baseline_recurrence_rate_pct=$retentionBaselineRecurrenceRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_appointments_total=$appointmentsTotal" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_unique_patients=$uniquePatients" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_recurrent_patients=$recurrentPatients" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_report_source=$retentionReportSource" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_report_alert_count=$retentionReportAlertCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_report_alert_warn_count=$retentionReportAlertWarnCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_report_alert_critical_count=$retentionReportAlertCriticalCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_report_alert_list=$retentionReportAlertList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  $retentionAlertCountInt = -1
                  $tmpRetentionAlertCount = 0
                  if ([int]::TryParse([string]$retentionReportAlertCount, [ref]$tmpRetentionAlertCount)) {
                    $retentionAlertCountInt = $tmpRetentionAlertCount
                  }
                  $retentionAlertCriticalCountInt = -1
                  $tmpRetentionAlertCriticalCount = 0
                  if ([int]::TryParse([string]$retentionReportAlertCriticalCount, [ref]$tmpRetentionAlertCriticalCount)) {
                    $retentionAlertCriticalCountInt = $tmpRetentionAlertCriticalCount
                  }
                  $retentionAlertDataValid = if ($retentionAlertCountInt -ge 0) { 'true' } else { 'false' }
                  $retentionIncidentRequired = if ($retentionAlertCountInt -eq -1 -or $retentionAlertCountInt -gt 0) { 'true' } else { 'false' }
                  $retentionIncidentRecovered = if ($retentionAlertCountInt -eq 0 -and $reportStale -ne 'true') { 'true' } else { 'false' }
                  $retentionReasonCodes = New-Object System.Collections.Generic.List[string]
                  if ($reportStale -eq 'true') { $retentionReasonCodes.Add('report_stale') | Out-Null }
                  if ($retentionAlertCountInt -eq -1) {
                    $retentionReasonCodes.Add('retention_alert_invalid') | Out-Null
                  } elseif ($retentionAlertCountInt -gt 0) {
                    $retentionReasonCodes.Add('retention_alert_active') | Out-Null
                  }
                  if ($retentionReasonCodes.Count -eq 0) {
                    $retentionReasonCodes.Add('none') | Out-Null
                  }
                  $retentionIncidentReasonCodes = @($retentionReasonCodes) -join ','
                  $retentionIncidentSeverity = if ($reportStale -eq 'true' -or $retentionAlertCountInt -eq -1 -or $retentionAlertCriticalCountInt -gt 0) { 'critical' } elseif ($retentionAlertCountInt -gt 0) { 'warning' } else { 'warning' }
                  $retentionSignalKey = "count:$retentionAlertCountInt|stale:$reportStale|reasons:$retentionIncidentReasonCodes|src:$retentionReportSource"
                  "retention_report_alert_count_int=$retentionAlertCountInt" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_alert_data_valid=$retentionAlertDataValid" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_incident_required=$retentionIncidentRequired" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_incident_recovered=$retentionIncidentRecovered" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_incident_reason_codes=$retentionIncidentReasonCodes" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_incident_severity=$retentionIncidentSeverity" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_signal_key=$retentionSignalKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "latency_core_p95_max_ms=$coreP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "latency_figo_post_p95_ms=$figoPostP95Ms" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "latency_availability_p95_ms=$availabilityP95Ms" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

            - name: Publicar artefactos
              if: ${{ always() && steps.report.outputs.report_json_path != '' }}
              uses: actions/upload-artifact@v4
              with:
                  name: weekly-kpi-report
                  path: |
                      ${{ steps.report.outputs.report_json_path }}
                      ${{ steps.report.outputs.report_md_path }}
                      verification/weekly/retention-baseline.json
                      verification/agent-metrics.json
                  if-no-files-found: warn
                  retention-days: 30

            - name: Calcular SLA operativo (14 dias)
              if: ${{ always() }}
              id: ops_sla
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const lookbackDays = 14;
                      const since = Date.now() - (lookbackDays * 24 * 60 * 60 * 1000);

                      function toMinutes(run) {
                        const start = run.run_started_at || run.created_at;
                        const end = run.updated_at;
                        const startMs = Date.parse(start || '');
                        const endMs = Date.parse(end || '');
                        if (!Number.isFinite(startMs) || !Number.isFinite(endMs) || endMs < startMs) {
                          return null;
                        }
                        return (endMs - startMs) / 60000;
                      }

                      function percentile95(values) {
                        if (!values.length) return null;
                        const sorted = [...values].sort((a, b) => a - b);
                        const idx = Math.min(sorted.length - 1, Math.max(0, Math.ceil(sorted.length * 0.95) - 1));
                        return sorted[idx];
                      }

                      async function getRecentCompletedRuns(workflowFile) {
                        const runs = await github.paginate(github.rest.actions.listWorkflowRunsForWorkflow, {
                          owner,
                          repo,
                          workflow_id: workflowFile,
                          status: 'completed',
                          per_page: 100
                        });
                        return runs.filter((run) => {
                          const createdMs = Date.parse(run.created_at || '');
                          return Number.isFinite(createdMs) && createdMs >= since;
                        });
                      }

                      const fastRuns = await getRecentCompletedRuns('post-deploy-fast.yml');
                      const nightlyRuns = await getRecentCompletedRuns('nightly-stability.yml');

                      const fastDurations = fastRuns.map(toMinutes).filter((v) => v !== null);
                      const fastP95 = percentile95(fastDurations);
                      const fastSuccess = fastRuns.filter((run) => run.conclusion === 'success').length;
                      const fastRate = fastRuns.length ? (fastSuccess / fastRuns.length) * 100 : null;
                      const fastSlaOk = fastP95 !== null && fastP95 <= 10;

                      const nightlySuccess = nightlyRuns.filter((run) => run.conclusion === 'success').length;
                      const nightlyRate = nightlyRuns.length ? (nightlySuccess / nightlyRuns.length) * 100 : null;
                      const nightlyTargetOk = nightlyRate !== null && nightlyRate >= 90;

                      const allIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'all',
                        per_page: 100
                      });
                      const weeklyIncidentTitles = new Set([
                        '[ALERTA PROD] Weekly KPI report con warnings',
                        '[ALERTA PROD] Weekly KPI SLA operativo degradado',
                        '[ALERTA PROD] Weekly KPI retencion degradada'
                      ]);
                      const prodIncidents = allIssues.filter((issue) => {
                        if (issue.pull_request) return false;
                        const title = String(issue.title || '');
                        if (!title.startsWith('[ALERTA PROD]')) return false;
                        const createdMs = Date.parse(issue.created_at || '');
                        return Number.isFinite(createdMs) && createdMs >= since;
                      });
                      const incidentsOpen = prodIncidents.filter((issue) => issue.state === 'open');
                      const incidentsOpenExternal = incidentsOpen.filter((issue) => !weeklyIncidentTitles.has(String(issue.title || '')));
                      const incidentsClosed = prodIncidents.filter((issue) => issue.state === 'closed');
                      const mttrHours = incidentsClosed
                        .map((issue) => {
                          const createdMs = Date.parse(issue.created_at || '');
                          const closedMs = Date.parse(issue.closed_at || '');
                          if (!Number.isFinite(createdMs) || !Number.isFinite(closedMs) || closedMs < createdMs) {
                            return null;
                          }
                          return (closedMs - createdMs) / 3600000;
                        })
                        .filter((value) => value !== null);
                      const mttrAvg = mttrHours.length
                        ? mttrHours.reduce((sum, value) => sum + value, 0) / mttrHours.length
                        : null;
                      const mttrTargetOk = mttrAvg === null || mttrAvg < 4;
                      const slaDegraded = !fastSlaOk || !nightlyTargetOk || !mttrTargetOk || incidentsOpenExternal.length !== 0;
                      const slaRecovered = fastSlaOk && nightlyTargetOk && mttrTargetOk && incidentsOpenExternal.length === 0;
                      const opsSlaSeverity =
                        incidentsOpenExternal.length !== 0 || !mttrTargetOk
                          ? 'critical'
                          : (!fastSlaOk || !nightlyTargetOk ? 'warning' : 'warning');
                      const slaFailureAxes = [];
                      if (!fastSlaOk) slaFailureAxes.push('fast_lane');
                      if (!nightlyTargetOk) slaFailureAxes.push('nightly_success');
                      if (!mttrTargetOk) slaFailureAxes.push('mttr');
                      if (incidentsOpenExternal.length !== 0) slaFailureAxes.push('open_external_incidents');
                      if (!slaFailureAxes.length) slaFailureAxes.push('none');
                      const opsSlaFailureAxes = slaFailureAxes.join(',');
                      const opsSlaSignalKey = [
                        `fast_ok:${fastSlaOk ? '1' : '0'}`,
                        `nightly_ok:${nightlyTargetOk ? '1' : '0'}`,
                        `mttr_ok:${mttrTargetOk ? '1' : '0'}`,
                        `open_ext:${incidentsOpenExternal.length}`,
                        `fast_p95:${fastP95 === null ? 'n/a' : fastP95.toFixed(2)}`,
                        `nightly_rate:${nightlyRate === null ? 'n/a' : nightlyRate.toFixed(2)}`,
                        `axes:${opsSlaFailureAxes}`
                      ].join('|');

                      core.setOutput('lookback_days', String(lookbackDays));
                      core.setOutput('ops_fast_runs', String(fastRuns.length));
                      core.setOutput('ops_fast_success_rate_pct', fastRate === null ? 'n/a' : fastRate.toFixed(2));
                      core.setOutput('ops_fast_p95_min', fastP95 === null ? 'n/a' : fastP95.toFixed(2));
                      core.setOutput('ops_fast_sla_ok', fastSlaOk ? 'true' : 'false');
                      core.setOutput('ops_nightly_runs', String(nightlyRuns.length));
                      core.setOutput('ops_nightly_success_rate_pct', nightlyRate === null ? 'n/a' : nightlyRate.toFixed(2));
                      core.setOutput('ops_nightly_target_ok', nightlyTargetOk ? 'true' : 'false');
                      core.setOutput('ops_incidents_total', String(prodIncidents.length));
                      core.setOutput('ops_incidents_open', String(incidentsOpenExternal.length));
                      core.setOutput('ops_incidents_open_total', String(incidentsOpen.length));
                      core.setOutput('ops_incidents_open_external', String(incidentsOpenExternal.length));
                      core.setOutput('ops_incidents_closed', String(incidentsClosed.length));
                      core.setOutput('ops_incidents_mttr_hours_avg', mttrAvg === null ? 'n/a' : mttrAvg.toFixed(2));
                      core.setOutput('ops_incidents_mttr_target_ok', mttrTargetOk ? 'true' : 'false');
                      core.setOutput('ops_sla_degraded', slaDegraded ? 'true' : 'false');
                      core.setOutput('ops_sla_recovered', slaRecovered ? 'true' : 'false');
                      core.setOutput('ops_sla_failure_axes', opsSlaFailureAxes);
                      core.setOutput('ops_sla_severity', opsSlaSeverity);
