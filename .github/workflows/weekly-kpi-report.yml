name: Weekly KPI Report

on:
    schedule:
        - cron: '0 14 * * 1'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            bench_runs:
                description: 'Muestras por endpoint para benchmark'
                required: false
                default: '15'
                type: string
            fail_on_warnings:
                description: 'Fallar workflow si hay warnings de KPI'
                required: false
                default: true
                type: boolean

concurrency:
    group: weekly-kpi-report
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    weekly-kpi:
        name: Weekly conversion and latency report
        runs-on: windows-latest
        timeout-minutes: 20
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || 'https://pielarmonia.com' }}
            BENCH_RUNS: ${{ github.event.inputs.bench_runs || '15' }}
            FAIL_ON_WARNINGS: ${{ github.event.inputs.fail_on_warnings || 'true' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias Node
              run: npm ci

            - name: Actualizar metricas de agentes
              run: npm run agent:metrics

            - name: Ejecutar reporte semanal
              shell: pwsh
              run: |
                  $benchRuns = [int]$env:BENCH_RUNS
                  if ($benchRuns -lt 5) { $benchRuns = 5 }
                  if ($env:FAIL_ON_WARNINGS -eq 'true') {
                    & ./REPORTE-SEMANAL-PRODUCCION.ps1 -Domain $env:TARGET_DOMAIN -BenchRuns $benchRuns -FailOnWarnings
                  } else {
                    & ./REPORTE-SEMANAL-PRODUCCION.ps1 -Domain $env:TARGET_DOMAIN -BenchRuns $benchRuns
                  }

            - name: Detectar ultimo reporte
              if: ${{ always() }}
              id: report
              shell: pwsh
              run: |
                  $latestJson = Get-ChildItem -Path 'verification/weekly' -Filter 'weekly-report-*.json' -ErrorAction SilentlyContinue |
                    Sort-Object LastWriteTimeUtc -Descending |
                    Select-Object -First 1

                  if (-not $latestJson) {
                    "report_json_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_md_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrence_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrence_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_appointments_total=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_unique_patients=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrent_patients=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_core_p95_max_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_figo_post_p95_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_availability_p95_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    exit 0
                  }

                  $jsonPath = $latestJson.FullName
                  $mdPath = [System.IO.Path]::ChangeExtension($jsonPath, '.md')
                  $warningsCount = 0

                  try {
                    $payload = Get-Content -Path $jsonPath -Raw | ConvertFrom-Json -Depth 10
                    if ($payload.warnings) {
                      $warningsCount = @($payload.warnings).Count
                    }
                    $warningsList = if ($payload.warnings) { (@($payload.warnings) -join ', ') } else { 'none' }

                    $retention = $payload.retention
                    $retentionTrend = $payload.retentionTrend
                    $conversion = $payload.conversion
                    $conversionTrend = $payload.conversionTrend
                    if ($null -eq $conversion -and $null -ne $payload.summary) {
                      $summary = $payload.summary
                      $fallbackStartCheckout = if ($null -ne $summary.startCheckout) { [int]$summary.startCheckout } else { 0 }
                      $fallbackBookingConfirmed = if ($null -ne $summary.bookingConfirmed) { [int]$summary.bookingConfirmed } else { 0 }
                      $fallbackRate = if ($fallbackStartCheckout -gt 0) { [Math]::Round(($fallbackBookingConfirmed / [double]$fallbackStartCheckout) * 100, 2) } else { 0 }
                      $conversion = [pscustomobject]@{
                        startCheckout = $fallbackStartCheckout
                        bookingConfirmed = $fallbackBookingConfirmed
                        bookingConfirmedRatePct = $fallbackRate
                      }
                    }
                    $latency = $payload.latency
                    $conversionStartCheckout = if ($null -ne $conversion) { $conversion.startCheckout } else { 'n/a' }
                    $conversionBookingConfirmed = if ($null -ne $conversion) { $conversion.bookingConfirmed } else { 'n/a' }
                    $conversionRate = if ($null -ne $conversion) { $conversion.bookingConfirmedRatePct } else { 'n/a' }
                    $conversionRateDelta = if ($null -ne $conversionTrend -and $null -ne $conversionTrend.bookingConfirmedRateDeltaPct) { $conversionTrend.bookingConfirmedRateDeltaPct } else { 'n/a' }
                    $noShowRate = if ($null -ne $retention) { $retention.noShowRatePct } else { 'n/a' }
                    $recurrenceRate = if ($null -ne $retention) { $retention.recurrenceRatePct } else { 'n/a' }
                    $appointmentsTotal = if ($null -ne $retention) { $retention.appointmentsTotal } else { 'n/a' }
                    $uniquePatients = if ($null -ne $retention) { $retention.uniquePatients } else { 'n/a' }
                    $recurrentPatients = if ($null -ne $retention) { $retention.recurrentPatients } else { 'n/a' }
                    $noShowRateDelta = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.noShowRateDeltaPct) { $retentionTrend.noShowRateDeltaPct } else { 'n/a' }
                    $recurrenceRateDelta = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.recurrenceRateDeltaPct) { $retentionTrend.recurrenceRateDeltaPct } else { 'n/a' }
                    $coreP95MaxMs = if ($null -ne $latency) { $latency.coreP95MaxMs } else { 'n/a' }
                    $figoPostP95Ms = if ($null -ne $latency) { $latency.figoPostP95Ms } else { 'n/a' }
                    $availabilityBench = $null
                    if ($null -ne $latency -and $latency.bench) {
                      $availabilityBench = @($latency.bench | Where-Object { $_.Name -eq 'availability' } | Select-Object -First 1)[0]
                    }
                    $availabilityP95Ms = if ($null -ne $availabilityBench) { $availabilityBench.P95Ms } else { 'n/a' }
                  } catch {
                    $warningsCount = -1
                    $warningsList = 'n/a'
                    $conversionStartCheckout = 'n/a'
                    $conversionBookingConfirmed = 'n/a'
                    $conversionRate = 'n/a'
                    $conversionRateDelta = 'n/a'
                    $noShowRate = 'n/a'
                    $recurrenceRate = 'n/a'
                    $appointmentsTotal = 'n/a'
                    $uniquePatients = 'n/a'
                    $recurrentPatients = 'n/a'
                    $noShowRateDelta = 'n/a'
                    $recurrenceRateDelta = 'n/a'
                    $coreP95MaxMs = 'n/a'
                    $figoPostP95Ms = 'n/a'
                    $availabilityP95Ms = 'n/a'
                  }

                  "report_json_path=$jsonPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "report_md_path=$mdPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_count=$warningsCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "warnings_list=$warningsList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_start_checkout=$conversionStartCheckout" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_booking_confirmed=$conversionBookingConfirmed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_booking_confirmed_rate_pct=$conversionRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "conversion_booking_confirmed_rate_delta_pct=$conversionRateDelta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_no_show_rate_pct=$noShowRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_recurrence_rate_pct=$recurrenceRate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_no_show_rate_delta_pct=$noShowRateDelta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_recurrence_rate_delta_pct=$recurrenceRateDelta" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_appointments_total=$appointmentsTotal" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_unique_patients=$uniquePatients" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "retention_recurrent_patients=$recurrentPatients" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "latency_core_p95_max_ms=$coreP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "latency_figo_post_p95_ms=$figoPostP95Ms" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "latency_availability_p95_ms=$availabilityP95Ms" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

            - name: Publicar artefactos
              if: ${{ always() && steps.report.outputs.report_json_path != '' }}
              uses: actions/upload-artifact@v4
              with:
                  name: weekly-kpi-report
                  path: |
                      ${{ steps.report.outputs.report_json_path }}
                      ${{ steps.report.outputs.report_md_path }}
                      verification/agent-metrics.json
                  if-no-files-found: warn
                  retention-days: 30

            - name: Resumen
              if: ${{ always() }}
              shell: pwsh
              run: |
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Weekly KPI report"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Dominio: ``$env:TARGET_DOMAIN``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Bench runs: ``$env:BENCH_RUNS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Fail on warnings: ``$env:FAIL_ON_WARNINGS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Warnings count: ``${{ steps.report.outputs.warnings_count }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Warnings: ``${{ steps.report.outputs.warnings_list }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Agent metrics file: ``verification/agent-metrics.json``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Conversion"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- start_checkout: ``${{ steps.report.outputs.conversion_start_checkout }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- booking_confirmed: ``${{ steps.report.outputs.conversion_booking_confirmed }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- booking_confirmed_rate_pct: ``${{ steps.report.outputs.conversion_booking_confirmed_rate_pct }}`` (delta: ``${{ steps.report.outputs.conversion_booking_confirmed_rate_delta_pct }}``)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Latency"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- core_p95_max_ms: ``${{ steps.report.outputs.latency_core_p95_max_ms }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- availability_p95_ms: ``${{ steps.report.outputs.latency_availability_p95_ms }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- figo_post_p95_ms: ``${{ steps.report.outputs.latency_figo_post_p95_ms }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Retention"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- appointments_total: ``${{ steps.report.outputs.retention_appointments_total }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- no_show_rate_pct: ``${{ steps.report.outputs.retention_no_show_rate_pct }}`` (delta: ``${{ steps.report.outputs.retention_no_show_rate_delta_pct }}``)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- recurrence_rate_pct: ``${{ steps.report.outputs.retention_recurrence_rate_pct }}`` (delta: ``${{ steps.report.outputs.retention_recurrence_rate_delta_pct }}``)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- unique_patients: ``${{ steps.report.outputs.retention_unique_patients }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- recurrent_patients: ``${{ steps.report.outputs.retention_recurrent_patients }}``"
                  if ("${{ steps.report.outputs.report_md_path }}" -ne "") {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Report file: ``${{ steps.report.outputs.report_md_path }}``"
                  }

            - name: Crear/actualizar incidente semanal
              if: ${{ failure() && github.event_name == 'schedule' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Weekly KPI report con warnings';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Weekly KPI Report` fallo o detecto warnings en ejecucion programada.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente semanal al recuperar
              if: ${{ success() && github.event_name == 'schedule' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Weekly KPI report con warnings';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por reporte semanal.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);
