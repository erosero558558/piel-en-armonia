name: Weekly KPI Report

on:
    schedule:
        - cron: '0 14 * * 1'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            bench_runs:
                description: 'Muestras por endpoint para benchmark'
                required: false
                default: '15'
                type: string
            fail_on_warnings:
                description: 'Fallar workflow si hay warnings criticos de KPI'
                required: false
                default: true
                type: boolean
            fail_on_cycle_not_ready:
                description: 'Fallar workflow si no se cumplen semanas consecutivas sin warnings criticos'
                required: false
                default: false
                type: boolean
            fail_on_invalid_thresholds:
                description: 'Fallar workflow si detecta umbrales invalidos y aplica defaults/clamp'
                required: false
                default: false
                type: boolean
            retention_days:
                description: 'Ventana de dias para retention-report'
                required: false
                default: '30'
                type: string
            no_show_warn_pct:
                description: 'Umbral no-show (%)'
                required: false
                default: '20'
                type: string
            recurrence_min_warn_pct:
                description: 'Umbral minimo recurrencia (%)'
                required: false
                default: '30'
                type: string
            recurrence_drop_warn_pct:
                description: 'Umbral de caida de recurrencia (pp)'
                required: false
                default: '15'
                type: string
            recurrence_min_unique_patients:
                description: 'Muestra minima para alertar recurrencia'
                required: false
                default: '5'
                type: string
            idempotency_conflict_warn_pct:
                description: 'Umbral conflicto idempotencia (%)'
                required: false
                default: '5'
                type: string
            conversion_min_warn_pct:
                description: 'Umbral minimo conversion booking_confirmed (%)'
                required: false
                default: '25'
                type: string
            conversion_drop_warn_pct:
                description: 'Umbral de caida de conversion (pp)'
                required: false
                default: '15'
                type: string
            conversion_min_start_checkout:
                description: 'Muestra minima start_checkout para alertar conversion'
                required: false
                default: '10'
                type: string
            start_checkout_min_warn_pct:
                description: 'Umbral minimo start_checkout_rate (%)'
                required: false
                default: '0.25'
                type: string
            start_checkout_drop_warn_pct:
                description: 'Umbral de caida start_checkout_rate (pp)'
                required: false
                default: '0.2'
                type: string
            start_checkout_min_view_booking:
                description: 'Muestra minima view_booking para alertar start_checkout_rate'
                required: false
                default: '100'
                type: string
            service_funnel_min_detail_views:
                description: 'Muestra minima de vistas detalle por servicio'
                required: false
                default: '25'
                type: string
            service_funnel_min_checkout_starts:
                description: 'Muestra minima de checkout por servicio'
                required: false
                default: '5'
                type: string
            service_funnel_checkout_to_confirmed_min_warn_pct:
                description: 'Umbral minimo checkout->confirmed (%) por servicio'
                required: false
                default: '35'
                type: string
            service_funnel_detail_to_confirmed_min_warn_pct:
                description: 'Umbral minimo detail->confirmed (%) por servicio'
                required: false
                default: '8'
                type: string
            core_p95_max_ms:
                description: 'Umbral p95 core (ms)'
                required: false
                default: '800'
                type: string
            figo_post_p95_max_ms:
                description: 'Umbral p95 figo-post (ms)'
                required: false
                default: '2500'
                type: string
            max_report_age_hours:
                description: 'Edad maxima permitida del reporte semanal (horas)'
                required: false
                default: '36'
                type: string
            cycle_target_weeks:
                description: 'Semanas consecutivas objetivo sin warnings criticos'
                required: false
                default: '2'
                type: string

concurrency:
    group: weekly-kpi-report
    cancel-in-progress: true

permissions:
    contents: read
    actions: read
    issues: write

jobs:
    weekly-kpi:
        name: Weekly conversion and latency report
        runs-on: windows-latest
        timeout-minutes: 20
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || 'https://pielarmonia.com' }}
            BENCH_RUNS: ${{ github.event.inputs.bench_runs || '15' }}
            FAIL_ON_WARNINGS: ${{ github.event.inputs.fail_on_warnings || 'true' }}
            FAIL_ON_CYCLE_NOT_READY: ${{ github.event.inputs.fail_on_cycle_not_ready || vars.WEEKLY_KPI_FAIL_ON_CYCLE_NOT_READY || 'false' }}
            FAIL_ON_INVALID_THRESHOLDS: ${{ github.event.inputs.fail_on_invalid_thresholds || vars.WEEKLY_KPI_FAIL_ON_INVALID_THRESHOLDS || 'false' }}
            REPORT_RETENTION_DAYS: ${{ github.event.inputs.retention_days || vars.WEEKLY_KPI_RETENTION_DAYS || '30' }}
            REPORT_NO_SHOW_WARN_PCT: ${{ github.event.inputs.no_show_warn_pct || vars.WEEKLY_KPI_NO_SHOW_WARN_PCT || '20' }}
            REPORT_RECURRENCE_MIN_WARN_PCT: ${{ github.event.inputs.recurrence_min_warn_pct || vars.WEEKLY_KPI_RECURRENCE_MIN_WARN_PCT || '30' }}
            REPORT_RECURRENCE_DROP_WARN_PCT: ${{ github.event.inputs.recurrence_drop_warn_pct || vars.WEEKLY_KPI_RECURRENCE_DROP_WARN_PCT || '15' }}
            REPORT_RECURRENCE_MIN_UNIQUE_PATIENTS: ${{ github.event.inputs.recurrence_min_unique_patients || vars.WEEKLY_KPI_RECURRENCE_MIN_UNIQUE_PATIENTS || '5' }}
            REPORT_IDEMPOTENCY_CONFLICT_WARN_PCT: ${{ github.event.inputs.idempotency_conflict_warn_pct || vars.WEEKLY_KPI_IDEMPOTENCY_CONFLICT_WARN_PCT || '5' }}
            REPORT_CONVERSION_MIN_WARN_PCT: ${{ github.event.inputs.conversion_min_warn_pct || vars.WEEKLY_KPI_CONVERSION_MIN_WARN_PCT || '25' }}
            REPORT_CONVERSION_DROP_WARN_PCT: ${{ github.event.inputs.conversion_drop_warn_pct || vars.WEEKLY_KPI_CONVERSION_DROP_WARN_PCT || '15' }}
            REPORT_CONVERSION_MIN_START_CHECKOUT: ${{ github.event.inputs.conversion_min_start_checkout || vars.WEEKLY_KPI_CONVERSION_MIN_START_CHECKOUT || '10' }}
            REPORT_START_CHECKOUT_MIN_WARN_PCT: ${{ github.event.inputs.start_checkout_min_warn_pct || vars.WEEKLY_KPI_START_CHECKOUT_MIN_WARN_PCT || '0.25' }}
            REPORT_START_CHECKOUT_DROP_WARN_PCT: ${{ github.event.inputs.start_checkout_drop_warn_pct || vars.WEEKLY_KPI_START_CHECKOUT_DROP_WARN_PCT || '0.2' }}
            REPORT_START_CHECKOUT_MIN_VIEW_BOOKING: ${{ github.event.inputs.start_checkout_min_view_booking || vars.WEEKLY_KPI_START_CHECKOUT_MIN_VIEW_BOOKING || '100' }}
            REPORT_SERVICE_FUNNEL_MIN_DETAIL_VIEWS: ${{ github.event.inputs.service_funnel_min_detail_views || vars.WEEKLY_KPI_SERVICE_FUNNEL_MIN_DETAIL_VIEWS || '25' }}
            REPORT_SERVICE_FUNNEL_MIN_CHECKOUT_STARTS: ${{ github.event.inputs.service_funnel_min_checkout_starts || vars.WEEKLY_KPI_SERVICE_FUNNEL_MIN_CHECKOUT_STARTS || '5' }}
            REPORT_SERVICE_FUNNEL_CHECKOUT_TO_CONFIRMED_MIN_WARN_PCT: ${{ github.event.inputs.service_funnel_checkout_to_confirmed_min_warn_pct || vars.WEEKLY_KPI_SERVICE_FUNNEL_CHECKOUT_TO_CONFIRMED_MIN_WARN_PCT || '35' }}
            REPORT_SERVICE_FUNNEL_DETAIL_TO_CONFIRMED_MIN_WARN_PCT: ${{ github.event.inputs.service_funnel_detail_to_confirmed_min_warn_pct || vars.WEEKLY_KPI_SERVICE_FUNNEL_DETAIL_TO_CONFIRMED_MIN_WARN_PCT || '8' }}
            REPORT_CORE_P95_MAX_MS: ${{ github.event.inputs.core_p95_max_ms || vars.WEEKLY_KPI_CORE_P95_MAX_MS || '800' }}
            REPORT_FIGO_POST_P95_MAX_MS: ${{ github.event.inputs.figo_post_p95_max_ms || vars.WEEKLY_KPI_FIGO_POST_P95_MAX_MS || '2500' }}
            REPORT_MAX_REPORT_AGE_HOURS: ${{ github.event.inputs.max_report_age_hours || vars.WEEKLY_KPI_MAX_REPORT_AGE_HOURS || '36' }}
            REPORT_CYCLE_TARGET_WEEKS: ${{ github.event.inputs.cycle_target_weeks || vars.WEEKLY_KPI_CYCLE_TARGET_WEEKS || '2' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias Node
              run: npm ci

            - name: Actualizar metricas de agentes
              run: npm run agent:metrics

            - name: Ejecutar reporte semanal
              id: run_report
              shell: pwsh
              run: |
                  function Add-ThresholdWarning {
                    param(
                      [System.Collections.Generic.List[string]]$Warnings,
                      [string]$Message
                    )
                    if ($null -eq $Warnings) { return }
                    if ([string]::IsNullOrWhiteSpace($Message)) { return }
                    $Warnings.Add($Message) | Out-Null
                  }

                  function Parse-IntValue {
                    param(
                      [string]$Name,
                      [string]$Raw,
                      [int]$DefaultValue,
                      [int]$MinValue = 0,
                      [System.Collections.Generic.List[string]]$Warnings
                    )
                    $parsed = $DefaultValue
                    if (-not [string]::IsNullOrWhiteSpace($Raw)) {
                      $tmp = 0
                      if ([int]::TryParse($Raw, [ref]$tmp)) {
                        $parsed = $tmp
                      } else {
                        Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor invalido '$Raw', se usa default $DefaultValue"
                      }
                    }
                    if ($parsed -lt $MinValue) {
                      Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor $parsed menor que minimo $MinValue, se aplica clamp"
                      $parsed = $MinValue
                    }
                    return $parsed
                  }

                  function Parse-DoubleValue {
                    param(
                      [string]$Name,
                      [string]$Raw,
                      [double]$DefaultValue,
                      [double]$MinValue = 0,
                      [System.Collections.Generic.List[string]]$Warnings
                    )
                    $parsed = $DefaultValue
                    if (-not [string]::IsNullOrWhiteSpace($Raw)) {
                      $tmp = 0.0
                      if ([double]::TryParse($Raw, [System.Globalization.NumberStyles]::Float, [System.Globalization.CultureInfo]::InvariantCulture, [ref]$tmp)) {
                        $parsed = $tmp
                      } else {
                        Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor invalido '$Raw', se usa default $DefaultValue"
                      }
                    }
                    if ($parsed -lt $MinValue) {
                      Add-ThresholdWarning -Warnings $Warnings -Message "$Name: valor $parsed menor que minimo $MinValue, se aplica clamp"
                      $parsed = $MinValue
                    }
                    return $parsed
                  }

                  $thresholdWarnings = New-Object System.Collections.Generic.List[string]
                  $failOnInvalidThresholds = "$env:FAIL_ON_INVALID_THRESHOLDS".ToLowerInvariant() -eq 'true'
                  $benchRuns = [int]$env:BENCH_RUNS
                  if ($benchRuns -lt 5) { $benchRuns = 5 }
                  $retentionDays = Parse-IntValue -Name 'retention_days' -Raw $env:REPORT_RETENTION_DAYS -DefaultValue 30 -MinValue 1 -Warnings $thresholdWarnings
                  $coreP95MaxMs = Parse-IntValue -Name 'core_p95_max_ms' -Raw $env:REPORT_CORE_P95_MAX_MS -DefaultValue 800 -MinValue 1 -Warnings $thresholdWarnings
                  $figoPostP95MaxMs = Parse-IntValue -Name 'figo_post_p95_max_ms' -Raw $env:REPORT_FIGO_POST_P95_MAX_MS -DefaultValue 2500 -MinValue 1 -Warnings $thresholdWarnings
                  $maxReportAgeHours = Parse-IntValue -Name 'max_report_age_hours' -Raw $env:REPORT_MAX_REPORT_AGE_HOURS -DefaultValue 36 -MinValue 1 -Warnings $thresholdWarnings
                  $cycleTargetWeeks = Parse-IntValue -Name 'cycle_target_weeks' -Raw $env:REPORT_CYCLE_TARGET_WEEKS -DefaultValue 2 -MinValue 1 -Warnings $thresholdWarnings
                  $noShowWarnPct = Parse-DoubleValue -Name 'no_show_warn_pct' -Raw $env:REPORT_NO_SHOW_WARN_PCT -DefaultValue 20.0 -MinValue 0 -Warnings $thresholdWarnings
                  $idempotencyConflictWarnPct = Parse-DoubleValue -Name 'idempotency_conflict_warn_pct' -Raw $env:REPORT_IDEMPOTENCY_CONFLICT_WARN_PCT -DefaultValue 5.0 -MinValue 0 -Warnings $thresholdWarnings
                  $recurrenceMinWarnPct = Parse-DoubleValue -Name 'recurrence_min_warn_pct' -Raw $env:REPORT_RECURRENCE_MIN_WARN_PCT -DefaultValue 30.0 -MinValue 0 -Warnings $thresholdWarnings
                  $recurrenceDropWarnPct = Parse-DoubleValue -Name 'recurrence_drop_warn_pct' -Raw $env:REPORT_RECURRENCE_DROP_WARN_PCT -DefaultValue 15.0 -MinValue 0 -Warnings $thresholdWarnings
                  $recurrenceMinUniquePatients = Parse-IntValue -Name 'recurrence_min_unique_patients' -Raw $env:REPORT_RECURRENCE_MIN_UNIQUE_PATIENTS -DefaultValue 5 -MinValue 1 -Warnings $thresholdWarnings
                  $conversionMinWarnPct = Parse-DoubleValue -Name 'conversion_min_warn_pct' -Raw $env:REPORT_CONVERSION_MIN_WARN_PCT -DefaultValue 25.0 -MinValue 0 -Warnings $thresholdWarnings
                  $conversionDropWarnPct = Parse-DoubleValue -Name 'conversion_drop_warn_pct' -Raw $env:REPORT_CONVERSION_DROP_WARN_PCT -DefaultValue 15.0 -MinValue 0 -Warnings $thresholdWarnings
                  $conversionMinStartCheckout = Parse-IntValue -Name 'conversion_min_start_checkout' -Raw $env:REPORT_CONVERSION_MIN_START_CHECKOUT -DefaultValue 10 -MinValue 1 -Warnings $thresholdWarnings
                  $startCheckoutMinWarnPct = Parse-DoubleValue -Name 'start_checkout_min_warn_pct' -Raw $env:REPORT_START_CHECKOUT_MIN_WARN_PCT -DefaultValue 0.25 -MinValue 0 -Warnings $thresholdWarnings
                  $startCheckoutDropWarnPct = Parse-DoubleValue -Name 'start_checkout_drop_warn_pct' -Raw $env:REPORT_START_CHECKOUT_DROP_WARN_PCT -DefaultValue 0.2 -MinValue 0 -Warnings $thresholdWarnings
                  $startCheckoutMinViewBooking = Parse-IntValue -Name 'start_checkout_min_view_booking' -Raw $env:REPORT_START_CHECKOUT_MIN_VIEW_BOOKING -DefaultValue 100 -MinValue 1 -Warnings $thresholdWarnings
                  $serviceFunnelMinDetailViews = Parse-IntValue -Name 'service_funnel_min_detail_views' -Raw $env:REPORT_SERVICE_FUNNEL_MIN_DETAIL_VIEWS -DefaultValue 25 -MinValue 1 -Warnings $thresholdWarnings
                  $serviceFunnelMinCheckoutStarts = Parse-IntValue -Name 'service_funnel_min_checkout_starts' -Raw $env:REPORT_SERVICE_FUNNEL_MIN_CHECKOUT_STARTS -DefaultValue 5 -MinValue 1 -Warnings $thresholdWarnings
                  $serviceFunnelCheckoutToConfirmedMinWarnPct = Parse-DoubleValue -Name 'service_funnel_checkout_to_confirmed_min_warn_pct' -Raw $env:REPORT_SERVICE_FUNNEL_CHECKOUT_TO_CONFIRMED_MIN_WARN_PCT -DefaultValue 35.0 -MinValue 0 -Warnings $thresholdWarnings
                  $serviceFunnelDetailToConfirmedMinWarnPct = Parse-DoubleValue -Name 'service_funnel_detail_to_confirmed_min_warn_pct' -Raw $env:REPORT_SERVICE_FUNNEL_DETAIL_TO_CONFIRMED_MIN_WARN_PCT -DefaultValue 8.0 -MinValue 0 -Warnings $thresholdWarnings
                  $thresholdWarningsCount = $thresholdWarnings.Count
                  $thresholdWarningsList = if ($thresholdWarningsCount -gt 0) { @($thresholdWarnings) -join ' | ' } else { 'none' }

                  "effective_retention_days=$retentionDays" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_core_p95_max_ms=$coreP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_figo_post_p95_max_ms=$figoPostP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_max_report_age_hours=$maxReportAgeHours" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_cycle_target_weeks=$cycleTargetWeeks" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_fail_on_cycle_not_ready=$env:FAIL_ON_CYCLE_NOT_READY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_no_show_warn_pct=$noShowWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_min_warn_pct=$recurrenceMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_drop_warn_pct=$recurrenceDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_min_unique_patients=$recurrenceMinUniquePatients" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_idempotency_conflict_warn_pct=$idempotencyConflictWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_min_warn_pct=$conversionMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_drop_warn_pct=$conversionDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_min_start_checkout=$conversionMinStartCheckout" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_min_warn_pct=$startCheckoutMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_drop_warn_pct=$startCheckoutDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_min_view_booking=$startCheckoutMinViewBooking" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_service_funnel_min_detail_views=$serviceFunnelMinDetailViews" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_service_funnel_min_checkout_starts=$serviceFunnelMinCheckoutStarts" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_service_funnel_checkout_to_confirmed_min_warn_pct=$serviceFunnelCheckoutToConfirmedMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_service_funnel_detail_to_confirmed_min_warn_pct=$serviceFunnelDetailToConfirmedMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_fail_on_invalid_thresholds=$failOnInvalidThresholds" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "threshold_warnings_count=$thresholdWarningsCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "threshold_warnings_list=$thresholdWarningsList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

                  if ($failOnInvalidThresholds -and $thresholdWarningsCount -gt 0) {
                    throw "Se detectaron umbrales invalidos ($thresholdWarningsCount): $thresholdWarningsList"
                  }

                  $args = @(
                    '-Domain', $env:TARGET_DOMAIN,
                    '-BenchRuns', $benchRuns,
                    '-RetentionReportDays', $retentionDays,
                    '-CoreP95MaxMs', $coreP95MaxMs,
                    '-FigoPostP95MaxMs', $figoPostP95MaxMs,
                    '-NoShowRateWarnPct', $noShowWarnPct,
                    '-IdempotencyConflictRateWarnPct', $idempotencyConflictWarnPct,
                    '-RecurrenceRateMinWarnPct', $recurrenceMinWarnPct,
                    '-RecurrenceRateDropWarnPct', $recurrenceDropWarnPct,
                    '-RecurrenceWarnMinUniquePatients', $recurrenceMinUniquePatients,
                    '-ConversionRateMinWarnPct', $conversionMinWarnPct,
                    '-ConversionRateDropWarnPct', $conversionDropWarnPct,
                    '-ConversionWarnMinStartCheckout', $conversionMinStartCheckout,
                    '-StartCheckoutRateMinWarnPct', $startCheckoutMinWarnPct,
                    '-StartCheckoutRateDropWarnPct', $startCheckoutDropWarnPct,
                    '-StartCheckoutWarnMinViewBooking', $startCheckoutMinViewBooking,
                    '-ServiceFunnelWarnMinDetailViews', $serviceFunnelMinDetailViews,
                    '-ServiceFunnelWarnMinCheckoutStarts', $serviceFunnelMinCheckoutStarts,
                    '-ServiceFunnelCheckoutToConfirmedMinWarnPct', $serviceFunnelCheckoutToConfirmedMinWarnPct,
                    '-ServiceFunnelDetailToConfirmedMinWarnPct', $serviceFunnelDetailToConfirmedMinWarnPct,
                    '-CriticalFreeCycleTarget', $cycleTargetWeeks
                  )

                  if ($env:FAIL_ON_WARNINGS -eq 'true') {
                    $args += '-FailOnCriticalWarnings'
                  } else {
                    Write-Host 'FailOnCriticalWarnings desactivado para esta corrida.'
                  }
                  if ($env:FAIL_ON_CYCLE_NOT_READY -eq 'true') {
                    $args += '-FailOnCycleNotReady'
                  } else {
                    Write-Host 'FailOnCycleNotReady desactivado para esta corrida.'
                  }
                  & ./REPORTE-SEMANAL-PRODUCCION.ps1 @args

            - name: Detectar ultimo reporte
              if: ${{ always() }}
              id: report
              shell: pwsh
              run: |
                  $latestJson = Get-ChildItem -Path 'verification/weekly' -Filter 'weekly-report-*.json' -ErrorAction SilentlyContinue |
                    Sort-Object LastWriteTimeUtc -Descending |
                    Select-Object -First 1

                  if (-not $latestJson) {
                    "report_json_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_md_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_generated_at_utc=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_age_hours=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_stale=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_non_critical_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_non_critical_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "weekly_cycle_target=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "weekly_cycle_consecutive_no_critical=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "weekly_cycle_ready=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "weekly_cycle_status=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "weekly_cycle_reason=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "weekly_cycle_last_critical_generated_at=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_count_int=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_alert_data_valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_required=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_recovered=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_reason_codes=report_missing,warnings_invalid" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_incident_severity=critical" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "general_signal_key=missing_report" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_view_booking=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrence_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
