name: Weekly KPI Report

on:
    schedule:
        - cron: '0 14 * * 1'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            bench_runs:
                description: 'Muestras por endpoint para benchmark'
                required: false
                default: '15'
                type: string
            fail_on_warnings:
                description: 'Fallar workflow si hay warnings criticos de KPI'
                required: false
                default: true
                type: boolean
            retention_days:
                description: 'Ventana de dias para retention-report'
                required: false
                default: '30'
                type: string
            no_show_warn_pct:
                description: 'Umbral no-show (%)'
                required: false
                default: '20'
                type: string
            recurrence_min_warn_pct:
                description: 'Umbral minimo recurrencia (%)'
                required: false
                default: '30'
                type: string
            recurrence_drop_warn_pct:
                description: 'Umbral de caida de recurrencia (pp)'
                required: false
                default: '15'
                type: string
            recurrence_min_unique_patients:
                description: 'Muestra minima para alertar recurrencia'
                required: false
                default: '5'
                type: string
            idempotency_conflict_warn_pct:
                description: 'Umbral conflicto idempotencia (%)'
                required: false
                default: '5'
                type: string
            conversion_min_warn_pct:
                description: 'Umbral minimo conversion booking_confirmed (%)'
                required: false
                default: '25'
                type: string
            conversion_drop_warn_pct:
                description: 'Umbral de caida de conversion (pp)'
                required: false
                default: '15'
                type: string
            conversion_min_start_checkout:
                description: 'Muestra minima start_checkout para alertar conversion'
                required: false
                default: '10'
                type: string
            start_checkout_min_warn_pct:
                description: 'Umbral minimo start_checkout_rate (%)'
                required: false
                default: '0.25'
                type: string
            start_checkout_drop_warn_pct:
                description: 'Umbral de caida start_checkout_rate (pp)'
                required: false
                default: '0.2'
                type: string
            start_checkout_min_view_booking:
                description: 'Muestra minima view_booking para alertar start_checkout_rate'
                required: false
                default: '100'
                type: string
            core_p95_max_ms:
                description: 'Umbral p95 core (ms)'
                required: false
                default: '800'
                type: string
            figo_post_p95_max_ms:
                description: 'Umbral p95 figo-post (ms)'
                required: false
                default: '2500'
                type: string

concurrency:
    group: weekly-kpi-report
    cancel-in-progress: true

permissions:
    contents: read
    actions: read
    issues: write

jobs:
    weekly-kpi:
        name: Weekly conversion and latency report
        runs-on: windows-latest
        timeout-minutes: 20
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || 'https://pielarmonia.com' }}
            BENCH_RUNS: ${{ github.event.inputs.bench_runs || '15' }}
            FAIL_ON_WARNINGS: ${{ github.event.inputs.fail_on_warnings || 'true' }}
            REPORT_RETENTION_DAYS: ${{ github.event.inputs.retention_days || vars.WEEKLY_KPI_RETENTION_DAYS || '30' }}
            REPORT_NO_SHOW_WARN_PCT: ${{ github.event.inputs.no_show_warn_pct || vars.WEEKLY_KPI_NO_SHOW_WARN_PCT || '20' }}
            REPORT_RECURRENCE_MIN_WARN_PCT: ${{ github.event.inputs.recurrence_min_warn_pct || vars.WEEKLY_KPI_RECURRENCE_MIN_WARN_PCT || '30' }}
            REPORT_RECURRENCE_DROP_WARN_PCT: ${{ github.event.inputs.recurrence_drop_warn_pct || vars.WEEKLY_KPI_RECURRENCE_DROP_WARN_PCT || '15' }}
            REPORT_RECURRENCE_MIN_UNIQUE_PATIENTS: ${{ github.event.inputs.recurrence_min_unique_patients || vars.WEEKLY_KPI_RECURRENCE_MIN_UNIQUE_PATIENTS || '5' }}
            REPORT_IDEMPOTENCY_CONFLICT_WARN_PCT: ${{ github.event.inputs.idempotency_conflict_warn_pct || vars.WEEKLY_KPI_IDEMPOTENCY_CONFLICT_WARN_PCT || '5' }}
            REPORT_CONVERSION_MIN_WARN_PCT: ${{ github.event.inputs.conversion_min_warn_pct || vars.WEEKLY_KPI_CONVERSION_MIN_WARN_PCT || '25' }}
            REPORT_CONVERSION_DROP_WARN_PCT: ${{ github.event.inputs.conversion_drop_warn_pct || vars.WEEKLY_KPI_CONVERSION_DROP_WARN_PCT || '15' }}
            REPORT_CONVERSION_MIN_START_CHECKOUT: ${{ github.event.inputs.conversion_min_start_checkout || vars.WEEKLY_KPI_CONVERSION_MIN_START_CHECKOUT || '10' }}
            REPORT_START_CHECKOUT_MIN_WARN_PCT: ${{ github.event.inputs.start_checkout_min_warn_pct || vars.WEEKLY_KPI_START_CHECKOUT_MIN_WARN_PCT || '0.25' }}
            REPORT_START_CHECKOUT_DROP_WARN_PCT: ${{ github.event.inputs.start_checkout_drop_warn_pct || vars.WEEKLY_KPI_START_CHECKOUT_DROP_WARN_PCT || '0.2' }}
            REPORT_START_CHECKOUT_MIN_VIEW_BOOKING: ${{ github.event.inputs.start_checkout_min_view_booking || vars.WEEKLY_KPI_START_CHECKOUT_MIN_VIEW_BOOKING || '100' }}
            REPORT_CORE_P95_MAX_MS: ${{ github.event.inputs.core_p95_max_ms || vars.WEEKLY_KPI_CORE_P95_MAX_MS || '800' }}
            REPORT_FIGO_POST_P95_MAX_MS: ${{ github.event.inputs.figo_post_p95_max_ms || vars.WEEKLY_KPI_FIGO_POST_P95_MAX_MS || '2500' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias Node
              run: npm ci

            - name: Actualizar metricas de agentes
              run: npm run agent:metrics

            - name: Ejecutar reporte semanal
              id: run_report
              shell: pwsh
              run: |
                  function Parse-IntValue {
                    param(
                      [string]$Raw,
                      [int]$DefaultValue,
                      [int]$MinValue = 0
                    )
                    $parsed = $DefaultValue
                    if (-not [string]::IsNullOrWhiteSpace($Raw)) {
                      $tmp = 0
                      if ([int]::TryParse($Raw, [ref]$tmp)) {
                        $parsed = $tmp
                      }
                    }
                    if ($parsed -lt $MinValue) { $parsed = $MinValue }
                    return $parsed
                  }

                  function Parse-DoubleValue {
                    param(
                      [string]$Raw,
                      [double]$DefaultValue,
                      [double]$MinValue = 0
                    )
                    $parsed = $DefaultValue
                    if (-not [string]::IsNullOrWhiteSpace($Raw)) {
                      $tmp = 0.0
                      if ([double]::TryParse($Raw, [System.Globalization.NumberStyles]::Float, [System.Globalization.CultureInfo]::InvariantCulture, [ref]$tmp)) {
                        $parsed = $tmp
                      }
                    }
                    if ($parsed -lt $MinValue) { $parsed = $MinValue }
                    return $parsed
                  }

                  $benchRuns = [int]$env:BENCH_RUNS
                  if ($benchRuns -lt 5) { $benchRuns = 5 }
                  $retentionDays = Parse-IntValue -Raw $env:REPORT_RETENTION_DAYS -DefaultValue 30 -MinValue 1
                  $coreP95MaxMs = Parse-IntValue -Raw $env:REPORT_CORE_P95_MAX_MS -DefaultValue 800 -MinValue 1
                  $figoPostP95MaxMs = Parse-IntValue -Raw $env:REPORT_FIGO_POST_P95_MAX_MS -DefaultValue 2500 -MinValue 1
                  $noShowWarnPct = Parse-DoubleValue -Raw $env:REPORT_NO_SHOW_WARN_PCT -DefaultValue 20.0 -MinValue 0
                  $idempotencyConflictWarnPct = Parse-DoubleValue -Raw $env:REPORT_IDEMPOTENCY_CONFLICT_WARN_PCT -DefaultValue 5.0 -MinValue 0
                  $recurrenceMinWarnPct = Parse-DoubleValue -Raw $env:REPORT_RECURRENCE_MIN_WARN_PCT -DefaultValue 30.0 -MinValue 0
                  $recurrenceDropWarnPct = Parse-DoubleValue -Raw $env:REPORT_RECURRENCE_DROP_WARN_PCT -DefaultValue 15.0 -MinValue 0
                  $recurrenceMinUniquePatients = Parse-IntValue -Raw $env:REPORT_RECURRENCE_MIN_UNIQUE_PATIENTS -DefaultValue 5 -MinValue 1
                  $conversionMinWarnPct = Parse-DoubleValue -Raw $env:REPORT_CONVERSION_MIN_WARN_PCT -DefaultValue 25.0 -MinValue 0
                  $conversionDropWarnPct = Parse-DoubleValue -Raw $env:REPORT_CONVERSION_DROP_WARN_PCT -DefaultValue 15.0 -MinValue 0
                  $conversionMinStartCheckout = Parse-IntValue -Raw $env:REPORT_CONVERSION_MIN_START_CHECKOUT -DefaultValue 10 -MinValue 1
                  $startCheckoutMinWarnPct = Parse-DoubleValue -Raw $env:REPORT_START_CHECKOUT_MIN_WARN_PCT -DefaultValue 0.25 -MinValue 0
                  $startCheckoutDropWarnPct = Parse-DoubleValue -Raw $env:REPORT_START_CHECKOUT_DROP_WARN_PCT -DefaultValue 0.2 -MinValue 0
                  $startCheckoutMinViewBooking = Parse-IntValue -Raw $env:REPORT_START_CHECKOUT_MIN_VIEW_BOOKING -DefaultValue 100 -MinValue 1

                  "effective_retention_days=$retentionDays" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_core_p95_max_ms=$coreP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_figo_post_p95_max_ms=$figoPostP95MaxMs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_no_show_warn_pct=$noShowWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_min_warn_pct=$recurrenceMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_drop_warn_pct=$recurrenceDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_recurrence_min_unique_patients=$recurrenceMinUniquePatients" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_idempotency_conflict_warn_pct=$idempotencyConflictWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_min_warn_pct=$conversionMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_drop_warn_pct=$conversionDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_conversion_min_start_checkout=$conversionMinStartCheckout" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_min_warn_pct=$startCheckoutMinWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_drop_warn_pct=$startCheckoutDropWarnPct" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                  "effective_start_checkout_min_view_booking=$startCheckoutMinViewBooking" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

                  $args = @(
                    '-Domain', $env:TARGET_DOMAIN,
                    '-BenchRuns', $benchRuns,
                    '-RetentionReportDays', $retentionDays,
                    '-CoreP95MaxMs', $coreP95MaxMs,
                    '-FigoPostP95MaxMs', $figoPostP95MaxMs,
                    '-NoShowRateWarnPct', $noShowWarnPct,
                    '-IdempotencyConflictRateWarnPct', $idempotencyConflictWarnPct,
                    '-RecurrenceRateMinWarnPct', $recurrenceMinWarnPct,
                    '-RecurrenceRateDropWarnPct', $recurrenceDropWarnPct,
                    '-RecurrenceWarnMinUniquePatients', $recurrenceMinUniquePatients,
                    '-ConversionRateMinWarnPct', $conversionMinWarnPct,
                    '-ConversionRateDropWarnPct', $conversionDropWarnPct,
                    '-ConversionWarnMinStartCheckout', $conversionMinStartCheckout,
                    '-StartCheckoutRateMinWarnPct', $startCheckoutMinWarnPct,
                    '-StartCheckoutRateDropWarnPct', $startCheckoutDropWarnPct,
                    '-StartCheckoutWarnMinViewBooking', $startCheckoutMinViewBooking
                  )

                  if ($env:FAIL_ON_WARNINGS -eq 'true') {
                    $args += '-FailOnCriticalWarnings'
                  } else {
                    Write-Host 'FailOnCriticalWarnings desactivado para esta corrida.'
                  }
                  & ./REPORTE-SEMANAL-PRODUCCION.ps1 @args

            - name: Detectar ultimo reporte
              if: ${{ always() }}
              id: report
              shell: pwsh
              run: |
                  $latestJson = Get-ChildItem -Path 'verification/weekly' -Filter 'weekly-report-*.json' -ErrorAction SilentlyContinue |
                    Sort-Object LastWriteTimeUtc -Descending |
                    Select-Object -First 1

                  if (-not $latestJson) {
                    "report_json_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "report_md_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_critical_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_non_critical_count=-1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "warnings_non_critical_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_view_booking=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_start_checkout_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "conversion_booking_confirmed_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrence_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_no_show_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrence_rate_delta_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_trend_ready=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_source=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_generated_at=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_no_show_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_baseline_recurrence_rate_pct=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_appointments_total=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_unique_patients=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_recurrent_patients=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_source=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_count=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_warn_count=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_critical_count=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "retention_report_alert_list=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_core_p95_max_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_figo_post_p95_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    "latency_availability_p95_ms=n/a" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
                    exit 0
                  }

                  $jsonPath = $latestJson.FullName
                  $mdPath = [System.IO.Path]::ChangeExtension($jsonPath, '.md')
                  $warningsCount = 0
                  $warningsCriticalCount = 0
                  $warningsNonCriticalCount = 0
                  $warningsCriticalList = 'none'
                  $warningsNonCriticalList = 'none'

                  try {
                    $payload = Get-Content -Path $jsonPath -Raw | ConvertFrom-Json -Depth 10
                    if ($payload.warnings) {
                      $warningsCount = @($payload.warnings).Count
                    }
                    $warningsList = if ($payload.warnings) { (@($payload.warnings) -join ', ') } else { 'none' }
                    if ($null -ne $payload.warningCounts) {
                      if ($null -ne $payload.warningCounts.critical) { $warningsCriticalCount = [int]$payload.warningCounts.critical }
                      if ($null -ne $payload.warningCounts.nonCritical) { $warningsNonCriticalCount = [int]$payload.warningCounts.nonCritical }
                    } elseif ($null -ne $payload.warningsBySeverity) {
                      $warningsCriticalCount = if ($payload.warningsBySeverity.critical) { @($payload.warningsBySeverity.critical).Count } else { 0 }
                      $warningsNonCriticalCount = if ($payload.warningsBySeverity.nonCritical) { @($payload.warningsBySeverity.nonCritical).Count } else { 0 }
                    } elseif ($payload.warnings) {
                      # Fallback conservador para reportes viejos sin severidad.
                      $warningsCriticalCount = @($payload.warnings).Count
                      $warningsNonCriticalCount = 0
                    }
                    if ($null -ne $payload.warningsBySeverity) {
                      $warningsCriticalList = if ($payload.warningsBySeverity.critical) { (@($payload.warningsBySeverity.critical) -join ', ') } else { 'none' }
                      $warningsNonCriticalList = if ($payload.warningsBySeverity.nonCritical) { (@($payload.warningsBySeverity.nonCritical) -join ', ') } else { 'none' }
                    } else {
                      $warningsCriticalList = $warningsList
                      $warningsNonCriticalList = 'none'
                    }

                    $retention = $payload.retention
                    $retentionTrend = $payload.retentionTrend
                    $retentionBaseline = $payload.retentionBaseline
                    $retentionReport = $payload.retentionReport
                    $conversion = $payload.conversion
                    $conversionTrend = $payload.conversionTrend
                    if ($null -eq $conversion -and $null -ne $payload.summary) {
                      $summary = $payload.summary
                      $fallbackViewBooking = if ($null -ne $summary.viewBooking) { [int]$summary.viewBooking } else { 0 }
                      $fallbackStartCheckout = if ($null -ne $summary.startCheckout) { [int]$summary.startCheckout } else { 0 }
                      $fallbackBookingConfirmed = if ($null -ne $summary.bookingConfirmed) { [int]$summary.bookingConfirmed } else { 0 }
                      $fallbackStartCheckoutRate = if ($fallbackViewBooking -gt 0) { [Math]::Round(($fallbackStartCheckout / [double]$fallbackViewBooking) * 100, 2) } else { 0 }
                      $fallbackRate = if ($fallbackStartCheckout -gt 0) { [Math]::Round(($fallbackBookingConfirmed / [double]$fallbackStartCheckout) * 100, 2) } else { 0 }
                      $conversion = [pscustomobject]@{
                        viewBooking = $fallbackViewBooking
                        startCheckout = $fallbackStartCheckout
                        startCheckoutRatePct = $fallbackStartCheckoutRate
                        bookingConfirmed = $fallbackBookingConfirmed
                        bookingConfirmedRatePct = $fallbackRate
                      }
                    }
                    $latency = $payload.latency
                    $conversionViewBooking = if ($null -ne $conversion) { $conversion.viewBooking } else { 'n/a' }
                    $conversionStartCheckout = if ($null -ne $conversion) { $conversion.startCheckout } else { 'n/a' }
                    $conversionStartCheckoutRate = if ($null -ne $conversion) { $conversion.startCheckoutRatePct } else { 'n/a' }
                    $conversionStartCheckoutRateDelta = if ($null -ne $conversionTrend -and $null -ne $conversionTrend.startCheckoutRateDeltaPct) { $conversionTrend.startCheckoutRateDeltaPct } else { 'n/a' }
                    $conversionBookingConfirmed = if ($null -ne $conversion) { $conversion.bookingConfirmed } else { 'n/a' }
                    $conversionRate = if ($null -ne $conversion) { $conversion.bookingConfirmedRatePct } else { 'n/a' }
                    $conversionRateDelta = if ($null -ne $conversionTrend -and $null -ne $conversionTrend.bookingConfirmedRateDeltaPct) { $conversionTrend.bookingConfirmedRateDeltaPct } else { 'n/a' }
                    $noShowRate = if ($null -ne $retention) { $retention.noShowRatePct } else { 'n/a' }
                    $recurrenceRate = if ($null -ne $retention) { $retention.recurrenceRatePct } else { 'n/a' }
                    $appointmentsTotal = if ($null -ne $retention) { $retention.appointmentsTotal } else { 'n/a' }
                    $uniquePatients = if ($null -ne $retention) { $retention.uniquePatients } else { 'n/a' }
                    $recurrentPatients = if ($null -ne $retention) { $retention.recurrentPatients } else { 'n/a' }
                    $noShowRateDelta = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.noShowRateDeltaPct) { $retentionTrend.noShowRateDeltaPct } else { 'n/a' }
                    $recurrenceRateDelta = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.recurrenceRateDeltaPct) { $retentionTrend.recurrenceRateDeltaPct } else { 'n/a' }
                    $retentionTrendReady = if ($null -ne $retentionTrend -and $null -ne $retentionTrend.trendReady) { $retentionTrend.trendReady } else { 'n/a' }
                    $retentionBaselineSource = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.source) { $retentionBaseline.source } else { 'n/a' }
                    $retentionBaselineGeneratedAt = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.generatedAt) { $retentionBaseline.generatedAt } else { 'n/a' }
                    $retentionBaselineNoShowRate = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.noShowRatePct) { $retentionBaseline.noShowRatePct } else { 'n/a' }
                    $retentionBaselineRecurrenceRate = if ($null -ne $retentionBaseline -and $null -ne $retentionBaseline.recurrenceRatePct) { $retentionBaseline.recurrenceRatePct } else { 'n/a' }
                    $retentionReportSource = if ($null -ne $retentionReport -and $null -ne $retentionReport.source) { $retentionReport.source } else { 'n/a' }
                    $retentionReportAlertCount = if ($null -ne $retentionReport -and $null -ne $retentionReport.alertCounts -and $null -ne $retentionReport.alertCounts.total) { [int]$retentionReport.alertCounts.total } else { 0 }
                    $retentionReportAlertWarnCount = if ($null -ne $retentionReport -and $null -ne $retentionReport.alertCounts -and $null -ne $retentionReport.alertCounts.warn) { [int]$retentionReport.alertCounts.warn } else { 0 }
                    $retentionReportAlertCriticalCount = if ($null -ne $retentionReport -and $null -ne $retentionReport.alertCounts -and $null -ne $retentionReport.alertCounts.critical) { [int]$retentionReport.alertCounts.critical } else { 0 }
                    $retentionReportAlerts = if ($null -ne $retentionReport -and $retentionReport.alerts) { @($retentionReport.alerts) } else { @() }
                    $retentionReportAlertList = if ($retentionReportAlerts.Count -gt 0) {
                      @(
                        $retentionReportAlerts | ForEach-Object {
                          $code = if ($null -ne $_.code) { [string]$_.code } else { 'unknown_alert' }
                          $severity = if ($null -ne $_.severity) { [string]$_.severity } else { 'warn' }
                          $actualPct = if ($null -ne $_.actualPct) { [string]$_.actualPct } else { 'n/a' }
                          $thresholdPct = if ($null -ne $_.thresholdPct) { [string]$_.thresholdPct } else { 'n/a' }
                          "$code(actual:$actualPct threshold:$thresholdPct severity:$severity)"
                        }
                      ) -join '; '
                    } else {
                      'none'
                    }
                    $coreP95MaxMs = if ($null -ne $latency) { $latency.coreP95MaxMs } else { 'n/a' }
                    $figoPostP95Ms = if ($null -ne $latency) { $latency.figoPostP95Ms } else { 'n/a' }
                    $availabilityBench = $null
                    if ($null -ne $latency -and $latency.bench) {
                      $availabilityBench = @($latency.bench | Where-Object { $_.Name -eq 'availability' } | Select-Object -First 1)[0]
                    }
                    $availabilityP95Ms = if ($null -ne $availabilityBench) { $availabilityBench.P95Ms } else { 'n/a' }
                  } catch {
                    $warningsCount = -1
                    $warningsList = 'n/a'
                    $warningsCriticalCount = -1
                    $warningsNonCriticalCount = -1
                    $warningsCriticalList = 'n/a'
                    $warningsNonCriticalList = 'n/a'
                    $conversionViewBooking = 'n/a'
