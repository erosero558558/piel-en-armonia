                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- fast_runs: ``${{ steps.ops_sla.outputs.ops_fast_runs }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- fast_success_rate_pct: ``${{ steps.ops_sla.outputs.ops_fast_success_rate_pct }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- fast_p95_min: ``${{ steps.ops_sla.outputs.ops_fast_p95_min }}`` (target <=10m, ok: ``${{ steps.ops_sla.outputs.ops_fast_sla_ok }}``)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- nightly_runs: ``${{ steps.ops_sla.outputs.ops_nightly_runs }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- nightly_success_rate_pct: ``${{ steps.ops_sla.outputs.ops_nightly_success_rate_pct }}`` (target >=90%, ok: ``${{ steps.ops_sla.outputs.ops_nightly_target_ok }}``)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- incidents_total: ``${{ steps.ops_sla.outputs.ops_incidents_total }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- incidents_open_external: ``${{ steps.ops_sla.outputs.ops_incidents_open_external }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- incidents_open_total: ``${{ steps.ops_sla.outputs.ops_incidents_open_total }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- incidents_closed: ``${{ steps.ops_sla.outputs.ops_incidents_closed }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- incidents_mttr_hours_avg: ``${{ steps.ops_sla.outputs.ops_incidents_mttr_hours_avg }}`` (target <4h, ok: ``${{ steps.ops_sla.outputs.ops_incidents_mttr_target_ok }}``)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ops_sla_degraded: ``${{ steps.ops_sla.outputs.ops_sla_degraded }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ops_sla_recovered: ``${{ steps.ops_sla.outputs.ops_sla_recovered }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ops_sla_failure_axes: ``${{ steps.ops_sla.outputs.ops_sla_failure_axes }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ops_sla_severity: ``${{ steps.ops_sla.outputs.ops_sla_severity }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- ops_sla_signal_key: ``${{ steps.ops_sla.outputs.ops_sla_signal_key }}``"
                  if ("${{ steps.report.outputs.report_md_path }}" -ne "") {
                    Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Report file: ``${{ steps.report.outputs.report_md_path }}``"
                  }

            - name: Crear/actualizar incidente semanal general
              if: ${{ github.event_name == 'schedule' && steps.report.outputs.general_incident_required == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Weekly KPI report con warnings';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = '${{ steps.report.outputs.general_signal_key }}';
                      const signalMarker = `<!-- weekly-general-signal:${signal} -->`;
                      const incidentSeverity = '${{ steps.report.outputs.general_incident_severity }}' || 'warning';
                      const severityLabel = incidentSeverity === 'critical' ? 'severity:critical' : 'severity:warning';
                      const baseLabels = ['production-alert', 'weekly-kpi', severityLabel];
                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const buildMergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };
                      const incidentBody = [
                        'El workflow `Weekly KPI Report` fallo o detecto warnings criticos en ejecucion programada.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- warnings_count: ${{ steps.report.outputs.warnings_count }}`,
                        `- warnings_critical_count: ${{ steps.report.outputs.warnings_critical_count }}`,
                        `- warnings_non_critical_count: ${{ steps.report.outputs.warnings_non_critical_count }}`,
                        `- warnings_critical_list: ${{ steps.report.outputs.warnings_critical_list }}`,
                        `- warnings_non_critical_list: ${{ steps.report.outputs.warnings_non_critical_list }}`,
                        `- report_generated_at_utc: ${{ steps.report.outputs.report_generated_at_utc }}`,
                        `- report_age_hours: ${{ steps.report.outputs.report_age_hours }}`,
                        `- report_stale: ${{ steps.report.outputs.report_stale }}`,
                        `- general_incident_reason_codes: ${{ steps.report.outputs.general_incident_reason_codes }}`,
                        `- general_incident_severity: ${{ steps.report.outputs.general_incident_severity }}`,
                        `- general_signal_key: ${{ steps.report.outputs.general_signal_key }}`,
                        '',
                        'Thresholds efectivos en esta corrida:',
                        `- retention_days: ${{ steps.run_report.outputs.effective_retention_days }}`,
                        `- core_p95_max_ms: ${{ steps.run_report.outputs.effective_core_p95_max_ms }}`,
                        `- figo_post_p95_max_ms: ${{ steps.run_report.outputs.effective_figo_post_p95_max_ms }}`,
                        `- max_report_age_hours: ${{ steps.run_report.outputs.effective_max_report_age_hours }}`,
                        `- no_show_warn_pct: ${{ steps.run_report.outputs.effective_no_show_warn_pct }}`,
                        `- recurrence_min_warn_pct: ${{ steps.run_report.outputs.effective_recurrence_min_warn_pct }}`,
                        `- recurrence_drop_warn_pct: ${{ steps.run_report.outputs.effective_recurrence_drop_warn_pct }}`,
                        `- recurrence_min_unique_patients: ${{ steps.run_report.outputs.effective_recurrence_min_unique_patients }}`,
                        `- idempotency_conflict_warn_pct: ${{ steps.run_report.outputs.effective_idempotency_conflict_warn_pct }}`,
                        `- conversion_min_warn_pct: ${{ steps.run_report.outputs.effective_conversion_min_warn_pct }}`,
                        `- conversion_drop_warn_pct: ${{ steps.run_report.outputs.effective_conversion_drop_warn_pct }}`,
                        `- conversion_min_start_checkout: ${{ steps.run_report.outputs.effective_conversion_min_start_checkout }}`,
                        `- start_checkout_min_warn_pct: ${{ steps.run_report.outputs.effective_start_checkout_min_warn_pct }}`,
                        `- start_checkout_drop_warn_pct: ${{ steps.run_report.outputs.effective_start_checkout_drop_warn_pct }}`,
                        `- start_checkout_min_view_booking: ${{ steps.run_report.outputs.effective_start_checkout_min_view_booking }}`,
                        `- threshold_warnings_count: ${{ steps.run_report.outputs.threshold_warnings_count }}`,
                        `- threshold_warnings_list: ${{ steps.run_report.outputs.threshold_warnings_list }}`,
                        '',
                        `- fast_runs_last_${{ steps.ops_sla.outputs.lookback_days }}d: ${{ steps.ops_sla.outputs.ops_fast_runs }}`,
                        `- fast_success_rate_pct: ${{ steps.ops_sla.outputs.ops_fast_success_rate_pct }}`,
                        `- fast_p95_min: ${{ steps.ops_sla.outputs.ops_fast_p95_min }}`,
                        `- fast_sla_ok: ${{ steps.ops_sla.outputs.ops_fast_sla_ok }}`,
                        `- nightly_runs_last_${{ steps.ops_sla.outputs.lookback_days }}d: ${{ steps.ops_sla.outputs.ops_nightly_runs }}`,
                        `- nightly_success_rate_pct: ${{ steps.ops_sla.outputs.ops_nightly_success_rate_pct }}`,
                        `- nightly_target_ok: ${{ steps.ops_sla.outputs.ops_nightly_target_ok }}`,
                        `- incidents_total_last_${{ steps.ops_sla.outputs.lookback_days }}d: ${{ steps.ops_sla.outputs.ops_incidents_total }}`,
                        `- incidents_open_external: ${{ steps.ops_sla.outputs.ops_incidents_open_external }}`,
                        `- incidents_open_total: ${{ steps.ops_sla.outputs.ops_incidents_open_total }}`,
                        `- incidents_closed: ${{ steps.ops_sla.outputs.ops_incidents_closed }}`,
                        `- incidents_mttr_hours_avg: ${{ steps.ops_sla.outputs.ops_incidents_mttr_hours_avg }}`,
                        `- incidents_mttr_target_ok: ${{ steps.ops_sla.outputs.ops_incidents_mttr_target_ok }}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const mergedLabels = buildMergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), mergedLabels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels: mergedLabels
                            });
                            core.info(`Issue general actualizo labels de severidad: #${existing.number}`);
                          }
                          core.info(`Issue general ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels: mergedLabels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente general actualizado por cambio de senal semanal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- warnings_critical_count: ${{ steps.report.outputs.warnings_critical_count }}`,
                            `- warnings_critical_list: ${{ steps.report.outputs.warnings_critical_list }}`,
                            `- report_stale: ${{ steps.report.outputs.report_stale }}`,
                            `- general_incident_reason_codes: ${{ steps.report.outputs.general_incident_reason_codes }}`,
                            `- general_incident_severity: ${{ steps.report.outputs.general_incident_severity }}`,
                            `- general_signal_key: ${{ steps.report.outputs.general_signal_key }}`
                          ].join('\n')
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: incidentBody,
                          labels: baseLabels
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente semanal general al recuperar
              if: ${{ success() && github.event_name == 'schedule' && steps.report.outputs.general_incident_recovered == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Weekly KPI report con warnings';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por reporte semanal.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);

            - name: Crear/actualizar incidente semanal de SLA operativo
              if: ${{ github.event_name == 'schedule' && steps.ops_sla.outputs.ops_sla_degraded == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Weekly KPI SLA operativo degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = '${{ steps.ops_sla.outputs.ops_sla_signal_key }}';
                      const signalMarker = `<!-- weekly-sla-signal:${signal} -->`;
                      const incidentSeverity = '${{ steps.ops_sla.outputs.ops_sla_severity }}' || 'warning';
                      const severityLabel = incidentSeverity === 'critical' ? 'severity:critical' : 'severity:warning';
                      const baseLabels = ['production-alert', 'weekly-kpi', 'ops-sla', severityLabel];
                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const buildMergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };
                      const incidentBody = [
                        'El workflow `Weekly KPI Report` detecto degradacion de SLA operativo en la ventana semanal.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- fast_runs_last_${{ steps.ops_sla.outputs.lookback_days }}d: ${{ steps.ops_sla.outputs.ops_fast_runs }}`,
                        `- fast_success_rate_pct: ${{ steps.ops_sla.outputs.ops_fast_success_rate_pct }}`,
                        `- fast_p95_min: ${{ steps.ops_sla.outputs.ops_fast_p95_min }}`,
                        `- fast_sla_ok: ${{ steps.ops_sla.outputs.ops_fast_sla_ok }}`,
                        `- nightly_runs_last_${{ steps.ops_sla.outputs.lookback_days }}d: ${{ steps.ops_sla.outputs.ops_nightly_runs }}`,
                        `- nightly_success_rate_pct: ${{ steps.ops_sla.outputs.ops_nightly_success_rate_pct }}`,
                        `- nightly_target_ok: ${{ steps.ops_sla.outputs.ops_nightly_target_ok }}`,
                        `- incidents_total_last_${{ steps.ops_sla.outputs.lookback_days }}d: ${{ steps.ops_sla.outputs.ops_incidents_total }}`,
                        `- incidents_open_external: ${{ steps.ops_sla.outputs.ops_incidents_open_external }}`,
                        `- incidents_open_total: ${{ steps.ops_sla.outputs.ops_incidents_open_total }}`,
                        `- incidents_closed: ${{ steps.ops_sla.outputs.ops_incidents_closed }}`,
                        `- incidents_mttr_hours_avg: ${{ steps.ops_sla.outputs.ops_incidents_mttr_hours_avg }}`,
                        `- incidents_mttr_target_ok: ${{ steps.ops_sla.outputs.ops_incidents_mttr_target_ok }}`,
                        `- ops_sla_failure_axes: ${{ steps.ops_sla.outputs.ops_sla_failure_axes }}`,
                        `- ops_sla_severity: ${{ steps.ops_sla.outputs.ops_sla_severity }}`,
                        `- ops_sla_signal_key: ${{ steps.ops_sla.outputs.ops_sla_signal_key }}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const mergedLabels = buildMergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), mergedLabels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels: mergedLabels
                            });
                            core.info(`Issue de SLA operativo actualizo labels de severidad: #${existing.number}`);
                          }
                          core.info(`Issue de SLA operativo ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels: mergedLabels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente de SLA operativo actualizado por cambio de senal semanal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- fast_sla_ok: ${{ steps.ops_sla.outputs.ops_fast_sla_ok }}`,
                            `- nightly_target_ok: ${{ steps.ops_sla.outputs.ops_nightly_target_ok }}`,
                            `- incidents_open_external: ${{ steps.ops_sla.outputs.ops_incidents_open_external }}`,
                            `- ops_sla_failure_axes: ${{ steps.ops_sla.outputs.ops_sla_failure_axes }}`,
                            `- ops_sla_severity: ${{ steps.ops_sla.outputs.ops_sla_severity }}`,
                            `- ops_sla_signal_key: ${{ steps.ops_sla.outputs.ops_sla_signal_key }}`
                          ].join('\n')
                        });
                        core.info(`Issue de SLA operativo actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: incidentBody,
                          labels: baseLabels
                        });
                        core.info(`Issue de SLA operativo creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente semanal de SLA operativo al recuperar
              if: ${{ success() && github.event_name == 'schedule' && steps.ops_sla.outputs.ops_sla_recovered == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Weekly KPI SLA operativo degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente de SLA operativo abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por reporte semanal de SLA operativo.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue de SLA operativo cerrado: #${existing.number}`);

