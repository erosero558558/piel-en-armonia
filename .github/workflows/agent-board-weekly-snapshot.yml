name: Agent Board Weekly Snapshot

on:
    schedule:
        # Domingo 23:30 America/Guayaquil (Lunes 04:30 UTC)
        - cron: '30 4 * * 1'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    snapshot:
        runs-on: ubuntu-latest
        env:
            BOARD_KEEP_DONE: '60'
            BOARD_ARCHIVE_OLDER_DAYS: '7'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Generar snapshot semanal
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p verification/board-snapshots
                  stamp="$(date -u +'%Y%m%d-%H%M%S')"
                  cp AGENT_BOARD.yaml "verification/board-snapshots/AGENT_BOARD-${stamp}.yaml"
                  node agent-orchestrator.js task ls --active --json > "verification/board-snapshots/AGENT_BOARD-active-${stamp}.json"

            - name: Podar tareas done antiguas del board
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/archive-agent-board.js \
                    --apply \
                    --json \
                    --keep-done "${BOARD_KEEP_DONE}" \
                    --older-than-days "${BOARD_ARCHIVE_OLDER_DAYS}" \
                    > verification/board-snapshots/board-prune-report.json

            - name: Commit y sync (si hay cambios)
              shell: bash
              run: |
                  set -euo pipefail
                  if git diff --quiet -- AGENT_BOARD.yaml JULES_TASKS.md KIMI_TASKS.md verification/board-snapshots; then
                    echo "No hay cambios para commitear."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add AGENT_BOARD.yaml JULES_TASKS.md KIMI_TASKS.md verification/board-snapshots
                  git commit -m "chore(agents): weekly board archive/prune [skip ci]"
                  node bin/sync-main-safe.js --remote origin --branch "${GITHUB_REF_NAME}" --max-sync-attempts 3 --json

            - name: Publicar artefacto
              uses: actions/upload-artifact@v4
              with:
                  name: agent-board-weekly-snapshot
                  path: verification/board-snapshots/
                  if-no-files-found: error
                  retention-days: 30
