name: Production Monitor

on:
    schedule:
        - cron: '*/30 * * * *'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            max_latency_ms:
                description: 'Latencia maxima aceptada por endpoint (ms)'
                required: false
                default: '3500'
                type: string
            allow_degraded_figo:
                description: 'Permitir Figo en modo degraded temporalmente'
                required: false
                default: false
                type: boolean
            allow_degraded_service_priorities:
                description: 'Permitir service-priorities en source distinto de catalog+funnel temporalmente'
                required: false
                default: false
                type: boolean
            min_service_priorities_services:
                description: 'Minimo de servicios esperados en service-priorities'
                required: false
                default: '1'
                type: string
            min_service_priorities_categories:
                description: 'Minimo de categorias esperadas en service-priorities'
                required: false
                default: '1'
                type: string
            min_service_priorities_featured:
                description: 'Minimo de destacados esperados en service-priorities'
                required: false
                default: '1'
                type: string
            require_service_priorities_funnel:
                description: 'Exigir source=catalog+funnel para service-priorities'
                required: false
                default: false
                type: boolean
            allow_degraded_telemedicine_diagnostics:
                description: 'Permitir diagnostics telemedicina degradado temporalmente'
                required: false
                default: false
                type: boolean
            require_telemedicine_configured:
                description: 'Exigir checks.telemedicine.configured=true'
                required: false
                default: true
                type: boolean
            max_telemedicine_review_queue:
                description: 'Maximo permitido para reviewQueue telemedicina'
                required: false
                default: '12'
                type: string
            max_telemedicine_staged_uploads:
                description: 'Maximo permitido de staged legacy uploads telemedicina'
                required: false
                default: '1'
                type: string
            max_telemedicine_unlinked_intakes:
                description: 'Maximo permitido de intakes sin linkage telemedicina'
                required: false
                default: '5'
                type: string
            enable_public_cutover_monitor:
                description: 'Habilitar smoke publico post-cutover (routing + conversion)'
                required: false
                default: false
                type: boolean
            public_cutover_started_at:
                description: 'Fecha/hora de inicio de cutover (ISO 8601)'
                required: false
                default: ''
                type: string
            public_cutover_window_hours:
                description: 'Ventana activa post-cutover para smoke publico (horas)'
                required: false
                default: '72'
                type: string
            enable_public_v4_rollout_monitor:
                description: 'Habilitar gate de rollout V4 por conversion (A/B)'
                required: false
                default: false
                type: boolean
            public_v4_rollout_stage:
                description: 'Etapa de rollout V4 (internal|canary|general|rollback)'
                required: false
                default: 'canary'
                type: string
            public_v4_rollout_surface_test:
                description: 'Surface test del rollout V4'
                required: false
                default: 'v4'
                type: string
            public_v4_rollout_surface_control:
                description: 'Surface control del rollout V4'
                required: false
                default: 'v3'
                type: string
            public_v4_rollout_min_view_booking:
                description: 'Minimo de view_booking requerido para evaluar el rollout V4'
                required: false
                default: '20'
                type: string
            public_v4_rollout_min_start_checkout:
                description: 'Minimo de start_checkout requerido para evaluar el rollout V4'
                required: false
                default: '10'
                type: string
            public_v4_rollout_max_confirmed_drop_pp:
                description: 'Drop maximo permitido (pp) en confirmedRate test vs control'
                required: false
                default: '8'
                type: string
            public_v4_rollout_min_confirmed_rate_pct:
                description: 'Confirmed rate minimo absoluto para surface test'
                required: false
                default: '20'
                type: string
            public_v4_rollout_allow_missing_control:
                description: 'Permitir ausencia temporal de surface control'
                required: false
                default: false
                type: boolean

concurrency:
    group: prod-monitor
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    monitor:
        name: Health + latency monitor
        runs-on: windows-latest
        timeout-minutes: 10
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || 'https://pielarmonia.com' }}
            ADMIN_ROLLOUT_STAGE: ${{ vars.ADMIN_ROLLOUT_STAGE || 'general' }}
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH: ${{ vars.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH || '' }}
            PROD_MONITOR_REPORT_PATH: verification/runtime/prod-monitor-last.json
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN: ${{ secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || secrets.CRON_SECRET || vars.CRON_SECRET || '' }}
            PIELARMONIA_CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET || secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || '' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_HEADER: ${{ vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_HEADER || 'Authorization' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_PREFIX: ${{ vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_PREFIX || 'Bearer' }}
            MAX_LATENCY_MS: ${{ github.event.inputs.max_latency_ms || '3500' }}
            ALLOW_DEGRADED_FIGO: ${{ github.event.inputs.allow_degraded_figo || 'false' }}
            ALLOW_STORE_CALENDAR: ${{ vars.PROD_MONITOR_ALLOW_STORE_CALENDAR || 'true' }}
            ALLOW_BLOCKED_CALENDAR: ${{ vars.ALLOW_BLOCKED_CALENDAR || 'false' }}
            SKIP_BACKUP_CHECK: ${{ vars.SKIP_BACKUP_CHECK || 'false' }}
            REQUIRE_GOOGLE_CALENDAR: ${{ vars.REQUIRE_GOOGLE_CALENDAR || 'false' }}
            ALLOW_DEGRADED_SERVICE_PRIORITIES: ${{ github.event.inputs.allow_degraded_service_priorities || 'false' }}
            MIN_SERVICE_PRIORITIES_SERVICES: ${{ github.event.inputs.min_service_priorities_services || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_SERVICES || '1' }}
            MIN_SERVICE_PRIORITIES_CATEGORIES: ${{ github.event.inputs.min_service_priorities_categories || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_CATEGORIES || '1' }}
            MIN_SERVICE_PRIORITIES_FEATURED: ${{ github.event.inputs.min_service_priorities_featured || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_FEATURED || '1' }}
            REQUIRE_SERVICE_PRIORITIES_FUNNEL: ${{ github.event.inputs.require_service_priorities_funnel || vars.PROD_MONITOR_REQUIRE_SERVICE_PRIORITIES_FUNNEL || 'false' }}
            ALLOW_DEGRADED_TELEMEDICINE_DIAGNOSTICS: ${{ github.event.inputs.allow_degraded_telemedicine_diagnostics || vars.PROD_MONITOR_ALLOW_DEGRADED_TELEMEDICINE_DIAGNOSTICS || 'false' }}
            REQUIRE_TELEMEDICINE_CONFIGURED: ${{ github.event.inputs.require_telemedicine_configured || vars.PROD_MONITOR_REQUIRE_TELEMEDICINE_CONFIGURED || 'true' }}
            MAX_TELEMEDICINE_REVIEW_QUEUE: ${{ github.event.inputs.max_telemedicine_review_queue || vars.PROD_MONITOR_MAX_TELEMEDICINE_REVIEW_QUEUE || '12' }}
            MAX_TELEMEDICINE_STAGED_UPLOADS: ${{ github.event.inputs.max_telemedicine_staged_uploads || vars.PROD_MONITOR_MAX_TELEMEDICINE_STAGED_UPLOADS || '1' }}
            MAX_TELEMEDICINE_UNLINKED_INTAKES: ${{ github.event.inputs.max_telemedicine_unlinked_intakes || vars.PROD_MONITOR_MAX_TELEMEDICINE_UNLINKED_INTAKES || '5' }}
            TELEMEDICINE_MONITOR_STATUS: unknown
            TELEMEDICINE_MONITOR_REASON: not_evaluated
            TELEMEDICINE_MONITOR_NON_TELE_FAILURES: '0'
            PUBLIC_SYNC_RECOVERY_STATUS: not_evaluated
            PUBLIC_SYNC_RECOVERY_REASON: not_evaluated
            PUBLIC_SYNC_CURRENT_HEAD: ''
            PUBLIC_SYNC_REMOTE_HEAD: ''
            PUBLIC_SYNC_DIRTY_PATHS_COUNT: '0'
            TURNERO_PILOT_RECOVERY_STATUS: not_evaluated
            TURNERO_PILOT_RECOVERY_REASON: not_evaluated
            TURNERO_PILOT_RECOVERY_CLINIC_ID: ''
            TURNERO_PILOT_RECOVERY_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_RECOVERY_DEPLOYED_COMMIT: ''
            TURNERO_PILOT_RECOVERY_TARGETS: ''
            TURNERO_PILOT_RECOVERY_MANIFEST_PATH: .public-cutover-monitor/turnero-pilot-recovery.json
            ENABLE_PUBLIC_CUTOVER_MONITOR: ${{ github.event.inputs.enable_public_cutover_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_CUTOVER || 'false' }}
            PUBLIC_CUTOVER_STARTED_AT: ${{ github.event.inputs.public_cutover_started_at || vars.PUBLIC_CUTOVER_STARTED_AT || '' }}
            PUBLIC_CUTOVER_WINDOW_HOURS: ${{ github.event.inputs.public_cutover_window_hours || vars.PUBLIC_CUTOVER_WINDOW_HOURS || '72' }}
            PUBLIC_CUTOVER_WINDOW_ACTIVE: 'false'
            PUBLIC_CUTOVER_WINDOW_REASON: 'disabled'
            PUBLIC_CUTOVER_ELAPSED_HOURS: ''
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR: ${{ github.event.inputs.enable_public_v4_rollout_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT || 'false' }}
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE: ${{ github.event.inputs.enable_public_v4_rollout_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT || 'false' }}
            PUBLIC_V4_ROLLOUT_STAGE: ${{ github.event.inputs.public_v4_rollout_stage || vars.PUBLIC_V4_ROLLOUT_STAGE || 'canary' }}
            PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: canary
            PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE: progressive
            PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE: input_or_var
            PUBLIC_V4_ROLLOUT_SURFACE_TEST: ${{ github.event.inputs.public_v4_rollout_surface_test || vars.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4' }}
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL: ${{ github.event.inputs.public_v4_rollout_surface_control || vars.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy' }}
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING: ${{ github.event.inputs.public_v4_rollout_min_view_booking || vars.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING || '20' }}
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT: ${{ github.event.inputs.public_v4_rollout_min_start_checkout || vars.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT || '10' }}
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP: ${{ github.event.inputs.public_v4_rollout_max_confirmed_drop_pp || vars.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || '8' }}
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT: ${{ github.event.inputs.public_v4_rollout_min_confirmed_rate_pct || vars.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || '20' }}
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL: ${{ github.event.inputs.public_v4_rollout_allow_missing_control || vars.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL || 'false' }}
            PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_surface_test || vars.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4' }}
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_surface_control || vars.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy' }}
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_min_view_booking || vars.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING || '20' }}
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_min_start_checkout || vars.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT || '10' }}
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_max_confirmed_drop_pp || vars.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || '8' }}
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_min_confirmed_rate_pct || vars.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || '20' }}
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_allow_missing_control || vars.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL || 'false' }}
            STALE_DEPLOY_ALERT_AUTOCLOSE_STATUS: not_evaluated
            STALE_DEPLOY_ALERT_AUTOCLOSE_REASON: not_schedule
            STALE_DEPLOY_ALERT_AUTOCLOSE_PUBLIC_SYNC_HEALTHY: 'false'
            STALE_DEPLOY_ALERT_AUTOCLOSE_OPEN_RELEVANT_COUNT: '0'
            STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_COUNT: '0'
            STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_ISSUES: none
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Ejecutar monitor de produccion
              id: monitor_prod
              shell: pwsh
              run: |
                  $maxLatency = [int]$env:MAX_LATENCY_MS
                  if ($maxLatency -lt 500) { $maxLatency = 500 }

                  $requireGoogleCalendar = [string]$env:REQUIRE_GOOGLE_CALENDAR
                  $forceGoogle = $requireGoogleCalendar.ToLowerInvariant() -eq 'true'

                  $monitorArgs = @{
                    Domain = $env:TARGET_DOMAIN
                    MaxLatencyMs = $maxLatency
                    ReportPath = $env:PROD_MONITOR_REPORT_PATH
                  }

                  if ($env:ALLOW_DEGRADED_FIGO -eq 'true') {
                    $monitorArgs.AllowDegradedFigo = $true
                  }
                  if ($env:ALLOW_STORE_CALENDAR -eq 'true') {
                    $monitorArgs.AllowStoreCalendar = $true
                  }
                  if ($forceGoogle -and $monitorArgs.ContainsKey('AllowStoreCalendar')) {
                    $monitorArgs.Remove('AllowStoreCalendar')
                  }
                  if ($env:ALLOW_BLOCKED_CALENDAR -eq 'true') {
                    $monitorArgs.AllowBlockedCalendar = $true
                  }
                  if ($env:SKIP_BACKUP_CHECK -eq 'true') {
                    $monitorArgs.SkipBackupCheck = $true
                  }
                  if ($env:ALLOW_DEGRADED_SERVICE_PRIORITIES -eq 'true') {
                    $monitorArgs.AllowDegradedServicePriorities = $true
                  }
                  if ($env:REQUIRE_SERVICE_PRIORITIES_FUNNEL -eq 'true') {
                    $monitorArgs.RequireServicePrioritiesFunnel = $true
                  }
                  if ($env:ALLOW_DEGRADED_TELEMEDICINE_DIAGNOSTICS -eq 'true') {
                    $monitorArgs.AllowDegradedTelemedicineDiagnostics = $true
                  }
                  if ($env:REQUIRE_TELEMEDICINE_CONFIGURED -eq 'false') {
                    $monitorArgs.RequireTelemedicineConfigured = $false
                  }

                  $minServices = [int]$env:MIN_SERVICE_PRIORITIES_SERVICES
                  if ($minServices -lt 0) { $minServices = 0 }
                  $monitorArgs.MinServicePrioritiesServices = $minServices

                  $minCategories = [int]$env:MIN_SERVICE_PRIORITIES_CATEGORIES
                  if ($minCategories -lt 0) { $minCategories = 0 }
                  $monitorArgs.MinServicePrioritiesCategories = $minCategories

                  $minFeatured = [int]$env:MIN_SERVICE_PRIORITIES_FEATURED
                  if ($minFeatured -lt 0) { $minFeatured = 0 }
                  $monitorArgs.MinServicePrioritiesFeatured = $minFeatured

                  $maxTelemedicineReviewQueue = [int]$env:MAX_TELEMEDICINE_REVIEW_QUEUE
                  if ($maxTelemedicineReviewQueue -lt 0) { $maxTelemedicineReviewQueue = 0 }
                  $monitorArgs.MaxTelemedicineReviewQueue = $maxTelemedicineReviewQueue

                  $maxTelemedicineStagedUploads = [int]$env:MAX_TELEMEDICINE_STAGED_UPLOADS
                  if ($maxTelemedicineStagedUploads -lt 0) { $maxTelemedicineStagedUploads = 0 }
                  $monitorArgs.MaxTelemedicineStagedUploads = $maxTelemedicineStagedUploads

                  $maxTelemedicineUnlinkedIntakes = [int]$env:MAX_TELEMEDICINE_UNLINKED_INTAKES
                  if ($maxTelemedicineUnlinkedIntakes -lt 0) { $maxTelemedicineUnlinkedIntakes = 0 }
                  $monitorArgs.MaxTelemedicineUnlinkedIntakes = $maxTelemedicineUnlinkedIntakes

                  & ./scripts/ops/prod/MONITOR-PRODUCCION.ps1 @monitorArgs

            - name: Evaluar recuperacion public sync para alertas stale de deploy
              id: public_sync_recovery
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'unknown'
                  $reason = 'not_evaluated'
                  $currentHead = ''
                  $remoteHead = ''
                  $dirtyPathsCount = 0
                  $health = $null
                  $base = ($env:TARGET_DOMAIN ?? '').TrimEnd('/')
                  $healthUrl = "$base/api.php?resource=health"

                  try {
                    $response = Invoke-WebRequest -Uri $healthUrl -TimeoutSec 20 -UseBasicParsing -Headers @{
                      'Accept' = 'application/json'
                      'User-Agent' = 'PielArmoniaPublicSyncRecovery/1.0'
                    }
                    $health = $response.Content | ConvertFrom-Json -Depth 20
                  } catch {
                    $status = 'failed'
                    $reason = 'health_unreachable'
                  }

                  if ($null -ne $health) {
                    $publicSync = $null
                    try { $publicSync = $health.checks.publicSync } catch { $publicSync = $null }
                    if ($null -eq $publicSync) {
                      $status = 'failed'
                      $reason = 'public_sync_missing'
                    } else {
                      $configured = $false
                      $healthy = $false
                      $repoHygieneIssue = $false
                      $headDrift = $false
                      $telemetryGap = $false
                      $reasons = New-Object System.Collections.Generic.List[string]

                      try { $configured = [bool]$publicSync.configured } catch { $configured = $false }
                      try { $healthy = [bool]$publicSync.healthy } catch { $healthy = $false }
                      try { $repoHygieneIssue = [bool]$publicSync.repoHygieneIssue } catch { $repoHygieneIssue = $false }
                      try { $headDrift = [bool]$publicSync.headDrift } catch { $headDrift = $false }
                      try { $telemetryGap = [bool]$publicSync.telemetryGap } catch { $telemetryGap = $false }
                      try { $currentHead = [string]$publicSync.currentHead } catch { $currentHead = '' }
                      try { $remoteHead = [string]$publicSync.remoteHead } catch { $remoteHead = '' }
                      try { $dirtyPathsCount = [int]$publicSync.dirtyPathsCount } catch { $dirtyPathsCount = 0 }

                      if (-not $configured) {
                        $reasons.Add('public_sync_unconfigured')
                      }
                      if (-not $healthy) {
                        $reasons.Add('public_sync_unhealthy')
                      }
                      if ($repoHygieneIssue) {
                        $reasons.Add('public_sync_repo_hygiene')
                      }
                      if ($headDrift) {
                        $reasons.Add('public_sync_head_drift')
                      }
                      if ($telemetryGap) {
                        $reasons.Add('public_sync_telemetry_gap')
                      }
                      if ($dirtyPathsCount -gt 0) {
                        $reasons.Add("public_sync_dirty_paths:$dirtyPathsCount")
                      }
                      if ([string]::IsNullOrWhiteSpace($currentHead) -or [string]::IsNullOrWhiteSpace($remoteHead)) {
                        $reasons.Add('public_sync_head_missing')
                      } elseif ($currentHead -ne $remoteHead) {
                        $reasons.Add('public_sync_head_mismatch')
                      }

                      if ($reasons.Count -eq 0) {
                        $status = 'healthy'
                        $reason = 'public_sync_recovered'
                      } else {
                        $status = 'failed'
                        $reason = ($reasons | Select-Object -Unique) -join ';'
                      }
                    }
                  }

                  "PUBLIC_SYNC_RECOVERY_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_RECOVERY_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_CURRENT_HEAD=$currentHead" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_REMOTE_HEAD=$remoteHead" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_DIRTY_PATHS_COUNT=$dirtyPathsCount" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "current_head=$currentHead" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "remote_head=$remoteHead" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "dirty_paths_count=$dirtyPathsCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "public sync recovery => status=$status reason=$reason current_head=$currentHead remote_head=$remoteHead dirty_paths_count=$dirtyPathsCount"

            - name: Evaluar estado telemedicina para incidente dedicado
              id: telemedicine_monitor
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'healthy'
                  $reasons = New-Object System.Collections.Generic.List[string]
                  $nonTeleFailures = 0
                  $monitorOutcome = '${{ steps.monitor_prod.outcome || 'n/a' }}'
                  if ($monitorOutcome -ne 'success' -and $monitorOutcome -ne 'skipped' -and $monitorOutcome -ne 'n/a') {
                    $nonTeleFailures = 1
                  }
                  $health = $null
                  $base = ($env:TARGET_DOMAIN ?? '').TrimEnd('/')
                  $healthUrl = "$base/api.php?resource=health"

                  try {
                    $response = Invoke-WebRequest -Uri $healthUrl -TimeoutSec 20 -UseBasicParsing -Headers @{
                      'Accept' = 'application/json'
                      'User-Agent' = 'PielArmoniaTelemedicineMonitor/1.0'
                    }
                    $health = $response.Content | ConvertFrom-Json -Depth 20
                  } catch {
                    $status = 'failed'
                    $reasons.Add('health_unreachable')
                  }

                  $allowDegradedDiagnostics = ([string]$env:ALLOW_DEGRADED_TELEMEDICINE_DIAGNOSTICS).ToLowerInvariant() -eq 'true'
                  $requireConfigured = ([string]$env:REQUIRE_TELEMEDICINE_CONFIGURED).ToLowerInvariant() -ne 'false'
                  $maxReviewQueue = 12
                  $maxStagedUploads = 1
                  $maxUnlinkedIntakes = 5

                  try { $maxReviewQueue = [int]$env:MAX_TELEMEDICINE_REVIEW_QUEUE } catch {}
                  try { $maxStagedUploads = [int]$env:MAX_TELEMEDICINE_STAGED_UPLOADS } catch {}
                  try { $maxUnlinkedIntakes = [int]$env:MAX_TELEMEDICINE_UNLINKED_INTAKES } catch {}
                  if ($maxReviewQueue -lt 0) { $maxReviewQueue = 0 }
                  if ($maxStagedUploads -lt 0) { $maxStagedUploads = 0 }
                  if ($maxUnlinkedIntakes -lt 0) { $maxUnlinkedIntakes = 0 }

                  if ($null -ne $health) {
                    $telemedicine = $null
                    try { $telemedicine = $health.checks.telemedicine } catch { $telemedicine = $null }
                    if ($null -eq $telemedicine) {
                      if ($requireConfigured) {
                        $reasons.Add('telemedicine_missing')
                      }
                    } else {
                      $configured = $false
                      $diagnosticsStatus = ''
                      $criticalCount = 0
                      $reviewQueueCount = 0
                      $stagedLegacyUploadsCount = 0
                      $unlinkedIntakesCount = 0
                      $danglingAppointmentLinksCount = 0
                      $casePhotosWithoutPrivatePathCount = 0

                      try { $configured = [bool]$telemedicine.configured } catch { $configured = $false }
                      try { $diagnosticsStatus = [string]$telemedicine.diagnostics.status } catch { $diagnosticsStatus = '' }
                      try { $criticalCount = [int]$telemedicine.diagnostics.summary.critical } catch { $criticalCount = 0 }
                      try { $reviewQueueCount = [int]$telemedicine.reviewQueueCount } catch { $reviewQueueCount = 0 }
                      try { $stagedLegacyUploadsCount = [int]$telemedicine.integrity.stagedLegacyUploadsCount } catch { $stagedLegacyUploadsCount = 0 }
                      try { $unlinkedIntakesCount = [int]$telemedicine.integrity.unlinkedIntakesCount } catch { $unlinkedIntakesCount = 0 }
                      try { $danglingAppointmentLinksCount = [int]$telemedicine.integrity.danglingAppointmentLinksCount } catch { $danglingAppointmentLinksCount = 0 }
                      try { $casePhotosWithoutPrivatePathCount = [int]$telemedicine.integrity.casePhotosWithoutPrivatePathCount } catch { $casePhotosWithoutPrivatePathCount = 0 }

                      if ($requireConfigured -and -not $configured) {
                        $reasons.Add('telemedicine_unconfigured')
                      }
                      if (-not $allowDegradedDiagnostics -and ($diagnosticsStatus -eq 'critical' -or $criticalCount -gt 0)) {
                        $reasons.Add("diagnostics_critical:$diagnosticsStatus/$criticalCount")
                      }
                      if ($reviewQueueCount -gt $maxReviewQueue) {
                        $reasons.Add("review_queue_high:$reviewQueueCount>$maxReviewQueue")
                      }
                      if ($stagedLegacyUploadsCount -gt $maxStagedUploads) {
                        $reasons.Add("staged_uploads_high:$stagedLegacyUploadsCount>$maxStagedUploads")
                      }
                      if ($unlinkedIntakesCount -gt $maxUnlinkedIntakes) {
                        $reasons.Add("unlinked_intakes_high:$unlinkedIntakesCount>$maxUnlinkedIntakes")
                      }
                      if ($danglingAppointmentLinksCount -gt 0) {
                        $reasons.Add("dangling_links:$danglingAppointmentLinksCount")
                      }
                      if ($casePhotosWithoutPrivatePathCount -gt 0) {
                        $reasons.Add("case_photos_missing_private_path:$casePhotosWithoutPrivatePathCount")
                      }
                    }
                  }

                  if ($reasons.Count -gt 0) {
                    $status = 'failed'
                  }

                  $reasonText = if ($reasons.Count -gt 0) {
                    ($reasons | Select-Object -Unique) -join ';'
                  } else {
                    'ok'
                  }
                  "TELEMEDICINE_MONITOR_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_MONITOR_REASON=$reasonText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_MONITOR_NON_TELE_FAILURES=$nonTeleFailures" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reasonText" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "non_tele_failures=$nonTeleFailures" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "telemedicine monitor => status=$status reason=$reasonText non_tele_failures=$nonTeleFailures"

            - name: Evaluar ventana post-cutover publico
              id: cutover_window
              shell: pwsh
              run: |
                  $enabled = ([string]$env:ENABLE_PUBLIC_CUTOVER_MONITOR).ToLowerInvariant() -eq 'true'
                  $windowHours = 72.0
                  try {
                    $parsedWindow = [double]$env:PUBLIC_CUTOVER_WINDOW_HOURS
                    if ($parsedWindow -ge 1) {
                      $windowHours = $parsedWindow
                    }
                  } catch {
                    Write-Host "[WARN] PUBLIC_CUTOVER_WINDOW_HOURS invalido. Se usa 72h."
                  }

                  $active = $false
                  $reason = 'disabled'
                  $elapsedHours = ''

                  if ($enabled) {
                    $reason = 'missing_start'
                    $startRaw = [string]$env:PUBLIC_CUTOVER_STARTED_AT
                    if (-not [string]::IsNullOrWhiteSpace($startRaw)) {
                      try {
                        $startAt = [DateTimeOffset]::Parse(
                          $startRaw,
                          [System.Globalization.CultureInfo]::InvariantCulture,
                          [System.Globalization.DateTimeStyles]::AssumeUniversal
                        )
                        $nowUtc = [DateTimeOffset]::UtcNow
                        $elapsed = ($nowUtc - $startAt.ToUniversalTime()).TotalHours
                        $elapsedHours = [Math]::Round($elapsed, 2).ToString(
                          [System.Globalization.CultureInfo]::InvariantCulture
                        )
                        if ($elapsed -lt 0) {
                          $reason = 'future_start'
                        } elseif ($elapsed -le $windowHours) {
                          $active = $true
                          $reason = 'active'
                        } else {
                          $reason = 'window_elapsed'
                        }
                      } catch {
                        $reason = 'invalid_start'
                        Write-Host "[WARN] PUBLIC_CUTOVER_STARTED_AT invalido: $startRaw"
                      }
                    }
                  }

                  $activeValue = if ($active) { 'true' } else { 'false' }
                  "PUBLIC_CUTOVER_WINDOW_ACTIVE=$activeValue" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_CUTOVER_WINDOW_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_CUTOVER_ELAPSED_HOURS=$elapsedHours" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

                  "active=$activeValue" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "elapsed_hours=$elapsedHours" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Cutover window => enabled=$enabled active=$activeValue reason=$reason elapsed_hours=$elapsedHours window_hours=$windowHours"

            - name: Setup Node para smoke/gates publicos
              if: ${{ env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' || env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR == 'true' }}
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Evaluar recuperacion turneroPilot para alertas stale de deploy
              id: turnero_pilot_recovery
              if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && env.TARGET_DOMAIN == 'https://pielarmonia.com')) }}
              shell: pwsh
              run: |
                  $status = 'unknown'
                  $reason = 'not_evaluated'
                  $clinicId = ''
                  $profileFingerprint = ''
                  $deployedCommit = ''
                  $recoveryTargets = @(
                    '[ALERTA PROD] Deploy Hosting turneroPilot bloqueado',
                    '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado'
                  )
                  $repoRoot = (Get-Location).Path
                  $scriptPath = Join-Path $repoRoot 'bin/turnero-clinic-profile.js'

                  if (-not (Test-Path -LiteralPath $scriptPath)) {
                    $status = 'failed'
                    $reason = 'cli_missing'
                  } else {
                    $statusRaw = ''
                    $statusExit = 0
                    $statusPayload = $null
                    try {
                      $statusRaw = ((& node $scriptPath status --json 2>&1) | Out-String).Trim()
                      $statusExit = $LASTEXITCODE
                      if (-not [string]::IsNullOrWhiteSpace($statusRaw)) {
                        $statusPayload = $statusRaw | ConvertFrom-Json
                      }
                    } catch {
                      $statusPayload = $null
                    }

                    if ($null -eq $statusPayload -or $statusExit -ne 0) {
                      $status = 'failed'
                      $reason = 'status_unresolved'
                    } else {
                      try { $clinicId = [string]$statusPayload.profile.clinic_id } catch { $clinicId = '' }
                      try { $profileFingerprint = [string]$statusPayload.profileFingerprint } catch { $profileFingerprint = '' }
                      $releaseMode = ''
                      try { $releaseMode = [string]$statusPayload.profile.release.mode } catch { $releaseMode = '' }

                      if ($releaseMode -ne 'web_pilot') {
                        $status = 'not_required'
                        $reason = if ([string]::IsNullOrWhiteSpace($releaseMode)) { 'release_mode_missing' } else { "release_mode:$releaseMode" }
                      } else {
                        $verifyRaw = ''
                        $verifyExit = 0
                        $verifyPayload = $null
                        try {
                          $verifyRaw = ((& node $scriptPath verify-remote --base-url $env:TARGET_DOMAIN --json 2>&1) | Out-String).Trim()
                          $verifyExit = $LASTEXITCODE
                          if (-not [string]::IsNullOrWhiteSpace($verifyRaw)) {
                            $verifyPayload = $verifyRaw | ConvertFrom-Json
                          }
                        } catch {
                          $verifyPayload = $null
                        }

                        try { $clinicId = [string]$verifyPayload.turneroPilot.clinicId } catch {}
                        try { $profileFingerprint = [string]$verifyPayload.turneroPilot.profileFingerprint } catch {}
                        try { $deployedCommit = [string]$verifyPayload.publicSync.deployedCommit } catch { $deployedCommit = '' }

                        if ($null -ne $verifyPayload -and $verifyExit -eq 0 -and [bool]$verifyPayload.ok) {
                          $status = 'healthy'
                          $reason = 'ok'
                        } else {
                          $status = 'failed'
                          $reason = 'verify_remote_failed'
                          try {
                            $errors = @($verifyPayload.errors)
                            if ($errors.Count -gt 0) {
                              $reason = ([string]$errors[0]).Replace("`r", ' ').Replace("`n", ' ').Trim()
                            }
                          } catch {
                          }
                        }
                      }
                    }
                  }

                  "TURNERO_PILOT_RECOVERY_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_RECOVERY_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_RECOVERY_CLINIC_ID=$clinicId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_RECOVERY_PROFILE_FINGERPRINT=$profileFingerprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_RECOVERY_DEPLOYED_COMMIT=$deployedCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_RECOVERY_TARGETS=$($recoveryTargets -join ', ')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

                  $manifestPath = [string]$env:TURNERO_PILOT_RECOVERY_MANIFEST_PATH
                  if ([string]::IsNullOrWhiteSpace($manifestPath)) {
                    $manifestPath = '.public-cutover-monitor/turnero-pilot-recovery.json'
                  }
                  $manifestDir = Split-Path -Parent $manifestPath
                  if (-not [string]::IsNullOrWhiteSpace($manifestDir)) {
                    New-Item -ItemType Directory -Path $manifestDir -Force | Out-Null
                  }
                  $manifest = [ordered]@{
                    generatedAt = [DateTimeOffset]::UtcNow.ToString('o')
                    workflow = 'prod-monitor'
                    eventName = [string]$env:GITHUB_EVENT_NAME
                    runId = [string]$env:GITHUB_RUN_ID
                    runAttempt = [string]$env:GITHUB_RUN_ATTEMPT
                    targetDomain = [string]$env:TARGET_DOMAIN
                    turneroPilot = [ordered]@{
                      status = $status
                      reason = $reason
                      clinicId = $clinicId
                      profileFingerprint = $profileFingerprint
                      deployedCommit = $deployedCommit
                      recoveryTargets = @($recoveryTargets)
                    }
                  }
                  $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path $manifestPath -Encoding utf8

                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "clinic_id=$clinicId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "profile_fingerprint=$profileFingerprint" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "deployed_commit=$deployedCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "recovery_targets=$($recoveryTargets -join ', ')" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "turnero pilot recovery => status=$status reason=$reason clinic_id=$clinicId deployed_commit=$deployedCommit recovery_targets=$($recoveryTargets -join '; ')"

            - name: Upload turneroPilot recovery evidence
              if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && env.TARGET_DOMAIN == 'https://pielarmonia.com')) }}
              uses: actions/upload-artifact@v4
              with:
                  name: prod-monitor-turnero-pilot-recovery
                  path: ${{ env.TURNERO_PILOT_RECOVERY_MANIFEST_PATH }}
                  if-no-files-found: warn
                  retention-days: 7

            - name: Resolver politica rollout publico V4
              id: resolve_public_v4_rollout
              if: ${{ env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR == 'true' }}
              shell: pwsh
              run: |
                  $policyJson = node ./bin/resolve-public-v4-rollout-policy.js `
                    --stage "$env:PUBLIC_V4_ROLLOUT_STAGE" `
                    --default-stage canary `
                    --enable-monitor "$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR" `
                    --surface-test "$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST" `
                    --surface-control "$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL" `
                    --min-view-booking "$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING" `
                    --min-start-checkout "$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT" `
                    --max-confirmed-drop-pp "$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP" `
                    --min-confirmed-rate-pct "$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT" `
                    --allow-missing-control "$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL"

                  if ([string]::IsNullOrWhiteSpace($policyJson)) {
                    throw 'No se pudo resolver politica rollout V4.'
                  }

                  $policy = $policyJson | ConvertFrom-Json
                  $enableMonitorEffective = if ($policy.enable_monitor_effective) { 'true' } else { 'false' }
                  $allowMissingControlEffective = if ($policy.allow_missing_control_effective) { 'true' } else { 'false' }
                  $stageEffective = [string]$policy.stage_effective
                  $stageProfileEffective = [string]$policy.stage_profile
                  $policySourceEffective = [string]$policy.policy_source
                  $surfaceTestEffective = [string]$policy.surface_test_effective
                  $surfaceControlEffective = [string]$policy.surface_control_effective
                  $minViewEffective = [string]$policy.min_view_booking_effective
                  $minStartEffective = [string]$policy.min_start_checkout_effective
                  $maxDropEffective = [string]$policy.max_confirmed_drop_pp_effective
                  $minConfirmedEffective = [string]$policy.min_confirmed_rate_pct_effective

                  "ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE=$enableMonitorEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE=$stageEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE=$stageProfileEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE=$policySourceEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE=$surfaceTestEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE=$surfaceControlEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE=$minViewEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE=$minStartEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE=$maxDropEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE=$minConfirmedEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE=$allowMissingControlEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

                  "enable_monitor_effective=$enableMonitorEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "stage_effective=$stageEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "stage_profile_effective=$stageProfileEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "policy_source_effective=$policySourceEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "surface_test_effective=$surfaceTestEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "surface_control_effective=$surfaceControlEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "min_view_booking_effective=$minViewEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "min_start_checkout_effective=$minStartEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "max_confirmed_drop_pp_effective=$maxDropEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "min_confirmed_rate_pct_effective=$minConfirmedEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "allow_missing_control_effective=$allowMissingControlEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

                  Write-Host "Public V4 rollout policy => stage=$stageEffective profile=$stageProfileEffective policy_source=$policySourceEffective monitor=$enableMonitorEffective"

            - name: Validar routing + conversion publica post-cutover (ES/EN)
              id: public_cutover
              if: ${{ env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover-monitor
                  node bin/check-public-routing-smoke.js --base-url "${TARGET_DOMAIN}" --label "prod-monitor-cutover-routing" --output ".public-cutover-monitor/routing-smoke.json"
                  node bin/check-public-conversion-smoke.js --base-url "${TARGET_DOMAIN}" --label "prod-monitor-cutover-conversion" --output ".public-cutover-monitor/conversion-smoke.json"

            - name: Upload public cutover monitor evidence
              if: ${{ always() && env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: public-cutover-monitor-evidence
                  path: .public-cutover-monitor/
                  if-no-files-found: warn
                  retention-days: 7

            - name: Validar rollout publico V4 (A/B + kill-switch readiness)
              id: public_v4_rollout
              if: ${{ env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-v4-rollout-monitor
                  gate_args=(
                    --base-url "${TARGET_DOMAIN}"
                    --label "prod-monitor-v4-rollout"
                    --surface-test "${PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE}"
                    --surface-control "${PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE}"
                    --min-view-booking "${PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE}"
                    --min-start-checkout "${PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE}"
                    --max-confirmed-drop-pp "${PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE}"
                    --min-confirmed-rate-pct "${PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE}"
                    --out ".public-v4-rollout-monitor/rollout-gate.json"
                  )
                  if [ "${PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE}" = "true" ]; then
                    gate_args+=(--allow-missing-control)
                  fi
                  node bin/run-public-v4-rollout-gate.js "${gate_args[@]}"

            - name: Upload public V4 rollout evidence
              if: ${{ always() && env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE == 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: public-v4-rollout-monitor-evidence
                  path: .public-v4-rollout-monitor/
                  if-no-files-found: warn
                  retention-days: 7

            - name: Auto-close stale deploy alerts when public sync recovers
              if: ${{ always() && github.event_name == 'schedule' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const healthUrl = `${String(process.env.TARGET_DOMAIN || '').replace(/\/$/, '')}/api.php?resource=health`;
                      const publicSyncJobIdExpected = '8d31e299-7e57-4959-80b5-aaa2d73e9674';
                      const exportState = (values) => {
                        for (const [key, value] of Object.entries(values)) {
                          const normalized = String(value ?? '');
                          core.exportVariable(key, normalized);
                          core.setOutput(key.toLowerCase(), normalized);
                        }
                      };
                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const isRelevantDeployAlert = (issue) => {
                        const labels = normalizeLabels(issue.labels);
                        if (labels.includes('telemedicine')) {
                          return false;
                        }
                        return (
                          labels.includes('production-alert') &&
                          (
                            labels.includes('deploy-hosting') ||
                            labels.includes('transport-preflight') ||
                            labels.includes('diagnose-host-connectivity') ||
                            labels.includes('deploy-connectivity') ||
                            labels.includes('repair-git-sync') ||
                            labels.includes('self-hosted-runner')
                          )
                        );
                      };

                      exportState({
                        STALE_DEPLOY_ALERT_AUTOCLOSE_STATUS: 'not_schedule',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_REASON: 'not_schedule',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_PUBLIC_SYNC_HEALTHY: 'false',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_OPEN_RELEVANT_COUNT: '0',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_COUNT: '0',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_ISSUES: 'none',
                      });

                      let health;
                      try {
                        const response = await fetch(healthUrl, {
                          headers: {
                            Accept: 'application/json',
                            'User-Agent': 'PielArmoniaProdMonitor/1.0',
                          },
                        });
                        if (!response.ok) {
                          throw new Error(`health_status_${response.status}`);
                        }
                        health = await response.json();
                      } catch (error) {
                        const reason = `health_unreachable:${error instanceof Error ? error.message : String(error)}`;
                        core.warning(`No se pudo evaluar publicSync para autocierre de alertas stale: ${reason}`);
                        exportState({
                          STALE_DEPLOY_ALERT_AUTOCLOSE_STATUS: 'health_unreachable',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_REASON: reason,
                          STALE_DEPLOY_ALERT_AUTOCLOSE_PUBLIC_SYNC_HEALTHY: 'false',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_OPEN_RELEVANT_COUNT: '0',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_COUNT: '0',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_ISSUES: 'none',
                        });
                        return;
                      }

                      const publicSync = health?.checks?.publicSync || {};
                      const configured = Boolean(publicSync?.configured);
                      const healthy = Boolean(publicSync?.healthy);
                      const operationallyHealthy =
                        publicSync?.operationallyHealthy === undefined
                          ? healthy
                          : Boolean(publicSync?.operationallyHealthy);
                      const repoHygieneIssue = Boolean(publicSync?.repoHygieneIssue);
                      const currentHead = String(publicSync?.currentHead || '');
                      const remoteHead = String(publicSync?.remoteHead || '');
                      const ageSeconds = Number(publicSync?.ageSeconds ?? Number.NaN);
                      const expectedMaxLagSeconds = Number(publicSync?.expectedMaxLagSeconds ?? 120);
                      const headDrift =
                        publicSync?.headDrift === undefined
                          ? Boolean(currentHead && remoteHead && currentHead !== remoteHead)
                          : Boolean(publicSync?.headDrift);
                      const telemetryGap =
                        publicSync?.telemetryGap === undefined
                          ? false
                          : Boolean(publicSync?.telemetryGap);
                      const jobId = String(publicSync?.jobId || '');
                      const ageWithinLagBudget =
                        Number.isFinite(ageSeconds) && Number.isFinite(expectedMaxLagSeconds)
                          ? ageSeconds <= expectedMaxLagSeconds
                          : true;
                      const publicSyncRecovered = (
                        configured &&
                        healthy &&
                        operationallyHealthy &&
                        !repoHygieneIssue &&
                        !headDrift &&
                        !telemetryGap &&
                        ageWithinLagBudget &&
                        jobId === publicSyncJobIdExpected
                      );

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100,
                      });
                      const relevantOpenIssues = openIssues.filter(
                        (issue) => !issue.pull_request && isRelevantDeployAlert(issue)
                      );
                      const relevantOpenCount = String(relevantOpenIssues.length);

                      if (!publicSyncRecovered) {
                        const reasonParts = [];
                        if (!configured) reasonParts.push('public_sync_not_configured');
                        if (!healthy) reasonParts.push('public_sync_unhealthy');
                        if (!operationallyHealthy) reasonParts.push('public_sync_operationally_unhealthy');
                        if (repoHygieneIssue) reasonParts.push('public_sync_repo_hygiene_issue');
                        if (headDrift) reasonParts.push('public_sync_head_drift');
                        if (telemetryGap) reasonParts.push('public_sync_telemetry_gap');
                        if (!ageWithinLagBudget) reasonParts.push('public_sync_stale');
                        if (jobId !== publicSyncJobIdExpected) reasonParts.push(`public_sync_job_id:${jobId || 'missing'}`);
                        const reason = reasonParts.length > 0 ? reasonParts.join('|') : 'public_sync_not_recovered';
                        exportState({
                          STALE_DEPLOY_ALERT_AUTOCLOSE_STATUS: 'not_recovered',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_REASON: reason,
                          STALE_DEPLOY_ALERT_AUTOCLOSE_PUBLIC_SYNC_HEALTHY: 'false',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_OPEN_RELEVANT_COUNT: relevantOpenCount,
                          STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_COUNT: '0',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_ISSUES: 'none',
                        });
                        core.info(`publicSync aun no esta recuperado para autocierre de alertas stale (${reason}).`);
                        return;
                      }

                      if (relevantOpenIssues.length === 0) {
                        exportState({
                          STALE_DEPLOY_ALERT_AUTOCLOSE_STATUS: 'no_open_alerts',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_REASON: 'public_sync_recovered_no_open_alerts',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_PUBLIC_SYNC_HEALTHY: 'true',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_OPEN_RELEVANT_COUNT: relevantOpenCount,
                          STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_COUNT: '0',
                          STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_ISSUES: 'none',
                        });
                        core.info('publicSync recuperado y sin alertas stale de deploy abiertas.');
                        return;
                      }

                      const closedIssues = [];
                      for (const issue of relevantOpenIssues) {
                        const issueNumber = Number(issue.number);
                        const issueTitle = String(issue.title || 'sin_titulo');
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: issueNumber,
                          body: [
                            'Recuperado automaticamente por monitor programado despues de verificar `checks.publicSync` sano.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- public_sync_job_id: ${jobId || 'n/a'}`,
                            `- public_sync_state: ${String(publicSync?.state || 'unknown')}`,
                            `- public_sync_age_seconds: ${Number.isFinite(ageSeconds) ? ageSeconds : 'n/a'}`,
                            `- public_sync_current_head: ${currentHead || 'n/a'}`,
                            `- public_sync_remote_head: ${remoteHead || 'n/a'}`,
                            `- public_sync_deployed_commit: ${String(publicSync?.deployedCommit || 'n/a')}`,
                          ].join('\n'),
                        });
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: issueNumber,
                          state: 'closed',
                        });
                        closedIssues.push(`#${issueNumber} ${issueTitle}`);
                      }

                      exportState({
                        STALE_DEPLOY_ALERT_AUTOCLOSE_STATUS: 'closed',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_REASON: 'public_sync_recovered',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_PUBLIC_SYNC_HEALTHY: 'true',
                        STALE_DEPLOY_ALERT_AUTOCLOSE_OPEN_RELEVANT_COUNT: relevantOpenCount,
                        STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_COUNT: String(closedIssues.length),
                        STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_ISSUES: closedIssues.join(' | '),
                      });
                      core.info(`Alertas stale de deploy cerradas tras recuperar publicSync: ${closedIssues.join(' | ')}`);

            - name: Normalizar reporte canonico prod-monitor
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $reportPath = [string]$env:PROD_MONITOR_REPORT_PATH
                  if ([string]::IsNullOrWhiteSpace($reportPath)) {
                    throw 'PROD_MONITOR_REPORT_PATH no definido.'
                  }
                  if (-not (Test-Path -LiteralPath $reportPath)) {
                    throw "No existe reporte base del monitor: $reportPath"
                  }

                  $raw = Get-Content -LiteralPath $reportPath -Raw
                  $report = (($raw -replace "^\uFEFF", '') | ConvertFrom-Json -Depth 40)

                  $telemedicine = [ordered]@{
                    status = [string]$env:TELEMEDICINE_MONITOR_STATUS
                    reason = [string]$env:TELEMEDICINE_MONITOR_REASON
                    nonTeleFailures = [string]$env:TELEMEDICINE_MONITOR_NON_TELE_FAILURES
                    stepOutcome = '${{ steps.telemedicine_monitor.outcome }}'
                    allowDegradedDiagnostics = [string]$env:ALLOW_DEGRADED_TELEMEDICINE_DIAGNOSTICS
                    requireConfigured = [string]$env:REQUIRE_TELEMEDICINE_CONFIGURED
                    maxReviewQueue = [string]$env:MAX_TELEMEDICINE_REVIEW_QUEUE
                    maxStagedUploads = [string]$env:MAX_TELEMEDICINE_STAGED_UPLOADS
                    maxUnlinkedIntakes = [string]$env:MAX_TELEMEDICINE_UNLINKED_INTAKES
                  }
                  $publicSyncRecovery = [ordered]@{
                    status = [string]$env:PUBLIC_SYNC_RECOVERY_STATUS
                    reason = [string]$env:PUBLIC_SYNC_RECOVERY_REASON
                    currentHead = [string]$env:PUBLIC_SYNC_CURRENT_HEAD
                    remoteHead = [string]$env:PUBLIC_SYNC_REMOTE_HEAD
                    dirtyPathsCount = [string]$env:PUBLIC_SYNC_DIRTY_PATHS_COUNT
                    stepOutcome = '${{ steps.public_sync_recovery.outcome }}'
                  }
                  $turneroPilotRecovery = [ordered]@{
                    status = [string]$env:TURNERO_PILOT_RECOVERY_STATUS
                    reason = [string]$env:TURNERO_PILOT_RECOVERY_REASON
                    clinicId = [string]$env:TURNERO_PILOT_RECOVERY_CLINIC_ID
                    profileFingerprint = [string]$env:TURNERO_PILOT_RECOVERY_PROFILE_FINGERPRINT
                    deployedCommit = [string]$env:TURNERO_PILOT_RECOVERY_DEPLOYED_COMMIT
                    recoveryTargets = [string]$env:TURNERO_PILOT_RECOVERY_TARGETS
                    manifestPath = [string]$env:TURNERO_PILOT_RECOVERY_MANIFEST_PATH
                    stepOutcome = '${{ steps.turnero_pilot_recovery.outcome }}'
                  }
                  $publicCutover = [ordered]@{
                    enabled = [string]$env:ENABLE_PUBLIC_CUTOVER_MONITOR
                    startedAt = [string]$env:PUBLIC_CUTOVER_STARTED_AT
                    windowHours = [string]$env:PUBLIC_CUTOVER_WINDOW_HOURS
                    windowActive = [string]$env:PUBLIC_CUTOVER_WINDOW_ACTIVE
                    windowReason = [string]$env:PUBLIC_CUTOVER_WINDOW_REASON
                    elapsedHours = [string]$env:PUBLIC_CUTOVER_ELAPSED_HOURS
                    stepOutcome = '${{ steps.public_cutover.outcome }}'
                  }
                  $publicV4Rollout = [ordered]@{
                    enabled = [string]$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR
                    stage = [string]$env:PUBLIC_V4_ROLLOUT_STAGE
                    surfaceTest = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST
                    surfaceControl = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL
                    minViewBooking = [string]$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING
                    minStartCheckout = [string]$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT
                    maxConfirmedDropPp = [string]$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP
                    minConfirmedRatePct = [string]$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT
                    allowMissingControl = [string]$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL
                    enabledEffective = [string]$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE
                    stageEffective = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE
                    stageProfileEffective = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE
                    policySourceEffective = [string]$env:PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE
                    surfaceTestEffective = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE
                    surfaceControlEffective = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE
                    minViewBookingEffective = [string]$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE
                    minStartCheckoutEffective = [string]$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE
                    maxConfirmedDropPpEffective = [string]$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE
                    minConfirmedRatePctEffective = [string]$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE
                    allowMissingControlEffective = [string]$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE
                    stepOutcome = '${{ steps.public_v4_rollout.outcome }}'
                  }
                  $staleDeployAutoclose = [ordered]@{
                    status = [string]$env:STALE_DEPLOY_ALERT_AUTOCLOSE_STATUS
                    reason = [string]$env:STALE_DEPLOY_ALERT_AUTOCLOSE_REASON
                    publicSyncHealthy = [string]$env:STALE_DEPLOY_ALERT_AUTOCLOSE_PUBLIC_SYNC_HEALTHY
                    openRelevantCount = [string]$env:STALE_DEPLOY_ALERT_AUTOCLOSE_OPEN_RELEVANT_COUNT
                    closedCount = [string]$env:STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_COUNT
                    closedIssues = [string]$env:STALE_DEPLOY_ALERT_AUTOCLOSE_CLOSED_ISSUES
                  }
                  $monitorInputs = [ordered]@{
                    targetDomain = [string]$env:TARGET_DOMAIN
                    maxLatencyMs = [string]$env:MAX_LATENCY_MS
                    allowDegradedFigo = [string]$env:ALLOW_DEGRADED_FIGO
                    allowStoreCalendar = [string]$env:ALLOW_STORE_CALENDAR
                    allowBlockedCalendar = [string]$env:ALLOW_BLOCKED_CALENDAR
                    skipBackupCheck = [string]$env:SKIP_BACKUP_CHECK
                    requireGoogleCalendar = [string]$env:REQUIRE_GOOGLE_CALENDAR
                    allowDegradedServicePriorities = [string]$env:ALLOW_DEGRADED_SERVICE_PRIORITIES
                    minServicePrioritiesServices = [string]$env:MIN_SERVICE_PRIORITIES_SERVICES
                    minServicePrioritiesCategories = [string]$env:MIN_SERVICE_PRIORITIES_CATEGORIES
                    minServicePrioritiesFeatured = [string]$env:MIN_SERVICE_PRIORITIES_FEATURED
                    requireServicePrioritiesFunnel = [string]$env:REQUIRE_SERVICE_PRIORITIES_FUNNEL
                  }
                  $workflow = [ordered]@{
                    reportVersion = 1
                    eventName = [string]$env:GITHUB_EVENT_NAME
                    runId = [string]$env:GITHUB_RUN_ID
                    runAttempt = [string]$env:GITHUB_RUN_ATTEMPT
                    repository = [string]$env:GITHUB_REPOSITORY
                    workflow = [string]$env:GITHUB_WORKFLOW
                    ref = [string]$env:GITHUB_REF
                    monitor = [ordered]@{
                      stepOutcome = '${{ steps.monitor_prod.outcome }}'
                      inputs = $monitorInputs
                    }
                    telemedicine = $telemedicine
                    publicSyncRecovery = $publicSyncRecovery
                    turneroPilotRecovery = $turneroPilotRecovery
                    publicCutover = $publicCutover
                    publicV4Rollout = $publicV4Rollout
                    staleDeployAlertAutoclose = $staleDeployAutoclose
                  }

                  $workflowFailures = @()
                  if ($telemedicine.status -eq 'failed' -or $telemedicine.status -eq 'unknown') {
                    $workflowFailures += 'telemedicine'
                  }
                  if ($publicSyncRecovery.status -eq 'failed') {
                    $workflowFailures += 'public_sync_recovery'
                  }
                  if ($turneroPilotRecovery.status -eq 'failed') {
                    $workflowFailures += 'turnero_pilot_recovery'
                  }
                  if ($publicCutover.stepOutcome -eq 'failure') {
                    $workflowFailures += 'public_cutover'
                  }
                  if ($publicV4Rollout.stepOutcome -eq 'failure') {
                    $workflowFailures += 'public_v4_rollout'
                  }

                  $failureCount = @($report.failures).Count
                  $warningCount = @($report.warnings).Count
                  $normalizedStatus = [string]$report.status
                  if ($failureCount -gt 0 -or $workflowFailures.Count -gt 0) {
                    $normalizedStatus = 'failed'
                  } elseif ($warningCount -gt 0 -or $normalizedStatus -eq 'warning' -or $telemedicine.status -eq 'degraded') {
                    $normalizedStatus = 'warning'
                  } elseif ([string]::IsNullOrWhiteSpace($normalizedStatus) -or $normalizedStatus -eq 'unknown') {
                    $normalizedStatus = 'ok'
                  }

                  Add-Member -InputObject $report -NotePropertyName workflow -NotePropertyValue $workflow -Force
                  Add-Member -InputObject $report -NotePropertyName failureCount -NotePropertyValue $failureCount -Force
                  Add-Member -InputObject $report -NotePropertyName warningCount -NotePropertyValue $warningCount -Force
                  Add-Member -InputObject $report -NotePropertyName workflowFailures -NotePropertyValue @($workflowFailures) -Force
                  Add-Member -InputObject $report -NotePropertyName status -NotePropertyValue $normalizedStatus -Force
                  Add-Member -InputObject $report -NotePropertyName ok -NotePropertyValue ($normalizedStatus -eq 'ok') -Force
                  Add-Member -InputObject $report -NotePropertyName artifact -NotePropertyValue ([ordered]@{
                    name = 'prod-monitor-report'
                    path = [string]$env:PROD_MONITOR_REPORT_PATH
                  }) -Force

                  $report | ConvertTo-Json -Depth 40 | Set-Content -LiteralPath $reportPath -Encoding utf8

            - name: Upload canonical prod-monitor report
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: prod-monitor-report
                  path: ${{ env.PROD_MONITOR_REPORT_PATH }}
                  if-no-files-found: error
                  retention-days: 7

            - name: Resumen
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $reportPath = [string]$env:PROD_MONITOR_REPORT_PATH
                  if (-not (Test-Path -LiteralPath $reportPath)) {
                    throw "No existe prod-monitor report para summary: $reportPath"
                  }
                  $report = ((Get-Content -LiteralPath $reportPath -Raw -Encoding utf8) -replace "^\uFEFF", '') | ConvertFrom-Json -Depth 40
                  $lines = New-Object System.Collections.Generic.List[string]
                  $lines.Add('## Production monitor')
                  $lines.Add("- status: ``$($report.status)``")
                  $lines.Add("- domain: ``$($report.domain)``")
                  $lines.Add("- generated_at: ``$($report.generatedAt)``")
                  $lines.Add("- report_path: ``$reportPath``")
                  $lines.Add("- artifact_name: ``$($report.artifact.name)``")
                  $lines.Add("- failures_count: ``$($report.failureCount)``")
                  $lines.Add("- warnings_count: ``$($report.warningCount)``")
                  $lines.Add("- allow_degraded_service_priorities: ``$($report.workflow.monitor.inputs.allowDegradedServicePriorities)``")
                  $lines.Add("- min_service_priorities_services: ``$($report.workflow.monitor.inputs.minServicePrioritiesServices)``")
                  $lines.Add("- min_service_priorities_categories: ``$($report.workflow.monitor.inputs.minServicePrioritiesCategories)``")
                  $lines.Add("- min_service_priorities_featured: ``$($report.workflow.monitor.inputs.minServicePrioritiesFeatured)``")
                  $lines.Add("- require_service_priorities_funnel: ``$($report.workflow.monitor.inputs.requireServicePrioritiesFunnel)``")
                  $lines.Add("- telemedicine_monitor_status: ``$($report.workflow.telemedicine.status)``")
                  $lines.Add("- telemedicine_monitor_reason: ``$($report.workflow.telemedicine.reason)``")
                  $lines.Add("- telemedicine_monitor_non_tele_failures: ``$($report.workflow.telemedicine.nonTeleFailures)``")
                  $lines.Add("- telemedicine_monitor_step_outcome: ``$($report.workflow.telemedicine.stepOutcome)``")
                  $lines.Add("- public_sync_recovery_status: ``$($report.workflow.publicSyncRecovery.status)``")
                  $lines.Add("- public_sync_recovery_reason: ``$($report.workflow.publicSyncRecovery.reason)``")
                  $lines.Add("- public_sync_current_head: ``$($report.workflow.publicSyncRecovery.currentHead)``")
                  $lines.Add("- public_sync_remote_head: ``$($report.workflow.publicSyncRecovery.remoteHead)``")
                  $lines.Add("- public_sync_dirty_paths_count: ``$($report.workflow.publicSyncRecovery.dirtyPathsCount)``")
                  $lines.Add("- turnero_pilot_recovery_status: ``$($report.workflow.turneroPilotRecovery.status)``")
                  $lines.Add("- turnero_pilot_recovery_reason: ``$($report.workflow.turneroPilotRecovery.reason)``")
                  $lines.Add("- turnero_pilot_recovery_clinic_id: ``$($report.workflow.turneroPilotRecovery.clinicId)``")
                  $lines.Add("- turnero_pilot_recovery_profile_fingerprint: ``$($report.workflow.turneroPilotRecovery.profileFingerprint)``")
                  $lines.Add("- turnero_pilot_recovery_deployed_commit: ``$($report.workflow.turneroPilotRecovery.deployedCommit)``")
                  $lines.Add("- turnero_pilot_recovery_targets: ``$($report.workflow.turneroPilotRecovery.recoveryTargets)``")
                  $lines.Add("- turnero_pilot_recovery_manifest: ``$($report.workflow.turneroPilotRecovery.manifestPath)``")
                  $lines.Add("- enable_public_cutover_monitor: ``$($report.workflow.publicCutover.enabled)``")
                  $lines.Add("- public_cutover_started_at: ``$($report.workflow.publicCutover.startedAt)``")
                  $lines.Add("- public_cutover_window_hours: ``$($report.workflow.publicCutover.windowHours)``")
                  $lines.Add("- public_cutover_window_active: ``$($report.workflow.publicCutover.windowActive)`` (reason ``$($report.workflow.publicCutover.windowReason)``)")
                  $lines.Add("- public_cutover_elapsed_hours: ``$($report.workflow.publicCutover.elapsedHours)``")
                  $lines.Add("- public_cutover_step_outcome: ``$($report.workflow.publicCutover.stepOutcome)``")
                  $lines.Add("- enable_public_v4_rollout_monitor: ``$($report.workflow.publicV4Rollout.enabled)``")
                  $lines.Add("- public_v4_rollout_stage: ``$($report.workflow.publicV4Rollout.stage)``")
                  $lines.Add("- public_v4_rollout_surface_test: ``$($report.workflow.publicV4Rollout.surfaceTest)``")
                  $lines.Add("- public_v4_rollout_surface_control: ``$($report.workflow.publicV4Rollout.surfaceControl)``")
                  $lines.Add("- public_v4_rollout_min_view_booking: ``$($report.workflow.publicV4Rollout.minViewBooking)``")
                  $lines.Add("- public_v4_rollout_min_start_checkout: ``$($report.workflow.publicV4Rollout.minStartCheckout)``")
                  $lines.Add("- public_v4_rollout_max_confirmed_drop_pp: ``$($report.workflow.publicV4Rollout.maxConfirmedDropPp)``")
                  $lines.Add("- public_v4_rollout_min_confirmed_rate_pct: ``$($report.workflow.publicV4Rollout.minConfirmedRatePct)``")
                  $lines.Add("- public_v4_rollout_allow_missing_control: ``$($report.workflow.publicV4Rollout.allowMissingControl)``")
                  $lines.Add("- enable_public_v4_rollout_monitor_effective: ``$($report.workflow.publicV4Rollout.enabledEffective)``")
                  $lines.Add("- public_v4_rollout_stage_effective: ``$($report.workflow.publicV4Rollout.stageEffective)``")
                  $lines.Add("- public_v4_rollout_stage_profile_effective: ``$($report.workflow.publicV4Rollout.stageProfileEffective)``")
                  $lines.Add("- public_v4_rollout_policy_source_effective: ``$($report.workflow.publicV4Rollout.policySourceEffective)``")
                  $lines.Add("- public_v4_rollout_surface_test_effective: ``$($report.workflow.publicV4Rollout.surfaceTestEffective)``")
                  $lines.Add("- public_v4_rollout_surface_control_effective: ``$($report.workflow.publicV4Rollout.surfaceControlEffective)``")
                  $lines.Add("- public_v4_rollout_min_view_booking_effective: ``$($report.workflow.publicV4Rollout.minViewBookingEffective)``")
                  $lines.Add("- public_v4_rollout_min_start_checkout_effective: ``$($report.workflow.publicV4Rollout.minStartCheckoutEffective)``")
                  $lines.Add("- public_v4_rollout_max_confirmed_drop_pp_effective: ``$($report.workflow.publicV4Rollout.maxConfirmedDropPpEffective)``")
                  $lines.Add("- public_v4_rollout_min_confirmed_rate_pct_effective: ``$($report.workflow.publicV4Rollout.minConfirmedRatePctEffective)``")
                  $lines.Add("- public_v4_rollout_allow_missing_control_effective: ``$($report.workflow.publicV4Rollout.allowMissingControlEffective)``")
                  $lines.Add("- public_v4_rollout_step_outcome: ``$($report.workflow.publicV4Rollout.stepOutcome)``")
                  $lines.Add("- stale_deploy_alert_autoclose_status: ``$($report.workflow.staleDeployAlertAutoclose.status)``")
                  $lines.Add("- stale_deploy_alert_autoclose_reason: ``$($report.workflow.staleDeployAlertAutoclose.reason)``")
                  $lines.Add("- stale_deploy_alert_autoclose_public_sync_healthy: ``$($report.workflow.staleDeployAlertAutoclose.publicSyncHealthy)``")
                  $lines.Add("- stale_deploy_alert_autoclose_open_relevant_count: ``$($report.workflow.staleDeployAlertAutoclose.openRelevantCount)``")
                  $lines.Add("- stale_deploy_alert_autoclose_closed_count: ``$($report.workflow.staleDeployAlertAutoclose.closedCount)``")
                  $lines.Add("- stale_deploy_alert_autoclose_closed_issues: ``$($report.workflow.staleDeployAlertAutoclose.closedIssues)``")
                  $lines.Add("- health_status: ``$($report.checks.health.status)``")
                  $lines.Add("- public_sync_status: ``$($report.checks.publicSync.status)``")
                  $lines.Add("- telemedicine_status: ``$($report.checks.telemedicine.status)``")
                  $lines.Add("- turnero_pilot_status: ``$($report.checks.turneroPilot.status)``")
                  $lines.Add("- github_deploy_alerts_status: ``$($report.checks.githubDeployAlerts.status)``")
                  [System.IO.File]::AppendAllLines($env:GITHUB_STEP_SUMMARY, $lines)

            - name: Crear/actualizar incidente (solo schedule)
              if: ${{ failure() && github.event_name == 'schedule' && steps.public_cutover.outcome != 'failure' && steps.public_v4_rollout.outcome != 'failure' && ((env.TELEMEDICINE_MONITOR_STATUS != 'failed' && env.TELEMEDICINE_MONITOR_STATUS != 'unknown') || env.TELEMEDICINE_MONITOR_NON_TELE_FAILURES != '0') }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Monitor de produccion fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Production Monitor` fallo en ejecucion programada.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert']
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: ['production-alert']
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Crear/actualizar incidente telemedicina (solo schedule)
              if: ${{ failure() && github.event_name == 'schedule' && (env.TELEMEDICINE_MONITOR_STATUS == 'failed' || env.TELEMEDICINE_MONITOR_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Monitor telemedicina degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const reason = String(process.env.TELEMEDICINE_MONITOR_REASON || 'n/a');
                      const signal = `status:${process.env.TELEMEDICINE_MONITOR_STATUS || 'n/a'}|reason:${reason}|non_tele:${process.env.TELEMEDICINE_MONITOR_NON_TELE_FAILURES || '0'}`;
                      const signalMarker = `<!-- prod-monitor-telemedicine-signal:${signal} -->`;

                      const severity = (reason.includes('diagnostics_critical') ||
                        reason.includes('telemedicine_missing') ||
                        reason.includes('telemedicine_unconfigured') ||
                        reason.includes('dangling_links') ||
                        reason.includes('case_photos_missing_private_path') ||
                        reason.includes('health_unreachable'))
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'telemedicine', 'prod-monitor', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El monitor diario detecto degradacion en checks de telemedicina.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- target_domain: ${process.env.TARGET_DOMAIN || 'n/a'}`,
                        `- telemedicine_monitor_status: ${process.env.TELEMEDICINE_MONITOR_STATUS || 'n/a'}`,
                        `- telemedicine_monitor_reason: ${process.env.TELEMEDICINE_MONITOR_REASON || 'n/a'}`,
                        `- telemedicine_monitor_non_tele_failures: ${process.env.TELEMEDICINE_MONITOR_NON_TELE_FAILURES || '0'}`,
                        `- allow_degraded_telemedicine_diagnostics: ${process.env.ALLOW_DEGRADED_TELEMEDICINE_DIAGNOSTICS || 'n/a'}`,
                        `- require_telemedicine_configured: ${process.env.REQUIRE_TELEMEDICINE_CONFIGURED || 'n/a'}`,
                        `- max_telemedicine_review_queue: ${process.env.MAX_TELEMEDICINE_REVIEW_QUEUE || 'n/a'}`,
                        `- max_telemedicine_staged_uploads: ${process.env.MAX_TELEMEDICINE_STAGED_UPLOADS || 'n/a'}`,
                        `- max_telemedicine_unlinked_intakes: ${process.env.MAX_TELEMEDICINE_UNLINKED_INTAKES || 'n/a'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue telemedicina actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue telemedicina ya refleja la misma senal: #${existing.number}`);
                          return;
                        }

                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente telemedicina actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_monitor_status: ${process.env.TELEMEDICINE_MONITOR_STATUS || 'n/a'}`,
                            `- telemedicine_monitor_reason: ${process.env.TELEMEDICINE_MONITOR_REASON || 'n/a'}`,
                            `- telemedicine_monitor_non_tele_failures: ${process.env.TELEMEDICINE_MONITOR_NON_TELE_FAILURES || '0'}`
                          ].join('\n')
                        });
                        core.info(`Issue telemedicina existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue telemedicina creado: #${created.data.number}`);
                      }

