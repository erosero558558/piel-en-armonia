                        `- max_confirmed_drop_pp: ${process.env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE || process.env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || 'n/a'}`,
                        `- min_confirmed_rate_pct: ${process.env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE || process.env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || 'n/a'}`
