                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- public_v4_rollout_min_start_checkout_effective: ``$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE``"
