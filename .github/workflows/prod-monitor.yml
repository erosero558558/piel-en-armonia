name: Production Monitor

on:
    schedule:
        - cron: '*/30 * * * *'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            max_latency_ms:
                description: 'Latencia maxima aceptada por endpoint (ms)'
                required: false
                default: '3500'
                type: string
            allow_degraded_figo:
                description: 'Permitir Figo en modo degraded temporalmente'
                required: false
                default: false
                type: boolean
            allow_store_calendar:
                description: 'Permitir agenda local/store en lugar de Google (temporal hasta cutover)'
                required: false
                default: true
                type: boolean
            require_google_calendar:
                description: 'Forzar validacion de calendario en modo Google estricto'
                required: false
                default: false
                type: boolean
            allow_blocked_calendar:
                description: 'Permitir calendarMode=blocked temporalmente'
                required: false
                default: false
                type: boolean
            skip_backup_check:
                description: 'Saltar validacion de backup en health'
                required: false
                default: false
                type: boolean
            allow_degraded_service_priorities:
                description: 'Permitir service-priorities en source distinto de catalog+funnel temporalmente'
                required: false
                default: false
                type: boolean
            min_service_priorities_services:
                description: 'Minimo de servicios esperados en service-priorities'
                required: false
                default: '1'
                type: string
            min_service_priorities_categories:
                description: 'Minimo de categorias esperadas en service-priorities'
                required: false
                default: '1'
                type: string
            min_service_priorities_featured:
                description: 'Minimo de destacados esperados en service-priorities'
                required: false
                default: '1'
                type: string
            require_service_priorities_funnel:
                description: 'Exigir source=catalog+funnel para service-priorities'
                required: false
                default: false
                type: boolean
            enable_public_cutover_monitor:
                description: 'Habilitar smoke publico post-cutover (routing + conversion)'
                required: false
                default: false
                type: boolean
            public_cutover_started_at:
                description: 'Fecha/hora de inicio de cutover (ISO 8601)'
                required: false
                default: ''
                type: string
            public_cutover_window_hours:
                description: 'Ventana activa post-cutover para smoke publico (horas)'
                required: false
                default: '72'
                type: string
            enable_public_v4_rollout_monitor:
                description: 'Habilitar gate de rollout V4 por conversion (A/B)'
                required: false
                default: false
                type: boolean
            public_v4_rollout_stage:
                description: 'Etapa de rollout V4 (internal|canary|general|rollback)'
                required: false
                default: 'canary'
                type: string
            public_v4_rollout_surface_test:
                description: 'Surface test para el gate de rollout (ej. v4)'
                required: false
                default: 'v4'
                type: string
            public_v4_rollout_surface_control:
                description: 'Surface control para comparar conversion (ej. legacy)'
                required: false
                default: 'legacy'
                type: string
            public_v4_rollout_min_view_booking:
                description: 'Muestra minima de view_booking para canary'
                required: false
                default: '20'
                type: string
            public_v4_rollout_min_start_checkout:
                description: 'Muestra minima de start_checkout para canary/control'
                required: false
                default: '10'
                type: string
            public_v4_rollout_max_confirmed_drop_pp:
                description: 'Drop maximo permitido (pp) en confirmedRate test vs control'
                required: false
                default: '8'
                type: string
            public_v4_rollout_min_confirmed_rate_pct:
                description: 'Confirmed rate minimo absoluto para surface test'
                required: false
                default: '20'
                type: string
            public_v4_rollout_allow_missing_control:
                description: 'Permitir ausencia temporal de surface control'
                required: false
                default: false
                type: boolean

concurrency:
    group: prod-monitor
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    monitor:
        name: Health + latency monitor
        runs-on: windows-latest
        timeout-minutes: 10
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || 'https://pielarmonia.com' }}
            MAX_LATENCY_MS: ${{ github.event.inputs.max_latency_ms || '3500' }}
            ALLOW_DEGRADED_FIGO: ${{ github.event.inputs.allow_degraded_figo || 'false' }}
            ALLOW_STORE_CALENDAR: ${{ github.event.inputs.allow_store_calendar || vars.PROD_MONITOR_ALLOW_STORE_CALENDAR || 'true' }}
            ALLOW_BLOCKED_CALENDAR: ${{ github.event.inputs.allow_blocked_calendar || 'false' }}
            SKIP_BACKUP_CHECK: ${{ github.event.inputs.skip_backup_check || 'false' }}
            REQUIRE_GOOGLE_CALENDAR: ${{ github.event.inputs.require_google_calendar || vars.REQUIRE_GOOGLE_CALENDAR || 'false' }}
            ALLOW_DEGRADED_SERVICE_PRIORITIES: ${{ github.event.inputs.allow_degraded_service_priorities || 'false' }}
            MIN_SERVICE_PRIORITIES_SERVICES: ${{ github.event.inputs.min_service_priorities_services || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_SERVICES || '1' }}
            MIN_SERVICE_PRIORITIES_CATEGORIES: ${{ github.event.inputs.min_service_priorities_categories || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_CATEGORIES || '1' }}
            MIN_SERVICE_PRIORITIES_FEATURED: ${{ github.event.inputs.min_service_priorities_featured || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_FEATURED || '1' }}
            REQUIRE_SERVICE_PRIORITIES_FUNNEL: ${{ github.event.inputs.require_service_priorities_funnel || vars.PROD_MONITOR_REQUIRE_SERVICE_PRIORITIES_FUNNEL || 'false' }}
            ENABLE_PUBLIC_CUTOVER_MONITOR: ${{ github.event.inputs.enable_public_cutover_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_CUTOVER || 'false' }}
            PUBLIC_CUTOVER_STARTED_AT: ${{ github.event.inputs.public_cutover_started_at || vars.PUBLIC_CUTOVER_STARTED_AT || '' }}
            PUBLIC_CUTOVER_WINDOW_HOURS: ${{ github.event.inputs.public_cutover_window_hours || vars.PUBLIC_CUTOVER_WINDOW_HOURS || '72' }}
            PUBLIC_CUTOVER_WINDOW_ACTIVE: 'false'
            PUBLIC_CUTOVER_WINDOW_REASON: 'disabled'
            PUBLIC_CUTOVER_ELAPSED_HOURS: ''
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR: ${{ github.event.inputs.enable_public_v4_rollout_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT || 'false' }}
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE: ${{ github.event.inputs.enable_public_v4_rollout_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT || 'false' }}
            PUBLIC_V4_ROLLOUT_STAGE: ${{ github.event.inputs.public_v4_rollout_stage || vars.PUBLIC_V4_ROLLOUT_STAGE || 'canary' }}
            PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: canary
            PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE: progressive
            PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE: input_or_var
            PUBLIC_V4_ROLLOUT_SURFACE_TEST: ${{ github.event.inputs.public_v4_rollout_surface_test || vars.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4' }}
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL: ${{ github.event.inputs.public_v4_rollout_surface_control || vars.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy' }}
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING: ${{ github.event.inputs.public_v4_rollout_min_view_booking || vars.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING || '20' }}
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT: ${{ github.event.inputs.public_v4_rollout_min_start_checkout || vars.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT || '10' }}
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP: ${{ github.event.inputs.public_v4_rollout_max_confirmed_drop_pp || vars.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || '8' }}
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT: ${{ github.event.inputs.public_v4_rollout_min_confirmed_rate_pct || vars.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || '20' }}
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL: ${{ github.event.inputs.public_v4_rollout_allow_missing_control || vars.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL || 'false' }}
            PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_surface_test || vars.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4' }}
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_surface_control || vars.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy' }}
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_min_view_booking || vars.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING || '20' }}
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_min_start_checkout || vars.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT || '10' }}
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_max_confirmed_drop_pp || vars.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || '8' }}
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_min_confirmed_rate_pct || vars.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || '20' }}
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: ${{ github.event.inputs.public_v4_rollout_allow_missing_control || vars.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL || 'false' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Ejecutar monitor de produccion
              shell: pwsh
              run: |
                  $maxLatency = [int]$env:MAX_LATENCY_MS
                  if ($maxLatency -lt 500) { $maxLatency = 500 }

                  $requireGoogleCalendar = [string]$env:REQUIRE_GOOGLE_CALENDAR
                  $forceGoogle = $requireGoogleCalendar.ToLowerInvariant() -eq 'true'

                  $monitorArgs = @{
                    Domain = $env:TARGET_DOMAIN
                    MaxLatencyMs = $maxLatency
                  }

                  if ($env:ALLOW_DEGRADED_FIGO -eq 'true') {
                    $monitorArgs.AllowDegradedFigo = $true
                  }
                  if ($env:ALLOW_STORE_CALENDAR -eq 'true') {
                    $monitorArgs.AllowStoreCalendar = $true
                  }
                  if ($forceGoogle -and $monitorArgs.ContainsKey('AllowStoreCalendar')) {
                    $monitorArgs.Remove('AllowStoreCalendar')
                  }
                  if ($env:ALLOW_BLOCKED_CALENDAR -eq 'true') {
                    $monitorArgs.AllowBlockedCalendar = $true
                  }
                  if ($env:SKIP_BACKUP_CHECK -eq 'true') {
                    $monitorArgs.SkipBackupCheck = $true
                  }
                  if ($env:ALLOW_DEGRADED_SERVICE_PRIORITIES -eq 'true') {
                    $monitorArgs.AllowDegradedServicePriorities = $true
                  }
                  if ($env:REQUIRE_SERVICE_PRIORITIES_FUNNEL -eq 'true') {
                    $monitorArgs.RequireServicePrioritiesFunnel = $true
                  }

                  $minServices = [int]$env:MIN_SERVICE_PRIORITIES_SERVICES
                  if ($minServices -lt 0) { $minServices = 0 }
                  $monitorArgs.MinServicePrioritiesServices = $minServices

                  $minCategories = [int]$env:MIN_SERVICE_PRIORITIES_CATEGORIES
                  if ($minCategories -lt 0) { $minCategories = 0 }
                  $monitorArgs.MinServicePrioritiesCategories = $minCategories

                  $minFeatured = [int]$env:MIN_SERVICE_PRIORITIES_FEATURED
                  if ($minFeatured -lt 0) { $minFeatured = 0 }
                  $monitorArgs.MinServicePrioritiesFeatured = $minFeatured

                  & ./MONITOR-PRODUCCION.ps1 @monitorArgs

            - name: Evaluar ventana post-cutover publico
              id: cutover_window
              shell: pwsh
              run: |
                  $enabled = ([string]$env:ENABLE_PUBLIC_CUTOVER_MONITOR).ToLowerInvariant() -eq 'true'
                  $windowHours = 72.0
                  try {
                    $parsedWindow = [double]$env:PUBLIC_CUTOVER_WINDOW_HOURS
                    if ($parsedWindow -ge 1) {
                      $windowHours = $parsedWindow
                    }
                  } catch {
                    Write-Host "[WARN] PUBLIC_CUTOVER_WINDOW_HOURS invalido. Se usa 72h."
                  }

                  $active = $false
                  $reason = 'disabled'
                  $elapsedHours = ''

                  if ($enabled) {
                    $reason = 'missing_start'
                    $startRaw = [string]$env:PUBLIC_CUTOVER_STARTED_AT
                    if (-not [string]::IsNullOrWhiteSpace($startRaw)) {
                      try {
                        $startAt = [DateTimeOffset]::Parse(
                          $startRaw,
                          [System.Globalization.CultureInfo]::InvariantCulture,
                          [System.Globalization.DateTimeStyles]::AssumeUniversal
                        )
                        $nowUtc = [DateTimeOffset]::UtcNow
                        $elapsed = ($nowUtc - $startAt.ToUniversalTime()).TotalHours
                        $elapsedHours = [Math]::Round($elapsed, 2).ToString(
                          [System.Globalization.CultureInfo]::InvariantCulture
                        )
                        if ($elapsed -lt 0) {
                          $reason = 'future_start'
                        } elseif ($elapsed -le $windowHours) {
                          $active = $true
                          $reason = 'active'
                        } else {
                          $reason = 'window_elapsed'
                        }
                      } catch {
                        $reason = 'invalid_start'
                        Write-Host "[WARN] PUBLIC_CUTOVER_STARTED_AT invalido: $startRaw"
                      }
                    }
                  }

                  $activeValue = if ($active) { 'true' } else { 'false' }
                  "PUBLIC_CUTOVER_WINDOW_ACTIVE=$activeValue" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_CUTOVER_WINDOW_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_CUTOVER_ELAPSED_HOURS=$elapsedHours" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

                  "active=$activeValue" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "elapsed_hours=$elapsedHours" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Cutover window => enabled=$enabled active=$activeValue reason=$reason elapsed_hours=$elapsedHours window_hours=$windowHours"

            - name: Setup Node para smoke/gates publicos
              if: ${{ env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' || env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR == 'true' }}
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Resolver politica rollout publico V4
              id: resolve_public_v4_rollout
              if: ${{ env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR == 'true' }}
              shell: pwsh
              run: |
                  $policyJson = node ./bin/resolve-public-v4-rollout-policy.js `
                    --stage "$env:PUBLIC_V4_ROLLOUT_STAGE" `
                    --default-stage canary `
                    --enable-monitor "$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR" `
                    --surface-test "$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST" `
                    --surface-control "$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL" `
                    --min-view-booking "$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING" `
                    --min-start-checkout "$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT" `
                    --max-confirmed-drop-pp "$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP" `
                    --min-confirmed-rate-pct "$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT" `
                    --allow-missing-control "$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL"

                  if ([string]::IsNullOrWhiteSpace($policyJson)) {
                    throw 'No se pudo resolver politica rollout V4.'
                  }

                  $policy = $policyJson | ConvertFrom-Json
                  $enableMonitorEffective = if ($policy.enable_monitor_effective) { 'true' } else { 'false' }
                  $allowMissingControlEffective = if ($policy.allow_missing_control_effective) { 'true' } else { 'false' }
                  $stageEffective = [string]$policy.stage_effective
                  $stageProfileEffective = [string]$policy.stage_profile
                  $policySourceEffective = [string]$policy.policy_source
                  $surfaceTestEffective = [string]$policy.surface_test_effective
                  $surfaceControlEffective = [string]$policy.surface_control_effective
                  $minViewEffective = [string]$policy.min_view_booking_effective
                  $minStartEffective = [string]$policy.min_start_checkout_effective
                  $maxDropEffective = [string]$policy.max_confirmed_drop_pp_effective
                  $minConfirmedEffective = [string]$policy.min_confirmed_rate_pct_effective

                  "ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE=$enableMonitorEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE=$stageEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE=$stageProfileEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE=$policySourceEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE=$surfaceTestEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE=$surfaceControlEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE=$minViewEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE=$minStartEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE=$maxDropEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE=$minConfirmedEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE=$allowMissingControlEffective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

                  "enable_monitor_effective=$enableMonitorEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "stage_effective=$stageEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "stage_profile_effective=$stageProfileEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "policy_source_effective=$policySourceEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "surface_test_effective=$surfaceTestEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "surface_control_effective=$surfaceControlEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "min_view_booking_effective=$minViewEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "min_start_checkout_effective=$minStartEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "max_confirmed_drop_pp_effective=$maxDropEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "min_confirmed_rate_pct_effective=$minConfirmedEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "allow_missing_control_effective=$allowMissingControlEffective" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

                  Write-Host "Public V4 rollout policy => stage=$stageEffective profile=$stageProfileEffective policy_source=$policySourceEffective monitor=$enableMonitorEffective"

            - name: Validar routing + conversion publica post-cutover (ES/EN)
              id: public_cutover
              if: ${{ env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover-monitor
                  node bin/check-public-routing-smoke.js --base-url "${TARGET_DOMAIN}" --label "prod-monitor-cutover-routing" --output ".public-cutover-monitor/routing-smoke.json"
                  node bin/check-public-conversion-smoke.js --base-url "${TARGET_DOMAIN}" --label "prod-monitor-cutover-conversion" --output ".public-cutover-monitor/conversion-smoke.json"

            - name: Upload public cutover monitor evidence
              if: ${{ always() && env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: public-cutover-monitor-evidence
                  path: .public-cutover-monitor/
                  if-no-files-found: warn
                  retention-days: 7

            - name: Validar rollout publico V4 (A/B + kill-switch readiness)
              id: public_v4_rollout
              if: ${{ env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-v4-rollout-monitor
                  gate_args=(
                    --base-url "${TARGET_DOMAIN}"
                    --label "prod-monitor-v4-rollout"
                    --surface-test "${PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE}"
                    --surface-control "${PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE}"
                    --min-view-booking "${PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE}"
                    --min-start-checkout "${PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE}"
                    --max-confirmed-drop-pp "${PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE}"
                    --min-confirmed-rate-pct "${PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE}"
                    --out ".public-v4-rollout-monitor/rollout-gate.json"
                  )
                  if [ "${PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE}" = "true" ]; then
                    gate_args+=(--allow-missing-control)
                  fi
                  node bin/run-public-v4-rollout-gate.js "${gate_args[@]}"

            - name: Upload public V4 rollout evidence
              if: ${{ always() && env.ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_EFFECTIVE == 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: public-v4-rollout-monitor-evidence
                  path: .public-v4-rollout-monitor/
                  if-no-files-found: warn
                  retention-days: 7

            - name: Resumen
              if: ${{ always() }}
              shell: pwsh
              run: |
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Production monitor"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Dominio: ``$env:TARGET_DOMAIN``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Max latency: ``$env:MAX_LATENCY_MS ms``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_degraded_figo: ``$env:ALLOW_DEGRADED_FIGO``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_store_calendar: ``$env:ALLOW_STORE_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_blocked_calendar: ``$env:ALLOW_BLOCKED_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- skip_backup_check: ``$env:SKIP_BACKUP_CHECK``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- require_google_calendar: ``$env:REQUIRE_GOOGLE_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_degraded_service_priorities: ``$env:ALLOW_DEGRADED_SERVICE_PRIORITIES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- min_service_priorities_services: ``$env:MIN_SERVICE_PRIORITIES_SERVICES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- min_service_priorities_categories: ``$env:MIN_SERVICE_PRIORITIES_CATEGORIES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- min_service_priorities_featured: ``$env:MIN_SERVICE_PRIORITIES_FEATURED``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- require_service_priorities_funnel: ``$env:REQUIRE_SERVICE_PRIORITIES_FUNNEL``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- enable_public_cutover_monitor: ``$env:ENABLE_PUBLIC_CUTOVER_MONITOR``"
