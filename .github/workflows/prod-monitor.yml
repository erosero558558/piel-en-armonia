                          `- rollout_stage_profile: ${process.env.PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE || 'n/a'}`,
                          `- rollout_policy_source: ${process.env.PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE || 'n/a'}`,
                          `- surface_test: ${process.env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE || process.env.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4'}`,
                          `- surface_control: ${process.env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE || process.env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue rollout V4 cerrado: #${existing.number}`);
