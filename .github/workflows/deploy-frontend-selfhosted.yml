name: Deploy Frontend (Self-Hosted)

on:
    workflow_dispatch:
        inputs:
            protocol:
                description: 'Protocolo (auto|sftp|ftps|ftp)'
                required: false
                default: 'auto'
                type: choice
                options:
                    - auto
                    - sftp
                    - ftps
                    - ftp
            remote_dir:
                description: 'Directorio remoto de publicación'
                required: false
                default: '/public_html/'
                type: string
            run_build:
                description: 'Construir Astro antes de publicar'
                required: false
                default: true
                type: boolean

permissions:
    contents: read
    issues: write

jobs:
    deploy:
        name: Publicar frontend via self-hosted
        runs-on: [self-hosted, Windows]
        timeout-minutes: 40
        env:
            TARGET_DOMAIN: https://pielarmonia.com
            DEPLOY_PROTOCOL_INPUT: ${{ github.event.inputs.protocol || 'auto' }}
            REMOTE_DIR_INPUT: ${{ github.event.inputs.remote_dir || '/public_html/' }}
            RUN_BUILD_INPUT: ${{ github.event.inputs.run_build || 'true' }}
            FTP_SERVER_SECRET: ${{ secrets.FTP_SERVER }}
            FTP_USERNAME_SECRET: ${{ secrets.FTP_USERNAME }}
            FTP_PASSWORD_SECRET: ${{ secrets.FTP_PASSWORD }}
            SSH_HOST_SECRET: ${{ secrets.SSH_HOST }}
            SSH_USERNAME_SECRET: ${{ secrets.SSH_USERNAME }}
            SSH_PASSWORD_SECRET: ${{ secrets.SSH_PASSWORD }}
            TELEMEDICINE_SELFHOSTED_STATUS: unknown
            TELEMEDICINE_SELFHOSTED_REASON: not_evaluated
            TELEMEDICINE_SELFHOSTED_FAILURES: -1
            TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES: -1
            TURNERO_PILOT_SELFHOSTED_STATUS: unknown
            TURNERO_PILOT_SELFHOSTED_REASON: not_evaluated
            TURNERO_PILOT_CLINIC_ID: ''
            TURNERO_PILOT_MATCHING_PROFILE_ID: ''
            TURNERO_PILOT_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_CATALOG_READY: 'false'
            TURNERO_PILOT_RELEASE_MODE: unknown
            TURNERO_PILOT_REMOTE_STATUS: unknown
            TURNERO_PILOT_REMOTE_REASON: not_evaluated
            TURNERO_PILOT_REMOTE_CLINIC_ID: ''
            TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_REMOTE_CATALOG_READY: 'false'
            TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT: ''
            TURNERO_PILOT_REMOTE_VERIFIED: 'false'
            TURNERO_PILOT_RECOVERY_TARGETS: none
            SELFHOSTED_ROUTE_STATUS: unknown
            SELFHOSTED_ROUTE_REASON: not_evaluated
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install project dependencies
              shell: pwsh
              run: npm ci

            - name: Resolve turneroPilot clinic profile (self-hosted deploy)
              id: turnero_pilot_profile
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  New-Item -ItemType Directory -Force -Path '.selfhosted-cutover' | Out-Null
                  $statusPath = '.selfhosted-cutover/turnero-pilot-status.json'
                  $rawPath = '.selfhosted-cutover/turnero-pilot-status.raw.txt'
                  $payload = & node bin/turnero-clinic-profile.js status --json 2> $rawPath
                  $statusExit = $LASTEXITCODE
                  if ($null -eq $payload) {
                      '' | Out-File -FilePath $statusPath -Encoding utf8
                  } else {
                      ($payload -join [Environment]::NewLine) | Out-File -FilePath $statusPath -Encoding utf8
                  }

                  $parsed = $null
                  try {
                      $parsed = Get-Content -Raw -Path $statusPath -Encoding utf8 | ConvertFrom-Json
                  } catch {
                      $parsed = $null
                  }

                  $profileOk = ($parsed -and $parsed.ok -eq $true)
                  $catalogReady = ($parsed -and $parsed.catalogReady -eq $true)
                  $clinicId = if ($parsed -and $parsed.profile -and $parsed.profile.clinic_id) { [string]$parsed.profile.clinic_id } else { '' }
                  $matchingProfileId = if ($parsed -and $parsed.matchingProfileId) { [string]$parsed.matchingProfileId } else { '' }
                  $profileFingerprint = if ($parsed -and $parsed.profileFingerprint) { [string]$parsed.profileFingerprint } else { '' }
                  $releaseMode = if ($parsed -and $parsed.profile -and $parsed.profile.release -and $parsed.profile.release.mode) { [string]$parsed.profile.release.mode } else { '' }

                  $blocking = [System.Collections.Generic.List[string]]::new()
                  if ($statusExit -ne 0 -and -not $parsed) {
                      $blocking.Add('status_command_failed')
                  }
                  if (-not $profileOk) {
                      $blocking.Add('profile_unresolved')
                  }
                  if ($releaseMode -eq 'web_pilot' -and -not $catalogReady) {
                      $blocking.Add('catalog_not_ready')
                  }

                  $status = 'ready'
                  $reason = 'ok'
                  if ($releaseMode -and $releaseMode -ne 'web_pilot') {
                      $status = 'not_required'
                      $reason = "release_mode:$releaseMode"
                  } elseif ($blocking.Count -gt 0) {
                      $status = 'blocked'
                      $reason = [string]::Join(';', $blocking)
                  }
                  $catalogReadyText = ([string]$catalogReady).ToLowerInvariant()
                  $resolvedReleaseMode = if ($releaseMode) { $releaseMode } else { 'unknown' }
                  $recoveryTargets = @()
                  if ($resolvedReleaseMode -eq 'web_pilot') {
                      $recoveryTargets = @(
                          '[ALERTA PROD] Deploy Hosting turneroPilot bloqueado',
                          '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado'
                      )
                  }
                  $recoveryTargetsLabel = if ($recoveryTargets.Count -gt 0) {
                      [string]::Join('|', $recoveryTargets)
                  } else {
                      'none'
                  }
                  $statusSnapshot = [ordered]@{
                      status = $status
                      reason = $reason
                      clinic_id = $clinicId
                      matching_profile_id = $matchingProfileId
                      profile_fingerprint = $profileFingerprint
                      catalog_ready = $catalogReady
                      release_mode = $resolvedReleaseMode
                      recovery_targets = @($recoveryTargets)
                      generated_at = [DateTime]::UtcNow.ToString('o')
                      result = $parsed
                  }
                  $statusSnapshot | ConvertTo-Json -Depth 12 | Out-File -FilePath $statusPath -Encoding utf8

                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_SELFHOSTED_STATUS=$status"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_SELFHOSTED_REASON=$reason"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_CLINIC_ID=$clinicId"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_MATCHING_PROFILE_ID=$matchingProfileId"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_PROFILE_FINGERPRINT=$profileFingerprint"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_CATALOG_READY=$catalogReadyText"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_RELEASE_MODE=$resolvedReleaseMode"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_RECOVERY_TARGETS=$recoveryTargetsLabel"

                  Add-Content -Path $env:GITHUB_OUTPUT -Value "status=$status"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=$reason"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "clinic_id=$clinicId"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "matching_profile_id=$matchingProfileId"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "profile_fingerprint=$profileFingerprint"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_ready=$catalogReadyText"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "release_mode=$resolvedReleaseMode"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "recovery_targets=$recoveryTargetsLabel"

                  if ($status -eq 'blocked') {
                      Write-Error "Turnero pilot self-hosted blocked ($reason) clinic_id=$(if ($clinicId) { $clinicId } else { 'unknown' }) release_mode=$(if ($releaseMode) { $releaseMode } else { 'unknown' })"
                  }

            - name: Build Astro routes
              id: build_astro_routes
              if: ${{ env.RUN_BUILD_INPUT == 'true' }}
              shell: pwsh
              run: |
                  npm run astro:build
                  npm run astro:sync

            - name: Install deploy transport dependencies
              shell: pwsh
              run: npm install --no-save basic-ftp@5 ssh2-sftp-client@11

            - name: Deploy frontend bundle (auto protocol)
              id: deploy_frontend_bundle
              shell: pwsh
              run: |
                  @'
                  const fs = require('node:fs');
                  const path = require('node:path');
                  const ftp = require('basic-ftp');
                  const SftpClient = require('ssh2-sftp-client');

                  const protocolInput = String(process.env.DEPLOY_PROTOCOL_INPUT || 'auto').toLowerCase();
                  const remoteDirInput = String(process.env.REMOTE_DIR_INPUT || '/public_html/');
                  const hostRaw = process.env.FTP_SERVER_SECRET || process.env.SSH_HOST_SECRET || '';
                  const ftpUser = process.env.FTP_USERNAME_SECRET || '';
                  const ftpPassword = process.env.FTP_PASSWORD_SECRET || '';
                  const sftpUser = process.env.SSH_USERNAME_SECRET || ftpUser;
                  const sftpPassword = process.env.SSH_PASSWORD_SECRET || ftpPassword;

                  function sanitizeHost(value) {
                    return String(value || '').replace(/^\w+:\/\//, '').replace(/\/+$/, '').trim();
                  }

                  function normalizeRemoteDir(value) {
                    const raw = String(value || '/public_html/').replace(/\\/g, '/');
                    const prefixed = raw.startsWith('/') ? raw : `/${raw}`;
                    return prefixed.endsWith('/') ? prefixed : `${prefixed}/`;
                  }

                  function walkFiles(rootPath) {
                    const out = [];
                    function visit(currentPath) {
                      const stat = fs.statSync(currentPath);
                      if (stat.isDirectory()) {
                        for (const child of fs.readdirSync(currentPath)) {
                          visit(path.join(currentPath, child));
                        }
                        return;
                      }
                      out.push(currentPath);
                    }
                    visit(rootPath);
                    return out;
                  }

                  function collectDeployFiles() {
                    const candidates = ['es', 'en', '_astro', 'index.php', 'index.html'];
                    const files = [];
                    for (const entry of candidates) {
                      const full = path.resolve(entry);
                      if (!fs.existsSync(full)) continue;
                      const stat = fs.statSync(full);
                      if (stat.isDirectory()) {
                        files.push(...walkFiles(full));
                      } else {
                        files.push(full);
                      }
                    }
                    return files;
                  }

                  function toRemotePath(localFile, remoteBase, cwd) {
                    const rel = path.relative(cwd, localFile).replace(/\\/g, '/');
                    return `${remoteBase}${rel}`;
                  }

                  async function ensureSftpDir(client, remoteDir) {
                    const segments = remoteDir.replace(/\\/g, '/').split('/').filter(Boolean);
                    let current = '';
                    for (const segment of segments) {
                      current += `/${segment}`;
                      const exists = await client.exists(current);
                      if (!exists) {
                        await client.mkdir(current);
                      }
                    }
                  }

                  async function deployViaSftp({ host, port, username, password, remoteBase, files, cwd }) {
                    const client = new SftpClient();
                    await client.connect({
                      host,
                      port,
                      username,
                      password,
                      readyTimeout: 30000,
                    });
                    try {
                      await ensureSftpDir(client, remoteBase);
                      for (const localFile of files) {
                        const remotePath = toRemotePath(localFile, remoteBase, cwd);
                        const remoteParent = path.posix.dirname(remotePath);
                        await ensureSftpDir(client, remoteParent);
                        await client.fastPut(localFile, remotePath);
                        console.log(`[SFTP] uploaded ${remotePath}`);
                      }
                    } finally {
                      await client.end();
                    }
                  }

                  async function deployViaFtp({ host, port, username, password, secure, remoteBase, files, cwd }) {
                    const client = new ftp.Client(30000);
                    client.ftp.verbose = false;
                    await client.access({
                      host,
                      port,
                      user: username,
                      password,
                      secure,
                    });
                    try {
                      await client.ensureDir(remoteBase);
                      await client.cd('/');
                      for (const localFile of files) {
                        const remotePath = toRemotePath(localFile, remoteBase, cwd);
                        const remoteParent = path.posix.dirname(remotePath);
                        await client.ensureDir(remoteParent);
                        await client.uploadFrom(localFile, remotePath);
                        console.log(`[${secure ? 'FTPS' : 'FTP'}] uploaded ${remotePath}`);
                        await client.cd('/');
                      }
                    } finally {
                      client.close();
                    }
                  }

                  async function testSftp({ host, port, username, password }) {
                    const client = new SftpClient();
                    try {
                      await client.connect({
                        host,
                        port,
                        username,
                        password,
                        readyTimeout: 12000,
                      });
                      return true;
                    } catch {
                      return false;
                    } finally {
                      try { await client.end(); } catch {}
                    }
                  }

                  async function testFtp({ host, port, username, password, secure }) {
                    const client = new ftp.Client(12000);
                    try {
                      await client.access({
                        host,
                        port,
                        user: username,
                        password,
                        secure,
                      });
                      return true;
                    } catch {
                      return false;
                    } finally {
                      client.close();
                    }
                  }

                  async function resolveMode() {
                    const host = sanitizeHost(hostRaw);
                    if (!host) {
                      throw new Error('No se encontro host de deploy (FTP_SERVER/SSH_HOST).');
                    }

                    const attempts = [];
                    const protocol = protocolInput;
                    if (protocol === 'sftp' || protocol === 'auto') {
                      for (const port of [65002, 22, 2222, 22022, 21098]) {
                        attempts.push({ mode: 'sftp', port, user: sftpUser, pass: sftpPassword });
                      }
                    }
                    if (protocol === 'ftps' || protocol === 'auto') {
                      for (const port of [21, 990, 2121]) {
                        attempts.push({ mode: 'ftps', port, user: ftpUser, pass: ftpPassword });
                      }
                    }
                    if (protocol === 'ftp' || protocol === 'auto') {
                      for (const port of [21, 2121]) {
                        attempts.push({ mode: 'ftp', port, user: ftpUser, pass: ftpPassword });
                      }
                    }

                    for (const attempt of attempts) {
                      let ok = false;
                      if (attempt.mode === 'sftp') {
                        ok = await testSftp({
                          host,
                          port: attempt.port,
                          username: attempt.user,
                          password: attempt.pass,
                        });
                      } else {
                        ok = await testFtp({
                          host,
                          port: attempt.port,
                          username: attempt.user,
                          password: attempt.pass,
                          secure: attempt.mode === 'ftps',
                        });
                      }
                      console.log(`[probe] mode=${attempt.mode} port=${attempt.port} => ${ok ? 'OPEN' : 'closed'}`);
                      if (ok) {
                        return {
                          host,
                          mode: attempt.mode,
                          port: attempt.port,
                          username: attempt.user,
                          password: attempt.pass,
                        };
                      }
                    }

                    throw new Error('No se encontro un protocolo/puerto de deploy accesible en self-hosted.');
                  }

                  (async () => {
                    const cwd = process.cwd();
                    const files = collectDeployFiles();
                    if (!files.length) {
                      throw new Error('No hay archivos frontend para publicar.');
                    }

                    const remoteBase = normalizeRemoteDir(remoteDirInput);
                    const selected = await resolveMode();
                    console.log(`selected_mode=${selected.mode} selected_port=${selected.port}`);
                    console.log(`files_to_upload=${files.length}`);

                    if (selected.mode === 'sftp') {
                      await deployViaSftp({
                        host: selected.host,
                        port: selected.port,
                        username: selected.username,
                        password: selected.password,
                        remoteBase,
                        files,
                        cwd,
                      });
                    } else {
                      await deployViaFtp({
                        host: selected.host,
                        port: selected.port,
                        username: selected.username,
                        password: selected.password,
                        secure: selected.mode === 'ftps',
                        remoteBase,
                        files,
                        cwd,
                      });
                    }
                  })().catch((error) => {
                    console.error(error?.stack || String(error));
                    process.exit(1);
                  });
                  '@ | node -

            - name: Validate public frontend after deploy
              id: validate_public_frontend
              shell: pwsh
              run: |
                  node bin/check-public-routing-smoke.js `
                    --base-url $env:TARGET_DOMAIN `
                    --expect-routes /es/,/en/ `
                    --expect-redirect /,/es/ `
                    --expect-canonical /es/ `
                    --expect-hreflang es:/es/,en:/en/

                  $resp = Invoke-WebRequest -Uri "$env:TARGET_DOMAIN/es/" -UseBasicParsing
                  $title = [regex]::Match($resp.Content,'<title>(.*?)</title>','IgnoreCase').Groups[1].Value
                  $css = [regex]::Matches($resp.Content,'_astro/index\\.[A-Za-z0-9_-]+\\.css') | Select-Object -First 1 | ForEach-Object { $_.Value }
                  $hasV4 = if ($resp.Content -match '__PUBLIC_V4_FLAGS') { 'true' } else { 'false' }

                  "title=$title" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "css=$css" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "has_public_v4_flags=$hasV4" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

            - name: Verify turneroPilot remote after self-hosted deploy
              if: ${{ always() }}
              id: turnero_pilot_remote
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  New-Item -ItemType Directory -Force -Path '.selfhosted-cutover' | Out-Null
                  $remotePath = '.selfhosted-cutover/turnero-pilot-remote.json'
                  $rawPath = '.selfhosted-cutover/turnero-pilot-remote.raw.txt'
                  $recoveryTargets = @()
                  if ($env:TURNERO_PILOT_RELEASE_MODE -eq 'web_pilot') {
                      $recoveryTargets = @(
                          '[ALERTA PROD] Deploy Hosting turneroPilot bloqueado',
                          '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado'
                      )
                  }
                  $recoveryTargetsLabel = if ($recoveryTargets.Count -gt 0) {
                      [string]::Join('|', $recoveryTargets)
                  } else {
                      'none'
                  }

                  if ($env:TURNERO_PILOT_SELFHOSTED_STATUS -eq 'blocked') {
                      $snapshot = [ordered]@{
                          status = 'blocked'
                          reason = "local_profile:$($env:TURNERO_PILOT_SELFHOSTED_REASON)"
                          verified = $false
                          release_mode = $env:TURNERO_PILOT_RELEASE_MODE
                          clinic_id = $env:TURNERO_PILOT_CLINIC_ID
                          profile_fingerprint = $env:TURNERO_PILOT_PROFILE_FINGERPRINT
                          catalog_ready = ($env:TURNERO_PILOT_CATALOG_READY -eq 'true')
                          deployed_commit = ''
                          recovery_targets = @($recoveryTargets)
                          generated_at = [DateTime]::UtcNow.ToString('o')
                      }
                      $snapshot | ConvertTo-Json -Depth 8 | Out-File -FilePath $remotePath -Encoding utf8
                      '' | Out-File -FilePath $rawPath -Encoding utf8
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_STATUS=blocked"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_REASON=local_profile:$($env:TURNERO_PILOT_SELFHOSTED_REASON)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_CLINIC_ID=$($env:TURNERO_PILOT_CLINIC_ID)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT=$($env:TURNERO_PILOT_PROFILE_FINGERPRINT)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_CATALOG_READY=$($env:TURNERO_PILOT_CATALOG_READY)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT="
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_VERIFIED=false"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_RECOVERY_TARGETS=$recoveryTargetsLabel"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "status=blocked"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=local_profile:$($env:TURNERO_PILOT_SELFHOSTED_REASON)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "clinic_id=$($env:TURNERO_PILOT_CLINIC_ID)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "profile_fingerprint=$($env:TURNERO_PILOT_PROFILE_FINGERPRINT)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_ready=$($env:TURNERO_PILOT_CATALOG_READY)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "deployed_commit="
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "verified=false"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "recovery_targets=$recoveryTargetsLabel"
                      exit 0
                  }

                  if ($env:TURNERO_PILOT_RELEASE_MODE -ne 'web_pilot') {
                      $snapshot = [ordered]@{
                          status = 'not_required'
                          reason = "release_mode:$($env:TURNERO_PILOT_RELEASE_MODE)"
                          verified = $false
                          release_mode = $env:TURNERO_PILOT_RELEASE_MODE
                          clinic_id = $env:TURNERO_PILOT_CLINIC_ID
                          profile_fingerprint = $env:TURNERO_PILOT_PROFILE_FINGERPRINT
                          catalog_ready = ($env:TURNERO_PILOT_CATALOG_READY -eq 'true')
                          deployed_commit = ''
                          recovery_targets = @($recoveryTargets)
                          generated_at = [DateTime]::UtcNow.ToString('o')
                      }
                      $snapshot | ConvertTo-Json -Depth 8 | Out-File -FilePath $remotePath -Encoding utf8
                      '' | Out-File -FilePath $rawPath -Encoding utf8
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_STATUS=not_required"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_REASON=release_mode:$($env:TURNERO_PILOT_RELEASE_MODE)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_CLINIC_ID=$($env:TURNERO_PILOT_CLINIC_ID)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT=$($env:TURNERO_PILOT_PROFILE_FINGERPRINT)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_CATALOG_READY=$($env:TURNERO_PILOT_CATALOG_READY)"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT="
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_VERIFIED=false"
                      Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_RECOVERY_TARGETS=$recoveryTargetsLabel"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "status=not_required"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=release_mode:$($env:TURNERO_PILOT_RELEASE_MODE)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "clinic_id=$($env:TURNERO_PILOT_CLINIC_ID)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "profile_fingerprint=$($env:TURNERO_PILOT_PROFILE_FINGERPRINT)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_ready=$($env:TURNERO_PILOT_CATALOG_READY)"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "deployed_commit="
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "verified=false"
                      Add-Content -Path $env:GITHUB_OUTPUT -Value "recovery_targets=$recoveryTargetsLabel"
                      exit 0
                  }

                  $remotePayload = & node bin/turnero-clinic-profile.js verify-remote --base-url $env:TARGET_DOMAIN --json 2> $rawPath
                  $verifyExit = $LASTEXITCODE
                  if ($null -eq $remotePayload) {
                      '' | Out-File -FilePath $remotePath -Encoding utf8
                  } else {
                      ($remotePayload -join [Environment]::NewLine) | Out-File -FilePath $remotePath -Encoding utf8
                  }

                  $payload = $null
                  $rawStderr = ''
                  try {
                      $payload = Get-Content -Raw -Path $remotePath -Encoding utf8 | ConvertFrom-Json
                  } catch {
                      $payload = $null
                  }
                  try {
                      $rawStderr = Get-Content -Raw -Path $rawPath -Encoding utf8
                  } catch {
                      $rawStderr = ''
                  }

                  $verified = ($verifyExit -eq 0 -and $payload -and $payload.ok -eq $true)
                  $remoteClinicId = if ($payload -and $payload.turneroPilot -and $payload.turneroPilot.clinicId) { [string]$payload.turneroPilot.clinicId } else { '' }
                  $remoteFingerprint = if ($payload -and $payload.turneroPilot -and $payload.turneroPilot.profileFingerprint) { [string]$payload.turneroPilot.profileFingerprint } else { '' }
                  $remoteCatalogReady = ($payload -and $payload.turneroPilot -and $payload.turneroPilot.catalogReady -eq $true)
                  $remoteDeployedCommit = if ($payload -and $payload.publicSync -and $payload.publicSync.deployedCommit) { [string]$payload.publicSync.deployedCommit } else { '' }
                  if ($verified) {
                      $status = 'ready'
                      $reason = 'ok'
                  } else {
                      $status = 'blocked'
                      if ($payload -and $payload.errors -and $payload.errors.Count -gt 0) {
                          $reason = [string]::Join('; ', @($payload.errors | Select-Object -First 3))
                      } elseif ($rawStderr) {
                          $reason = $rawStderr.Trim()
                      } else {
                          $reason = "verify_remote_exit:$verifyExit"
                      }
                  }
                  $reason = [regex]::Replace([string]$reason, '\s+', ' ').Trim()
                  $remoteCatalogReadyText = ([string]$remoteCatalogReady).ToLowerInvariant()
                  $verifiedText = ([string]$verified).ToLowerInvariant()

                  $snapshot = [ordered]@{
                      status = $status
                      reason = $reason
                      verified = $verified
                      release_mode = $env:TURNERO_PILOT_RELEASE_MODE
                      clinic_id = $remoteClinicId
                      profile_fingerprint = $remoteFingerprint
                      catalog_ready = $remoteCatalogReady
                      deployed_commit = $remoteDeployedCommit
                      recovery_targets = @($recoveryTargets)
                      generated_at = [DateTime]::UtcNow.ToString('o')
                      result = $payload
                      stderr = $rawStderr
                  }
                  $snapshot | ConvertTo-Json -Depth 12 | Out-File -FilePath $remotePath -Encoding utf8

                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_STATUS=$status"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_REASON=$reason"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_CLINIC_ID=$remoteClinicId"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT=$remoteFingerprint"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_CATALOG_READY=$remoteCatalogReadyText"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT=$remoteDeployedCommit"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_REMOTE_VERIFIED=$verifiedText"
                  Add-Content -Path $env:GITHUB_ENV -Value "TURNERO_PILOT_RECOVERY_TARGETS=$recoveryTargetsLabel"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "status=$status"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=$reason"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "clinic_id=$remoteClinicId"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "profile_fingerprint=$remoteFingerprint"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_ready=$remoteCatalogReadyText"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "deployed_commit=$remoteDeployedCommit"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "verified=$verifiedText"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "recovery_targets=$recoveryTargetsLabel"

            - name: Evaluate telemedicine health after frontend deploy
              if: ${{ always() }}
              id: telemedicine_selfhosted
              shell: pwsh
              env:
                  BUILD_ASTRO_OUTCOME: ${{ steps.build_astro_routes.outcome }}
                  DEPLOY_BUNDLE_OUTCOME: ${{ steps.deploy_frontend_bundle.outcome }}
                  VALIDATE_PUBLIC_FRONTEND_OUTCOME: ${{ steps.validate_public_frontend.outcome }}
              run: |
                  $ErrorActionPreference = 'Stop'
                  $healthPath = Join-Path $env:RUNNER_TEMP 'telemedicine-selfhosted-health.json'
                  function Count-NonTeleFailures {
                      param([string[]]$Outcomes)
                      $count = 0
                      foreach ($value in $Outcomes) {
                          if ([string]::IsNullOrWhiteSpace($value)) {
                              continue
                          }
                          $normalized = $value.Trim().ToLowerInvariant()
                          if ($normalized -eq 'success' -or $normalized -eq 'skipped' -or $normalized -eq 'n/a') {
                              continue
                          }
                          $count += 1
                      }
                      return $count
                  }

                  try {
                      $healthResp = Invoke-WebRequest -Uri "$env:TARGET_DOMAIN/api.php?resource=health" -UseBasicParsing -TimeoutSec 20
                      $healthResp.Content | Out-File -FilePath $healthPath -Encoding utf8
                  } catch {
                      Write-Host "No se pudo obtener health remoto: $($_.Exception.Message)"
                  }

                  $status = 'unknown'
                  $reason = 'health_unavailable'
                  $failures = -1
                  $nonTeleFailures = Count-NonTeleFailures @(
                      $env:BUILD_ASTRO_OUTCOME,
                      $env:DEPLOY_BUNDLE_OUTCOME,
                      $env:VALIDATE_PUBLIC_FRONTEND_OUTCOME
                  )
                  $configured = $false
                  $diagnosticsStatus = 'unknown'
                  $hardFailures = -1

                  if (Test-Path $healthPath) {
                      try {
                          $raw = Get-Content -Raw -Path $healthPath -Encoding utf8
                          $health = $raw | ConvertFrom-Json
                          $tele = $health.checks.telemedicine
                          if ($null -eq $tele) {
                              $reason = 'telemedicine_missing'
                          } else {
                              $configured = [bool]$tele.configured
                              if ($tele.diagnostics -and $tele.diagnostics.status) {
                                  $diagnosticsStatus = [string]$tele.diagnostics.status
                              }
                              $hardFailures = 0
                              if ($tele.integrity -and $null -ne $tele.integrity.hardFailures) {
                                  $hardFailures = [int]$tele.integrity.hardFailures
                              }

                              $reasons = New-Object System.Collections.Generic.List[string]
                              $failures = 0
                              if (-not $configured) {
                                  $reasons.Add('not_configured')
                                  $failures += 1
                              }
                              if ($diagnosticsStatus -eq 'critical') {
                                  $reasons.Add('diagnostics_critical')
                                  $failures += 1
                              }
                              if ($hardFailures -lt 0) {
                                  $reasons.Add('hard_failures_invalid')
                                  $failures += 1
                              } elseif ($hardFailures -gt 0) {
                                  $reasons.Add("hard_failures:$hardFailures")
                                  $failures += $hardFailures
                              }

                              if ($reasons.Count -eq 0) {
                                  $status = 'healthy'
                                  $reason = 'ok'
                              } else {
                                  $status = 'degraded'
                                  $reason = ($reasons -join ';')
                              }
                          }
                      } catch {
                          $status = 'unknown'
                          $reason = "health_parse_error:$($_.Exception.GetType().Name)"
                          $failures = -1
                      }
                  }

                  Add-Content -Path $env:GITHUB_OUTPUT -Value "telemedicine_status=$status"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "telemedicine_reason=$reason"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "telemedicine_failures=$failures"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "telemedicine_non_tele_failures=$nonTeleFailures"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "telemedicine_configured=$configured"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "telemedicine_diagnostics_status=$diagnosticsStatus"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "telemedicine_hard_failures=$hardFailures"

                  Add-Content -Path $env:GITHUB_ENV -Value "TELEMEDICINE_SELFHOSTED_STATUS=$status"
                  Add-Content -Path $env:GITHUB_ENV -Value "TELEMEDICINE_SELFHOSTED_REASON=$reason"
                  Add-Content -Path $env:GITHUB_ENV -Value "TELEMEDICINE_SELFHOSTED_FAILURES=$failures"
                  Add-Content -Path $env:GITHUB_ENV -Value "TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES=$nonTeleFailures"

            - name: Evaluate self-hosted deploy route
              if: ${{ always() }}
              id: selfhosted_route
              shell: pwsh
              env:
                  BUILD_ASTRO_OUTCOME: ${{ steps.build_astro_routes.outcome }}
                  DEPLOY_BUNDLE_OUTCOME: ${{ steps.deploy_frontend_bundle.outcome }}
                  VALIDATE_PUBLIC_FRONTEND_OUTCOME: ${{ steps.validate_public_frontend.outcome }}
              run: |
                  $ErrorActionPreference = 'Stop'
                  function Normalize-Outcome {
                      param([string]$Value)
                      if ([string]::IsNullOrWhiteSpace($Value)) { return 'n/a' }
                      return $Value.Trim().ToLowerInvariant()
                  }

                  $buildOutcome = Normalize-Outcome $env:BUILD_ASTRO_OUTCOME
                  $deployOutcome = Normalize-Outcome $env:DEPLOY_BUNDLE_OUTCOME
                  $validateOutcome = Normalize-Outcome $env:VALIDATE_PUBLIC_FRONTEND_OUTCOME
                  $status = 'ready'
                  $reason = 'ok'

                  if ($buildOutcome -eq 'failure' -or $buildOutcome -eq 'cancelled') {
                      $status = 'blocked'
                      $reason = "build_astro_routes:$buildOutcome"
                  } elseif ($deployOutcome -eq 'failure' -or $deployOutcome -eq 'cancelled') {
                      $status = 'blocked'
                      $reason = "deploy_frontend_bundle:$deployOutcome"
                  } elseif ($validateOutcome -eq 'failure' -or $validateOutcome -eq 'cancelled') {
                      $status = 'blocked'
                      $reason = "validate_public_frontend:$validateOutcome"
                  } elseif ($deployOutcome -eq 'skipped') {
                      $status = 'blocked'
                      $reason = 'deploy_frontend_bundle:skipped'
                  } elseif ($validateOutcome -eq 'skipped') {
                      $status = 'blocked'
                      $reason = 'validate_public_frontend:skipped'
                  }

                  Add-Content -Path $env:GITHUB_ENV -Value "SELFHOSTED_ROUTE_STATUS=$status"
                  Add-Content -Path $env:GITHUB_ENV -Value "SELFHOSTED_ROUTE_REASON=$reason"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "status=$status"
                  Add-Content -Path $env:GITHUB_OUTPUT -Value "reason=$reason"

            - name: Create or update telemedicine incident (self-hosted deploy)
              if: ${{ always() && (env.TELEMEDICINE_SELFHOSTED_STATUS == 'degraded' || env.TELEMEDICINE_SELFHOSTED_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Frontend Self-Hosted telemedicina degradada';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `status:${process.env.TELEMEDICINE_SELFHOSTED_STATUS || 'unknown'}|reason:${process.env.TELEMEDICINE_SELFHOSTED_REASON || 'unknown'}|failures:${process.env.TELEMEDICINE_SELFHOSTED_FAILURES || '-1'}|non_tele:${process.env.TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES || '-1'}`;
                      const signalMarker = `<!-- deploy-frontend-selfhosted-telemedicine-signal:${signal} -->`;
                      const reason = String(process.env.TELEMEDICINE_SELFHOSTED_REASON || '');
                      const severity = (
                        reason.includes('diagnostics_critical') ||
                        reason.includes('hard_failures:') ||
                        reason.includes('hard_failures_invalid') ||
                        reason.includes('health_unavailable') ||
                        reason.includes('health_parse_error') ||
                        reason.includes('telemedicine_missing') ||
                        reason.includes('not_configured')
                      )
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = [
                        'production-alert',
                        'deploy-frontend-selfhosted',
                        'telemedicine',
                        severity
                      ];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const incidentBody = [
                        'El workflow `Deploy Frontend (Self-Hosted)` detecto degradacion telemedicina post-deploy.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- telemedicine_selfhosted_status: ${process.env.TELEMEDICINE_SELFHOSTED_STATUS || 'unknown'}`,
                        `- telemedicine_selfhosted_reason: ${process.env.TELEMEDICINE_SELFHOSTED_REASON || 'unknown'}`,
                        `- telemedicine_selfhosted_failures: ${process.env.TELEMEDICINE_SELFHOSTED_FAILURES || '-1'}`,
                        `- telemedicine_selfhosted_non_tele_failures: ${process.env.TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES || '-1'}`,
                        `- domain: ${process.env.TARGET_DOMAIN || 'https://pielarmonia.com'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });
                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue deploy-frontend-selfhosted telemedicina actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue deploy-frontend-selfhosted telemedicina ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente deploy-frontend-selfhosted telemedicina actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_selfhosted_status: ${process.env.TELEMEDICINE_SELFHOSTED_STATUS || 'unknown'}`,
                            `- telemedicine_selfhosted_reason: ${process.env.TELEMEDICINE_SELFHOSTED_REASON || 'unknown'}`,
                            `- telemedicine_selfhosted_failures: ${process.env.TELEMEDICINE_SELFHOSTED_FAILURES || '-1'}`,
                            `- telemedicine_selfhosted_non_tele_failures: ${process.env.TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES || '-1'}`
                          ].join('\n')
                        });
                        core.info(`Issue deploy-frontend-selfhosted telemedicina actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: incidentBody,
                          labels: baseLabels
                        });
                        core.info(`Issue deploy-frontend-selfhosted telemedicina creado: #${created.data.number}`);
                      }
              env:
                  TELEMEDICINE_SELFHOSTED_STATUS: ${{ env.TELEMEDICINE_SELFHOSTED_STATUS }}
                  TELEMEDICINE_SELFHOSTED_REASON: ${{ env.TELEMEDICINE_SELFHOSTED_REASON }}
                  TELEMEDICINE_SELFHOSTED_FAILURES: ${{ env.TELEMEDICINE_SELFHOSTED_FAILURES }}
                  TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES }}

            - name: Close telemedicine incident when recovered (self-hosted deploy)
              if: ${{ success() && env.TELEMEDICINE_SELFHOSTED_STATUS == 'healthy' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Frontend Self-Hosted telemedicina degradada';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente deploy-frontend-selfhosted telemedicina abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por deploy-frontend-selfhosted.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- telemedicine_selfhosted_status: ${process.env.TELEMEDICINE_SELFHOSTED_STATUS || 'healthy'}`,
                          `- telemedicine_selfhosted_reason: ${process.env.TELEMEDICINE_SELFHOSTED_REASON || 'ok'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue deploy-frontend-selfhosted telemedicina cerrado: #${existing.number}`);
              env:
                  TELEMEDICINE_SELFHOSTED_STATUS: ${{ env.TELEMEDICINE_SELFHOSTED_STATUS }}
                  TELEMEDICINE_SELFHOSTED_REASON: ${{ env.TELEMEDICINE_SELFHOSTED_REASON }}

            - name: Create or update turneroPilot incident (self-hosted deploy)
              if: ${{ always() && env.TURNERO_PILOT_RELEASE_MODE == 'web_pilot' && env.TURNERO_PILOT_REMOTE_STATUS == 'blocked' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = [
                        `status:${process.env.TURNERO_PILOT_REMOTE_STATUS || 'unknown'}`,
                        `reason:${process.env.TURNERO_PILOT_REMOTE_REASON || 'unknown'}`,
                        `local_clinic:${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}`,
                        `remote_clinic:${process.env.TURNERO_PILOT_REMOTE_CLINIC_ID || 'unknown'}`,
                        `local_fp:${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}`,
                        `remote_fp:${process.env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT || 'unknown'}`,
                        `deployed:${process.env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT || 'unknown'}`
                      ].join('|');
                      const signalMarker = `<!-- deploy-frontend-selfhosted-turnero-pilot-signal:${signal} -->`;
                      const baseLabels = ['production-alert', 'deploy-frontend-selfhosted', 'turnero-pilot', 'severity:warning'];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => Array.from(new Set([...normalizeLabels(labels), ...baseLabels]));
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const incidentBody = [
                        'El workflow `Deploy Frontend (Self-Hosted)` detecto que el host publicado no coincide con el `clinic-profile` del piloto web.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- target_domain: ${process.env.TARGET_DOMAIN || 'https://pielarmonia.com'}`,
                        `- turnero_pilot_release_mode: ${process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown'}`,
                        `- turnero_pilot_local_status: ${process.env.TURNERO_PILOT_SELFHOSTED_STATUS || 'unknown'}`,
                        `- turnero_pilot_local_reason: ${process.env.TURNERO_PILOT_SELFHOSTED_REASON || 'unknown'}`,
                        `- turnero_pilot_local_clinic_id: ${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}`,
                        `- turnero_pilot_remote_clinic_id: ${process.env.TURNERO_PILOT_REMOTE_CLINIC_ID || 'unknown'}`,
                        `- turnero_pilot_local_profile_fingerprint: ${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}`,
                        `- turnero_pilot_remote_profile_fingerprint: ${process.env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT || 'unknown'}`,
                        `- turnero_pilot_remote_catalog_ready: ${process.env.TURNERO_PILOT_REMOTE_CATALOG_READY || 'false'}`,
                        `- turnero_pilot_remote_deployed_commit: ${process.env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT || 'unknown'}`,
                        `- turnero_pilot_remote_reason: ${process.env.TURNERO_PILOT_REMOTE_REASON || 'unknown'}`,
                        `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });
                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                          }
                          core.info(`Issue deploy-frontend-selfhosted turneroPilot ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente deploy-frontend-selfhosted turneroPilot actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- turnero_pilot_remote_status: ${process.env.TURNERO_PILOT_REMOTE_STATUS || 'unknown'}`,
                            `- turnero_pilot_remote_reason: ${process.env.TURNERO_PILOT_REMOTE_REASON || 'unknown'}`,
                            `- turnero_pilot_remote_clinic_id: ${process.env.TURNERO_PILOT_REMOTE_CLINIC_ID || 'unknown'}`,
                            `- turnero_pilot_remote_profile_fingerprint: ${process.env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT || 'unknown'}`,
                            `- turnero_pilot_remote_deployed_commit: ${process.env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT || 'unknown'}`,
                            `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`
                          ].join('\n')
                        });
                        core.info(`Issue deploy-frontend-selfhosted turneroPilot actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: incidentBody,
                          labels: baseLabels
                        });
                        core.info(`Issue deploy-frontend-selfhosted turneroPilot creado: #${created.data.number}`);
                      }
              env:
                  TURNERO_PILOT_SELFHOSTED_STATUS: ${{ env.TURNERO_PILOT_SELFHOSTED_STATUS }}
                  TURNERO_PILOT_SELFHOSTED_REASON: ${{ env.TURNERO_PILOT_SELFHOSTED_REASON }}
                  TURNERO_PILOT_RELEASE_MODE: ${{ env.TURNERO_PILOT_RELEASE_MODE }}
                  TURNERO_PILOT_CLINIC_ID: ${{ env.TURNERO_PILOT_CLINIC_ID }}
                  TURNERO_PILOT_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REMOTE_STATUS: ${{ env.TURNERO_PILOT_REMOTE_STATUS }}
                  TURNERO_PILOT_REMOTE_REASON: ${{ env.TURNERO_PILOT_REMOTE_REASON }}
                  TURNERO_PILOT_REMOTE_CLINIC_ID: ${{ env.TURNERO_PILOT_REMOTE_CLINIC_ID }}
                  TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REMOTE_CATALOG_READY: ${{ env.TURNERO_PILOT_REMOTE_CATALOG_READY }}
                  TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT: ${{ env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT }}
                  TURNERO_PILOT_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_RECOVERY_TARGETS }}

            - name: Close turneroPilot incident when recovered (self-hosted deploy)
              if: ${{ success() && env.TURNERO_PILOT_RELEASE_MODE == 'web_pilot' && (env.TURNERO_PILOT_REMOTE_STATUS == 'ready' || env.TURNERO_PILOT_REMOTE_STATUS == 'not_required') }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });
                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente deploy-frontend-selfhosted turneroPilot abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por deploy-frontend-selfhosted.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- turnero_pilot_remote_status: ${process.env.TURNERO_PILOT_REMOTE_STATUS || 'ready'}`,
                          `- turnero_pilot_remote_reason: ${process.env.TURNERO_PILOT_REMOTE_REASON || 'ok'}`,
                          `- turnero_pilot_remote_clinic_id: ${process.env.TURNERO_PILOT_REMOTE_CLINIC_ID || 'unknown'}`,
                          `- turnero_pilot_remote_profile_fingerprint: ${process.env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT || 'unknown'}`,
                          `- turnero_pilot_remote_deployed_commit: ${process.env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT || 'unknown'}`,
                          `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue deploy-frontend-selfhosted turneroPilot cerrado: #${existing.number}`);
              env:
                  TURNERO_PILOT_RELEASE_MODE: ${{ env.TURNERO_PILOT_RELEASE_MODE }}
                  TURNERO_PILOT_REMOTE_STATUS: ${{ env.TURNERO_PILOT_REMOTE_STATUS }}
                  TURNERO_PILOT_REMOTE_REASON: ${{ env.TURNERO_PILOT_REMOTE_REASON }}
                  TURNERO_PILOT_REMOTE_CLINIC_ID: ${{ env.TURNERO_PILOT_REMOTE_CLINIC_ID }}
                  TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT: ${{ env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT }}
                  TURNERO_PILOT_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_RECOVERY_TARGETS }}

            - name: Create or update self-hosted route incident
              if: ${{ always() && env.SELFHOSTED_ROUTE_STATUS == 'blocked' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Frontend Self-Hosted ruta bloqueada';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = [
                        `status:${process.env.SELFHOSTED_ROUTE_STATUS || 'unknown'}`,
                        `reason:${process.env.SELFHOSTED_ROUTE_REASON || 'unknown'}`,
                        `clinic:${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}`,
                        `fp:${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}`,
                        `release:${process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown'}`
                      ].join('|');
                      const signalMarker = `<!-- deploy-frontend-selfhosted-route-signal:${signal} -->`;
                      const baseLabels = ['production-alert', 'deploy-frontend-selfhosted', 'self-hosted-route', 'severity:warning'];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => Array.from(new Set([...normalizeLabels(labels), ...baseLabels]));
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const incidentBody = [
                        'El workflow `Deploy Frontend (Self-Hosted)` no pudo completar la ruta manual de deploy.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- selfhosted_route_status: ${process.env.SELFHOSTED_ROUTE_STATUS || 'unknown'}`,
                        `- selfhosted_route_reason: ${process.env.SELFHOSTED_ROUTE_REASON || 'unknown'}`,
                        `- turnero_pilot_clinic_id: ${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}`,
                        `- turnero_pilot_profile_fingerprint: ${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}`,
                        `- turnero_pilot_release_mode: ${process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown'}`,
                        `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });
                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                          }
                          core.info(`Issue deploy-frontend-selfhosted route ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente deploy-frontend-selfhosted ruta bloqueada actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- selfhosted_route_status: ${process.env.SELFHOSTED_ROUTE_STATUS || 'unknown'}`,
                            `- selfhosted_route_reason: ${process.env.SELFHOSTED_ROUTE_REASON || 'unknown'}`,
                            `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`
                          ].join('\n')
                        });
                        core.info(`Issue deploy-frontend-selfhosted route actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: incidentBody,
                          labels: baseLabels
                        });
                        core.info(`Issue deploy-frontend-selfhosted route creado: #${created.data.number}`);
                      }
              env:
                  SELFHOSTED_ROUTE_STATUS: ${{ env.SELFHOSTED_ROUTE_STATUS }}
                  SELFHOSTED_ROUTE_REASON: ${{ env.SELFHOSTED_ROUTE_REASON }}
                  TURNERO_PILOT_CLINIC_ID: ${{ env.TURNERO_PILOT_CLINIC_ID }}
                  TURNERO_PILOT_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_RELEASE_MODE: ${{ env.TURNERO_PILOT_RELEASE_MODE }}
                  TURNERO_PILOT_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_RECOVERY_TARGETS }}

            - name: Close self-hosted route incident when recovered
              if: ${{ success() && env.SELFHOSTED_ROUTE_STATUS == 'ready' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Frontend Self-Hosted ruta bloqueada';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });
                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente deploy-frontend-selfhosted route abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por deploy-frontend-selfhosted.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- selfhosted_route_status: ${process.env.SELFHOSTED_ROUTE_STATUS || 'ready'}`,
                          `- selfhosted_route_reason: ${process.env.SELFHOSTED_ROUTE_REASON || 'ok'}`,
                          `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue deploy-frontend-selfhosted route cerrado: #${existing.number}`);
              env:
                  SELFHOSTED_ROUTE_STATUS: ${{ env.SELFHOSTED_ROUTE_STATUS }}
                  SELFHOSTED_ROUTE_REASON: ${{ env.SELFHOSTED_ROUTE_REASON }}
                  TURNERO_PILOT_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_RECOVERY_TARGETS }}

            - name: Write turneroPilot report (self-hosted deploy)
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'
                  New-Item -ItemType Directory -Force -Path 'verification' | Out-Null
                  $recoveryTargets = @([string]$env:TURNERO_PILOT_RECOVERY_TARGETS -split '\|' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
                  $report = [ordered]@{
                      local = [ordered]@{
                          status = $env:TURNERO_PILOT_SELFHOSTED_STATUS
                          reason = $env:TURNERO_PILOT_SELFHOSTED_REASON
                          clinicId = $env:TURNERO_PILOT_CLINIC_ID
                          matchingProfileId = $env:TURNERO_PILOT_MATCHING_PROFILE_ID
                          profileFingerprint = $env:TURNERO_PILOT_PROFILE_FINGERPRINT
                          catalogReady = ($env:TURNERO_PILOT_CATALOG_READY -eq 'true')
                          releaseMode = $env:TURNERO_PILOT_RELEASE_MODE
                      }
                      remote = [ordered]@{
                          status = $env:TURNERO_PILOT_REMOTE_STATUS
                          reason = $env:TURNERO_PILOT_REMOTE_REASON
                          clinicId = $env:TURNERO_PILOT_REMOTE_CLINIC_ID
                          profileFingerprint = $env:TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT
                          catalogReady = ($env:TURNERO_PILOT_REMOTE_CATALOG_READY -eq 'true')
                          deployedCommit = $env:TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT
                          verified = ($env:TURNERO_PILOT_REMOTE_VERIFIED -eq 'true')
                      }
                      recoveryTargets = @($recoveryTargets)
                      manifests = [ordered]@{
                          local = '.selfhosted-cutover/turnero-pilot-status.json'
                          remote = '.selfhosted-cutover/turnero-pilot-remote.json'
                      }
                      generatedAt = [DateTime]::UtcNow.ToString('o')
                  }
                  $report | ConvertTo-Json -Depth 12 | Out-File -FilePath 'verification/last-turnero-pilot-selfhosted.json' -Encoding utf8

            - name: Upload turneroPilot report (self-hosted deploy)
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: deploy-frontend-selfhosted-turnero-pilot-report
                  path: verification/last-turnero-pilot-selfhosted.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Deployment summary
              if: ${{ always() }}
              shell: pwsh
              run: |
                  "## Deploy Frontend (Self-Hosted)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- telemedicine_selfhosted_status: ``$env:TELEMEDICINE_SELFHOSTED_STATUS``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- telemedicine_selfhosted_reason: ``$env:TELEMEDICINE_SELFHOSTED_REASON``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- telemedicine_selfhosted_failures: ``$env:TELEMEDICINE_SELFHOSTED_FAILURES``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- telemedicine_selfhosted_non_tele_failures: ``$env:TELEMEDICINE_SELFHOSTED_NON_TELE_FAILURES``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- telemedicine_selfhosted_step_outcome: ``${{ steps.telemedicine_selfhosted.outcome }}``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- selfhosted_route_status: ``$env:SELFHOSTED_ROUTE_STATUS``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- selfhosted_route_reason: ``$env:SELFHOSTED_ROUTE_REASON``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_local_status: ``$env:TURNERO_PILOT_SELFHOSTED_STATUS``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_local_reason: ``$env:TURNERO_PILOT_SELFHOSTED_REASON``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_clinic_id: ``$env:TURNERO_PILOT_CLINIC_ID``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_profile_fingerprint: ``$env:TURNERO_PILOT_PROFILE_FINGERPRINT``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_catalog_ready: ``$env:TURNERO_PILOT_CATALOG_READY``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_release_mode: ``$env:TURNERO_PILOT_RELEASE_MODE``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_status: ``$env:TURNERO_PILOT_REMOTE_STATUS``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_reason: ``$env:TURNERO_PILOT_REMOTE_REASON``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_clinic_id: ``$env:TURNERO_PILOT_REMOTE_CLINIC_ID``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_profile_fingerprint: ``$env:TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_catalog_ready: ``$env:TURNERO_PILOT_REMOTE_CATALOG_READY``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_deployed_commit: ``$env:TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_verified: ``$env:TURNERO_PILOT_REMOTE_VERIFIED``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_recovery_targets: ``$env:TURNERO_PILOT_RECOVERY_TARGETS``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_status_manifest: ``.selfhosted-cutover/turnero-pilot-status.json``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_remote_manifest: ``.selfhosted-cutover/turnero-pilot-remote.json``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- turnero_pilot_report: ``verification/last-turnero-pilot-selfhosted.json``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
                  "- result: ``${{ job.status }}``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

            - name: Fail self-hosted deploy when turneroPilot blocks release
              if: ${{ always() && env.TURNERO_PILOT_RELEASE_MODE == 'web_pilot' && env.TURNERO_PILOT_REMOTE_STATUS == 'blocked' }}
              shell: pwsh
              run: |
                  throw "turneroPilot bloquea el release self-hosted ($env:TURNERO_PILOT_REMOTE_REASON)"
