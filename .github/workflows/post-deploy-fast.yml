name: Post-Deploy Fast Lane

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            wait_seconds:
                description: 'Espera para sincronizacion Git del servidor'
                required: false
                default: '60'
                type: string
            admin_rollout_stage:
                description: 'Etapa gate admin UI (internal|canary|general|rollback)'
                required: false
                default: 'canary'
                type: string
            admin_rollout_skip_runtime_smoke:
                description: 'Omitir smoke runtime Playwright del gate admin UI fast'
                required: false
                default: true
                type: boolean
            admin_rollout_allow_feature_api_failure:
                description: 'Permitir falla de features API en gate admin UI fast'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_missing_flag:
                description: 'Permitir ausencia de data.admin_sony_ui en gate admin UI fast'
                required: false
                default: false
                type: boolean
            admin_rollout_require_openclaw_auth:
                description: 'Exigir contrato OpenClaw en gate admin UI fast'
                required: false
                default: true
                type: boolean
            admin_rollout_require_openclaw_live_smoke:
                description: 'Exigir smoke live OpenClaw en fast lane'
                required: false
                default: true
                type: boolean
            enable_public_v4_rollout_monitor:
                description: 'Habilitar monitor de rollout publico V4 (solo trazabilidad fast lane)'
                required: false
                default: false
                type: boolean
            public_v4_rollout_stage:
                description: 'Etapa rollout publico V4 (internal|canary|general|rollback)'
                required: false
                default: 'canary'
                type: string
            public_v4_rollout_surface_test:
                description: 'Superficie test rollout publico V4'
                required: false
                default: 'v4'
                type: string
            public_v4_rollout_surface_control:
                description: 'Superficie control rollout publico V4'
                required: false
                default: 'legacy'
                type: string
            public_v4_rollout_min_view_booking:
                description: 'Minimo de view_booking por superficie'
                required: false
                default: '20'
                type: string
            public_v4_rollout_min_start_checkout:
                description: 'Minimo de start_checkout por superficie'
                required: false
                default: '10'
                type: string
            public_v4_rollout_max_confirmed_drop_pp:
                description: 'Drop maximo permitido (pp) test vs control'
                required: false
                default: '8'
                type: string
            public_v4_rollout_min_confirmed_rate_pct:
                description: 'Tasa minima de confirmed (%) superficie test'
                required: false
                default: '20'
                type: string
            public_v4_rollout_allow_missing_control:
                description: 'Permitir ausencia de superficie control'
                required: false
                default: false
                type: boolean

concurrency:
    group: post-deploy-fast-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    gate-fast:
        name: Gate rapido en produccion (<=10 min objetivo)
        runs-on: windows-latest
        timeout-minutes: 15
        env:
            ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME || 'PROD' }}
            TARGET_DOMAIN: ${{ github.event.inputs.domain || vars.TARGET_DOMAIN || 'https://pielarmonia.com' }}
            AURORADERM_DIAGNOSTICS_ACCESS_TOKEN: ${{ secrets.AURORADERM_DIAGNOSTICS_ACCESS_TOKEN || vars.AURORADERM_DIAGNOSTICS_ACCESS_TOKEN || secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || secrets.CRON_SECRET || vars.CRON_SECRET || '' }}
            AURORADERM_CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET || secrets.AURORADERM_DIAGNOSTICS_ACCESS_TOKEN || vars.AURORADERM_DIAGNOSTICS_ACCESS_TOKEN || secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || '' }}
            AURORADERM_DIAGNOSTICS_ACCESS_TOKEN_HEADER: ${{ vars.AURORADERM_DIAGNOSTICS_ACCESS_TOKEN_HEADER || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_HEADER || 'Authorization' }}
            AURORADERM_DIAGNOSTICS_ACCESS_TOKEN_PREFIX: ${{ vars.AURORADERM_DIAGNOSTICS_ACCESS_TOKEN_PREFIX || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_PREFIX || 'Bearer' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN: ${{ secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || secrets.CRON_SECRET || vars.CRON_SECRET || '' }}
            PIELARMONIA_CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET || secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || '' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_HEADER: ${{ vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_HEADER || 'Authorization' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_PREFIX: ${{ vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_PREFIX || 'Bearer' }}
            WAIT_SECONDS_FAST: ${{ github.event.inputs.wait_seconds || vars.WAIT_SECONDS_FAST || '45' }}
            PUBLIC_SYNC_WAIT_TIMEOUT_FAST: ${{ vars.PUBLIC_SYNC_WAIT_TIMEOUT_FAST || '240' }}
            PUBLIC_SYNC_POLL_INTERVAL_FAST: ${{ vars.PUBLIC_SYNC_POLL_INTERVAL_FAST || '15' }}
            ADMIN_ROLLOUT_STAGE_FAST: ${{ github.event.inputs.admin_rollout_stage || vars.ADMIN_ROLLOUT_STAGE_FAST || 'canary' }}
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST: ${{ github.event.inputs.admin_rollout_skip_runtime_smoke || vars.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST || 'true' }}
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST: ${{ github.event.inputs.admin_rollout_allow_feature_api_failure || vars.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST || 'false' }}
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST: ${{ github.event.inputs.admin_rollout_allow_missing_flag || vars.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST || 'false' }}
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST: ${{ github.event.inputs.admin_rollout_require_openclaw_auth || vars.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST || '' }}
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST: ${{ github.event.inputs.admin_rollout_require_openclaw_live_smoke || vars.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST || '' }}
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST: ${{ github.event.inputs.enable_public_v4_rollout_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT || 'false' }}
            PUBLIC_V4_ROLLOUT_STAGE_FAST: ${{ github.event.inputs.public_v4_rollout_stage || vars.PUBLIC_V4_ROLLOUT_STAGE || 'canary' }}
            PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST: ${{ github.event.inputs.public_v4_rollout_surface_test || vars.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4' }}
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST: ${{ github.event.inputs.public_v4_rollout_surface_control || vars.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy' }}
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST: ${{ github.event.inputs.public_v4_rollout_min_view_booking || vars.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING || '20' }}
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST: ${{ github.event.inputs.public_v4_rollout_min_start_checkout || vars.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT || '10' }}
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST: ${{ github.event.inputs.public_v4_rollout_max_confirmed_drop_pp || vars.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || '8' }}
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST: ${{ github.event.inputs.public_v4_rollout_min_confirmed_rate_pct || vars.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || '20' }}
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST: ${{ github.event.inputs.public_v4_rollout_allow_missing_control || vars.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL || 'false' }}
            ADMIN_ROLLOUT_STAGE_FAST_EFFECTIVE: canary
            ADMIN_ROLLOUT_STAGE_PROFILE_FAST_EFFECTIVE: progressive
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE: 'true'
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_EFFECTIVE: 'true'
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE: 'true'
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_EFFECTIVE: 'false'
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_EFFECTIVE: 'false'
            ADMIN_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE: stage-default
            ADMIN_OPENCLAW_LIVE_SMOKE_FAST_STATUS: skipped
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST_EFFECTIVE: 'false'
            PUBLIC_V4_ROLLOUT_STAGE_FAST_EFFECTIVE: canary
            PUBLIC_V4_ROLLOUT_STAGE_PROFILE_FAST_EFFECTIVE: progressive
            PUBLIC_V4_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE: stage-default
            PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST_EFFECTIVE: v4
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST_EFFECTIVE: legacy
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST_EFFECTIVE: '20'
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST_EFFECTIVE: '10'
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST_EFFECTIVE: '8'
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST_EFFECTIVE: '20'
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST_EFFECTIVE: 'false'
            TELEMEDICINE_FAST_STATUS: unknown
            TELEMEDICINE_FAST_REASON: not_evaluated
            TELEMEDICINE_FAST_FAILURES: '0'
            TELEMEDICINE_FAST_NON_TELE_FAILURES: '0'
            TURNERO_PILOT_FAST_STATUS: unknown
            TURNERO_PILOT_FAST_REASON: not_evaluated
            TURNERO_PILOT_FAST_CLINIC_ID: ''
            TURNERO_PILOT_FAST_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_FAST_CATALOG_READY: 'false'
            TURNERO_PILOT_FAST_REMOTE_VERIFIED: 'false'
            TURNERO_PILOT_FAST_DEPLOYED_COMMIT: ''
            PUBLIC_SYNC_FAST_MATCHED: unknown
            PUBLIC_SYNC_FAST_CURRENT_HEAD: ''
            PUBLIC_SYNC_FAST_DEPLOYED_COMMIT: ''
            PUBLIC_SYNC_FAST_STATE: unknown
            PUBLIC_SYNC_FAST_HEALTHY: unknown
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Esperar sincronizacion Git del hosting
              if: ${{ github.event_name == 'push' }}
              shell: pwsh
              run: |
                  $waitSeconds = [int]$env:WAIT_SECONDS_FAST
                  if ($waitSeconds -lt 0) { $waitSeconds = 0 }
                  Write-Host "Esperando $waitSeconds segundos para sincronizacion remota..."
                  Start-Sleep -Seconds $waitSeconds

            - name: Esperar commit sincronizado en public sync
              if: ${{ github.event_name == 'push' }}
              shell: pwsh
              run: |
                  $timeoutSeconds = [int]$env:PUBLIC_SYNC_WAIT_TIMEOUT_FAST
                  if ($timeoutSeconds -lt 0) { $timeoutSeconds = 0 }
                  $pollSeconds = [int]$env:PUBLIC_SYNC_POLL_INTERVAL_FAST
                  if ($pollSeconds -lt 5) { $pollSeconds = 5 }

                  $base = [string]$env:TARGET_DOMAIN
                  if ([string]::IsNullOrWhiteSpace($base)) {
                    throw 'TARGET_DOMAIN vacio en fast lane.'
                  }
                  $base = $base.TrimEnd('/')
                  $healthUrl = "$base/api.php?resource=health"
                  $targetSha = [string]$env:GITHUB_SHA
                  $deadline = (Get-Date).ToUniversalTime().AddSeconds($timeoutSeconds)
                  $matched = $false
                  $currentHead = ''
                  $deployedCommit = ''
                  $state = 'unknown'
                  $healthy = 'unknown'

                  do {
                    try {
                      $response = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 20 -Headers @{
                        'Cache-Control' = 'no-cache'
                        'User-Agent' = 'PielArmoniaPostDeployFast/1.0'
                      }
                      $health = $response.Content | ConvertFrom-Json -Depth 20
                      $publicSync = $health.checks.publicSync
                      if ($null -ne $publicSync) {
                        $currentHead = [string]$publicSync.currentHead
                        $deployedCommit = [string]$publicSync.deployedCommit
                        $state = [string]$publicSync.state
                        if ($null -ne $publicSync.PSObject.Properties['healthy']) {
                          $healthy = if ([bool]$publicSync.healthy) { 'true' } else { 'false' }
                        } else {
                          $healthy = 'unknown'
                        }
                        if ($currentHead -eq $targetSha -or $deployedCommit -eq $targetSha) {
                          $matched = $true
                          break
                        }
                        Write-Host "[INFO] public sync pendiente: target=$targetSha current=$currentHead deployed=$deployedCommit state=$state healthy=$healthy"
                      } else {
                        $state = 'missing'
                        $healthy = 'unknown'
                        Write-Host '[WARN] health no incluye checks.publicSync durante fast lane.'
                      }
                    } catch {
                      $state = 'unreachable'
                      $healthy = 'false'
                      Write-Host "[WARN] No se pudo consultar public sync: $($_.Exception.Message)"
                    }

                    if ((Get-Date).ToUniversalTime() -lt $deadline) {
                      Start-Sleep -Seconds $pollSeconds
                    }
                  } while ((Get-Date).ToUniversalTime() -lt $deadline)

                  $matchedText = if ($matched) { 'true' } else { 'false' }
                  if ($matched) {
                    Write-Host "[OK] public sync alineado con commit target: $targetSha"
                  } else {
                    Write-Host "[WARN] public sync no alineo el commit target dentro del timeout: target=$targetSha current=$currentHead deployed=$deployedCommit state=$state healthy=$healthy"
                  }

                  "PUBLIC_SYNC_FAST_MATCHED=$matchedText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_FAST_CURRENT_HEAD=$currentHead" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_FAST_DEPLOYED_COMMIT=$deployedCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_FAST_STATE=$state" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_SYNC_FAST_HEALTHY=$healthy" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            - name: Ejecutar gate fast (verify + smoke)
              id: gate_fast
              shell: pwsh
              run: |
                  ./scripts/ops/prod/GATE-POSTDEPLOY.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -SkipBenchmark `
                    -SkipAssetHashChecks `
                    -AssetHashRetryCount 1 `
                    -AssetHashRetryDelaySec 2 `
                    -VerifyRetryAttempts 1 `
                    -VerifyRetryDelaySec 30 `
                    -RequireStableDataDir `
                    -RequireBackupHealthy `
                    -RequireBackupReceiverReady `
                    -RequireCronReady

            - name: Resolver configuracion gate admin UI (fast)
              if: ${{ steps.gate_fast.outcome == 'success' }}
              shell: pwsh
              run: |
                  $policyJson = node ./bin/resolve-admin-rollout-policy.js `
                    --stage "$env:ADMIN_ROLLOUT_STAGE_FAST" `
                    --default-stage canary `
                    --skip-runtime-smoke "$env:ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST" `
                    --default-skip-runtime-smoke true `
                    --require-openclaw-auth "$env:ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST" `
                    --default-require-openclaw-auth "" `
                    --require-openclaw-live-smoke "$env:ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST" `
                    --default-require-openclaw-live-smoke "" `
                    --allow-feature-api-failure "$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST" `
                    --default-allow-feature-api-failure false `
                    --allow-missing-flag "$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST" `
                    --default-allow-missing-flag false

                  if ($LASTEXITCODE -ne 0) {
                    throw 'No se pudo resolver politica admin rollout (fast).'
                  }

                  $policy = $policyJson | ConvertFrom-Json
                  $skipRuntimeSmokeText = if ([bool]$policy.skip_runtime_smoke_effective) { 'true' } else { 'false' }
                  $requireOpenClawAuthText = if ([bool]$policy.require_openclaw_auth_effective) { 'true' } else { 'false' }
                  $requireOpenClawLiveSmokeText = if ([bool]$policy.require_openclaw_live_smoke_effective) { 'true' } else { 'false' }
                  $allowFeatureApiFailureText = if ([bool]$policy.allow_feature_api_failure_effective) { 'true' } else { 'false' }
                  $allowMissingFlagText = if ([bool]$policy.allow_missing_flag_effective) { 'true' } else { 'false' }

                  "ADMIN_ROLLOUT_STAGE_FAST_EFFECTIVE=$($policy.stage_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_STAGE_PROFILE_FAST_EFFECTIVE=$($policy.stage_profile)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE=$skipRuntimeSmokeText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_EFFECTIVE=$requireOpenClawAuthText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE=$requireOpenClawLiveSmokeText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_EFFECTIVE=$allowFeatureApiFailureText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_EFFECTIVE=$allowMissingFlagText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "ADMIN_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE=$($policy.policy_source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "Admin rollout fast => stage=$($policy.stage_effective) profile=$($policy.stage_profile) skip_runtime_smoke=$skipRuntimeSmokeText require_openclaw_auth=$requireOpenClawAuthText require_openclaw_live_smoke=$requireOpenClawLiveSmokeText allow_feature_api_failure=$allowFeatureApiFailureText allow_missing_flag=$allowMissingFlagText policy_source=$($policy.policy_source)"

            - name: Resolver configuracion rollout publico V4 (fast)
              if: ${{ steps.gate_fast.outcome == 'success' }}
              shell: pwsh
              run: |
                  $policyJson = node ./bin/resolve-public-v4-rollout-policy.js `
                    --stage "$env:PUBLIC_V4_ROLLOUT_STAGE_FAST" `
                    --default-stage canary `
                    --enable-monitor "$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST" `
                    --surface-test "$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST" `
                    --surface-control "$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST" `
                    --min-view-booking "$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST" `
                    --min-start-checkout "$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST" `
                    --max-confirmed-drop-pp "$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST" `
                    --min-confirmed-rate-pct "$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST" `
                    --allow-missing-control "$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST"

                  if ($LASTEXITCODE -ne 0) {
                    throw 'No se pudo resolver politica rollout publico V4 (fast).'
                  }

                  $policy = $policyJson | ConvertFrom-Json
                  $enableMonitorText = if ([bool]$policy.enable_monitor_effective) { 'true' } else { 'false' }
                  $allowMissingControlText = if ([bool]$policy.allow_missing_control_effective) { 'true' } else { 'false' }

                  "ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST_EFFECTIVE=$enableMonitorText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_FAST_EFFECTIVE=$($policy.stage_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_STAGE_PROFILE_FAST_EFFECTIVE=$($policy.stage_profile)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE=$($policy.policy_source)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST_EFFECTIVE=$($policy.surface_test_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST_EFFECTIVE=$($policy.surface_control_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST_EFFECTIVE=$($policy.min_view_booking_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST_EFFECTIVE=$($policy.min_start_checkout_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST_EFFECTIVE=$($policy.max_confirmed_drop_pp_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST_EFFECTIVE=$($policy.min_confirmed_rate_pct_effective)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST_EFFECTIVE=$allowMissingControlText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  Write-Host "Public V4 rollout fast => enable_monitor=$enableMonitorText stage=$($policy.stage_effective) profile=$($policy.stage_profile) surface_test=$($policy.surface_test_effective) surface_control=$($policy.surface_control_effective) policy_source=$($policy.policy_source)"

            - name: Escribir reporte rollout publico V4 (fast)
              if: ${{ steps.gate_fast.outcome == 'success' }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  $report = [ordered]@{
                    generated_at = (Get-Date).ToUniversalTime().ToString('o')
                    domain = [string]$env:TARGET_DOMAIN
                    event_name = [string]$env:GITHUB_EVENT_NAME
                    input = [ordered]@{
                      enable_monitor = [string]$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST
                      stage = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_FAST
                      surface_test = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST
                      surface_control = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST
                      min_view_booking = [string]$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST
                      min_start_checkout = [string]$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST
                      max_confirmed_drop_pp = [string]$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST
                      min_confirmed_rate_pct = [string]$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST
                      allow_missing_control = [string]$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST
                    }
                    effective = [ordered]@{
                      enable_monitor = [string]$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST_EFFECTIVE
                      stage = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_FAST_EFFECTIVE
                      stage_profile = [string]$env:PUBLIC_V4_ROLLOUT_STAGE_PROFILE_FAST_EFFECTIVE
                      policy_source = [string]$env:PUBLIC_V4_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE
                      surface_test = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST_EFFECTIVE
                      surface_control = [string]$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST_EFFECTIVE
                      min_view_booking = [string]$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST_EFFECTIVE
                      min_start_checkout = [string]$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST_EFFECTIVE
                      max_confirmed_drop_pp = [string]$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST_EFFECTIVE
                      min_confirmed_rate_pct = [string]$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST_EFFECTIVE
                      allow_missing_control = [string]$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST_EFFECTIVE
                    }
                  }
                  $report | ConvertTo-Json -Depth 8 | Set-Content -Path 'verification/last-public-v4-rollout-fast.json' -Encoding utf8
                  Write-Host 'Reporte rollout publico V4 (fast) escrito en verification/last-public-v4-rollout-fast.json'

            - name: Setup Node para smoke admin UI (fast)
              if: ${{ steps.gate_fast.outcome == 'success' && (env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE != 'true' || env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE == 'true') }}
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias Node (fast)
              if: ${{ steps.gate_fast.outcome == 'success' && (env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE != 'true' || env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE == 'true') }}
              shell: pwsh
              run: npm ci

            - name: Instalar Playwright (chromium) para smoke admin UI (fast)
              if: ${{ steps.gate_fast.outcome == 'success' && (env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE != 'true' || env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE == 'true') }}
              shell: pwsh
              run: npx playwright install chromium

            - name: Ejecutar gate admin UI rollout (fast)
              id: admin_rollout_fast
              if: ${{ steps.gate_fast.outcome == 'success' }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  $skipRuntimeSmoke = ([string]$env:ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE).ToLowerInvariant() -eq 'true'
                  $requireOpenClawAuth = ([string]$env:ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_EFFECTIVE).ToLowerInvariant() -eq 'true'
                  $allowFeatureApiFailure = ([string]$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_EFFECTIVE).ToLowerInvariant() -eq 'true'
                  $allowMissingFlag = ([string]$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_EFFECTIVE).ToLowerInvariant() -eq 'true'

                  ./GATE-ADMIN-ROLLOUT.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -Stage $env:ADMIN_ROLLOUT_STAGE_FAST_EFFECTIVE `
                    -SkipRuntimeSmoke:$skipRuntimeSmoke `
                    -RequireOpenClawAuth:$requireOpenClawAuth `
                    -AllowFeatureApiFailure:$allowFeatureApiFailure `
                    -AllowMissingAdminFlag:$allowMissingFlag `
                    -ReportPath 'verification/last-admin-ui-rollout-gate-fast.json'

            - name: Ejecutar smoke live OpenClaw web broker (fast)
              id: admin_openclaw_live_smoke_fast
              if: ${{ steps.admin_rollout_fast.outcome == 'success' && env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE == 'true' }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  node ./bin/operator-auth-live-smoke.js `
                    --transport web_broker `
                    --server-base-url "$env:TARGET_DOMAIN" `
                    --json-out 'verification/last-admin-openclaw-live-smoke-fast.json'
                  if ($LASTEXITCODE -ne 0) {
                    throw 'Smoke live OpenClaw web_broker fallo en fast lane.'
                  }

            - name: Resolver estado smoke live OpenClaw (fast)
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'skipped'
                  if ([string]$env:ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE -eq 'true') {
                    $status = '${{ steps.admin_openclaw_live_smoke_fast.outcome }}'
                    if ([string]::IsNullOrWhiteSpace($status)) {
                      $status = 'unknown'
                    }
                  }
                  "ADMIN_OPENCLAW_LIVE_SMOKE_FAST_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            - name: Publicar reporte gate admin rollout (fast)
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-fast-admin-rollout-report
                  path: verification/last-admin-ui-rollout-gate-fast.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Publicar reporte rollout publico V4 (fast)
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-fast-public-v4-rollout-report
                  path: verification/last-public-v4-rollout-fast.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Publicar reporte smoke live OpenClaw (fast)
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: post-deploy-fast-openclaw-live-smoke-report
                  path: verification/last-admin-openclaw-live-smoke-fast.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Evaluar estado telemedicina fast lane
              id: telemedicine_fast
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'unknown'
                  $reason = 'verify_report_missing'
                  $teleFailures = 0
                  $nonTeleFailures = 0
                  $reportPath = 'verification/last-deploy-verify.json'

                  if (Test-Path $reportPath) {
                    try {
                      $report = Get-Content -Raw $reportPath | ConvertFrom-Json -Depth 20
                      $failures = @()
                      try { $failures = @($report.failures) } catch { $failures = @() }

                      $teleFailureAssets = New-Object System.Collections.Generic.List[string]
                      foreach ($failure in $failures) {
                        $asset = ''
                        try { $asset = [string]$failure.Asset } catch { $asset = '' }
                        if ($asset -like 'health-telemedicine-*') {
                          $teleFailureAssets.Add($asset)
                        }
                      }

                      $teleFailures = $teleFailureAssets.Count
                      $nonTeleFailures = [Math]::Max(0, @($failures).Count - $teleFailures)

                      if ($teleFailures -gt 0 -and $nonTeleFailures -eq 0) {
                        $status = 'degraded_only'
                        $reason = ($teleFailureAssets | Select-Object -Unique) -join ';'
                      } elseif ($teleFailures -gt 0) {
                        $status = 'degraded_mixed'
                        $reason = ($teleFailureAssets | Select-Object -Unique) -join ';'
                      } else {
                        $status = 'healthy'
                        $reason = 'ok'
                      }
                    } catch {
                      $status = 'unknown'
                      $reason = 'verify_report_unreadable'
                    }
                  }

                  "TELEMEDICINE_FAST_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_FAST_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_FAST_FAILURES=$teleFailures" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TELEMEDICINE_FAST_NON_TELE_FAILURES=$nonTeleFailures" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "tele_failures=$teleFailures" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "non_tele_failures=$nonTeleFailures" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Telemedicine fast => status=$status reason=$reason tele_failures=$teleFailures non_tele_failures=$nonTeleFailures"

            - name: Evaluar estado turneroPilot fast lane
              id: turnero_pilot_fast
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'unknown'
                  $reason = 'verify_report_missing'
                  $clinicId = ''
                  $profileFingerprint = ''
                  $statusResolved = $false
                  $verifyRemoteRequired = $false
                  $catalogReady = $false
                  $remoteVerified = $false
                  $deployedCommit = ''
                  $releaseMode = ''
                  $recoveryTargets = @()
                  $reportPath = 'verification/last-deploy-verify.json'

                  if (Test-Path $reportPath) {
                    try {
                      $report = Get-Content -Raw $reportPath | ConvertFrom-Json -Depth 20
                      $turneroPilot = $null
                      try { $turneroPilot = $report.turneroPilot } catch { $turneroPilot = $null }
                      $failures = @()
                      try { $failures = @($report.failures) } catch { $failures = @() }

                      if ($null -eq $turneroPilot) {
                        $status = 'unknown'
                        $reason = 'turnero_pilot_missing'
                      } else {
                        try { $clinicId = [string]$turneroPilot.clinicId } catch { $clinicId = '' }
                        try { $profileFingerprint = [string]$turneroPilot.profileFingerprint } catch { $profileFingerprint = '' }
                        try { $statusResolved = [bool]$turneroPilot.statusResolved } catch { $statusResolved = $false }
                        try { $verifyRemoteRequired = [bool]$turneroPilot.verifyRemoteRequired } catch { $verifyRemoteRequired = $false }
                        try { $catalogReady = [bool]$turneroPilot.catalogReady } catch { $catalogReady = $false }
                        try { $remoteVerified = [bool]$turneroPilot.remoteVerified } catch { $remoteVerified = $false }
                        try { $deployedCommit = [string]$turneroPilot.remoteDeployedCommit } catch { $deployedCommit = '' }
                        try { $releaseMode = [string]$turneroPilot.releaseMode } catch { $releaseMode = '' }
                        if ($releaseMode -eq 'web_pilot') {
                          $recoveryTargets = @(
                            '[ALERTA PROD] Deploy Hosting turneroPilot bloqueado',
                            '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado'
                          )
                        }

                        $blocking = New-Object System.Collections.Generic.List[string]
                        if (-not $statusResolved) {
                          $blocking.Add('profile_status_unresolved')
                        }
                        if (-not $catalogReady) {
                          $blocking.Add('catalog_not_ready')
                        }
                        if (@($failures | Where-Object { [string]$_.Asset -eq 'turnero-pilot-profile-status' }).Count -gt 0) {
                          $blocking.Add('verify_asset:turnero-pilot-profile-status')
                        }
                        if (@($failures | Where-Object { [string]$_.Asset -eq 'turnero-pilot-remote-verify' }).Count -gt 0) {
                          $blocking.Add('verify_asset:turnero-pilot-remote-verify')
                        }
                        if ($releaseMode -eq 'web_pilot' -and $verifyRemoteRequired -and -not $remoteVerified) {
                          $blocking.Add('remote_verify_failed')
                        }

                        if (-not [string]::IsNullOrWhiteSpace($releaseMode) -and $releaseMode -ne 'web_pilot') {
                          $status = 'not_required'
                          $reason = "release_mode:$releaseMode"
                        } elseif ($blocking.Count -gt 0) {
                          $status = 'blocked'
                          $reason = ($blocking | Select-Object -Unique) -join ';'
                        } else {
                          $status = 'ready'
                          $reason = 'ok'
                        }
                      }
                    } catch {
                      $status = 'unknown'
                      $reason = 'verify_report_unreadable'
                    }
                  }

                  $statusResolvedText = if ($statusResolved) { 'true' } else { 'false' }
                  $verifyRemoteRequiredText = if ($verifyRemoteRequired) { 'true' } else { 'false' }
                  $catalogReadyText = if ($catalogReady) { 'true' } else { 'false' }
                  $remoteVerifiedText = if ($remoteVerified) { 'true' } else { 'false' }
                  "TURNERO_PILOT_FAST_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_CLINIC_ID=$clinicId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_PROFILE_FINGERPRINT=$profileFingerprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_STATUS_RESOLVED=$statusResolvedText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_VERIFY_REMOTE_REQUIRED=$verifyRemoteRequiredText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_RELEASE_MODE=$releaseMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_CATALOG_READY=$catalogReadyText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_REMOTE_VERIFIED=$remoteVerifiedText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_DEPLOYED_COMMIT=$deployedCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_FAST_RECOVERY_TARGETS=$($recoveryTargets -join ' | ')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Turnero pilot fast => status=$status reason=$reason clinicId=$clinicId fingerprint=$profileFingerprint catalogReady=$catalogReadyText remoteVerified=$remoteVerifiedText deployedCommit=$deployedCommit"

            - name: Escribir reporte turneroPilot fast
              if: ${{ always() }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  $report = [ordered]@{
                    generatedAt = [DateTimeOffset]::UtcNow.ToString('o')
                    workflow = 'post-deploy-fast'
                    targetDomain = [string]$env:TARGET_DOMAIN
                    turneroPilot = [ordered]@{
                      status = [string]$env:TURNERO_PILOT_FAST_STATUS
                      reason = [string]$env:TURNERO_PILOT_FAST_REASON
                      clinicId = [string]$env:TURNERO_PILOT_FAST_CLINIC_ID
                      profileFingerprint = [string]$env:TURNERO_PILOT_FAST_PROFILE_FINGERPRINT
                      statusResolved = ([string]$env:TURNERO_PILOT_FAST_STATUS_RESOLVED).ToLowerInvariant() -eq 'true'
                      verifyRemoteRequired = ([string]$env:TURNERO_PILOT_FAST_VERIFY_REMOTE_REQUIRED).ToLowerInvariant() -eq 'true'
                      releaseMode = [string]$env:TURNERO_PILOT_FAST_RELEASE_MODE
                      catalogReady = ([string]$env:TURNERO_PILOT_FAST_CATALOG_READY).ToLowerInvariant() -eq 'true'
                      remoteVerified = ([string]$env:TURNERO_PILOT_FAST_REMOTE_VERIFIED).ToLowerInvariant() -eq 'true'
                      deployedCommit = [string]$env:TURNERO_PILOT_FAST_DEPLOYED_COMMIT
                      recoveryTargets = @(
                        @([string]$env:TURNERO_PILOT_FAST_RECOVERY_TARGETS -split '\s+\|\s+' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
                      )
                    }
                    sourceVerifyReport = 'verification/last-deploy-verify.json'
                  }
                  $report | ConvertTo-Json -Depth 8 | Set-Content -Path 'verification/last-turnero-pilot-fast.json' -Encoding utf8
                  Write-Host 'Reporte turneroPilot fast escrito en verification/last-turnero-pilot-fast.json'

            - name: Resumen
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $adminRolloutOutcome = '${{ steps.admin_rollout_fast.outcome }}'
                  if ([string]::IsNullOrWhiteSpace($adminRolloutOutcome)) {
                    $adminRolloutOutcome = 'skipped'
                  }
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Post-Deploy Fast Lane"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Dominio: ``$env:TARGET_DOMAIN``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Espera sync: ``$env:WAIT_SECONDS_FAST`` s"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public sync wait timeout: ``$env:PUBLIC_SYNC_WAIT_TIMEOUT_FAST`` s"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public sync poll interval: ``$env:PUBLIC_SYNC_POLL_INTERVAL_FAST`` s"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public sync commit matched: ``$env:PUBLIC_SYNC_FAST_MATCHED``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public sync current head: ``$env:PUBLIC_SYNC_FAST_CURRENT_HEAD``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public sync deployed commit: ``$env:PUBLIC_SYNC_FAST_DEPLOYED_COMMIT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public sync state: ``$env:PUBLIC_SYNC_FAST_STATE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public sync healthy: ``$env:PUBLIC_SYNC_FAST_HEALTHY``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Modo: ``verify+smoke`` (sin benchmark pesado)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Semaforo platform: ``${{ steps.gate_fast.outcome }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout stage (fast): ``$env:ADMIN_ROLLOUT_STAGE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout stage profile (fast): ``$env:ADMIN_ROLLOUT_STAGE_PROFILE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout skip runtime smoke (fast): ``$env:ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout require OpenClaw auth (fast): ``$env:ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout require OpenClaw live smoke (fast): ``$env:ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout allow feature API failure (fast): ``$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout allow missing flag (fast): ``$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Admin rollout policy source (fast): ``$env:ADMIN_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout monitor (input/vars): ``$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout stage (input/vars): ``$env:PUBLIC_V4_ROLLOUT_STAGE_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout surface test (input/vars): ``$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout surface control (input/vars): ``$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min view booking (input/vars): ``$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min start checkout (input/vars): ``$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout max confirmed drop pp (input/vars): ``$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min confirmed rate pct (input/vars): ``$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout allow missing control (input/vars): ``$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout monitor (effective): ``$env:ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout stage (effective): ``$env:PUBLIC_V4_ROLLOUT_STAGE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout stage profile (effective): ``$env:PUBLIC_V4_ROLLOUT_STAGE_PROFILE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout policy source (effective): ``$env:PUBLIC_V4_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout surface test (effective): ``$env:PUBLIC_V4_ROLLOUT_SURFACE_TEST_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout surface control (effective): ``$env:PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min view booking (effective): ``$env:PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min start checkout (effective): ``$env:PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout max confirmed drop pp (effective): ``$env:PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout min confirmed rate pct (effective): ``$env:PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Public V4 rollout allow missing control (effective): ``$env:PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_FAST_EFFECTIVE``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Semaforo admin rollout (fast): ``$adminRolloutOutcome``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Reporte admin rollout (fast): ``verification/last-admin-ui-rollout-gate-fast.json``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Smoke live OpenClaw (fast): ``${{ steps.admin_openclaw_live_smoke_fast.outcome }}``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Smoke live OpenClaw status (fast): ``$env:ADMIN_OPENCLAW_LIVE_SMOKE_FAST_STATUS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Reporte smoke live OpenClaw (fast): ``verification/last-admin-openclaw-live-smoke-fast.json``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Reporte public V4 rollout (fast): ``verification/last-public-v4-rollout-fast.json``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine fast status: ``$env:TELEMEDICINE_FAST_STATUS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine fast reason: ``$env:TELEMEDICINE_FAST_REASON``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Telemedicine fast failures: ``$env:TELEMEDICINE_FAST_FAILURES``"
