              env:
                  TELEMEDICINE_FAST_STATUS: ${{ env.TELEMEDICINE_FAST_STATUS }}
                  TELEMEDICINE_FAST_REASON: ${{ env.TELEMEDICINE_FAST_REASON }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Post-Deploy Fast Lane telemedicina degradado`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente telemedicina fast abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por `Post-Deploy Fast Lane`.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- telemedicine_fast_status: ${process.env.TELEMEDICINE_FAST_STATUS || 'n/a'}`,
                          `- telemedicine_fast_reason: ${process.env.TELEMEDICINE_FAST_REASON || 'n/a'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue telemedicina fast cerrado: #${existing.number}`);
