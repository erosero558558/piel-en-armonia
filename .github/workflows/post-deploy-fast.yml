            - name: Crear/actualizar incidente telemedicina fast lane
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && (env.TELEMEDICINE_FAST_STATUS == 'degraded_only' || env.TELEMEDICINE_FAST_STATUS == 'degraded_mixed' || env.TELEMEDICINE_FAST_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_FAST_STATUS: ${{ env.TELEMEDICINE_FAST_STATUS }}
                  TELEMEDICINE_FAST_REASON: ${{ env.TELEMEDICINE_FAST_REASON }}
                  TELEMEDICINE_FAST_FAILURES: ${{ env.TELEMEDICINE_FAST_FAILURES }}
                  TELEMEDICINE_FAST_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_FAST_NON_TELE_FAILURES }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Post-Deploy Fast Lane telemedicina degradado`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const status = String(process.env.TELEMEDICINE_FAST_STATUS || 'n/a');
                      const reason = String(process.env.TELEMEDICINE_FAST_REASON || 'n/a');
                      const failures = String(process.env.TELEMEDICINE_FAST_FAILURES || '0');
                      const signal = `status:${status}|reason:${reason}|failures:${failures}|non_tele:${process.env.TELEMEDICINE_FAST_NON_TELE_FAILURES || '0'}`;
                      const signalMarker = `<!-- post-deploy-fast-telemedicine-signal:${signal} -->`;

                      const severity = (status === 'degraded_mixed' ||
                        reason.includes('diagnostics_critical') ||
                        reason.includes('health_unreachable') ||
                        reason.includes('health_missing') ||
                        reason.includes('health_parse_error') ||
                        reason.includes('verify_report_missing') ||
                        reason.includes('verify_report_unreadable'))
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'fast-lane', 'telemedicine', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Post-Deploy Fast Lane` detecto degradacion en checks de telemedicina.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- telemedicine_fast_status: ${status}`,
                        `- telemedicine_fast_reason: ${reason}`,
                        `- telemedicine_fast_failures: ${failures}`,
                        `- telemedicine_fast_non_tele_failures: ${process.env.TELEMEDICINE_FAST_NON_TELE_FAILURES || '0'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue telemedicina fast actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue telemedicina fast ya refleja la misma senal: #${existing.number}`);
                          return;
                        }

                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente telemedicina fast actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_fast_status: ${status}`,
                            `- telemedicine_fast_reason: ${reason}`,
                            `- telemedicine_fast_failures: ${failures}`,
                            `- telemedicine_fast_non_tele_failures: ${process.env.TELEMEDICINE_FAST_NON_TELE_FAILURES || '0'}`
                          ].join('\n')
                        });
                        core.info(`Issue telemedicina fast existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue telemedicina fast creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente fast lane al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const envName = process.env.ENVIRONMENT_NAME || 'PROD';
                      const title = `[ALERTA ${envName}] Post-Deploy Fast Lane fallando`;
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente fast lane abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por `Post-Deploy Fast Lane`.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);

            - name: Cerrar incidente telemedicina fast lane al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
