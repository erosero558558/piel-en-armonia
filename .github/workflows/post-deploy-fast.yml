                        `- public_v4_max_confirmed_drop_pp: ${process.env.PUBLIC_V4_MAX_CONFIRMED_DROP_PP || 'n/a'}`,
                        `- public_v4_min_confirmed_rate_pct: ${process.env.PUBLIC_V4_MIN_CONFIRMED_RATE_PCT || 'n/a'}`,
