name: Diagnose Host Connectivity

on:
    workflow_dispatch:
        inputs:
            ports:
                description: 'CSV de puertos a validar'
                required: false
                default: '21,22,990,2121,2222,65002,21098,22022,22222,10022,7822,443'
                type: string
            turnero_clinic_id:
                description: 'clinic_id esperado del piloto web'
                required: false
                default: ''
                type: string
            turnero_profile_fingerprint:
                description: 'profileFingerprint esperado del piloto web'
                required: false
                default: ''
                type: string
            turnero_release_mode:
                description: 'release.mode esperado del clinic-profile'
                required: false
                default: ''
                type: string

permissions:
    contents: read
    issues: write

jobs:
    diagnose:
        name: Diagnosticar conectividad deploy host
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            PORTS_INPUT: ${{ github.event.inputs.ports || '21,22,990,2121,2222,65002,21098,22022,22222,10022,7822,443' }}
            SSH_HOST_SECRET: ${{ secrets.SSH_HOST }}
            FTP_SERVER_SECRET: ${{ secrets.FTP_SERVER }}
            SSH_HOST_VAR: ${{ vars.SSH_HOST || '' }}
            FTP_SERVER_VAR: ${{ vars.FTP_SERVER || '' }}
            TURNERO_PILOT_EXPECTED_CLINIC_ID: ${{ github.event.inputs.turnero_clinic_id || '' }}
            TURNERO_PILOT_EXPECTED_PROFILE_FINGERPRINT: ${{ github.event.inputs.turnero_profile_fingerprint || '' }}
            TURNERO_PILOT_EXPECTED_RELEASE_MODE: ${{ github.event.inputs.turnero_release_mode || '' }}
            TURNERO_PILOT_DIAGNOSE_STATUS: unknown
            TURNERO_PILOT_DIAGNOSE_REASON: not_evaluated
            TURNERO_PILOT_DIAGNOSE_CLINIC_ID: ''
            TURNERO_PILOT_DIAGNOSE_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_DIAGNOSE_CATALOG_READY: 'false'
            TURNERO_PILOT_DIAGNOSE_RELEASE_MODE: unknown
            TURNERO_PILOT_DIAGNOSE_EXPECTED_MATCH: 'false'
            TURNERO_PILOT_DIAGNOSE_EXPECTED_REASON: not_evaluated
        steps:
            - name: Diagnosticar puertos por origen de host
              shell: bash
              run: |
                  set -euo pipefail

                  REPORT_TEXT="connectivity-report.txt"
                  REPORT_TSV="connectivity-report.tsv"
                  : > "${REPORT_TSV}"

                  normalize_ports() {
                    local csv="$1"
                    echo "$csv" | tr ',' '\n' | tr -d ' ' | awk 'NF>0' | sort -u
                  }

                  resolve_host() {
                    local host="$1"
                    getent hosts "$host" 2>/dev/null | awk '{print $1}' | sort -u | paste -sd ',' -
                  }

                  check_ports() {
                    local label="$1"
                    local host="$2"

                    if [ -z "$host" ]; then
                      echo "- ${label}: host vacío"
                      printf 'host\t%s\t%s\tfalse\t\t\n' "$label" "" >> "${REPORT_TSV}"
                      return 0
                    fi

                    local ips
                    ips="$(resolve_host "$host" || true)"
                    if [ -z "$ips" ]; then
                      ips="no-resuelve"
                    fi

                    echo "- ${label}: host detectado, ips=${ips}"

                    local opened=""
                    while IFS= read -r port; do
                      if timeout 3 bash -c "cat < /dev/null > /dev/tcp/${host}/${port}" 2>/dev/null; then
                        echo "  - port ${port}: OPEN"
                        opened="${opened}${port},"
                        printf 'port\t%s\t%s\t%s\topen\t%s\n' "$label" "$host" "$port" "$ips" >> "${REPORT_TSV}"
                      else
                        echo "  - port ${port}: closed"
                        printf 'port\t%s\t%s\t%s\tclosed\t%s\n' "$label" "$host" "$port" "$ips" >> "${REPORT_TSV}"
                      fi
                    done < <(normalize_ports "$PORTS_INPUT")

                    if [ -n "$opened" ]; then
                      echo "  - resumen: abiertos => ${opened%,}"
                    else
                      echo "  - resumen: sin puertos abiertos en la lista"
                    fi
                    printf 'host\t%s\t%s\ttrue\t%s\t%s\n' "$label" "$host" "$ips" "${opened%,}" >> "${REPORT_TSV}"
                  }

                  {
                    echo "## Diagnostico de conectividad"
                    echo "- timestamp_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                    echo "- ports_input: ${PORTS_INPUT}"
                    echo ""
                    check_ports "secrets.SSH_HOST" "${SSH_HOST_SECRET}"
                    check_ports "secrets.FTP_SERVER" "${FTP_SERVER_SECRET}"
                    check_ports "vars.SSH_HOST" "${SSH_HOST_VAR}"
                    check_ports "vars.FTP_SERVER" "${FTP_SERVER_VAR}"
                  } | tee "${REPORT_TEXT}"

            - name: Consolidar reporte de conectividad
              id: connectivity_summary
              shell: bash
              env:
                  PORTS_INPUT: ${{ env.PORTS_INPUT }}
              run: |
                  set -euo pipefail
                  node <<'NODE'
                  const fs = require('node:fs');

                  const textPath = 'connectivity-report.txt';
                  const tsvPath = 'connectivity-report.tsv';
                  const jsonPath = 'connectivity-report.json';
                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  const tsvLines = fs.existsSync(tsvPath)
                    ? fs
                        .readFileSync(tsvPath, 'utf8')
                        .split(/\r?\n/)
                        .filter(Boolean)
                    : [];

                  const hosts = [];
                  const ports = [];
                  for (const line of tsvLines) {
                    const parts = line.split('\t');
                    if (parts[0] === 'host') {
                      hosts.push({
                        label: parts[1] || '',
                        host: parts[2] || '',
                        configured: (parts[3] || '') === 'true',
                        ips: parts[4] || '',
                        open_ports: parts[5] ? parts[5].split(',').filter(Boolean) : [],
                      });
                      continue;
                    }
                    if (parts[0] === 'port') {
                      ports.push({
                        label: parts[1] || '',
                        host: parts[2] || '',
                        port: parts[3] || '',
                        status: parts[4] || 'unknown',
                        ips: parts[5] || '',
                      });
                    }
                  }

                  const configuredHosts = hosts.filter((host) => host.configured);
                  const openPorts = ports.filter((port) => port.status === 'open');
                  const openTargets = openPorts.map((port) => `${port.host}:${port.port}`);
                  const status =
                    configuredHosts.length === 0
                      ? 'not_configured'
                      : openTargets.length > 0
                        ? 'reachable'
                        : 'unreachable';
                  const signal = `status:${status}|configured_hosts:${configuredHosts.length}|open_targets:${openTargets.join(',') || 'none'}`;

                  const payload = {
                    generated_at: new Date().toISOString(),
                    ports_input: String(process.env.PORTS_INPUT || ''),
                    status,
                    reachable_any: openTargets.length > 0,
                    issue_ready: status === 'unreachable',
                    configured_host_count: configuredHosts.length,
                    open_targets: openTargets,
                    hosts,
                    ports,
                    text_artifact: textPath,
                  };

                  fs.writeFileSync(jsonPath, JSON.stringify(payload, null, 2));

                  append(outputPath, 'connectivity_status', status);
                  append(outputPath, 'reachable_any', payload.reachable_any ? 'true' : 'false');
                  append(outputPath, 'issue_ready', payload.issue_ready ? 'true' : 'false');
                  append(outputPath, 'configured_host_count', String(configuredHosts.length));
                  append(outputPath, 'open_targets', openTargets.join(','));
                  append(outputPath, 'connectivity_signal', signal);

                  append(envPath, 'CONNECTIVITY_STATUS', status);
                  append(envPath, 'CONNECTIVITY_REACHABLE_ANY', payload.reachable_any ? 'true' : 'false');
                  append(envPath, 'CONNECTIVITY_ISSUE_READY', payload.issue_ready ? 'true' : 'false');
                  append(envPath, 'CONNECTIVITY_CONFIGURED_HOST_COUNT', String(configuredHosts.length));
                  append(envPath, 'CONNECTIVITY_OPEN_TARGETS', openTargets.join(','));
                  append(envPath, 'CONNECTIVITY_SIGNAL', signal);
                  NODE

            - name: Resolver turneroPilot local para diagnose
              id: turnero_pilot_diagnose
              if: ${{ always() }}
              shell: bash
              run: |
                  set -euo pipefail
                  status_path="turnero-pilot-diagnose.json"
                  raw_path="turnero-pilot-diagnose.raw.txt"
                  status_exit=0
                  if ! node bin/turnero-clinic-profile.js status --json > "${status_path}" 2>"${raw_path}"; then
                    status_exit=$?
                  fi
                  export TURNERO_PILOT_DIAGNOSE_STATUS_EXIT="${status_exit}"
                  export TURNERO_PILOT_DIAGNOSE_STATUS_PATH="${status_path}"
                  export TURNERO_PILOT_DIAGNOSE_STATUS_RAW_PATH="${raw_path}"
                  node <<'NODE'
                  const fs = require('node:fs');

                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;
                  const statusPath = process.env.TURNERO_PILOT_DIAGNOSE_STATUS_PATH;
                  const rawPath = process.env.TURNERO_PILOT_DIAGNOSE_STATUS_RAW_PATH;
                  const statusExit = Number.parseInt(
                    process.env.TURNERO_PILOT_DIAGNOSE_STATUS_EXIT || '1',
                    10
                  );

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function safeString(value, fallback = '') {
                    const normalized = String(value ?? '').trim();
                    return normalized || fallback;
                  }

                  let status = 'unknown';
                  let reason = 'profile_status_failed';
                  let clinicId = '';
                  let profileFingerprint = '';
                  let catalogReady = false;
                  let releaseMode = 'unknown';
                  let expectedMatch = false;
                  let expectedReason = 'no_expected_profile';
                  const expectedClinicId = safeString(process.env.TURNERO_PILOT_EXPECTED_CLINIC_ID, '');
                  const expectedProfileFingerprint = safeString(
                    process.env.TURNERO_PILOT_EXPECTED_PROFILE_FINGERPRINT,
                    ''
                  );
                  const expectedReleaseMode = safeString(
                    process.env.TURNERO_PILOT_EXPECTED_RELEASE_MODE,
                    ''
                  );

                  if (statusExit === 0 && statusPath && fs.existsSync(statusPath)) {
                    try {
                      const payload = JSON.parse(fs.readFileSync(statusPath, 'utf8'));
                      clinicId = safeString(payload?.profile?.clinic_id, '');
                      profileFingerprint = safeString(payload?.profileFingerprint, '');
                      catalogReady = payload?.catalogReady === true;
                      releaseMode = safeString(payload?.profile?.release?.mode, 'unknown');
                      if (releaseMode !== 'web_pilot') {
                        status = 'not_required';
                        reason = `release_mode:${releaseMode}`;
                      } else if (!catalogReady) {
                        status = 'blocked';
                        reason = 'catalog_not_ready';
                      } else {
                        status = 'ready';
                        reason = 'ok';
                      }

                      const expectedMismatches = [];
                      if (expectedClinicId && clinicId !== expectedClinicId) {
                        expectedMismatches.push(`clinic_id:${expectedClinicId}->${clinicId || 'missing'}`);
                      }
                      if (expectedProfileFingerprint && profileFingerprint !== expectedProfileFingerprint) {
                        expectedMismatches.push(
                          `profile_fingerprint:${expectedProfileFingerprint}->${profileFingerprint || 'missing'}`
                        );
                      }
                      if (expectedReleaseMode && releaseMode !== expectedReleaseMode) {
                        expectedMismatches.push(
                          `release_mode:${expectedReleaseMode}->${releaseMode || 'missing'}`
                        );
                      }

                      if (!expectedClinicId && !expectedProfileFingerprint && !expectedReleaseMode) {
                        expectedMatch = false;
                        expectedReason = 'no_expected_profile';
                      } elseif (expectedMismatches.length > 0) {
                        expectedMatch = false;
                        expectedReason = expectedMismatches.join(';');
                      } else {
                        expectedMatch = true;
                        expectedReason = 'ok';
                      }
                    } catch (error) {
                      status = 'unknown';
                      reason = `profile_status_unreadable:${error && error.name ? error.name : 'unknown'}`;
                    }
                  } else if (rawPath && fs.existsSync(rawPath)) {
                    const stderr = safeString(fs.readFileSync(rawPath, 'utf8'), '');
                    if (stderr) {
                      reason = `profile_status_failed:${stderr.split(/\r?\n/, 1)[0]}`;
                    }
                  }

                  const catalogReadyText = catalogReady ? 'true' : 'false';
                  const expectedMatchText = expectedMatch ? 'true' : 'false';
                  append(outputPath, 'turnero_pilot_status', status);
                  append(outputPath, 'turnero_pilot_reason', reason);
                  append(outputPath, 'turnero_pilot_clinic_id', clinicId);
                  append(outputPath, 'turnero_pilot_profile_fingerprint', profileFingerprint);
                  append(outputPath, 'turnero_pilot_catalog_ready', catalogReadyText);
                  append(outputPath, 'turnero_pilot_release_mode', releaseMode);
                  append(outputPath, 'turnero_pilot_expected_match', expectedMatchText);
                  append(outputPath, 'turnero_pilot_expected_reason', expectedReason);

                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_STATUS', status);
                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_REASON', reason);
                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_CLINIC_ID', clinicId);
                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_PROFILE_FINGERPRINT', profileFingerprint);
                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_CATALOG_READY', catalogReadyText);
                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_RELEASE_MODE', releaseMode);
                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_EXPECTED_MATCH', expectedMatchText);
                  append(envPath, 'TURNERO_PILOT_DIAGNOSE_EXPECTED_REASON', expectedReason);

                  const reportPath = 'connectivity-report.json';
                  if (fs.existsSync(reportPath)) {
                    try {
                      const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                      report.turneroPilot = {
                        status,
                        reason,
                        clinicId,
                        profileFingerprint,
                        catalogReady,
                        releaseMode,
                        expectedClinicId,
                        expectedProfileFingerprint,
                        expectedReleaseMode,
                        expectedMatch,
                        expectedReason,
                      };
                      fs.writeFileSync(reportPath, JSON.stringify(report, null, 2));
                    } catch {}
                  }

                  const textPath = 'connectivity-report.txt';
                  if (fs.existsSync(textPath)) {
                    const lines = [
                      '',
                      `- turnero_pilot_status: ${status}`,
                      `- turnero_pilot_reason: ${reason}`,
                      `- turnero_pilot_clinic_id: ${clinicId || 'n/a'}`,
                      `- turnero_pilot_profile_fingerprint: ${profileFingerprint || 'n/a'}`,
                      `- turnero_pilot_catalog_ready: ${catalogReadyText}`,
                      `- turnero_pilot_release_mode: ${releaseMode}`,
                      `- turnero_pilot_expected_match: ${expectedMatchText}`,
                      `- turnero_pilot_expected_reason: ${expectedReason}`,
                    ].join('\n');
                    fs.appendFileSync(textPath, `${lines}\n`);
                  }
                  NODE

            - name: Connectivity summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Diagnose host connectivity";
                    echo "- connectivity_status: \`${{ steps.connectivity_summary.outputs.connectivity_status }}\`";
                    echo "- configured_host_count: \`${{ steps.connectivity_summary.outputs.configured_host_count }}\`";
                    echo "- reachable_any: \`${{ steps.connectivity_summary.outputs.reachable_any }}\`";
                    echo "- open_targets: \`${{ steps.connectivity_summary.outputs.open_targets }}\`";
                    echo "- turnero_pilot_status: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_status }}\`";
                    echo "- turnero_pilot_reason: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_reason }}\`";
                    echo "- turnero_pilot_clinic_id: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_clinic_id }}\`";
                    echo "- turnero_pilot_profile_fingerprint: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_profile_fingerprint }}\`";
                    echo "- turnero_pilot_catalog_ready: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_catalog_ready }}\`";
                    echo "- turnero_pilot_release_mode: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_release_mode }}\`";
                    echo "- turnero_pilot_expected_match: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_expected_match }}\`";
                    echo "- turnero_pilot_expected_reason: \`${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_expected_reason }}\`";
                    echo "- report_json: \`connectivity-report.json\`";
                    echo "- report_text: \`connectivity-report.txt\`";
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Crear/actualizar incidente de conectividad deploy host
              if: ${{ always() && steps.connectivity_summary.outputs.issue_ready == 'true' }}
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  GITHUB_API_URL: ${{ github.api_url }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_RUN_ID: ${{ github.run_id }}
                  GITHUB_SERVER_URL: ${{ github.server_url }}
                  CONNECTIVITY_STATUS: ${{ steps.connectivity_summary.outputs.connectivity_status }}
                  CONNECTIVITY_CONFIGURED_HOST_COUNT: ${{ steps.connectivity_summary.outputs.configured_host_count }}
                  CONNECTIVITY_OPEN_TARGETS: ${{ steps.connectivity_summary.outputs.open_targets }}
                  CONNECTIVITY_SIGNAL: ${{ steps.connectivity_summary.outputs.connectivity_signal }}
                  TURNERO_PILOT_DIAGNOSE_STATUS: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_status }}
                  TURNERO_PILOT_DIAGNOSE_REASON: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_reason }}
                  TURNERO_PILOT_DIAGNOSE_CLINIC_ID: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_clinic_id }}
                  TURNERO_PILOT_DIAGNOSE_PROFILE_FINGERPRINT: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_profile_fingerprint }}
                  TURNERO_PILOT_DIAGNOSE_CATALOG_READY: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_catalog_ready }}
                  TURNERO_PILOT_DIAGNOSE_RELEASE_MODE: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_release_mode }}
                  TURNERO_PILOT_DIAGNOSE_EXPECTED_MATCH: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_expected_match }}
                  TURNERO_PILOT_DIAGNOSE_EXPECTED_REASON: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_expected_reason }}
              run: |
                  set -euo pipefail
                  node <<'NODE'
                      (async () => {
                      const token = process.env.GITHUB_TOKEN || '';
                      if (!token) {
                        throw new Error('GITHUB_TOKEN missing');
                      }
                      const [owner, repo] = String(process.env.GITHUB_REPOSITORY || '').split('/');
                      if (!owner || !repo) {
                        throw new Error(`Invalid GITHUB_REPOSITORY: ${process.env.GITHUB_REPOSITORY || ''}`);
                      }
                      const apiBase = process.env.GITHUB_API_URL || 'https://api.github.com';
                      const title = '[ALERTA PROD] Diagnose host connectivity sin ruta de deploy';
                      const runUrl = `${process.env.GITHUB_SERVER_URL || 'https://github.com'}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID || ''}`;
                      const now = new Date().toISOString();
                      const signalMarker = `<!-- diagnose-host-connectivity-signal:${process.env.CONNECTIVITY_SIGNAL || 'unknown'} -->`;
                      const baseLabels = ['production-alert', 'diagnose-host-connectivity', 'deploy-connectivity', 'severity:warning'];

                      async function githubRequest(path, options = {}) {
                        const method = options.method || 'GET';
                        const response = await fetch(`${apiBase}${path}`, {
                          method,
                          headers: {
                            authorization: `Bearer ${token}`,
                            accept: 'application/vnd.github+json',
                            'content-type': 'application/json',
                            'user-agent': 'diagnose-host-connectivity',
                          },
                          body: options.body ? JSON.stringify(options.body) : undefined,
                        });
                        if (!response.ok) {
                          const errorBody = await response.text();
                          throw new Error(`${method} ${path} failed: ${response.status} ${errorBody}`);
                        }
                        if (response.status === 204) {
                          return null;
                        }
                        return response.json();
                      }

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Diagnose Host Connectivity` no encontro ninguna ruta de deploy abierta desde GitHub-hosted.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- connectivity_status: ${process.env.CONNECTIVITY_STATUS || 'unknown'}`,
                        `- configured_host_count: ${process.env.CONNECTIVITY_CONFIGURED_HOST_COUNT || '0'}`,
                        `- open_targets: ${process.env.CONNECTIVITY_OPEN_TARGETS || 'none'}`,
                        `- turnero_pilot_status: ${process.env.TURNERO_PILOT_DIAGNOSE_STATUS || 'unknown'}`,
                        `- turnero_pilot_reason: ${process.env.TURNERO_PILOT_DIAGNOSE_REASON || 'unknown'}`,
                        `- turnero_pilot_clinic_id: ${process.env.TURNERO_PILOT_DIAGNOSE_CLINIC_ID || 'n/a'}`,
                        `- turnero_pilot_profile_fingerprint: ${process.env.TURNERO_PILOT_DIAGNOSE_PROFILE_FINGERPRINT || 'n/a'}`,
                        `- turnero_pilot_catalog_ready: ${process.env.TURNERO_PILOT_DIAGNOSE_CATALOG_READY || 'false'}`,
                        `- turnero_pilot_release_mode: ${process.env.TURNERO_PILOT_DIAGNOSE_RELEASE_MODE || 'unknown'}`,
                        `- turnero_pilot_expected_match: ${process.env.TURNERO_PILOT_DIAGNOSE_EXPECTED_MATCH || 'false'}`,
                        `- turnero_pilot_expected_reason: ${process.env.TURNERO_PILOT_DIAGNOSE_EXPECTED_REASON || 'not_evaluated'}`,
                        `- artifact_json: connectivity-report.json`,
                        `- artifact_text: connectivity-report.txt`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues =
                        (await githubRequest(`/repos/${owner}/${repo}/issues?state=open&per_page=100`)) || [];

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await githubRequest(`/repos/${owner}/${repo}/issues/${existing.number}`, {
                              method: 'PATCH',
                              body: { labels },
                            });
                            console.log(`Issue diagnose-host-connectivity actualizo labels: #${existing.number}`);
                          }
                          console.log(`Issue diagnose-host-connectivity ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await githubRequest(`/repos/${owner}/${repo}/issues/${existing.number}`, {
                          method: 'PATCH',
                          body: {
                            body,
                            labels,
                          },
                        });
                        await githubRequest(`/repos/${owner}/${repo}/issues/${existing.number}/comments`, {
                          method: 'POST',
                          body: {
                            body: [
                              'Incidente de conectividad actualizado por cambio de senal.',
                              '',
                              `- Fecha: ${now}`,
                              `- Run: ${runUrl}`,
                              `- connectivity_status: ${process.env.CONNECTIVITY_STATUS || 'unknown'}`,
                              `- configured_host_count: ${process.env.CONNECTIVITY_CONFIGURED_HOST_COUNT || '0'}`,
                              `- open_targets: ${process.env.CONNECTIVITY_OPEN_TARGETS || 'none'}`,
                              `- turnero_pilot_status: ${process.env.TURNERO_PILOT_DIAGNOSE_STATUS || 'unknown'}`,
                              `- turnero_pilot_clinic_id: ${process.env.TURNERO_PILOT_DIAGNOSE_CLINIC_ID || 'n/a'}`,
                              `- turnero_pilot_profile_fingerprint: ${process.env.TURNERO_PILOT_DIAGNOSE_PROFILE_FINGERPRINT || 'n/a'}`,
                              `- turnero_pilot_expected_match: ${process.env.TURNERO_PILOT_DIAGNOSE_EXPECTED_MATCH || 'false'}`,
                              `- turnero_pilot_expected_reason: ${process.env.TURNERO_PILOT_DIAGNOSE_EXPECTED_REASON || 'not_evaluated'}`
                            ].join('\n'),
                          },
                        });
                        console.log(`Issue diagnose-host-connectivity actualizado: #${existing.number}`);
                      } else {
                        const created = await githubRequest(`/repos/${owner}/${repo}/issues`, {
                          method: 'POST',
                          body: {
                            title,
                            body,
                            labels: baseLabels,
                          },
                        });
                        console.log(`Issue diagnose-host-connectivity creado: #${created.number}`);
                      }
                      })().catch((error) => {
                        console.error(error);
                        process.exit(1);
                      });
                  NODE

            - name: Cerrar incidente de conectividad deploy host al recuperar
              if: ${{ always() && steps.connectivity_summary.outputs.reachable_any == 'true' }}
              shell: bash
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  GITHUB_API_URL: ${{ github.api_url }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  GITHUB_RUN_ID: ${{ github.run_id }}
                  GITHUB_SERVER_URL: ${{ github.server_url }}
                  CONNECTIVITY_STATUS: ${{ steps.connectivity_summary.outputs.connectivity_status }}
                  CONNECTIVITY_OPEN_TARGETS: ${{ steps.connectivity_summary.outputs.open_targets }}
                  TURNERO_PILOT_DIAGNOSE_STATUS: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_status }}
                  TURNERO_PILOT_DIAGNOSE_CLINIC_ID: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_clinic_id }}
                  TURNERO_PILOT_DIAGNOSE_PROFILE_FINGERPRINT: ${{ steps.turnero_pilot_diagnose.outputs.turnero_pilot_profile_fingerprint }}
              run: |
                  set -euo pipefail
                  node <<'NODE'
                      (async () => {
                      const token = process.env.GITHUB_TOKEN || '';
                      if (!token) {
                        throw new Error('GITHUB_TOKEN missing');
                      }
                      const [owner, repo] = String(process.env.GITHUB_REPOSITORY || '').split('/');
                      if (!owner || !repo) {
                        throw new Error(`Invalid GITHUB_REPOSITORY: ${process.env.GITHUB_REPOSITORY || ''}`);
                      }
                      const apiBase = process.env.GITHUB_API_URL || 'https://api.github.com';
                      const title = '[ALERTA PROD] Diagnose host connectivity sin ruta de deploy';
                      const runUrl = `${process.env.GITHUB_SERVER_URL || 'https://github.com'}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID || ''}`;
                      const now = new Date().toISOString();

                      async function githubRequest(path, options = {}) {
                        const method = options.method || 'GET';
                        const response = await fetch(`${apiBase}${path}`, {
                          method,
                          headers: {
                            authorization: `Bearer ${token}`,
                            accept: 'application/vnd.github+json',
                            'content-type': 'application/json',
                            'user-agent': 'diagnose-host-connectivity',
                          },
                          body: options.body ? JSON.stringify(options.body) : undefined,
                        });
                        if (!response.ok) {
                          const errorBody = await response.text();
                          throw new Error(`${method} ${path} failed: ${response.status} ${errorBody}`);
                        }
                        if (response.status === 204) {
                          return null;
                        }
                        return response.json();
                      }

                      const openIssues =
                        (await githubRequest(`/repos/${owner}/${repo}/issues?state=open&per_page=100`)) || [];

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        console.log('No hay incidente de conectividad abierto para cerrar.');
                        return;
                      }

                      await githubRequest(`/repos/${owner}/${repo}/issues/${existing.number}/comments`, {
                        method: 'POST',
                        body: {
                          body: [
                            'Recuperado automaticamente por Diagnose Host Connectivity.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- connectivity_status: ${process.env.CONNECTIVITY_STATUS || 'reachable'}`,
                            `- open_targets: ${process.env.CONNECTIVITY_OPEN_TARGETS || 'n/a'}`,
                            `- turnero_pilot_status: ${process.env.TURNERO_PILOT_DIAGNOSE_STATUS || 'unknown'}`,
                            `- turnero_pilot_clinic_id: ${process.env.TURNERO_PILOT_DIAGNOSE_CLINIC_ID || 'n/a'}`,
                            `- turnero_pilot_profile_fingerprint: ${process.env.TURNERO_PILOT_DIAGNOSE_PROFILE_FINGERPRINT || 'n/a'}`
                          ].join('\n'),
                        },
                      });

                      await githubRequest(`/repos/${owner}/${repo}/issues/${existing.number}`, {
                        method: 'PATCH',
                        body: { state: 'closed' },
                      });
                      console.log(`Issue diagnose-host-connectivity cerrado: #${existing.number}`);
                      })().catch((error) => {
                        console.error(error);
                        process.exit(1);
                      });
                  NODE

            - name: Publicar reporte
              uses: actions/upload-artifact@v4
              with:
                  name: connectivity-report
                  path: |
                      connectivity-report.txt
                      connectivity-report.json
                  if-no-files-found: warn
                  retention-days: 7
