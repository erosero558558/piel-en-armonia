name: Agent Intake

on:
    workflow_dispatch:
    schedule:
        - cron: '*/15 * * * *'

concurrency:
    group: agent-intake-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    actions: read
    issues: read
    pull-requests: read

jobs:
    intake:
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
            JULES_MAX_DISPATCH_PER_RUN: ${{ vars.JULES_MAX_DISPATCH_PER_RUN || '2' }}
            JULES_MAX_ACTIVE_SESSIONS: ${{ vars.JULES_MAX_ACTIVE_SESSIONS || '6' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'

            - name: Install dependencies
              run: npm ci

            - name: Intake -> score -> stale -> conflict gate
              run: |
                  node agent-orchestrator.js intake --strict
                  node agent-orchestrator.js score
                  node agent-orchestrator.js stale --strict
                  node agent-orchestrator.js conflicts --strict

            - name: Dispatch Jules queue from orchestrator
              run: node agent-orchestrator.js dispatch --agent jules

            - name: Reconcile queue and merged PR evidence
              run: node agent-orchestrator.js reconcile --strict

            - name: Governance validation
              run: php bin/validate-agent-governance.php

            - name: Status snapshot
              run: node agent-orchestrator.js status --explain-red

            - name: Commit state changes
              run: |
                  if git diff --quiet -- AGENT_BOARD.yaml AGENT_SIGNALS.yaml JULES_TASKS.md KIMI_TASKS.md; then
                    echo "No orchestrator changes to commit."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add AGENT_BOARD.yaml AGENT_SIGNALS.yaml JULES_TASKS.md KIMI_TASKS.md
                  git commit -m "chore(agents): intake/score/reconcile sync [skip ci]"
                  git pull --rebase origin "${GITHUB_REF_NAME}"
                  git push origin "HEAD:${GITHUB_REF_NAME}"
