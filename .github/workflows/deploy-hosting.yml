                    echo "- telemedicine_deploy_non_tele_failures: \`${TELEMEDICINE_DEPLOY_NON_TELE_FAILURES}\`";
                    echo "- telemedicine_deploy_step_outcome: \`${{ steps.telemedicine_deploy.outcome }}\`";
                    echo "- dry_run: \`${FTP_DRY_RUN}\`";
                    echo "- Result: \`${{ job.status }}\`";
                  } >> "$GITHUB_STEP_SUMMARY"
