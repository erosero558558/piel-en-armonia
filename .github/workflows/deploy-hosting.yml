                    echo "- turnero_pilot_remote_deployed_commit: \`${TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT}\`"
                    echo "- turnero_pilot_remote_verified: \`${TURNERO_PILOT_REMOTE_VERIFIED}\`"
                    echo "- turnero_pilot_recovery_targets: \`${TURNERO_PILOT_RECOVERY_TARGETS}\`"
                    echo "- turnero_pilot_postdeploy_allowed: \`${TURNERO_PILOT_POSTDEPLOY_ALLOWED}\`"
                    echo "- turnero_pilot_status_manifest: \`.public-cutover/turnero-pilot-status.json\`"
                    echo "- turnero_pilot_remote_manifest: \`.public-cutover/turnero-pilot-remote.json\`"
                    echo "- postdeploy_rollout_dispatch_manifest: \`.public-cutover/postdeploy-rollout-dispatch.json\`"
                    echo "- reporte admin rollout deploy-hosting: \`verification/last-admin-ui-rollout-gate-deploy-hosting.json\`"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Stamp public cutover start
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover
                  started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  echo "PUBLIC_CUTOVER_STARTED_AT=${started_at}" >> "$GITHUB_ENV"
                  echo "Public cutover started at ${started_at}"

            - name: Validate public routing ES/EN + redirects (Prod)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/check-public-routing-smoke.js --base-url "${PROD_URL}" --label "production" --output ".public-cutover/routing-smoke.json"

            - name: Validate public conversion hooks ES/EN (Prod)
              if: ${{ env.FTP_DRY_RUN != 'true' && env.SKIP_PUBLIC_CONVERSION_SMOKE != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/check-public-conversion-smoke.js --base-url "${PROD_URL}" --label "production-conversion" --output ".public-cutover/conversion-smoke.json"

            - name: Skipped public conversion smoke summary (Prod)
              if: ${{ env.FTP_DRY_RUN != 'true' && env.SKIP_PUBLIC_CONVERSION_SMOKE == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover
                  node <<'NODE'
                  const fs = require('node:fs');
                  const payload = {
                    label: 'production-conversion',
                    passed: true,
                    skipped: true,
                    failures: [],
                    checks: [],
                    reason: 'manual_override_skip_public_conversion_smoke',
                    generated_at: new Date().toISOString(),
                  };
                  fs.writeFileSync('.public-cutover/conversion-smoke.json', JSON.stringify(payload, null, 2));
                  NODE
                  {
                    echo "## Public conversion smoke";
                    echo "- skipped: \`true\`";
                    echo "- reason: \`manual_override_skip_public_conversion_smoke\`";
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Write public cutover manifest
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/write-public-cutover-manifest.js \
                    --base-url "${PROD_URL}" \
                    --label "production-cutover" \
                    --out-dir ".public-cutover" \
                    --window-hours "${PUBLIC_CUTOVER_WINDOW_HOURS}" \
                    --started-at "${PUBLIC_CUTOVER_STARTED_AT}" \
                    --routing-report ".public-cutover/routing-smoke.json" \
                    --conversion-report ".public-cutover/conversion-smoke.json"

            - name: Write post-deploy rollout dispatch manifest
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              env:
                  DISPATCH_MODE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.dispatch_mode }}
                  RUN_POSTDEPLOY_FAST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.run_fast }}
                  RUN_POSTDEPLOY_GATE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.run_gate }}
                  ADMIN_ROLLOUT_STAGE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.stage }}
                  ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.stage_profile }}
                  ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.require_openclaw_auth_fast }}
                  ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.require_openclaw_live_smoke_fast }}
                  ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_GATE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.require_openclaw_auth_gate }}
                  ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_GATE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.require_openclaw_live_smoke_gate }}
                  ADMIN_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.policy_source_fast }}
                  ADMIN_ROLLOUT_POLICY_SOURCE_GATE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.policy_source_gate }}
                  PUBLIC_V4_ENABLE_MONITOR_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_enable_monitor }}
                  PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_stage }}
                  PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_stage_profile }}
                  PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_policy_source }}
                  PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_surface_test }}
                  PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_surface_control }}
                  PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_view_booking }}
                  PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_start_checkout }}
                  PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_max_confirmed_drop_pp }}
                  PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_confirmed_rate_pct }}
                  PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_allow_missing_control }}
                  TURNERO_PILOT_DEPLOY_STATUS: ${{ env.TURNERO_PILOT_DEPLOY_STATUS }}
                  TURNERO_PILOT_DEPLOY_REASON: ${{ env.TURNERO_PILOT_DEPLOY_REASON }}
                  TURNERO_PILOT_CLINIC_ID: ${{ env.TURNERO_PILOT_CLINIC_ID }}
                  TURNERO_PILOT_MATCHING_PROFILE_ID: ${{ env.TURNERO_PILOT_MATCHING_PROFILE_ID }}
                  TURNERO_PILOT_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_CATALOG_READY: ${{ env.TURNERO_PILOT_CATALOG_READY }}
                  TURNERO_PILOT_RELEASE_MODE: ${{ env.TURNERO_PILOT_RELEASE_MODE }}
                  TURNERO_PILOT_REMOTE_STATUS: ${{ env.TURNERO_PILOT_REMOTE_STATUS }}
                  TURNERO_PILOT_REMOTE_REASON: ${{ env.TURNERO_PILOT_REMOTE_REASON }}
                  TURNERO_PILOT_REMOTE_CLINIC_ID: ${{ env.TURNERO_PILOT_REMOTE_CLINIC_ID }}
                  TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REMOTE_CATALOG_READY: ${{ env.TURNERO_PILOT_REMOTE_CATALOG_READY }}
                  TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT: ${{ env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT }}
                  TURNERO_PILOT_REMOTE_VERIFIED: ${{ env.TURNERO_PILOT_REMOTE_VERIFIED }}
                  TURNERO_PILOT_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_RECOVERY_TARGETS }}
                  TURNERO_PILOT_POSTDEPLOY_ALLOWED: ${{ env.TURNERO_PILOT_POSTDEPLOY_ALLOWED }}
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover
                  node <<'NODE'
                  const fs = require('node:fs');
                  const turneroPilotRecoveryTargets = String(
                    process.env.TURNERO_PILOT_RECOVERY_TARGETS || ''
                  )
                    .split('|')
                    .map((value) => value.trim())
                    .filter(Boolean);

                  const manifest = {
                    generated_at: new Date().toISOString(),
                    domain: process.env.PROD_URL || 'https://pielarmonia.com',
                    dispatch_mode_effective: process.env.DISPATCH_MODE_EFFECTIVE || 'unknown',
                    run_postdeploy_fast_effective: process.env.RUN_POSTDEPLOY_FAST_EFFECTIVE || 'false',
                    run_postdeploy_gate_effective: process.env.RUN_POSTDEPLOY_GATE_EFFECTIVE || 'false',
                    admin_rollout: {
                      stage_effective: process.env.ADMIN_ROLLOUT_STAGE_EFFECTIVE || 'general',
                      stage_profile_effective: process.env.ADMIN_ROLLOUT_STAGE_PROFILE_EFFECTIVE || 'n/a',
                      require_openclaw_auth_fast_effective: process.env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_EFFECTIVE || 'false',
                      require_openclaw_live_smoke_fast_effective: process.env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_EFFECTIVE || 'false',
                      require_openclaw_auth_gate_effective: process.env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_GATE_EFFECTIVE || 'false',
                      require_openclaw_live_smoke_gate_effective: process.env.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_GATE_EFFECTIVE || 'false',
                      policy_source_fast_effective: process.env.ADMIN_ROLLOUT_POLICY_SOURCE_FAST_EFFECTIVE || 'n/a',
                      policy_source_gate_effective: process.env.ADMIN_ROLLOUT_POLICY_SOURCE_GATE_EFFECTIVE || 'n/a'
                    },
                    public_v4_rollout: {
                      enable_monitor_effective: process.env.PUBLIC_V4_ENABLE_MONITOR_EFFECTIVE || 'false',
                      stage_effective: process.env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE || 'canary',
                      stage_profile_effective: process.env.PUBLIC_V4_ROLLOUT_STAGE_PROFILE_EFFECTIVE || 'n/a',
                      policy_source_effective: process.env.PUBLIC_V4_ROLLOUT_POLICY_SOURCE_EFFECTIVE || 'n/a',
                      surface_test_effective: process.env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE || 'v4',
                      surface_control_effective: process.env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE || 'legacy',
                      min_view_booking_effective: process.env.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE || '20',
                      min_start_checkout_effective: process.env.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE || '10',
                      max_confirmed_drop_pp_effective: process.env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE || '8',
                      min_confirmed_rate_pct_effective: process.env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE || '20',
                      allow_missing_control_effective: process.env.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE || 'false'
                    },
                    turnero_pilot: {
                      status: process.env.TURNERO_PILOT_DEPLOY_STATUS || 'unknown',
                      reason: process.env.TURNERO_PILOT_DEPLOY_REASON || 'not_evaluated',
                      clinic_id: process.env.TURNERO_PILOT_CLINIC_ID || '',
                      matching_profile_id: process.env.TURNERO_PILOT_MATCHING_PROFILE_ID || '',
                      profile_fingerprint: process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || '',
                      catalog_ready: process.env.TURNERO_PILOT_CATALOG_READY || 'false',
                      release_mode: process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown',
                      recovery_targets: turneroPilotRecoveryTargets,
                      postdeploy_allowed: process.env.TURNERO_PILOT_POSTDEPLOY_ALLOWED || 'true',
                      remote: {
                        status: process.env.TURNERO_PILOT_REMOTE_STATUS || 'unknown',
                        reason: process.env.TURNERO_PILOT_REMOTE_REASON || 'not_evaluated',
                        clinic_id: process.env.TURNERO_PILOT_REMOTE_CLINIC_ID || '',
                        profile_fingerprint: process.env.TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT || '',
                        catalog_ready: process.env.TURNERO_PILOT_REMOTE_CATALOG_READY || 'false',
                        deployed_commit: process.env.TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT || '',
                        verified: process.env.TURNERO_PILOT_REMOTE_VERIFIED || 'false'
                      }
                    }
                  };

                  const outPath = '.public-cutover/postdeploy-rollout-dispatch.json';
                  fs.writeFileSync(outPath, JSON.stringify(manifest, null, 2));
                  console.log(`Wrote ${outPath}`);
                  NODE

            - name: Upload public cutover evidence
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: public-cutover-evidence
                  path: .public-cutover/
                  include-hidden-files: true
                  if-no-files-found: warn
                  retention-days: 14

            - name: Fail deploy-hosting when turneroPilot remoto bloquea release
              if: ${{ always() && env.FTP_DRY_RUN != 'true' && env.TURNERO_PILOT_RELEASE_MODE == 'web_pilot' && env.TURNERO_PILOT_REMOTE_STATUS == 'blocked' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "::error::Turnero pilot remote verify blocked deploy-hosting (${TURNERO_PILOT_REMOTE_REASON}) clinic_id=${TURNERO_PILOT_REMOTE_CLINIC_ID:-unknown} deployed_commit=${TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT:-unknown}"
                  exit 1

            - name: Persist public cutover monitor window
              if: ${{ env.FTP_DRY_RUN != 'true' && env.ENABLE_PUBLIC_CUTOVER_MONITOR == 'true' }}
              continue-on-error: true
              uses: actions/github-script@v7
              env:
                  PUBLIC_V4_ENABLE_MONITOR_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_enable_monitor }}
                  PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_stage }}
                  PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_surface_test }}
                  PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_surface_control }}
                  PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_view_booking }}
                  PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_start_checkout }}
                  PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_max_confirmed_drop_pp }}
                  PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_confirmed_rate_pct }}
                  PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_allow_missing_control }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      let writeDenied = false;
                      const variables = [
                        {
                          name: 'PROD_MONITOR_ENABLE_PUBLIC_CUTOVER',
                          value: 'true'
                        },
                        {
                          name: 'PUBLIC_CUTOVER_STARTED_AT',
                          value: process.env.PUBLIC_CUTOVER_STARTED_AT
                        },
                        {
                          name: 'PUBLIC_CUTOVER_WINDOW_HOURS',
                          value: process.env.PUBLIC_CUTOVER_WINDOW_HOURS
                        },
                        {
                          name: 'PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT',
                          value: process.env.PUBLIC_V4_ENABLE_MONITOR_EFFECTIVE || 'false'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_STAGE',
                          value: process.env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE || 'canary'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_SURFACE_TEST',
                          value: process.env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE || 'v4'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_SURFACE_CONTROL',
                          value: process.env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE || 'legacy'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING',
                          value: process.env.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE || '20'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT',
                          value: process.env.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE || '10'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP',
                          value: process.env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE || '8'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT',
                          value: process.env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE || '20'
                        },
                        {
                          name: 'PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL',
                          value: process.env.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE || 'false'
                        }
                      ];

                      for (const variable of variables) {
                        try {
                          await github.rest.actions.getRepoVariable({
                            owner,
                            repo,
                            name: variable.name
                          });
                          await github.rest.actions.updateRepoVariable({
                            owner,
                            repo,
                            name: variable.name,
                            value: variable.value
                          });
                          core.info(`Updated repo variable ${variable.name}`);
                        } catch (error) {
                          if (error.status === 403) {
                            writeDenied = true;
                            core.warning(
                              'Skipping repository variable persistence: token lacks actions_variables=write permissions.'
                            );
                            break;
                          }
                          if (error.status !== 404) {
                            throw error;
                          }
                          await github.rest.actions.createRepoVariable({
                            owner,
                            repo,
                            name: variable.name,
                            value: variable.value
                          });
                          core.info(`Created repo variable ${variable.name}`);
                        }
                      }

                      if (writeDenied) {
                        core.notice('Public cutover monitor variables were not persisted. Deploy is still valid.');
                      }

            - name: Bootstrap prod-monitor post-cutover
              if: ${{ env.FTP_DRY_RUN != 'true' && env.ENABLE_PUBLIC_CUTOVER_MONITOR == 'true' && env.DISPATCH_PUBLIC_CUTOVER_MONITOR == 'true' }}
              continue-on-error: true
              uses: actions/github-script@v7
              env:
                  PUBLIC_V4_ENABLE_MONITOR_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_enable_monitor }}
                  PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_stage }}
                  PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_surface_test }}
                  PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_surface_control }}
                  PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_view_booking }}
                  PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_start_checkout }}
                  PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_max_confirmed_drop_pp }}
                  PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_min_confirmed_rate_pct }}
                  PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.public_v4_allow_missing_control }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      try {
                        await github.rest.actions.createWorkflowDispatch({
                          owner,
                          repo,
                          workflow_id: 'prod-monitor.yml',
                          ref,
                          inputs: {
                            domain: process.env.PROD_URL,
                            enable_public_cutover_monitor: 'true',
                            public_cutover_started_at: process.env.PUBLIC_CUTOVER_STARTED_AT,
                            public_cutover_window_hours: process.env.PUBLIC_CUTOVER_WINDOW_HOURS,
                            enable_public_v4_rollout_monitor: process.env.PUBLIC_V4_ENABLE_MONITOR_EFFECTIVE || 'false',
                            public_v4_rollout_stage: process.env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE || 'canary',
                            public_v4_rollout_surface_test: process.env.PUBLIC_V4_ROLLOUT_SURFACE_TEST_EFFECTIVE || 'v4',
                            public_v4_rollout_surface_control: process.env.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_EFFECTIVE || 'legacy',
                            public_v4_rollout_min_view_booking: process.env.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_EFFECTIVE || '20',
                            public_v4_rollout_min_start_checkout: process.env.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_EFFECTIVE || '10',
                            public_v4_rollout_max_confirmed_drop_pp: process.env.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_EFFECTIVE || '8',
                            public_v4_rollout_min_confirmed_rate_pct: process.env.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_EFFECTIVE || '20',
                            public_v4_rollout_allow_missing_control: process.env.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_EFFECTIVE || 'false'
                          }
                        });
                        core.info(
                          `prod-monitor.yml dispatched for ref ${ref} (public_v4_stage=${process.env.PUBLIC_V4_ROLLOUT_STAGE_EFFECTIVE || 'canary'}, public_v4_monitor=${process.env.PUBLIC_V4_ENABLE_MONITOR_EFFECTIVE || 'false'})`
                        );
                      } catch (error) {
                        if (error.status === 403 || error.status === 404) {
                          core.warning(
                            `Skipping prod-monitor dispatch due to insufficient permissions or missing workflow (${error.status}).`
                          );
                          return;
                        }
                        throw error;
                      }

            - name: Crear/actualizar incidente telemedicina deploy-hosting
              if: ${{ always() && env.FTP_DRY_RUN != 'true' && github.event_name != 'workflow_dispatch' && (env.TELEMEDICINE_DEPLOY_STATUS == 'degraded' || env.TELEMEDICINE_DEPLOY_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Hosting telemedicina degradada';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `status:${process.env.TELEMEDICINE_DEPLOY_STATUS || 'unknown'}|reason:${process.env.TELEMEDICINE_DEPLOY_REASON || 'unknown'}|failures:${process.env.TELEMEDICINE_DEPLOY_FAILURES || '-1'}|non_tele:${process.env.TELEMEDICINE_DEPLOY_NON_TELE_FAILURES || '-1'}`;
                      const signalMarker = `<!-- deploy-hosting-telemedicine-signal:${signal} -->`;
                      const reason = String(process.env.TELEMEDICINE_DEPLOY_REASON || '');
                      const severity = (
                        reason.includes('diagnostics_critical') ||
                        reason.includes('hard_failures:') ||
                        reason.includes('hard_failures_invalid') ||
                        reason.includes('health_unavailable') ||
                        reason.includes('health_parse_error') ||
                        reason.includes('telemedicine_missing') ||
                        reason.includes('not_configured')
                      )
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'deploy-hosting', 'telemedicine', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const incidentBody = [
                        'El workflow `Deploy Hosting (Canary Pipeline)` detecto degradacion telemedicina post-cutover.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- telemedicine_deploy_status: ${process.env.TELEMEDICINE_DEPLOY_STATUS || 'unknown'}`,
                        `- telemedicine_deploy_reason: ${process.env.TELEMEDICINE_DEPLOY_REASON || 'unknown'}`,
                        `- telemedicine_deploy_failures: ${process.env.TELEMEDICINE_DEPLOY_FAILURES || '-1'}`,
                        `- telemedicine_deploy_non_tele_failures: ${process.env.TELEMEDICINE_DEPLOY_NON_TELE_FAILURES || '-1'}`,
                        `- prod_url: ${process.env.PROD_URL || 'https://pielarmonia.com'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue deploy-hosting telemedicina actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue deploy-hosting telemedicina ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente deploy-hosting telemedicina actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_deploy_status: ${process.env.TELEMEDICINE_DEPLOY_STATUS || 'unknown'}`,
                            `- telemedicine_deploy_reason: ${process.env.TELEMEDICINE_DEPLOY_REASON || 'unknown'}`,
                            `- telemedicine_deploy_failures: ${process.env.TELEMEDICINE_DEPLOY_FAILURES || '-1'}`,
                            `- telemedicine_deploy_non_tele_failures: ${process.env.TELEMEDICINE_DEPLOY_NON_TELE_FAILURES || '-1'}`
                          ].join('\n')
                        });
                        core.info(`Issue deploy-hosting telemedicina actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
