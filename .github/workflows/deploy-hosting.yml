name: Deploy Hosting (Canary Pipeline)

on:
    workflow_run:
        workflows: ['CI']
        types:
            - completed
        branches:
            - main
    workflow_dispatch:
        inputs:
            protocol:
                description: 'Protocolo de deploy'
                required: false
                default: 'ftps'
                type: choice
                options:
                    - ftps
                    - ftp
                    - sftp
            server_port:
                description: 'Puerto remoto (21 FTP/FTPS, 22 SFTP)'
                required: false
                default: '21'
                type: string
            security:
                description: 'Validacion TLS para FTPS'
                required: false
                default: 'strict'
                type: choice
                options:
                    - strict
                    - loose
            server_dir:
                description: 'Directorio remoto en hosting'
                required: false
                default: '/public_html/'
                type: string
            dry_run:
                description: 'Simular deploy sin subir archivos'
                required: false
                default: false
                type: boolean
            require_staging_canary:
                description: 'Exigir canary/staging exitoso antes de produccion'
                required: false
                default: true
                type: boolean
            allow_prod_without_staging:
                description: 'Permitir prod sin staging (solo emergencia)'
                required: false
                default: false
                type: boolean
            clean_slate:
                description: 'Eliminar archivos remotos no presentes (peligroso)'
                required: false
                default: false
                type: boolean
            enable_public_cutover_monitor:
                description: 'Habilitar bootstrap de monitor post-cutover publico'
                required: false
                default: true
                type: boolean
            public_cutover_window_hours:
                description: 'Ventana de monitoreo post-cutover (horas)'
                required: false
                default: '72'
                type: string
            dispatch_public_cutover_monitor:
                description: 'Disparar prod-monitor inmediatamente tras deploy'
                required: false
                default: true
                type: boolean
            run_postdeploy_fast:
                description: 'Disparar post-deploy-fast al finalizar deploy'
                required: false
                default: true
                type: boolean
            run_postdeploy_gate:
                description: 'Disparar post-deploy-gate al finalizar deploy'
                required: false
                default: false
                type: boolean
            postdeploy_fast_wait_seconds:
                description: 'wait_seconds para post-deploy-fast (workflow_dispatch)'
                required: false
                default: '45'
                type: string
            admin_rollout_stage:
                description: 'Etapa admin rollout a propagar (internal|canary|general|rollback)'
                required: false
                default: 'general'
                type: string
            admin_rollout_skip_runtime_smoke_fast:
                description: 'Omitir smoke runtime en post-deploy-fast'
                required: false
                default: true
                type: boolean
            admin_rollout_allow_feature_api_failure_fast:
                description: 'Permitir falla de features API en post-deploy-fast'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_missing_flag_fast:
                description: 'Permitir ausencia de admin_sony_ui en post-deploy-fast'
                required: false
                default: false
                type: boolean
            admin_rollout_skip_runtime_smoke_gate:
                description: 'Omitir smoke runtime en post-deploy-gate'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_feature_api_failure_gate:
                description: 'Permitir falla de features API en post-deploy-gate'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_missing_flag_gate:
                description: 'Permitir ausencia de admin_sony_ui en post-deploy-gate'
                required: false
                default: false
                type: boolean

concurrency:
    group: deploy-pielarmonia-pipeline
    cancel-in-progress: false

permissions:
    contents: read
    actions: write

jobs:
    deploy-canary:
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        name: Deploy Canary (Staging)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            # Staging Configuration
            DEPLOY_PROTOCOL: ${{ github.event.inputs.protocol || vars.STAGING_FTP_PROTOCOL || 'ftps' }}
            FTP_SERVER_PORT: ${{ github.event.inputs.server_port || vars.STAGING_FTP_SERVER_PORT || '21' }}
            FTP_SECURITY: ${{ github.event.inputs.security || vars.STAGING_FTP_SECURITY || 'strict' }}
            FTP_SERVER_DIR: ${{ github.event.inputs.server_dir || vars.STAGING_FTP_SERVER_DIR || '/staging/' }}
            FTP_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
            FTP_CLEAN_SLATE: ${{ github.event.inputs.clean_slate || 'false' }} # Careful with clean slate on staging if shared
            STAGING_URL: ${{ vars.STAGING_URL || 'https://staging.pielarmonia.com' }}
            REQUIRE_STAGING_CANARY: ${{ github.event.inputs.require_staging_canary || vars.REQUIRE_STAGING_CANARY || 'true' }}
            ALLOW_PROD_WITHOUT_STAGING: ${{ github.event.inputs.allow_prod_without_staging || vars.ALLOW_PROD_WITHOUT_STAGING || 'false' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node Dependencies
              run: npm ci

            - name: Build Astro public routes
              run: |
                  npm run astro:build
                  npm run astro:sync

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Install Dependencies
              run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

            - name: Detectar secretos de staging
              id: staging_secrets
              shell: bash
              run: |
                  set -euo pipefail
                  missing=0
                  if [ -z "${{ secrets.STAGING_FTP_SERVER }}" ]; then
                    echo "::warning::Falta el secret STAGING_FTP_SERVER"
                    missing=1
                  fi
                  if [ -z "${{ secrets.STAGING_FTP_USERNAME }}" ]; then
                    echo "::warning::Falta el secret STAGING_FTP_USERNAME"
                    missing=1
                  fi
                  if [ -z "${{ secrets.STAGING_FTP_PASSWORD }}" ]; then
                    echo "::warning::Falta el secret STAGING_FTP_PASSWORD"
                    missing=1
                  fi
                  if [ "${missing}" -eq 1 ]; then
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    echo "missing=true" >> "$GITHUB_OUTPUT"
                    echo "::warning::Staging canary no disponible por secretos STAGING_FTP_* faltantes."
                  else
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                    echo "missing=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Enforce staging canary gate policy
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${{ steps.staging_secrets.outputs.missing }}" != "true" ]; then
                    echo "Staging canary habilitado. Politica OK."
                    exit 0
                  fi

                  if [ "${FTP_DRY_RUN}" = "true" ]; then
                    echo "::notice::dry_run=true permite omitir staging efectivo."
                    exit 0
                  fi

                  require_staging="$(echo "${REQUIRE_STAGING_CANARY}" | tr '[:upper:]' '[:lower:]')"
                  allow_without_staging="$(echo "${ALLOW_PROD_WITHOUT_STAGING}" | tr '[:upper:]' '[:lower:]')"

                  if [ "${require_staging}" = "true" ] && [ "${allow_without_staging}" != "true" ]; then
                    echo "::error::Politica bloqueante: require_staging_canary=true y faltan secretos STAGING_FTP_*."
                    echo "::error::Configura staging o ejecuta override explicito allow_prod_without_staging=true."
                    exit 1
                  fi

                  if [ "${allow_without_staging}" = "true" ]; then
                    echo "::warning::Override activo: allow_prod_without_staging=true. Se permite continuar sin staging."
                  else
                    echo "::notice::require_staging_canary=false. Se permite continuar sin staging."
                  fi

            - name: Install Playwright (chromium) for staging acceptance gate
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              run: npx playwright install --with-deps chromium

            - name: Preflight red (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  HOST="${{ secrets.STAGING_FTP_SERVER }}"
                  PORT="${FTP_SERVER_PORT}"
                  echo "Testeando conectividad TCP a ${HOST}:${PORT} ..."
                  if timeout 8 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
                    echo "TCP OK en ${HOST}:${PORT}"
                  else
                    echo "::error::No se puede abrir ${HOST}:${PORT} desde GitHub Runner."
                    exit 1
                  fi

            - name: Preparar bundle de deploy (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  rm -rf _deploy_bundle
                  mkdir -p _deploy_bundle
                  rsync -a --delete \
                    --exclude='.git*' \
                    --exclude='.github/' \
                    --exclude='.vscode/' \
                    --exclude='.claude/' \
                    --exclude='node_modules/' \
                    --exclude='test-results/' \
                    --exclude='tests/' \
                    --exclude='playwright-report/' \
                    --exclude='_deploy_bundle/' \
                    --exclude='verification/' \
                    --exclude='data/' \
                    --exclude='uploads/' \
                    --exclude='env.php' \
                    --exclude='php.log' \
                    --exclude='*.log' \
                    --exclude='*.zip' \
                    --exclude='*.ps1' \
                    ./ _deploy_bundle/

            - name: Deploy a Staging (FTP/FTPS)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.DEPLOY_PROTOCOL != 'sftp' }}
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.STAGING_FTP_SERVER }}
                  username: ${{ secrets.STAGING_FTP_USERNAME }}
                  password: ${{ secrets.STAGING_FTP_PASSWORD }}
                  protocol: ${{ env.DEPLOY_PROTOCOL }}
                  port: ${{ env.FTP_SERVER_PORT }}
                  security: ${{ env.FTP_SECURITY }}
                  server-dir: ${{ env.FTP_SERVER_DIR }}
                  local-dir: ./_deploy_bundle/
                  dangerous-clean-slate: ${{ env.FTP_CLEAN_SLATE }}
                  dry-run: ${{ env.FTP_DRY_RUN }}
                  timeout: 120000
                  state-name: .ftp-deploy-sync-state-staging.json

            - name: Deploy a Staging (SFTP)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.DEPLOY_PROTOCOL == 'sftp' }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${FTP_DRY_RUN}" = "true" ]; then
                    echo "Dry-run SFTP habilitado: se omite subida real."
                    find _deploy_bundle -maxdepth 2 -type f | head -n 30
                    exit 0
                  fi
                  sudo apt-get update
                  sudo apt-get install -y lftp
                  lftp -u "${{ secrets.STAGING_FTP_USERNAME }}","${{ secrets.STAGING_FTP_PASSWORD }}" "sftp://${{ secrets.STAGING_FTP_SERVER }}:${FTP_SERVER_PORT}" -e "
                    set sftp:auto-confirm yes
                    set net:max-retries 2
                    set net:timeout 20
                    mirror -R --delete --verbose _deploy_bundle/ ${FTP_SERVER_DIR}
                    bye
                  "

            - name: Smoke Tests (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Running smoke tests against ${STAGING_URL}..."
                  # Retry logic for health check
                  for i in {1..5}; do
                    if curl -fsS "${STAGING_URL}/api.php?resource=health" > /tmp/health_staging.json; then
                      echo "Health Check OK"
                      break
                    else
                      echo "Health Check failed, retrying in 5s..."
                      sleep 5
                    fi
                    if [ $i -eq 5 ]; then exit 1; fi
                  done

                  curl -fsS "${STAGING_URL}/figo-chat.php" > /tmp/figo_staging.json
                  curl -IfsS "${STAGING_URL}/" > /tmp/home_staging.txt
                  echo "Staging Verified."

            - name: Validate public routing ES/EN + redirects (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .staging-acceptance
                  node bin/check-public-routing-smoke.js --base-url "${STAGING_URL}" --label "staging-canary" --output ".staging-acceptance/routing-smoke.json"

            - name: Validate public conversion hooks ES/EN (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .staging-acceptance
                  node bin/check-public-conversion-smoke.js --base-url "${STAGING_URL}" --label "staging-canary-conversion" --output ".staging-acceptance/conversion-smoke.json"

            - name: Run staging acceptance gate (visual + funcional + performance)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/run-staging-acceptance-gate.js --base-url "${STAGING_URL}" --label "staging-canary" --out-dir ".staging-acceptance"

            - name: Upload staging acceptance evidence
              if: ${{ always() && steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: canary-staging-acceptance-evidence
                  path: .staging-acceptance/
                  if-no-files-found: warn
                  retention-days: 14

            - name: Omitir canary no configurado
              if: ${{ steps.staging_secrets.outputs.enabled != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Canary staging omitido: secretos STAGING_FTP_* no configurados o politica flexible."

            - name: Canary summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Canary gate";
                    echo "- approval_contract: \`routing_smoke + conversion_smoke + staging_acceptance_gate + artifact:canary-staging-acceptance-evidence\`";
                    echo "- require_staging_canary: \`${REQUIRE_STAGING_CANARY}\`";
                    echo "- allow_prod_without_staging: \`${ALLOW_PROD_WITHOUT_STAGING}\`";
                    echo "- staging_secrets_missing: \`${{ steps.staging_secrets.outputs.missing || 'unknown' }}\`";
                    echo "- staging_canary_enabled: \`${{ steps.staging_secrets.outputs.enabled || 'unknown' }}\`";
                    echo "- dry_run: \`${FTP_DRY_RUN}\`";
                    echo "- Result: \`${{ job.status }}\`";
                  } >> "$GITHUB_STEP_SUMMARY"

    deploy-prod:
        needs: deploy-canary
        name: Deploy Production
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            # Production Configuration
            DEPLOY_METHOD: ${{ vars.DEPLOY_METHOD || 'git-sync' }}
            DEPLOY_PROTOCOL: ${{ github.event.inputs.protocol || vars.FTP_PROTOCOL || 'ftps' }}
            FTP_SERVER_PORT: ${{ github.event.inputs.server_port || vars.FTP_SERVER_PORT || '21' }}
            FTP_SECURITY: ${{ github.event.inputs.security || vars.FTP_SECURITY || 'strict' }}
            FTP_SERVER_DIR: ${{ github.event.inputs.server_dir || vars.FTP_SERVER_DIR || '/public_html/' }}
            FTP_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
            FTP_CLEAN_SLATE: ${{ github.event.inputs.clean_slate || 'false' }}
            GIT_SYNC_WAIT_SEC: ${{ vars.GIT_SYNC_WAIT_SEC || '75' }}
            PROD_URL: ${{ vars.PROD_URL || 'https://pielarmonia.com' }}
            REQUIRE_STAGING_CANARY: ${{ github.event.inputs.require_staging_canary || vars.REQUIRE_STAGING_CANARY || 'true' }}
            ALLOW_PROD_WITHOUT_STAGING: ${{ github.event.inputs.allow_prod_without_staging || vars.ALLOW_PROD_WITHOUT_STAGING || 'false' }}
            ENABLE_PUBLIC_CUTOVER_MONITOR: ${{ github.event.inputs.enable_public_cutover_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_CUTOVER || 'true' }}
            PUBLIC_CUTOVER_WINDOW_HOURS: ${{ github.event.inputs.public_cutover_window_hours || vars.PUBLIC_CUTOVER_WINDOW_HOURS || '72' }}
            DISPATCH_PUBLIC_CUTOVER_MONITOR: ${{ github.event.inputs.dispatch_public_cutover_monitor || 'true' }}
            PUBLIC_CUTOVER_STARTED_AT: ''
            DISPATCH_EVENT_NAME: ${{ github.event_name }}
            RUN_POSTDEPLOY_FAST_INPUT: ${{ github.event.inputs.run_postdeploy_fast || '' }}
            RUN_POSTDEPLOY_GATE_INPUT: ${{ github.event.inputs.run_postdeploy_gate || '' }}
            RUN_POSTDEPLOY_FAST_AUTOMATION: ${{ vars.RUN_POSTDEPLOY_FAST_FROM_DEPLOY_WORKFLOW_RUN || vars.RUN_POSTDEPLOY_FAST_FROM_DEPLOY || 'false' }}
            RUN_POSTDEPLOY_GATE_AUTOMATION: ${{ vars.RUN_POSTDEPLOY_GATE_FROM_DEPLOY_WORKFLOW_RUN || vars.RUN_POSTDEPLOY_GATE_FROM_DEPLOY || 'false' }}
            POSTDEPLOY_FAST_WAIT_SECONDS: ${{ github.event.inputs.postdeploy_fast_wait_seconds || vars.POSTDEPLOY_FAST_WAIT_SECONDS || '45' }}
            ADMIN_ROLLOUT_STAGE_PROPAGATED: ${{ github.event.inputs.admin_rollout_stage || vars.ADMIN_ROLLOUT_STAGE_DEPLOY_AUTOMATION || vars.ADMIN_ROLLOUT_STAGE || 'general' }}
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_skip_runtime_smoke_fast || vars.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST || 'true' }}
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_feature_api_failure_fast || vars.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST || 'false' }}
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_missing_flag_fast || vars.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST || 'false' }}
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_skip_runtime_smoke_gate || vars.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE || 'false' }}
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_feature_api_failure_gate || vars.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE || 'false' }}
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_missing_flag_gate || vars.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG || 'false' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node Dependencies
              run: npm ci

            - name: Build Astro public routes
              run: |
                  npm run astro:build
                  npm run astro:sync

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Install Dependencies
              run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

            - name: Validar secretos requeridos (Prod)
              if: ${{ env.DEPLOY_METHOD != 'git-sync' }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${{ secrets.FTP_SERVER }}" ]; then
                    echo "::error::Falta el secret FTP_SERVER"
                    exit 1
                  fi
                  if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
                    echo "::error::Falta el secret FTP_USERNAME"
                    exit 1
                  fi
                  if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
                    echo "::error::Falta el secret FTP_PASSWORD"
                    exit 1
                  fi

            - name: Preflight red (Prod)
              if: ${{ env.DEPLOY_METHOD != 'git-sync' }}
              shell: bash
              run: |
                  set -euo pipefail
                  HOST="${{ secrets.FTP_SERVER }}"
                  PORT="${FTP_SERVER_PORT}"
                  echo "Testeando conectividad TCP a ${HOST}:${PORT} ..."
                  if timeout 8 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
                    echo "TCP OK en ${HOST}:${PORT}"
                  else
                    echo "::error::No se puede abrir ${HOST}:${PORT} desde GitHub Runner."
                    exit 1
                  fi

            - name: Preparar bundle de deploy (Prod)
              if: ${{ env.DEPLOY_METHOD != 'git-sync' }}
              shell: bash
              run: |
                  set -euo pipefail
                  rm -rf _deploy_bundle
                  mkdir -p _deploy_bundle
                  rsync -a --delete \
                    --exclude='.git*' \
                    --exclude='.github/' \
                    --exclude='.vscode/' \
                    --exclude='.claude/' \
                    --exclude='node_modules/' \
                    --exclude='test-results/' \
                    --exclude='tests/' \
                    --exclude='playwright-report/' \
                    --exclude='_deploy_bundle/' \
                    --exclude='verification/' \
                    --exclude='data/' \
                    --exclude='uploads/' \
                    --exclude='env.php' \
                    --exclude='php.log' \
                    --exclude='*.log' \
                    --exclude='*.zip' \
                    --exclude='*.ps1' \
                    ./ _deploy_bundle/

            - name: Deploy a Produccion (FTP/FTPS)
              if: ${{ env.DEPLOY_METHOD != 'git-sync' && env.DEPLOY_PROTOCOL != 'sftp' }}
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ${{ env.DEPLOY_PROTOCOL }}
                  port: ${{ env.FTP_SERVER_PORT }}
                  security: ${{ env.FTP_SECURITY }}
                  server-dir: ${{ env.FTP_SERVER_DIR }}
                  local-dir: ./_deploy_bundle/
                  dangerous-clean-slate: ${{ env.FTP_CLEAN_SLATE }}
                  dry-run: ${{ env.FTP_DRY_RUN }}
                  timeout: 120000
                  state-name: .ftp-deploy-sync-state.json

            - name: Deploy a Produccion (SFTP)
              if: ${{ env.DEPLOY_METHOD != 'git-sync' && env.DEPLOY_PROTOCOL == 'sftp' }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${FTP_DRY_RUN}" = "true" ]; then
                    echo "Dry-run SFTP habilitado: se omite subida real."
                    find _deploy_bundle -maxdepth 2 -type f | head -n 30
                    exit 0
                  fi
                  sudo apt-get update
                  sudo apt-get install -y lftp
                  lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "sftp://${{ secrets.FTP_SERVER }}:${FTP_SERVER_PORT}" -e "
                    set sftp:auto-confirm yes
                    set net:max-retries 2
                    set net:timeout 20
                    mirror -R --delete --verbose _deploy_bundle/ ${FTP_SERVER_DIR}
                    bye
                  "

            - name: Esperar sincronizacion Git del hosting (modo git-sync)
              if: ${{ env.DEPLOY_METHOD == 'git-sync' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Modo deploy git-sync activo. Esperando ${GIT_SYNC_WAIT_SEC}s para sincronizacion remota."
                  sleep "${GIT_SYNC_WAIT_SEC}"

            - name: Manual fallback notes for git-sync
              if: ${{ always() && env.DEPLOY_METHOD == 'git-sync' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  {
                    echo "## Manual fallback";
                    echo "- Si el host sigue sin publicar \`/es/\` o \`/en/\`, ejecutar en el VPS: \`bash ./bin/deploy-public-v3-live.sh\`";
                    echo "- El script recompone \`es/\`, \`en/\`, \`_astro/\`, valida \`/usr/sbin/nginx -t\` y recarga Nginx.";
                    echo "- Tambien corrige redirects canonicos para evitar \`:8080\` detras de Cloudflare.";
                    echo "- Compat temporal: \`deploy-public-v2-live.sh\` existe como shim y delega a V3.";
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Smoke Tests (Prod)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Running smoke tests against ${PROD_URL}..."
                  curl -fsS "${PROD_URL}/api.php?resource=health" > /tmp/health.json
                  curl -fsS "${PROD_URL}/figo-chat.php" > /tmp/figo.json
                  curl -IfsS "${PROD_URL}/" > /tmp/home_headers.txt
                  echo "Production Verified."

            - name: Resolver parametros de dispatch post-deploy
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              id: resolve_postdeploy
              shell: bash
              run: |
                  set -euo pipefail

                  normalize_bool() {
                    local raw="${1:-}"
                    local normalized
                    normalized="$(echo "$raw" | tr '[:upper:]' '[:lower:]' | xargs)"
                    case "$normalized" in
                      1|true|yes|on) echo "true" ;;
                      0|false|no|off|"") echo "false" ;;
                      *) echo "false" ;;
                    esac
                  }

                  json_field() {
                    local json="${1:?json requerido}"
                    local field="${2:?field requerido}"
                    node -e '
                      const payload = JSON.parse(process.argv[1]);
                      const value = payload[process.argv[2]];
                      if (typeof value === "boolean") {
                        process.stdout.write(value ? "true" : "false");
                        process.exit(0);
                      }
                      if (value === undefined || value === null) {
                        process.stdout.write("");
                        process.exit(0);
                      }
                      process.stdout.write(String(value));
                    ' "$json" "$field"
                  }

                  dispatch_mode="automation"
                  if [ "${DISPATCH_EVENT_NAME}" = "workflow_dispatch" ]; then
                    dispatch_mode="manual"
                    run_fast="$(normalize_bool "${RUN_POSTDEPLOY_FAST_INPUT}")"
                    run_gate="$(normalize_bool "${RUN_POSTDEPLOY_GATE_INPUT}")"
                  else
                    run_fast="$(normalize_bool "${RUN_POSTDEPLOY_FAST_AUTOMATION}")"
                    run_gate="$(normalize_bool "${RUN_POSTDEPLOY_GATE_AUTOMATION}")"
                  fi

                  base_policy_json="$(node ./bin/resolve-admin-rollout-policy.js \
                    --stage "${ADMIN_ROLLOUT_STAGE_PROPAGATED}" \
                    --default-stage general \
                    --skip-runtime-smoke false \
                    --default-skip-runtime-smoke false \
                    --allow-feature-api-failure false \
                    --default-allow-feature-api-failure false \
                    --allow-missing-flag false \
                    --default-allow-missing-flag false)"

                  fast_policy_json="$(node ./bin/resolve-admin-rollout-policy.js \
                    --stage "${ADMIN_ROLLOUT_STAGE_PROPAGATED}" \
                    --default-stage general \
                    --skip-runtime-smoke "${ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_PROPAGATED}" \
                    --default-skip-runtime-smoke true \
                    --allow-feature-api-failure "${ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_PROPAGATED}" \
                    --default-allow-feature-api-failure false \
                    --allow-missing-flag "${ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_PROPAGATED}" \
                    --default-allow-missing-flag false)"

                  gate_policy_json="$(node ./bin/resolve-admin-rollout-policy.js \
                    --stage "${ADMIN_ROLLOUT_STAGE_PROPAGATED}" \
                    --default-stage general \
                    --skip-runtime-smoke "${ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_GATE_PROPAGATED}" \
                    --default-skip-runtime-smoke false \
                    --allow-feature-api-failure "${ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_GATE_PROPAGATED}" \
                    --default-allow-feature-api-failure false \
                    --allow-missing-flag "${ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_GATE_PROPAGATED}" \
                    --default-allow-missing-flag false)"

                  stage="$(json_field "$base_policy_json" stage_effective)"
                  stage_profile="$(json_field "$base_policy_json" stage_profile)"
                  policy_source_base="$(json_field "$base_policy_json" policy_source)"

                  skip_runtime_smoke_fast="$(json_field "$fast_policy_json" skip_runtime_smoke_effective)"
                  allow_feature_api_failure_fast="$(json_field "$fast_policy_json" allow_feature_api_failure_effective)"
                  allow_missing_flag_fast="$(json_field "$fast_policy_json" allow_missing_flag_effective)"
                  policy_source_fast="$(json_field "$fast_policy_json" policy_source)"

                  skip_runtime_smoke_gate="$(json_field "$gate_policy_json" skip_runtime_smoke_effective)"
                  allow_feature_api_failure_gate="$(json_field "$gate_policy_json" allow_feature_api_failure_effective)"
                  allow_missing_flag_gate="$(json_field "$gate_policy_json" allow_missing_flag_effective)"
                  policy_source_gate="$(json_field "$gate_policy_json" policy_source)"

                  precheck_policy_source="stage-default"
                  precheck_allow_feature_api_failure="$(json_field "$base_policy_json" allow_feature_api_failure_effective)"
                  precheck_allow_missing_flag="$(json_field "$base_policy_json" allow_missing_flag_effective)"
                  if [ "$run_gate" = "true" ]; then
                    precheck_policy_source="gate:${policy_source_gate}"
                    precheck_allow_feature_api_failure="$allow_feature_api_failure_gate"
                    precheck_allow_missing_flag="$allow_missing_flag_gate"
                  elif [ "$run_fast" = "true" ]; then
                    precheck_policy_source="fast:${policy_source_fast}"
                    precheck_allow_feature_api_failure="$allow_feature_api_failure_fast"
                    precheck_allow_missing_flag="$allow_missing_flag_fast"
                  else
                    precheck_policy_source="stage-default:${policy_source_base}"
                  fi

                  echo "run_fast=$run_fast" >> "$GITHUB_OUTPUT"
                  echo "run_gate=$run_gate" >> "$GITHUB_OUTPUT"
                  echo "dispatch_mode=$dispatch_mode" >> "$GITHUB_OUTPUT"
                  echo "stage=$stage" >> "$GITHUB_OUTPUT"
                  echo "stage_profile=$stage_profile" >> "$GITHUB_OUTPUT"
                  echo "skip_runtime_smoke_fast=$skip_runtime_smoke_fast" >> "$GITHUB_OUTPUT"
                  echo "allow_feature_api_failure_fast=$allow_feature_api_failure_fast" >> "$GITHUB_OUTPUT"
                  echo "allow_missing_flag_fast=$allow_missing_flag_fast" >> "$GITHUB_OUTPUT"
                  echo "policy_source_fast=$policy_source_fast" >> "$GITHUB_OUTPUT"
                  echo "skip_runtime_smoke_gate=$skip_runtime_smoke_gate" >> "$GITHUB_OUTPUT"
                  echo "allow_feature_api_failure_gate=$allow_feature_api_failure_gate" >> "$GITHUB_OUTPUT"
                  echo "allow_missing_flag_gate=$allow_missing_flag_gate" >> "$GITHUB_OUTPUT"
                  echo "policy_source_gate=$policy_source_gate" >> "$GITHUB_OUTPUT"
                  echo "precheck_policy_source=$precheck_policy_source" >> "$GITHUB_OUTPUT"
                  echo "allow_feature_api_failure_precheck=$precheck_allow_feature_api_failure" >> "$GITHUB_OUTPUT"
                  echo "allow_missing_flag_precheck=$precheck_allow_missing_flag" >> "$GITHUB_OUTPUT"

                  echo "Dispatch config -> mode=$dispatch_mode fast=$run_fast gate=$run_gate stage=$stage stage_profile=$stage_profile precheck_source=$precheck_policy_source"

            - name: Validar contrato features admin_sony_ui (post-deploy)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: pwsh
              env:
                  ADMIN_ROLLOUT_STAGE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.stage }}
                  ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_PRECHECK_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.allow_feature_api_failure_precheck }}
                  ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_PRECHECK_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.allow_missing_flag_precheck }}
              run: |
                  $allowFeatureApiFailure = ([string]$env:ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_PRECHECK_EFFECTIVE).Trim().ToLowerInvariant() -eq 'true'
                  $allowMissingFlag = ([string]$env:ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_PRECHECK_EFFECTIVE).Trim().ToLowerInvariant() -eq 'true'
                  ./GATE-ADMIN-ROLLOUT.ps1 `
                    -Domain $env:PROD_URL `
                    -Stage $env:ADMIN_ROLLOUT_STAGE_EFFECTIVE `
                    -SkipRuntimeSmoke `
                    -AllowFeatureApiFailure:$allowFeatureApiFailure `
                    -AllowMissingAdminFlag:$allowMissingFlag `
                    -ReportPath 'verification/last-admin-ui-rollout-gate-deploy-hosting.json'

            - name: Publicar reporte gate admin rollout (deploy-hosting)
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: deploy-hosting-admin-rollout-report
                  path: verification/last-admin-ui-rollout-gate-deploy-hosting.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Disparar Post-Deploy Fast Lane
              if: ${{ env.FTP_DRY_RUN != 'true' && steps.resolve_postdeploy.outputs.run_fast == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: 'post-deploy-fast.yml',
                        ref: 'main',
                        inputs: {
                          domain: process.env.PROD_URL,
                          wait_seconds: process.env.POSTDEPLOY_FAST_WAIT_SECONDS,
                          admin_rollout_stage: process.env.ADMIN_ROLLOUT_STAGE_EFFECTIVE,
                          admin_rollout_skip_runtime_smoke: process.env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE,
                          admin_rollout_allow_feature_api_failure: process.env.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_EFFECTIVE,
                          admin_rollout_allow_missing_flag: process.env.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_EFFECTIVE
                        }
                      });

                      core.info(
                        `Workflow post-deploy-fast.yml disparado (domain=${process.env.PROD_URL}, stage=${process.env.ADMIN_ROLLOUT_STAGE_EFFECTIVE}).`
                      );
              env:
                  ADMIN_ROLLOUT_STAGE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.stage }}
                  ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.skip_runtime_smoke_fast }}
                  ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.allow_feature_api_failure_fast }}
                  ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.allow_missing_flag_fast }}

            - name: Disparar Post-Deploy Gate (Full Regression)
              if: ${{ env.FTP_DRY_RUN != 'true' && steps.resolve_postdeploy.outputs.run_gate == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: 'post-deploy-gate.yml',
                        ref: 'main',
                        inputs: {
                          domain: process.env.PROD_URL,
                          admin_rollout_stage: process.env.ADMIN_ROLLOUT_STAGE_EFFECTIVE,
                          admin_rollout_skip_runtime_smoke: process.env.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_GATE_EFFECTIVE,
                          admin_rollout_allow_feature_api_failure: process.env.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_GATE_EFFECTIVE,
                          admin_rollout_allow_missing_flag: process.env.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_GATE_EFFECTIVE
                        }
                      });

                      core.info(
                        `Workflow post-deploy-gate.yml disparado (domain=${process.env.PROD_URL}, stage=${process.env.ADMIN_ROLLOUT_STAGE_EFFECTIVE}).`
                      );
              env:
                  ADMIN_ROLLOUT_STAGE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.stage }}
                  ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_GATE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.skip_runtime_smoke_gate }}
                  ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_GATE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.allow_feature_api_failure_gate }}
                  ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_GATE_EFFECTIVE: ${{ steps.resolve_postdeploy.outputs.allow_missing_flag_gate }}

            - name: Resumen dispatch post-deploy
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  {
                    echo "## Deploy Hosting - Dispatch post-deploy"
                    echo "- Dominio prod: \`${PROD_URL}\`"
                    echo "- dispatch mode (effective): \`${{ steps.resolve_postdeploy.outputs.dispatch_mode }}\`"
                    echo "- run_postdeploy_fast (effective): \`${{ steps.resolve_postdeploy.outputs.run_fast }}\`"
                    echo "- run_postdeploy_gate (effective): \`${{ steps.resolve_postdeploy.outputs.run_gate }}\`"
                    echo "- admin rollout stage (effective): \`${{ steps.resolve_postdeploy.outputs.stage }}\`"
                    echo "- admin rollout stage profile (effective): \`${{ steps.resolve_postdeploy.outputs.stage_profile }}\`"
                    echo "- admin rollout skip runtime smoke fast (effective): \`${{ steps.resolve_postdeploy.outputs.skip_runtime_smoke_fast }}\`"
                    echo "- admin rollout policy source fast (effective): \`${{ steps.resolve_postdeploy.outputs.policy_source_fast }}\`"
                    echo "- admin rollout skip runtime smoke gate (effective): \`${{ steps.resolve_postdeploy.outputs.skip_runtime_smoke_gate }}\`"
                    echo "- admin rollout policy source gate (effective): \`${{ steps.resolve_postdeploy.outputs.policy_source_gate }}\`"
                    echo "- admin rollout precheck policy source (effective): \`${{ steps.resolve_postdeploy.outputs.precheck_policy_source }}\`"
                    echo "- admin rollout allow feature API failure precheck (effective): \`${{ steps.resolve_postdeploy.outputs.allow_feature_api_failure_precheck }}\`"
                    echo "- admin rollout allow missing flag precheck (effective): \`${{ steps.resolve_postdeploy.outputs.allow_missing_flag_precheck }}\`"
                    echo "- reporte admin rollout deploy-hosting: \`verification/last-admin-ui-rollout-gate-deploy-hosting.json\`"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Stamp public cutover start
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover
                  started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  echo "PUBLIC_CUTOVER_STARTED_AT=${started_at}" >> "$GITHUB_ENV"
                  echo "Public cutover started at ${started_at}"

            - name: Validate public routing ES/EN + redirects (Prod)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/check-public-routing-smoke.js --base-url "${PROD_URL}" --label "production" --output ".public-cutover/routing-smoke.json"

            - name: Validate public conversion hooks ES/EN (Prod)
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/check-public-conversion-smoke.js --base-url "${PROD_URL}" --label "production-conversion" --output ".public-cutover/conversion-smoke.json"

            - name: Write public cutover manifest
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/write-public-cutover-manifest.js \
                    --base-url "${PROD_URL}" \
                    --label "production-cutover" \
                    --out-dir ".public-cutover" \
                    --window-hours "${PUBLIC_CUTOVER_WINDOW_HOURS}" \
                    --started-at "${PUBLIC_CUTOVER_STARTED_AT}" \
                    --routing-report ".public-cutover/routing-smoke.json" \
                    --conversion-report ".public-cutover/conversion-smoke.json"

            - name: Upload public cutover evidence
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: public-cutover-evidence
                  path: .public-cutover/
                  if-no-files-found: warn
                  retention-days: 14

            - name: Persist public cutover monitor window
              if: ${{ env.FTP_DRY_RUN != 'true' && env.ENABLE_PUBLIC_CUTOVER_MONITOR == 'true' }}
              continue-on-error: true
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      let writeDenied = false;
                      const variables = [
                        {
                          name: 'PROD_MONITOR_ENABLE_PUBLIC_CUTOVER',
                          value: 'true'
                        },
                        {
                          name: 'PUBLIC_CUTOVER_STARTED_AT',
                          value: process.env.PUBLIC_CUTOVER_STARTED_AT
                        },
                        {
                          name: 'PUBLIC_CUTOVER_WINDOW_HOURS',
                          value: process.env.PUBLIC_CUTOVER_WINDOW_HOURS
                        }
                      ];

                      for (const variable of variables) {
                        try {
                          await github.rest.actions.getRepoVariable({
                            owner,
                            repo,
                            name: variable.name
                          });
                          await github.rest.actions.updateRepoVariable({
                            owner,
                            repo,
                            name: variable.name,
                            value: variable.value
                          });
                          core.info(`Updated repo variable ${variable.name}`);
                        } catch (error) {
                          if (error.status === 403) {
                            writeDenied = true;
                            core.warning(
                              'Skipping repository variable persistence: token lacks actions_variables=write permissions.'
                            );
                            break;
                          }
                          if (error.status !== 404) {
                            throw error;
                          }
                          await github.rest.actions.createRepoVariable({
                            owner,
                            repo,
                            name: variable.name,
                            value: variable.value
                          });
                          core.info(`Created repo variable ${variable.name}`);
                        }
                      }

                      if (writeDenied) {
                        core.notice('Public cutover monitor variables were not persisted. Deploy is still valid.');
                      }

            - name: Bootstrap prod-monitor post-cutover
              if: ${{ env.FTP_DRY_RUN != 'true' && env.ENABLE_PUBLIC_CUTOVER_MONITOR == 'true' && env.DISPATCH_PUBLIC_CUTOVER_MONITOR == 'true' }}
              continue-on-error: true
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      try {
                        await github.rest.actions.createWorkflowDispatch({
                          owner,
                          repo,
                          workflow_id: 'prod-monitor.yml',
                          ref,
                          inputs: {
                            domain: process.env.PROD_URL,
                            enable_public_cutover_monitor: 'true',
                            public_cutover_started_at: process.env.PUBLIC_CUTOVER_STARTED_AT,
                            public_cutover_window_hours: process.env.PUBLIC_CUTOVER_WINDOW_HOURS
                          }
                        });
                        core.info(`prod-monitor.yml dispatched for ref ${ref}`);
                      } catch (error) {
                        if (error.status === 403 || error.status === 404) {
                          core.warning(
                            `Skipping prod-monitor dispatch due to insufficient permissions or missing workflow (${error.status}).`
                          );
                          return;
                        }
                        throw error;
                      }

            - name: Production summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Production deploy";
                    echo "- approval_contract_dependency: \`deploy-canary + canary-staging-acceptance-evidence\`";
                    echo "- production_cutover_contract: \`routing_smoke + conversion_smoke + artifact:public-cutover-evidence\`";
                    echo "- require_staging_canary: \`${REQUIRE_STAGING_CANARY}\`";
                    echo "- allow_prod_without_staging: \`${ALLOW_PROD_WITHOUT_STAGING}\`";
                    echo "- needs.deploy-canary.result: \`${{ needs.deploy-canary.result }}\`";
                    echo "- enable_public_cutover_monitor: \`${ENABLE_PUBLIC_CUTOVER_MONITOR}\`";
                    echo "- dispatch_public_cutover_monitor: \`${DISPATCH_PUBLIC_CUTOVER_MONITOR}\`";
                    echo "- public_cutover_started_at: \`${PUBLIC_CUTOVER_STARTED_AT}\`";
                    echo "- public_cutover_window_hours: \`${PUBLIC_CUTOVER_WINDOW_HOURS}\`";
                    echo "- public_cutover_artifact: \`public-cutover-evidence\`";
                    echo "- public_cutover_repo_vars: \`PROD_MONITOR_ENABLE_PUBLIC_CUTOVER,PUBLIC_CUTOVER_STARTED_AT,PUBLIC_CUTOVER_WINDOW_HOURS\`";
                    echo "- dry_run: \`${FTP_DRY_RUN}\`";
                    echo "- Result: \`${{ job.status }}\`";
                  } >> "$GITHUB_STEP_SUMMARY"
