name: Deploy Hosting (Canary Pipeline)

on:
    workflow_run:
        workflows: ['CI']
        types:
            - completed
        branches:
            - main
    workflow_dispatch:
        inputs:
            force_transport_deploy:
                description: 'Forzar upload directo (FTP/FTPS/SFTP) aunque vars.DEPLOY_METHOD sea git-sync'
                required: false
                default: false
                type: boolean
            protocol:
                description: 'Protocolo de deploy'
                required: false
                default: 'ftps'
                type: choice
                options:
                    - ftps
                    - ftp
                    - sftp
            dry_run:
                description: 'Simular deploy sin subir archivos'
                required: false
                default: false
                type: boolean
            require_staging_canary:
                description: 'Exigir canary/staging exitoso antes de produccion'
                required: false
                default: true
                type: boolean
            allow_prod_without_staging:
                description: 'Permitir prod sin staging (solo emergencia)'
                required: false
                default: false
                type: boolean
            enable_public_cutover_monitor:
                description: 'Habilitar bootstrap de monitor post-cutover publico'
                required: false
                default: true
                type: boolean
            public_cutover_window_hours:
                description: 'Ventana de monitoreo post-cutover (horas)'
                required: false
                default: '72'
                type: string
            dispatch_public_cutover_monitor:
                description: 'Disparar prod-monitor inmediatamente tras deploy'
                required: false
                default: true
                type: boolean
            enable_public_v4_rollout_monitor:
                description: 'Habilitar gate de rollout publico V4 en prod-monitor post-deploy'
                required: false
                default: false
                type: boolean
            public_v4_rollout_stage:
                description: 'Etapa de rollout publico V4 (internal|canary|general|rollback)'
                required: false
                default: 'canary'
                type: string
            run_postdeploy_fast:
                description: 'Disparar post-deploy-fast al finalizar deploy'
                required: false
                default: true
                type: boolean
            run_postdeploy_gate:
                description: 'Disparar post-deploy-gate al finalizar deploy'
                required: false
                default: false
                type: boolean
            postdeploy_fast_wait_seconds:
                description: 'wait_seconds para post-deploy-fast (workflow_dispatch)'
                required: false
                default: '45'
                type: string
            skip_public_conversion_smoke:
                description: 'Omitir conversion smoke publico ES/EN en produccion (solo emergencia/backend)'
                required: false
                default: false
                type: boolean
            admin_rollout_stage:
                description: 'Etapa admin rollout a propagar (internal|canary|general|rollback)'
                required: false
                default: 'general'
                type: string
            admin_rollout_skip_runtime_smoke_fast:
                description: 'Omitir smoke runtime en post-deploy-fast'
                required: false
                default: true
                type: boolean
            admin_rollout_allow_feature_api_failure_fast:
                description: 'Permitir falla de features API en post-deploy-fast'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_missing_flag_fast:
                description: 'Permitir ausencia de admin_sony_ui en post-deploy-fast'
                required: false
                default: false
                type: boolean
            admin_rollout_require_openclaw_auth_fast:
                description: 'Exigir contrato OpenClaw en post-deploy-fast'
                required: false
                default: true
                type: boolean
            admin_rollout_require_openclaw_live_smoke_fast:
                description: 'Exigir smoke live OpenClaw en post-deploy-fast'
                required: false
                default: true
                type: boolean
            admin_rollout_skip_runtime_smoke_gate:
                description: 'Omitir smoke runtime en post-deploy-gate'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_feature_api_failure_gate:
                description: 'Permitir falla de features API en post-deploy-gate'
                required: false
                default: false
                type: boolean
            admin_rollout_allow_missing_flag_gate:
                description: 'Permitir ausencia de admin_sony_ui en post-deploy-gate'
                required: false
                default: false
                type: boolean
            admin_rollout_require_openclaw_auth_gate:
                description: 'Exigir contrato OpenClaw en post-deploy-gate'
                required: false
                default: true
                type: boolean
            admin_rollout_require_openclaw_live_smoke_gate:
                description: 'Exigir smoke live OpenClaw en post-deploy-gate'
                required: false
                default: true
                type: boolean

concurrency:
    group: deploy-pielarmonia-pipeline
    cancel-in-progress: false

permissions:
    contents: read
    actions: write
    issues: write

jobs:
    deploy-canary:
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        name: Deploy Canary (Staging)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            # Staging Configuration
            DEPLOY_PROTOCOL: ${{ github.event.inputs.protocol || vars.STAGING_FTP_PROTOCOL || 'ftps' }}
            FTP_SERVER_PORT: ${{ vars.STAGING_FTP_SERVER_PORT || '21' }}
            FTP_SECURITY: ${{ vars.STAGING_FTP_SECURITY || 'strict' }}
            FTP_SERVER_DIR: ${{ vars.STAGING_FTP_SERVER_DIR || '/staging/' }}
            FTP_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
            FTP_CLEAN_SLATE: ${{ vars.FTP_CLEAN_SLATE || 'false' }} # Careful with clean slate on staging if shared
            STAGING_URL: ${{ vars.STAGING_URL || 'https://staging.pielarmonia.com' }}
            REQUIRE_STAGING_CANARY: ${{ github.event.inputs.require_staging_canary || vars.REQUIRE_STAGING_CANARY || (github.event_name == 'workflow_dispatch' && 'true') || 'false' }}
            ALLOW_PROD_WITHOUT_STAGING: ${{ github.event.inputs.allow_prod_without_staging || vars.ALLOW_PROD_WITHOUT_STAGING || (github.event_name == 'workflow_run' && 'true') || 'false' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node Dependencies
              run: npm ci

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Install Dependencies
              run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

            - name: Detectar secretos de staging
              id: staging_secrets
              shell: bash
              run: |
                  set -euo pipefail
                  missing=0
                  if [ -z "${{ secrets.STAGING_FTP_SERVER }}" ]; then
                    echo "::warning::Falta el secret STAGING_FTP_SERVER"
                    missing=1
                  fi
                  if [ -z "${{ secrets.STAGING_FTP_USERNAME }}" ]; then
                    echo "::warning::Falta el secret STAGING_FTP_USERNAME"
                    missing=1
                  fi
                  if [ -z "${{ secrets.STAGING_FTP_PASSWORD }}" ]; then
                    echo "::warning::Falta el secret STAGING_FTP_PASSWORD"
                    missing=1
                  fi
                  if [ "${missing}" -eq 1 ]; then
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    echo "missing=true" >> "$GITHUB_OUTPUT"
                    echo "::warning::Staging canary no disponible por secretos STAGING_FTP_* faltantes."
                  else
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                    echo "missing=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Enforce staging canary gate policy
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${{ steps.staging_secrets.outputs.missing }}" != "true" ]; then
                    echo "Staging canary habilitado. Politica OK."
                    exit 0
                  fi

                  if [ "${FTP_DRY_RUN}" = "true" ]; then
                    echo "::notice::dry_run=true permite omitir staging efectivo."
                    exit 0
                  fi

                  require_staging="$(echo "${REQUIRE_STAGING_CANARY}" | tr '[:upper:]' '[:lower:]')"
                  allow_without_staging="$(echo "${ALLOW_PROD_WITHOUT_STAGING}" | tr '[:upper:]' '[:lower:]')"

                  if [ "${require_staging}" = "true" ] && [ "${allow_without_staging}" != "true" ]; then
                    echo "::error::Politica bloqueante: require_staging_canary=true y faltan secretos STAGING_FTP_*."
                    echo "::error::Configura staging o ejecuta override explicito allow_prod_without_staging=true."
                    exit 1
                  fi

                  if [ "${allow_without_staging}" = "true" ]; then
                    echo "::warning::Override activo: allow_prod_without_staging=true. Se permite continuar sin staging."
                  else
                    echo "::notice::require_staging_canary=false. Se permite continuar sin staging."
                  fi

            - name: Install Playwright (chromium) for staging acceptance gate
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              run: npx playwright install --with-deps chromium

            - name: Preflight red (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  HOST="${{ secrets.STAGING_FTP_SERVER }}"
                  PORT="${FTP_SERVER_PORT}"
                  echo "Testeando conectividad TCP a ${HOST}:${PORT} ..."
                  if timeout 8 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
                    echo "TCP OK en ${HOST}:${PORT}"
                  else
                    echo "::error::No se puede abrir ${HOST}:${PORT} desde GitHub Runner."
                    exit 1
                  fi

            - name: Preparar bundle canonico de deploy (Staging)
              id: prepare_bundle_staging
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  rm -rf _deploy_bundle
                  mkdir -p _deploy_bundle
                  node bin/prepare-deploy-bundle.js --include-tooling --output-dir _deploy_bundle --json > _deploy_bundle/deploy-bundle.json
                  stage_dir="$(node <<'NODE'
                  const fs = require('node:fs');
                  const path = require('node:path');
                  const bundle = JSON.parse(fs.readFileSync('_deploy_bundle/deploy-bundle.json', 'utf8'));
                  process.stdout.write(path.relative(process.cwd(), bundle.stageRoot).replace(/\\/g, '/'));
                  NODE
                  )"
                  echo "DEPLOY_STAGE_DIR=${stage_dir}" >> "$GITHUB_ENV"

            - name: Deploy a Staging (FTP/FTPS)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.DEPLOY_PROTOCOL != 'sftp' }}
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.STAGING_FTP_SERVER }}
                  username: ${{ secrets.STAGING_FTP_USERNAME }}
                  password: ${{ secrets.STAGING_FTP_PASSWORD }}
                  protocol: ${{ env.DEPLOY_PROTOCOL }}
                  port: ${{ env.FTP_SERVER_PORT }}
                  security: ${{ env.FTP_SECURITY }}
                  server-dir: ${{ env.FTP_SERVER_DIR }}
                  local-dir: ./${{ env.DEPLOY_STAGE_DIR }}/
                  dangerous-clean-slate: ${{ env.FTP_CLEAN_SLATE }}
                  dry-run: ${{ env.FTP_DRY_RUN }}
                  timeout: 120000
                  state-name: .ftp-deploy-sync-state-staging.json

            - name: Deploy a Staging (SFTP)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.DEPLOY_PROTOCOL == 'sftp' }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${FTP_DRY_RUN}" = "true" ]; then
                    echo "Dry-run SFTP habilitado: se omite subida real."
                    find "${DEPLOY_STAGE_DIR}" -maxdepth 2 -type f | head -n 30
                    exit 0
                  fi
                  sudo apt-get update
                  sudo apt-get install -y lftp
                  lftp -u "${{ secrets.STAGING_FTP_USERNAME }}","${{ secrets.STAGING_FTP_PASSWORD }}" "sftp://${{ secrets.STAGING_FTP_SERVER }}:${FTP_SERVER_PORT}" -e "
                    set sftp:auto-confirm yes
                    set net:max-retries 2
                    set net:timeout 20
                    mirror -R --delete --verbose ${DEPLOY_STAGE_DIR}/ ${FTP_SERVER_DIR}
                    bye
                  "

            - name: Smoke Tests (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Running smoke tests against ${STAGING_URL}..."
                  # Retry logic for health check
                  for i in {1..5}; do
                    if curl -fsS "${STAGING_URL}/api.php?resource=health" > /tmp/health_staging.json; then
                      echo "Health Check OK"
                      break
                    else
                      echo "Health Check failed, retrying in 5s..."
                      sleep 5
                    fi
                    if [ $i -eq 5 ]; then exit 1; fi
                  done

                  curl -fsS "${STAGING_URL}/figo-chat.php" > /tmp/figo_staging.json
                  curl -IfsS "${STAGING_URL}/" > /tmp/home_staging.txt
                  echo "Staging Verified."

            - name: Validate public routing ES/EN + redirects (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .staging-acceptance
                  node bin/check-public-routing-smoke.js --base-url "${STAGING_URL}" --label "staging-canary" --output ".staging-acceptance/routing-smoke.json"

            - name: Validate public conversion hooks ES/EN (Staging)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .staging-acceptance
                  node bin/check-public-conversion-smoke.js --base-url "${STAGING_URL}" --label "staging-canary-conversion" --output ".staging-acceptance/conversion-smoke.json"

            - name: Run staging acceptance gate (visual + funcional + performance)
              if: ${{ steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  node bin/run-staging-acceptance-gate.js --base-url "${STAGING_URL}" --label "staging-canary" --out-dir ".staging-acceptance"

            - name: Upload staging acceptance evidence
              if: ${{ always() && steps.staging_secrets.outputs.enabled == 'true' && env.FTP_DRY_RUN != 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: canary-staging-acceptance-evidence
                  path: .staging-acceptance/
                  if-no-files-found: warn
                  retention-days: 14

            - name: Omitir canary no configurado
              if: ${{ steps.staging_secrets.outputs.enabled != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Canary staging omitido: secretos STAGING_FTP_* no configurados o politica flexible."

            - name: Canary summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Canary gate";
                    echo "- approval_contract: \`routing_smoke + conversion_smoke + staging_acceptance_gate + artifact:canary-staging-acceptance-evidence\`";
                    echo "- require_staging_canary: \`${REQUIRE_STAGING_CANARY}\`";
                    echo "- allow_prod_without_staging: \`${ALLOW_PROD_WITHOUT_STAGING}\`";
                    echo "- staging_secrets_missing: \`${{ steps.staging_secrets.outputs.missing || 'unknown' }}\`";
                    echo "- staging_canary_enabled: \`${{ steps.staging_secrets.outputs.enabled || 'unknown' }}\`";
                    echo "- dry_run: \`${FTP_DRY_RUN}\`";
                    echo "- Result: \`${{ job.status }}\`";
                  } >> "$GITHUB_STEP_SUMMARY"

    deploy-prod:
        needs: deploy-canary
        name: Deploy Production
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            # Production Configuration
            DEPLOY_METHOD: ${{ vars.DEPLOY_METHOD || 'git-sync' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN: ${{ secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || secrets.CRON_SECRET || vars.CRON_SECRET || '' }}
            PIELARMONIA_CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET || secrets.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN || '' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_HEADER: ${{ vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_HEADER || 'Authorization' }}
            PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_PREFIX: ${{ vars.PIELARMONIA_DIAGNOSTICS_ACCESS_TOKEN_PREFIX || 'Bearer' }}
            FORCE_TRANSPORT_DEPLOY: ${{ github.event.inputs.force_transport_deploy || 'false' }}
            DEPLOY_PROTOCOL: ${{ github.event.inputs.protocol || vars.FTP_PROTOCOL || 'ftps' }}
            FTP_SERVER_PORT: ${{ vars.FTP_SERVER_PORT || '21' }}
            FTP_SECURITY: ${{ vars.FTP_SECURITY || 'strict' }}
            FTP_SERVER_DIR: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
            FTP_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
            FTP_CLEAN_SLATE: ${{ vars.FTP_CLEAN_SLATE || 'false' }}
            GIT_SYNC_WAIT_SEC: ${{ vars.GIT_SYNC_WAIT_SEC || '75' }}
            PROD_URL: ${{ vars.PROD_URL || 'https://pielarmonia.com' }}
            REQUIRE_STAGING_CANARY: ${{ github.event.inputs.require_staging_canary || vars.REQUIRE_STAGING_CANARY || (github.event_name == 'workflow_dispatch' && 'true') || 'false' }}
            ALLOW_PROD_WITHOUT_STAGING: ${{ github.event.inputs.allow_prod_without_staging || vars.ALLOW_PROD_WITHOUT_STAGING || (github.event_name == 'workflow_run' && 'true') || 'false' }}
            ENABLE_PUBLIC_CUTOVER_MONITOR: ${{ github.event.inputs.enable_public_cutover_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_CUTOVER || 'true' }}
            PUBLIC_CUTOVER_WINDOW_HOURS: ${{ github.event.inputs.public_cutover_window_hours || vars.PUBLIC_CUTOVER_WINDOW_HOURS || '72' }}
            DISPATCH_PUBLIC_CUTOVER_MONITOR: ${{ github.event.inputs.dispatch_public_cutover_monitor || 'true' }}
            ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_PROPAGATED: ${{ github.event.inputs.enable_public_v4_rollout_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_V4_ROLLOUT || 'false' }}
            PUBLIC_V4_ROLLOUT_STAGE_PROPAGATED: ${{ github.event.inputs.public_v4_rollout_stage || vars.PUBLIC_V4_ROLLOUT_STAGE || 'canary' }}
            PUBLIC_V4_ROLLOUT_SURFACE_TEST_PROPAGATED: ${{ vars.PUBLIC_V4_ROLLOUT_SURFACE_TEST || 'v4' }}
            PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_PROPAGATED: ${{ vars.PUBLIC_V4_ROLLOUT_SURFACE_CONTROL || 'legacy' }}
            PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_PROPAGATED: ${{ vars.PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING || '20' }}
            PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_PROPAGATED: ${{ vars.PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT || '10' }}
            PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_PROPAGATED: ${{ vars.PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP || '8' }}
            PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_PROPAGATED: ${{ vars.PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT || '20' }}
            PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_PROPAGATED: ${{ vars.PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL || 'false' }}
            PUBLIC_CUTOVER_STARTED_AT: ''
            DISPATCH_EVENT_NAME: ${{ github.event_name }}
            RUN_POSTDEPLOY_FAST_INPUT: ${{ github.event.inputs.run_postdeploy_fast || '' }}
            RUN_POSTDEPLOY_GATE_INPUT: ${{ github.event.inputs.run_postdeploy_gate || '' }}
            RUN_POSTDEPLOY_FAST_AUTOMATION: ${{ vars.RUN_POSTDEPLOY_FAST_FROM_DEPLOY_WORKFLOW_RUN || vars.RUN_POSTDEPLOY_FAST_FROM_DEPLOY || 'false' }}
            RUN_POSTDEPLOY_GATE_AUTOMATION: ${{ vars.RUN_POSTDEPLOY_GATE_FROM_DEPLOY_WORKFLOW_RUN || vars.RUN_POSTDEPLOY_GATE_FROM_DEPLOY || 'false' }}
            POSTDEPLOY_FAST_WAIT_SECONDS: ${{ github.event.inputs.postdeploy_fast_wait_seconds || vars.POSTDEPLOY_FAST_WAIT_SECONDS || '45' }}
            SKIP_PUBLIC_CONVERSION_SMOKE: ${{ github.event.inputs.skip_public_conversion_smoke || 'false' }}
            ADMIN_ROLLOUT_STAGE_PROPAGATED: ${{ github.event.inputs.admin_rollout_stage || vars.ADMIN_ROLLOUT_STAGE_DEPLOY_AUTOMATION || vars.ADMIN_ROLLOUT_STAGE || 'general' }}
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_skip_runtime_smoke_fast || vars.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST || 'true' }}
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_feature_api_failure_fast || vars.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST || 'false' }}
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_missing_flag_fast || vars.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST || 'false' }}
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_require_openclaw_auth_fast || vars.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST || '' }}
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_PROPAGATED: ${{ github.event.inputs.admin_rollout_require_openclaw_live_smoke_fast || vars.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST || '' }}
            ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_skip_runtime_smoke_gate || vars.ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE || 'false' }}
            ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_feature_api_failure_gate || vars.ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE || 'false' }}
            ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_allow_missing_flag_gate || vars.ADMIN_ROLLOUT_ALLOW_MISSING_FLAG || 'false' }}
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_require_openclaw_auth_gate || vars.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH || '' }}
            ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_GATE_PROPAGATED: ${{ github.event.inputs.admin_rollout_require_openclaw_live_smoke_gate || vars.ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE || '' }}
            TELEMEDICINE_DEPLOY_STATUS: unknown
            TELEMEDICINE_DEPLOY_REASON: not_evaluated
            TELEMEDICINE_DEPLOY_FAILURES: -1
            TELEMEDICINE_DEPLOY_NON_TELE_FAILURES: -1
            TURNERO_PILOT_DEPLOY_STATUS: unknown
            TURNERO_PILOT_DEPLOY_REASON: not_evaluated
            TURNERO_PILOT_CLINIC_ID: ''
            TURNERO_PILOT_MATCHING_PROFILE_ID: ''
            TURNERO_PILOT_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_CATALOG_READY: 'false'
            TURNERO_PILOT_RELEASE_MODE: unknown
            TURNERO_PILOT_REMOTE_STATUS: unknown
            TURNERO_PILOT_REMOTE_REASON: not_evaluated
            TURNERO_PILOT_REMOTE_CLINIC_ID: ''
            TURNERO_PILOT_REMOTE_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_REMOTE_CATALOG_READY: 'false'
            TURNERO_PILOT_REMOTE_DEPLOYED_COMMIT: ''
            TURNERO_PILOT_REMOTE_VERIFIED: 'false'
            TURNERO_PILOT_RECOVERY_TARGETS: none
            TURNERO_PILOT_POSTDEPLOY_ALLOWED: 'true'
            TRANSPORT_PREFLIGHT_REASON: not_evaluated
            TRANSPORT_PREFLIGHT_TARGET: not_evaluated
            CONNECTIVITY_DIAGNOSE_RUN_ID: ''
            CONNECTIVITY_DIAGNOSE_RUN_URL: ''
            CONNECTIVITY_DIAGNOSE_RUN_STATUS: not_requested
            CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION: ''

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install Node Dependencies
              run: npm ci

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2

            - name: Install Dependencies
              run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

            - name: Resolver clinic-profile del piloto web (deploy-hosting)
              id: turnero_pilot_profile
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover
                  status_path=".public-cutover/turnero-pilot-status.json"
                  status_raw_path=".public-cutover/turnero-pilot-status.raw.txt"
                  set +e
                  node bin/turnero-clinic-profile.js status --json > "${status_path}" 2> "${status_raw_path}"
                  status_exit=$?
                  set -e
                  export TURNERO_PILOT_STATUS_EXIT="${status_exit}"
                  export TURNERO_PILOT_STATUS_PATH="${status_path}"
                  export TURNERO_PILOT_STATUS_RAW_PATH="${status_raw_path}"
                  node <<'NODE'
                  const fs = require('node:fs');

                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;
                  const statusPath = process.env.TURNERO_PILOT_STATUS_PATH;
                  const statusRawPath = process.env.TURNERO_PILOT_STATUS_RAW_PATH;
                  const statusExit = Number.parseInt(process.env.TURNERO_PILOT_STATUS_EXIT || '1', 10);

                  let payload = null;
                  let rawStderr = '';
                  try {
                    rawStderr = fs.readFileSync(statusRawPath, 'utf8').trim();
                  } catch {}
                  try {
                    payload = JSON.parse(fs.readFileSync(statusPath, 'utf8'));
                  } catch {}

                  const releaseMode = String(payload?.profile?.release?.mode || '').trim();
                  const profileOk = payload?.ok === true;
                  const catalogReady = payload?.catalogReady === true;
                  const clinicId = String(payload?.profile?.clinic_id || '').trim();
                  const matchingProfileId = String(payload?.matchingProfileId || '').trim();
                  const profileFingerprint = String(payload?.profileFingerprint || '').trim();

                  const blocking = [];
                  if (statusExit !== 0 && !payload) {
                    blocking.push('status_command_failed');
                  }
                  if (!profileOk) {
                    blocking.push('profile_unresolved');
                  }
                  if (releaseMode === 'web_pilot' && !catalogReady) {
                    blocking.push('catalog_not_ready');
                  }

                  let status = 'ready';
                  let reason = 'ok';
                  if (releaseMode && releaseMode !== 'web_pilot') {
                    status = 'not_required';
                    reason = `release_mode:${releaseMode}`;
                  } else if (blocking.length > 0) {
                    status = 'blocked';
                    reason = blocking.join(';');
                  }
                  const recoveryTargets =
                    releaseMode === 'web_pilot'
                      ? [
                          '[ALERTA PROD] Deploy Hosting turneroPilot bloqueado',
                          '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado',
                        ]
                      : [];
                  const recoveryTargetsLabel =
                    recoveryTargets.length > 0 ? recoveryTargets.join('|') : 'none';
                  const snapshot = {
                    status,
                    reason,
                    clinic_id: clinicId,
                    matching_profile_id: matchingProfileId,
                    profile_fingerprint: profileFingerprint,
                    catalog_ready: catalogReady,
                    release_mode: releaseMode || 'unknown',
                    recovery_targets: recoveryTargets,
                    generated_at: new Date().toISOString(),
                    result: payload,
                    stderr: rawStderr || '',
                  };

                  fs.writeFileSync(statusPath, `${JSON.stringify(snapshot, null, 2)}\n`);

                  const envLines = [
                    `TURNERO_PILOT_DEPLOY_STATUS=${status}`,
                    `TURNERO_PILOT_DEPLOY_REASON=${reason}`,
                    `TURNERO_PILOT_CLINIC_ID=${clinicId}`,
                    `TURNERO_PILOT_MATCHING_PROFILE_ID=${matchingProfileId}`,
                    `TURNERO_PILOT_PROFILE_FINGERPRINT=${profileFingerprint}`,
                    `TURNERO_PILOT_CATALOG_READY=${catalogReady ? 'true' : 'false'}`,
                    `TURNERO_PILOT_RELEASE_MODE=${releaseMode || 'unknown'}`,
                    `TURNERO_PILOT_RECOVERY_TARGETS=${recoveryTargetsLabel}`,
                  ];

                  if (envPath) {
                    fs.appendFileSync(envPath, `${envLines.join('\n')}\n`);
                  }
                  if (outputPath) {
                    fs.appendFileSync(
                      outputPath,
                      [
                        `status=${status}`,
                        `reason=${reason}`,
                        `clinic_id=${clinicId}`,
                        `matching_profile_id=${matchingProfileId}`,
                        `profile_fingerprint=${profileFingerprint}`,
                        `catalog_ready=${catalogReady ? 'true' : 'false'}`,
                        `release_mode=${releaseMode || 'unknown'}`,
                        `recovery_targets=${recoveryTargetsLabel}`,
                      ].join('\n') + '\n'
                    );
                  }

                  if (blocking.length > 0) {
                    console.error(
                      `Turnero pilot deploy blocked (${reason}) clinic_id=${clinicId || 'unknown'} release_mode=${releaseMode || 'unknown'} stderr=${rawStderr || 'n/a'}`
                    );
                    process.exit(1);
                  }
                  NODE

            - name: Validar secretos requeridos (Prod)
              id: validate_secrets_prod
              if: ${{ env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync' }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${{ secrets.FTP_SERVER }}" ]; then
                    echo "::error::Falta el secret FTP_SERVER"
                    exit 1
                  fi
                  if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
                    echo "::error::Falta el secret FTP_USERNAME"
                    exit 1
                  fi
                  if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
                    echo "::error::Falta el secret FTP_PASSWORD"
                    exit 1
                  fi

            - name: Preflight red (Prod)
              id: preflight_prod
              if: ${{ env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync' }}
              shell: bash
              run: |
                  set -euo pipefail
                  HOST="${{ secrets.FTP_SERVER }}"
                  PORT="${FTP_SERVER_PORT}"
                  mkdir -p .public-cutover
                  echo "Testeando conectividad TCP a ${HOST}:${PORT} ..."
                  if timeout 8 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}" 2>/dev/null; then
                    echo "TRANSPORT_PREFLIGHT_REASON=ok" >> "$GITHUB_ENV"
                    node bin/write-transport-preflight.js \
                      --out ".public-cutover/transport-preflight.json" \
                      --reason "ok" \
                      --reachable "true" \
                      --turnero-clinic-id "${TURNERO_PILOT_CLINIC_ID}" \
                      --turnero-profile-fingerprint "${TURNERO_PILOT_PROFILE_FINGERPRINT}" \
                      --turnero-release-mode "${TURNERO_PILOT_RELEASE_MODE}" \
                      --turnero-recovery-targets "${TURNERO_PILOT_RECOVERY_TARGETS}"
                    echo "TCP OK en ${HOST}:${PORT}"
                  else
                    echo "TRANSPORT_PREFLIGHT_REASON=runner_tcp_unreachable" >> "$GITHUB_ENV"
                    node bin/write-transport-preflight.js \
                      --out ".public-cutover/transport-preflight.json" \
                      --reason "runner_tcp_unreachable" \
                      --reachable "false" \
                      --turnero-clinic-id "${TURNERO_PILOT_CLINIC_ID}" \
                      --turnero-profile-fingerprint "${TURNERO_PILOT_PROFILE_FINGERPRINT}" \
                      --turnero-release-mode "${TURNERO_PILOT_RELEASE_MODE}" \
                      --turnero-recovery-targets "${TURNERO_PILOT_RECOVERY_TARGETS}"
                    echo "::error::No se puede abrir ${HOST}:${PORT} desde GitHub Runner."
                    exit 1
                  fi

            - name: Hydrate transport preflight status
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              id: transport_preflight_status
              shell: bash
              env:
                  PREFLIGHT_OUTCOME: ${{ steps.preflight_prod.outcome }}
              run: |
                  set -euo pipefail
                  node <<'NODE'
                  const fs = require('node:fs');

                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;
                  const preflightOutcome = String(
                    process.env.PREFLIGHT_OUTCOME || ''
                  ).trim().toLowerCase();
                  const fallback = {
                    reason:
                      preflightOutcome === 'success'
                        ? 'ok'
                        : preflightOutcome === 'failure'
                          ? 'runner_tcp_unreachable'
                          : 'not_evaluated',
                    target: `${process.env.DEPLOY_PROTOCOL || ''}:${process.env.FTP_SERVER_PORT || ''}`,
                  };

                  let payload = fallback;
                  if (fs.existsSync('.public-cutover/transport-preflight.json')) {
                    try {
                      const parsed = JSON.parse(
                        fs.readFileSync('.public-cutover/transport-preflight.json', 'utf8')
                      );
                      payload = {
                        ...fallback,
                        ...parsed,
                      };
                    } catch (error) {
                      payload = {
                        ...fallback,
                        reason: `parse_error:${error && error.name ? error.name : 'unknown'}`,
                      };
                    }
                  }

                  const reason = String(payload.reason || fallback.reason);
                  const target = String(payload.target || fallback.target);

                  if (outputPath) {
                    fs.appendFileSync(
                      outputPath,
                      `transport_preflight_reason=${reason}\ntransport_preflight_target=${target}\n`
                    );
                  }
                  if (envPath) {
                    fs.appendFileSync(
                      envPath,
                      `TRANSPORT_PREFLIGHT_REASON=${reason}\nTRANSPORT_PREFLIGHT_TARGET=${target}\n`
                    );
                  }
                  NODE

            - name: Disparar diagnostico de conectividad desde deploy-hosting
              id: connectivity_diagnose_dispatch
              if: ${{ always() && env.FTP_DRY_RUN != 'true' && (env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync') && env.TRANSPORT_PREFLIGHT_REASON == 'runner_tcp_unreachable' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      const headSha =
                        context.payload.workflow_run?.head_sha ||
                        context.sha ||
                        '';
                      const workflowId = 'diagnose-host-connectivity.yml';
                      const dispatchStartedAt = Date.now();
                      const dispatchStartedAtIso = new Date(dispatchStartedAt).toISOString();

                      function wait(ms) {
                        return new Promise((resolve) => setTimeout(resolve, ms));
                      }

                      function parseTimestamp(value) {
                        const parsed = Date.parse(String(value || ''));
                        return Number.isFinite(parsed) ? parsed : NaN;
                      }

                      function selectBestDispatchedRun(runs, dispatchTimestamp) {
                        const dispatchStartedAtMs = parseTimestamp(dispatchTimestamp);
                        const fallbackLowerBoundMs = Date.now() - 15 * 60 * 1000;
                        const lowerBoundMs = Number.isFinite(dispatchStartedAtMs)
                          ? dispatchStartedAtMs - 15_000
                          : fallbackLowerBoundMs;
                        const upperBoundMs = Date.now() + 5_000;
                        const candidates = runs
                          .map((run) => {
                            const createdAtMs = Date.parse(run.created_at || '');
                            if (!Number.isFinite(createdAtMs)) {
                              return null;
                            }
                            if (createdAtMs < lowerBoundMs || createdAtMs > upperBoundMs) {
                              return null;
                            }
                            return {
                              run,
                              createdAtMs,
                              exactHeadSha: Boolean(headSha && run.head_sha && run.head_sha === headSha),
                              createdAfterDispatch: Number.isFinite(dispatchStartedAtMs)
                                ? createdAtMs >= dispatchStartedAtMs - 1_000
                                : true,
                              deltaMs: Number.isFinite(dispatchStartedAtMs)
                                ? Math.abs(createdAtMs - dispatchStartedAtMs)
                                : Math.abs(Date.now() - createdAtMs),
                            };
                          })
                          .filter(Boolean)
                          .sort((left, right) => {
                            if (left.exactHeadSha !== right.exactHeadSha) {
                              return left.exactHeadSha ? -1 : 1;
                            }
                            if (left.createdAfterDispatch !== right.createdAfterDispatch) {
                              return left.createdAfterDispatch ? -1 : 1;
                            }
                            if (left.deltaMs !== right.deltaMs) {
                              return left.deltaMs - right.deltaMs;
                            }
                            return left.createdAtMs - right.createdAtMs;
                          });
                        return candidates[0]?.run || null;
                      }

                      async function listRecentRuns() {
                        const response = await github.request(
                          'GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs',
                          {
                            owner,
                            repo,
                            workflow_id: workflowId,
                            branch: ref,
                            event: 'workflow_dispatch',
                            per_page: 20,
                          }
                        );
                        return Array.isArray(response.data?.workflow_runs)
                          ? response.data.workflow_runs
                          : [];
                      }

                      async function findDispatchedRun(dispatchTimestamp = dispatchStartedAtIso) {
                        const runs = await listRecentRuns();
                        return selectBestDispatchedRun(runs, dispatchTimestamp);
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        ref,
                        inputs: {
                          turnero_clinic_id: String(process.env.TURNERO_PILOT_CLINIC_ID || ''),
                          turnero_profile_fingerprint: String(
                            process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || ''
                          ),
                          turnero_release_mode: String(process.env.TURNERO_PILOT_RELEASE_MODE || ''),
                        },
                      });

                      let observedRun = null;
                      for (let attempt = 0; attempt < 6; attempt += 1) {
                        await wait(attempt === 0 ? 2000 : 4000);
                        observedRun = await findDispatchedRun();
                        if (observedRun) {
                          break;
                        }
                      }

                      core.setOutput(
                        'connectivity_diagnose_run_id',
                        observedRun ? String(observedRun.id) : ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_url',
                        observedRun?.html_url || ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_status',
                        observedRun?.status || 'dispatched_not_observed'
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_conclusion',
                        observedRun?.conclusion || ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_dispatched_at',
                        dispatchStartedAtIso
                      );

                      core.info(
                        observedRun
                          ? `Workflow ${workflowId} disparado desde deploy-hosting (run_id=${observedRun.id}, status=${observedRun.status}, match=${observedRun.head_sha === headSha ? 'head_sha' : 'dispatch_window'}, url=${observedRun.html_url}).`
                          : `Workflow ${workflowId} disparado desde deploy-hosting (run no observado aun).`
                      );

            - name: Hydrate connectivity diagnose status (deploy-hosting)
              if: ${{ always() && env.FTP_DRY_RUN != 'true' && (env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync') }}
              id: connectivity_diagnose_status
              uses: actions/github-script@v7
              env:
                  TRANSPORT_PREFLIGHT_REASON: ${{ env.TRANSPORT_PREFLIGHT_REASON }}
                  CONNECTIVITY_DIAGNOSE_RUN_ID_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_id }}
                  CONNECTIVITY_DIAGNOSE_RUN_URL_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_url }}
                  CONNECTIVITY_DIAGNOSE_RUN_STATUS_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_status }}
                  CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_conclusion }}
                  CONNECTIVITY_DIAGNOSE_DISPATCHED_AT_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_dispatched_at }}
              with:
                  script: |
                      const reason = String(process.env.TRANSPORT_PREFLIGHT_REASON || 'not_evaluated');
                      const shouldExpose = reason === 'runner_tcp_unreachable';
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const workflowId = 'diagnose-host-connectivity.yml';
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      const headSha =
                        context.payload.workflow_run?.head_sha ||
                        context.sha ||
                        '';

                      function normalizeRun(value) {
                        return String(value || '').trim();
                      }

                      function parseTimestamp(value) {
                        const parsed = Date.parse(normalizeRun(value));
                        return Number.isFinite(parsed) ? parsed : NaN;
                      }

                      function wait(ms) {
                        return new Promise((resolve) => setTimeout(resolve, ms));
                      }

                      function selectBestDispatchedRun(runs, dispatchTimestamp) {
                        const dispatchStartedAtMs = parseTimestamp(dispatchTimestamp);
                        const fallbackLowerBoundMs = Date.now() - 15 * 60 * 1000;
                        const lowerBoundMs = Number.isFinite(dispatchStartedAtMs)
                          ? dispatchStartedAtMs - 15_000
                          : fallbackLowerBoundMs;
                        const upperBoundMs = Date.now() + 5_000;
                        const candidates = runs
                          .map((run) => {
                            const createdAtMs = Date.parse(run.created_at || '');
                            if (!Number.isFinite(createdAtMs)) {
                              return null;
                            }
                            if (createdAtMs < lowerBoundMs || createdAtMs > upperBoundMs) {
                              return null;
                            }
                            return {
                              run,
                              createdAtMs,
                              exactHeadSha: Boolean(headSha && run.head_sha && run.head_sha === headSha),
                              createdAfterDispatch: Number.isFinite(dispatchStartedAtMs)
                                ? createdAtMs >= dispatchStartedAtMs - 1_000
                                : true,
                              deltaMs: Number.isFinite(dispatchStartedAtMs)
                                ? Math.abs(createdAtMs - dispatchStartedAtMs)
                                : Math.abs(Date.now() - createdAtMs),
                            };
                          })
                          .filter(Boolean)
                          .sort((left, right) => {
                            if (left.exactHeadSha !== right.exactHeadSha) {
                              return left.exactHeadSha ? -1 : 1;
                            }
                            if (left.createdAfterDispatch !== right.createdAfterDispatch) {
                              return left.createdAfterDispatch ? -1 : 1;
                            }
                            if (left.deltaMs !== right.deltaMs) {
                              return left.deltaMs - right.deltaMs;
                            }
                            return left.createdAtMs - right.createdAtMs;
                          });
                        return candidates[0]?.run || null;
                      }

                      async function listRecentRuns() {
                        const response = await github.request(
                          'GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs',
                          {
                            owner,
                            repo,
                            workflow_id: workflowId,
                            branch: ref,
                            event: 'workflow_dispatch',
                            per_page: 20,
                          }
                        );
                        return Array.isArray(response.data?.workflow_runs)
                          ? response.data.workflow_runs
                          : [];
                      }

                      function formatRecentRuns(runs) {
                        return runs
                          .slice(0, 3)
                          .map((run) =>
                            `run_id=${run.id || 'unknown'} created_at=${run.created_at || 'unknown'} status=${run.status || 'unknown'} head_sha=${run.head_sha || ''}`
                          )
                          .join(' | ');
                      }

                      async function findDispatchedRun(dispatchTimestamp = '') {
                        const runs = await listRecentRuns();
                        return {
                          observedRun: selectBestDispatchedRun(runs, dispatchTimestamp),
                          recentRuns: runs,
                        };
                      }

                      let runId = shouldExpose
                        ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_ID_INPUT)
                        : '';
                      let runUrl = shouldExpose
                        ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_URL_INPUT)
                        : '';
                      let runStatus = shouldExpose
                        ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_STATUS_INPUT) || 'dispatched_not_observed'
                        : 'not_requested';
                      let runConclusion = shouldExpose
                        ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION_INPUT)
                        : '';
                      const dispatchTimestamp = normalizeRun(
                        process.env.CONNECTIVITY_DIAGNOSE_DISPATCHED_AT_INPUT
                      );

                      if (shouldExpose && (!runId || runStatus === 'dispatched_not_observed')) {
                        let observedRun = null;
                        let recentRuns = [];
                        for (let attempt = 0; attempt < 12; attempt += 1) {
                          await wait(attempt === 0 ? 2000 : 5000);
                          const lookup = await findDispatchedRun(dispatchTimestamp);
                          observedRun = lookup.observedRun;
                          recentRuns = lookup.recentRuns;
                          if (observedRun) {
                            break;
                          }
                        }
                        if (observedRun) {
                          runId = String(observedRun.id || '');
                          runUrl = String(observedRun.html_url || '');
                          runStatus = String(observedRun.status || '') || runStatus;
                          runConclusion = String(observedRun.conclusion || '');
                          core.info(
                            `Hydrated late ${workflowId} run from deploy-hosting (run_id=${runId}, status=${runStatus}, match=${observedRun.head_sha === headSha ? 'head_sha' : 'dispatch_window'}, url=${runUrl}).`
                          );
                        } else {
                          const recentSnapshot = formatRecentRuns(recentRuns) || 'none';
                          core.info(
                            `Hydrate connectivity diagnose status (deploy-hosting) still unresolved after retry window (status=${runStatus}, recent_runs=${recentSnapshot}).`
                          );
                        }
                      }

                      core.setOutput('connectivity_diagnose_run_id', runId);
                      core.setOutput('connectivity_diagnose_run_url', runUrl);
                      core.setOutput('connectivity_diagnose_run_status', runStatus);
                      core.setOutput('connectivity_diagnose_run_conclusion', runConclusion);

                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_ID', runId);
                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_URL', runUrl);
                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_STATUS', runStatus);
                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION', runConclusion);

            - name: Crear/actualizar incidente de transporte deploy-hosting
              if: ${{ always() && env.FTP_DRY_RUN != 'true' && (env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync') && env.TRANSPORT_PREFLIGHT_REASON == 'runner_tcp_unreachable' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Hosting transporte bloqueado desde GitHub Runner';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `reason:${process.env.TRANSPORT_PREFLIGHT_REASON || 'unknown'}|target:${process.env.TRANSPORT_PREFLIGHT_TARGET || 'unknown'}|clinic:${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}|fp:${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}|release:${process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown'}`;
                      const signalMarker = `<!-- deploy-hosting-transport-signal:${signal} -->`;
                      const baseLabels = ['production-alert', 'deploy-hosting', 'transport-preflight', 'severity:warning'];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const incidentBody = [
                        'El workflow `Deploy Hosting (Canary Pipeline)` detecto que GitHub Runner no puede abrir el transporte hacia el host.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- transport_preflight_reason: ${process.env.TRANSPORT_PREFLIGHT_REASON || 'unknown'}`,
                        `- transport_preflight_target: ${process.env.TRANSPORT_PREFLIGHT_TARGET || 'unknown'}`,
                        `- turnero_pilot_clinic_id: ${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}`,
                        `- turnero_pilot_profile_fingerprint: ${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}`,
                        `- turnero_pilot_release_mode: ${process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown'}`,
                        `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`,
                        `- connectivity_diagnose_run_status: ${process.env.CONNECTIVITY_DIAGNOSE_RUN_STATUS || 'not_requested'}`,
                        `- connectivity_diagnose_run_url: ${process.env.CONNECTIVITY_DIAGNOSE_RUN_URL || ''}`,
                        `- prod_url: ${process.env.PROD_URL || 'https://pielarmonia.com'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue deploy-hosting transporte actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue deploy-hosting transporte ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente deploy-hosting transporte actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- transport_preflight_reason: ${process.env.TRANSPORT_PREFLIGHT_REASON || 'unknown'}`,
                            `- transport_preflight_target: ${process.env.TRANSPORT_PREFLIGHT_TARGET || 'unknown'}`,
                            `- turnero_pilot_clinic_id: ${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}`,
                            `- turnero_pilot_profile_fingerprint: ${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}`,
                            `- turnero_pilot_release_mode: ${process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown'}`,
                            `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`,
                            `- connectivity_diagnose_run_status: ${process.env.CONNECTIVITY_DIAGNOSE_RUN_STATUS || 'not_requested'}`,
                            `- connectivity_diagnose_run_url: ${process.env.CONNECTIVITY_DIAGNOSE_RUN_URL || ''}`
                          ].join('\n')
                        });
                        core.info(`Issue deploy-hosting transporte actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: incidentBody,
                          labels: baseLabels
                        });
                        core.info(`Issue deploy-hosting transporte creado: #${created.data.number}`);
                      }
              env:
                  TRANSPORT_PREFLIGHT_REASON: ${{ env.TRANSPORT_PREFLIGHT_REASON }}
                  TRANSPORT_PREFLIGHT_TARGET: ${{ env.TRANSPORT_PREFLIGHT_TARGET }}
                  TURNERO_PILOT_CLINIC_ID: ${{ env.TURNERO_PILOT_CLINIC_ID }}
                  TURNERO_PILOT_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_RELEASE_MODE: ${{ env.TURNERO_PILOT_RELEASE_MODE }}
                  TURNERO_PILOT_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_RECOVERY_TARGETS }}
                  CONNECTIVITY_DIAGNOSE_RUN_STATUS: ${{ steps.connectivity_diagnose_status.outputs.connectivity_diagnose_run_status }}
                  CONNECTIVITY_DIAGNOSE_RUN_URL: ${{ steps.connectivity_diagnose_status.outputs.connectivity_diagnose_run_url }}

            - name: Cerrar incidente de transporte deploy-hosting al recuperar
              if: ${{ always() && env.FTP_DRY_RUN != 'true' && (env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync') && env.TRANSPORT_PREFLIGHT_REASON == 'ok' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Deploy Hosting transporte bloqueado desde GitHub Runner';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente deploy-hosting transporte abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por preflight de transporte en deploy-hosting.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- transport_preflight_reason: ${process.env.TRANSPORT_PREFLIGHT_REASON || 'ok'}`,
                          `- transport_preflight_target: ${process.env.TRANSPORT_PREFLIGHT_TARGET || 'unknown'}`,
                          `- turnero_pilot_clinic_id: ${process.env.TURNERO_PILOT_CLINIC_ID || 'unknown'}`,
                          `- turnero_pilot_profile_fingerprint: ${process.env.TURNERO_PILOT_PROFILE_FINGERPRINT || 'unknown'}`,
                          `- turnero_pilot_release_mode: ${process.env.TURNERO_PILOT_RELEASE_MODE || 'unknown'}`,
                          `- turnero_pilot_recovery_targets: ${process.env.TURNERO_PILOT_RECOVERY_TARGETS || 'none'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue deploy-hosting transporte cerrado: #${existing.number}`);
              env:
                  TRANSPORT_PREFLIGHT_REASON: ${{ env.TRANSPORT_PREFLIGHT_REASON }}
                  TRANSPORT_PREFLIGHT_TARGET: ${{ env.TRANSPORT_PREFLIGHT_TARGET }}
                  TURNERO_PILOT_CLINIC_ID: ${{ env.TURNERO_PILOT_CLINIC_ID }}
                  TURNERO_PILOT_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_RELEASE_MODE: ${{ env.TURNERO_PILOT_RELEASE_MODE }}
                  TURNERO_PILOT_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_RECOVERY_TARGETS }}

            - name: Preparar bundle canonico de deploy (Prod)
              id: prepare_bundle_prod
              if: ${{ env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync' }}
              shell: bash
              run: |
                  set -euo pipefail
                  rm -rf _deploy_bundle
                  mkdir -p _deploy_bundle
                  node bin/prepare-deploy-bundle.js --include-tooling --output-dir _deploy_bundle --json > _deploy_bundle/deploy-bundle.json
                  stage_dir="$(node <<'NODE'
                  const fs = require('node:fs');
                  const path = require('node:path');
                  const bundle = JSON.parse(fs.readFileSync('_deploy_bundle/deploy-bundle.json', 'utf8'));
                  process.stdout.write(path.relative(process.cwd(), bundle.stageRoot).replace(/\\/g, '/'));
                  NODE
                  )"
                  echo "DEPLOY_STAGE_DIR=${stage_dir}" >> "$GITHUB_ENV"

            - name: Deploy a Produccion (FTP/FTPS)
              id: deploy_prod_ftp
              if: ${{ (env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync') && env.DEPLOY_PROTOCOL != 'sftp' }}
              uses: SamKirkland/FTP-Deploy-Action@v4.3.6
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ${{ env.DEPLOY_PROTOCOL }}
                  port: ${{ env.FTP_SERVER_PORT }}
                  security: ${{ env.FTP_SECURITY }}
                  server-dir: ${{ env.FTP_SERVER_DIR }}
                  local-dir: ./${{ env.DEPLOY_STAGE_DIR }}/
                  dangerous-clean-slate: ${{ env.FTP_CLEAN_SLATE }}
                  dry-run: ${{ env.FTP_DRY_RUN }}
                  timeout: 120000
                  state-name: .ftp-deploy-sync-state.json

            - name: Deploy a Produccion (SFTP)
              id: deploy_prod_sftp
              if: ${{ (env.FORCE_TRANSPORT_DEPLOY == 'true' || env.DEPLOY_METHOD != 'git-sync') && env.DEPLOY_PROTOCOL == 'sftp' }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${FTP_DRY_RUN}" = "true" ]; then
                    echo "Dry-run SFTP habilitado: se omite subida real."
                    find "${DEPLOY_STAGE_DIR}" -maxdepth 2 -type f | head -n 30
                    exit 0
                  fi
                  sudo apt-get update
                  sudo apt-get install -y lftp
                  lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "sftp://${{ secrets.FTP_SERVER }}:${FTP_SERVER_PORT}" -e "
                    set sftp:auto-confirm yes
                    set net:max-retries 2
                    set net:timeout 20
                    mirror -R --delete --verbose ${DEPLOY_STAGE_DIR}/ ${FTP_SERVER_DIR}
                    bye
                  "

            - name: Esperar sincronizacion Git del hosting (modo git-sync)
              id: wait_git_sync
              if: ${{ env.FORCE_TRANSPORT_DEPLOY != 'true' && env.DEPLOY_METHOD == 'git-sync' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Modo deploy git-sync activo. Esperando ${GIT_SYNC_WAIT_SEC}s para sincronizacion remota."
                  sleep "${GIT_SYNC_WAIT_SEC}"

            - name: Manual fallback notes for git-sync
              if: ${{ always() && env.FORCE_TRANSPORT_DEPLOY != 'true' && env.DEPLOY_METHOD == 'git-sync' && env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  {
                    echo "## Manual fallback";
                    echo "- Si el host sigue sin publicar \`/es/\` o \`/en/\`, ejecutar en el VPS: \`bash ./bin/deploy-public-v3-live.sh\`";
                    echo "- El script valida outputs generados desde \`.generated/site-root/\` (o copias root de compatibilidad), luego ejecuta \`/usr/sbin/nginx -t\` y recarga Nginx.";
                    echo "- Tambien corrige redirects canonicos para evitar \`:8080\` detras de Cloudflare.";
                    echo "- Compat temporal: \`deploy-public-v2-live.sh\` existe como shim y delega a V3.";
                    echo "- Override manual disponible: \`force_transport_deploy=true\` para subir bundle directo por \`${DEPLOY_PROTOCOL}\` sin esperar git-sync.";
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Smoke Tests (Prod)
              id: smoke_prod
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Running smoke tests against ${PROD_URL}..."
                  curl -fsS "${PROD_URL}/api.php?resource=health" > /tmp/health.json
                  curl -fsS "${PROD_URL}/figo-chat.php" > /tmp/figo.json
                  curl -IfsS "${PROD_URL}/" > /tmp/home_headers.txt
                  echo "Production Verified."

            - name: Evaluar estado telemedicina deploy-hosting
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              id: telemedicine_deploy
              shell: bash
              env:
                  HEALTH_FILE: /tmp/health.json
                  VALIDATE_SECRETS_OUTCOME: ${{ steps.validate_secrets_prod.outcome }}
                  PREFLIGHT_OUTCOME: ${{ steps.preflight_prod.outcome }}
                  PREPARE_BUNDLE_OUTCOME: ${{ steps.prepare_bundle_prod.outcome }}
                  DEPLOY_FTP_OUTCOME: ${{ steps.deploy_prod_ftp.outcome }}
                  DEPLOY_SFTP_OUTCOME: ${{ steps.deploy_prod_sftp.outcome }}
                  WAIT_GIT_SYNC_OUTCOME: ${{ steps.wait_git_sync.outcome }}
                  SMOKE_PROD_OUTCOME: ${{ steps.smoke_prod.outcome }}
              run: |
                  set -euo pipefail
                  if [ ! -s "${HEALTH_FILE}" ]; then
                    if ! curl -fsS "${PROD_URL}/api.php?resource=health" > "${HEALTH_FILE}"; then
                      echo "No se pudo refrescar health; se reporta estado telemedicina unknown."
                    fi
                  fi
                  node <<'NODE'
                  const fs = require('node:fs');

                  const healthPath = process.env.HEALTH_FILE || '/tmp/health.json';
                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function countNonTeleFailures(outcomes) {
                    return outcomes.reduce((count, value) => {
                      if (!value) return count;
                      const normalized = String(value).trim().toLowerCase();
                      if (!normalized || normalized === 'success' || normalized === 'skipped' || normalized === 'n/a') {
                        return count;
                      }
                      return count + 1;
                    }, 0);
                  }

                  function publish(snapshot) {
                    append(outputPath, 'telemedicine_status', snapshot.status);
                    append(outputPath, 'telemedicine_reason', snapshot.reason);
                    append(outputPath, 'telemedicine_failures', snapshot.failures);
                    append(outputPath, 'telemedicine_non_tele_failures', snapshot.nonTeleFailures);
                    append(outputPath, 'telemedicine_configured', snapshot.configured);
                    append(outputPath, 'telemedicine_diagnostics_status', snapshot.diagnosticsStatus);
                    append(outputPath, 'telemedicine_hard_failures', snapshot.hardFailures);

                    append(envPath, 'TELEMEDICINE_DEPLOY_STATUS', snapshot.status);
                    append(envPath, 'TELEMEDICINE_DEPLOY_REASON', snapshot.reason);
                    append(envPath, 'TELEMEDICINE_DEPLOY_FAILURES', snapshot.failures);
                    append(
                      envPath,
                      'TELEMEDICINE_DEPLOY_NON_TELE_FAILURES',
                      snapshot.nonTeleFailures
                    );
                  }

                  const fallback = {
                    status: 'unknown',
                    reason: 'health_unavailable',
                    failures: '-1',
                    nonTeleFailures: String(
                      countNonTeleFailures([
                        process.env.VALIDATE_SECRETS_OUTCOME,
                        process.env.PREFLIGHT_OUTCOME,
                        process.env.PREPARE_BUNDLE_OUTCOME,
                        process.env.DEPLOY_FTP_OUTCOME,
                        process.env.DEPLOY_SFTP_OUTCOME,
                        process.env.WAIT_GIT_SYNC_OUTCOME,
                        process.env.SMOKE_PROD_OUTCOME,
                      ])
                    ),
                    configured: 'false',
                    diagnosticsStatus: 'unknown',
                    hardFailures: '-1',
                  };

                  try {
                    if (!fs.existsSync(healthPath)) {
                      publish(fallback);
                      process.exit(0);
                    }

                    const raw = fs.readFileSync(healthPath, 'utf8');
                    const parsed = JSON.parse(raw);
                    const telemedicine = parsed?.checks?.telemedicine;
                    if (!telemedicine || typeof telemedicine !== 'object') {
                      publish({ ...fallback, reason: 'telemedicine_missing' });
                      process.exit(0);
                    }

                    const configured = telemedicine?.configured === true;
                    const diagnosticsStatus = String(
                      telemedicine?.diagnostics?.status || 'unknown'
                    );
                    const hardFailuresRaw = Number(telemedicine?.integrity?.hardFailures ?? 0);
                    const hardFailures = Number.isFinite(hardFailuresRaw)
                      ? Math.max(0, Math.trunc(hardFailuresRaw))
                      : -1;

                    const reasons = [];
                    let failures = 0;
                    if (!configured) {
                      reasons.push('not_configured');
                      failures += 1;
                    }
                    if (diagnosticsStatus === 'critical') {
                      reasons.push('diagnostics_critical');
                      failures += 1;
                    }
                    if (hardFailures < 0) {
                      reasons.push('hard_failures_invalid');
                      failures += 1;
                    } else if (hardFailures > 0) {
                      reasons.push(`hard_failures:${hardFailures}`);
                      failures += hardFailures;
                    }

                    const degraded = reasons.length > 0;
                    const status = degraded ? 'degraded' : 'healthy';
                    const reason = degraded ? reasons.join(';') : 'ok';
                    publish({
                      status,
                      reason,
                      failures: String(failures),
                      nonTeleFailures: String(
                        countNonTeleFailures([
                          process.env.VALIDATE_SECRETS_OUTCOME,
                          process.env.PREFLIGHT_OUTCOME,
                          process.env.PREPARE_BUNDLE_OUTCOME,
                          process.env.DEPLOY_FTP_OUTCOME,
                          process.env.DEPLOY_SFTP_OUTCOME,
                          process.env.WAIT_GIT_SYNC_OUTCOME,
                          process.env.SMOKE_PROD_OUTCOME,
                        ])
                      ),
                      configured: configured ? 'true' : 'false',
                      diagnosticsStatus,
                      hardFailures: String(hardFailures),
                    });
                  } catch (error) {
                    publish({
                      ...fallback,
                      reason: `health_parse_error:${error && error.name ? error.name : 'unknown'}`,
                    });
                  }
                  NODE

            - name: Verificar turneroPilot remoto deploy-hosting
              if: ${{ always() && env.FTP_DRY_RUN != 'true' }}
              id: turnero_pilot_remote
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover
                  remote_path=".public-cutover/turnero-pilot-remote.json"
                  raw_path=".public-cutover/turnero-pilot-remote.raw.txt"
                  : > "${raw_path}"
                  verify_exit=0
                  if [ "${TURNERO_PILOT_RELEASE_MODE}" = "web_pilot" ]; then
                    set +e
                    node bin/turnero-clinic-profile.js verify-remote --base-url "${PROD_URL}" --json > "${remote_path}" 2> "${raw_path}"
                    verify_exit=$?
                    set -e
                  fi

                  node bin/write-turnero-pilot-remote-status.js \
                    --remote-path "${remote_path}" \
                    --raw-path "${raw_path}" \
                    --verify-exit "${verify_exit}"

            - name: Resolver parametros de dispatch post-deploy
              if: ${{ env.FTP_DRY_RUN != 'true' }}
              id: resolve_postdeploy
              shell: bash
              run: |
                  set -euo pipefail

                  normalize_bool() {
                    local raw="${1:-}"
                    local normalized
                    normalized="$(echo "$raw" | tr '[:upper:]' '[:lower:]' | xargs)"
                    case "$normalized" in
                      1|true|yes|on) echo "true" ;;
                      0|false|no|off|"") echo "false" ;;
                      *) echo "false" ;;
                    esac
                  }

                  json_field() {
                    local json="${1:?json requerido}"
                    local field="${2:?field requerido}"
                    node -e '
                      const payload = JSON.parse(process.argv[1]);
                      const value = payload[process.argv[2]];
                      if (typeof value === "boolean") {
                        process.stdout.write(value ? "true" : "false");
                        process.exit(0);
                      }
                      if (value === undefined || value === null) {
                        process.stdout.write("");
                        process.exit(0);
                      }
                      process.stdout.write(String(value));
                    ' "$json" "$field"
                  }

                  dispatch_mode="automation"
                  if [ "${DISPATCH_EVENT_NAME}" = "workflow_dispatch" ]; then
                    dispatch_mode="manual"
                    run_fast="$(normalize_bool "${RUN_POSTDEPLOY_FAST_INPUT}")"
                    run_gate="$(normalize_bool "${RUN_POSTDEPLOY_GATE_INPUT}")"
                  else
                    run_fast="$(normalize_bool "${RUN_POSTDEPLOY_FAST_AUTOMATION}")"
                    run_gate="$(normalize_bool "${RUN_POSTDEPLOY_GATE_AUTOMATION}")"
                  fi

                  base_policy_json="$(node ./bin/resolve-admin-rollout-policy.js \
                    --stage "${ADMIN_ROLLOUT_STAGE_PROPAGATED}" \
                    --default-stage general \
                    --skip-runtime-smoke false \
                    --default-skip-runtime-smoke false \
                    --require-openclaw-auth "" \
                    --default-require-openclaw-auth "" \
                    --require-openclaw-live-smoke "" \
                    --default-require-openclaw-live-smoke "" \
                    --allow-feature-api-failure false \
                    --default-allow-feature-api-failure false \
                    --allow-missing-flag false \
                    --default-allow-missing-flag false)"

                  fast_policy_json="$(node ./bin/resolve-admin-rollout-policy.js \
                    --stage "${ADMIN_ROLLOUT_STAGE_PROPAGATED}" \
                    --default-stage general \
                    --skip-runtime-smoke "${ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_FAST_PROPAGATED}" \
                    --default-skip-runtime-smoke true \
                    --require-openclaw-auth "${ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_FAST_PROPAGATED}" \
                    --default-require-openclaw-auth "" \
                    --require-openclaw-live-smoke "${ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_FAST_PROPAGATED}" \
                    --default-require-openclaw-live-smoke "" \
                    --allow-feature-api-failure "${ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_FAST_PROPAGATED}" \
                    --default-allow-feature-api-failure false \
                    --allow-missing-flag "${ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_FAST_PROPAGATED}" \
                    --default-allow-missing-flag false)"

                  gate_policy_json="$(node ./bin/resolve-admin-rollout-policy.js \
                    --stage "${ADMIN_ROLLOUT_STAGE_PROPAGATED}" \
                    --default-stage general \
                    --skip-runtime-smoke "${ADMIN_ROLLOUT_SKIP_RUNTIME_SMOKE_GATE_PROPAGATED}" \
                    --default-skip-runtime-smoke false \
                    --require-openclaw-auth "${ADMIN_ROLLOUT_REQUIRE_OPENCLAW_AUTH_GATE_PROPAGATED}" \
                    --default-require-openclaw-auth "" \
                    --require-openclaw-live-smoke "${ADMIN_ROLLOUT_REQUIRE_OPENCLAW_LIVE_SMOKE_GATE_PROPAGATED}" \
                    --default-require-openclaw-live-smoke "" \
                    --allow-feature-api-failure "${ADMIN_ROLLOUT_ALLOW_FEATURE_API_FAILURE_GATE_PROPAGATED}" \
                    --default-allow-feature-api-failure false \
                    --allow-missing-flag "${ADMIN_ROLLOUT_ALLOW_MISSING_FLAG_GATE_PROPAGATED}" \
                    --default-allow-missing-flag false)"

                  stage="$(json_field "$base_policy_json" stage_effective)"
                  stage_profile="$(json_field "$base_policy_json" stage_profile)"
                  policy_source_base="$(json_field "$base_policy_json" policy_source)"

                  skip_runtime_smoke_fast="$(json_field "$fast_policy_json" skip_runtime_smoke_effective)"
                  require_openclaw_auth_fast="$(json_field "$fast_policy_json" require_openclaw_auth_effective)"
                  require_openclaw_live_smoke_fast="$(json_field "$fast_policy_json" require_openclaw_live_smoke_effective)"
                  allow_feature_api_failure_fast="$(json_field "$fast_policy_json" allow_feature_api_failure_effective)"
                  allow_missing_flag_fast="$(json_field "$fast_policy_json" allow_missing_flag_effective)"
                  policy_source_fast="$(json_field "$fast_policy_json" policy_source)"

                  skip_runtime_smoke_gate="$(json_field "$gate_policy_json" skip_runtime_smoke_effective)"
                  require_openclaw_auth_gate="$(json_field "$gate_policy_json" require_openclaw_auth_effective)"
                  require_openclaw_live_smoke_gate="$(json_field "$gate_policy_json" require_openclaw_live_smoke_effective)"
                  allow_feature_api_failure_gate="$(json_field "$gate_policy_json" allow_feature_api_failure_effective)"
                  allow_missing_flag_gate="$(json_field "$gate_policy_json" allow_missing_flag_effective)"
                  policy_source_gate="$(json_field "$gate_policy_json" policy_source)"

                  public_v4_policy_json="$(node ./bin/resolve-public-v4-rollout-policy.js \
                    --stage "${PUBLIC_V4_ROLLOUT_STAGE_PROPAGATED}" \
                    --default-stage canary \
                    --enable-monitor "${ENABLE_PUBLIC_V4_ROLLOUT_MONITOR_PROPAGATED}" \
                    --surface-test "${PUBLIC_V4_ROLLOUT_SURFACE_TEST_PROPAGATED}" \
                    --surface-control "${PUBLIC_V4_ROLLOUT_SURFACE_CONTROL_PROPAGATED}" \
                    --min-view-booking "${PUBLIC_V4_ROLLOUT_MIN_VIEW_BOOKING_PROPAGATED}" \
                    --min-start-checkout "${PUBLIC_V4_ROLLOUT_MIN_START_CHECKOUT_PROPAGATED}" \
                    --max-confirmed-drop-pp "${PUBLIC_V4_ROLLOUT_MAX_CONFIRMED_DROP_PP_PROPAGATED}" \
                    --min-confirmed-rate-pct "${PUBLIC_V4_ROLLOUT_MIN_CONFIRMED_RATE_PCT_PROPAGATED}" \
                    --allow-missing-control "${PUBLIC_V4_ROLLOUT_ALLOW_MISSING_CONTROL_PROPAGATED}")"

                  public_v4_enable_monitor="$(json_field "$public_v4_policy_json" enable_monitor_effective)"
                  public_v4_stage="$(json_field "$public_v4_policy_json" stage_effective)"
                  public_v4_stage_profile="$(json_field "$public_v4_policy_json" stage_profile)"
                  public_v4_policy_source="$(json_field "$public_v4_policy_json" policy_source)"
                  public_v4_surface_test="$(json_field "$public_v4_policy_json" surface_test_effective)"
                  public_v4_surface_control="$(json_field "$public_v4_policy_json" surface_control_effective)"
