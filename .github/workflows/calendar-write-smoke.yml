name: Calendar Write Smoke

on:
    schedule:
        # Diario 09:10 America/Guayaquil (14:10 UTC)
        - cron: '10 14 * * *'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            enable_write:
                description: 'Confirmar escritura real (crea/reprograma/cancela cita de prueba)'
                required: false
                default: false
                type: boolean

permissions:
    contents: read
    issues: write

jobs:
    calendar-write-smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            TEST_BASE_URL: ${{ github.event_name == 'schedule' && 'https://pielarmonia.com' || github.event.inputs.domain || 'https://pielarmonia.com' }}
            TEST_ENABLE_CALENDAR_WRITE: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.enable_write || 'false' }}
            TEST_REQUIRE_GOOGLE_CALENDAR: 'true'
            TEST_ADMIN_PASSWORD: ${{ secrets.PIELARMONIA_ADMIN_PASSWORD }}
            TELEMEDICINE_CALENDAR_STATUS: unknown
            TELEMEDICINE_CALENDAR_REASON: not_evaluated
            TELEMEDICINE_CALENDAR_FAILURES: '0'
            TELEMEDICINE_CALENDAR_NON_TELE_FAILURES: '0'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Validar habilitacion explicita
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
                    echo "Scheduled run: enable_write=true por politica."
                    exit 0
                  fi
                  if [ "${TEST_ENABLE_CALENDAR_WRITE}" != "true" ]; then
                    echo "::error::Debes ejecutar con enable_write=true para permitir escritura real."
                    exit 1
                  fi

            - name: Validar secret admin
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${TEST_ADMIN_PASSWORD}" ]; then
                    echo "::error::Falta el secret PIELARMONIA_ADMIN_PASSWORD."
                    exit 1
                  fi

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Instalar dependencias
              run: npm ci

            - name: Instalar Playwright (chromium)
              run: npx playwright install --with-deps chromium

            - name: Preflight calendar health
              id: health
              uses: actions/github-script@v7
              with:
                  script: |
                      const baseUrl = String(process.env.TEST_BASE_URL || 'https://pielarmonia.com').replace(/\/$/, '');
                      const requireGoogle =
                        String(process.env.TEST_REQUIRE_GOOGLE_CALENDAR || 'false').toLowerCase() === 'true';

                      core.setOutput('telemedicine_health', 'unknown');
                      core.setOutput('telemedicine_reason', 'not_evaluated');
                      core.setOutput('telemedicine_configured', 'false');
                      core.setOutput('telemedicine_diagnostics_status', 'unknown');
                      core.setOutput('telemedicine_hard_failures', '0');

                      let response;
                      let body = null;
                      try {
                        response = await fetch(`${baseUrl}/api.php?resource=health`, {
                          headers: { accept: 'application/json' }
                        });
                      } catch (error) {
                        core.setOutput('http_status', 'network_error');
                        core.setOutput('calendar_source', 'n/a');
                        core.setOutput('calendar_mode', 'n/a');
                        core.setOutput('calendar_reachable', 'false');
                        core.setOutput('calendar_configured', 'false');
                        core.setOutput('calendar_auth', 'n/a');
                        core.setFailed(`Health request fallo: ${error.message}`);
                        return;
                      }

                      core.setOutput('http_status', String(response.status));
                      if (response.ok) {
                        try {
                          body = await response.json();
                        } catch (error) {
                          core.setFailed(`Health JSON invalido: ${error.message}`);
                          return;
                        }
                      } else {
                        core.setFailed(`Health endpoint HTTP ${response.status}`);
                        return;
                      }

                      const calendarSource = String(body?.calendarSource || 'n/a');
                      const calendarMode = String(body?.calendarMode || 'n/a');
                      const calendarReachable = body?.calendarReachable === true;
                      const calendarConfigured = body?.calendarConfigured === true;
                      const calendarAuth = String(body?.calendarAuth || 'n/a');

                      core.setOutput('calendar_source', calendarSource);
                      core.setOutput('calendar_mode', calendarMode);
                      core.setOutput('calendar_reachable', String(calendarReachable));
                      core.setOutput('calendar_configured', String(calendarConfigured));
                      core.setOutput('calendar_auth', calendarAuth);

                      const telemedicine = body?.checks?.telemedicine ?? null;
                      let telemedicineHealth = 'unknown';
                      let telemedicineReason = 'telemedicine_missing';
                      let telemedicineConfigured = false;
                      let telemedicineDiagnosticsStatus = 'unknown';
                      let telemedicineHardFailures = 0;

                      if (telemedicine && typeof telemedicine === 'object') {
                        telemedicineConfigured = telemedicine.configured === true;
                        telemedicineDiagnosticsStatus = String(telemedicine?.diagnostics?.status || 'unknown');
                        telemedicineHardFailures = Number(telemedicine?.integrity?.hardFailures || 0);

                        const teleReasons = [];
                        if (!telemedicineConfigured) {
                          teleReasons.push('unconfigured');
                        }
                        if (telemedicineDiagnosticsStatus === 'critical') {
                          teleReasons.push('diagnostics_critical');
                        }
                        if (telemedicineHardFailures > 0) {
                          teleReasons.push(`hard_failures:${telemedicineHardFailures}`);
                        }

                        if (teleReasons.length === 0) {
                          telemedicineHealth = 'healthy';
                          telemedicineReason = 'ok';
                        } else {
                          telemedicineHealth = 'degraded';
                          telemedicineReason = teleReasons.join(';');
                        }
                      }

                      core.setOutput('telemedicine_health', telemedicineHealth);
                      core.setOutput('telemedicine_reason', telemedicineReason);
                      core.setOutput('telemedicine_configured', String(telemedicineConfigured));
                      core.setOutput(
                        'telemedicine_diagnostics_status',
                        telemedicineDiagnosticsStatus
                      );
                      core.setOutput(
                        'telemedicine_hard_failures',
                        String(telemedicineHardFailures)
                      );

                      if (requireGoogle && calendarSource !== 'google') {
                        core.setFailed(
                          `Calendar source invalido para write smoke: esperado google, recibido ${calendarSource}`
                        );
                        return;
                      }

                      if (requireGoogle && !calendarConfigured) {
                        core.setFailed('Calendar no configurado para write smoke en modo google');
                        return;
                      }

                      if (requireGoogle && !calendarReachable) {
                        core.setFailed('Calendar unreachable en preflight');
                        return;
                      }

                      if (requireGoogle && calendarMode !== 'live') {
                        core.setFailed(`Calendar mode no-live (${calendarMode}) durante write smoke`);
                        return;
                      }

            - name: Verificar contrato de agenda real (read-only)
              id: contract_test
              run: npm run test:calendar-contract

            - name: Ejecutar smoke write calendar
              id: write_test
              run: npm run test:calendar-write

            - name: Ejecutar smoke API write calendar
              id: api_write_test
              run: >
                  npm run test:calendar-write:api --
                  --base-url="${TEST_BASE_URL}"
                  --service=laser
                  --require-google="${TEST_REQUIRE_GOOGLE_CALENDAR}"

            - name: Clasificar estado telemedicina calendar smoke
              id: telemedicine_calendar
              if: ${{ always() }}
              shell: bash
              run: |
                  set -euo pipefail

                  tele_health='${{ steps.health.outputs.telemedicine_health || 'unknown' }}'
                  tele_reason='${{ steps.health.outputs.telemedicine_reason || 'unknown' }}'

                  non_tele_failures=0
                  for outcome in \
                    '${{ steps.health.outcome || 'n/a' }}' \
                    '${{ steps.contract_test.outcome || 'n/a' }}' \
                    '${{ steps.write_test.outcome || 'n/a' }}' \
                    '${{ steps.api_write_test.outcome || 'n/a' }}'
                  do
                    if [ "${outcome}" != "success" ] && [ "${outcome}" != "skipped" ] && [ "${outcome}" != "n/a" ]; then
                      non_tele_failures=$((non_tele_failures + 1))
                    fi
                  done

                  tele_failures=0
                  status='unknown'

                  if [ "${tele_health}" = "degraded" ]; then
                    tele_failures=1
                    if [ "${non_tele_failures}" -eq 0 ]; then
                      status='degraded_only'
                    else
                      status='degraded_mixed'
                    fi
                  elif [ "${tele_health}" = "healthy" ]; then
                    status='healthy'
                  else
                    status='unknown'
                  fi

                  {
                    echo "TELEMEDICINE_CALENDAR_STATUS=${status}"
                    echo "TELEMEDICINE_CALENDAR_REASON=${tele_reason}"
                    echo "TELEMEDICINE_CALENDAR_FAILURES=${tele_failures}"
                    echo "TELEMEDICINE_CALENDAR_NON_TELE_FAILURES=${non_tele_failures}"
                  } >> "${GITHUB_ENV}"

                  {
                    echo "status=${status}"
                    echo "reason=${tele_reason}"
                    echo "tele_failures=${tele_failures}"
                    echo "non_tele_failures=${non_tele_failures}"
                  } >> "${GITHUB_OUTPUT}"

                  echo "Telemedicine calendar => status=${status} reason=${tele_reason} tele_failures=${tele_failures} non_tele_failures=${non_tele_failures}"

            - name: Publicar artefactos Playwright de calendar smoke
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: calendar-write-smoke-artifacts
                  path: |
                      playwright-report
                      test-results
                      verification/calendar-write-smoke/api-write-smoke-last.json
                  if-no-files-found: warn
                  retention-days: 14

            - name: Resumen
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Calendar write smoke";
                    echo "- Dominio: \`${TEST_BASE_URL}\`";
                    echo "- Escritura habilitada: \`${TEST_ENABLE_CALENDAR_WRITE}\`";
                    echo "- Require Google calendar: \`${TEST_REQUIRE_GOOGLE_CALENDAR}\`";
                    echo "- Health HTTP: \`${{ steps.health.outputs.http_status || 'n/a' }}\`";
                    echo "- calendarSource: \`${{ steps.health.outputs.calendar_source || 'n/a' }}\`";
                    echo "- calendarMode: \`${{ steps.health.outputs.calendar_mode || 'n/a' }}\`";
                    echo "- calendarReachable: \`${{ steps.health.outputs.calendar_reachable || 'n/a' }}\`";
                    echo "- contract_test: \`${{ steps.contract_test.outcome || 'n/a' }}\`";
                    echo "- write_test: \`${{ steps.write_test.outcome || 'n/a' }}\`";
                    echo "- api_write_test: \`${{ steps.api_write_test.outcome || 'n/a' }}\`";
                    echo "- api_write_status: \`${{ steps.api_write_test.outputs.api_write_status || 'n/a' }}\`";
                    echo "- api_write_cleanup_status: \`${{ steps.api_write_test.outputs.api_write_cleanup_status || 'n/a' }}\`";
                    echo "- api_write_appointment_id: \`${{ steps.api_write_test.outputs.api_write_appointment_id || 'n/a' }}\`";
                    echo "- api_write_assigned_doctor: \`${{ steps.api_write_test.outputs.api_write_assigned_doctor || 'n/a' }}\`";
                    echo "- api_write_create_slot: \`${{ steps.api_write_test.outputs.api_write_create_slot || 'n/a' }}\`";
                    echo "- api_write_reschedule_slot: \`${{ steps.api_write_test.outputs.api_write_reschedule_slot || 'n/a' }}\`";
                    echo "- api_write_report_path: \`${{ steps.api_write_test.outputs.api_write_report_path || 'n/a' }}\`";
                    echo "- telemedicine_health: \`${{ steps.health.outputs.telemedicine_health || 'n/a' }}\`";
                    echo "- telemedicine_reason: \`${{ steps.health.outputs.telemedicine_reason || 'n/a' }}\`";
                    echo "- telemedicine_calendar_status: \`${TELEMEDICINE_CALENDAR_STATUS}\`";
                    echo "- telemedicine_calendar_reason: \`${TELEMEDICINE_CALENDAR_REASON}\`";
                    echo "- telemedicine_calendar_failures: \`${TELEMEDICINE_CALENDAR_FAILURES}\`";
                    echo "- telemedicine_calendar_non_tele_failures: \`${TELEMEDICINE_CALENDAR_NON_TELE_FAILURES}\`";
                    echo "- telemedicine_calendar_step_outcome: \`${{ steps.telemedicine_calendar.outcome || 'n/a' }}\`";
                    echo "- Resultado: \`${{ job.status }}\`";
                  } >> "${GITHUB_STEP_SUMMARY}"

            - name: Crear/actualizar incidente calendar write smoke
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && ((env.TELEMEDICINE_CALENDAR_STATUS != 'degraded_only' && env.TELEMEDICINE_CALENDAR_STATUS != 'unknown') || env.TELEMEDICINE_CALENDAR_NON_TELE_FAILURES != '0') }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Calendar Write Smoke fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = [
                        `health:${'${{ steps.health.outputs.http_status || 'n/a' }}'}`,
                        `source:${'${{ steps.health.outputs.calendar_source || 'n/a' }}'}`,
                        `mode:${'${{ steps.health.outputs.calendar_mode || 'n/a' }}'}`,
                        `reachable:${'${{ steps.health.outputs.calendar_reachable || 'n/a' }}'}`,
                        `tele_status:${'${{ env.TELEMEDICINE_CALENDAR_STATUS || 'n/a' }}'}`,
                        `tele_reason:${'${{ env.TELEMEDICINE_CALENDAR_REASON || 'n/a' }}'}`,
                        `tele_non_tele:${'${{ env.TELEMEDICINE_CALENDAR_NON_TELE_FAILURES || '0' }}'}`,
                        `contract:${'${{ steps.contract_test.outcome || 'n/a' }}'}`,
                        `write:${'${{ steps.write_test.outcome || 'n/a' }}'}`,
                        `api_write:${'${{ steps.api_write_test.outcome || 'n/a' }}'}`,
                        `api_status:${'${{ steps.api_write_test.outputs.api_write_status || 'n/a' }}'}`,
                        `api_cleanup:${'${{ steps.api_write_test.outputs.api_write_cleanup_status || 'n/a' }}'}`
                      ].join('|');
                      const signalMarker = `<!-- calendar-write-smoke-signal:${signal} -->`;
                      const incidentBody = [
                        'El workflow `Calendar Write Smoke` detecto fallo en verificacion de agenda real Google.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- health_http_status: ${{ steps.health.outputs.http_status || 'n/a' }}`,
                        `- calendar_source: ${{ steps.health.outputs.calendar_source || 'n/a' }}`,
                        `- calendar_mode: ${{ steps.health.outputs.calendar_mode || 'n/a' }}`,
                        `- calendar_reachable: ${{ steps.health.outputs.calendar_reachable || 'n/a' }}`,
                        `- calendar_configured: ${{ steps.health.outputs.calendar_configured || 'n/a' }}`,
                        `- calendar_auth: ${{ steps.health.outputs.calendar_auth || 'n/a' }}`,
                        `- telemedicine_health: ${{ steps.health.outputs.telemedicine_health || 'n/a' }}`,
                        `- telemedicine_reason: ${{ steps.health.outputs.telemedicine_reason || 'n/a' }}`,
                        `- telemedicine_calendar_status: ${{ env.TELEMEDICINE_CALENDAR_STATUS || 'n/a' }}`,
                        `- telemedicine_calendar_reason: ${{ env.TELEMEDICINE_CALENDAR_REASON || 'n/a' }}`,
                        `- telemedicine_calendar_failures: ${{ env.TELEMEDICINE_CALENDAR_FAILURES || '0' }}`,
                        `- telemedicine_calendar_non_tele_failures: ${{ env.TELEMEDICINE_CALENDAR_NON_TELE_FAILURES || '0' }}`,
                        `- contract_test_outcome: ${{ steps.contract_test.outcome || 'n/a' }}`,
                        `- write_test_outcome: ${{ steps.write_test.outcome || 'n/a' }}`,
                        `- api_write_test_outcome: ${{ steps.api_write_test.outcome || 'n/a' }}`,
                        `- api_write_status: ${{ steps.api_write_test.outputs.api_write_status || 'n/a' }}`,
                        `- api_write_cleanup_status: ${{ steps.api_write_test.outputs.api_write_cleanup_status || 'n/a' }}`,
                        `- api_write_appointment_id: ${{ steps.api_write_test.outputs.api_write_appointment_id || 'n/a' }}`,
                        `- api_write_assigned_doctor: ${{ steps.api_write_test.outputs.api_write_assigned_doctor || 'n/a' }}`,
                        `- api_write_create_slot: ${{ steps.api_write_test.outputs.api_write_create_slot || 'n/a' }}`,
                        `- api_write_reschedule_slot: ${{ steps.api_write_test.outputs.api_write_reschedule_slot || 'n/a' }}`,
                        `- api_write_report_path: ${{ steps.api_write_test.outputs.api_write_report_path || 'n/a' }}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });
                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);

                      if (existing) {
                        const existingBody = String(existing.body || '');
                        if (existingBody.includes(signalMarker)) {
                          core.info(`Incidente ya actualizado con misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: incidentBody
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente calendar write smoke actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- contract_test_outcome: ${{ steps.contract_test.outcome || 'n/a' }}`,
                            `- write_test_outcome: ${{ steps.write_test.outcome || 'n/a' }}`,
                            `- api_write_test_outcome: ${{ steps.api_write_test.outcome || 'n/a' }}`,
                            `- api_write_status: ${{ steps.api_write_test.outputs.api_write_status || 'n/a' }}`,
                            `- api_write_cleanup_status: ${{ steps.api_write_test.outputs.api_write_cleanup_status || 'n/a' }}`,
                            `- calendar_mode: ${{ steps.health.outputs.calendar_mode || 'n/a' }}`,
                            `- calendar_reachable: ${{ steps.health.outputs.calendar_reachable || 'n/a' }}`,
                            `- telemedicine_calendar_status: ${{ env.TELEMEDICINE_CALENDAR_STATUS || 'n/a' }}`,
                            `- telemedicine_calendar_reason: ${{ env.TELEMEDICINE_CALENDAR_REASON || 'n/a' }}`
                          ].join('\n')
                        });
                        core.info(`Incidente actualizado: #${existing.number}`);
                        return;
                      }

                      const created = await github.rest.issues.create({
                        owner,
                        repo,
                        title,
                        body: incidentBody,
                        labels: ['production-alert', 'calendar-smoke', 'severity:critical']
                      });
                      core.info(`Incidente creado: #${created.data.number}`);

            - name: Crear/actualizar incidente telemedicina calendar write smoke
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && (env.TELEMEDICINE_CALENDAR_STATUS == 'degraded_only' || env.TELEMEDICINE_CALENDAR_STATUS == 'degraded_mixed' || env.TELEMEDICINE_CALENDAR_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_CALENDAR_STATUS: ${{ env.TELEMEDICINE_CALENDAR_STATUS }}
                  TELEMEDICINE_CALENDAR_REASON: ${{ env.TELEMEDICINE_CALENDAR_REASON }}
                  TELEMEDICINE_CALENDAR_FAILURES: ${{ env.TELEMEDICINE_CALENDAR_FAILURES }}
                  TELEMEDICINE_CALENDAR_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_CALENDAR_NON_TELE_FAILURES }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Calendar Write Smoke telemedicina degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const status = String(process.env.TELEMEDICINE_CALENDAR_STATUS || 'n/a');
                      const reason = String(process.env.TELEMEDICINE_CALENDAR_REASON || 'n/a');
                      const failures = String(process.env.TELEMEDICINE_CALENDAR_FAILURES || '0');
                      const signal = `status:${status}|reason:${reason}|failures:${failures}|non_tele:${process.env.TELEMEDICINE_CALENDAR_NON_TELE_FAILURES || '0'}`;
                      const signalMarker = `<!-- calendar-write-smoke-telemedicine-signal:${signal} -->`;

                      const severity = (status === 'degraded_mixed' ||
                        reason.includes('diagnostics_critical') ||
                        reason.includes('hard_failures:'))
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'calendar-smoke', 'telemedicine', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Calendar Write Smoke` detecto degradacion en checks de telemedicina.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- telemedicine_health: ${{ steps.health.outputs.telemedicine_health || 'n/a' }}`,
                        `- telemedicine_reason: ${{ steps.health.outputs.telemedicine_reason || 'n/a' }}`,
                        `- telemedicine_calendar_status: ${status}`,
                        `- telemedicine_calendar_reason: ${reason}`,
                        `- telemedicine_calendar_failures: ${failures}`,
                        `- telemedicine_calendar_non_tele_failures: ${process.env.TELEMEDICINE_CALENDAR_NON_TELE_FAILURES || '0'}`,
                        `- contract_test_outcome: ${{ steps.contract_test.outcome || 'n/a' }}`,
                        `- write_test_outcome: ${{ steps.write_test.outcome || 'n/a' }}`,
                        `- api_write_test_outcome: ${{ steps.api_write_test.outcome || 'n/a' }}`,
                        `- api_write_status: ${{ steps.api_write_test.outputs.api_write_status || 'n/a' }}`,
                        `- api_write_cleanup_status: ${{ steps.api_write_test.outputs.api_write_cleanup_status || 'n/a' }}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Incidente telemedicina calendar smoke actualizo labels: #${existing.number}`);
                          }
                          core.info(`Incidente telemedicina calendar smoke ya refleja la misma senal: #${existing.number}`);
                          return;
                        }

                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente telemedicina calendar smoke actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_calendar_status: ${status}`,
                            `- telemedicine_calendar_reason: ${reason}`,
                            `- telemedicine_calendar_failures: ${failures}`,
                            `- telemedicine_calendar_non_tele_failures: ${process.env.TELEMEDICINE_CALENDAR_NON_TELE_FAILURES || '0'}`
                          ].join('\n')
                        });
                        core.info(`Incidente telemedicina actualizado: #${existing.number}`);
                        return;
                      }

                      const created = await github.rest.issues.create({
                        owner,
                        repo,
                        title,
                        body,
                        labels: baseLabels
                      });
                      core.info(`Incidente telemedicina creado: #${created.data.number}`);

            - name: Cerrar incidente calendar write smoke al recuperar
