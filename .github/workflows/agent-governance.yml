name: Agent Governance

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]
    workflow_dispatch:

concurrency:
    group: agent-governance-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    tri-lane-runtime-guard:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Guard AGENT_BOARD direct push without PR
              if: ${{ github.event_name == 'push' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const before = context.payload.before;
                      const after = context.sha;
                      if (!before || before === '0000000000000000000000000000000000000000') {
                        core.info('Push inicial sin base comparable; se omite guard de direct push para AGENT_BOARD.yaml.');
                        return;
                      }

                      const compare = await github.rest.repos.compareCommits({
                        owner,
                        repo,
                        base: before,
                        head: after,
                      });
                      const files = Array.isArray(compare.data.files) ? compare.data.files : [];
                      const boardTouched = files.some((f) => f.filename === 'AGENT_BOARD.yaml');
                      if (!boardTouched) {
                        core.info('AGENT_BOARD.yaml no cambio en este push.');
                        return;
                      }

                      const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                        owner,
                        repo,
                        commit_sha: after,
                      });
                      const linked = Array.isArray(prs.data) ? prs.data : [];
                      if (linked.length === 0) {
                        core.setFailed('AGENT_BOARD.yaml cambio por push directo sin PR asociado. Usa flujo por Pull Request.');
                        return;
                      }
                      core.info(`AGENT_BOARD.yaml cambio con PR asociado (#${linked[0].number}).`);

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Legacy board drift guard (check)
              run: node bin/board-legacy-drift-guard.js --check --json

            - name: Board sync check
              run: node agent-orchestrator.js board sync check --json

            - name: Tri-lane runtime check (JSON)
              run: node agent-orchestrator.js codex-check --json

            - name: Handoffs lint (JSON)
              run: node agent-orchestrator.js handoffs lint --json

    governance:
        needs: tri-lane-runtime-guard
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG: ${{ vars.SENTRY_ORG || secrets.SENTRY_ORG }}
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'

            - name: Install dependencies
              run: npm ci

            - name: Agent status snapshot
              run: node agent-orchestrator.js status

            - name: Intake dry-run
              run: node agent-orchestrator.js intake --no-write --json

            - name: Orchestrator CLI tests
              run: npm run agent:test

            - name: Stale gate
              run: node agent-orchestrator.js stale --strict

            - name: Conflict gate
              run: node agent-orchestrator.js conflicts --strict

            - name: Handoffs lint
              run: node agent-orchestrator.js handoffs lint

            - name: Governance policy lint
              run: node agent-orchestrator.js policy lint

            - name: Codex mirror check
              run: node agent-orchestrator.js codex-check

            - name: Validate governance contract
              run: php bin/validate-agent-governance.php

            - name: Board doctor (non-blocking)
              if: always()
              continue-on-error: true
              run: |
                  mkdir -p verification
                  node agent-orchestrator.js board doctor --json --profile ci > verification/agent-board-doctor.json

            - name: Build governance summary (JSON + Markdown)
              if: always()
              run: |
                  mkdir -p verification
                  node bin/agent-governance-summary.js --profile local --explain-red --write-json verification/agent-governance-summary.json --write-md verification/agent-governance-summary.md --format markdown > /tmp/agent-governance-summary.md
                  cat /tmp/agent-governance-summary.md >> "$GITHUB_STEP_SUMMARY"

            - name: Evaluate governance red-signal policy (non-blocking)
              if: always()
              continue-on-error: true
              run: |
                  node bin/agent-governance-summary.js --from-json verification/agent-governance-summary.json --format json --policy-check fail_on_red --annotate-policy > /dev/null

            - name: Upload governance summary artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: agent-governance-summary
                  path: |
                      verification/agent-governance-summary.json
                      verification/agent-governance-summary.md
                      verification/agent-board-doctor.json

            - name: Comment governance summary on PR
              if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
              continue-on-error: true
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const path = 'verification/agent-governance-summary.md';
                      const marker = '<!-- agent-governance-summary -->';
                      let summaryMd = 'Resumen de gobernanza no disponible (artifact faltante).';
                      if (fs.existsSync(path)) {
                        summaryMd = fs.readFileSync(path, 'utf8').trim();
                      }
                      const body = `${marker}\n${summaryMd}`;
                      const issue_number = context.issue.number;
                      const { owner, repo } = context.repo;
                      const comments = await github.paginate(
                        github.rest.issues.listComments,
                        { owner, repo, issue_number, per_page: 100 }
                      );
                      const existing = comments.find((c) =>
                        c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
                      );
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner,
                          repo,
                          comment_id: existing.id,
                          body,
                        });
                        core.info(`Updated governance summary comment: ${existing.id}`);
                      } else {
                        const created = await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number,
                          body,
                        });
                        core.info(`Created governance summary comment: ${created.data.id}`);
                      }
