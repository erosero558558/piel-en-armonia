name: Close Resolved Production Issues

on:
    workflow_run:
        workflows: ['Post-Deploy Gate (Git Sync)', 'Post-Deploy Gate (Full Regression)', 'Production Monitor']
        types:
            - completed

permissions:
    issues: write

jobs:
    close-resolved:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - name: Close resolved production alerts
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const workflowName = context.payload.workflow_run.name;

                      // Buscar issues abiertos de alertas de produccion.
                      // No dependemos solo de labels porque historicamente hubo issues sin label.
                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const now = new Date().toISOString();
                      const runUrl = context.payload.workflow_run.html_url;
                      const alertTitlePrefixes = ['[ALERTA PROD]'];

                      for (const issue of openIssues) {
                        if (issue.pull_request) continue; // Ignorar PRs
                        const title = String(issue.title || '');
                        const hasAlertPrefix = alertTitlePrefixes.some((prefix) => title.startsWith(prefix));
                        const hasProdLabel = (issue.labels || []).some((label) => {
                          const labelName = typeof label === 'string' ? label : (label && label.name ? String(label.name) : '');
                          return labelName.toLowerCase() === 'production-alert';
                        });
                        if (!hasAlertPrefix && !hasProdLabel) continue;

                        // Cerrar issue con comentario
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: issue.number,
                          body: `✅ **RESUELTO**\n\nEl workflow "${workflowName}" ha pasado correctamente.\n- Fecha: ${now}\n- Run: ${runUrl}\n\nCerrando alerta automáticamente.`
                        });

                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: issue.number,
                          state: 'closed'
                        });

                        console.log(`Issue #${issue.number} cerrado.`);
                      }
