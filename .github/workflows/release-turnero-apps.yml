name: Release Turnero Apps

on:
    workflow_dispatch:
        inputs:
            release_version:
                description: 'Version semver para Operador, Kiosco y Sala TV'
                required: true
                default: '0.1.0'
                type: string
            base_url:
                description: 'Base URL publica de las superficies remotas'
                required: true
                default: 'https://pielarmonia.com'
                type: string
            update_base_url:
                description: 'Base URL publica para desktop-updates'
                required: true
                default: 'https://pielarmonia.com/desktop-updates/'
                type: string
            publish_to_hosting:
                description: 'Subir el bundle final al hosting productivo'
                required: false
                default: false
                type: boolean
            protocol:
                description: 'Protocolo remoto para publicar al hosting'
                required: false
                default: 'ftps'
                type: choice
                options:
                    - ftps
                    - ftp
                    - sftp
            server_port:
                description: 'Puerto remoto (21 FTP/FTPS, 22 SFTP)'
                required: false
                default: '21'
                type: string
            security:
                description: 'Validacion TLS para FTPS'
                required: false
                default: 'strict'
                type: choice
                options:
                    - strict
                    - loose
            server_dir:
                description: 'Directorio remoto base para publicar'
                required: false
                default: '/public_html/'
                type: string
            dry_run:
                description: 'Simular publicacion al hosting sin subir archivos'
                required: false
                default: false
                type: boolean
            publish_github_release:
                description: 'Adjuntar el bundle final a un GitHub Release'
                required: false
                default: false
                type: boolean

concurrency:
    group: release-turnero-apps-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

jobs:
    resolve-release-plan:
        name: Resolve release plan
        runs-on: ubuntu-latest
        outputs:
            desktop_matrix: ${{ steps.plan.outputs.desktop_matrix }}
            android_matrix: ${{ steps.plan.outputs.android_matrix }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Resolve turnero surface matrices
              id: plan
              shell: bash
              run: node bin/resolve-turnero-release-plan.js --base-url "${{ inputs.base_url }}" --github-output "$GITHUB_OUTPUT"

    build-desktop:
        name: Build desktop ${{ matrix.surface }} (${{ matrix.platform }})
        needs:
            - resolve-release-plan
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.resolve-release-plan.outputs.desktop_matrix) }}
        env:
            CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        defaults:
            run:
                working-directory: src/apps/turnero-desktop
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install desktop dependencies
              run: npm install

            - name: Build desktop shell
              run: >
                  npm run build:surface --
                  --surface "${{ matrix.surface }}"
                  --platform "${{ matrix.platform }}"
                  --version "${{ inputs.release_version }}"
                  --baseUrl "${{ inputs.base_url }}"
                  --updateBaseUrl "${{ inputs.update_base_url }}"

            - name: Upload desktop artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: src/apps/turnero-desktop/dist/${{ matrix.surface }}/${{ matrix.platform }}/
                  retention-days: 14

    build-android:
        name: Build Android ${{ matrix.surface }} (${{ matrix.target_key }})
        needs:
            - resolve-release-plan
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix: ${{ fromJson(needs.resolve-release-plan.outputs.android_matrix) }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Derivar versionCode Android
              id: version_code
              shell: bash
              env:
                  RELEASE_VERSION: ${{ inputs.release_version }}
              run: |
                  set -euo pipefail
                  if ! [[ "${RELEASE_VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                    echo "::error::release_version debe usar semver mayor.menor.patch"
                    exit 1
                  fi
                  major="${BASH_REMATCH[1]}"
                  minor="${BASH_REMATCH[2]}"
                  patch="${BASH_REMATCH[3]}"
                  echo "code=$((major * 10000 + minor * 100 + patch))" >> "$GITHUB_OUTPUT"

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '17'

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v4
              with:
                  gradle-version: '8.7'

            - name: Build Android TV release APK
              run: >
                  gradle -p "${{ matrix.gradle_project }}" "${{ matrix.build_task }}"
                  -PturneroVersionName="${{ inputs.release_version }}"
                  -PturneroVersionCode="${{ steps.version_code.outputs.code }}"
                  -PturneroBaseUrl="${{ matrix.base_url }}"
                  -PturneroSurfacePath="${{ matrix.surface_path }}"

            - name: Rename Android artifact
              shell: bash
              run: |
                  set -euo pipefail
                  source_path="${{ matrix.gradle_project }}/${{ matrix.source_artifact }}"
                  dest_path="${{ matrix.gradle_project }}/${{ matrix.staged_artifact_path }}"
                  mkdir -p "$(dirname "$dest_path")"
                  cp \
                    "$source_path" \
                    "$dest_path"

            - name: Upload Android artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: ${{ matrix.gradle_project }}/${{ matrix.staged_artifact_path }}
                  retention-days: 14

    package-release:
        name: Package release bundle
        runs-on: ubuntu-latest
        needs:
            - build-desktop
            - build-android
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Download desktop artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: turnero-desktop-*
                  path: artifacts/desktop

            - name: Download Android artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: turnero-android-*
                  path: artifacts/android

            - name: Stage app-downloads and desktop-updates bundle
              shell: bash
              run: >
                  node bin/stage-turnero-app-release.js
                  --version "${{ inputs.release_version }}"
                  --baseUrl "${{ inputs.base_url }}"
                  --releasedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  --desktopRoot artifacts/desktop
                  --androidRoot artifacts/android
                  --outputRoot release/turnero-apps

            - name: Upload release bundle
              uses: actions/upload-artifact@v4
              with:
                  name: turnero-apps-release-bundle
                  path: release/turnero-apps/
                  retention-days: 14

            - name: Publish workflow summary
              shell: bash
              run: |
                  {
                    echo "## Turnero apps bundle"
                    echo
                    echo "- Version: \`${{ inputs.release_version }}\`"
                    echo "- Base URL: \`${{ inputs.base_url }}\`"
                    echo "- Update base URL: \`${{ inputs.update_base_url }}\`"
                    echo
                    echo "### Files"
                    find release/turnero-apps -type f | sort
                  } >> "$GITHUB_STEP_SUMMARY"

    publish-to-hosting:
        name: Publish bundle to hosting
        runs-on: ubuntu-latest
        needs:
            - package-release
        if: ${{ github.event.inputs.publish_to_hosting == 'true' }}
        env:
            DEPLOY_PROTOCOL: ${{ github.event.inputs.protocol || 'ftps' }}
            FTP_SERVER_PORT: ${{ github.event.inputs.server_port || '21' }}
            FTP_SECURITY: ${{ github.event.inputs.security || 'strict' }}
            FTP_SERVER_DIR: ${{ github.event.inputs.server_dir || '/public_html/' }}
            FTP_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        steps:
            - name: Download release bundle
              uses: actions/download-artifact@v4
              with:
                  name: turnero-apps-release-bundle
                  path: _release_bundle

            - name: Validate hosting secrets
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${{ secrets.FTP_SERVER }}" ]; then
                    echo "::error::Falta el secret FTP_SERVER"
                    exit 1
                  fi
                  if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
                    echo "::error::Falta el secret FTP_USERNAME"
                    exit 1
                  fi
                  if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
                    echo "::error::Falta el secret FTP_PASSWORD"
                    exit 1
                  fi

            - name: Publish bundle via FTP/FTPS
              if: ${{ env.DEPLOY_PROTOCOL != 'sftp' }}
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ${{ env.DEPLOY_PROTOCOL }}
                  port: ${{ env.FTP_SERVER_PORT }}
                  security: ${{ env.FTP_SECURITY }}
                  local-dir: _release_bundle/
                  server-dir: ${{ env.FTP_SERVER_DIR }}
                  dangerous-clean-slate: false
                  dry-run: ${{ env.FTP_DRY_RUN }}

            - name: Install lftp for SFTP publish
              if: ${{ env.DEPLOY_PROTOCOL == 'sftp' }}
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y lftp

            - name: Publish bundle via SFTP
              if: ${{ env.DEPLOY_PROTOCOL == 'sftp' }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [ "${FTP_DRY_RUN}" = "true" ]; then
                    echo "dry_run=true, se omite subida SFTP real."
                    exit 0
                  fi

                  lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "sftp://${{ secrets.FTP_SERVER }}:${FTP_SERVER_PORT}" -e "
                    set net:max-retries 2;
                    set net:timeout 20;
                    set sftp:auto-confirm yes;
                    mirror -R --verbose _release_bundle/ ${FTP_SERVER_DIR}
                    bye
                  "

    publish-github-release:
        name: Publish GitHub release assets
        runs-on: ubuntu-latest
        needs:
            - package-release
        if: ${{ github.event.inputs.publish_github_release == 'true' }}
        steps:
            - name: Download release bundle
              uses: actions/download-artifact@v4
              with:
                  name: turnero-apps-release-bundle
                  path: release/turnero-apps

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: turnero-apps-v${{ inputs.release_version }}
                  name: Turnero Apps v${{ inputs.release_version }}
                  files: |
                      release/turnero-apps/app-downloads/stable/**/*
                      release/turnero-apps/desktop-updates/stable/**/*
