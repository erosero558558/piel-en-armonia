name: CI — Aurora Derm

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════
# JOB 1 — Lint (siempre corre, sin precondiciones externas)
# ══════════════════════════════════════════════════════════════
jobs:
  lint:
    name: Lint PHP + Route Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json, pdo
          coverage: none

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci --ignore-scripts

      - name: JSON lint package.json
        run: node -e "require('./package.json')"

      - name: PHP syntax lint (todos los archivos)
        run: npm run lint:php

      - name: Route integrity (controllers en disco)
        run: npm run test:routes

      - name: Prune check (sin artefactos prohibidos)
        run: node bin/prune.js
        continue-on-error: true   # aviso, no bloquea

# ══════════════════════════════════════════════════════════════
# JOB 2 — PHPUnit (requiere composer install)
# ══════════════════════════════════════════════════════════════
  phpunit:
    name: PHPUnit — Suite Smoke + Unit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2 + composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          extensions: mbstring, json, pdo, pdo_mysql, openssl
          coverage: none

      - name: Cache Composer
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPUnit Smoke suite
        run: vendor/bin/phpunit --testsuite Smoke --no-coverage
        env:
          AURORADERM_SKIP_ENV_FILE: '1'
          APP_ENV: testing

      - name: PHPUnit Unit suite
        run: vendor/bin/phpunit --testsuite Unit --no-coverage
        continue-on-error: true   # Unit suite en progreso
        env:
          AURORADERM_SKIP_ENV_FILE: '1'
          APP_ENV: testing

# ══════════════════════════════════════════════════════════════
# JOB 3 — Smoke HTTP (servidor PHP en CI)
# ══════════════════════════════════════════════════════════════
  smoke-http:
    name: Smoke HTTP — API contrato básico
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json
          coverage: none

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci --ignore-scripts

      - name: Arrancar servidor PHP en background
        run: |
          php -S 127.0.0.1:8000 bin/local-stage-router.php &
          echo "PHP_SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2

      - name: Verificar que el servidor respondió
        run: |
          curl -sf http://127.0.0.1:8000/api.php?resource=health \
            -o /tmp/health.json --max-time 10 || \
          (echo "Servidor no respondió" && cat /tmp/health.json 2>/dev/null; exit 1)
          node -e "const r=require('/tmp/health.json'); if(!r.ok) process.exit(1); console.log('health OK:', r.version||'?')"

      - name: Smoke tests Node (backend-only contract)
        run: npm run test:smoke
        env:
          SMOKE_URL: http://127.0.0.1:8000
          AURORADERM_SKIP_ENV_FILE: '1'

      - name: Detener servidor
        if: always()
        run: kill $PHP_SERVER_PID 2>/dev/null || true

# ══════════════════════════════════════════════════════════════
# JOB 4 — Security (Trivy — solo en push a main)
# ══════════════════════════════════════════════════════════════
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Composer install (solo prod)
        run: composer install --prefer-dist --no-dev --no-progress --no-interaction

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'library'
          severity: 'CRITICAL,HIGH'

# ══════════════════════════════════════════════════════════════
# JOB 5 — Gate final (todos los jobs deben pasar)
# ══════════════════════════════════════════════════════════════
  ci-gate:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    needs: [lint, phpunit, smoke-http]
    if: always()
    steps:
      - name: Verificar que todos los jobs críticos pasaron
        run: |
          lint="${{ needs.lint.result }}"
          phpunit="${{ needs.phpunit.result }}"
          smoke="${{ needs.smoke-http.result }}"

          echo "lint:    $lint"
          echo "phpunit: $phpunit"
          echo "smoke:   $smoke"

          if [ "$lint" != "success" ]; then
            echo "::error::lint falló — no se puede mergear"
            exit 1
          fi
          if [ "$phpunit" != "success" ]; then
            echo "::error::phpunit falló — revisa los tests"
            exit 1
          fi
          if [ "$smoke" != "success" ]; then
            echo "::error::smoke-http falló — el contrato del API está roto"
            exit 1
          fi

          echo "✅ Todos los checks críticos pasaron."
