name: CI
# Triggered: 2026-02-20

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Lint JS
              run: npm run lint:js
            - name: Lint PHP
              run: npm run lint:php
            - name: Validate Plan Operativo anti-loop
              run: php bin/validate-plan-operativo.php
            - name: Agent Orchestrator status
              run: node agent-orchestrator.js status
            - name: Agent conflict gate
              run: node agent-orchestrator.js conflicts --strict
            - name: Validate Agent Governance
              run: php bin/validate-agent-governance.php
            - name: Lint Prometheus Config
              run: |
                  docker run --rm \
                    -v $(pwd)/prometheus.docker.yml:/etc/prometheus/prometheus.yml \
                    -v $(pwd)/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml \
                    --entrypoint promtool \
                    prom/prometheus:latest \
                    check config /etc/prometheus/prometheus.yml

    security:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect security relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      security:
                        - 'controllers/**'
                        - 'lib/**'
                        - 'tests/**'
                        - '*.php'
                        - 'composer.json'
                        - 'composer.lock'
                        - 'psalm.xml'
            - name: Setup PHP
              if: steps.changes.outputs.security == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              if: steps.changes.outputs.security == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Run Psalm Static Analysis
              if: steps.changes.outputs.security == 'true'
              run: vendor/bin/psalm --no-cache
            - name: Run Trivy vulnerability scanner
              if: steps.changes.outputs.security == 'true'
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  format: 'table'
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'
            - name: Skip security (no relevant changes)
              if: steps.changes.outputs.security != 'true'
              run: |
                  echo "Skipping security: no relevant PHP/composer changes detected."

    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect unit-test relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      unit:
                        - 'controllers/**'
                        - 'lib/**'
                        - 'tests/**'
                        - '*.php'
                        - 'composer.json'
                        - 'composer.lock'
                        - 'phpunit.xml'
            - name: Setup PHP
              if: steps.changes.outputs.unit == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
                  coverage: pcov
            - name: Install Composer Dependencies
              if: steps.changes.outputs.unit == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Run PHPUnit with Coverage
              if: steps.changes.outputs.unit == 'true'
              run: vendor/bin/phpunit --coverage-text --coverage-clover coverage.xml
            - name: Run Legacy PHP Tests
              if: steps.changes.outputs.unit == 'true'
              run: npm run test:php
            - name: Upload Coverage Artifact
              if: steps.changes.outputs.unit == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: code-coverage
                  path: coverage.xml
                  retention-days: 14
            - name: Skip unit-tests (no relevant changes)
              if: steps.changes.outputs.unit != 'true'
              run: |
                  echo "Skipping unit-tests: no relevant PHP/composer changes detected."

    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect e2e relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      e2e:
                        - 'tests/**'
                        - 'js/**'
                        - 'src/**'
                        - 'controllers/**'
                        - 'lib/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'playwright.config.js'
                        - 'package.json'
                        - 'package-lock.json'
            - name: Setup PHP
              if: steps.changes.outputs.e2e == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Setup Node
              if: steps.changes.outputs.e2e == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install Node Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: npm ci
            - name: Cache Playwright Browsers
              if: steps.changes.outputs.e2e == 'true'
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-
            - name: Install Playwright Browsers
              if: steps.changes.outputs.e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
            - name: Run Critical Agenda Gate
              if: steps.changes.outputs.e2e == 'true'
              run: npm run test:critical:agenda
              env:
                  TEST_LOCAL_SERVER: php
                  PIELARMONIA_ADMIN_PASSWORD: admin123
                  TEST_ENABLE_CALENDAR_WRITE: 'false'
            - name: Run Critical Funnel Gate
              if: steps.changes.outputs.e2e == 'true'
              run: npm run test:critical:funnel
              env:
                  TEST_LOCAL_SERVER: php
                  PIELARMONIA_ADMIN_PASSWORD: admin123
            - name: Run Playwright Tests (non-critical)
              if: steps.changes.outputs.e2e == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  mapfile -t spec_files < <(find tests -name "*.spec.js" \
                    ! -name "calendar-google-contract.spec.js" \
                    ! -name "phase2-calendar-consistency.spec.js" \
                    ! -name "funnel-event-api.spec.js" \
                    ! -name "funnel-retention-admin.spec.js" \
                    ! -name "funnel-tracking.spec.js" | sort)

                  if [ "${#spec_files[@]}" -eq 0 ]; then
                    echo "::error::No se encontraron specs no criticos para Playwright."
                    exit 1
                  fi

                  npx playwright test --grep-invert "@visual" "${spec_files[@]}"
              env:
                  TEST_LOCAL_SERVER: php
                  PIELARMONIA_ADMIN_PASSWORD: admin123
            - name: Skip e2e (no relevant changes)
              if: steps.changes.outputs.e2e != 'true'
              run: |
                  echo "Skipping e2e-tests: no relevant source/test changes detected."
            - uses: actions/upload-artifact@v4
              if: always() && steps.changes.outputs.e2e == 'true'
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    c1-exit-gate:
        runs-on: ubuntu-latest
        needs: [lint]
        timeout-minutes: 25
        env:
            TEST_BASE_URL: ${{ vars.STAGING_URL || 'https://staging.pielarmonia.com' }}
            PROD_BASE_URL: ${{ vars.PROD_URL || 'https://pielarmonia.com' }}
        steps:
            - uses: actions/checkout@v4
            - name: Detect C1 gate relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      c1:
                        - '.github/workflows/ci.yml'
                        - 'tests/figo-chat-contract.spec.js'
                        - 'tests/helpers/**'
                        - 'js/**'
                        - 'src/**'
                        - 'controllers/**'
                        - 'lib/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'package.json'
                        - 'package-lock.json'
            - name: Setup Node
              if: steps.changes.outputs.c1 == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Resolve effective C1 base URL
              if: steps.changes.outputs.c1 == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  candidate="${TEST_BASE_URL%/}"
                  host="$(node -e "const u=new URL(process.argv[1]);process.stdout.write(u.hostname);" "$candidate")"
                  if getent hosts "$host" >/dev/null 2>&1; then
                    effective="$candidate"
                    echo "Using staging candidate: $effective"
                  else
                    effective="${PROD_BASE_URL%/}"
                    fallback_host="$(node -e "const u=new URL(process.argv[1]);process.stdout.write(u.hostname);" "$effective")"
                    if ! getent hosts "$fallback_host" >/dev/null 2>&1; then
                      echo "::error::No se pudo resolver ni staging ($host) ni prod ($fallback_host)."
                      exit 1
                    fi
                    echo "::warning::Staging no resolvio ($host). Se usa fallback PROD: $effective"
                  fi
                  echo "EFFECTIVE_TEST_BASE_URL=$effective" >> "$GITHUB_ENV"
            - name: Install Node Dependencies
              if: steps.changes.outputs.c1 == 'true'
              run: npm ci
            - name: Install Playwright Browsers
              if: steps.changes.outputs.c1 == 'true'
              run: npx playwright install --with-deps chromium
            - name: Validate Figo contract against staging
              if: steps.changes.outputs.c1 == 'true'
              run: npm run test:figo-contract
              env:
                  TEST_BASE_URL: ${{ env.EFFECTIVE_TEST_BASE_URL }}
                  TEST_FIGO_CHAT_LATENCY: 'false'
            - name: Smoke staging chat endpoints
              if: steps.changes.outputs.c1 == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  base="${EFFECTIVE_TEST_BASE_URL%/}"
                  echo "C1 smoke base: ${base}"

                  health_code="$(curl -sS -o /tmp/c1-health.json -w "%{http_code}" "${base}/api.php?resource=health")"
                  if [ "${health_code}" -lt 200 ] || [ "${health_code}" -ge 300 ]; then
                    echo "::error::Health endpoint devolvio HTTP ${health_code}"
                    exit 1
                  fi
                  node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('/tmp/c1-health.json','utf8'));if(!j||typeof j!=='object'||!('timingMs' in j)){throw new Error('health payload invalido')}"

                  api_chat_code="$(curl -sS -o /tmp/c1-api-chat.txt -w "%{http_code}" "${base}/api/chat")"
                  if [ "${api_chat_code}" -ge 500 ]; then
                    echo "::error::/api/chat devolvio HTTP ${api_chat_code}"
                    exit 1
                  fi
                  if [ "${api_chat_code}" -eq 404 ]; then
                    echo "::warning::/api/chat no disponible en este entorno; se valida endpoint canonico /figo-chat.php."
                  fi

                  figo_code="$(curl -sS -o /tmp/c1-figo.json -w "%{http_code}" "${base}/figo-chat.php")"
                  if [ "${figo_code}" -lt 200 ] || [ "${figo_code}" -ge 300 ]; then
                    echo "::error::/figo-chat.php devolvio HTTP ${figo_code}"
                    exit 1
                  fi
                  node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('/tmp/c1-figo.json','utf8'));if(!j||typeof j!=='object'||!('mode' in j)||!('service' in j)){throw new Error('figo payload invalido')}"
            - name: Skip C1 exit gate (no relevant changes)
              if: steps.changes.outputs.c1 != 'true'
              run: |
                  echo "Skipping c1-exit-gate: no runtime/chat/workflow changes detected."

    build:
        runs-on: ubuntu-latest
        needs: [lint, security, unit-tests, e2e-tests, c1-exit-gate]
        steps:
            - uses: actions/checkout@v4
            - name: Detect build relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      build:
                        - 'js/**'
                        - 'src/**'
                        - 'controllers/**'
                        - 'lib/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'rollup.config.mjs'
                        - 'package.json'
                        - 'package-lock.json'
                        - 'PREPARAR-PAQUETE-DESPLIEGUE.ps1'
            - name: Build Deploy Bundle
              if: steps.changes.outputs.build == 'true'
              shell: pwsh
              run: ./PREPARAR-PAQUETE-DESPLIEGUE.ps1
            - name: Enforce no debug logs in production bundles
              if: steps.changes.outputs.build == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  if grep -R -n -E "console\\.(log|debug|trace)\\(|\\bdebugger\\b" script.js js/engines js/chunks js/admin-chunks 2>/dev/null; then
                    echo "::error::Se detectaron logs/debugger en bundles de produccion."
                    exit 1
                  fi
                  echo "OK: bundles sin console.log/debugger."
            - name: Upload Build Artifact
              if: steps.changes.outputs.build == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: deploy-bundle
                  path: _deploy_bundle/**/*.zip
                  if-no-files-found: error
            - name: Skip build (no relevant changes)
              if: steps.changes.outputs.build != 'true'
              run: |
                  echo "Skipping build: no deploy-bundle relevant changes detected."
