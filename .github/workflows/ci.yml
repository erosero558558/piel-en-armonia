name: CI
# Triggered: 2026-02-20

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect lint relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      lint:
                        - 'controllers/**'
                        - 'lib/**'
                        - 'tests/**'
                        - 'js/**'
                        - 'src/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'package.json'
                        - 'package-lock.json'
                        - 'composer.json'
                        - 'composer.lock'
                        - 'eslint.config.js'
                        - 'phpunit.xml'
                        - 'psalm.xml'
                        - 'rollup.config.mjs'
                        - 'playwright.config.js'
                        - '.github/workflows/ci.yml'
                        - 'prometheus.docker.yml'
                        - 'prometheus.rules.yml'
                        - 'bin/validate-plan-operativo.php'
                        - 'PLAN_MAESTRO_OPERATIVO_2026.md'
            - name: Setup PHP
              if: steps.changes.outputs.lint == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
            - name: Setup Node
              if: steps.changes.outputs.lint == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install dependencies
              if: steps.changes.outputs.lint == 'true'
              run: npm ci
            - name: Lint JS
              if: steps.changes.outputs.lint == 'true'
              run: npm run lint:js
            - name: Lint PHP
              if: steps.changes.outputs.lint == 'true'
              run: npm run lint:php
            - name: Validate Plan Operativo anti-loop
              if: steps.changes.outputs.lint == 'true'
              run: php bin/validate-plan-operativo.php
            - name: Agent Orchestrator status
              if: steps.changes.outputs.lint == 'true'
              run: node agent-orchestrator.js status
            - name: Agent conflict gate
              if: steps.changes.outputs.lint == 'true'
              run: node agent-orchestrator.js conflicts --strict
            - name: Validate Agent Governance
              if: steps.changes.outputs.lint == 'true'
              run: php bin/validate-agent-governance.php
            - name: Lint Prometheus Config
              if: steps.changes.outputs.lint == 'true'
              run: |
                  docker run --rm \
                    -v $(pwd)/prometheus.docker.yml:/etc/prometheus/prometheus.yml \
                    -v $(pwd)/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml \
                    --entrypoint promtool \
                    prom/prometheus:latest \
                    check config /etc/prometheus/prometheus.yml
            - name: Skip lint (no relevant changes)
              if: steps.changes.outputs.lint != 'true'
              run: |
                  echo "Skipping lint: no lint-relevant source/config/workflow changes detected."
                  echo "Docs/board/evidence-only changes should still be covered by Agent Governance checks."

    security:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect security relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      security:
                        - 'controllers/**'
                        - 'lib/**'
                        - 'tests/**'
                        - '*.php'
                        - 'composer.json'
                        - 'composer.lock'
                        - 'psalm.xml'
            - name: Setup PHP
              if: steps.changes.outputs.security == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              if: steps.changes.outputs.security == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Run Trivy vulnerability scanner
              if: steps.changes.outputs.security == 'true'
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  format: 'table'
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'
            - name: Skip security (no relevant changes)
              if: steps.changes.outputs.security != 'true'
              run: |
                  echo "Skipping security: no relevant PHP/composer changes detected."

    psalm:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect psalm relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      psalm:
                        - 'controllers/**'
                        - 'lib/**'
                        - 'api.php'
                        - 'psalm.xml'
                        - 'psalm-baseline.xml'
                        - 'composer.json'
                        - 'composer.lock'
                        - '.github/workflows/ci.yml'
            - name: Setup PHP
              if: steps.changes.outputs.psalm == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              if: steps.changes.outputs.psalm == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Run Psalm Static Analysis
              if: steps.changes.outputs.psalm == 'true'
              shell: bash
              run: |
                  if [[ ! -x vendor/bin/psalm ]]; then
                      echo "::error::Instala Psalm: composer require --dev vimeo/psalm"
                      exit 1
                  fi
                  vendor/bin/psalm --no-cache
            - name: Skip psalm (no relevant changes)
              if: steps.changes.outputs.psalm != 'true'
              run: |
                  echo "Skipping psalm: no relevant PHP changes detected."
    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect unit-test relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      unit:
                        - 'controllers/**'
                        - 'lib/**'
                        - 'tests/**'
                        - '*.php'
                        - 'composer.json'
                        - 'composer.lock'
                        - 'phpunit.xml'
            - name: Setup PHP
              if: steps.changes.outputs.unit == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
                  coverage: pcov
            - name: Install Composer Dependencies
              if: steps.changes.outputs.unit == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Run PHPUnit with Coverage
              if: steps.changes.outputs.unit == 'true'
              run: vendor/bin/phpunit --coverage-text --coverage-clover coverage.xml
            - name: Run Legacy PHP Tests
              if: steps.changes.outputs.unit == 'true'
              run: npm run test:php
            - name: Upload Coverage Artifact
              if: steps.changes.outputs.unit == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: code-coverage
                  path: coverage.xml
                  retention-days: 14
            - name: Skip unit-tests (no relevant changes)
              if: steps.changes.outputs.unit != 'true'
              run: |
                  echo "Skipping unit-tests: no relevant PHP/composer changes detected."

    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect e2e relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      e2e:
                        - 'tests/**'
                        - 'js/**'
                        - 'src/**'
                        - 'controllers/**'
                        - 'lib/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'playwright.config.js'
                        - 'package.json'
                        - 'package-lock.json'
            - name: Setup PHP
              if: steps.changes.outputs.e2e == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Setup Node
              if: steps.changes.outputs.e2e == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install Node Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: npm ci
            - name: Cache Playwright Browsers
              if: steps.changes.outputs.e2e == 'true'
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-
            - name: Install Playwright Browsers
              if: steps.changes.outputs.e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
            - name: Run Critical Agenda Gate
              if: steps.changes.outputs.e2e == 'true'
              run: npm run test:critical:agenda
              env:
                  TEST_LOCAL_SERVER: php
                  AURORADERM_ADMIN_PASSWORD: test-ci-admin-password
                  PIELARMONIA_ADMIN_PASSWORD: test-ci-admin-password
                  TEST_ENABLE_CALENDAR_WRITE: 'false'
            - name: Run Critical Funnel Gate
              if: steps.changes.outputs.e2e == 'true'
              run: npm run test:critical:funnel
              env:
                  TEST_LOCAL_SERVER: php
                  AURORADERM_ADMIN_PASSWORD: test-ci-admin-password
                  PIELARMONIA_ADMIN_PASSWORD: test-ci-admin-password
            - name: Run Critical Payments Gate
              if: steps.changes.outputs.e2e == 'true'
              run: npm run test:critical:payments
              env:
                  TEST_LOCAL_SERVER: php
                  AURORADERM_ADMIN_PASSWORD: test-ci-admin-password
                  PIELARMONIA_ADMIN_PASSWORD: test-ci-admin-password
            - name: Skip e2e (no relevant changes)
              if: steps.changes.outputs.e2e != 'true'
              run: |
                  echo "Skipping e2e-tests: no relevant source/test changes detected."
            - uses: actions/upload-artifact@v4
              if: always() && steps.changes.outputs.e2e == 'true'
              with:
                  name: playwright-report-critical
                  path: playwright-report/
                  if-no-files-found: ignore
                  retention-days: 30

    e2e-noncritical-report:
        runs-on: ubuntu-latest
        needs: [e2e-tests]
        steps:
            - uses: actions/checkout@v4
            - name: Detect e2e relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      e2e:
                        - 'tests/**'
                        - 'js/**'
                        - 'src/**'
                        - 'controllers/**'
                        - 'lib/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'playwright.config.js'
                        - 'package.json'
                        - 'package-lock.json'
            - name: Setup PHP
              if: steps.changes.outputs.e2e == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Setup Node
              if: steps.changes.outputs.e2e == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install Node Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: npm ci
            - name: Cache Playwright Browsers
              if: steps.changes.outputs.e2e == 'true'
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-
            - name: Install Playwright Browsers
              if: steps.changes.outputs.e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
            - name: Run Playwright Tests (non-critical report)
              if: steps.changes.outputs.e2e == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p verification/ci

                  mapfile -t spec_files < <(find tests -name "*.spec.js" \
                    ! -name "calendar-google-contract.spec.js" \
                    ! -name "phase2-calendar-consistency.spec.js" \
                    ! -name "funnel-event-api.spec.js" \
                    ! -name "funnel-retention-admin.spec.js" \
                    ! -name "funnel-tracking.spec.js" \
                    ! -name "payments-card-booking.spec.js" | sort)

                  if [ "${#spec_files[@]}" -eq 0 ]; then
                    echo "NONCRITICAL_E2E_STATUS=skipped" >> "$GITHUB_ENV"
                    echo "NONCRITICAL_E2E_EXIT_CODE=0" >> "$GITHUB_ENV"
                    printf 'No non-critical Playwright specs were found for this diff.\n' > verification/ci/noncritical-e2e-summary.txt
                    exit 0
                  fi

                  set +e
                  npx playwright test --grep-invert "@visual" "${spec_files[@]}"
                  status=$?
                  set -e

                  echo "NONCRITICAL_E2E_EXIT_CODE=$status" >> "$GITHUB_ENV"
                  if [ "$status" -eq 0 ]; then
                    echo "NONCRITICAL_E2E_STATUS=passed" >> "$GITHUB_ENV"
                    printf 'Non-critical Playwright suite passed.\n' > verification/ci/noncritical-e2e-summary.txt
                    exit 0
                  fi

                  echo "NONCRITICAL_E2E_STATUS=warning" >> "$GITHUB_ENV"
                  printf 'Non-critical Playwright suite reported failures (exit %s). Critical release gates remain enforced by the blocking e2e-tests job.\n' "$status" > verification/ci/noncritical-e2e-summary.txt
                  echo "::warning::Non-critical Playwright suite reported failures (exit $status). Critical release gates remain enforced by e2e-tests."
              env:
                  TEST_LOCAL_SERVER: php
                  AURORADERM_ADMIN_PASSWORD: test-ci-admin-password
                  PIELARMONIA_ADMIN_PASSWORD: test-ci-admin-password
            - name: Publish non-critical summary
              if: always() && steps.changes.outputs.e2e == 'true'
              shell: bash
              run: |
                  {
                    echo "## Non-critical Playwright report"
                    cat verification/ci/noncritical-e2e-summary.txt
                    echo
                    echo "- status: ${NONCRITICAL_E2E_STATUS:-unknown}"
                    echo "- exit code: ${NONCRITICAL_E2E_EXIT_CODE:-unknown}"
                    echo "- blocking release gates: lint, security, unit-tests, e2e-tests, c1-exit-gate"
                  } >> "$GITHUB_STEP_SUMMARY"
            - name: Skip non-critical report (no relevant changes)
              if: steps.changes.outputs.e2e != 'true'
              run: |
                  echo "Skipping e2e-noncritical-report: no relevant source/test changes detected."
            - uses: actions/upload-artifact@v4
              if: always() && steps.changes.outputs.e2e == 'true'
              with:
                  name: playwright-report-noncritical
                  path: playwright-report/
                  if-no-files-found: ignore
                  retention-days: 30

    c1-exit-gate:
        runs-on: ubuntu-latest
        needs: [lint, security, unit-tests, e2e-tests]
        timeout-minutes: 20
        env:
            C1_EXIT_BASE_URL: ${{ vars.STAGING_URL || 'https://staging.pielarmonia.com' }}
            C1_EXIT_FALLBACK_BASE_URL: ${{ vars.PROD_URL || 'https://pielarmonia.com' }}
            C1_EXIT_FIGO_CONTRACT_PATH: ${{ vars.C1_EXIT_FIGO_CONTRACT_PATH || '/figo-chat.php' }}
            C1_EXIT_CHAT_SMOKE_PATH: ${{ vars.C1_EXIT_CHAT_SMOKE_PATH || '/api/chat' }}
            C1_EXIT_CHAT_SMOKE_FALLBACK_PATH: ${{ vars.C1_EXIT_CHAT_SMOKE_FALLBACK_PATH || '/figo-chat.php' }}
            C1_EXIT_FIGO_P95_MS: ${{ vars.C1_EXIT_FIGO_P95_MS || '3000' }}
            C1_EXIT_FIGO_LATENCY_SAMPLES: ${{ vars.C1_EXIT_FIGO_LATENCY_SAMPLES || '6' }}
        steps:
            - uses: actions/checkout@v4
            - name: Detect C1 gate relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      c1_exit:
                        - 'figo-chat.php'
                        - 'check-ai-response.php'
                        - 'controllers/**'
                        - 'lib/**'
                        - 'tests/figo-chat-contract.spec.js'
                        - 'GATE-POSTDEPLOY.ps1'
                        - '.github/workflows/ci.yml'
                        - 'package.json'
                        - 'package-lock.json'
                        - 'playwright.config.js'
            - name: Setup Node
              if: steps.changes.outputs.c1_exit == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install Node Dependencies
              if: steps.changes.outputs.c1_exit == 'true'
              run: npm ci
            - name: Cache Playwright Browsers
              if: steps.changes.outputs.c1_exit == 'true'
              id: playwright-cache-c1
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-
            - name: Install Playwright Browsers
              if: steps.changes.outputs.c1_exit == 'true' && steps.playwright-cache-c1.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
            - name: Resolve effective C1 base URL
              if: steps.changes.outputs.c1_exit == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  candidate="${C1_EXIT_BASE_URL%/}"
                  fallback="${C1_EXIT_FALLBACK_BASE_URL%/}"

                  host_for() {
                    node -e "const u=new URL(process.argv[1]);process.stdout.write(u.hostname);" "$1"
                  }

                  candidate_host="$(host_for "$candidate")"
                  if getent hosts "$candidate_host" >/dev/null 2>&1; then
                    echo "EFFECTIVE_C1_EXIT_BASE_URL=$candidate" >> "$GITHUB_ENV"
                    echo "Using staging C1 base URL: $candidate"
                    exit 0
                  fi

                  fallback_host="$(host_for "$fallback")"
                  if ! getent hosts "$fallback_host" >/dev/null 2>&1; then
                    echo "::error::No se pudo resolver staging ($candidate_host) ni fallback ($fallback_host)."
                    exit 1
                  fi

                  echo "::warning::Staging no resuelve ($candidate_host); usando fallback para C1 gate: $fallback"
                  echo "EFFECTIVE_C1_EXIT_BASE_URL=$fallback" >> "$GITHUB_ENV"
            - name: Run C1 Figo contract gate (staging)
              if: steps.changes.outputs.c1_exit == 'true'
              run: npm run test:figo-contract
              env:
                  TEST_BASE_URL: ${{ env.EFFECTIVE_C1_EXIT_BASE_URL }}
                  TEST_FIGO_CHAT_ENDPOINT_PATH: ${{ env.C1_EXIT_FIGO_CONTRACT_PATH }}
                  TEST_FIGO_CHAT_LATENCY: 'true'
                  TEST_FIGO_CHAT_LATENCY_P95_MS: ${{ env.C1_EXIT_FIGO_P95_MS }}
                  TEST_FIGO_CHAT_LATENCY_SAMPLES: ${{ env.C1_EXIT_FIGO_LATENCY_SAMPLES }}
            - name: Smoke chat endpoint on staging
              if: steps.changes.outputs.c1_exit == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  base_url="${EFFECTIVE_C1_EXIT_BASE_URL%/}"
                  primary_path="${C1_EXIT_CHAT_SMOKE_PATH}"
                  fallback_path="${C1_EXIT_CHAT_SMOKE_FALLBACK_PATH}"
                  tmp_primary="$(mktemp)"
                  tmp_fallback="$(mktemp)"
                  cleanup() {
                    rm -f "$tmp_primary" "$tmp_fallback"
                  }
                  trap cleanup EXIT

                  fetch_status() {
                    local url="$1"
                    local out="$2"
                    curl -sS -L --max-time 20 --connect-timeout 8 -o "$out" -w "%{http_code}" "$url"
                  }

                  selected_path="$primary_path"
                  selected_file="$tmp_primary"
                  selected_status="$(fetch_status "${base_url}${primary_path}" "$tmp_primary" || true)"
                  if [ "$selected_status" = "404" ] || [ "$selected_status" = "405" ]; then
                    echo "Primary chat smoke endpoint ${primary_path} returned ${selected_status}; trying fallback ${fallback_path}."
                    selected_path="$fallback_path"
                    selected_file="$tmp_fallback"
                    selected_status="$(fetch_status "${base_url}${fallback_path}" "$tmp_fallback" || true)"
                  fi

                  if [ "$selected_status" != "200" ]; then
                    echo "::error::C1 chat smoke failed for ${selected_path} (HTTP ${selected_status})"
                    if [ -s "$selected_file" ]; then
                      echo "Body preview:"
                      head -c 500 "$selected_file" || true
                      echo
                    fi
                    exit 1
                  fi

                  node - "$selected_file" "$selected_path" <<'NODE'
                  const fs = require('node:fs');
                  const file = process.argv[2];
                  const path = process.argv[3];
                  const raw = fs.readFileSync(file, 'utf8');
                  let payload;
                  try {
                    payload = JSON.parse(raw);
                  } catch (error) {
                    console.error(`Smoke ${path}: respuesta no JSON valida`);
                    console.error(raw.slice(0, 500));
                    process.exit(1);
                  }
                  if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
                    console.error(`Smoke ${path}: payload no es objeto JSON`);
                    process.exit(1);
                  }
                  const hasExpectedShape =
                    payload.service === 'figo-chat' ||
                    typeof payload.mode === 'string' ||
                    typeof payload.ok === 'boolean' ||
                    typeof payload.providerMode === 'string';
                  if (!hasExpectedShape) {
                    console.error(`Smoke ${path}: payload sin shape esperada de chat`);
                    console.error(JSON.stringify(payload).slice(0, 500));
                    process.exit(1);
                  }
                  console.log(`Smoke ${path}: OK`);
                  NODE
            - name: Skip C1 exit gate (no relevant changes)
              if: steps.changes.outputs.c1_exit != 'true'
              run: |
                  echo "Skipping c1-exit-gate: no C1/Figo relevant changes detected."

    build:
        runs-on: ubuntu-latest
        needs: [lint, security, unit-tests, e2e-tests, c1-exit-gate]
        steps:
            - uses: actions/checkout@v4
            - name: Detect build relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      build:
                        - 'js/**'
                        - 'src/**'
                        - 'controllers/**'
                        - 'lib/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'rollup.config.mjs'
                        - 'package.json'
                        - 'package-lock.json'
                        - 'PREPARAR-PAQUETE-DESPLIEGUE.ps1'
            - name: Build Deploy Bundle
              if: steps.changes.outputs.build == 'true'
              shell: pwsh
              run: ./PREPARAR-PAQUETE-DESPLIEGUE.ps1
            - name: Verify production bundles strip debug logs
              if: steps.changes.outputs.build == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  has_forbidden=0

                  scan_path() {
                    local target="$1"
                    if [ ! -e "$target" ]; then
                      return 0
                    fi
                    if grep -RInE "console\.(log|debug|info)[[:space:]]*\(" "$target"; then
                      has_forbidden=1
                    fi
                    if grep -RInE "(^|[^[:alnum:]_])debugger([^[:alnum:]_]|$)" "$target"; then
                      has_forbidden=1
                    fi
                  }

                  scan_path "script.js"
                  scan_path "admin.js"
                  scan_path "js/chunks"
                  scan_path "js/admin-chunks"
                  scan_path "js/engines"

                  if [ "$has_forbidden" -ne 0 ]; then
                    echo "::error::Se detectaron console.log/debugger en bundles de produccion generados."
                    exit 1
                  fi

                  echo "Production bundle debug-strip verification OK."
            - name: Upload Build Artifact
              if: steps.changes.outputs.build == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: deploy-bundle
                  path: _deploy_bundle/**/*.zip
                  if-no-files-found: error
            - name: Skip build (no relevant changes)
              if: steps.changes.outputs.build != 'true'
              run: |
                  echo "Skipping build: no deploy-bundle relevant changes detected."
