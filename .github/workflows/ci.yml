name: CI
# Triggered: 2026-02-20

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Lint JS
              run: npm run lint:js
            - name: Lint PHP
              run: npm run lint:php
            - name: Validate Plan Operativo anti-loop
              run: php bin/validate-plan-operativo.php
            - name: Lint Prometheus Config
              run: |
                  docker run --rm \
                    -v $(pwd)/prometheus.docker.yml:/etc/prometheus/prometheus.yml \
                    -v $(pwd)/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml \
                    --entrypoint promtool \
                    prom/prometheus:latest \
                    check config /etc/prometheus/prometheus.yml

    security:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              run: composer install --prefer-dist --no-progress
            - name: Run Psalm Static Analysis
              run: vendor/bin/psalm --no-cache
            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  format: 'table'
                  exit-code: '1'
                  ignore-unfixed: true
                  vuln-type: 'os,library'
                  severity: 'CRITICAL,HIGH'

    unit-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
                  coverage: pcov
            - name: Install Composer Dependencies
              run: composer install --prefer-dist --no-progress
            - name: Run PHPUnit with Coverage
              run: vendor/bin/phpunit --coverage-text --coverage-clover coverage.xml
            - name: Run Legacy PHP Tests
              run: npm run test:php
            - name: Upload Coverage Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: code-coverage
                  path: coverage.xml
                  retention-days: 14

    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Detect e2e relevant changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      e2e:
                        - 'tests/**'
                        - 'js/**'
                        - 'src/**'
                        - 'controllers/**'
                        - 'lib/**'
                        - '*.php'
                        - '*.html'
                        - '*.css'
                        - 'playwright.config.js'
                        - 'package.json'
                        - 'package-lock.json'
            - name: Setup PHP
              if: steps.changes.outputs.e2e == 'true'
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer:v2
            - name: Install Composer Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: composer install --prefer-dist --no-progress
            - name: Setup Node
              if: steps.changes.outputs.e2e == 'true'
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
            - name: Install Node Dependencies
              if: steps.changes.outputs.e2e == 'true'
              run: npm ci
            - name: Cache Playwright Browsers
              if: steps.changes.outputs.e2e == 'true'
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-playwright-
            - name: Install Playwright Browsers
              if: steps.changes.outputs.e2e == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium
            - name: Run Critical Agenda Gate
              if: steps.changes.outputs.e2e == 'true'
              run: npm run test:critical:agenda
              env:
                  TEST_LOCAL_SERVER: php
                  PIELARMONIA_ADMIN_PASSWORD: admin123
                  TEST_ENABLE_CALENDAR_WRITE: 'false'
            - name: Run Critical Funnel Gate
              if: steps.changes.outputs.e2e == 'true'
              run: npm run test:critical:funnel
              env:
                  TEST_LOCAL_SERVER: php
                  PIELARMONIA_ADMIN_PASSWORD: admin123
            - name: Run Playwright Tests (non-critical)
              if: steps.changes.outputs.e2e == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  mapfile -t spec_files < <(find tests -name "*.spec.js" \
                    ! -name "calendar-google-contract.spec.js" \
                    ! -name "phase2-calendar-consistency.spec.js" \
                    ! -name "funnel-event-api.spec.js" \
                    ! -name "funnel-retention-admin.spec.js" \
                    ! -name "funnel-tracking.spec.js" | sort)

                  if [ "${#spec_files[@]}" -eq 0 ]; then
                    echo "::error::No se encontraron specs no criticos para Playwright."
                    exit 1
                  fi

                  npx playwright test --grep-invert "@visual" "${spec_files[@]}"
              env:
                  TEST_LOCAL_SERVER: php
                  PIELARMONIA_ADMIN_PASSWORD: admin123
            - name: Skip e2e (no relevant changes)
              if: steps.changes.outputs.e2e != 'true'
              run: |
                  echo "Skipping e2e-tests: no relevant source/test changes detected."
            - uses: actions/upload-artifact@v4
              if: always() && steps.changes.outputs.e2e == 'true'
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    build:
        runs-on: ubuntu-latest
        needs: [lint, security, unit-tests, e2e-tests]
        steps:
            - uses: actions/checkout@v4
            - name: Build Deploy Bundle
              shell: pwsh
              run: ./PREPARAR-PAQUETE-DESPLIEGUE.ps1
            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: deploy-bundle
                  path: _deploy_bundle/**/*.zip
                  if-no-files-found: error
