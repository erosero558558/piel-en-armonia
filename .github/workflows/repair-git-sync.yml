name: Repair Git Sync (Self-Heal)

on:
    workflow_run:
        workflows:
            - Post-Deploy Gate (Full Regression)
            - Post-Deploy Gate (Git Sync)
        types:
            - completed
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            repo_dir:
                description: 'Ruta remota del repo (opcional, auto-discovery si vacio)'
                required: false
                default: ''
                type: string
            branch:
                description: 'Branch objetivo'
                required: false
                default: 'main'
                type: string

concurrency:
    group: repair-git-sync-main
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    repair:
        name: Repair git sync on server
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && contains(fromJSON('["failure","timed_out","action_required","startup_failure"]'), github.event.workflow_run.conclusion) && github.event.workflow_run.head_branch == 'main') }}
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || vars.PROD_URL || 'https://pielarmonia.com' }}
            TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}
            SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST || secrets.FTP_SERVER || vars.FTP_SERVER || '' }}
            SSH_PORT: ${{ vars.SSH_PORT || '22' }}
            SSH_USERNAME: ${{ secrets.SSH_USERNAME || vars.SSH_USERNAME || secrets.FTP_USERNAME || vars.FTP_USERNAME || '' }}
            SSH_PASSWORD: ${{ secrets.SSH_PASSWORD || vars.SSH_PASSWORD || secrets.FTP_PASSWORD || vars.FTP_PASSWORD || '' }}
            SSH_REPO_DIR: ${{ github.event.inputs.repo_dir || vars.SSH_REPO_DIR || '/var/www/figo' }}
            REPO_GIT_URL: https://github.com/erosero558558/piel-en-armonia.git
            TELEMEDICINE_REPAIR_STATUS: unknown
            TELEMEDICINE_REPAIR_REASON: not_evaluated
            TELEMEDICINE_REPAIR_FAILURES: -1
            TELEMEDICINE_REPAIR_NON_TELE_FAILURES: -1

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Mostrar contexto de disparo
              shell: bash
              run: |
                  echo "event=${{ github.event_name }}"
                  if [ "${{ github.event_name }}" = "workflow_run" ]; then
                    echo "trigger_workflow=${{ github.event.workflow_run.name }}"
                    echo "trigger_conclusion=${{ github.event.workflow_run.conclusion }}"
                    echo "trigger_head_branch=${{ github.event.workflow_run.head_branch }}"
                    echo "trigger_head_sha=${{ github.event.workflow_run.head_sha }}"
                  fi

            - name: Validar credenciales SSH
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${SSH_HOST}" ]; then
                    echo "::error::Falta SSH_HOST (o FTP_SERVER)."
                    exit 1
                  fi
                  if [ -z "${SSH_USERNAME}" ]; then
                    echo "::error::Falta SSH_USERNAME (o FTP_USERNAME)."
                    exit 1
                  fi
                  if [ -z "${SSH_PASSWORD}" ]; then
                    echo "::error::Falta SSH_PASSWORD (o FTP_PASSWORD)."
                    exit 1
                  fi

            - name: Forzar sincronizacion git remota
              id: ssh_repair
              continue-on-error: true
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ env.SSH_HOST }}
                  username: ${{ env.SSH_USERNAME }}
                  password: ${{ env.SSH_PASSWORD }}
                  port: ${{ env.SSH_PORT }}
                  script_stop: true
                  timeout: 120s
                  command_timeout: 15m
                  script: |
                      set -eu
                      BRANCH="${TARGET_BRANCH}"
                      REPO_URL="${REPO_GIT_URL}"
                      REPO_HINT="${SSH_REPO_DIR}"
                      TARGET_REPO=""

                      normalize_url() {
                        echo "$1" | sed -e 's#^git@github.com:#https://github.com/#' -e 's#\.git$##'
                      }

                      matches_repo() {
                        candidate="$1"
                        remote_url="$(git -C "$candidate" remote get-url origin 2>/dev/null || true)"
                        if [ -z "$remote_url" ]; then
                          return 1
                        fi
                        n1="$(normalize_url "$remote_url")"
                        n2="$(normalize_url "$REPO_URL")"
                        [ "$n1" = "$n2" ]
                      }

                      if [ -n "$REPO_HINT" ] && [ -d "$REPO_HINT/.git" ]; then
                        if matches_repo "$REPO_HINT"; then
                          TARGET_REPO="$REPO_HINT"
                        fi
                      fi

                      if [ -z "$TARGET_REPO" ]; then
                        SEARCH_BASES="$HOME /var/www /srv /opt /www /home"
                        for base in $SEARCH_BASES; do
                          [ -d "$base" ] || continue
                          for gitdir in $(find "$base" -maxdepth 6 -type d -name .git 2>/dev/null || true); do
                            candidate="${gitdir%/.git}"
                            if matches_repo "$candidate"; then
                              TARGET_REPO="$candidate"
                              break 2
                            fi
                          done
                        done
                      fi

                      if [ -z "$TARGET_REPO" ]; then
                        echo "No se encontro repo objetivo en el servidor."
                        exit 2
                      fi

                      echo "Repo detectado: $TARGET_REPO"
                      git -C "$TARGET_REPO" remote -v
                      git -C "$TARGET_REPO" fetch --prune origin
                      git -C "$TARGET_REPO" checkout -f "$BRANCH"
                      git -C "$TARGET_REPO" reset --hard "origin/$BRANCH"
                      git -C "$TARGET_REPO" clean -fd \
                        -e vendor/ \
                        -e data/ \
                        -e uploads/ \
                        -e env.php \
                        -e .env \
                        -e '*.log'
                      if [ ! -f "$TARGET_REPO/vendor/autoload.php" ]; then
                        if command -v composer >/dev/null 2>&1; then
                          echo "vendor/autoload.php ausente: ejecutando composer install..."
                          composer -d "$TARGET_REPO" install --no-dev --prefer-dist --optimize-autoloader --no-interaction
                        else
                          echo "WARN: composer no disponible y vendor/autoload.php ausente."
                        fi
                      fi
                      echo "HEAD remoto sincronizado:"
                      git -C "$TARGET_REPO" rev-parse --short HEAD
                      git -C "$TARGET_REPO" log -1 --format="%h %ci %s"

            - name: Reportar estado del repair SSH
              if: ${{ always() }}
              shell: bash
              run: |
                  if [ "${{ steps.ssh_repair.outcome }}" = "success" ]; then
                    echo "[OK] Repair SSH ejecutado correctamente."
                  else
                    echo "::warning::Repair SSH fallo (timeout o conectividad). Continuando con verify/smoke para validar estado real."
                  fi

            - name: Esperar propagacion de cache
              shell: bash
              run: sleep 35

            - name: Verificar produccion despues de repair
              id: verify_after_repair
              shell: pwsh
              run: |
                  ./VERIFICAR-DESPLIEGUE.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -AssetHashRetryCount 3 `
                    -AssetHashRetryDelaySec 6

            - name: Smoke rapido post-repair
              id: smoke_post_repair
              if: ${{ always() }}
              shell: pwsh
              run: |
                  ./SMOKE-PRODUCCION.ps1 -Domain $env:TARGET_DOMAIN -AllowFigoRateLimit

            - name: Evaluar estado telemedicina post-repair
              if: ${{ always() }}
              id: telemedicine_repair
              shell: bash
              env:
                  HEALTH_FILE: /tmp/health-repair.json
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
              run: |
                  set -euo pipefail
                  if ! curl -fsS "${TARGET_DOMAIN}/api.php?resource=health" > "${HEALTH_FILE}"; then
                    echo "No se pudo refrescar health; se reporta estado telemedicina unknown."
                  fi
                  node <<'NODE'
                  const fs = require('node:fs');

                  const healthPath = process.env.HEALTH_FILE || '/tmp/health-repair.json';
                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function countNonTeleFailures(outcomes) {
                    return outcomes.reduce((count, value) => {
                      if (!value) return count;
                      const normalized = String(value).trim().toLowerCase();
                      if (!normalized || normalized === 'success' || normalized === 'skipped' || normalized === 'n/a') {
                        return count;
                      }
                      return count + 1;
                    }, 0);
                  }

                  function publish(snapshot) {
                    append(outputPath, 'telemedicine_status', snapshot.status);
                    append(outputPath, 'telemedicine_reason', snapshot.reason);
                    append(outputPath, 'telemedicine_failures', snapshot.failures);
                    append(outputPath, 'telemedicine_non_tele_failures', snapshot.nonTeleFailures);
                    append(outputPath, 'telemedicine_configured', snapshot.configured);
                    append(outputPath, 'telemedicine_diagnostics_status', snapshot.diagnosticsStatus);
                    append(outputPath, 'telemedicine_hard_failures', snapshot.hardFailures);

                    append(envPath, 'TELEMEDICINE_REPAIR_STATUS', snapshot.status);
                    append(envPath, 'TELEMEDICINE_REPAIR_REASON', snapshot.reason);
                    append(envPath, 'TELEMEDICINE_REPAIR_FAILURES', snapshot.failures);
                    append(
                      envPath,
                      'TELEMEDICINE_REPAIR_NON_TELE_FAILURES',
                      snapshot.nonTeleFailures
                    );
                  }

                  const fallback = {
                    status: 'unknown',
                    reason: 'health_unavailable',
                    failures: '-1',
                    nonTeleFailures: String(
                      countNonTeleFailures([
                        process.env.SSH_REPAIR_OUTCOME,
                        process.env.VERIFY_OUTCOME,
                        process.env.SMOKE_OUTCOME,
                      ])
                    ),
                    configured: 'false',
                    diagnosticsStatus: 'unknown',
                    hardFailures: '-1',
                  };

                  try {
                    if (!fs.existsSync(healthPath)) {
                      publish(fallback);
                      process.exit(0);
                    }

                    const raw = fs.readFileSync(healthPath, 'utf8');
                    const parsed = JSON.parse(raw);
                    const telemedicine = parsed?.checks?.telemedicine;
                    if (!telemedicine || typeof telemedicine !== 'object') {
                      publish({ ...fallback, reason: 'telemedicine_missing' });
                      process.exit(0);
                    }

                    const configured = telemedicine?.configured === true;
                    const diagnosticsStatus = String(
                      telemedicine?.diagnostics?.status || 'unknown'
                    );
                    const hardFailuresRaw = Number(telemedicine?.integrity?.hardFailures ?? 0);
                    const hardFailures = Number.isFinite(hardFailuresRaw)
                      ? Math.max(0, Math.trunc(hardFailuresRaw))
                      : -1;

                    const reasons = [];
                    let failures = 0;
                    if (!configured) {
                      reasons.push('not_configured');
                      failures += 1;
                    }
                    if (diagnosticsStatus === 'critical') {
                      reasons.push('diagnostics_critical');
                      failures += 1;
                    }
                    if (hardFailures < 0) {
                      reasons.push('hard_failures_invalid');
                      failures += 1;
                    } else if (hardFailures > 0) {
                      reasons.push(`hard_failures:${hardFailures}`);
                      failures += hardFailures;
                    }

                    const degraded = reasons.length > 0;
                    const status = degraded ? 'degraded' : 'healthy';
                    const reason = degraded ? reasons.join(';') : 'ok';
                    publish({
                      status,
                      reason,
                      failures: String(failures),
                      nonTeleFailures: String(
                        countNonTeleFailures([
                          process.env.SSH_REPAIR_OUTCOME,
                          process.env.VERIFY_OUTCOME,
                          process.env.SMOKE_OUTCOME,
                        ])
                      ),
                      configured: configured ? 'true' : 'false',
                      diagnosticsStatus,
                      hardFailures: String(hardFailures),
                    });
                  } catch (error) {
                    publish({
                      ...fallback,
                      reason: `health_parse_error:${error && error.name ? error.name : 'unknown'}`,
                    });
                  }
                  NODE

            - name: Crear/actualizar incidente telemedicina de repair
              if: ${{ always() && github.event_name != 'workflow_dispatch' && (env.TELEMEDICINE_REPAIR_STATUS == 'degraded' || env.TELEMEDICINE_REPAIR_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_REPAIR_STATUS: ${{ env.TELEMEDICINE_REPAIR_STATUS }}
                  TELEMEDICINE_REPAIR_REASON: ${{ env.TELEMEDICINE_REPAIR_REASON }}
                  TELEMEDICINE_REPAIR_FAILURES: ${{ env.TELEMEDICINE_REPAIR_FAILURES }}
                  TELEMEDICINE_REPAIR_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync telemedicina degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `status:${process.env.TELEMEDICINE_REPAIR_STATUS || 'unknown'}|reason:${process.env.TELEMEDICINE_REPAIR_REASON || 'unknown'}|failures:${process.env.TELEMEDICINE_REPAIR_FAILURES || '-1'}|non_tele:${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`;
                      const signalMarker = `<!-- repair-git-sync-telemedicine-signal:${signal} -->`;
                      const reason = String(process.env.TELEMEDICINE_REPAIR_REASON || '');
                      const severity = (
                        reason.includes('diagnostics_critical') ||
                        reason.includes('hard_failures:') ||
                        reason.includes('hard_failures_invalid') ||
                        reason.includes('health_unavailable') ||
                        reason.includes('health_parse_error') ||
                        reason.includes('telemedicine_missing') ||
                        reason.includes('not_configured')
                      )
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'repair-git-sync', 'telemedicine', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` detecto degradacion telemedicina tras repair.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'unknown'}`,
                        `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'unknown'}`,
                        `- telemedicine_repair_failures: ${process.env.TELEMEDICINE_REPAIR_FAILURES || '-1'}`,
                        `- telemedicine_repair_non_tele_failures: ${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`,
                        `- domain: ${process.env.TARGET_DOMAIN || 'https://pielarmonia.com'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue repair-git-sync telemedicina actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue repair-git-sync telemedicina ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente repair-git-sync telemedicina actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'unknown'}`,
                            `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'unknown'}`,
                            `- telemedicine_repair_failures: ${process.env.TELEMEDICINE_REPAIR_FAILURES || '-1'}`,
                            `- telemedicine_repair_non_tele_failures: ${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`
                          ].join('\n')
                        });
                        core.info(`Issue repair-git-sync telemedicina actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue repair-git-sync telemedicina creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente telemedicina de repair al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' && env.TELEMEDICINE_REPAIR_STATUS == 'healthy' }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_REPAIR_STATUS: ${{ env.TELEMEDICINE_REPAIR_STATUS }}
                  TELEMEDICINE_REPAIR_REASON: ${{ env.TELEMEDICINE_REPAIR_REASON }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync telemedicina degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente telemedicina de repair abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por workflow de repair git sync (telemedicina).',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'healthy'}`,
                          `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'ok'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue repair-git-sync telemedicina cerrado: #${existing.number}`);

            - name: Crear/actualizar incidente de repair
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && ((env.TELEMEDICINE_REPAIR_STATUS != 'degraded' && env.TELEMEDICINE_REPAIR_STATUS != 'unknown') || env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES != '0') }}
              uses: actions/github-script@v7
              env:
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
                  TELEMEDICINE_REPAIR_STATUS: ${{ env.TELEMEDICINE_REPAIR_STATUS }}
                  TELEMEDICINE_REPAIR_REASON: ${{ env.TELEMEDICINE_REPAIR_REASON }}
                  TELEMEDICINE_REPAIR_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` fallo.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- ssh_repair: ${process.env.SSH_REPAIR_OUTCOME || 'n/a'}`,
                        `- verify_after_repair: ${process.env.VERIFY_OUTCOME || 'n/a'}`,
                        `- smoke_post_repair: ${process.env.SMOKE_OUTCOME || 'n/a'}`,
                        `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'n/a'}`,
                        `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'n/a'}`,
                        `- telemedicine_repair_non_tele_failures: ${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`
                      ].join('\n');

                      const verifyOnlyHashDrift = process.env.VERIFY_OUTCOME === 'failure' && process.env.SMOKE_OUTCOME === 'success';
                      const bodyWithHint = verifyOnlyHashDrift
                        ? `${body}\n\nDiagnostico inicial: verify fallo pero smoke paso. Posible drift de assets/hash o sincronizacion parcial, no necesariamente outage de aplicacion.`
                        : body;

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: bodyWithHint
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert']
                        });
                      } else {
                        await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: bodyWithHint,
                          labels: ['production-alert']
                        });
                      }

            - name: Cerrar incidente de repair al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por workflow de repair git sync.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);

            - name: Repair summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Repair git sync";
                    echo "- target_domain: \`${TARGET_DOMAIN}\`";
                    echo "- trigger: \`${{ github.event_name }}\`";
                    echo "- ssh_repair_outcome: \`${{ steps.ssh_repair.outcome }}\`";
                    echo "- verify_after_repair_outcome: \`${{ steps.verify_after_repair.outcome }}\`";
                    echo "- smoke_post_repair_outcome: \`${{ steps.smoke_post_repair.outcome }}\`";
