name: Repair Git Sync (Self-Heal)

on:
    workflow_run:
        workflows:
            - Post-Deploy Gate (Full Regression)
            - Post-Deploy Gate (Git Sync)
        types:
            - completed
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            repo_dir:
                description: 'Ruta remota del repo (opcional, auto-discovery si vacio)'
                required: false
                default: ''
                type: string
            branch:
                description: 'Branch objetivo'
                required: false
                default: 'main'
                type: string
            dispatch_transport_fallback:
                description: 'Disparar deploy-hosting por transporte si el repair detecta host vivo pero desactualizado'
                required: false
                default: false
                type: boolean
            dispatch_self_hosted_fallback:
                description: 'Disparar deploy-frontend-selfhosted si el repair detecta host vivo pero desactualizado'
                required: false
                default: false
                type: boolean

concurrency:
    group: repair-git-sync-main
    cancel-in-progress: true

permissions:
    contents: read
    actions: write
    issues: write

jobs:
    repair:
        name: Repair git sync on server
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && contains(fromJSON('["failure","timed_out","action_required","startup_failure"]'), github.event.workflow_run.conclusion) && github.event.workflow_run.head_branch == 'main') }}
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || vars.PROD_URL || 'https://pielarmonia.com' }}
            TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}
            SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST || secrets.FTP_SERVER || vars.FTP_SERVER || '' }}
            SSH_PORT: ${{ vars.SSH_PORT || '22' }}
            SSH_USERNAME: ${{ secrets.SSH_USERNAME || vars.SSH_USERNAME || secrets.FTP_USERNAME || vars.FTP_USERNAME || '' }}
            SSH_PASSWORD: ${{ secrets.SSH_PASSWORD || vars.SSH_PASSWORD || secrets.FTP_PASSWORD || vars.FTP_PASSWORD || '' }}
            SSH_REPO_DIR: ${{ github.event.inputs.repo_dir || vars.SSH_REPO_DIR || '/var/www/figo' }}
            REPO_GIT_URL: https://github.com/erosero558558/piel-en-armonia.git
            PUBLIC_SYNC_HOST_WRAPPER_PATH: /root/sync-pielarmonia.sh
            PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH: bin/deploy-public-v3-cron-sync.sh
            HOST_CRON_WRAPPER_SYNC_STATE: not_evaluated
            HOST_CRON_WRAPPER_SYNC_REASON: not_evaluated
            HOST_CRON_WRAPPER_PATH: /root/sync-pielarmonia.sh
            HOST_CRON_WRAPPER_SOURCE: ''
            TELEMEDICINE_REPAIR_STATUS: unknown
            TELEMEDICINE_REPAIR_REASON: not_evaluated
            TELEMEDICINE_REPAIR_FAILURES: -1
            TELEMEDICINE_REPAIR_NON_TELE_FAILURES: -1
            DISPATCH_TRANSPORT_FALLBACK_INPUT: ${{ github.event.inputs.dispatch_transport_fallback || 'false' }}
            AUTO_TRANSPORT_FALLBACK_AUTOMATION: ${{ vars.AUTO_TRANSPORT_FALLBACK_FROM_REPAIR || 'false' }}
            DISPATCH_SELF_HOSTED_FALLBACK_INPUT: ${{ github.event.inputs.dispatch_self_hosted_fallback || 'false' }}
            AUTO_SELF_HOSTED_FALLBACK_AUTOMATION: ${{ vars.AUTO_SELF_HOSTED_FALLBACK_FROM_REPAIR || 'false' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Mostrar contexto de disparo
              shell: bash
              run: |
                  echo "event=${{ github.event_name }}"
                  if [ "${{ github.event_name }}" = "workflow_run" ]; then
                    echo "trigger_workflow=${{ github.event.workflow_run.name }}"
                    echo "trigger_conclusion=${{ github.event.workflow_run.conclusion }}"
                    echo "trigger_head_branch=${{ github.event.workflow_run.head_branch }}"
                    echo "trigger_head_sha=${{ github.event.workflow_run.head_sha }}"
                  fi

            - name: Validar credenciales SSH
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${SSH_HOST}" ]; then
                    echo "::error::Falta SSH_HOST (o FTP_SERVER)."
                    exit 1
                  fi
                  if [ -z "${SSH_USERNAME}" ]; then
                    echo "::error::Falta SSH_USERNAME (o FTP_USERNAME)."
                    exit 1
                  fi
                  if [ -z "${SSH_PASSWORD}" ]; then
                    echo "::error::Falta SSH_PASSWORD (o FTP_PASSWORD)."
                    exit 1
                  fi

            - name: Instalar sshpass para repair SSH
              shell: bash
              run: |
                  set -euo pipefail
                  if command -v sshpass >/dev/null 2>&1; then
                    echo "sshpass ya disponible."
                    exit 0
                  fi
                  sudo apt-get update
                  sudo apt-get install -y sshpass

            - name: Forzar sincronizacion git remota
              id: ssh_repair
              continue-on-error: true
              shell: bash
              run: |
                  set -euo pipefail

                  ssh_stdout_file="$(mktemp)"
                  ssh_stderr_file="$(mktemp)"
                  remote_script_file="$(mktemp)"

                  cleanup() {
                    rm -f "$ssh_stdout_file" "$ssh_stderr_file" "$remote_script_file"
                  }

                  trap cleanup EXIT

                  cat > "$remote_script_file" <<'REMOTE'
                  set -eu
                  BRANCH="${TARGET_BRANCH}"
                  REPO_URL="${REPO_GIT_URL}"
                  REPO_HINT="${SSH_REPO_DIR}"
                  TARGET_REPO=""
                  HOST_WRAPPER_PATH="${PUBLIC_SYNC_HOST_WRAPPER_PATH:-/root/sync-pielarmonia.sh}"
                  REPO_WRAPPER_RELATIVE_PATH="${PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH:-bin/deploy-public-v3-cron-sync.sh}"
                  REPO_WRAPPER_PATH=""
                  WRAPPER_SYNC_STATE="not_evaluated"
                  WRAPPER_SYNC_REASON="not_evaluated"

                  normalize_url() {
                    echo "$1" | sed -e 's#^git@github.com:#https://github.com/#' -e 's#\.git$##'
                  }

                  matches_repo() {
                    candidate="$1"
                    remote_url="$(git -C "$candidate" remote get-url origin 2>/dev/null || true)"
                    if [ -z "$remote_url" ]; then
                      return 1
                    fi
                    n1="$(normalize_url "$remote_url")"
                    n2="$(normalize_url "$REPO_URL")"
                    [ "$n1" = "$n2" ]
                  }

                  if [ -n "$REPO_HINT" ] && [ -d "$REPO_HINT/.git" ]; then
                    if matches_repo "$REPO_HINT"; then
                      TARGET_REPO="$REPO_HINT"
                    fi
                  fi

                  if [ -z "$TARGET_REPO" ]; then
                    SEARCH_BASES="$HOME /var/www /srv /opt /www /home"
                    for base in $SEARCH_BASES; do
                      [ -d "$base" ] || continue
                      for gitdir in $(find "$base" -maxdepth 6 -type d -name .git 2>/dev/null || true); do
                        candidate="${gitdir%/.git}"
                        if matches_repo "$candidate"; then
                          TARGET_REPO="$candidate"
                          break 2
                        fi
                      done
                    done
                  fi

                  if [ -z "$TARGET_REPO" ]; then
                    echo "No se encontro repo objetivo en el servidor."
                    exit 2
                  fi

                  echo "Repo detectado: $TARGET_REPO"
                  git -C "$TARGET_REPO" remote -v
                  git -C "$TARGET_REPO" fetch --prune origin
                  git -C "$TARGET_REPO" checkout -f "$BRANCH"
                  git -C "$TARGET_REPO" reset --hard "origin/$BRANCH"
                  git -C "$TARGET_REPO" clean -fd \
                    -e vendor/ \
                    -e data/ \
                    -e uploads/ \
                    -e env.php \
                    -e .env \
                    -e '*.log'
                  if [ ! -f "$TARGET_REPO/vendor/autoload.php" ]; then
                    if command -v composer >/dev/null 2>&1; then
                      echo "vendor/autoload.php ausente: ejecutando composer install..."
                      composer -d "$TARGET_REPO" install --no-dev --prefer-dist --optimize-autoloader --no-interaction
                    else
                      echo "WARN: composer no disponible y vendor/autoload.php ausente."
                    fi
                  fi
                  REPO_WRAPPER_PATH="$TARGET_REPO/$REPO_WRAPPER_RELATIVE_PATH"
                  if [ -f "$REPO_WRAPPER_PATH" ]; then
                    mkdir -p "$(dirname "$HOST_WRAPPER_PATH")"
                    if [ -f "$HOST_WRAPPER_PATH" ]; then
                      if cmp -s "$REPO_WRAPPER_PATH" "$HOST_WRAPPER_PATH"; then
                        WRAPPER_SYNC_STATE="already_aligned"
                        WRAPPER_SYNC_REASON="host_wrapper_matches_repo"
                      else
                        WRAPPER_SYNC_STATE="updated"
                        WRAPPER_SYNC_REASON="host_wrapper_replaced_from_repo"
                      fi
                    else
                      WRAPPER_SYNC_STATE="created"
                      WRAPPER_SYNC_REASON="host_wrapper_created_from_repo"
                    fi
                    install -m 0755 "$REPO_WRAPPER_PATH" "$HOST_WRAPPER_PATH"
                    echo "Wrapper cron host sincronizado: $HOST_WRAPPER_PATH <- $REPO_WRAPPER_PATH ($WRAPPER_SYNC_STATE)"
                  else
                    WRAPPER_SYNC_STATE="source_missing"
                    WRAPPER_SYNC_REASON="repo_wrapper_missing"
                    echo "WARN: wrapper canonico ausente en repo: $REPO_WRAPPER_PATH"
                  fi
                  echo "HEAD remoto sincronizado:"
                  git -C "$TARGET_REPO" rev-parse --short HEAD
                  git -C "$TARGET_REPO" log -1 --format="%h %ci %s"
                  printf '__REPAIR_META__ host_cron_wrapper_sync_state=%s\n' "$WRAPPER_SYNC_STATE"
                  printf '__REPAIR_META__ host_cron_wrapper_sync_reason=%s\n' "$WRAPPER_SYNC_REASON"
                  printf '__REPAIR_META__ host_cron_wrapper_path=%s\n' "$HOST_WRAPPER_PATH"
                  printf '__REPAIR_META__ host_cron_wrapper_source=%s\n' "$REPO_WRAPPER_PATH"
                  REMOTE

                  remote_command="$(
                    printf 'TARGET_BRANCH=%q REPO_GIT_URL=%q SSH_REPO_DIR=%q PUBLIC_SYNC_HOST_WRAPPER_PATH=%q PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH=%q bash -s' \
                      "$TARGET_BRANCH" \
                      "$REPO_GIT_URL" \
                      "$SSH_REPO_DIR" \
                      "$PUBLIC_SYNC_HOST_WRAPPER_PATH" \
                      "$PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH"
                  )"

                  set +e
                  sshpass -p "$SSH_PASSWORD" ssh \
                    -o StrictHostKeyChecking=no \
                    -o UserKnownHostsFile=/dev/null \
                    -o PreferredAuthentications=password \
                    -o PubkeyAuthentication=no \
                    -o ConnectTimeout=120 \
                    -p "$SSH_PORT" \
                    "$SSH_USERNAME@$SSH_HOST" \
                    "$remote_command" \
                    < "$remote_script_file" \
                    > "$ssh_stdout_file" \
                    2> "$ssh_stderr_file"
                  ssh_rc=$?
                  set -e

                  cat "$ssh_stdout_file"
                  if [ -s "$ssh_stderr_file" ]; then
                    cat "$ssh_stderr_file" >&2
                  fi

                  host_cron_wrapper_sync_state='unknown'
                  host_cron_wrapper_sync_reason='ssh_stdout_unavailable'
                  host_cron_wrapper_path="$PUBLIC_SYNC_HOST_WRAPPER_PATH"
                  host_cron_wrapper_source=''
                  if [ -s "$ssh_stdout_file" ]; then
                    host_cron_wrapper_sync_reason='not_reported'
                  fi

                  while IFS= read -r line; do
                    case "$line" in
                      '__REPAIR_META__ host_cron_wrapper_sync_state='*)
                        host_cron_wrapper_sync_state="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_cron_wrapper_sync_reason='*)
                        host_cron_wrapper_sync_reason="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_cron_wrapper_path='*)
                        host_cron_wrapper_path="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_cron_wrapper_source='*)
                        host_cron_wrapper_source="${line#*=}"
                        ;;
                    esac
                  done < "$ssh_stdout_file"

                  {
                    echo "host_cron_wrapper_sync_state=$host_cron_wrapper_sync_state"
                    echo "host_cron_wrapper_sync_reason=$host_cron_wrapper_sync_reason"
                    echo "host_cron_wrapper_path=$host_cron_wrapper_path"
                    echo "host_cron_wrapper_source=$host_cron_wrapper_source"
                  } >> "$GITHUB_OUTPUT"

                  {
                    echo "HOST_CRON_WRAPPER_SYNC_STATE=$host_cron_wrapper_sync_state"
                    echo "HOST_CRON_WRAPPER_SYNC_REASON=$host_cron_wrapper_sync_reason"
                    echo "HOST_CRON_WRAPPER_PATH=$host_cron_wrapper_path"
                    echo "HOST_CRON_WRAPPER_SOURCE=$host_cron_wrapper_source"
                  } >> "$GITHUB_ENV"

                  if [ "$ssh_rc" -ne 0 ]; then
                    exit "$ssh_rc"
                  fi

            - name: Reportar estado del repair SSH
              if: ${{ always() }}
              shell: bash
              run: |
                  if [ "${{ steps.ssh_repair.outcome }}" = "success" ]; then
                    echo "[OK] Repair SSH ejecutado correctamente."
                  else
                    echo "::warning::Repair SSH fallo (timeout o conectividad). Continuando con verify/smoke para validar estado real."
                  fi

            - name: Esperar propagacion de cache
              shell: bash
              run: sleep 35

            - name: Verificar produccion despues de repair
              id: verify_after_repair
              shell: pwsh
              run: |
                  ./VERIFICAR-DESPLIEGUE.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -AssetHashRetryCount 3 `
                    -AssetHashRetryDelaySec 6

            - name: Smoke rapido post-repair
              id: smoke_post_repair
              if: ${{ always() }}
              shell: pwsh
              run: |
                  ./SMOKE-PRODUCCION.ps1 -Domain $env:TARGET_DOMAIN -AllowFigoRateLimit

            - name: Evaluar estado telemedicina post-repair
              if: ${{ always() }}
              id: telemedicine_repair
              shell: bash
              env:
                  HEALTH_FILE: /tmp/health-repair.json
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
              run: |
                  set -euo pipefail
                  if ! curl -fsS "${TARGET_DOMAIN}/api.php?resource=health" > "${HEALTH_FILE}"; then
                    echo "No se pudo refrescar health; se reporta estado telemedicina unknown."
                  fi
                  node <<'NODE'
                  const fs = require('node:fs');

                  const healthPath = process.env.HEALTH_FILE || '/tmp/health-repair.json';
                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function countNonTeleFailures(outcomes) {
                    return outcomes.reduce((count, value) => {
                      if (!value) return count;
                      const normalized = String(value).trim().toLowerCase();
                      if (!normalized || normalized === 'success' || normalized === 'skipped' || normalized === 'n/a') {
                        return count;
                      }
                      return count + 1;
                    }, 0);
                  }

                  function publish(snapshot) {
                    append(outputPath, 'telemedicine_status', snapshot.status);
                    append(outputPath, 'telemedicine_reason', snapshot.reason);
                    append(outputPath, 'telemedicine_failures', snapshot.failures);
                    append(outputPath, 'telemedicine_non_tele_failures', snapshot.nonTeleFailures);
                    append(outputPath, 'telemedicine_configured', snapshot.configured);
                    append(outputPath, 'telemedicine_diagnostics_status', snapshot.diagnosticsStatus);
                    append(outputPath, 'telemedicine_hard_failures', snapshot.hardFailures);

                    append(envPath, 'TELEMEDICINE_REPAIR_STATUS', snapshot.status);
                    append(envPath, 'TELEMEDICINE_REPAIR_REASON', snapshot.reason);
                    append(envPath, 'TELEMEDICINE_REPAIR_FAILURES', snapshot.failures);
                    append(
                      envPath,
                      'TELEMEDICINE_REPAIR_NON_TELE_FAILURES',
                      snapshot.nonTeleFailures
                    );
                  }

                  const fallback = {
                    status: 'unknown',
                    reason: 'health_unavailable',
                    failures: '-1',
                    nonTeleFailures: String(
                      countNonTeleFailures([
                        process.env.SSH_REPAIR_OUTCOME,
                        process.env.VERIFY_OUTCOME,
                        process.env.SMOKE_OUTCOME,
                      ])
                    ),
                    configured: 'false',
                    diagnosticsStatus: 'unknown',
                    hardFailures: '-1',
                  };

                  try {
                    if (!fs.existsSync(healthPath)) {
                      publish(fallback);
                      process.exit(0);
                    }

                    const raw = fs.readFileSync(healthPath, 'utf8');
                    const parsed = JSON.parse(raw);
                    const telemedicine = parsed?.checks?.telemedicine;
                    if (!telemedicine || typeof telemedicine !== 'object') {
                      publish({ ...fallback, reason: 'telemedicine_missing' });
                      process.exit(0);
                    }

                    const configured = telemedicine?.configured === true;
                    const diagnosticsStatus = String(
                      telemedicine?.diagnostics?.status || 'unknown'
                    );
                    const hardFailuresRaw = Number(telemedicine?.integrity?.hardFailures ?? 0);
                    const hardFailures = Number.isFinite(hardFailuresRaw)
                      ? Math.max(0, Math.trunc(hardFailuresRaw))
                      : -1;

                    const reasons = [];
                    let failures = 0;
                    if (!configured) {
                      reasons.push('not_configured');
                      failures += 1;
                    }
                    if (diagnosticsStatus === 'critical') {
                      reasons.push('diagnostics_critical');
                      failures += 1;
                    }
                    if (hardFailures < 0) {
                      reasons.push('hard_failures_invalid');
                      failures += 1;
                    } else if (hardFailures > 0) {
                      reasons.push(`hard_failures:${hardFailures}`);
                      failures += hardFailures;
                    }

                    const degraded = reasons.length > 0;
                    const status = degraded ? 'degraded' : 'healthy';
                    const reason = degraded ? reasons.join(';') : 'ok';
                    publish({
                      status,
                      reason,
                      failures: String(failures),
                      nonTeleFailures: String(
                        countNonTeleFailures([
                          process.env.SSH_REPAIR_OUTCOME,
                          process.env.VERIFY_OUTCOME,
                          process.env.SMOKE_OUTCOME,
                        ])
                      ),
                      configured: configured ? 'true' : 'false',
                      diagnosticsStatus,
                      hardFailures: String(hardFailures),
                    });
                  } catch (error) {
                    publish({
                      ...fallback,
                      reason: `health_parse_error:${error && error.name ? error.name : 'unknown'}`,
                    });
                  }
                  NODE

            - name: Evaluar fallback de transporte post-repair
              if: ${{ always() }}
              id: transport_fallback
              shell: bash
              env:
                  VERIFY_REPORT_PATH: verification/last-deploy-verify.json
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
                  DISPATCH_EVENT_NAME: ${{ github.event_name }}
                  DISPATCH_TRANSPORT_FALLBACK_INPUT: ${{ env.DISPATCH_TRANSPORT_FALLBACK_INPUT }}
                  AUTO_TRANSPORT_FALLBACK_AUTOMATION: ${{ env.AUTO_TRANSPORT_FALLBACK_AUTOMATION }}
                  DISPATCH_SELF_HOSTED_FALLBACK_INPUT: ${{ env.DISPATCH_SELF_HOSTED_FALLBACK_INPUT }}
                  AUTO_SELF_HOSTED_FALLBACK_AUTOMATION: ${{ env.AUTO_SELF_HOSTED_FALLBACK_AUTOMATION }}
              run: |
                  set -euo pipefail

                  normalize_bool() {
                    case "$(echo "${1:-false}" | tr '[:upper:]' '[:lower:]')" in
                      1|true|yes|y|on) echo "true" ;;
                      *) echo "false" ;;
                    esac
                  }

                  dispatch_requested='false'
                  if [ "${DISPATCH_EVENT_NAME}" = "workflow_dispatch" ]; then
                    dispatch_requested="$(normalize_bool "${DISPATCH_TRANSPORT_FALLBACK_INPUT}")"
                  else
                    dispatch_requested="$(normalize_bool "${AUTO_TRANSPORT_FALLBACK_AUTOMATION}")"
                  fi

                  self_hosted_requested='false'
                  if [ "${DISPATCH_EVENT_NAME}" = "workflow_dispatch" ]; then
                    self_hosted_requested="$(normalize_bool "${DISPATCH_SELF_HOSTED_FALLBACK_INPUT}")"
                  else
                    self_hosted_requested="$(normalize_bool "${AUTO_SELF_HOSTED_FALLBACK_AUTOMATION}")"
                  fi

                  TRANSPORT_FALLBACK_DISPATCH_REQUESTED="${dispatch_requested}" \
                  SELF_HOSTED_FALLBACK_DISPATCH_REQUESTED="${self_hosted_requested}" \
                  node <<'NODE'
                  const fs = require('node:fs');

                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;
                  const reportPath =
                    process.env.VERIFY_REPORT_PATH || 'verification/last-deploy-verify.json';

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function normalizeOutcome(value) {
                    return String(value || '').trim().toLowerCase();
                  }

                  function normalizeBool(value) {
                    const normalized = String(value || '').trim().toLowerCase();
                    return ['1', 'true', 'yes', 'y', 'on'].includes(normalized);
                  }

                  function readFailureAssets(filePath) {
                    try {
                      const raw = fs.readFileSync(filePath, 'utf8');
                      const parsed = JSON.parse(raw);
                      const failures = Array.isArray(parsed?.failures) ? parsed.failures : [];
                      return failures
                        .map((item) =>
                          String(item?.Asset || item?.asset || item?.name || '').trim()
                        )
                        .filter(Boolean);
                    } catch {
                      return [];
                    }
                  }

                  const failureAssets = readFailureAssets(reportPath);
                  const failureSet = new Set(failureAssets);
                  const sshRepairOutcome = normalizeOutcome(process.env.SSH_REPAIR_OUTCOME);
                  const verifyOutcome = normalizeOutcome(process.env.VERIFY_OUTCOME);
                  const smokeOutcome = normalizeOutcome(process.env.SMOKE_OUTCOME);
                  const dispatchRequested = normalizeBool(
                    process.env.TRANSPORT_FALLBACK_DISPATCH_REQUESTED
                  );
                  const selfHostedDispatchRequested = normalizeBool(
                    process.env.SELF_HOSTED_FALLBACK_DISPATCH_REQUESTED
                  );

                  const indexRefDrift = failureAssets.some((asset) =>
                    [
                      'index-ref:script-entry',
                      'index-asset-refs:script-entry',
                      'index-ref:style-entry',
                      'index-asset-refs:style-entry',
                    ].includes(asset)
                  );
                  const publicSyncBlocked = failureAssets.some((asset) =>
                    [
                      'health-public-sync-healthy',
                      'health-public-sync-working-tree-dirty',
                      'health-public-sync-telemetry-gap',
                      'health-public-sync-head-drift',
                    ].includes(asset)
                  );
                  const deployFreshnessBlocked = failureSet.has('deploy-freshness');
                  const hostStaleSignals = [];

                  if (deployFreshnessBlocked) {
                    hostStaleSignals.push('deploy-freshness');
                  }
                  if (indexRefDrift) {
                    hostStaleSignals.push('index-ref-drift');
                  }
                  if (publicSyncBlocked) {
                    hostStaleSignals.push('public-sync-blocked');
                  }

                  const sshRepairFailed =
                    sshRepairOutcome !== '' &&
                    sshRepairOutcome !== 'success' &&
                    sshRepairOutcome !== 'skipped';
                  const verifyFailed = verifyOutcome === 'failure';
                  const smokeSucceeded = smokeOutcome === 'success';
                  const recommended =
                    verifyFailed && smokeSucceeded && (hostStaleSignals.length > 0 || sshRepairFailed);
                  const dispatchReady = recommended && dispatchRequested;
                  const selfHostedDispatchReady =
                    recommended && selfHostedDispatchRequested;
                  const connectivityDiagnoseDispatchReady =
                    recommended && (dispatchRequested || selfHostedDispatchRequested);

                  const reasonTokens = [];
                  if (sshRepairFailed) {
                    reasonTokens.push(`ssh:${sshRepairOutcome}`);
                  }
                  if (verifyFailed) {
                    reasonTokens.push('verify:failure');
                  }
                  if (smokeSucceeded) {
                    reasonTokens.push('smoke:success');
                  }
                  for (const signal of hostStaleSignals) {
                    reasonTokens.push(signal);
                  }
                  if (failureAssets.length > 0) {
                    reasonTokens.push(`failure_assets:${failureAssets.join(',')}`);
                  }
                  const reason = reasonTokens.join(';') || 'not_applicable';
                  const failureAssetsCsv = failureAssets.join(',');

                  append(
                    outputPath,
                    'transport_fallback_recommended',
                    recommended ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'transport_fallback_dispatch_requested',
                    dispatchRequested ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'transport_fallback_dispatch_ready',
                    dispatchReady ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'self_hosted_fallback_dispatch_requested',
                    selfHostedDispatchRequested ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'self_hosted_fallback_dispatch_ready',
                    selfHostedDispatchReady ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'connectivity_diagnose_dispatch_ready',
                    connectivityDiagnoseDispatchReady ? 'true' : 'false'
                  );
                  append(outputPath, 'transport_fallback_reason', reason);
                  append(outputPath, 'transport_fallback_failure_assets', failureAssetsCsv);

                  append(
                    envPath,
                    'TRANSPORT_FALLBACK_RECOMMENDED',
                    recommended ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'TRANSPORT_FALLBACK_DISPATCH_REQUESTED',
                    dispatchRequested ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'TRANSPORT_FALLBACK_DISPATCH_READY',
                    dispatchReady ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'SELF_HOSTED_FALLBACK_DISPATCH_REQUESTED',
                    selfHostedDispatchRequested ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'SELF_HOSTED_FALLBACK_DISPATCH_READY',
                    selfHostedDispatchReady ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'CONNECTIVITY_DIAGNOSE_DISPATCH_READY',
                    connectivityDiagnoseDispatchReady ? 'true' : 'false'
                  );
                  append(envPath, 'TRANSPORT_FALLBACK_REASON', reason);
                  append(envPath, 'TRANSPORT_FALLBACK_FAILURE_ASSETS', failureAssetsCsv);
                  NODE

            - name: Disparar diagnostico de conectividad desde repair
              id: connectivity_diagnose_dispatch
              if: ${{ always() && steps.transport_fallback.outputs.connectivity_diagnose_dispatch_ready == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      const headSha =
                        context.payload.workflow_run?.head_sha ||
                        context.sha ||
                        '';
                      const workflowId = 'diagnose-host-connectivity.yml';
                      const dispatchStartedAt = Date.now();

                      function wait(ms) {
                        return new Promise((resolve) => setTimeout(resolve, ms));
                      }

                      async function findDispatchedRun() {
                        const runs = await github.paginate(
                          github.rest.actions.listWorkflowRunsForWorkflow,
                          {
                            owner,
                            repo,
                            workflow_id: workflowId,
                            branch: ref,
                            event: 'workflow_dispatch',
                            per_page: 20,
                          }
                        );
                        return (
                          runs.find((run) => {
                            const createdAtMs = Date.parse(run.created_at || '');
                            if (!Number.isFinite(createdAtMs)) {
                              return false;
                            }
                            if (createdAtMs < dispatchStartedAt - 60_000) {
                              return false;
                            }
                            if (headSha && run.head_sha && run.head_sha !== headSha) {
                              return false;
                            }
                            return true;
                          }) || null
                        );
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        ref,
                      });

                      let observedRun = null;
                      for (let attempt = 0; attempt < 6; attempt += 1) {
                        await wait(attempt === 0 ? 2000 : 4000);
                        observedRun = await findDispatchedRun();
                        if (observedRun) {
                          break;
                        }
                      }

                      core.setOutput(
                        'connectivity_diagnose_run_id',
                        observedRun ? String(observedRun.id) : ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_url',
                        observedRun?.html_url || ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_status',
                        observedRun?.status || 'dispatched_not_observed'
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_conclusion',
                        observedRun?.conclusion || ''
                      );

                      core.info(
                        observedRun
                          ? `Workflow ${workflowId} disparado desde repair (run_id=${observedRun.id}, status=${observedRun.status}, url=${observedRun.html_url}).`
                          : `Workflow ${workflowId} disparado desde repair (run no observado aun).`
                      );

            - name: Disparar transport fallback desde repair
              if: ${{ always() && steps.transport_fallback.outputs.transport_fallback_dispatch_ready == 'true' }}
              uses: actions/github-script@v7
              env:
                  TRANSPORT_FALLBACK_REASON: ${{ steps.transport_fallback.outputs.transport_fallback_reason }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: 'deploy-hosting.yml',
                        ref,
                        inputs: {
                          force_transport_deploy: 'true',
                          protocol: 'ftps',
                          require_staging_canary: 'false',
                          allow_prod_without_staging: 'true',
                          run_postdeploy_fast: 'false',
                          run_postdeploy_gate: 'false',
                          skip_public_conversion_smoke: 'true',
                        },
                      });

                      core.info(
                        `Workflow deploy-hosting.yml disparado desde repair (ref=${ref}, reason=${process.env.TRANSPORT_FALLBACK_REASON || 'n/a'}).`
                      );

            - name: Disparar self-hosted fallback desde repair
              id: self_hosted_fallback_dispatch
              if: ${{ always() && steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready == 'true' }}
              uses: actions/github-script@v7
              env:
                  TRANSPORT_FALLBACK_REASON: ${{ steps.transport_fallback.outputs.transport_fallback_reason }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      const headSha =
                        context.payload.workflow_run?.head_sha ||
                        context.sha ||
                        '';
                      const workflowId = 'deploy-frontend-selfhosted.yml';
                      const dispatchStartedAt = Date.now();

                      function wait(ms) {
                        return new Promise((resolve) => setTimeout(resolve, ms));
                      }

                      async function findDispatchedRun() {
                        const runs = await github.paginate(
                          github.rest.actions.listWorkflowRunsForWorkflow,
                          {
                            owner,
                            repo,
                            workflow_id: workflowId,
                            branch: ref,
                            event: 'workflow_dispatch',
                            per_page: 20,
                          }
                        );
                        return (
                          runs.find((run) => {
                            const createdAtMs = Date.parse(run.created_at || '');
                            if (!Number.isFinite(createdAtMs)) {
                              return false;
                            }
                            if (createdAtMs < dispatchStartedAt - 60_000) {
                              return false;
                            }
                            if (headSha && run.head_sha && run.head_sha !== headSha) {
                              return false;
                            }
                            return true;
                          }) || null
                        );
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        ref,
                        inputs: {
                          protocol: 'auto',
                          remote_dir: '/public_html/',
                          run_build: 'true',
                        },
                      });

                      let observedRun = null;
                      for (let attempt = 0; attempt < 6; attempt += 1) {
                        await wait(attempt === 0 ? 2000 : 4000);
                        observedRun = await findDispatchedRun();
                        if (observedRun) {
                          break;
                        }
                      }

                      const state = !observedRun
                        ? 'dispatched_not_observed'
                        : observedRun.status === 'queued'
                          ? 'queued'
                          : observedRun.status === 'in_progress'
                            ? 'started'
                            : `completed:${observedRun.conclusion || 'unknown'}`;

                      core.setOutput(
                        'self_hosted_fallback_run_id',
                        observedRun ? String(observedRun.id) : ''
                      );
                      core.setOutput(
                        'self_hosted_fallback_run_url',
                        observedRun?.html_url || ''
                      );
                      core.setOutput(
                        'self_hosted_fallback_run_status',
                        observedRun?.status || 'dispatched_not_observed'
                      );
                      core.setOutput(
                        'self_hosted_fallback_run_conclusion',
                        observedRun?.conclusion || ''
                      );
                      core.setOutput('self_hosted_fallback_state', state);

                      core.info(
                        observedRun
                          ? `Workflow ${workflowId} disparado desde repair (run_id=${observedRun.id}, status=${observedRun.status}, state=${state}, url=${observedRun.html_url}, reason=${process.env.TRANSPORT_FALLBACK_REASON || 'n/a'}).`
                          : `Workflow ${workflowId} disparado desde repair (run no observado aun, reason=${process.env.TRANSPORT_FALLBACK_REASON || 'n/a'}).`
                      );

            - name: Crear/actualizar incidente self-hosted fallback de repair
              if: ${{ always() && steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready == 'true' && (steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state == 'queued' || steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state == 'dispatched_not_observed') }}
              uses: actions/github-script@v7
              env:
                  TRANSPORT_FALLBACK_REASON: ${{ steps.transport_fallback.outputs.transport_fallback_reason }}
                  SELF_HOSTED_FALLBACK_STATE: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state }}
                  SELF_HOSTED_FALLBACK_RUN_STATUS: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_status }}
                  SELF_HOSTED_FALLBACK_RUN_URL: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_url }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync self-hosted fallback sin runner';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `state:${process.env.SELF_HOSTED_FALLBACK_STATE || 'unknown'}|run_status:${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'unknown'}|reason:${process.env.TRANSPORT_FALLBACK_REASON || 'unknown'}`;
                      const signalMarker = `<!-- repair-git-sync-self-hosted-runner-signal:${signal} -->`;
                      const baseLabels = ['production-alert', 'repair-git-sync', 'self-hosted-runner', 'severity:warning'];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` detecto que el fallback self-hosted sigue sin capacidad observable.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- self_hosted_fallback_state: ${process.env.SELF_HOSTED_FALLBACK_STATE || 'unknown'}`,
                        `- self_hosted_fallback_run_status: ${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'unknown'}`,
                        `- self_hosted_fallback_run_url: ${process.env.SELF_HOSTED_FALLBACK_RUN_URL || ''}`,
                        `- transport_fallback_reason: ${process.env.TRANSPORT_FALLBACK_REASON || 'unknown'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue repair-git-sync self-hosted fallback actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue repair-git-sync self-hosted fallback ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente repair-git-sync self-hosted fallback actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- self_hosted_fallback_state: ${process.env.SELF_HOSTED_FALLBACK_STATE || 'unknown'}`,
                            `- self_hosted_fallback_run_status: ${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'unknown'}`,
                            `- self_hosted_fallback_run_url: ${process.env.SELF_HOSTED_FALLBACK_RUN_URL || ''}`,
                            `- transport_fallback_reason: ${process.env.TRANSPORT_FALLBACK_REASON || 'unknown'}`
                          ].join('\n')
                        });
                        core.info(`Issue repair-git-sync self-hosted fallback actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue repair-git-sync self-hosted fallback creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente self-hosted fallback de repair al recuperar
              if: ${{ always() && (steps.transport_fallback.outputs.transport_fallback_recommended != 'true' || (steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready == 'true' && steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state != 'queued' && steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state != 'dispatched_not_observed')) }}
