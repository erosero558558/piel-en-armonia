                      core.info(`Issue repair-git-sync telemedicina cerrado: #${existing.number}`);

            - name: Crear/actualizar incidente de repair
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && ((env.TELEMEDICINE_REPAIR_STATUS != 'degraded' && env.TELEMEDICINE_REPAIR_STATUS != 'unknown') || env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES != '0') }}
              uses: actions/github-script@v7
              env:
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
                  TELEMEDICINE_REPAIR_STATUS: ${{ env.TELEMEDICINE_REPAIR_STATUS }}
                  TELEMEDICINE_REPAIR_REASON: ${{ env.TELEMEDICINE_REPAIR_REASON }}
                  TELEMEDICINE_REPAIR_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` fallo.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- ssh_repair: ${process.env.SSH_REPAIR_OUTCOME || 'n/a'}`,
                        `- verify_after_repair: ${process.env.VERIFY_OUTCOME || 'n/a'}`,
                        `- smoke_post_repair: ${process.env.SMOKE_OUTCOME || 'n/a'}`,
                        `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'n/a'}`,
                        `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'n/a'}`,
                        `- telemedicine_repair_non_tele_failures: ${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`
                      ].join('\n');

                      const verifyOnlyHashDrift = process.env.VERIFY_OUTCOME === 'failure' && process.env.SMOKE_OUTCOME === 'success';
                      const bodyWithHint = verifyOnlyHashDrift
                        ? `${body}\n\nDiagnostico inicial: verify fallo pero smoke paso. Posible drift de assets/hash o sincronizacion parcial, no necesariamente outage de aplicacion.`
                        : body;

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: bodyWithHint
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert']
                        });
                      } else {
                        await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: bodyWithHint,
                          labels: ['production-alert']
                        });
                      }

            - name: Cerrar incidente de repair al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por workflow de repair git sync.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);

            - name: Repair summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Repair git sync";
                    echo "- target_domain: \`${TARGET_DOMAIN}\`";
                    echo "- trigger: \`${{ github.event_name }}\`";
                    echo "- ssh_repair_outcome: \`${{ steps.ssh_repair.outcome }}\`";
                    echo "- host_cron_wrapper_sync_state: \`${HOST_CRON_WRAPPER_SYNC_STATE}\`";
                    echo "- host_cron_wrapper_sync_reason: \`${HOST_CRON_WRAPPER_SYNC_REASON}\`";
                    echo "- host_cron_wrapper_path: \`${HOST_CRON_WRAPPER_PATH}\`";
                    echo "- host_cron_wrapper_source: \`${HOST_CRON_WRAPPER_SOURCE}\`";
                    echo "- verify_after_repair_outcome: \`${{ steps.verify_after_repair.outcome }}\`";
                    echo "- smoke_post_repair_outcome: \`${{ steps.smoke_post_repair.outcome }}\`";
                    echo "- telemedicine_repair_status: \`${TELEMEDICINE_REPAIR_STATUS}\`";
                    echo "- telemedicine_repair_reason: \`${TELEMEDICINE_REPAIR_REASON}\`";
                    echo "- telemedicine_repair_failures: \`${TELEMEDICINE_REPAIR_FAILURES}\`";
                    echo "- telemedicine_repair_non_tele_failures: \`${TELEMEDICINE_REPAIR_NON_TELE_FAILURES}\`";
                    echo "- telemedicine_repair_step_outcome: \`${{ steps.telemedicine_repair.outcome }}\`";
                    echo "- connectivity_diagnose_dispatched: \`${{ steps.transport_fallback.outputs.connectivity_diagnose_dispatch_ready }}\`";
                    echo "- connectivity_diagnose_run_status: \`${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_status }}\`";
                    echo "- connectivity_diagnose_run_url: \`${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_url }}\`";
                    echo "- transport_fallback_requested: \`${{ steps.transport_fallback.outputs.transport_fallback_dispatch_requested }}\`";
                    echo "- transport_fallback_recommended: \`${{ steps.transport_fallback.outputs.transport_fallback_recommended }}\`";
                    echo "- transport_fallback_dispatched: \`${{ steps.transport_fallback.outputs.transport_fallback_dispatch_ready }}\`";
                    echo "- transport_fallback_reason: \`${{ steps.transport_fallback.outputs.transport_fallback_reason }}\`";
                    echo "- transport_fallback_failure_assets: \`${{ steps.transport_fallback.outputs.transport_fallback_failure_assets }}\`";
                    echo "- self_hosted_fallback_requested: \`${{ steps.transport_fallback.outputs.self_hosted_fallback_dispatch_requested }}\`";
                    echo "- self_hosted_fallback_dispatched: \`${{ steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready }}\`";
                    echo "- self_hosted_fallback_state: \`${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state }}\`";
                    echo "- self_hosted_fallback_run_url: \`${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_url }}\`";
                    echo "- result: \`${{ job.status }}\`";
                  } >> "$GITHUB_STEP_SUMMARY"
