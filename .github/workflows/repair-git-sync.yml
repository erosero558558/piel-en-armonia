name: Repair Git Sync (Self-Heal)

on:
    workflow_run:
        workflows:
            - Post-Deploy Gate (Full Regression)
            - Post-Deploy Gate (Git Sync)
        types:
            - completed
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            repo_dir:
                description: 'Ruta remota del repo (opcional, auto-discovery si vacio)'
                required: false
                default: ''
                type: string
            branch:
                description: 'Branch objetivo'
                required: false
                default: 'main'
                type: string
            dispatch_transport_fallback:
                description: 'Disparar deploy-hosting por transporte si el repair detecta host vivo pero desactualizado'
                required: false
                default: false
                type: boolean
            dispatch_self_hosted_fallback:
                description: 'Disparar deploy-frontend-selfhosted si el repair detecta host vivo pero desactualizado'
                required: false
                default: false
                type: boolean

concurrency:
    group: repair-git-sync-main
    cancel-in-progress: true

permissions:
    contents: read
    actions: write
    issues: write

jobs:
    repair:
        name: Repair git sync on server
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && contains(fromJSON('["failure","timed_out","action_required","startup_failure"]'), github.event.workflow_run.conclusion) && github.event.workflow_run.head_branch == 'main') }}
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || vars.PROD_URL || 'https://pielarmonia.com' }}
            TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}
            SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST || secrets.FTP_SERVER || vars.FTP_SERVER || '' }}
            SSH_PORT: ${{ vars.SSH_PORT || '22' }}
            SSH_USERNAME: ${{ secrets.SSH_USERNAME || vars.SSH_USERNAME || secrets.FTP_USERNAME || vars.FTP_USERNAME || '' }}
            SSH_PASSWORD: ${{ secrets.SSH_PASSWORD || vars.SSH_PASSWORD || secrets.FTP_PASSWORD || vars.FTP_PASSWORD || '' }}
            SSH_REPO_DIR: ${{ github.event.inputs.repo_dir || vars.SSH_REPO_DIR || '/var/www/figo' }}
            REPO_GIT_URL: https://github.com/erosero558558/piel-en-armonia.git
            PUBLIC_SYNC_HOST_WRAPPER_PATH: /root/sync-pielarmonia.sh
            PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH: bin/deploy-public-v3-cron-sync.sh
            HOST_CRON_WRAPPER_SYNC_STATE: not_evaluated
            HOST_CRON_WRAPPER_SYNC_REASON: not_evaluated
            HOST_CRON_WRAPPER_PATH: /root/sync-pielarmonia.sh
            HOST_CRON_WRAPPER_SOURCE: ''
            HOST_PUBLIC_DEPLOY_STATE: not_evaluated
            HOST_PUBLIC_DEPLOY_REASON: not_evaluated
            HOST_PUBLIC_DEPLOY_SCRIPT: ''
            HOST_PUBLIC_DEPLOY_TARGET_COMMIT: ''
            TELEMEDICINE_REPAIR_STATUS: unknown
            TELEMEDICINE_REPAIR_REASON: not_evaluated
            TELEMEDICINE_REPAIR_FAILURES: -1
            TELEMEDICINE_REPAIR_NON_TELE_FAILURES: -1
            TURNERO_PILOT_REPAIR_STATUS: unknown
            TURNERO_PILOT_REPAIR_REASON: not_evaluated
            TURNERO_PILOT_REPAIR_CLINIC_ID: ''
            TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT: ''
            TURNERO_PILOT_REPAIR_STATUS_RESOLVED: 'false'
            TURNERO_PILOT_REPAIR_VERIFY_REMOTE_REQUIRED: 'false'
            TURNERO_PILOT_REPAIR_RELEASE_MODE: unknown
            TURNERO_PILOT_REPAIR_CATALOG_READY: 'false'
            TURNERO_PILOT_REPAIR_REMOTE_VERIFIED: 'false'
            TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT: ''
            CONNECTIVITY_DIAGNOSE_RUN_ID: ''
            CONNECTIVITY_DIAGNOSE_RUN_URL: ''
            CONNECTIVITY_DIAGNOSE_RUN_STATUS: not_requested
            CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION: ''
            DISPATCH_TRANSPORT_FALLBACK_INPUT: ${{ github.event.inputs.dispatch_transport_fallback || 'false' }}
            AUTO_TRANSPORT_FALLBACK_AUTOMATION: ${{ vars.AUTO_TRANSPORT_FALLBACK_FROM_REPAIR || 'false' }}
            DISPATCH_SELF_HOSTED_FALLBACK_INPUT: ${{ github.event.inputs.dispatch_self_hosted_fallback || 'false' }}
            AUTO_SELF_HOSTED_FALLBACK_AUTOMATION: ${{ vars.AUTO_SELF_HOSTED_FALLBACK_FROM_REPAIR || 'false' }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Mostrar contexto de disparo
              shell: bash
              run: |
                  echo "event=${{ github.event_name }}"
                  if [ "${{ github.event_name }}" = "workflow_run" ]; then
                    echo "trigger_workflow=${{ github.event.workflow_run.name }}"
                    echo "trigger_conclusion=${{ github.event.workflow_run.conclusion }}"
                    echo "trigger_head_branch=${{ github.event.workflow_run.head_branch }}"
                    echo "trigger_head_sha=${{ github.event.workflow_run.head_sha }}"
                  fi

            - name: Validar credenciales SSH
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "${SSH_HOST}" ]; then
                    echo "::error::Falta SSH_HOST (o FTP_SERVER)."
                    exit 1
                  fi
                  if [ -z "${SSH_USERNAME}" ]; then
                    echo "::error::Falta SSH_USERNAME (o FTP_USERNAME)."
                    exit 1
                  fi
                  if [ -z "${SSH_PASSWORD}" ]; then
                    echo "::error::Falta SSH_PASSWORD (o FTP_PASSWORD)."
                    exit 1
                  fi

            - name: Instalar sshpass para repair SSH
              shell: bash
              run: |
                  set -euo pipefail
                  if command -v sshpass >/dev/null 2>&1; then
                    echo "sshpass ya disponible."
                    exit 0
                  fi
                  sudo apt-get update
                  sudo apt-get install -y sshpass

            - name: Forzar sincronizacion git remota
              id: ssh_repair
              continue-on-error: true
              shell: bash
              run: |
                  set -euo pipefail

                  ssh_stdout_file="$(mktemp)"
                  ssh_stderr_file="$(mktemp)"
                  remote_script_file="$(mktemp)"

                  cleanup() {
                    rm -f "$ssh_stdout_file" "$ssh_stderr_file" "$remote_script_file"
                  }

                  trap cleanup EXIT

                  cat > "$remote_script_file" <<'REMOTE'
                  set -eu
                  BRANCH="${TARGET_BRANCH}"
                  REPO_URL="${REPO_GIT_URL}"
                  REPO_HINT="${SSH_REPO_DIR}"
                  TARGET_REPO=""
                  HOST_WRAPPER_PATH="${PUBLIC_SYNC_HOST_WRAPPER_PATH:-/root/sync-pielarmonia.sh}"
                  REPO_WRAPPER_RELATIVE_PATH="${PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH:-bin/deploy-public-v3-cron-sync.sh}"
                  REPO_WRAPPER_PATH=""
                  WRAPPER_SYNC_STATE="not_evaluated"
                  WRAPPER_SYNC_REASON="not_evaluated"
                  PUBLIC_DEPLOY_STATE="not_evaluated"
                  PUBLIC_DEPLOY_REASON="not_evaluated"
                  PUBLIC_DEPLOY_SCRIPT=""
                  PUBLIC_DEPLOY_TARGET_COMMIT=""

                  normalize_url() {
                    echo "$1" | sed -e 's#^git@github.com:#https://github.com/#' -e 's#\.git$##'
                  }

                  matches_repo() {
                    candidate="$1"
                    remote_url="$(git -C "$candidate" remote get-url origin 2>/dev/null || true)"
                    if [ -z "$remote_url" ]; then
                      return 1
                    fi
                    n1="$(normalize_url "$remote_url")"
                    n2="$(normalize_url "$REPO_URL")"
                    [ "$n1" = "$n2" ]
                  }

                  if [ -n "$REPO_HINT" ] && [ -d "$REPO_HINT/.git" ]; then
                    if matches_repo "$REPO_HINT"; then
                      TARGET_REPO="$REPO_HINT"
                    fi
                  fi

                  if [ -z "$TARGET_REPO" ]; then
                    SEARCH_BASES="$HOME /var/www /srv /opt /www /home"
                    for base in $SEARCH_BASES; do
                      [ -d "$base" ] || continue
                      for gitdir in $(find "$base" -maxdepth 6 -type d -name .git 2>/dev/null || true); do
                        candidate="${gitdir%/.git}"
                        if matches_repo "$candidate"; then
                          TARGET_REPO="$candidate"
                          break 2
                        fi
                      done
                    done
                  fi

                  if [ -z "$TARGET_REPO" ]; then
                    echo "No se encontro repo objetivo en el servidor."
                    exit 2
                  fi

                  echo "Repo detectado: $TARGET_REPO"
                  git -C "$TARGET_REPO" remote -v
                  git -C "$TARGET_REPO" fetch --prune origin
                  git -C "$TARGET_REPO" checkout -f "$BRANCH"
                  git -C "$TARGET_REPO" reset --hard "origin/$BRANCH"
                  git -C "$TARGET_REPO" clean -fd \
                    -e vendor/ \
                    -e data/ \
                    -e uploads/ \
                    -e env.php \
                    -e .env \
                    -e '*.log'
                  if [ ! -f "$TARGET_REPO/vendor/autoload.php" ]; then
                    if command -v composer >/dev/null 2>&1; then
                      echo "vendor/autoload.php ausente: ejecutando composer install..."
                      composer -d "$TARGET_REPO" install --no-dev --prefer-dist --optimize-autoloader --no-interaction
                    else
                      echo "WARN: composer no disponible y vendor/autoload.php ausente."
                    fi
                  fi
                  REPO_WRAPPER_PATH="$TARGET_REPO/$REPO_WRAPPER_RELATIVE_PATH"
                  if [ -f "$REPO_WRAPPER_PATH" ]; then
                    mkdir -p "$(dirname "$HOST_WRAPPER_PATH")"
                    if [ -f "$HOST_WRAPPER_PATH" ]; then
                      if cmp -s "$REPO_WRAPPER_PATH" "$HOST_WRAPPER_PATH"; then
                        WRAPPER_SYNC_STATE="already_aligned"
                        WRAPPER_SYNC_REASON="host_wrapper_matches_repo"
                      else
                        WRAPPER_SYNC_STATE="updated"
                        WRAPPER_SYNC_REASON="host_wrapper_replaced_from_repo"
                      fi
                    else
                      WRAPPER_SYNC_STATE="created"
                      WRAPPER_SYNC_REASON="host_wrapper_created_from_repo"
                    fi
                    install -m 0755 "$REPO_WRAPPER_PATH" "$HOST_WRAPPER_PATH"
                    echo "Wrapper cron host sincronizado: $HOST_WRAPPER_PATH <- $REPO_WRAPPER_PATH ($WRAPPER_SYNC_STATE)"
                  else
                    WRAPPER_SYNC_STATE="source_missing"
                    WRAPPER_SYNC_REASON="repo_wrapper_missing"
                    echo "WARN: wrapper canonico ausente en repo: $REPO_WRAPPER_PATH"
                  fi
                  if [ -f "$TARGET_REPO/bin/deploy-public-v3-live.sh" ]; then
                    PUBLIC_DEPLOY_SCRIPT="$TARGET_REPO/bin/deploy-public-v3-live.sh"
                  elif [ -f "$TARGET_REPO/bin/deploy-public-v2-live.sh" ]; then
                    PUBLIC_DEPLOY_SCRIPT="$TARGET_REPO/bin/deploy-public-v2-live.sh"
                  else
                    PUBLIC_DEPLOY_STATE="source_missing"
                    PUBLIC_DEPLOY_REASON="deploy_script_missing"
                  fi

                  deploy_rc=0
                  if [ -n "$PUBLIC_DEPLOY_SCRIPT" ]; then
                    PUBLIC_DEPLOY_TARGET_COMMIT="$(git -C "$TARGET_REPO" rev-parse --short HEAD)"
                    echo "Ejecutando deploy publico remoto: $PUBLIC_DEPLOY_SCRIPT (commit $PUBLIC_DEPLOY_TARGET_COMMIT)"
                    if env \
                      REPO="$TARGET_REPO" \
                      TARGET_COMMIT="$PUBLIC_DEPLOY_TARGET_COMMIT" \
                      INSTALL_DEPS=true \
                      DISABLE_DESTRUCTIVE_SYNC_CRON=true \
                      bash "$PUBLIC_DEPLOY_SCRIPT"; then
                      PUBLIC_DEPLOY_STATE="executed"
                      PUBLIC_DEPLOY_REASON="deploy_script_completed"
                    else
                      deploy_rc=$?
                      PUBLIC_DEPLOY_STATE="failed"
                      PUBLIC_DEPLOY_REASON="deploy_script_failed"
                    fi
                  fi
                  echo "HEAD remoto sincronizado:"
                  git -C "$TARGET_REPO" rev-parse --short HEAD
                  git -C "$TARGET_REPO" log -1 --format="%h %ci %s"
                  printf '__REPAIR_META__ host_cron_wrapper_sync_state=%s\n' "$WRAPPER_SYNC_STATE"
                  printf '__REPAIR_META__ host_cron_wrapper_sync_reason=%s\n' "$WRAPPER_SYNC_REASON"
                  printf '__REPAIR_META__ host_cron_wrapper_path=%s\n' "$HOST_WRAPPER_PATH"
                  printf '__REPAIR_META__ host_cron_wrapper_source=%s\n' "$REPO_WRAPPER_PATH"
                  printf '__REPAIR_META__ host_public_deploy_state=%s\n' "$PUBLIC_DEPLOY_STATE"
                  printf '__REPAIR_META__ host_public_deploy_reason=%s\n' "$PUBLIC_DEPLOY_REASON"
                  printf '__REPAIR_META__ host_public_deploy_script=%s\n' "$PUBLIC_DEPLOY_SCRIPT"
                  printf '__REPAIR_META__ host_public_deploy_target_commit=%s\n' "$PUBLIC_DEPLOY_TARGET_COMMIT"
                  if [ "$deploy_rc" -ne 0 ]; then
                    exit "$deploy_rc"
                  fi
                  REMOTE

                  remote_command="$(
                    printf 'TARGET_BRANCH=%q REPO_GIT_URL=%q SSH_REPO_DIR=%q PUBLIC_SYNC_HOST_WRAPPER_PATH=%q PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH=%q bash -s' \
                      "$TARGET_BRANCH" \
                      "$REPO_GIT_URL" \
                      "$SSH_REPO_DIR" \
                      "$PUBLIC_SYNC_HOST_WRAPPER_PATH" \
                      "$PUBLIC_SYNC_REPO_WRAPPER_RELATIVE_PATH"
                  )"

                  set +e
                  sshpass -p "$SSH_PASSWORD" ssh \
                    -o StrictHostKeyChecking=no \
                    -o UserKnownHostsFile=/dev/null \
                    -o PreferredAuthentications=password \
                    -o PubkeyAuthentication=no \
                    -o ConnectTimeout=120 \
                    -p "$SSH_PORT" \
                    "$SSH_USERNAME@$SSH_HOST" \
                    "$remote_command" \
                    < "$remote_script_file" \
                    > "$ssh_stdout_file" \
                    2> "$ssh_stderr_file"
                  ssh_rc=$?
                  set -e

                  cat "$ssh_stdout_file"
                  if [ -s "$ssh_stderr_file" ]; then
                    cat "$ssh_stderr_file" >&2
                  fi

                  host_cron_wrapper_sync_state='unknown'
                  host_cron_wrapper_sync_reason='ssh_stdout_unavailable'
                  host_cron_wrapper_path="$PUBLIC_SYNC_HOST_WRAPPER_PATH"
                  host_cron_wrapper_source=''
                  host_public_deploy_state='unknown'
                  host_public_deploy_reason='ssh_stdout_unavailable'
                  host_public_deploy_script=''
                  host_public_deploy_target_commit=''
                  if [ -s "$ssh_stdout_file" ]; then
                    host_cron_wrapper_sync_reason='not_reported'
                    host_public_deploy_reason='not_reported'
                  fi

                  while IFS= read -r line; do
                    case "$line" in
                      '__REPAIR_META__ host_cron_wrapper_sync_state='*)
                        host_cron_wrapper_sync_state="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_cron_wrapper_sync_reason='*)
                        host_cron_wrapper_sync_reason="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_cron_wrapper_path='*)
                        host_cron_wrapper_path="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_cron_wrapper_source='*)
                        host_cron_wrapper_source="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_public_deploy_state='*)
                        host_public_deploy_state="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_public_deploy_reason='*)
                        host_public_deploy_reason="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_public_deploy_script='*)
                        host_public_deploy_script="${line#*=}"
                        ;;
                      '__REPAIR_META__ host_public_deploy_target_commit='*)
                        host_public_deploy_target_commit="${line#*=}"
                        ;;
                    esac
                  done < "$ssh_stdout_file"

                  {
                    echo "host_cron_wrapper_sync_state=$host_cron_wrapper_sync_state"
                    echo "host_cron_wrapper_sync_reason=$host_cron_wrapper_sync_reason"
                    echo "host_cron_wrapper_path=$host_cron_wrapper_path"
                    echo "host_cron_wrapper_source=$host_cron_wrapper_source"
                    echo "host_public_deploy_state=$host_public_deploy_state"
                    echo "host_public_deploy_reason=$host_public_deploy_reason"
                    echo "host_public_deploy_script=$host_public_deploy_script"
                    echo "host_public_deploy_target_commit=$host_public_deploy_target_commit"
                  } >> "$GITHUB_OUTPUT"

                  {
                    echo "HOST_CRON_WRAPPER_SYNC_STATE=$host_cron_wrapper_sync_state"
                    echo "HOST_CRON_WRAPPER_SYNC_REASON=$host_cron_wrapper_sync_reason"
                    echo "HOST_CRON_WRAPPER_PATH=$host_cron_wrapper_path"
                    echo "HOST_CRON_WRAPPER_SOURCE=$host_cron_wrapper_source"
                    echo "HOST_PUBLIC_DEPLOY_STATE=$host_public_deploy_state"
                    echo "HOST_PUBLIC_DEPLOY_REASON=$host_public_deploy_reason"
                    echo "HOST_PUBLIC_DEPLOY_SCRIPT=$host_public_deploy_script"
                    echo "HOST_PUBLIC_DEPLOY_TARGET_COMMIT=$host_public_deploy_target_commit"
                  } >> "$GITHUB_ENV"

                  if [ "$ssh_rc" -ne 0 ]; then
                    exit "$ssh_rc"
                  fi

            - name: Reportar estado del repair SSH
              if: ${{ always() }}
              shell: bash
              run: |
                  if [ "${{ steps.ssh_repair.outcome }}" = "success" ]; then
                    echo "[OK] Repair SSH ejecutado correctamente."
                  else
                    echo "::warning::Repair SSH fallo (timeout o conectividad). Continuando con verify/smoke para validar estado real."
                  fi

            - name: Esperar propagacion de cache
              shell: bash
              run: sleep 35

            - name: Verificar produccion despues de repair
              id: verify_after_repair
              shell: pwsh
              run: |
                  ./scripts/ops/prod/VERIFICAR-DESPLIEGUE.ps1 `
                    -Domain $env:TARGET_DOMAIN `
                    -AssetHashRetryCount 3 `
                    -AssetHashRetryDelaySec 6

            - name: Smoke rapido post-repair
              id: smoke_post_repair
              if: ${{ always() }}
              shell: pwsh
              run: |
                  ./scripts/ops/prod/SMOKE-PRODUCCION.ps1 -Domain $env:TARGET_DOMAIN -AllowFigoRateLimit

            - name: Evaluar estado telemedicina post-repair
              if: ${{ always() }}
              id: telemedicine_repair
              shell: bash
              env:
                  HEALTH_FILE: /tmp/health-repair.json
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
              run: |
                  set -euo pipefail
                  if ! curl -fsS "${TARGET_DOMAIN}/api.php?resource=health" > "${HEALTH_FILE}"; then
                    echo "No se pudo refrescar health; se reporta estado telemedicina unknown."
                  fi
                  node <<'NODE'
                  const fs = require('node:fs');

                  const healthPath = process.env.HEALTH_FILE || '/tmp/health-repair.json';
                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function countNonTeleFailures(outcomes) {
                    return outcomes.reduce((count, value) => {
                      if (!value) return count;
                      const normalized = String(value).trim().toLowerCase();
                      if (!normalized || normalized === 'success' || normalized === 'skipped' || normalized === 'n/a') {
                        return count;
                      }
                      return count + 1;
                    }, 0);
                  }

                  function publish(snapshot) {
                    append(outputPath, 'telemedicine_status', snapshot.status);
                    append(outputPath, 'telemedicine_reason', snapshot.reason);
                    append(outputPath, 'telemedicine_failures', snapshot.failures);
                    append(outputPath, 'telemedicine_non_tele_failures', snapshot.nonTeleFailures);
                    append(outputPath, 'telemedicine_configured', snapshot.configured);
                    append(outputPath, 'telemedicine_diagnostics_status', snapshot.diagnosticsStatus);
                    append(outputPath, 'telemedicine_hard_failures', snapshot.hardFailures);

                    append(envPath, 'TELEMEDICINE_REPAIR_STATUS', snapshot.status);
                    append(envPath, 'TELEMEDICINE_REPAIR_REASON', snapshot.reason);
                    append(envPath, 'TELEMEDICINE_REPAIR_FAILURES', snapshot.failures);
                    append(
                      envPath,
                      'TELEMEDICINE_REPAIR_NON_TELE_FAILURES',
                      snapshot.nonTeleFailures
                    );
                  }

                  const fallback = {
                    status: 'unknown',
                    reason: 'health_unavailable',
                    failures: '-1',
                    nonTeleFailures: String(
                      countNonTeleFailures([
                        process.env.SSH_REPAIR_OUTCOME,
                        process.env.VERIFY_OUTCOME,
                        process.env.SMOKE_OUTCOME,
                      ])
                    ),
                    configured: 'false',
                    diagnosticsStatus: 'unknown',
                    hardFailures: '-1',
                  };

                  try {
                    if (!fs.existsSync(healthPath)) {
                      publish(fallback);
                      process.exit(0);
                    }

                    const raw = fs.readFileSync(healthPath, 'utf8');
                    const parsed = JSON.parse(raw);
                    const telemedicine = parsed?.checks?.telemedicine;
                    if (!telemedicine || typeof telemedicine !== 'object') {
                      publish({ ...fallback, reason: 'telemedicine_missing' });
                      process.exit(0);
                    }

                    const configured = telemedicine?.configured === true;
                    const diagnosticsStatus = String(
                      telemedicine?.diagnostics?.status || 'unknown'
                    );
                    const hardFailuresRaw = Number(telemedicine?.integrity?.hardFailures ?? 0);
                    const hardFailures = Number.isFinite(hardFailuresRaw)
                      ? Math.max(0, Math.trunc(hardFailuresRaw))
                      : -1;

                    const reasons = [];
                    let failures = 0;
                    if (!configured) {
                      reasons.push('not_configured');
                      failures += 1;
                    }
                    if (diagnosticsStatus === 'critical') {
                      reasons.push('diagnostics_critical');
                      failures += 1;
                    }
                    if (hardFailures < 0) {
                      reasons.push('hard_failures_invalid');
                      failures += 1;
                    } else if (hardFailures > 0) {
                      reasons.push(`hard_failures:${hardFailures}`);
                      failures += hardFailures;
                    }

                    const degraded = reasons.length > 0;
                    const status = degraded ? 'degraded' : 'healthy';
                    const reason = degraded ? reasons.join(';') : 'ok';
                    publish({
                      status,
                      reason,
                      failures: String(failures),
                      nonTeleFailures: String(
                        countNonTeleFailures([
                          process.env.SSH_REPAIR_OUTCOME,
                          process.env.VERIFY_OUTCOME,
                          process.env.SMOKE_OUTCOME,
                        ])
                      ),
                      configured: configured ? 'true' : 'false',
                      diagnosticsStatus,
                      hardFailures: String(hardFailures),
                    });
                  } catch (error) {
                    publish({
                      ...fallback,
                      reason: `health_parse_error:${error && error.name ? error.name : 'unknown'}`,
                    });
                  }
                  NODE

            - name: Evaluar fallback de transporte post-repair
              if: ${{ always() }}
              id: transport_fallback
              shell: bash
              env:
                  VERIFY_REPORT_PATH: verification/last-deploy-verify.json
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
                  DISPATCH_EVENT_NAME: ${{ github.event_name }}
                  DISPATCH_TRANSPORT_FALLBACK_INPUT: ${{ env.DISPATCH_TRANSPORT_FALLBACK_INPUT }}
                  AUTO_TRANSPORT_FALLBACK_AUTOMATION: ${{ env.AUTO_TRANSPORT_FALLBACK_AUTOMATION }}
                  DISPATCH_SELF_HOSTED_FALLBACK_INPUT: ${{ env.DISPATCH_SELF_HOSTED_FALLBACK_INPUT }}
                  AUTO_SELF_HOSTED_FALLBACK_AUTOMATION: ${{ env.AUTO_SELF_HOSTED_FALLBACK_AUTOMATION }}
              run: |
                  set -euo pipefail

                  normalize_bool() {
                    case "$(echo "${1:-false}" | tr '[:upper:]' '[:lower:]')" in
                      1|true|yes|y|on) echo "true" ;;
                      *) echo "false" ;;
                    esac
                  }

                  dispatch_requested='false'
                  if [ "${DISPATCH_EVENT_NAME}" = "workflow_dispatch" ]; then
                    dispatch_requested="$(normalize_bool "${DISPATCH_TRANSPORT_FALLBACK_INPUT}")"
                  else
                    dispatch_requested="$(normalize_bool "${AUTO_TRANSPORT_FALLBACK_AUTOMATION}")"
                  fi

                  self_hosted_requested='false'
                  if [ "${DISPATCH_EVENT_NAME}" = "workflow_dispatch" ]; then
                    self_hosted_requested="$(normalize_bool "${DISPATCH_SELF_HOSTED_FALLBACK_INPUT}")"
                  else
                    self_hosted_requested="$(normalize_bool "${AUTO_SELF_HOSTED_FALLBACK_AUTOMATION}")"
                  fi

                  TRANSPORT_FALLBACK_DISPATCH_REQUESTED="${dispatch_requested}" \
                  SELF_HOSTED_FALLBACK_DISPATCH_REQUESTED="${self_hosted_requested}" \
                  node <<'NODE'
                  const fs = require('node:fs');

                  const outputPath = process.env.GITHUB_OUTPUT;
                  const envPath = process.env.GITHUB_ENV;
                  const reportPath =
                    process.env.VERIFY_REPORT_PATH || 'verification/last-deploy-verify.json';

                  function append(path, key, value) {
                    if (!path) return;
                    fs.appendFileSync(path, `${key}=${String(value)}\n`);
                  }

                  function normalizeOutcome(value) {
                    return String(value || '').trim().toLowerCase();
                  }

                  function normalizeBool(value) {
                    const normalized = String(value || '').trim().toLowerCase();
                    return ['1', 'true', 'yes', 'y', 'on'].includes(normalized);
                  }

                  function readFailureAssets(filePath) {
                    try {
                      const raw = fs.readFileSync(filePath, 'utf8');
                      const parsed = JSON.parse(raw);
                      const failures = Array.isArray(parsed?.failures) ? parsed.failures : [];
                      return failures
                        .map((item) =>
                          String(item?.Asset || item?.asset || item?.name || '').trim()
                        )
                        .filter(Boolean);
                    } catch {
                      return [];
                    }
                  }

                  const failureAssets = readFailureAssets(reportPath);
                  const failureSet = new Set(failureAssets);
                  const sshRepairOutcome = normalizeOutcome(process.env.SSH_REPAIR_OUTCOME);
                  const verifyOutcome = normalizeOutcome(process.env.VERIFY_OUTCOME);
                  const smokeOutcome = normalizeOutcome(process.env.SMOKE_OUTCOME);
                  const dispatchRequested = normalizeBool(
                    process.env.TRANSPORT_FALLBACK_DISPATCH_REQUESTED
                  );
                  const selfHostedDispatchRequested = normalizeBool(
                    process.env.SELF_HOSTED_FALLBACK_DISPATCH_REQUESTED
                  );

                  const indexRefDrift = failureAssets.some((asset) =>
                    [
                      'index-ref:script-entry',
                      'index-asset-refs:script-entry',
                      'index-ref:style-entry',
                      'index-asset-refs:style-entry',
                    ].includes(asset)
                  );
                  const publicSyncBlocked = failureAssets.some((asset) =>
                    [
                      'health-public-sync-healthy',
                      'health-public-sync-working-tree-dirty',
                      'health-public-sync-telemetry-gap',
                      'health-public-sync-head-drift',
                    ].includes(asset)
                  );
                  const deployFreshnessBlocked = failureSet.has('deploy-freshness');
                  const hostStaleSignals = [];

                  if (deployFreshnessBlocked) {
                    hostStaleSignals.push('deploy-freshness');
                  }
                  if (indexRefDrift) {
                    hostStaleSignals.push('index-ref-drift');
                  }
                  if (publicSyncBlocked) {
                    hostStaleSignals.push('public-sync-blocked');
                  }

                  const sshRepairFailed =
                    sshRepairOutcome !== '' &&
                    sshRepairOutcome !== 'success' &&
                    sshRepairOutcome !== 'skipped';
                  const verifyFailed = verifyOutcome === 'failure';
                  const smokeSucceeded = smokeOutcome === 'success';
                  const recommended =
                    verifyFailed && smokeSucceeded && (hostStaleSignals.length > 0 || sshRepairFailed);
                  const dispatchReady = recommended && dispatchRequested;
                  const selfHostedDispatchReady =
                    recommended && selfHostedDispatchRequested;
                  const connectivityDiagnoseDispatchReady = recommended;
                  const connectivityDiagnoseDispatchMode = !recommended
                    ? 'not_required'
                    : dispatchRequested || selfHostedDispatchRequested
                      ? 'with_fallback'
                      : 'diagnose_only';

                  const reasonTokens = [];
                  if (sshRepairFailed) {
                    reasonTokens.push(`ssh:${sshRepairOutcome}`);
                  }
                  if (verifyFailed) {
                    reasonTokens.push('verify:failure');
                  }
                  if (smokeSucceeded) {
                    reasonTokens.push('smoke:success');
                  }
                  for (const signal of hostStaleSignals) {
                    reasonTokens.push(signal);
                  }
                  if (failureAssets.length > 0) {
                    reasonTokens.push(`failure_assets:${failureAssets.join(',')}`);
                  }
                  const reason = reasonTokens.join(';') || 'not_applicable';
                  const failureAssetsCsv = failureAssets.join(',');

                  append(
                    outputPath,
                    'transport_fallback_recommended',
                    recommended ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'transport_fallback_dispatch_requested',
                    dispatchRequested ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'transport_fallback_dispatch_ready',
                    dispatchReady ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'self_hosted_fallback_dispatch_requested',
                    selfHostedDispatchRequested ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'self_hosted_fallback_dispatch_ready',
                    selfHostedDispatchReady ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'connectivity_diagnose_dispatch_ready',
                    connectivityDiagnoseDispatchReady ? 'true' : 'false'
                  );
                  append(
                    outputPath,
                    'connectivity_diagnose_dispatch_mode',
                    connectivityDiagnoseDispatchMode
                  );
                  append(outputPath, 'transport_fallback_reason', reason);
                  append(outputPath, 'transport_fallback_failure_assets', failureAssetsCsv);

                  append(
                    envPath,
                    'TRANSPORT_FALLBACK_RECOMMENDED',
                    recommended ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'TRANSPORT_FALLBACK_DISPATCH_REQUESTED',
                    dispatchRequested ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'TRANSPORT_FALLBACK_DISPATCH_READY',
                    dispatchReady ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'SELF_HOSTED_FALLBACK_DISPATCH_REQUESTED',
                    selfHostedDispatchRequested ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'SELF_HOSTED_FALLBACK_DISPATCH_READY',
                    selfHostedDispatchReady ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'CONNECTIVITY_DIAGNOSE_DISPATCH_READY',
                    connectivityDiagnoseDispatchReady ? 'true' : 'false'
                  );
                  append(
                    envPath,
                    'CONNECTIVITY_DIAGNOSE_DISPATCH_MODE',
                    connectivityDiagnoseDispatchMode
                  );
                  append(envPath, 'TRANSPORT_FALLBACK_REASON', reason);
                  append(envPath, 'TRANSPORT_FALLBACK_FAILURE_ASSETS', failureAssetsCsv);
                  NODE

            - name: Evaluar estado turneroPilot post-repair
              id: turnero_pilot_repair
              if: ${{ always() }}
              shell: pwsh
              run: |
                  $status = 'unknown'
                  $reason = 'verify_report_missing'
                  $clinicId = ''
                  $profileFingerprint = ''
                  $statusResolved = $false
                  $verifyRemoteRequired = $false
                  $catalogReady = $false
                  $remoteVerified = $false
                  $deployedCommit = ''
                  $releaseMode = ''
                  $recoveryTargets = @()
                  $recoveryTargetsLabel = 'none'
                  $reportPath = 'verification/last-deploy-verify.json'

                  if (Test-Path $reportPath) {
                    try {
                      $report = Get-Content -Raw $reportPath | ConvertFrom-Json -Depth 20
                      $turneroPilot = $null
                      try { $turneroPilot = $report.turneroPilot } catch { $turneroPilot = $null }
                      $failures = @()
                      try { $failures = @($report.failures) } catch { $failures = @() }

                      if ($null -eq $turneroPilot) {
                        $status = 'unknown'
                        $reason = 'turnero_pilot_missing'
                      } else {
                        try { $clinicId = [string]$turneroPilot.clinicId } catch { $clinicId = '' }
                        try { $profileFingerprint = [string]$turneroPilot.profileFingerprint } catch { $profileFingerprint = '' }
                        try { $statusResolved = [bool]$turneroPilot.statusResolved } catch { $statusResolved = $false }
                        try { $verifyRemoteRequired = [bool]$turneroPilot.verifyRemoteRequired } catch { $verifyRemoteRequired = $false }
                        try { $catalogReady = [bool]$turneroPilot.catalogReady } catch { $catalogReady = $false }
                        try { $remoteVerified = [bool]$turneroPilot.remoteVerified } catch { $remoteVerified = $false }
                        try { $deployedCommit = [string]$turneroPilot.remoteDeployedCommit } catch { $deployedCommit = '' }
                        try { $releaseMode = [string]$turneroPilot.releaseMode } catch { $releaseMode = '' }
                        if ($releaseMode -eq 'web_pilot') {
                          $recoveryTargets = @(
                            '[ALERTA PROD] Deploy Hosting turneroPilot bloqueado',
                            '[ALERTA PROD] Deploy Frontend Self-Hosted turneroPilot bloqueado'
                          )
                          $recoveryTargetsLabel = ($recoveryTargets -join '|')
                        }

                        $blocking = New-Object System.Collections.Generic.List[string]
                        if (-not $statusResolved) {
                          $blocking.Add('profile_status_unresolved')
                        }
                        if (-not $catalogReady) {
                          $blocking.Add('catalog_not_ready')
                        }
                        if (@($failures | Where-Object { [string]$_.Asset -eq 'turnero-pilot-profile-status' }).Count -gt 0) {
                          $blocking.Add('verify_asset:turnero-pilot-profile-status')
                        }
                        if (@($failures | Where-Object { [string]$_.Asset -eq 'turnero-pilot-remote-verify' }).Count -gt 0) {
                          $blocking.Add('verify_asset:turnero-pilot-remote-verify')
                        }
                        if ($releaseMode -eq 'web_pilot' -and $verifyRemoteRequired -and -not $remoteVerified) {
                          $blocking.Add('remote_verify_failed')
                        }

                        if (-not [string]::IsNullOrWhiteSpace($releaseMode) -and $releaseMode -ne 'web_pilot') {
                          $status = 'not_required'
                          $reason = "release_mode:$releaseMode"
                        } elseif ($blocking.Count -gt 0) {
                          $status = 'blocked'
                          $reason = ($blocking | Select-Object -Unique) -join ';'
                        } else {
                          $status = 'ready'
                          $reason = 'ok'
                        }
                      }
                    } catch {
                      $status = 'unknown'
                      $reason = 'verify_report_unreadable'
                    }
                  }

                  $statusResolvedText = if ($statusResolved) { 'true' } else { 'false' }
                  $verifyRemoteRequiredText = if ($verifyRemoteRequired) { 'true' } else { 'false' }
                  $catalogReadyText = if ($catalogReady) { 'true' } else { 'false' }
                  $remoteVerifiedText = if ($remoteVerified) { 'true' } else { 'false' }
                  "TURNERO_PILOT_REPAIR_STATUS=$status" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_CLINIC_ID=$clinicId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT=$profileFingerprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_STATUS_RESOLVED=$statusResolvedText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_VERIFY_REMOTE_REQUIRED=$verifyRemoteRequiredText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_RELEASE_MODE=$releaseMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_CATALOG_READY=$catalogReadyText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_REMOTE_VERIFIED=$remoteVerifiedText" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT=$deployedCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "TURNERO_PILOT_REPAIR_RECOVERY_TARGETS=$recoveryTargetsLabel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Turnero pilot repair => status=$status reason=$reason clinicId=$clinicId fingerprint=$profileFingerprint catalogReady=$catalogReadyText remoteVerified=$remoteVerifiedText deployedCommit=$deployedCommit recoveryTargets=$recoveryTargetsLabel"

            - name: Disparar diagnostico de conectividad desde repair
              id: connectivity_diagnose_dispatch
              if: ${{ always() && steps.transport_fallback.outputs.connectivity_diagnose_dispatch_ready == 'true' }}
              uses: actions/github-script@v7
              env:
                  CONNECTIVITY_DIAGNOSE_DISPATCH_MODE: ${{ steps.transport_fallback.outputs.connectivity_diagnose_dispatch_mode }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      const headSha =
                        context.payload.workflow_run?.head_sha ||
                        context.sha ||
                        '';
                      const workflowId = 'diagnose-host-connectivity.yml';
                      const dispatchStartedAt = Date.now();
                      const dispatchStartedAtIso = new Date(dispatchStartedAt).toISOString();

                      function wait(ms) {
                        return new Promise((resolve) => setTimeout(resolve, ms));
                      }

                      function parseTimestamp(value) {
                        const parsed = Date.parse(String(value || ''));
                        return Number.isFinite(parsed) ? parsed : NaN;
                      }

                      function selectBestDispatchedRun(runs, dispatchTimestamp) {
                        const dispatchStartedAtMs = parseTimestamp(dispatchTimestamp);
                        const fallbackLowerBoundMs = Date.now() - 15 * 60 * 1000;
                        const lowerBoundMs = Number.isFinite(dispatchStartedAtMs)
                          ? dispatchStartedAtMs - 15_000
                          : fallbackLowerBoundMs;
                        const upperBoundMs = Date.now() + 5_000;
                        const candidates = runs
                          .map((run) => {
                            const createdAtMs = Date.parse(run.created_at || '');
                            if (!Number.isFinite(createdAtMs)) {
                              return null;
                            }
                            if (createdAtMs < lowerBoundMs || createdAtMs > upperBoundMs) {
                              return null;
                            }
                            return {
                              run,
                              createdAtMs,
                              exactHeadSha: Boolean(headSha && run.head_sha && run.head_sha === headSha),
                              createdAfterDispatch: Number.isFinite(dispatchStartedAtMs)
                                ? createdAtMs >= dispatchStartedAtMs - 1_000
                                : true,
                              deltaMs: Number.isFinite(dispatchStartedAtMs)
                                ? Math.abs(createdAtMs - dispatchStartedAtMs)
                                : Math.abs(Date.now() - createdAtMs),
                            };
                          })
                          .filter(Boolean)
                          .sort((left, right) => {
                            if (left.exactHeadSha !== right.exactHeadSha) {
                              return left.exactHeadSha ? -1 : 1;
                            }
                            if (left.createdAfterDispatch !== right.createdAfterDispatch) {
                              return left.createdAfterDispatch ? -1 : 1;
                            }
                            if (left.deltaMs !== right.deltaMs) {
                              return left.deltaMs - right.deltaMs;
                            }
                            return left.createdAtMs - right.createdAtMs;
                          });
                        return candidates[0]?.run || null;
                      }

                      async function listRecentRuns() {
                        const response = await github.request(
                          'GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs',
                          {
                            owner,
                            repo,
                            workflow_id: workflowId,
                            branch: ref,
                            event: 'workflow_dispatch',
                            per_page: 20,
                          }
                        );
                        return Array.isArray(response.data?.workflow_runs)
                          ? response.data.workflow_runs
                          : [];
                      }

                      async function findDispatchedRun(dispatchTimestamp = dispatchStartedAtIso) {
                        const runs = await listRecentRuns();
                        return selectBestDispatchedRun(runs, dispatchTimestamp);
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        ref,
                      });

                      let observedRun = null;
                      for (let attempt = 0; attempt < 6; attempt += 1) {
                        await wait(attempt === 0 ? 2000 : 4000);
                        observedRun = await findDispatchedRun();
                        if (observedRun) {
                          break;
                        }
                      }

                      core.setOutput(
                        'connectivity_diagnose_run_id',
                        observedRun ? String(observedRun.id) : ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_url',
                        observedRun?.html_url || ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_status',
                        observedRun?.status || 'dispatched_not_observed'
                      );
                      core.setOutput(
                        'connectivity_diagnose_run_conclusion',
                        observedRun?.conclusion || ''
                      );
                      core.setOutput(
                        'connectivity_diagnose_dispatched_at',
                        dispatchStartedAtIso
                      );

                      core.info(
                        observedRun
                          ? `Workflow ${workflowId} disparado desde repair (mode=${process.env.CONNECTIVITY_DIAGNOSE_DISPATCH_MODE || 'unknown'}, run_id=${observedRun.id}, status=${observedRun.status}, match=${observedRun.head_sha === headSha ? 'head_sha' : 'dispatch_window'}, url=${observedRun.html_url}).`
                          : `Workflow ${workflowId} disparado desde repair (mode=${process.env.CONNECTIVITY_DIAGNOSE_DISPATCH_MODE || 'unknown'}, run no observado aun).`
                      );

            - name: Hydrate connectivity diagnose status (repair)
              if: ${{ always() }}
              id: connectivity_diagnose_status
              uses: actions/github-script@v7
              env:
                  CONNECTIVITY_DIAGNOSE_DISPATCH_READY: ${{ steps.transport_fallback.outputs.connectivity_diagnose_dispatch_ready }}
                  CONNECTIVITY_DIAGNOSE_RUN_ID_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_id }}
                  CONNECTIVITY_DIAGNOSE_RUN_URL_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_url }}
                  CONNECTIVITY_DIAGNOSE_RUN_STATUS_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_status }}
                  CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_run_conclusion }}
                  CONNECTIVITY_DIAGNOSE_DISPATCHED_AT_INPUT: ${{ steps.connectivity_diagnose_dispatch.outputs.connectivity_diagnose_dispatched_at }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const workflowId = 'diagnose-host-connectivity.yml';
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      const headSha =
                        context.payload.workflow_run?.head_sha ||
                        context.sha ||
                        '';

                      function normalizeRun(value) {
                        return String(value || '').trim();
                      }

                      function normalizeBool(value) {
                        return ['1', 'true', 'yes', 'y', 'on'].includes(normalizeRun(value).toLowerCase());
                      }

                      function parseTimestamp(value) {
                        const parsed = Date.parse(normalizeRun(value));
                        return Number.isFinite(parsed) ? parsed : NaN;
                      }

                      function wait(ms) {
                        return new Promise((resolve) => setTimeout(resolve, ms));
                      }

                      function selectBestDispatchedRun(runs, dispatchTimestamp) {
                        const dispatchStartedAtMs = parseTimestamp(dispatchTimestamp);
                        const fallbackLowerBoundMs = Date.now() - 15 * 60 * 1000;
                        const lowerBoundMs = Number.isFinite(dispatchStartedAtMs)
                          ? dispatchStartedAtMs - 15_000
                          : fallbackLowerBoundMs;
                        const upperBoundMs = Date.now() + 5_000;
                        const candidates = runs
                          .map((run) => {
                            const createdAtMs = Date.parse(run.created_at || '');
                            if (!Number.isFinite(createdAtMs)) {
                              return null;
                            }
                            if (createdAtMs < lowerBoundMs || createdAtMs > upperBoundMs) {
                              return null;
                            }
                            return {
                              run,
                              createdAtMs,
                              exactHeadSha: Boolean(headSha && run.head_sha && run.head_sha === headSha),
                              createdAfterDispatch: Number.isFinite(dispatchStartedAtMs)
                                ? createdAtMs >= dispatchStartedAtMs - 1_000
                                : true,
                              deltaMs: Number.isFinite(dispatchStartedAtMs)
                                ? Math.abs(createdAtMs - dispatchStartedAtMs)
                                : Math.abs(Date.now() - createdAtMs),
                            };
                          })
                          .filter(Boolean)
                          .sort((left, right) => {
                            if (left.exactHeadSha !== right.exactHeadSha) {
                              return left.exactHeadSha ? -1 : 1;
                            }
                            if (left.createdAfterDispatch !== right.createdAfterDispatch) {
                              return left.createdAfterDispatch ? -1 : 1;
                            }
                            if (left.deltaMs !== right.deltaMs) {
                              return left.deltaMs - right.deltaMs;
                            }
                            return left.createdAtMs - right.createdAtMs;
                          });
                        return candidates[0]?.run || null;
                      }

                      async function listRecentRuns() {
                        const response = await github.request(
                          'GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs',
                          {
                            owner,
                            repo,
                            workflow_id: workflowId,
                            branch: ref,
                            event: 'workflow_dispatch',
                            per_page: 20,
                          }
                        );
                        return Array.isArray(response.data?.workflow_runs)
                          ? response.data.workflow_runs
                          : [];
                      }

                      function formatRecentRuns(runs) {
                        return runs
                          .slice(0, 3)
                          .map((run) =>
                            `run_id=${run.id || 'unknown'} created_at=${run.created_at || 'unknown'} status=${run.status || 'unknown'} head_sha=${run.head_sha || ''}`
                          )
                          .join(' | ');
                      }

                      async function findDispatchedRun(dispatchTimestamp = '') {
                        const runs = await listRecentRuns();
                        return {
                          observedRun: selectBestDispatchedRun(runs, dispatchTimestamp),
                          recentRuns: runs,
                        };
                      }

                      const shouldExpose = normalizeBool(process.env.CONNECTIVITY_DIAGNOSE_DISPATCH_READY);
                      let runId = shouldExpose ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_ID_INPUT) : '';
                      let runUrl = shouldExpose ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_URL_INPUT) : '';
                      let runStatus = shouldExpose
                        ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_STATUS_INPUT) || 'dispatched_not_observed'
                        : 'not_requested';
                      let runConclusion = shouldExpose
                        ? normalizeRun(process.env.CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION_INPUT)
                        : '';
                      const dispatchTimestamp = normalizeRun(
                        process.env.CONNECTIVITY_DIAGNOSE_DISPATCHED_AT_INPUT
                      );

                      if (shouldExpose && (!runId || runStatus === 'dispatched_not_observed')) {
                        let observedRun = null;
                        let recentRuns = [];
                        for (let attempt = 0; attempt < 12; attempt += 1) {
                          await wait(attempt === 0 ? 2000 : 5000);
                          const lookup = await findDispatchedRun(dispatchTimestamp);
                          observedRun = lookup.observedRun;
                          recentRuns = lookup.recentRuns;
                          if (observedRun) {
                            break;
                          }
                        }
                        if (observedRun) {
                          runId = String(observedRun.id || '');
                          runUrl = String(observedRun.html_url || '');
                          runStatus = String(observedRun.status || '') || runStatus;
                          runConclusion = String(observedRun.conclusion || '');
                          core.info(
                            `Hydrated late ${workflowId} run from repair (run_id=${runId}, status=${runStatus}, match=${observedRun.head_sha === headSha ? 'head_sha' : 'dispatch_window'}, url=${runUrl}).`
                          );
                        } else {
                          const recentSnapshot = formatRecentRuns(recentRuns) || 'none';
                          core.info(
                            `Hydrate connectivity diagnose status (repair) still unresolved after retry window (status=${runStatus}, recent_runs=${recentSnapshot}).`
                          );
                        }
                      }

                      core.setOutput('connectivity_diagnose_run_id', runId);
                      core.setOutput('connectivity_diagnose_run_url', runUrl);
                      core.setOutput('connectivity_diagnose_run_status', runStatus);
                      core.setOutput('connectivity_diagnose_run_conclusion', runConclusion);

                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_ID', runId);
                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_URL', runUrl);
                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_STATUS', runStatus);
                      core.exportVariable('CONNECTIVITY_DIAGNOSE_RUN_CONCLUSION', runConclusion);

            - name: Disparar transport fallback desde repair
              if: ${{ always() && steps.transport_fallback.outputs.transport_fallback_dispatch_ready == 'true' }}
              uses: actions/github-script@v7
              env:
                  TRANSPORT_FALLBACK_REASON: ${{ steps.transport_fallback.outputs.transport_fallback_reason }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: 'deploy-hosting.yml',
                        ref,
                        inputs: {
                          force_transport_deploy: 'true',
                          protocol: 'ftps',
                          require_staging_canary: 'false',
                          allow_prod_without_staging: 'true',
                          run_postdeploy_fast: 'false',
                          run_postdeploy_gate: 'false',
                          skip_public_conversion_smoke: 'true',
                        },
                      });

                      core.info(
                        `Workflow deploy-hosting.yml disparado desde repair (ref=${ref}, reason=${process.env.TRANSPORT_FALLBACK_REASON || 'n/a'}).`
                      );

            - name: Disparar self-hosted fallback desde repair
              id: self_hosted_fallback_dispatch
              if: ${{ always() && steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready == 'true' }}
              uses: actions/github-script@v7
              env:
                  TRANSPORT_FALLBACK_REASON: ${{ steps.transport_fallback.outputs.transport_fallback_reason }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const ref =
                        context.payload.workflow_run?.head_branch ||
                        (context.ref || '').replace('refs/heads/', '') ||
                        'main';
                      const headSha =
                        context.payload.workflow_run?.head_sha ||
                        context.sha ||
                        '';
                      const workflowId = 'deploy-frontend-selfhosted.yml';
                      const dispatchStartedAt = Date.now();

                      function wait(ms) {
                        return new Promise((resolve) => setTimeout(resolve, ms));
                      }

                      async function findDispatchedRun() {
                        const runs = await github.paginate(
                          github.rest.actions.listWorkflowRunsForWorkflow,
                          {
                            owner,
                            repo,
                            workflow_id: workflowId,
                            branch: ref,
                            event: 'workflow_dispatch',
                            per_page: 20,
                          }
                        );
                        return (
                          runs.find((run) => {
                            const createdAtMs = Date.parse(run.created_at || '');
                            if (!Number.isFinite(createdAtMs)) {
                              return false;
                            }
                            if (createdAtMs < dispatchStartedAt - 60_000) {
                              return false;
                            }
                            if (headSha && run.head_sha && run.head_sha !== headSha) {
                              return false;
                            }
                            return true;
                          }) || null
                        );
                      }

                      await github.rest.actions.createWorkflowDispatch({
                        owner,
                        repo,
                        workflow_id: workflowId,
                        ref,
                        inputs: {
                          protocol: 'auto',
                          remote_dir: '/public_html/',
                          run_build: 'true',
                        },
                      });

                      let observedRun = null;
                      for (let attempt = 0; attempt < 6; attempt += 1) {
                        await wait(attempt === 0 ? 2000 : 4000);
                        observedRun = await findDispatchedRun();
                        if (observedRun) {
                          break;
                        }
                      }

                      const state = !observedRun
                        ? 'dispatched_not_observed'
                        : observedRun.status === 'queued'
                          ? 'queued'
                          : observedRun.status === 'in_progress'
                            ? 'started'
                            : `completed:${observedRun.conclusion || 'unknown'}`;

                      core.setOutput(
                        'self_hosted_fallback_run_id',
                        observedRun ? String(observedRun.id) : ''
                      );
                      core.setOutput(
                        'self_hosted_fallback_run_url',
                        observedRun?.html_url || ''
                      );
                      core.setOutput(
                        'self_hosted_fallback_run_status',
                        observedRun?.status || 'dispatched_not_observed'
                      );
                      core.setOutput(
                        'self_hosted_fallback_run_conclusion',
                        observedRun?.conclusion || ''
                      );
                      core.setOutput('self_hosted_fallback_state', state);

                      core.info(
                        observedRun
                          ? `Workflow ${workflowId} disparado desde repair (run_id=${observedRun.id}, status=${observedRun.status}, state=${state}, url=${observedRun.html_url}, reason=${process.env.TRANSPORT_FALLBACK_REASON || 'n/a'}).`
                          : `Workflow ${workflowId} disparado desde repair (run no observado aun, reason=${process.env.TRANSPORT_FALLBACK_REASON || 'n/a'}).`
                      );

            - name: Crear/actualizar incidente self-hosted fallback de repair
              if: ${{ always() && steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready == 'true' && (steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state == 'queued' || steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state == 'dispatched_not_observed') }}
              uses: actions/github-script@v7
              env:
                  TRANSPORT_FALLBACK_REASON: ${{ steps.transport_fallback.outputs.transport_fallback_reason }}
                  SELF_HOSTED_FALLBACK_STATE: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state }}
                  SELF_HOSTED_FALLBACK_RUN_STATUS: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_status }}
                  SELF_HOSTED_FALLBACK_RUN_URL: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_url }}
                  TURNERO_PILOT_REPAIR_CLINIC_ID: ${{ env.TURNERO_PILOT_REPAIR_CLINIC_ID }}
                  TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REPAIR_RELEASE_MODE: ${{ env.TURNERO_PILOT_REPAIR_RELEASE_MODE }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync self-hosted fallback sin runner';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `state:${process.env.SELF_HOSTED_FALLBACK_STATE || 'unknown'}|run_status:${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'unknown'}|reason:${process.env.TRANSPORT_FALLBACK_REASON || 'unknown'}|clinic:${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}|fp:${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}|release:${process.env.TURNERO_PILOT_REPAIR_RELEASE_MODE || 'unknown'}`;
                      const signalMarker = `<!-- repair-git-sync-self-hosted-runner-signal:${signal} -->`;
                      const baseLabels = ['production-alert', 'repair-git-sync', 'self-hosted-runner', 'severity:warning'];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` detecto que el fallback self-hosted sigue sin capacidad observable.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- self_hosted_fallback_state: ${process.env.SELF_HOSTED_FALLBACK_STATE || 'unknown'}`,
                        `- self_hosted_fallback_run_status: ${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'unknown'}`,
                        `- self_hosted_fallback_run_url: ${process.env.SELF_HOSTED_FALLBACK_RUN_URL || ''}`,
                        `- transport_fallback_reason: ${process.env.TRANSPORT_FALLBACK_REASON || 'unknown'}`,
                        `- turnero_pilot_repair_clinic_id: ${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}`,
                        `- turnero_pilot_repair_profile_fingerprint: ${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}`,
                        `- turnero_pilot_repair_release_mode: ${process.env.TURNERO_PILOT_REPAIR_RELEASE_MODE || 'unknown'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue repair-git-sync self-hosted fallback actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue repair-git-sync self-hosted fallback ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente repair-git-sync self-hosted fallback actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- self_hosted_fallback_state: ${process.env.SELF_HOSTED_FALLBACK_STATE || 'unknown'}`,
                            `- self_hosted_fallback_run_status: ${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'unknown'}`,
                            `- self_hosted_fallback_run_url: ${process.env.SELF_HOSTED_FALLBACK_RUN_URL || ''}`,
                            `- transport_fallback_reason: ${process.env.TRANSPORT_FALLBACK_REASON || 'unknown'}`,
                            `- turnero_pilot_repair_clinic_id: ${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}`,
                            `- turnero_pilot_repair_profile_fingerprint: ${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}`,
                            `- turnero_pilot_repair_release_mode: ${process.env.TURNERO_PILOT_REPAIR_RELEASE_MODE || 'unknown'}`
                          ].join('\n')
                        });
                        core.info(`Issue repair-git-sync self-hosted fallback actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue repair-git-sync self-hosted fallback creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente self-hosted fallback de repair al recuperar
              if: ${{ always() && (steps.transport_fallback.outputs.transport_fallback_recommended != 'true' || (steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready == 'true' && steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state != 'queued' && steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state != 'dispatched_not_observed')) }}
              uses: actions/github-script@v7
              env:
                  TRANSPORT_FALLBACK_RECOMMENDED: ${{ steps.transport_fallback.outputs.transport_fallback_recommended }}
                  SELF_HOSTED_FALLBACK_STATE: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state }}
                  SELF_HOSTED_FALLBACK_RUN_STATUS: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_status }}
                  SELF_HOSTED_FALLBACK_RUN_URL: ${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_url }}
                  TURNERO_PILOT_REPAIR_CLINIC_ID: ${{ env.TURNERO_PILOT_REPAIR_CLINIC_ID }}
                  TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REPAIR_RELEASE_MODE: ${{ env.TURNERO_PILOT_REPAIR_RELEASE_MODE }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync self-hosted fallback sin runner';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente self-hosted fallback de repair abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por workflow de repair git sync (self-hosted fallback).',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- transport_fallback_recommended: ${process.env.TRANSPORT_FALLBACK_RECOMMENDED || 'false'}`,
                          `- self_hosted_fallback_state: ${process.env.SELF_HOSTED_FALLBACK_STATE || 'not_required'}`,
                          `- self_hosted_fallback_run_status: ${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'n/a'}`,
                          `- self_hosted_fallback_run_url: ${process.env.SELF_HOSTED_FALLBACK_RUN_URL || ''}`,
                          `- turnero_pilot_repair_clinic_id: ${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}`,
                          `- turnero_pilot_repair_profile_fingerprint: ${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}`,
                          `- turnero_pilot_repair_release_mode: ${process.env.TURNERO_PILOT_REPAIR_RELEASE_MODE || 'unknown'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue repair-git-sync self-hosted fallback cerrado: #${existing.number}`);

            - name: Crear/actualizar incidente telemedicina de repair
              if: ${{ always() && github.event_name != 'workflow_dispatch' && (env.TELEMEDICINE_REPAIR_STATUS == 'degraded' || env.TELEMEDICINE_REPAIR_STATUS == 'unknown') }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_REPAIR_STATUS: ${{ env.TELEMEDICINE_REPAIR_STATUS }}
                  TELEMEDICINE_REPAIR_REASON: ${{ env.TELEMEDICINE_REPAIR_REASON }}
                  TELEMEDICINE_REPAIR_FAILURES: ${{ env.TELEMEDICINE_REPAIR_FAILURES }}
                  TELEMEDICINE_REPAIR_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync telemedicina degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = `status:${process.env.TELEMEDICINE_REPAIR_STATUS || 'unknown'}|reason:${process.env.TELEMEDICINE_REPAIR_REASON || 'unknown'}|failures:${process.env.TELEMEDICINE_REPAIR_FAILURES || '-1'}|non_tele:${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`;
                      const signalMarker = `<!-- repair-git-sync-telemedicine-signal:${signal} -->`;
                      const reason = String(process.env.TELEMEDICINE_REPAIR_REASON || '');
                      const severity = (
                        reason.includes('diagnostics_critical') ||
                        reason.includes('hard_failures:') ||
                        reason.includes('hard_failures_invalid') ||
                        reason.includes('health_unavailable') ||
                        reason.includes('health_parse_error') ||
                        reason.includes('telemedicine_missing') ||
                        reason.includes('not_configured')
                      )
                        ? 'severity:critical'
                        : 'severity:warning';
                      const baseLabels = ['production-alert', 'repair-git-sync', 'telemedicine', severity];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => {
                        const existing = normalizeLabels(labels).filter(
                          (label) => label !== 'severity:critical' && label !== 'severity:warning'
                        );
                        return Array.from(new Set([...existing, ...baseLabels]));
                      };
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` detecto degradacion telemedicina tras repair.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'unknown'}`,
                        `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'unknown'}`,
                        `- telemedicine_repair_failures: ${process.env.TELEMEDICINE_REPAIR_FAILURES || '-1'}`,
                        `- telemedicine_repair_non_tele_failures: ${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`,
                        `- domain: ${process.env.TARGET_DOMAIN || 'https://pielarmonia.com'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue repair-git-sync telemedicina actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue repair-git-sync telemedicina ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente repair-git-sync telemedicina actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'unknown'}`,
                            `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'unknown'}`,
                            `- telemedicine_repair_failures: ${process.env.TELEMEDICINE_REPAIR_FAILURES || '-1'}`,
                            `- telemedicine_repair_non_tele_failures: ${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`
                          ].join('\n')
                        });
                        core.info(`Issue repair-git-sync telemedicina actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue repair-git-sync telemedicina creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente telemedicina de repair al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' && env.TELEMEDICINE_REPAIR_STATUS == 'healthy' }}
              uses: actions/github-script@v7
              env:
                  TELEMEDICINE_REPAIR_STATUS: ${{ env.TELEMEDICINE_REPAIR_STATUS }}
                  TELEMEDICINE_REPAIR_REASON: ${{ env.TELEMEDICINE_REPAIR_REASON }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync telemedicina degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente telemedicina de repair abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por workflow de repair git sync (telemedicina).',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'healthy'}`,
                          `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'ok'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue repair-git-sync telemedicina cerrado: #${existing.number}`);

            - name: Crear/actualizar incidente turneroPilot de repair
              if: ${{ always() && github.event_name != 'workflow_dispatch' && env.TURNERO_PILOT_REPAIR_RELEASE_MODE == 'web_pilot' && env.TURNERO_PILOT_REPAIR_STATUS == 'blocked' }}
              uses: actions/github-script@v7
              env:
                  TURNERO_PILOT_REPAIR_STATUS: ${{ env.TURNERO_PILOT_REPAIR_STATUS }}
                  TURNERO_PILOT_REPAIR_REASON: ${{ env.TURNERO_PILOT_REPAIR_REASON }}
                  TURNERO_PILOT_REPAIR_CLINIC_ID: ${{ env.TURNERO_PILOT_REPAIR_CLINIC_ID }}
                  TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REPAIR_CATALOG_READY: ${{ env.TURNERO_PILOT_REPAIR_CATALOG_READY }}
                  TURNERO_PILOT_REPAIR_REMOTE_VERIFIED: ${{ env.TURNERO_PILOT_REPAIR_REMOTE_VERIFIED }}
                  TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT: ${{ env.TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT }}
                  TURNERO_PILOT_REPAIR_RELEASE_MODE: ${{ env.TURNERO_PILOT_REPAIR_RELEASE_MODE }}
                  TURNERO_PILOT_REPAIR_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_REPAIR_RECOVERY_TARGETS }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync turneroPilot bloqueado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const signal = [
                        `status:${process.env.TURNERO_PILOT_REPAIR_STATUS || 'unknown'}`,
                        `reason:${process.env.TURNERO_PILOT_REPAIR_REASON || 'unknown'}`,
                        `clinic:${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}`,
                        `fp:${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}`,
                        `deployed:${process.env.TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT || 'unknown'}`
                      ].join('|');
                      const signalMarker = `<!-- repair-git-sync-turnero-pilot-signal:${signal} -->`;
                      const baseLabels = ['production-alert', 'repair-git-sync', 'turnero-pilot', 'severity:warning'];

                      const normalizeLabels = (labels) =>
                        (labels || [])
                          .map((item) => (typeof item === 'string' ? item : item?.name))
                          .filter(Boolean);
                      const mergedLabels = (labels) => Array.from(new Set([...normalizeLabels(labels), ...baseLabels]));
                      const sameLabels = (a, b) => {
                        const norm = (values) => Array.from(new Set(values)).sort();
                        return JSON.stringify(norm(a)) === JSON.stringify(norm(b));
                      };

                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` detecto un `turneroPilot` bloqueado tras repair.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- turnero_pilot_repair_release_mode: ${process.env.TURNERO_PILOT_REPAIR_RELEASE_MODE || 'unknown'}`,
                        `- turnero_pilot_repair_status: ${process.env.TURNERO_PILOT_REPAIR_STATUS || 'unknown'}`,
                        `- turnero_pilot_repair_reason: ${process.env.TURNERO_PILOT_REPAIR_REASON || 'unknown'}`,
                        `- turnero_pilot_repair_clinic_id: ${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}`,
                        `- turnero_pilot_repair_profile_fingerprint: ${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}`,
                        `- turnero_pilot_repair_catalog_ready: ${process.env.TURNERO_PILOT_REPAIR_CATALOG_READY || 'false'}`,
                        `- turnero_pilot_repair_remote_verified: ${process.env.TURNERO_PILOT_REPAIR_REMOTE_VERIFIED || 'false'}`,
                        `- turnero_pilot_repair_deployed_commit: ${process.env.TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT || 'unknown'}`,
                        `- turnero_pilot_repair_recovery_targets: ${process.env.TURNERO_PILOT_REPAIR_RECOVERY_TARGETS || 'none'}`,
                        `- domain: ${process.env.TARGET_DOMAIN || 'https://pielarmonia.com'}`,
                        '',
                        signalMarker
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        const existingBody = String(existing.body || '');
                        const labels = mergedLabels(existing.labels);
                        const labelsAlreadyApplied = sameLabels(normalizeLabels(existing.labels), labels);
                        if (existingBody.includes(signalMarker)) {
                          if (!labelsAlreadyApplied) {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels
                            });
                            core.info(`Issue repair-git-sync turneroPilot actualizo labels: #${existing.number}`);
                          }
                          core.info(`Issue repair-git-sync turneroPilot ya refleja la misma senal: #${existing.number}`);
                          return;
                        }
                        await github.rest.issues.update({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body,
                          labels
                        });
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: [
                            'Incidente repair-git-sync turneroPilot actualizado por cambio de senal.',
                            '',
                            `- Fecha: ${now}`,
                            `- Run: ${runUrl}`,
                            `- turnero_pilot_repair_status: ${process.env.TURNERO_PILOT_REPAIR_STATUS || 'unknown'}`,
                            `- turnero_pilot_repair_reason: ${process.env.TURNERO_PILOT_REPAIR_REASON || 'unknown'}`,
                            `- turnero_pilot_repair_clinic_id: ${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}`,
                            `- turnero_pilot_repair_profile_fingerprint: ${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}`,
                            `- turnero_pilot_repair_deployed_commit: ${process.env.TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT || 'unknown'}`,
                            `- turnero_pilot_repair_recovery_targets: ${process.env.TURNERO_PILOT_REPAIR_RECOVERY_TARGETS || 'none'}`
                          ].join('\n')
                        });
                        core.info(`Issue repair-git-sync turneroPilot actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: baseLabels
                        });
                        core.info(`Issue repair-git-sync turneroPilot creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente turneroPilot de repair al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' && env.TURNERO_PILOT_REPAIR_RELEASE_MODE == 'web_pilot' && (env.TURNERO_PILOT_REPAIR_STATUS == 'ready' || env.TURNERO_PILOT_REPAIR_STATUS == 'not_required') }}
              uses: actions/github-script@v7
              env:
                  TURNERO_PILOT_REPAIR_RELEASE_MODE: ${{ env.TURNERO_PILOT_REPAIR_RELEASE_MODE }}
                  TURNERO_PILOT_REPAIR_STATUS: ${{ env.TURNERO_PILOT_REPAIR_STATUS }}
                  TURNERO_PILOT_REPAIR_REASON: ${{ env.TURNERO_PILOT_REPAIR_REASON }}
                  TURNERO_PILOT_REPAIR_CLINIC_ID: ${{ env.TURNERO_PILOT_REPAIR_CLINIC_ID }}
                  TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT }}
                  TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT: ${{ env.TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT }}
                  TURNERO_PILOT_REPAIR_RECOVERY_TARGETS: ${{ env.TURNERO_PILOT_REPAIR_RECOVERY_TARGETS }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync turneroPilot bloqueado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente turneroPilot de repair abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por workflow de repair git sync (turneroPilot).',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- turnero_pilot_repair_status: ${process.env.TURNERO_PILOT_REPAIR_STATUS || 'ready'}`,
                          `- turnero_pilot_repair_reason: ${process.env.TURNERO_PILOT_REPAIR_REASON || 'ok'}`,
                          `- turnero_pilot_repair_clinic_id: ${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'unknown'}`,
                          `- turnero_pilot_repair_profile_fingerprint: ${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'unknown'}`,
                          `- turnero_pilot_repair_deployed_commit: ${process.env.TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT || 'unknown'}`,
                          `- turnero_pilot_repair_recovery_targets: ${process.env.TURNERO_PILOT_REPAIR_RECOVERY_TARGETS || 'none'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue repair-git-sync turneroPilot cerrado: #${existing.number}`);

            - name: Crear/actualizar incidente de repair
              if: ${{ failure() && github.event_name != 'workflow_dispatch' && ((env.TELEMEDICINE_REPAIR_STATUS != 'degraded' && env.TELEMEDICINE_REPAIR_STATUS != 'unknown') || env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES != '0') }}
              uses: actions/github-script@v7
              env:
                  SSH_REPAIR_OUTCOME: ${{ steps.ssh_repair.outcome }}
                  VERIFY_OUTCOME: ${{ steps.verify_after_repair.outcome }}
                  SMOKE_OUTCOME: ${{ steps.smoke_post_repair.outcome }}
                  TELEMEDICINE_REPAIR_STATUS: ${{ env.TELEMEDICINE_REPAIR_STATUS }}
                  TELEMEDICINE_REPAIR_REASON: ${{ env.TELEMEDICINE_REPAIR_REASON }}
                  TELEMEDICINE_REPAIR_NON_TELE_FAILURES: ${{ env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES }}
                  TURNERO_PILOT_REPAIR_STATUS: ${{ env.TURNERO_PILOT_REPAIR_STATUS }}
                  TURNERO_PILOT_REPAIR_REASON: ${{ env.TURNERO_PILOT_REPAIR_REASON }}
                  TURNERO_PILOT_REPAIR_CLINIC_ID: ${{ env.TURNERO_PILOT_REPAIR_CLINIC_ID }}
                  TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT: ${{ env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT }}
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Repair Git Sync (Self-Heal)` fallo.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Trigger: ${context.eventName}`,
                        `- ssh_repair: ${process.env.SSH_REPAIR_OUTCOME || 'n/a'}`,
                        `- verify_after_repair: ${process.env.VERIFY_OUTCOME || 'n/a'}`,
                        `- smoke_post_repair: ${process.env.SMOKE_OUTCOME || 'n/a'}`,
                        `- telemedicine_repair_status: ${process.env.TELEMEDICINE_REPAIR_STATUS || 'n/a'}`,
                        `- telemedicine_repair_reason: ${process.env.TELEMEDICINE_REPAIR_REASON || 'n/a'}`,
                        `- telemedicine_repair_non_tele_failures: ${process.env.TELEMEDICINE_REPAIR_NON_TELE_FAILURES || '-1'}`,
                        `- turnero_pilot_repair_status: ${process.env.TURNERO_PILOT_REPAIR_STATUS || 'n/a'}`,
                        `- turnero_pilot_repair_reason: ${process.env.TURNERO_PILOT_REPAIR_REASON || 'n/a'}`,
                        `- turnero_pilot_repair_clinic_id: ${process.env.TURNERO_PILOT_REPAIR_CLINIC_ID || 'n/a'}`,
                        `- turnero_pilot_repair_profile_fingerprint: ${process.env.TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT || 'n/a'}`
                      ].join('\n');

                      const verifyOnlyHashDrift = process.env.VERIFY_OUTCOME === 'failure' && process.env.SMOKE_OUTCOME === 'success';
                      const bodyWithHint = verifyOnlyHashDrift
                        ? `${body}\n\nDiagnostico inicial: verify fallo pero smoke paso. Posible drift de assets/hash o sincronizacion parcial, no necesariamente outage de aplicacion.`
                        : body;

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body: bodyWithHint
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert']
                        });
                      } else {
                        await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body: bodyWithHint,
                          labels: ['production-alert']
                        });
                      }

            - name: Cerrar incidente de repair al recuperar
              if: ${{ success() && github.event_name != 'workflow_dispatch' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Repair git sync fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por workflow de repair git sync.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);

            - name: Escribir reporte turneroPilot repair
              if: ${{ always() }}
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Path verification -Force | Out-Null
                  $recoveryTargets = @()
                  if (-not [string]::IsNullOrWhiteSpace([string]$env:TURNERO_PILOT_REPAIR_RECOVERY_TARGETS) -and [string]$env:TURNERO_PILOT_REPAIR_RECOVERY_TARGETS -ne 'none') {
                    $recoveryTargets = @([string]$env:TURNERO_PILOT_REPAIR_RECOVERY_TARGETS -split '\|' | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
                  }
                  $report = [ordered]@{
                    generatedAt = [DateTimeOffset]::UtcNow.ToString('o')
                    workflow = 'repair-git-sync'
                    targetDomain = [string]$env:TARGET_DOMAIN
                    turneroPilot = [ordered]@{
                      status = [string]$env:TURNERO_PILOT_REPAIR_STATUS
                      reason = [string]$env:TURNERO_PILOT_REPAIR_REASON
                      clinicId = [string]$env:TURNERO_PILOT_REPAIR_CLINIC_ID
                      profileFingerprint = [string]$env:TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT
                      statusResolved = ([string]$env:TURNERO_PILOT_REPAIR_STATUS_RESOLVED).ToLowerInvariant() -eq 'true'
                      verifyRemoteRequired = ([string]$env:TURNERO_PILOT_REPAIR_VERIFY_REMOTE_REQUIRED).ToLowerInvariant() -eq 'true'
                      releaseMode = [string]$env:TURNERO_PILOT_REPAIR_RELEASE_MODE
                      catalogReady = ([string]$env:TURNERO_PILOT_REPAIR_CATALOG_READY).ToLowerInvariant() -eq 'true'
                      remoteVerified = ([string]$env:TURNERO_PILOT_REPAIR_REMOTE_VERIFIED).ToLowerInvariant() -eq 'true'
                      deployedCommit = [string]$env:TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT
                      recoveryTargets = @($recoveryTargets)
                    }
                    sourceVerifyReport = 'verification/last-deploy-verify.json'
                  }
                  $report | ConvertTo-Json -Depth 8 | Set-Content -Path 'verification/last-turnero-pilot-repair.json' -Encoding utf8
                  Write-Host 'Reporte turneroPilot repair escrito en verification/last-turnero-pilot-repair.json'

            - name: Repair summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Repair git sync";
                    echo "- target_domain: \`${TARGET_DOMAIN}\`";
                    echo "- trigger: \`${{ github.event_name }}\`";
                  echo "- ssh_repair_outcome: \`${{ steps.ssh_repair.outcome }}\`";
                  echo "- host_cron_wrapper_sync_state: \`${HOST_CRON_WRAPPER_SYNC_STATE}\`";
                  echo "- host_cron_wrapper_sync_reason: \`${HOST_CRON_WRAPPER_SYNC_REASON}\`";
                  echo "- host_cron_wrapper_path: \`${HOST_CRON_WRAPPER_PATH}\`";
                  echo "- host_cron_wrapper_source: \`${HOST_CRON_WRAPPER_SOURCE}\`";
                  echo "- host_public_deploy_state: \`${HOST_PUBLIC_DEPLOY_STATE}\`";
                  echo "- host_public_deploy_reason: \`${HOST_PUBLIC_DEPLOY_REASON}\`";
                  echo "- host_public_deploy_script: \`${HOST_PUBLIC_DEPLOY_SCRIPT}\`";
                  echo "- host_public_deploy_target_commit: \`${HOST_PUBLIC_DEPLOY_TARGET_COMMIT}\`";
                    echo "- verify_after_repair_outcome: \`${{ steps.verify_after_repair.outcome }}\`";
                    echo "- smoke_post_repair_outcome: \`${{ steps.smoke_post_repair.outcome }}\`";
                    echo "- telemedicine_repair_status: \`${TELEMEDICINE_REPAIR_STATUS}\`";
                    echo "- telemedicine_repair_reason: \`${TELEMEDICINE_REPAIR_REASON}\`";
                    echo "- telemedicine_repair_failures: \`${TELEMEDICINE_REPAIR_FAILURES}\`";
                    echo "- telemedicine_repair_non_tele_failures: \`${TELEMEDICINE_REPAIR_NON_TELE_FAILURES}\`";
                    echo "- telemedicine_repair_step_outcome: \`${{ steps.telemedicine_repair.outcome }}\`";
                    echo "- turnero_pilot_repair_status: \`${TURNERO_PILOT_REPAIR_STATUS}\`";
                    echo "- turnero_pilot_repair_reason: \`${TURNERO_PILOT_REPAIR_REASON}\`";
                    echo "- turnero_pilot_repair_clinic_id: \`${TURNERO_PILOT_REPAIR_CLINIC_ID}\`";
                    echo "- turnero_pilot_repair_profile_fingerprint: \`${TURNERO_PILOT_REPAIR_PROFILE_FINGERPRINT}\`";
                    echo "- turnero_pilot_repair_status_resolved: \`${TURNERO_PILOT_REPAIR_STATUS_RESOLVED}\`";
                    echo "- turnero_pilot_repair_verify_remote_required: \`${TURNERO_PILOT_REPAIR_VERIFY_REMOTE_REQUIRED}\`";
                    echo "- turnero_pilot_repair_release_mode: \`${TURNERO_PILOT_REPAIR_RELEASE_MODE}\`";
                    echo "- turnero_pilot_repair_catalog_ready: \`${TURNERO_PILOT_REPAIR_CATALOG_READY}\`";
                    echo "- turnero_pilot_repair_remote_verified: \`${TURNERO_PILOT_REPAIR_REMOTE_VERIFIED}\`";
                    echo "- turnero_pilot_repair_deployed_commit: \`${TURNERO_PILOT_REPAIR_DEPLOYED_COMMIT}\`";
                    echo "- turnero_pilot_repair_recovery_targets: \`${TURNERO_PILOT_REPAIR_RECOVERY_TARGETS}\`";
                    echo "- turnero_pilot_repair_step_outcome: \`${{ steps.turnero_pilot_repair.outcome }}\`";
                    echo "- Reporte turnero pilot repair: \`verification/last-turnero-pilot-repair.json\`";
                    echo "- connectivity_diagnose_dispatched: \`${{ steps.transport_fallback.outputs.connectivity_diagnose_dispatch_ready }}\`";
                    echo "- connectivity_diagnose_dispatch_mode: \`${{ steps.transport_fallback.outputs.connectivity_diagnose_dispatch_mode }}\`";
                    echo "- connectivity_diagnose_run_status: \`${{ steps.connectivity_diagnose_status.outputs.connectivity_diagnose_run_status }}\`";
                    echo "- connectivity_diagnose_run_url: \`${{ steps.connectivity_diagnose_status.outputs.connectivity_diagnose_run_url }}\`";
                    echo "- transport_fallback_requested: \`${{ steps.transport_fallback.outputs.transport_fallback_dispatch_requested }}\`";
                    echo "- transport_fallback_recommended: \`${{ steps.transport_fallback.outputs.transport_fallback_recommended }}\`";
                    echo "- transport_fallback_dispatched: \`${{ steps.transport_fallback.outputs.transport_fallback_dispatch_ready }}\`";
                    echo "- transport_fallback_reason: \`${{ steps.transport_fallback.outputs.transport_fallback_reason }}\`";
                    echo "- transport_fallback_failure_assets: \`${{ steps.transport_fallback.outputs.transport_fallback_failure_assets }}\`";
                    echo "- self_hosted_fallback_requested: \`${{ steps.transport_fallback.outputs.self_hosted_fallback_dispatch_requested }}\`";
                    echo "- self_hosted_fallback_dispatched: \`${{ steps.transport_fallback.outputs.self_hosted_fallback_dispatch_ready }}\`";
                    echo "- self_hosted_fallback_state: \`${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_state }}\`";
                    echo "- self_hosted_fallback_run_url: \`${{ steps.self_hosted_fallback_dispatch.outputs.self_hosted_fallback_run_url }}\`";
                    echo "- result: \`${{ job.status }}\`";
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Publicar reporte turneroPilot repair
              if: ${{ always() }}
              uses: actions/upload-artifact@v4
              with:
                  name: repair-turnero-pilot-report
                  path: verification/last-turnero-pilot-repair.json
                  if-no-files-found: warn
                  retention-days: 14
