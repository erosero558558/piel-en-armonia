                        body: [
                          'Recuperado automaticamente por workflow de repair git sync (self-hosted fallback).',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- transport_fallback_recommended: ${process.env.TRANSPORT_FALLBACK_RECOMMENDED || 'false'}`,
                          `- self_hosted_fallback_state: ${process.env.SELF_HOSTED_FALLBACK_STATE || 'not_required'}`,
                          `- self_hosted_fallback_run_status: ${process.env.SELF_HOSTED_FALLBACK_RUN_STATUS || 'n/a'}`,
                          `- self_hosted_fallback_run_url: ${process.env.SELF_HOSTED_FALLBACK_RUN_URL || ''}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue repair-git-sync self-hosted fallback cerrado: #${existing.number}`);

            - name: Crear/actualizar incidente telemedicina de repair
