name: Jules PR — Auto-label & Review Guide

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]
        branches: [main]

jobs:
    detect-and-label:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read

        steps:
            - name: Detect Jules PR
              id: detect
              env:
                  HEAD_BRANCH: ${{ github.head_ref }}
                  PR_BODY: ${{ github.event.pull_request.body }}
                  PR_AUTHOR: ${{ github.event.pull_request.user.login }}
              run: |
                  IS_JULES=false

                  # Jules creates branches like: jules/task-name or jules-task-name
                  if [[ "$HEAD_BRANCH" == jules/* ]] || [[ "$HEAD_BRANCH" == jules-* ]]; then
                    IS_JULES=true
                  fi

                  # Jules service account: jules-google[bot] or similar
                  if [[ "$PR_AUTHOR" == "jules-google[bot]" ]] || [[ "$PR_AUTHOR" == "jules-google" ]]; then
                    IS_JULES=true
                  fi

                  # Jules includes its branding in the PR body
                  if echo "$PR_BODY" | grep -qi "jules.google\|jules-session\|Generated by Jules"; then
                    IS_JULES=true
                  fi

                  echo "is_jules=$IS_JULES" >> "$GITHUB_OUTPUT"
                  echo "Is Jules PR: $IS_JULES"

            - name: Apply jules label
              if: steps.detect.outputs.is_jules == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      // Ensure the label exists
                      try {
                        await github.rest.issues.createLabel({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          name: 'jules',
                          color: '0075ca',
                          description: 'Opened by Jules AI agent',
                        });
                      } catch (e) {
                        // Label already exists — ignore
                      }

                      await github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        labels: ['jules'],
                      });

            - name: Post review checklist
              if: >
                  steps.detect.outputs.is_jules == 'true' &&
                  github.event.action == 'opened'
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = `## Checklist de revisión — Jules PR

                      Este PR fue generado por **Jules AI**. Antes de mergear, verifica:

                      ### Corrección
                      - [ ] La lógica implementada coincide con el prompt del task en \`JULES_TASKS.md\`
                      - [ ] No hay hardcoded credentials, tokens ni rutas absolutas
                      - [ ] Los archivos tocados son los esperados (sin side effects en archivos no relacionados)

                      ### Calidad de código
                      - [ ] Si hay código PHP nuevo, hay tests en \`tests/\`
                      - [ ] Si hay código JS nuevo en \`src/\`, se ejecutó \`npm run build\` y el bundle actualizado está commiteado
                      - [ ] No se re-añadió \`window.debugLog\` (fue removido intencionalmente)
                      - [ ] No se modificaron \`vendor/composer/\` sin un \`composer install\` explícito

                      ### Seguridad
                      - [ ] No se tocan \`js/booking.js\`, \`stripe-webhook.php\` ni \`config.php\`
                      - [ ] Validación de inputs en endpoints nuevos (no confiar en datos externos sin sanitizar)
                      - [ ] No hay SQL dinámico sin prepared statements

                      ### Deployment
                      - [ ] El CI (lint, tests, build) pasa en verde antes de mergear
                      - [ ] Si hay migración de DB, está documentada y es idempotente

                      ---
                      *Revisar con: \`node jules-dispatch.js status\` para ver si hay otras sesiones activas que puedan generar conflictos.*`;

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body,
                      });

    sync-task-status:
        runs-on: ubuntu-latest
        needs: detect-and-label
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: main

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Reconcile board and queues from merged PR
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_BODY: ${{ github.event.pull_request.body }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  ACTOR: ${{ github.actor }}
              shell: bash
              run: |
                  set -euo pipefail
                  echo "PR merged: ${PR_TITLE}"

                  TASK_ID=""
                  if echo "${PR_BODY}" | grep -Eo 'AG-[0-9]+' >/dev/null; then
                    TASK_ID="$(echo "${PR_BODY}" | grep -Eo 'AG-[0-9]+' | head -n1)"
                  elif echo "${PR_TITLE}" | grep -Eo 'AG-[0-9]+' >/dev/null; then
                    TASK_ID="$(echo "${PR_TITLE}" | grep -Eo 'AG-[0-9]+' | head -n1)"
                  fi

                  if [ -n "${TASK_ID}" ]; then
                    mkdir -p verification/agent-runs
                    EVIDENCE_PATH="verification/agent-runs/${TASK_ID}.md"
                    cat > "${EVIDENCE_PATH}" <<EOF
# ${TASK_ID} - Auto close evidence

- Source: merged PR
- PR: ${PR_URL}
- Actor: ${ACTOR}
- Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

## Notes

Auto-generated by .github/workflows/jules-pr.yml on merge reconciliation.
EOF
                    node agent-orchestrator.js close "${TASK_ID}" --evidence "${EVIDENCE_PATH}"
                  else
                    echo "No AG-### task_id found in PR title/body. Running queue sync only."
                    node agent-orchestrator.js sync
                  fi

            - name: Commit reconciliation changes
              shell: bash
              run: |
                  set -euo pipefail
                  if [ -z "$(git status --porcelain)" ]; then
                    echo "No reconciliation changes to commit."
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add AGENT_BOARD.yaml JULES_TASKS.md KIMI_TASKS.md verification/agent-runs .gitignore || true
                  if [ -z "$(git diff --cached --name-only)" ]; then
                    echo "No tracked changes to commit."
                    exit 0
                  fi
                  git commit -m "chore(agent): reconcile board after merged PR"
                  git push
