name: Jules PR Automation

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, closed]
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: read

jobs:
    validate-pr-metadata:
        if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Validate PR task metadata (acceptance_ref required)
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_BODY: ${{ github.event.pull_request.body }}
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const parsers = require('./tools/agent-orchestrator/core/parsers');
                  const rawBoard = fs.readFileSync('AGENT_BOARD.yaml', 'utf8');
                  const board = parsers.parseBoardContent(rawBoard, { allowedStatuses: new Set(['backlog','ready','in_progress','review','done','blocked','failed']) });
                  const text = `${process.env.PR_TITLE || ''}\n${process.env.PR_BODY || ''}`;
                  const taskIds = Array.from(new Set((text.match(/\b(?:AG|CDX)-\d+\b/g) || [])));
                  if (taskIds.length === 0) {
                    console.log('No task IDs detected in PR metadata. Validation skipped.');
                    process.exit(0);
                  }
                  const errors = [];
                  for (const id of taskIds) {
                    const task = board.tasks.find((item) => String(item.id || '') === id);
                    if (!task) {
                      errors.push(`${id}: no existe en AGENT_BOARD.yaml`);
                      continue;
                    }
                    if (!String(task.acceptance_ref || '').trim()) {
                      errors.push(`${id}: acceptance_ref vacío`);
                    }
                  }
                  if (errors.length > 0) {
                    console.error(`PR metadata validation failed (${errors.length})`);
                    for (const error of errors) console.error(`- ${error}`);
                    process.exit(1);
                  }
                  console.log(`PR metadata validation ok for tasks: ${taskIds.join(', ')}`);
                  NODE

            - name: Governance contract
              run: php bin/validate-agent-governance.php

    reconcile-merged-pr:
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'

            - name: Install dependencies
              run: npm ci

            - name: Detect runtime profile from task IDs
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_BODY: ${{ github.event.pull_request.body }}
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const parsers = require('./tools/agent-orchestrator/core/parsers');
                  const rawBoard = fs.readFileSync('AGENT_BOARD.yaml', 'utf8');
                  const board = parsers.parseBoardContent(rawBoard, { allowedStatuses: new Set(['backlog','ready','in_progress','review','done','blocked','failed']) });
                  const text = `${process.env.PR_TITLE || ''}\n${process.env.PR_BODY || ''}`;
                  const taskIds = Array.from(new Set((text.match(/\b(?:AG|CDX)-\d+\b/g) || [])));
                  const tasks = board.tasks.filter((task) => taskIds.includes(String(task.id || '')));
                  const isHigh = tasks.some((task) =>
                    String(task.runtime_impact || '').toLowerCase() === 'high' ||
                    Boolean(task.critical_zone)
                  );
                  const profile = isHigh ? 'high' : 'low';
                  fs.appendFileSync(process.env.GITHUB_ENV, `TASK_RUNTIME_PROFILE=${profile}\n`);
                  fs.appendFileSync(process.env.GITHUB_ENV, `TASK_IDS=${taskIds.join(',')}\n`);
                  console.log(`Runtime profile: ${profile}`);
                  NODE

            - name: Reconcile board with merged PR evidence
              run: node agent-orchestrator.js reconcile --strict --pr-number ${{ github.event.pull_request.number }}

            - name: Run tests by runtime profile
              run: |
                  if [ "${TASK_RUNTIME_PROFILE}" = "high" ]; then
                    npm run agent:gate
                  else
                    npm run agent:test
                  fi

            - name: Validate governance and stale gate
              run: |
                  node agent-orchestrator.js stale --strict
                  php bin/validate-agent-governance.php

            - name: Commit reconciliation changes
              run: |
                  if git diff --quiet -- AGENT_BOARD.yaml AGENT_SIGNALS.yaml JULES_TASKS.md KIMI_TASKS.md; then
                    echo "No reconciliation changes to commit."
                    exit 0
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add AGENT_BOARD.yaml AGENT_SIGNALS.yaml JULES_TASKS.md KIMI_TASKS.md
                  git commit -m "chore(agents): reconcile merged PR #${{ github.event.pull_request.number }} [skip ci]"
                  git push origin HEAD:main
