name: Jules PR - Auto Label and Review Guide

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  detect-and-label:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Detect Jules PR
        id: detect
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        shell: bash
        run: |
          set -euo pipefail
          IS_JULES=false

          if [[ "${HEAD_BRANCH}" == jules/* ]] || [[ "${HEAD_BRANCH}" == jules-* ]]; then
            IS_JULES=true
          fi

          if [[ "${PR_AUTHOR}" == "jules-google[bot]" ]] || [[ "${PR_AUTHOR}" == "jules-google" ]]; then
            IS_JULES=true
          fi

          if echo "${PR_BODY}" | grep -Eqi "jules.google|jules-session|Generated by Jules"; then
            IS_JULES=true
          fi

          echo "is_jules=${IS_JULES}" >> "${GITHUB_OUTPUT}"
          echo "Is Jules PR: ${IS_JULES}"

      - name: Apply jules label
        if: steps.detect.outputs.is_jules == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'jules',
                color: '0075ca',
                description: 'Opened by Jules AI agent',
              });
            } catch (error) {
              // Label probably already exists.
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['jules'],
            });

      - name: Post review checklist
        if: steps.detect.outputs.is_jules == 'true' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const lines = [
              '## Checklist de revision - Jules PR',
              '',
              'Este PR fue generado por **Jules AI**. Antes de mergear, verifica:',
              '',
              '### Correccion',
              '- [ ] La logica implementada coincide con el task en `JULES_TASKS.md`.',
              '- [ ] No hay credenciales hardcodeadas ni rutas absolutas.',
              '- [ ] Los archivos tocados son los esperados.',
              '',
              '### Calidad',
              '- [ ] Si hay JS en `src/`, se ejecuto `npm run build`.',
              '- [ ] Si hay PHP nuevo, hay tests en `tests/`.',
              '',
              '### Seguridad',
              '- [ ] Validacion de inputs y sanitizacion en cambios de runtime.',
              '- [ ] Sin cambios riesgosos fuera del alcance.',
              '',
              '### Deploy',
              '- [ ] CI en verde antes de merge.',
              '',
              'Revisar estado con `node agent-orchestrator.js status`.'
            ];
            const body = lines.join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  sync-task-status:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Reconcile board and queues from merged PR
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          set -euo pipefail
          echo "PR merged: ${PR_TITLE}"

          TASK_ID=""
          if echo "${PR_BODY}" | grep -Eo 'AG-[0-9]+' >/dev/null; then
            TASK_ID="$(echo "${PR_BODY}" | grep -Eo 'AG-[0-9]+' | head -n1)"
          elif echo "${PR_TITLE}" | grep -Eo 'AG-[0-9]+' >/dev/null; then
            TASK_ID="$(echo "${PR_TITLE}" | grep -Eo 'AG-[0-9]+' | head -n1)"
          fi

          if [ -n "${TASK_ID}" ]; then
            mkdir -p verification/agent-runs
            EVIDENCE_PATH="verification/agent-runs/${TASK_ID}.md"
            cat > "${EVIDENCE_PATH}" <<EOF
# ${TASK_ID} - Auto close evidence

- Source: merged PR
- PR: ${PR_URL}
- Actor: ${ACTOR}
- Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

## Notes

Auto-generated by .github/workflows/jules-pr.yml on merge reconciliation.
EOF
            node agent-orchestrator.js close "${TASK_ID}" --evidence "${EVIDENCE_PATH}"
          else
            echo "No AG-### task_id found in PR title/body. Running queue sync only."
            node agent-orchestrator.js sync
          fi

      - name: Commit reconciliation changes
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No reconciliation changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AGENT_BOARD.yaml JULES_TASKS.md KIMI_TASKS.md verification/agent-runs .gitignore || true

          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "No tracked changes to commit."
            exit 0
          fi

          git commit -m "chore(agent): reconcile board after merged PR"
          git push
