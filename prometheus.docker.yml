global:
    scrape_interval: 15s
    evaluation_interval: 15s

rule_files:
    - "/etc/prometheus/prometheus.rules.yml"

scrape_configs:
    - job_name: 'auroraderm_app'
      scheme: http
      metrics_path: '/api.php'
      params:
          resource: ['metrics']
      authorization:
          type: Bearer
          credentials_file: /tmp/prometheus_diagnostics.token
      static_configs:
          - targets: ['host.docker.internal:8080'] # Local PHP server or Docker-published app port
