<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <meta name="description" content="Pantalla de sala de espera — Aurora Derm">
  <title>Sala de Espera — Aurora Derm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde:    #1FAD65;
      --verde-dk: #0A3D24;
      --verde-lt: #EDFAF4;
      --amarillo: #F59E0B;
      --rojo:     #DC2626;
      --gris-lt:  #F3F4F6;
      --gris-dk:  #374151;
      --bg:       #0D1117;
      --card:     #161B22;
      --border:   rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: white;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      grid-template-rows: 90px 1fr 70px;
      grid-template-columns: 1fr 380px;
      gap: 0;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      background: var(--verde);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: white;
    }

    .header-clock {
      font-size: 2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: white;
      letter-spacing: -0.02em;
    }

    /* ── Panel izquierdo: Turno actual ── */
    .panel-current {
      background: var(--verde-dk);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    .panel-current::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center top, rgba(31,173,101,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .current-label {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.55);
    }

    .current-number {
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 900;
      line-height: 0.9;
      color: white;
      letter-spacing: -0.04em;
      text-shadow: 0 0 80px rgba(31,173,101,0.5);
      animation: pulse-num 2s ease-in-out infinite;
    }

    @keyframes pulse-num {
      0%, 100% { text-shadow: 0 0 80px rgba(31,173,101,0.4); }
      50%       { text-shadow: 0 0 120px rgba(31,173,101,0.7); }
    }

    .current-service {
      font-size: 1.4rem;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    .current-room {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(31,173,101,0.2);
      border: 1.5px solid rgba(31,173,101,0.4);
      border-radius: 40px;
      padding: 10px 28px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #6EE7B7;
    }

    .attention-badge {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: var(--amarillo);
      color: #111827;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 10px;
      transform: translateY(-100%);
      transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .attention-badge.visible { transform: translateY(0); }

    /* ── Panel derecho: Cola ── */
    .panel-queue {
      background: var(--card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 32px 28px;
      gap: 12px;
      overflow: hidden;
    }

    .queue-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }

    .queue-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 400ms ease;
      animation: slide-in 300ms ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .queue-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      min-width: 60px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .queue-info { flex: 1; min-width: 0; }

    .queue-name {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-service {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .queue-eta {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--amarillo);
      white-space: nowrap;
    }

    .queue-empty {
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 0.95rem;
      margin-top: 40px;
    }

    /* ── Footer ── */
    footer {
      grid-column: 1 / -1;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
    }

    .footer-msg {
      font-size: 1rem;
      color: rgba(255,255,255,0.45);
    }

    .footer-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--verde);
      animation: blink 2s ease-in-out infinite;
    }

    .status-dot.error { background: var(--rojo); animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Estado vacío ── */
    .idle-screen {
      grid-column: 1 / 2;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      opacity: 0.4;
    }

    .idle-screen.active { display: flex; }

    .idle-number {
      font-size: 6rem;
      font-weight: 900;
      color: rgba(255,255,255,0.15);
    }

    .idle-text {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-brand">
      <div class="header-logo">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="10" stroke="white" stroke-width="2"/>
          <path d="M13 8v5l3.5 2" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="header-name">Aurora Derm</span>
    </div>
    <div class="header-clock" id="clock" aria-live="off">—:—</div>
  </header>

  <!-- Panel izquierdo: turno actual -->
  <div class="panel-current" role="main" aria-label="Turno siendo atendido">
    <div class="attention-badge" id="attention-badge">
      📢 ¡Por favor pase al consultorio!
    </div>
    <div class="current-label" id="current-label">Turno en atención</div>
    <div class="current-number" id="current-number" aria-live="assertive">—</div>
    <div class="current-service" id="current-service">Esperando...</div>
    <div class="current-room" id="current-room" style="display:none">
      <span>📍</span>
      <span id="room-name">Consultorio 1</span>
    </div>
  </div>

  <!-- Panel derecho: cola -->
  <div class="panel-queue" role="complementary" aria-label="Próximos turnos">
    <div class="queue-title">Próximos turnos</div>
    <div id="queue-list"></div>
  </div>

  <!-- Footer -->
  <footer>
    <span class="footer-msg">Por favor espere su número. Toque el kiosco si tiene una cita agendada.</span>
    <div class="footer-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Conectado</span>
    </div>
  </footer>

  <script>
    'use strict';

    // ── Config ────────────────────────────────────────────────
    const POLL_MS         = 5000;  // refresh cada 5s
    const ATTENTION_MS    = 4000;  // duración del banner de llamada
    const MAX_QUEUE_SHOWN = 5;
    let   lastCalledNumber = null;
    let   pollTimer        = null;
    let   consecutiveErrors = 0;

    // ── Reloj ─────────────────────────────────────────────────
    function tickClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ── Actualizar UI ─────────────────────────────────────────
    function renderState(data) {
      // Turno actual
      const current = data.currentTicket || data.current || null;
      const numEl   = document.getElementById('current-number');
      const svcEl   = document.getElementById('current-service');
      const lblEl   = document.getElementById('current-label');
      const roomEl  = document.getElementById('current-room');
      const roomName = document.getElementById('room-name');

      if (current) {
        const num = current.ticketNumber || current.number || '?';

        // Detectar turno nuevo → mostrar banner
        if (num !== lastCalledNumber && lastCalledNumber !== null) {
          showAttentionBanner();
        }
        lastCalledNumber = num;

        numEl.textContent = num;
        svcEl.textContent = capitalize(current.service || 'Consulta general');
        lblEl.textContent = 'Turno en atención';

        if (current.room) {
          roomName.textContent = current.room;
          roomEl.style.display = 'inline-flex';
        } else {
          roomEl.style.display = 'none';
        }
      } else {
        numEl.textContent = '—';
        svcEl.textContent = 'Sin turno activo';
        lblEl.textContent = 'Sala de espera';
        roomEl.style.display = 'none';
      }

      // Cola
      const queue = Array.isArray(data.queue)
        ? data.queue.filter(t => !t.called).slice(0, MAX_QUEUE_SHOWN)
        : [];

      const listEl = document.getElementById('queue-list');
      if (!queue.length) {
        listEl.innerHTML = '<div class="queue-empty">No hay más turnos en espera</div>';
      } else {
        listEl.innerHTML = queue.map((t, i) => {
          const num  = t.ticketNumber || t.number || '?';
          const name = t.patientName  || t.name   || '';
          const svc  = t.service      || 'Consulta';
          const eta  = t.estimatedWaitMinutes != null ? `~${t.estimatedWaitMinutes} min` : '';
          return `
            <div class="queue-item" role="listitem" aria-label="Turno ${num}">
              <div class="queue-num">${num}</div>
              <div class="queue-info">
                <div class="queue-name">${name || 'Paciente'}</div>
                <div class="queue-service">${capitalize(svc)}</div>
              </div>
              ${eta ? `<div class="queue-eta">${eta}</div>` : ''}
            </div>`;
        }).join('');
      }

      setConnected(true);
    }

    // ── Banner de atención ────────────────────────────────────
    function showAttentionBanner() {
      const banner = document.getElementById('attention-badge');
      banner.classList.add('visible');
      setTimeout(() => banner.classList.remove('visible'), ATTENTION_MS);
    }

    // ── Estado de conexión ────────────────────────────────────
    function setConnected(ok) {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      consecutiveErrors = ok ? 0 : consecutiveErrors + 1;
      dot.className  = 'status-dot' + (ok ? '' : ' error');
      text.textContent = ok ? 'Conectado' : `Sin conexión (${consecutiveErrors} intentos)`;
    }

    // ── Polling ───────────────────────────────────────────────
    async function fetchState() {
      try {
        const res  = await fetch('/api.php?resource=queue-state', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if (json.ok && (json.data || json)) {
          renderState(json.data || json);
        } else {
          setConnected(false);
        }
      } catch {
        setConnected(false);
      } finally {
        const delay = consecutiveErrors > 3
          ? Math.min(POLL_MS * Math.pow(1.5, consecutiveErrors - 3), 30000)
          : POLL_MS;
        pollTimer = setTimeout(fetchState, delay);
      }
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
    }

    // Arrancar
    fetchState();
  </script>
</body>
</html>
