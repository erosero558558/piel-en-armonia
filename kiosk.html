<!DOCTYPE html>
<html lang="es" data-theme-mode="system" data-ops-tone="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="application-name" content="Aurora Derm Kiosk">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kiosco de Sala de Espera | Aurora Derm</title>
    
    <!-- Design System Tokens -->
    <link rel="stylesheet" href="/styles/reborn-tokens.css" />
    <link rel="stylesheet" href="/styles/reborn-layout.css" />
    
    <!-- Kiosk specific stylesheets -->
    <link rel="stylesheet" href="/styles/aurora-kiosk.css" />
    <link rel="stylesheet" href="/queue-kiosk.css" />

    <style>
        /* UI4-18 Kiosk Glass Skin Override */
        body.kiosk-waiting-room {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: #020617; /* Navy */
            font-family: var(--reborn-font-base, 'Inter', sans-serif);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Subtle Navy Particle Video/Animation background */
        .kiosk-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(36, 138, 101, 0.08), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(199, 163, 109, 0.08), transparent 40%);
            animation: breathe 12s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .kiosk-glass-shell {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Essential UI4-18 Glass Pane */
        .kiosk-glass-panel.lg-surface {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 32px 64px rgba(2, 6, 23, 0.4);
            text-align: center;
        }

        .kiosk-header {
            margin-bottom: 32px;
        }

        .kiosk-header h1 {
            font-family: var(--reborn-font-display, sans-serif);
            font-size: clamp(36px, 5vw, 56px);
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kiosk-status-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
        }

        /* Glass Pill Counters */
        .glass-pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 1.1em;
            font-weight: 500;
            color: var(--reborn-color-aurora-gold, #c7a36d);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .glass-pill-value {
            font-family: var(--reborn-font-display, sans-serif);
            font-weight: 600;
            color: #fff;
        }

        .kiosk-button {
            background: linear-gradient(135deg, rgba(199, 163, 109, 0.8) 0%, rgba(199, 163, 109, 1) 100%);
            color: #1c1c1e;
            border: none;
            padding: 20px 48px;
            border-radius: 999px;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(199, 163, 109, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 32px;
            font-family: var(--reborn-font-base);
        }

        .kiosk-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="kiosk-waiting-room">
    <!-- Subtle Navy Particle Engine Wrapper -->
    <div class="kiosk-particles"></div>

    <div class="kiosk-glass-shell">
        <!-- Panel Central Glass -->
        <main id="kiosk-app-root" class="kiosk-glass-panel lg-surface">
            <header class="kiosk-header">
                <h1>Bienvenido a Aurora Derm</h1>
                <p style="color: rgba(255,255,255,0.6); font-size: 1.25rem; margin-top: 12px;">Por favor, anuncie su llegada o tome un turno para atención rápida.</p>
            </header>

            <!-- Hook required for queue-kiosk.js dynamic mounting -->
            <div id="turnero-interactive-layer">
                <button class="kiosk-button" data-kiosk-action="checkin">Tengo una Cita</button>
                <div style="margin-top: 16px;">
                    <button class="kiosk-button" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); box-shadow: none;" data-kiosk-action="walkin">Turno Sin Cita</button>
                </div>
            </div>

            <!-- Contadores en Glass Pill -->
            <div class="kiosk-status-row">
                <div class="glass-pill">
                    <span>En Atención:</span>
                    <strong class="glass-pill-value" id="kiosk-active-tickets">3</strong>
                </div>
                <div class="glass-pill">
                    <span>Tiempo Est.:</span>
                    <strong class="glass-pill-value" id="kiosk-eta">8 min</strong>
                </div>
            </div>
        </main>
    </div>

    <!-- Inject compiled Client JS -->
    <script src="/js/queue-kiosk.js" defer></script>
</body>
</html>
