<!DOCTYPE html>
<html lang="es" data-theme-mode="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operador de Turnos | Aurora Derm</title>

    <link rel="stylesheet" href="/styles/reborn-tokens.css" />
    <link rel="stylesheet" href="/styles/reborn-layout.css" />
    <link rel="stylesheet" href="/styles/aurora-admin.css" />

    <style>
        body {
            background-color: var(--rb-bg, #050810);
            color: #fff;
            margin: 0;
            padding: 40px;
            font-family: var(--reborn-font-base, 'Inter', sans-serif);
        }

        .operator-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Operator Main Action Card */
        .call-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        }

        .queue-call-btn {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.9) 0%, rgba(199, 163, 109, 1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #1c1c1e;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 24px 48px;
            border-radius: 99px;
            cursor: pointer;
            box-shadow: 0 16px 32px rgba(199, 163, 109, 0.25);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Spring */
            margin-bottom: 40px;
        }

        .queue-call-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 24px 48px rgba(199, 163, 109, 0.4);
        }

        .queue-call-btn:active {
            transform: scale(0.98);
        }

        .called-ticket-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeInScale 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .called-patient-name {
            font-size: 3rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .called-ticket-badge {
            font-family: var(--reborn-font-display, sans-serif);
            font-size: 4rem;
            color: var(--reborn-color-aurora-gold, #c7a36d);
            margin: 0;
            letter-spacing: 0.05em;
        }

        /* Call History Panel */
        .call-history-panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-family: var(--reborn-font-display, sans-serif);
            font-size: 2rem;
            color: #fff;
            margin: 0 0 24px 0;
        }

        .call-history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-row {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-ticket {
            font-size: 1.5rem;
            font-family: var(--reborn-font-display, sans-serif);
            color: rgba(255,255,255,0.6);
        }

        .history-name {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
            flex-grow: 1;
            padding-left: 16px;
        }

        .status-pill {
            background: rgba(36, 138, 101, 0.15);
            color: #248a65;
            border: 1px solid rgba(36, 138, 101, 0.3);
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
        }

    </style>
</head>
<body>

    <header style="margin-bottom: 40px;">
        <h1 style="font-family: var(--reborn-font-display, sans-serif); font-size: 2rem; color: var(--reborn-color-aurora-gold, #c7a36d); margin: 0;">Aurora Derm</h1>
        <p style="opacity: 0.6; margin-top: 4px;">Puesto Operador 1 - Consultorios</p>
    </header>

    <div class="operator-grid">
        <!-- Call Controls -->
        <div class="call-card">
            <button class="queue-call-btn" id="btn-call-next" onclick="simulateCall()">
                Llamar siguiente
            </button>
            
            <!-- Patient Info Fade-In Region -->
            <div id="active-call-region" style="display: none;" class="called-ticket-info">
                <p style="opacity: 0.5; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.1em; margin: 0;">Turno Actual</p>
                <div class="called-ticket-badge" id="current-ticket">--</div>
                <div class="called-patient-name" id="current-patient">Paciente Local</div>
                <div style="margin-top: 16px;">
                    <button style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 24px; border-radius: 12px; cursor:pointer;" onclick="endCall()">Terminar / Siguiente</button>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="call-history-panel">
            <h2 class="panel-title">Historial de Turnos Reales</h2>
            <div class="call-history-list" id="call-history-container">
                <!-- Static examples -->
                <div class="history-row">
                    <div class="history-ticket">T29</div>
                    <div class="history-name">Jorge Salgado</div>
                    <div class="status-pill">Atendido</div>
                </div>
                <div class="history-row">
                    <div class="history-ticket">T28</div>
                    <div class="history-name">Ana Muñoz</div>
                    <div class="status-pill">Atendido</div>
                </div>
                <div class="history-row">
                    <div class="history-ticket">E02</div>
                    <div class="history-name">Carlos V.</div>
                    <div class="status-pill" style="color: #ef4444; background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3);">Urgencia Cerrada</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Requires logic controller operator -->
    <script src="/js/queue-operator.js" defer></script>
    <script>
        function simulateCall() {
            document.getElementById('btn-call-next').style.display = 'none';
            document.getElementById('active-call-region').style.display = 'flex';
            document.getElementById('current-ticket').innerText = 'T30';
            document.getElementById('current-patient').innerText = 'Martín D.';
        }

        function endCall() {
            document.getElementById('active-call-region').style.display = 'none';
            document.getElementById('btn-call-next').style.display = 'block';
            
            // Add to history
            const history = document.getElementById('call-history-container');
            const newRow = document.createElement('div');
            newRow.className = 'history-row';
            newRow.innerHTML = `
                <div class="history-ticket">T30</div>
                <div class="history-name">Martín D.</div>
                <div class="status-pill">Atendido</div>
            `;
            history.insertBefore(newRow, history.firstChild);
        }
    </script>
</body>
</html>
